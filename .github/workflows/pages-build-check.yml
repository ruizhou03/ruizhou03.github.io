name: Pages build check

# 每次推送到 main 时，用 GitHub Pages 同款的 jekyll-build-pages 试构建一次。
# 只验证能否构建成功，不部署（不干扰 Pages 自身的部署流程）。
# 失败会在 Actions 里显眼报红 + 邮件通知，避免类似 Gemfile 那种破坏构建的提交静默上线。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Doudizhu rules and UI invariants
        run: node --test tools/doudizhu/engine.test.mjs

      - name: Guandan release contracts
        run: |
          node scripts/test-guandan-p0.mjs
          node scripts/test-guandan-differential.mjs --count=10000

      - name: Trial build (mirrors GitHub Pages exactly)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
