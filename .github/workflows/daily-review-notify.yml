name: 每日巡检通知

# routine 每天把 DAILY_REVIEW.md push 上来后触发：
# 抽出当天那一节，开/更新一个 GitHub Issue 并指派给仓库主人，
# GitHub 会自动邮件通知你 —— 看完关掉 Issue 即「当天审批通过」。
# 全程用内置 GITHUB_TOKEN，无需任何密钥。

on:
  push:
    branches: [main]
    paths: ["DAILY_REVIEW.md"]
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抽出当天巡检小节
        id: extract
        run: |
          set -euo pipefail
          if [ ! -f DAILY_REVIEW.md ]; then
            echo "no DAILY_REVIEW.md"; echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 取第一个 "## " 起、到下一个 "## " 前的整段（即最新一天）
          awk 'f && /^## /{exit} /^## /{f=1} f' DAILY_REVIEW.md > section.md
          DATE="$(grep -m1 '^## ' DAILY_REVIEW.md | sed 's/^##[[:space:]]*//' | tr -d '\r')"
          if [ -z "$DATE" ] || [ ! -s section.md ]; then
            echo "empty section"; echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          {
            echo "> 由每日巡检 routine 自动生成。看完后**关闭本 Issue 即代表当天审批通过**；有想回退/讨论的改动可直接在此评论。"
            echo
            cat section.md
            echo
            echo "---"
            echo "_提交：${GITHUB_SHA}　·　[查看 diff](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})_"
          } > issue_body.md

      - name: 开或更新当天 Issue（指派给主人）
        if: steps.extract.outputs.skip != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "每日巡检 ${{ steps.extract.outputs.date }} · 待你审批"
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          EXIST="$(gh issue list --search "in:title \"$TITLE\"" --state all --json number,title \
                    --jq ".[] | select(.title==\"$TITLE\") | .number" | head -1)"
          if [ -n "$EXIST" ]; then
            gh issue comment "$EXIST" --body-file issue_body.md
            gh issue reopen "$EXIST" 2>/dev/null || true
            echo "updated issue #$EXIST"
          else
            gh issue create --title "$TITLE" --body-file issue_body.md \
              --assignee "$OWNER" 2>/dev/null \
              || gh issue create --title "$TITLE" --body-file issue_body.md
            echo "created issue"
          fi
