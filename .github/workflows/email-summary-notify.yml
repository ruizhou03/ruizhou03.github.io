name: 邮件 summary 通知

# routine 每次把新一段 summary push 到 EMAIL_SUMMARY.md 顶部后触发：
# 抽出最新那一节（## 开头），开/更新一个 GitHub Issue 并指派给仓库主人，
# GitHub 自动邮件通知。看完关掉 Issue 即「当时段阅毕」。
# 全程用内置 GITHUB_TOKEN，无需任何密钥。

on:
  push:
    branches: [main]
    paths: ["EMAIL_SUMMARY.md"]
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抽出最新 summary 小节
        id: extract
        run: |
          set -euo pipefail
          if [ ! -f EMAIL_SUMMARY.md ]; then
            echo "no EMAIL_SUMMARY.md"; echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 取第一个 "## " 起、到下一个 "## " 前的整段（即最新一节）
          awk 'f && /^## /{exit} /^## /{f=1} f' EMAIL_SUMMARY.md > section.md
          HEADER="$(grep -m1 '^## ' EMAIL_SUMMARY.md | sed 's/^##[[:space:]]*//' | tr -d '\r')"
          if [ -z "$HEADER" ] || [ ! -s section.md ]; then
            echo "empty section"; echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "header=$HEADER" >> "$GITHUB_OUTPUT"
          {
            echo "> 由 routine \`email-summary\` 自动生成。**关闭本 Issue 即代表当时段阅毕**；想跟进的邮件可直接点链接跳到 Gmail。"
            echo
            cat section.md
            echo
            echo "---"
            echo "_提交：${GITHUB_SHA}　·　[查看 diff](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})　·　[状态文件](https://github.com/${GITHUB_REPOSITORY}/blob/main/_data/email_summary_state.json)_"
          } > issue_body.md

      - name: 开新 Issue（每次时段独立）
        if: steps.extract.outputs.skip != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "📧 邮件 summary ${{ steps.extract.outputs.header }}"
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # 一个时段就一个 Issue —— 如果同一 header 已存在 open 的就追加 comment；否则新开
          EXIST="$(gh issue list --search "in:title \"$TITLE\"" --state open --json number,title \
                    --jq ".[] | select(.title==\"$TITLE\") | .number" | head -1)"
          if [ -n "$EXIST" ]; then
            gh issue comment "$EXIST" --body-file issue_body.md
            echo "appended to issue #$EXIST"
          else
            gh issue create --title "$TITLE" --body-file issue_body.md \
              --assignee "$OWNER" 2>/dev/null \
              || gh issue create --title "$TITLE" --body-file issue_body.md
            echo "created issue"
          fi
