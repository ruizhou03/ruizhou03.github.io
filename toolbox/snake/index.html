<script>
(() => {
  const STORE_KEY = 'tool.snake.v1';
  const GRID = 20;
  const SPEEDS = { slow: 150, mid: 100, fast: 70 };
  const BIG_LIFETIME_MS = 8000;
  const BONUS_MIN = 5;
  const BONUS_MAX = 20;
  const BIG_GAUSS_MEAN = 5;
  const BIG_GAUSS_STD = 1.5;
  const BIG_N_MIN = 2;
  const BIG_N_MAX = 10;
  const POPUP_LIFETIME_MS = 700;
  const SWIPE_THRESHOLD = 24;

  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  function sampleGaussianN() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    let n = Math.round(BIG_GAUSS_MEAN + z * BIG_GAUSS_STD);
    if (n < BIG_N_MIN) n = BIG_N_MIN;
    if (n > BIG_N_MAX) n = BIG_N_MAX;
    return n;
  }

  const state = {
    speed: stored.lastSpeed || 'mid',
    best: Object.assign({ slow: 0, mid: 0, fast: 0 }, stored.best || {}),
    snake: [],
    dir: 'right',
    nextDir: 'right',
    food: null,
    bigFood: null,
    pendingBigFood: false,
    foodsUntilBigFood: 5,
    pendingGrowth: 0,
    popups: [],
    gameTime: 0,
    score: 0,
    running: false,
    paused: false,
    over: false,
    timer: null,
    rafId: null
  };

  const canvas = document.getElementById('snCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('snScore');
  const bestEl = document.getElementById('snBest');
  const pauseBtn = document.getElementById('snPauseBtn');
  const newBtn = document.getElementById('snNewBtn');
  const overlay = document.getElementById('snOverlay');
  const ovTitle = document.getElementById('snOvTitle');
  const ovMsg = document.getElementById('snOvMsg');
  const ovBtn = document.getElementById('snOvBtn');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({ best: state.best, lastSpeed: state.speed }));
  }

  function bigFoodCovers(x, y) {
    const b = state.bigFood;
    if (!b) return false;
    return (x === b.x || x === b.x + 1) && (y === b.y || y === b.y + 1);
  }

  function placeFood() {
    while (true) {
      const x = Math.floor(Math.random() * GRID);
      const y = Math.floor(Math.random() * GRID);
      if (state.snake.some(s => s.x === x && s.y === y)) continue;
      if (bigFoodCovers(x, y)) continue;
      state.food = { x, y };
      return;
    }
  }

  function placeBigFood() {
    for (let i = 0; i < 50; i++) {
      const x = Math.floor(Math.random() * (GRID - 1));
      const y = Math.floor(Math.random() * (GRID - 1));
      const cells = [[x, y], [x + 1, y], [x, y + 1], [x + 1, y + 1]];
      const blocked = cells.some(([cx, cy]) =>
        state.snake.some(s => s.x === cx && s.y === cy) ||
        (state.food && state.food.x === cx && state.food.y === cy)
      );
      if (blocked) continue;
      state.bigFood = { x, y, remaining: BIG_LIFETIME_MS };
      state.pendingBigFood = false;
      return;
    }
    state.pendingBigFood = true;
  }

  function consumeBigFood(headX, headY) {
    const remaining = state.bigFood.remaining;
    const bonus = Math.max(
      BONUS_MIN,
      Math.round(BONUS_MIN + (BONUS_MAX - BONUS_MIN) * remaining / BIG_LIFETIME_MS)
    );
    state.score += bonus;
    if (state.score > (state.best[state.speed] || 0)) {
      state.best[state.speed] = state.score;
      persist();
    }
    state.popups.push({ x: headX, y: headY, text: `+${bonus}`, t0: state.gameTime });
    state.pendingGrowth += 1; // tick already skips pop-tail; +1 more = +2 total growth
    state.bigFood = null;
    state.foodsUntilBigFood = sampleGaussianN();
    updateScores();
  }

  function reset() {
    const mid = Math.floor(GRID / 2);
    state.snake = [{ x: mid - 1, y: mid }, { x: mid - 2, y: mid }, { x: mid - 3, y: mid }];
    state.dir = 'right';
    state.nextDir = 'right';
    state.score = 0;
    state.running = true;
    state.paused = false;
    state.over = false;
    state.bigFood = null;
    state.pendingBigFood = false;
    state.foodsUntilBigFood = sampleGaussianN();
    state.popups = [];
    state.pendingGrowth = 0;
    state.gameTime = 0;
    state.food = null;
    placeFood();
    overlay.classList.remove('show');
    overlay.classList.remove('sn-overlay--pause');
    pauseBtn.textContent = '⏸ 暂停';
    updateScores();
    startLoop();
    startAnim();
  }

  function updateScores() {
    scoreEl.textContent = state.score;
    bestEl.textContent = state.best[state.speed] || 0;
    document.querySelectorAll('.sn-speed-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.speed === state.speed);
    });
  }

  function startLoop() {
    if (state.timer) clearInterval(state.timer);
    state.timer = setInterval(tick, SPEEDS[state.speed]);
  }
  function stopLoop() {
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
  }

  function startAnim() {
    if (state.rafId !== null) return;
    let last = performance.now();
    const step = (now) => {
      const delta = now - last;
      last = now;
      if (state.running && !state.paused && !state.over) {
        state.gameTime += delta;
        if (state.bigFood) {
          state.bigFood.remaining -= delta;
          if (state.bigFood.remaining <= 0) {
            state.bigFood = null;
            state.foodsUntilBigFood = sampleGaussianN();
          }
        }
        if (state.popups.length) {
          state.popups = state.popups.filter(p => state.gameTime - p.t0 < POPUP_LIFETIME_MS);
        }
      }
      draw();
      state.rafId = requestAnimationFrame(step);
    };
    state.rafId = requestAnimationFrame(step);
  }
  function stopAnim() {
    if (state.rafId !== null) cancelAnimationFrame(state.rafId);
    state.rafId = null;
  }

  function tick() {
    if (!state.running || state.paused || state.over) return;
    state.dir = state.nextDir;
    const head = { ...state.snake[0] };
    if (state.dir === 'right') head.x++;
    else if (state.dir === 'left') head.x--;
    else if (state.dir === 'up') head.y--;
    else if (state.dir === 'down') head.y++;

    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
    if (state.snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    state.snake.unshift(head);
    let grew = false;

    if (state.bigFood &&
        (head.x === state.bigFood.x || head.x === state.bigFood.x + 1) &&
        (head.y === state.bigFood.y || head.y === state.bigFood.y + 1)) {
      consumeBigFood(head.x, head.y);
      grew = true;
    }

    if (state.food && head.x === state.food.x && head.y === state.food.y) {
      state.score++;
      if (state.score > (state.best[state.speed] || 0)) {
        state.best[state.speed] = state.score;
        persist();
      }
      placeFood();
      updateScores();
      grew = true;
      state.foodsUntilBigFood--;
      if (state.foodsUntilBigFood <= 0 && !state.bigFood && !state.pendingBigFood) {
        placeBigFood();
      }
    }

    if (state.pendingBigFood && !state.bigFood) {
      placeBigFood();
    }

    if (state.pendingGrowth > 0 && !grew) {
      state.pendingGrowth--;
      grew = true;
    }

    if (!grew) state.snake.pop();
  }

  function gameOver() {
    state.over = true;
    state.running = false;
    stopLoop();
    stopAnim();
    state.bigFood = null;
    state.popups = [];
    state.pendingBigFood = false;
    state.pendingGrowth = 0;
    ovTitle.textContent = 'Game Over';
    ovMsg.textContent = `本局 ${state.score}　·　最高 ${state.best[state.speed] || 0}`;
    overlay.classList.remove('sn-overlay--pause');
    overlay.classList.add('show');
    draw();
    if (snSave) snSave.discard();    // 死了就清存档，不弹续局
    snTryAutoSubmit();
    if (snSettleBtn) snSettleBtn.setEnabled(true);
  }

  function draw() {
    const W = canvas.clientWidth;
    if (W && canvas.width !== W) {
      canvas.width = W;
      canvas.height = W;
    }
    const cs = canvas.width / GRID;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Normal food
    if (state.food) {
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(state.food.x * cs + cs / 2, state.food.y * cs + cs / 2, cs * 0.38, 0, Math.PI * 2);
      ctx.fill();
    }

    // Big (bonus) food
    if (state.bigFood) {
      const b = state.bigFood;
      const ratio = Math.max(0, b.remaining / BIG_LIFETIME_MS);
      const warning = ratio < 0.25;
      const cx = (b.x + 1) * cs;
      const cy = (b.y + 1) * cs;
      const pulseFreq = warning ? 120 : 240;
      const pulse = 1 + 0.06 * Math.sin(state.gameTime / pulseFreq);
      const r = cs * 0.9 * pulse;

      ctx.fillStyle = warning ? '#e74c3c' : '#f1c40f';
      ctx.strokeStyle = warning ? '#922b21' : '#b9870c';
      ctx.lineWidth = Math.max(1, cs * 0.08);
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // sparkle highlight
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.35, cy - r * 0.35, r * 0.18, 0, Math.PI * 2);
      ctx.fill();

      // countdown ring
      ctx.strokeStyle = warning ? 'rgba(255, 100, 100, 0.95)' : 'rgba(255, 255, 255, 0.85)';
      ctx.lineWidth = Math.max(2, cs * 0.12);
      ctx.beginPath();
      ctx.arc(cx, cy, r + cs * 0.16, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ratio);
      ctx.stroke();
    }

    // Snake
    state.snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#1e3a5f' : '#3a6ea5';
      ctx.fillRect(s.x * cs + 1, s.y * cs + 1, cs - 2, cs - 2);
    });

    // Score popups (e.g. +15 floating up)
    if (state.popups.length) {
      state.popups.forEach(p => {
        const t = (state.gameTime - p.t0) / POPUP_LIFETIME_MS;
        if (t < 0 || t >= 1) return;
        const alpha = 1 - t;
        const lift = t * cs * 1.5;
        ctx.save();
        ctx.fillStyle = `rgba(241, 196, 15, ${alpha})`;
        ctx.strokeStyle = `rgba(80, 50, 0, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.font = `bold ${Math.max(14, Math.floor(cs * 0.9))}px system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const px = p.x * cs + cs / 2;
        const py = p.y * cs + cs / 2 - lift;
        ctx.strokeText(p.text, px, py);
        ctx.fillText(p.text, px, py);
        ctx.restore();
      });
    }
  }

  function setDir(d) {
    if (state.over) return;
    const opp = { up: 'down', down: 'up', left: 'right', right: 'left' };
    if (opp[d] === state.dir) return;
    state.nextDir = d;
  }

  function togglePause() {
    if (state.over) return;
    state.paused = !state.paused;
    pauseBtn.textContent = state.paused ? '▶ 继续' : '⏸ 暂停';
    if (state.paused) {
      ovTitle.textContent = '暂停中';
      ovMsg.textContent = '按空格或继续按钮恢复';
      overlay.classList.add('sn-overlay--pause');
      overlay.classList.add('show');
    } else {
      overlay.classList.remove('show');
      overlay.classList.remove('sn-overlay--pause');
    }
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { setDir('up'); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { setDir('down'); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { setDir('left'); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { setDir('right'); e.preventDefault(); }
    else if (k === ' ') { togglePause(); e.preventDefault(); }
  });

  // D-pad
  document.querySelectorAll('.sn-dpad button').forEach(b => {
    b.addEventListener('click', () => {
      const d = b.dataset.dir;
      if (d === 'pause') togglePause();
      else setDir(d);
    });
  });

  // Touch swipe on canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 'right' : 'left');
    else setDir(dy > 0 ? 'down' : 'up');
  }, { passive: true });
  canvas.addEventListener('touchcancel', () => { touchStart = null; }, { passive: true });

  // Speed tabs
  document.getElementById('snSpeedTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.sn-speed-tab');
    if (!t) return;
    state.speed = t.dataset.speed;
    persist();
    updateScores();
    if (state.running) startLoop();
    // 排行榜面板同步切到对应速度 tab
    if (typeof snLbWidget !== 'undefined' && snLbWidget) snLbWidget.setSplit(state.speed);
  });

  pauseBtn.onclick = togglePause;
  newBtn.onclick = () => { snStartFresh(); };
  ovBtn.onclick = () => { snStartFresh(); };

  window.addEventListener('resize', draw);

  // ═══════════════════════════════════════════════════════════════════
  // games-shell 接入：排行榜 / 评论 / 昵称 / 48h 续局
  // ═══════════════════════════════════════════════════════════════════
  let snLbWidget = null;
  let snNickPrompt = null;
  let snRunStartedAt = Date.now();
  let snRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
  let snPendingSubmit = false;
  let snSave = null;
  let snSettleBtn = null;
  let snLastRankInfo = null;
  const $snRankRow = document.getElementById('sn-rank-row');

  const SPEED_LABEL = { slow: '慢速', mid: '中速', fast: '快速' };

  function snPaintBoard(ctx, x, y, w, h) {
    const cs = w / GRID;
    // 背景：用 game-zone 的浅黄底色
    ctx.fillStyle = '#fef6e4';
    ctx.fillRect(x, y, w, h);
    // 网格线（淡）
    ctx.strokeStyle = 'rgba(30, 58, 95, 0.06)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * cs, y);
      ctx.lineTo(x + i * cs, y + h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y + i * cs);
      ctx.lineTo(x + w, y + i * cs);
      ctx.stroke();
    }
    // 食物
    if (state.food) {
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(x + state.food.x * cs + cs / 2, y + state.food.y * cs + cs / 2, cs * 0.38, 0, Math.PI * 2);
      ctx.fill();
    }
    // 大食物
    if (state.bigFood) {
      const b = state.bigFood;
      const cx = x + (b.x + 1) * cs;
      const cy = y + (b.y + 1) * cs;
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.arc(cx, cy, cs * 0.9, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#b9870c';
      ctx.lineWidth = Math.max(1, cs * 0.08);
      ctx.stroke();
    }
    // 蛇
    state.snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#c0392b' : (i % 2 === 0 ? '#1e3a5f' : '#3a6ea5');
      ctx.fillRect(x + s.x * cs + 1, y + s.y * cs + 1, cs - 2, cs - 2);
    });
  }

  function snGetSettlementOpts() {
    const ri = snLastRankInfo || {};
    return {
      kind: 'single',
      gameId: 'snake',
      title: '贪吃蛇',
      emoji: '🐍',
      nick: GamesShell.Identity.getNick(),
      score: state.score,
      scoreLabel: '本 局 得 分',
      scoreFormatter: v => Number(v).toLocaleString(),
      rankInfo: ri,
      stats: [
        { label: '蛇身长度', value: state.snake.length },
        { label: '速度', value: SPEED_LABEL[state.speed] || state.speed },
        { label: '历史最高', value: Number(state.best[state.speed] || 0).toLocaleString() },
      ],
      paintBoard: snPaintBoard,
      boardAspect: 1,
      watermark: 'zirconeey.github.io/toolbox/snake',
    };
  }

  function snSetRank(name, data) {
    if (name === 'hidden') {
      $snRankRow.classList.remove('show', 'loading', 'failed');
      $snRankRow.innerHTML = '';
      snLastRankInfo = null;
      return;
    }
    $snRankRow.classList.add('show');
    $snRankRow.classList.remove('loading', 'failed');
    const mode = SPEED_LABEL[state.speed] || state.speed;
    if (name === 'loading') {
      $snRankRow.classList.add('loading'); $snRankRow.textContent = '排名上传中…';
      snLastRankInfo = { mode };
    } else if (name === 'failed') {
      $snRankRow.classList.add('failed'); $snRankRow.textContent = '排行榜暂时不可用（不影响游戏）';
      snLastRankInfo = { failed: true, mode };
    } else if (name === 'pending') {
      $snRankRow.classList.add('failed'); $snRankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
      snLastRankInfo = { pending: true, mode };
    } else if (name === 'success' && data && data.rank && data.total) {
      $snRankRow.innerHTML = '';
      $snRankRow.append(
        document.createTextNode('第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
      snLastRankInfo = { rank: data.rank, total: data.total, mode };
    }
  }

  async function snSubmitWithNick(nick) {
    if (!nick || snPendingSubmit || state.score <= 0) return;
    snPendingSubmit = true;
    snSetRank('loading');
    const r = await GamesShell.Leaderboard.submit({
      gameId: 'snake',
      nick,
      score: state.score,
      durationMs: Math.max(3000, Date.now() - snRunStartedAt),
      clientNonce: snRunNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra: { speed: state.speed },
    });
    if (r && r.ok) {
      snSetRank('success', { rank: r.rank, total: r.total });
      if (snLbWidget) snLbWidget.refresh();
    } else {
      snSetRank('failed');
      snPendingSubmit = false;
      if (r && r.data && r.data.reason) console.warn('[snake] submit rejected:', r.data.reason);
    }
  }

  function snTryAutoSubmit() {
    if (!window.GamesShell) return;
    if (state.score <= 0) { snSetRank('hidden'); return; }
    const nick = GamesShell.Identity.getNick();
    if (nick) snSubmitWithNick(nick);
    else { snSetRank('pending'); snNickPrompt && snNickPrompt.show(); }
  }

  // 序列化进行中的一局。bigFood 倒计时和 popups 都不存（弃用）。
  function snSerialize() {
    if (!state.running || state.over) return null;
    return {
      speed: state.speed,
      snake: state.snake.map(s => ({ x: s.x, y: s.y })),
      dir: state.dir,
      nextDir: state.nextDir,
      food: state.food,
      score: state.score,
      pendingGrowth: state.pendingGrowth,
      foodsUntilBigFood: state.foodsUntilBigFood,
    };
  }

  function snRestore(saved) {
    if (!saved || !Array.isArray(saved.snake) || !saved.snake.length) return false;
    state.speed = saved.speed && SPEEDS[saved.speed] ? saved.speed : 'mid';
    state.snake = saved.snake.map(s => ({ x: s.x, y: s.y }));
    state.dir = saved.dir || 'right';
    state.nextDir = saved.nextDir || state.dir;
    state.food = saved.food || null;
    state.score = Number(saved.score) || 0;
    state.pendingGrowth = Number(saved.pendingGrowth) || 0;
    state.foodsUntilBigFood = Number.isFinite(saved.foodsUntilBigFood) ? saved.foodsUntilBigFood : sampleGaussianN();
    state.bigFood = null;
    state.pendingBigFood = false;
    state.popups = [];
    state.gameTime = 0;
    if (!state.food) placeFood();
    state.over = false;
    state.paused = false;
    state.running = true;
    overlay.classList.remove('show');
    overlay.classList.remove('sn-overlay--pause');
    pauseBtn.textContent = '⏸ 暂停';
    persist();
    updateScores();
    startLoop();
    startAnim();
    return true;
  }

  function snStartFresh() {
    if (snSave) snSave.discard();
    snRunStartedAt = Date.now();
    snRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
    snPendingSubmit = false;
    snLastRankInfo = null;
    snSetRank('hidden');
    if (snNickPrompt) snNickPrompt.hide();
    if (snSettleBtn) snSettleBtn.setEnabled(false);
    reset();
    if (snSave) snSave.start();
  }

  function snInitShell() {
    if (!window.GamesShell) {
      reset();
      return;
    }
    snLbWidget = GamesShell.Leaderboard.mount({
      container: document.getElementById('sn-lb-mount'),
      gameId: 'snake',
      title: '🏆 贪吃蛇 排行榜',
      scoreFormatter: v => Number(v).toLocaleString(),
      getCurrentNick: () => GamesShell.Identity.getNick(),
      getSplit: () => state.speed,
      splitTabs: [
        { value: 'slow', label: '慢' },
        { value: 'mid',  label: '中' },
        { value: 'fast', label: '快' },
      ],
    });
    GamesShell.Comments.mount({
      container: document.getElementById('sn-cm-mount'),
      path: '/toolbox/snake/',
      title: '💬 蛇友交流',
      intro: '聊聊你的最高分、追大食物的玄学手感 ~',
      placeholder: '聊聊你的贪吃蛇心得 ~',
    });
    snNickPrompt = GamesShell.NickPrompt.mount({
      container: document.getElementById('sn-nick-mount'),
      prompt: '想上排行榜？起个昵称吧',
      onSubmit: nick => snSubmitWithNick(nick),
      onSkip: () => snSetRank('hidden'),
    });
    if (GamesShell.Settlement) {
      snSettleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('sn-settle-btn-mount'),
        gameId: 'snake',
        getOpts: snGetSettlementOpts,
        startDisabled: true,
      });
    }
    snSave = GamesShell.SaveState.create({
      key: 'tool.snake.savestate.v1',
      ttlMs: 48 * 3600 * 1000,
      serialize: snSerialize,
    });
    const peek = snSave.peek();
    if (peek && peek.data && Array.isArray(peek.data.snake) && peek.data.snake.length) {
      // 不重置开新局——直接显示 resume 浮层
      reset();           // 先把界面准备好（重置 overlay 等）
      stopLoop();        // 但别开始 tick
      stopAnim();
      state.running = false;
      GamesShell.SaveState.showResumeModal({
        summaryHtml: `上次玩到 <strong>${peek.data.score || 0}</strong> 分（${peek.data.speed} 速）<span class="gs-resume-meta">${peek.agoText}保存</span>`,
        onResume: () => { snRestore(peek.data); snRunStartedAt = Date.now() - peek.agoMs; snSave.start(); },
        onDiscard: () => { snSave.discard(); snStartFresh(); },
      });
    } else {
      reset();
      snSave.start();
    }
  }

  snInitShell();
})();
</script>
