<style>
  .gl-wrap { max-width: 880px; margin: 0 auto; padding: 1rem; }
  .gl-wrap header { text-align: center; margin-bottom: 1.4rem; }
  .gl-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.4rem; }
  .gl-wrap header .sub { color: var(--color-light); font-style: normal; }

  .toolbar {
    display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center;
    margin-bottom: 1.2rem;
  }
  .toolbar .add-btn {
    font: inherit; font-size: 0.95rem; font-weight: 600;
    padding: 0.6rem 1.4rem; border: none; border-radius: 999px;
    background: var(--color-accent); color: #fff; cursor: pointer;
    box-shadow: 0 2px 8px rgba(30, 58, 95, 0.2);
    transition: all 0.2s;
  }
  @media (hover: hover) {
    .toolbar .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30, 58, 95, 0.28); }
  }
  .toolbar .secondary-btn {
    font: inherit; font-size: 0.85rem;
    padding: 0.5rem 1rem; border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  @media (hover: hover) {
    .toolbar .secondary-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }
  .toolbar .spacer { flex-grow: 1; }

  .goals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 1.4rem;
  }
  .goal-card {
    padding: 1.2rem 1.2rem 1rem;
    border: 1px solid var(--color-border);
    border-left: 4px solid var(--g-color, var(--color-accent));
    border-radius: 12px;
    background: var(--color-bg);
    cursor: pointer;
    transition: all 0.2s;
  }
  @media (hover: hover) {
    .goal-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
  }
  }
  .goal-card .gh-row {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem;
  }
  .goal-card .gh-emoji { font-size: 1.6rem; }
  .goal-card .gh-title { font-family: var(--font-display); font-weight: 600; font-size: 1.1rem; color: var(--color-ink); flex-grow: 1; }
  .goal-card .gh-pct {
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.4rem; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .goal-card .gh-pct.on-track { color: #4a7c59; }
  .goal-card .gh-pct.behind { color: #a87a2a; }
  .goal-card .gh-pct.ahead { color: var(--color-accent); }
  .goal-card .gh-pct.done { color: #4a7c59; }
  .gpb {
    height: 8px; background: var(--color-bg-warm);
    border-radius: 999px; overflow: hidden; position: relative;
    margin-bottom: 0.5rem;
  }
  .gpb .gpb-actual {
    height: 100%; border-radius: 999px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .gpb .gpb-ideal {
    position: absolute; top: -3px; bottom: -3px;
    width: 2px;
    background: var(--color-light);
    border-radius: 1px;
  }
  .goal-card .stats-row {
    display: flex; justify-content: space-between;
    font-size: 0.82rem; color: var(--color-muted);
    margin-top: 0.5rem;
  }
  .goal-card .stats-row strong { color: var(--color-ink); font-variant-numeric: tabular-nums; }

  .empty-zone {
    text-align: center; padding: 4rem 2rem; color: var(--color-light);
  }
  .empty-zone .empty-emoji { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

  /* ============ Detail view ============ */
  .detail-view {
    display: none;
    padding: 1.4rem;
    border: 1px solid var(--color-border);
    border-radius: 14px;
    background: var(--color-bg);
    margin-bottom: 1.2rem;
  }
  .detail-view.open { display: block; }
  .detail-header {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 1.1rem;
    padding-bottom: 0.9rem;
    border-bottom: 1px solid var(--color-border);
  }
  .detail-header .back-btn {
    font: inherit; font-size: 0.85rem;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  @media (hover: hover) {
    .detail-header .back-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }
  .detail-header .d-emoji { font-size: 1.8rem; }
  .detail-header .d-title { font-family: var(--font-display); font-weight: 600; font-size: 1.4rem; color: var(--color-ink); flex-grow: 1; }
  .detail-header .edit-btn, .detail-header .delete-btn {
    font: inherit; font-size: 0.8rem;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted);
    cursor: pointer; transition: all 0.18s;
  }
  @media (hover: hover) {
    .detail-header .edit-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }
  @media (hover: hover) {
    .detail-header .delete-btn:hover { border-color: #b07c75; color: #b07c75; }
  }

  .detail-summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
    margin-bottom: 1.2rem;
  }
  .ds-card {
    text-align: center;
    padding: 0.7rem 0.5rem;
    background: var(--color-bg-warm);
    border-radius: 8px;
  }
  .ds-card .ds-num {
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.3rem; color: var(--color-ink); line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .ds-card .ds-label { font-size: 0.74rem; color: var(--color-muted); margin-top: 0.3rem; }
  @media (max-width: 600px) {
    .detail-summary { grid-template-columns: 1fr 1fr; }
  }

  .chart-wrap {
    border: 1px solid var(--color-border); border-radius: 10px;
    background: var(--color-bg); padding: 1rem;
    margin-bottom: 1.2rem;
  }
  .chart-wrap svg { width: 100%; height: auto; display: block; overflow: visible; }
  .chart-legend {
    display: flex; gap: 1rem; justify-content: center;
    margin-top: 0.4rem; font-size: 0.8rem; color: var(--color-muted);
    flex-wrap: wrap;
  }
  .chart-legend .lc {
    display: inline-block; width: 18px; height: 2px; vertical-align: middle; margin-right: 0.3rem;
  }

  .entry-form {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: end;
  }
  @media (max-width: 600px) {
    .entry-form { grid-template-columns: 1fr 1fr; }
    .entry-form button { grid-column: span 2; }
  }
  .entry-form input {
    padding: 0.55rem 0.7rem;
    font: inherit; font-size: 0.95rem; color: var(--color-ink);
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
  }
  .entry-form input:focus { outline: none; border-color: var(--color-accent); }
  .entry-form button {
    font: inherit; font-size: 0.92rem; font-weight: 600;
    padding: 0.55rem 1.4rem;
    border: none; border-radius: 8px;
    background: var(--color-accent); color: #fff; cursor: pointer;
    transition: all 0.2s;
  }
  @media (hover: hover) {
    .entry-form button:hover { background: var(--color-accent-light); }
  }

  .entry-list { max-height: 320px; overflow-y: auto; }
  .entry-row {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 0.6rem; align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px dashed var(--color-border);
    font-size: 0.92rem;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-row .er-date { color: var(--color-muted); font-size: 0.85rem; min-width: 80px; }
  .entry-row .er-value { font-weight: 600; color: var(--color-ink); font-variant-numeric: tabular-nums; }
  .entry-row .er-delta { font-size: 0.78rem; color: var(--color-muted); }
  .entry-row .er-delete {
    border: none; background: transparent; color: var(--color-light);
    cursor: pointer; padding: 0.2rem 0.4rem; font-size: 0.85rem;
    border-radius: 4px; transition: all 0.18s;
  }
  @media (hover: hover) {
    .entry-row .er-delete:hover { color: #b07c75; background: var(--color-bg-warm); }
  }

  /* ============ Modal ============ */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(3px);
    z-index: 1500;
    display: none; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.6rem;
    max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
  }
  .modal h2 {
    font-family: var(--font-display);
    font-size: 1.3rem; color: var(--color-ink);
    margin-bottom: 1rem;
  }
  .modal .field { margin-bottom: 0.9rem; }
  .modal .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
  .modal label {
    display: block; font-size: 0.85rem; color: var(--color-muted);
    margin-bottom: 0.3rem;
  }
  .modal input, .modal select {
    width: 100%; padding: 0.65rem 0.85rem;
    font: inherit; font-size: 1rem; color: var(--color-ink);
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
  }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--color-accent); }
  .emoji-picker { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .emoji-picker button {
    width: 36px; height: 36px;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg); font-size: 1.1rem;
    cursor: pointer;
  }
  .emoji-picker button.selected { border-color: var(--color-accent); background: var(--color-bg-warm); }
  .color-picker { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .color-picker button {
    width: 30px; height: 30px;
    border: 2px solid transparent; border-radius: 50%;
    cursor: pointer;
  }
  .color-picker button.selected { border-color: var(--color-ink); transform: scale(1.1); }
  .modal-actions {
    display: flex; gap: 0.6rem; justify-content: flex-end;
    margin-top: 1.2rem;
  }
  .modal-actions button {
    font: inherit; font-size: 0.92rem;
    padding: 0.5rem 1.2rem; border-radius: 8px;
    cursor: pointer; transition: all 0.18s;
  }
  .modal-actions .cancel {
    background: var(--color-bg); border: 1px solid var(--color-border);
    color: var(--color-muted);
  }
  .modal-actions .save {
    background: var(--color-accent); border: 1px solid var(--color-accent);
    color: #fff; font-weight: 600;
  }
  .modal-actions .delete-btn {
    background: transparent; border: 1px solid var(--color-border);
    color: #b07c75; margin-right: auto;
  }
  @media (hover: hover) {
    .modal-actions .delete-btn:hover { background: rgba(192, 57, 43, 0.08); border-color: #b07c75; }
  }
</style>

<div class="gl-wrap">
  <header>
    <h1>🎯 目标进度跟踪</h1>
    <p class="sub">Goal Tracker — 长期目标 + 周打卡</p>
  </header>

  <div class="toolbar">
    <button type="button" class="add-btn" id="add-btn">+ 新建目标</button>
    <span class="spacer"></span>
    <button type="button" class="secondary-btn" id="export-btn">📤 导出</button>
    <button type="button" class="secondary-btn" id="import-btn">📥 导入</button>
  </div>

  <div class="goals-grid" id="goals-grid"></div>

  <div class="empty-zone" id="empty-zone">
    <div class="empty-emoji">🎯</div>
    <div style="margin-bottom: 1.2rem;">还没有目标——开始第一个吧</div>
    <button type="button" class="add-btn" onclick="document.getElementById('add-btn').click()">+ 新建第一个目标</button>
  </div>

  <!-- ============ Detail view ============ -->
  <div class="detail-view" id="detail-view">
    <div class="detail-header">
      <button type="button" class="back-btn" id="back-btn">← 返回</button>
      <span class="d-emoji" id="d-emoji"></span>
      <div class="d-title" id="d-title"></div>
      <button type="button" class="edit-btn" id="edit-btn">✎ 编辑</button>
    </div>

    <div class="detail-summary">
      <div class="ds-card">
        <div class="ds-num" id="ds-current">—</div>
        <div class="ds-label">当前</div>
      </div>
      <div class="ds-card">
        <div class="ds-num" id="ds-target">—</div>
        <div class="ds-label">目标</div>
      </div>
      <div class="ds-card">
        <div class="ds-num" id="ds-pct">—</div>
        <div class="ds-label">进度</div>
      </div>
      <div class="ds-card">
        <div class="ds-num" id="ds-days">—</div>
        <div class="ds-label">距 deadline</div>
      </div>
    </div>

    <div class="chart-wrap">
      <svg viewBox="0 0 600 280" id="goal-chart" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="chart-legend">
        <span><span class="lc" style="background: var(--color-accent);"></span>实际</span>
        <span><span class="lc" style="background: var(--color-light); border-top: 1px dashed; height: 0;"></span>理想（线性）</span>
      </div>
    </div>

    <h3 style="font-family: var(--font-display); font-size: 1rem; color: var(--color-ink); margin-bottom: 0.7rem;">添加打卡</h3>
    <div class="entry-form">
      <input type="date" id="entry-date" />
      <input type="number" step="any" id="entry-value" placeholder="当前值" />
      <button type="button" id="entry-add">📝 记录</button>
    </div>

    <h3 style="font-family: var(--font-display); font-size: 1rem; color: var(--color-ink); margin: 1.4rem 0 0.7rem;">历史</h3>
    <div class="entry-list" id="entry-list"></div>
  </div>

  <!-- ============ Edit/Add Modal ============ -->
  <div class="modal-backdrop" id="goal-modal">
    <div class="modal">
      <h2 id="modal-title">新建目标</h2>
      <div class="field">
        <label>标题</label>
        <input type="text" id="m-title" placeholder="例如：减重 5 kg" maxlength="60" />
      </div>
      <div class="field-grid">
        <div class="field">
          <label>起始日期</label>
          <input type="date" id="m-start-date" />
        </div>
        <div class="field">
          <label>截止日期</label>
          <input type="date" id="m-end-date" />
        </div>
        <div class="field">
          <label>起始值</label>
          <input type="number" step="any" id="m-start-value" />
        </div>
        <div class="field">
          <label>目标值</label>
          <input type="number" step="any" id="m-target-value" />
        </div>
      </div>
      <div class="field">
        <label>单位（可选）</label>
        <input type="text" id="m-unit" placeholder="kg / 本 / 分..." maxlength="20" />
      </div>
      <div class="field">
        <label>Emoji</label>
        <div class="emoji-picker" id="m-emoji"></div>
      </div>
      <div class="field">
        <label>颜色</label>
        <div class="color-picker" id="m-color"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="delete-btn" id="m-delete" style="display: none;">🗑 删除</button>
        <button type="button" class="cancel" id="m-cancel">取消</button>
        <button type="button" class="save" id="m-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-backdrop" id="import-modal">
    <div class="modal">
      <h2>导入目标 (JSON)</h2>
      <div class="field">
        <label>粘贴上次导出的 JSON：</label>
        <textarea id="import-text" style="width: 100%; min-height: 120px; padding: 0.7rem; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-bg); color: var(--color-ink); font-family: monospace; font-size: 0.85rem;"></textarea>
      </div>
      <div class="field" id="import-feedback" style="font-size: 0.85rem; color: var(--color-muted); min-height: 1.2em;"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" onclick="document.getElementById('import-modal').classList.remove('open')">取消</button>
        <button type="button" class="save" id="import-confirm">合并导入</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const STORE_KEY = 'tool.goals.v1';
  const EMOJIS = ['🎯', '⚖️', '📚', '💪', '🏃', '✍️', '💰', '🎓', '🏠', '🌱', '⏱️', '🎨'];
  const COLORS = ['#1e3a5f', '#4a7c59', '#c9a96e', '#a04030', '#2d5a8e', '#8b5a3c', '#9b6d5e', '#5e7eb3'];

  const state = {
    goals: [],
    currentId: null,    // 当前打开的 detail
    editingId: null,
    selectedEmoji: '🎯',
    selectedColor: '#1e3a5f',
  };

  // ===== DOM =====
  const $grid = document.getElementById('goals-grid');
  const $empty = document.getElementById('empty-zone');
  const $detail = document.getElementById('detail-view');
  const $addBtn = document.getElementById('add-btn');
  const $exportBtn = document.getElementById('export-btn');
  const $importBtn = document.getElementById('import-btn');

  const $dEmoji = document.getElementById('d-emoji');
  const $dTitle = document.getElementById('d-title');
  const $dsCurrent = document.getElementById('ds-current');
  const $dsTarget = document.getElementById('ds-target');
  const $dsPct = document.getElementById('ds-pct');
  const $dsDays = document.getElementById('ds-days');
  const $backBtn = document.getElementById('back-btn');
  const $editBtn = document.getElementById('edit-btn');
  const $entryDate = document.getElementById('entry-date');
  const $entryValue = document.getElementById('entry-value');
  const $entryAdd = document.getElementById('entry-add');
  const $entryList = document.getElementById('entry-list');

  const $modal = document.getElementById('goal-modal');
  const $modalTitle = document.getElementById('modal-title');
  const $mTitle = document.getElementById('m-title');
  const $mStartDate = document.getElementById('m-start-date');
  const $mEndDate = document.getElementById('m-end-date');
  const $mStartValue = document.getElementById('m-start-value');
  const $mTargetValue = document.getElementById('m-target-value');
  const $mUnit = document.getElementById('m-unit');
  const $mEmoji = document.getElementById('m-emoji');
  const $mColor = document.getElementById('m-color');
  const $mSave = document.getElementById('m-save');
  const $mCancel = document.getElementById('m-cancel');
  const $mDelete = document.getElementById('m-delete');

  const $importModal = document.getElementById('import-modal');
  const $importText = document.getElementById('import-text');
  const $importFeedback = document.getElementById('import-feedback');
  const $importConfirm = document.getElementById('import-confirm');

  // ===== Storage =====
  function load() {
    try { state.goals = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
    catch (e) { state.goals = []; }
  }
  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state.goals)); } catch (e) {}
  }
  function uuid() { return 'g-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }

  // ===== Helpers =====
  function todayIso() {
    const d = new Date(); d.setHours(0, 0, 0, 0);
    return d.toISOString().slice(0, 10);
  }
  function dayDiff(d1, d2) {
    const a = new Date(d1).getTime();
    const b = new Date(d2).getTime();
    return Math.round((b - a) / (24 * 3600 * 1000));
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function fmt(n) {
    if (!Number.isFinite(n)) return '—';
    return parseFloat(n.toFixed(2)).toString();
  }

  // ===== Compute progress =====
  function computeProgress(goal) {
    const sortedEntries = [...goal.entries].sort((a, b) => new Date(a.date) - new Date(b.date));
    const lastEntry = sortedEntries[sortedEntries.length - 1] || null;
    const currentValue = lastEntry ? lastEntry.value : goal.startValue;
    const direction = goal.targetValue > goal.startValue ? 'up' : (goal.targetValue < goal.startValue ? 'down' : 'flat');

    // 实际进度 0-1（>=1 表示已完成或超过）
    let actual = 0;
    if (direction === 'flat') {
      actual = 1;
    } else {
      const range = goal.targetValue - goal.startValue;
      const movement = currentValue - goal.startValue;
      actual = movement / range;  // direction-aware
    }
    actual = Math.max(0, actual);

    // 时间进度
    const today = todayIso();
    const totalDays = Math.max(1, dayDiff(goal.startDate, goal.endDate));
    const elapsedDays = Math.max(0, Math.min(totalDays, dayDiff(goal.startDate, today)));
    const timePct = elapsedDays / totalDays;
    const remainDays = dayDiff(today, goal.endDate);

    // 状态判断
    let status;
    if (actual >= 1) status = 'done';
    else if (actual >= timePct + 0.05) status = 'ahead';
    else if (actual >= timePct - 0.05) status = 'on-track';
    else status = 'behind';

    return {
      currentValue, lastEntry, direction,
      actualPct: actual,
      timePct,
      remainDays,
      status,
    };
  }

  // ===== Render Cards =====
  function render() {
    if (state.currentId) {
      $grid.style.display = 'none';
      $empty.style.display = 'none';
      $detail.classList.add('open');
      renderDetail();
      return;
    }
    $grid.style.display = '';
    $detail.classList.remove('open');

    if (state.goals.length === 0) {
      $grid.innerHTML = '';
      $empty.style.display = '';
      return;
    }
    $empty.style.display = 'none';

    const sorted = [...state.goals].sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
    $grid.innerHTML = sorted.map(g => {
      const p = computeProgress(g);
      const pct = Math.round(p.actualPct * 100);
      const idealLeft = Math.min(100, p.timePct * 100);
      const statusCls = p.status;
      const unit = g.unit || '';
      return `
        <div class="goal-card" data-id="${g.id}" style="--g-color: ${g.color};">
          <div class="gh-row">
            <span class="gh-emoji">${g.emoji}</span>
            <span class="gh-title">${escapeHtml(g.title)}</span>
            <span class="gh-pct ${statusCls}">${pct}%</span>
          </div>
          <div class="gpb">
            <div class="gpb-actual" style="width: ${Math.min(100, pct)}%; background: ${statusCls === 'behind' ? '#a87a2a' : (statusCls === 'done' ? '#4a7c59' : g.color)};"></div>
            <div class="gpb-ideal" style="left: ${idealLeft}%;"></div>
          </div>
          <div class="stats-row">
            <span><strong>${fmt(p.currentValue)}</strong>${escapeHtml(unit)} → ${fmt(g.targetValue)}${escapeHtml(unit)}</span>
            <span>${p.remainDays >= 0 ? p.remainDays + ' 天' : '已截止 ' + (-p.remainDays) + ' 天'}</span>
          </div>
        </div>
      `;
    }).join('');

    $grid.querySelectorAll('.goal-card').forEach(c => {
      c.addEventListener('click', () => {
        state.currentId = c.dataset.id;
        render();
      });
    });
  }

  // ===== Render Detail =====
  function renderDetail() {
    const g = state.goals.find(x => x.id === state.currentId);
    if (!g) { state.currentId = null; render(); return; }
    const p = computeProgress(g);
    const unit = g.unit || '';

    $dEmoji.textContent = g.emoji;
    $dTitle.textContent = g.title;
    $dsCurrent.textContent = fmt(p.currentValue) + unit;
    $dsTarget.textContent = fmt(g.targetValue) + unit;
    $dsPct.textContent = Math.round(p.actualPct * 100) + '%';
    $dsDays.textContent = p.remainDays >= 0 ? p.remainDays + ' 天' : '过 ' + (-p.remainDays) + ' 天';

    drawChart(g);
    renderEntries(g);

    $entryDate.value = todayIso();
    $entryValue.value = '';
    $entryValue.placeholder = '当前 ' + (unit ? unit : '值');
  }

  function drawChart(g) {
    const svg = document.getElementById('goal-chart');
    const W = 600, H = 280;
    const m = { l: 50, r: 16, t: 16, b: 36 };
    const innerW = W - m.l - m.r;
    const innerH = H - m.t - m.b;

    const startMs = new Date(g.startDate).getTime();
    const endMs = new Date(g.endDate).getTime();
    const totalSpan = endMs - startMs || 1;

    // 整理 entries（按日期）+ 起点 + 终点（计划线）
    const sortedEntries = [...g.entries].sort((a, b) => new Date(a.date) - new Date(b.date));
    // y 范围：start / target / 所有 entry values
    const allVals = [g.startValue, g.targetValue, ...sortedEntries.map(e => e.value)];
    const minV = Math.min(...allVals);
    const maxV = Math.max(...allVals);
    const padding = (maxV - minV) * 0.1 || Math.abs(maxV) * 0.1 || 1;
    const yMin = minV - padding;
    const yMax = maxV + padding;

    const xScale = (ms) => m.l + ((ms - startMs) / totalSpan) * innerW;
    const yScale = (v) => m.t + innerH - ((v - yMin) / (yMax - yMin || 1)) * innerH;

    // 理想线（start → target，直线）
    const idealPath = `M ${xScale(startMs)},${yScale(g.startValue)} L ${xScale(endMs)},${yScale(g.targetValue)}`;

    // 实际线（包含起点 + entries + 不延伸到 today/end）
    let actualPoints = [{ ms: startMs, v: g.startValue }];
    sortedEntries.forEach(e => actualPoints.push({ ms: new Date(e.date).getTime(), v: e.value }));
    const actualPath = actualPoints.map((p, i) =>
      (i === 0 ? 'M ' : 'L ') + xScale(p.ms) + ',' + yScale(p.v)
    ).join(' ');

    // 网格 + ticks
    const yTicks = [yMin, (yMin + yMax) / 2, yMax];
    const monthCount = Math.max(1, Math.ceil((endMs - startMs) / (30 * 24 * 3600 * 1000)));
    const xTicks = [];
    for (let i = 0; i <= 4; i++) {
      xTicks.push(startMs + (totalSpan * i) / 4);
    }

    let html = '';
    // grid
    yTicks.forEach(v => {
      const y = yScale(v);
      html += `<line x1="${m.l}" x2="${W - m.r}" y1="${y}" y2="${y}" stroke="var(--color-border)" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.6"/>`;
      html += `<text x="${m.l - 8}" y="${y + 4}" text-anchor="end" fill="var(--color-light)" font-size="10">${fmt(v)}</text>`;
    });
    // axes
    html += `<line x1="${m.l}" x2="${W - m.r}" y1="${m.t + innerH}" y2="${m.t + innerH}" stroke="var(--color-border)"/>`;
    html += `<line x1="${m.l}" x2="${m.l}" y1="${m.t}" y2="${m.t + innerH}" stroke="var(--color-border)"/>`;
    // x labels
    xTicks.forEach(ms => {
      const x = xScale(ms);
      const d = new Date(ms);
      const lbl = (d.getMonth() + 1) + '/' + d.getDate();
      html += `<text x="${x}" y="${H - 16}" text-anchor="middle" fill="var(--color-light)" font-size="10">${lbl}</text>`;
    });
    // ideal line (dashed)
    html += `<path d="${idealPath}" stroke="var(--color-light)" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>`;
    // actual line
    html += `<path d="${actualPath}" stroke="${g.color}" stroke-width="2.5" fill="none"/>`;
    // entry points
    actualPoints.forEach(p => {
      html += `<circle cx="${xScale(p.ms)}" cy="${yScale(p.v)}" r="3.5" fill="${g.color}"/>`;
    });
    // start / end markers
    html += `<circle cx="${xScale(startMs)}" cy="${yScale(g.startValue)}" r="4" fill="none" stroke="${g.color}" stroke-width="2"/>`;
    html += `<circle cx="${xScale(endMs)}" cy="${yScale(g.targetValue)}" r="4" fill="none" stroke="var(--color-light)" stroke-width="2"/>`;
    html += `<text x="${xScale(endMs)}" y="${yScale(g.targetValue) - 8}" text-anchor="end" fill="var(--color-light)" font-size="9.5">目标</text>`;

    // today line
    const today = Date.now();
    if (today >= startMs && today <= endMs) {
      const tx = xScale(today);
      html += `<line x1="${tx}" x2="${tx}" y1="${m.t}" y2="${m.t + innerH}" stroke="var(--color-highlight)" stroke-width="1" stroke-dasharray="2 3"/>`;
      html += `<text x="${tx}" y="${m.t - 4}" text-anchor="middle" fill="var(--color-highlight)" font-size="9">今天</text>`;
    }

    svg.innerHTML = html;
  }

  function renderEntries(g) {
    if (g.entries.length === 0) {
      $entryList.innerHTML = '<div style="text-align: center; color: var(--color-light); padding: 1rem; font-size: 0.85rem;">还没有打卡记录</div>';
      return;
    }
    const sorted = [...g.entries].sort((a, b) => new Date(b.date) - new Date(a.date));
    let prev = null;
    $entryList.innerHTML = sorted.map((e, idx) => {
      // delta 跟上一条比（注意 sorted 是 desc，所以"上一条"是 idx + 1）
      const next = sorted[idx + 1];
      let delta = '';
      if (next) {
        const d = e.value - next.value;
        if (d !== 0) {
          const sign = d > 0 ? '+' : '';
          delta = `<span class="er-delta">${sign}${fmt(d)}</span>`;
        }
      }
      const unit = g.unit || '';
      return `
        <div class="entry-row">
          <span class="er-date">${e.date}</span>
          <span><span class="er-value">${fmt(e.value)}${escapeHtml(unit)}</span> ${delta}</span>
          <button type="button" class="er-delete" data-eid="${e.id}">×</button>
        </div>
      `;
    }).join('');
    $entryList.querySelectorAll('.er-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('删除这条记录？')) return;
        g.entries = g.entries.filter(x => x.id !== btn.dataset.eid);
        save();
        render();
      });
    });
  }

  // ===== Detail navigation =====
  $backBtn.addEventListener('click', () => {
    state.currentId = null;
    render();
  });
  $editBtn.addEventListener('click', () => openModal(state.currentId));

  $entryAdd.addEventListener('click', () => {
    const g = state.goals.find(x => x.id === state.currentId);
    if (!g) return;
    const date = $entryDate.value;
    const val = parseFloat($entryValue.value);
    if (!date || !Number.isFinite(val)) {
      alert('请填写日期和值');
      return;
    }
    // 同一天的记录覆盖
    g.entries = g.entries.filter(e => e.date !== date);
    g.entries.push({
      id: 'e-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      date, value: val, note: '',
    });
    save();
    render();
  });

  // ===== Modal =====
  function buildPickers() {
    $mEmoji.innerHTML = EMOJIS.map(e => `<button type="button" data-emoji="${e}">${e}</button>`).join('');
    $mEmoji.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        $mEmoji.querySelectorAll('button').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        state.selectedEmoji = b.dataset.emoji;
      });
    });
    $mColor.innerHTML = COLORS.map(c => `<button type="button" data-color="${c}" style="background: ${c};"></button>`).join('');
    $mColor.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        $mColor.querySelectorAll('button').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        state.selectedColor = b.dataset.color;
      });
    });
  }
  function selectModalEmoji(em) {
    state.selectedEmoji = em;
    $mEmoji.querySelectorAll('button').forEach(b => b.classList.toggle('selected', b.dataset.emoji === em));
  }
  function selectModalColor(c) {
    state.selectedColor = c;
    $mColor.querySelectorAll('button').forEach(b => b.classList.toggle('selected', b.dataset.color === c));
  }

  function openModal(id) {
    state.editingId = id || null;
    if (id) {
      const g = state.goals.find(x => x.id === id);
      if (!g) return;
      $modalTitle.textContent = '编辑目标';
      $mTitle.value = g.title;
      $mStartDate.value = g.startDate;
      $mEndDate.value = g.endDate;
      $mStartValue.value = g.startValue;
      $mTargetValue.value = g.targetValue;
      $mUnit.value = g.unit || '';
      selectModalEmoji(g.emoji);
      selectModalColor(g.color);
      $mDelete.style.display = '';
    } else {
      $modalTitle.textContent = '新建目标';
      $mTitle.value = '';
      $mStartDate.value = todayIso();
      const t = new Date();
      t.setMonth(t.getMonth() + 3);
      $mEndDate.value = t.toISOString().slice(0, 10);
      $mStartValue.value = '';
      $mTargetValue.value = '';
      $mUnit.value = '';
      selectModalEmoji(EMOJIS[0]);
      selectModalColor(COLORS[0]);
      $mDelete.style.display = 'none';
    }
    $modal.classList.add('open');
    setTimeout(() => $mTitle.focus(), 50);
  }
  function closeModal() {
    $modal.classList.remove('open');
    state.editingId = null;
  }

  $addBtn.addEventListener('click', () => openModal(null));
  $mCancel.addEventListener('click', closeModal);
  $modal.addEventListener('click', e => { if (e.target === $modal) closeModal(); });

  $mSave.addEventListener('click', () => {
    const title = $mTitle.value.trim();
    const startDate = $mStartDate.value;
    const endDate = $mEndDate.value;
    const startValue = parseFloat($mStartValue.value);
    const targetValue = parseFloat($mTargetValue.value);
    if (!title) { alert('请输入标题'); return; }
    if (!startDate || !endDate) { alert('请选择起止日期'); return; }
    if (!Number.isFinite(startValue) || !Number.isFinite(targetValue)) { alert('请输入起始值和目标值'); return; }

    if (state.editingId) {
      const g = state.goals.find(x => x.id === state.editingId);
      if (!g) return;
      g.title = title;
      g.startDate = startDate;
      g.endDate = endDate;
      g.startValue = startValue;
      g.targetValue = targetValue;
      g.unit = $mUnit.value.trim();
      g.emoji = state.selectedEmoji;
      g.color = state.selectedColor;
    } else {
      state.goals.push({
        id: uuid(),
        title, startDate, endDate, startValue, targetValue,
        unit: $mUnit.value.trim(),
        emoji: state.selectedEmoji,
        color: state.selectedColor,
        entries: [],
        createdAt: new Date().toISOString(),
      });
    }
    save();
    render();
    closeModal();
  });

  $mDelete.addEventListener('click', () => {
    if (!state.editingId) return;
    if (!confirm('删除这个目标及其所有打卡记录？')) return;
    state.goals = state.goals.filter(x => x.id !== state.editingId);
    state.currentId = null;
    save();
    render();
    closeModal();
  });

  // ===== Export / Import =====
  $exportBtn.addEventListener('click', async () => {
    if (state.goals.length === 0) { alert('没有目标可导出'); return; }
    const json = JSON.stringify(state.goals, null, 2);
    try {
      await navigator.clipboard.writeText(json);
      $exportBtn.textContent = '✓ 已复制';
      setTimeout(() => { $exportBtn.textContent = '📤 导出'; }, 1800);
    } catch (e) { /* */ }
  });
  $importBtn.addEventListener('click', () => {
    $importText.value = '';
    $importFeedback.textContent = '';
    $importModal.classList.add('open');
  });
  $importConfirm.addEventListener('click', () => {
    const txt = $importText.value.trim();
    if (!txt) { $importFeedback.textContent = '请粘贴 JSON'; return; }
    try {
      const parsed = JSON.parse(txt);
      if (!Array.isArray(parsed)) throw new Error('JSON 必须是数组');
      let added = 0;
      const ids = new Set(state.goals.map(g => g.id));
      parsed.forEach(g => {
        if (!g.title || !g.startDate || !g.endDate) return;
        if (g.id && ids.has(g.id)) return;
        state.goals.push({
          id: g.id || uuid(),
          title: g.title,
          startDate: g.startDate,
          endDate: g.endDate,
          startValue: parseFloat(g.startValue) || 0,
          targetValue: parseFloat(g.targetValue) || 0,
          unit: g.unit || '',
          emoji: g.emoji || '🎯',
          color: g.color || '#1e3a5f',
          entries: Array.isArray(g.entries) ? g.entries : [],
          createdAt: g.createdAt || new Date().toISOString(),
        });
        added++;
      });
      save();
      render();
      $importFeedback.textContent = `✓ 已合并 ${added} 个目标`;
      setTimeout(() => $importModal.classList.remove('open'), 1200);
    } catch (e) {
      $importFeedback.textContent = '❌ JSON 解析失败：' + e.message;
    }
  });

  // ===== Init =====
  load();
  buildPickers();
  render();

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      $modal.classList.remove('open');
      $importModal.classList.remove('open');
    }
  });
})();
</script>
