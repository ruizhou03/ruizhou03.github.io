<script>
(() => {
  const STORE_KEY = 'tool.chess.v1';
  const FILES = ['a','b','c','d','e','f','g','h'];
  const RANKS = ['8','7','6','5','4','3','2','1'];
  const PIECE_GLYPH = {
    w: { p: '♙', n: '♘', b: '♗', r: '♖', q: '♕', k: '♔' },
    b: { p: '♟', n: '♞', b: '♝', r: '♜', q: '♛', k: '♚' }
  };

  // Difficulty knobs:
  //   depth      — minimax search depth (plies)
  //   randomTopK — pick weighted-random from top-K candidates (>1 = noisier)
  //   noise      — multiplicative jitter on leaf evals (easy mode plays imperfectly)
  //   delayMs    — minimum thinking delay before move shows
  const DIFFICULTY = {
    easy:   { depth: 1, randomTopK: 4, noise: 0.18, delayMs: 250 },
    normal: { depth: 2, randomTopK: 1, noise: 0,    delayMs: 380 },
    hard:   { depth: 3, randomTopK: 1, noise: 0,    delayMs: 600 }
  };

  // Centipawn material values
  const PIECE_VALUE = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 0 };

  // Piece-square tables (from white's POV; flip for black). Encourages dev/center.
  // Source: classic Tomasz Michniewski simplified evaluation.
  const PST = {
    p: [
       0,  0,  0,  0,  0,  0,  0,  0,
      50, 50, 50, 50, 50, 50, 50, 50,
      10, 10, 20, 30, 30, 20, 10, 10,
       5,  5, 10, 25, 25, 10,  5,  5,
       0,  0,  0, 20, 20,  0,  0,  0,
       5, -5,-10,  0,  0,-10, -5,  5,
       5, 10, 10,-20,-20, 10, 10,  5,
       0,  0,  0,  0,  0,  0,  0,  0
    ],
    n: [
     -50,-40,-30,-30,-30,-30,-40,-50,
     -40,-20,  0,  0,  0,  0,-20,-40,
     -30,  0, 10, 15, 15, 10,  0,-30,
     -30,  5, 15, 20, 20, 15,  5,-30,
     -30,  0, 15, 20, 20, 15,  0,-30,
     -30,  5, 10, 15, 15, 10,  5,-30,
     -40,-20,  0,  5,  5,  0,-20,-40,
     -50,-40,-30,-30,-30,-30,-40,-50
    ],
    b: [
     -20,-10,-10,-10,-10,-10,-10,-20,
     -10,  0,  0,  0,  0,  0,  0,-10,
     -10,  0,  5, 10, 10,  5,  0,-10,
     -10,  5,  5, 10, 10,  5,  5,-10,
     -10,  0, 10, 10, 10, 10,  0,-10,
     -10, 10, 10, 10, 10, 10, 10,-10,
     -10,  5,  0,  0,  0,  0,  5,-10,
     -20,-10,-10,-10,-10,-10,-10,-20
    ],
    r: [
       0,  0,  0,  0,  0,  0,  0,  0,
       5, 10, 10, 10, 10, 10, 10,  5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
       0,  0,  0,  5,  5,  0,  0,  0
    ],
    q: [
     -20,-10,-10, -5, -5,-10,-10,-20,
     -10,  0,  0,  0,  0,  0,  0,-10,
     -10,  0,  5,  5,  5,  5,  0,-10,
      -5,  0,  5,  5,  5,  5,  0, -5,
       0,  0,  5,  5,  5,  5,  0, -5,
     -10,  5,  5,  5,  5,  5,  0,-10,
     -10,  0,  5,  0,  0,  0,  0,-10,
     -20,-10,-10, -5, -5,-10,-10,-20
    ],
    k: [
     -30,-40,-40,-50,-50,-40,-40,-30,
     -30,-40,-40,-50,-50,-40,-40,-30,
     -30,-40,-40,-50,-50,-40,-40,-30,
     -30,-40,-40,-50,-50,-40,-40,-30,
     -20,-30,-30,-40,-40,-30,-30,-20,
     -10,-20,-20,-20,-20,-20,-20,-10,
      20, 20,  0,  0,  0,  0, 20, 20,
      20, 30, 10,  0,  0, 10, 30, 20
    ]
  };

  function squareIndex(sq) {
    // a8=0..h8=7, a7=8..h7=15, ..., a1=56..h1=63
    const file = sq.charCodeAt(0) - 97;       // a..h → 0..7
    const rank = 8 - parseInt(sq[1], 10);     // 8..1 → 0..7
    return rank * 8 + file;
  }

  function pstScore(piece, color, sq) {
    const idx = squareIndex(sq);
    const tableIdx = color === 'w' ? idx : (idx ^ 56); // mirror vertically for black
    return PST[piece][tableIdx];
  }

  // Static evaluation from White's perspective (positive = good for white)
  function evaluateBoard(game) {
    if (game.in_checkmate()) {
      // The side to move is checkmated
      return game.turn() === 'w' ? -1e6 : 1e6;
    }
    if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition() || game.insufficient_material()) {
      return 0;
    }
    let score = 0;
    const board = game.board(); // 8x8 from rank 8 to rank 1
    for (let r = 0; r < 8; r++) {
      for (let f = 0; f < 8; f++) {
        const cell = board[r][f];
        if (!cell) continue;
        const sq = FILES[f] + RANKS[r];
        const matVal = PIECE_VALUE[cell.type];
        const posVal = pstScore(cell.type, cell.color, sq);
        const sign = cell.color === 'w' ? 1 : -1;
        score += sign * (matVal + posVal);
      }
    }
    return score;
  }

  // Move ordering hint: captures + checks first, helps α-β pruning
  function moveOrderKey(m) {
    let k = 0;
    if (m.flags.indexOf('c') !== -1 || m.flags.indexOf('e') !== -1) {
      // MVV-LVA approximation: capturing higher-value with lower-value first
      const victim = PIECE_VALUE[m.captured || 'p'];
      const attacker = PIECE_VALUE[m.piece];
      k += 10000 + victim * 10 - attacker;
    }
    if (m.flags.indexOf('p') !== -1) k += 9000;
    if (m.flags.indexOf('k') !== -1 || m.flags.indexOf('q') !== -1) k += 100;
    return k;
  }

  // Minimax with α-β pruning. Returns {score, move} where score is from white's POV.
  function negamax(game, depth, alpha, beta, color) {
    // color = +1 for white-to-move, -1 for black-to-move
    if (depth === 0 || game.game_over()) {
      return { score: color * evaluateBoard(game), move: null };
    }
    const moves = game.moves({ verbose: true });
    moves.sort((a, b) => moveOrderKey(b) - moveOrderKey(a));
    let bestMove = moves[0];
    let bestScore = -Infinity;
    for (const m of moves) {
      game.move(m);
      const child = negamax(game, depth - 1, -beta, -alpha, -color);
      const score = -child.score;
      game.undo();
      if (score > bestScore) {
        bestScore = score;
        bestMove = m;
      }
      if (score > alpha) alpha = score;
      if (alpha >= beta) break;
    }
    return { score: bestScore, move: bestMove };
  }

  // Top-level AI move picker. Honors difficulty's depth, noise, randomTopK.
  function pickAiMove(game, cfg) {
    const moves = game.moves({ verbose: true });
    if (moves.length === 0) return null;
    moves.sort((a, b) => moveOrderKey(b) - moveOrderKey(a));

    const colorSign = game.turn() === 'w' ? 1 : -1;
    const scored = moves.map(m => {
      game.move(m);
      const child = negamax(game, cfg.depth - 1, -Infinity, Infinity, -colorSign);
      let score = -child.score;
      game.undo();
      if (cfg.noise > 0) score += (Math.random() - 0.5) * 2 * cfg.noise * Math.abs(score || 50);
      return { move: m, score };
    });
    scored.sort((a, b) => b.score - a.score);

    if (cfg.randomTopK > 1 && scored.length > 1) {
      const k = Math.min(cfg.randomTopK, scored.length);
      const top = scored.slice(0, k);
      const minS = Math.min(...top.map(x => x.score));
      const weights = top.map(x => Math.max(1, x.score - minS + 30));
      const sum = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * sum;
      for (let i = 0; i < top.length; i++) {
        r -= weights[i];
        if (r <= 0) return top[i].move;
      }
      return top[0].move;
    }
    return scored[0].move;
  }

  // ============ State + DOM ============

  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  const state = {
    mode: stored.lastMode || 'pvp',
    difficulty: DIFFICULTY[stored.difficulty] ? stored.difficulty : 'normal',
    tally: Object.assign({ w: 0, b: 0, d: 0 }, stored.tally || {}),
    game: new Chess(),
    selected: null,
    legalTargets: [],     // verbose moves from `selected`
    aiThinking: false,
    paused: false,
    over: false,
    lastMove: null
  };

  const board = document.getElementById('chBoard');
  const turnEl = document.getElementById('chTurn');
  const tallyW = document.getElementById('chTallyW');
  const tallyB = document.getElementById('chTallyB');
  const tallyD = document.getElementById('chTallyD');
  const undoBtn = document.getElementById('chUndoBtn');
  const newBtn = document.getElementById('chNewBtn');
  const pauseBtn = document.getElementById('chPauseBtn');
  const overlay = document.getElementById('chOverlay');
  const ovTitle = document.getElementById('chOvTitle');
  const ovBtn = document.getElementById('chOvBtn');
  const pausedOverlay = document.getElementById('chPausedOverlay');
  const resumeBtn = document.getElementById('chResumeBtn');
  const difficultyRow = document.getElementById('chDifficultyRow');
  const difficultyTabs = document.getElementById('chDifficultyTabs');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      tally: state.tally,
      lastMode: state.mode,
      difficulty: state.difficulty
    }));
  }

  // Convention (matches gomoku): 'ai-black' means human plays black; AI plays white.
  function aiSide() {
    if (state.mode === 'ai-black') return 'w';   // human is black → AI is white
    if (state.mode === 'ai-white') return 'b';   // human is white → AI is black
    return null;
  }

  function humanSide() {
    if (state.mode === 'ai-black') return 'b';
    if (state.mode === 'ai-white') return 'w';
    return null;
  }

  // Show the human's side at the bottom: PvP and ai-white → white at bottom; ai-black flips.
  function isFlipped() {
    return state.mode === 'ai-black';
  }

  function renderBoard() {
    board.innerHTML = '';
    const flipped = isFlipped();
    const checkSq = state.game.in_check() ? findKingSquare(state.game.turn()) : null;
    const lastMove = state.lastMove;
    const cells = state.game.board();
    for (let r = 0; r < 8; r++) {
      for (let f = 0; f < 8; f++) {
        const dispR = flipped ? 7 - r : r;
        const dispF = flipped ? 7 - f : f;
        const cellPiece = cells[dispR][dispF];
        const sq = FILES[dispF] + RANKS[dispR];
        const cellEl = document.createElement('div');
        cellEl.className = 'ch-cell ' + ((dispR + dispF) % 2 === 0 ? 'light' : 'dark');
        cellEl.dataset.sq = sq;
        if (state.selected === sq) cellEl.classList.add('selected');
        if (lastMove && lastMove.from === sq) cellEl.classList.add('last-from');
        if (lastMove && lastMove.to === sq) cellEl.classList.add('last-to');
        if (checkSq === sq) cellEl.classList.add('in-check');

        if (cellPiece) {
          const pieceEl = document.createElement('span');
          pieceEl.className = 'ch-piece ch-' + cellPiece.type + ' ' + (cellPiece.color === 'w' ? 'white' : 'black');
          pieceEl.textContent = PIECE_GLYPH[cellPiece.color][cellPiece.type];
          cellEl.appendChild(pieceEl);
        }

        // Coordinate labels on edge cells
        if ((flipped && dispR === 0) || (!flipped && dispR === 7)) {
          const fileLabel = document.createElement('span');
          fileLabel.className = 'ch-coord file';
          fileLabel.textContent = FILES[dispF];
          cellEl.appendChild(fileLabel);
        }
        if ((flipped && dispF === 7) || (!flipped && dispF === 0)) {
          const rankLabel = document.createElement('span');
          rankLabel.className = 'ch-coord rank';
          rankLabel.textContent = RANKS[dispR];
          cellEl.appendChild(rankLabel);
        }

        // Target indicator dots
        const target = state.legalTargets.find(m => m.to === sq);
        if (target) {
          const isCapture = target.flags.indexOf('c') !== -1 || target.flags.indexOf('e') !== -1;
          if (isCapture) cellEl.classList.add('target-capture');
          const dot = document.createElement('span');
          dot.className = 'ch-dot';
          cellEl.appendChild(dot);
        }

        board.appendChild(cellEl);
      }
    }
  }

  function findKingSquare(color) {
    const cells = state.game.board();
    for (let r = 0; r < 8; r++) {
      for (let f = 0; f < 8; f++) {
        const c = cells[r][f];
        if (c && c.type === 'k' && c.color === color) return FILES[f] + RANKS[r];
      }
    }
    return null;
  }

  function updateStatus() {
    const turn = state.game.turn();
    let label;
    if (state.paused) {
      label = '⏸ 已暂停';
    } else if (state.over) {
      if (state.game.in_checkmate()) {
        label = (turn === 'w' ? '⚫ 黑方将死 — 黑胜' : '⚪ 白方将死 — 白胜');
      } else if (state.game.in_stalemate()) {
        label = '— 逼和 —';
      } else if (state.game.in_threefold_repetition()) {
        label = '— 三次重复，和棋 —';
      } else if (state.game.insufficient_material()) {
        label = '— 子力不足，和棋 —';
      } else if (state.game.in_draw()) {
        label = '— 和棋 —';
      } else {
        label = '— 游戏结束 —';
      }
    } else if (state.aiThinking) {
      label = '🤖 AI 思考中…';
    } else {
      const inCheck = state.game.in_check();
      label = (turn === 'w' ? '⚪ 白方走子' : '⚫ 黑方走子') + (inCheck ? ' — 将军！' : '');
    }
    turnEl.textContent = label;

    tallyW.textContent = state.tally.w;
    tallyB.textContent = state.tally.b;
    tallyD.textContent = state.tally.d;

    undoBtn.disabled = state.game.history().length === 0 || state.aiThinking || state.paused;

    document.querySelectorAll('#chModeTabs .ch-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === state.mode);
    });
    document.querySelectorAll('#chDifficultyTabs .ch-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.difficulty);
    });

    const isAi = aiSide() !== null;
    difficultyRow.hidden = !isAi;
    pauseBtn.hidden = !isAi;
    pauseBtn.textContent = state.paused ? '▶ 继续' : '⏸ 暂停';
    pauseBtn.disabled = state.over;
    pausedOverlay.classList.toggle('show', state.paused && !state.over);
  }

  function newGame() {
    if (typeof chSave !== 'undefined' && chSave) chSave.discard();
    state.game = new Chess();
    state.selected = null;
    state.legalTargets = [];
    state.aiThinking = false;
    state.paused = false;
    state.over = false;
    state.lastMove = null;
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    chPgoOverlay.classList.remove('open');
    renderBoard();
    updateStatus();
    chRunStartedAt = Date.now();
    chRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
    chLastResult = null;
    if (chSettleBtn) chSettleBtn.setEnabled(false);
    // AI plays white when human is black → AI moves first
    if (state.mode === 'ai-black') {
      setTimeout(triggerAiMove, 320);
    }
  }

  function endGameIfOver() {
    if (!state.game.game_over()) return false;
    state.over = true;
    let title;
    let humanWon = false;
    let humanLost = false;
    let isDraw = false;
    if (state.game.in_checkmate()) {
      // The side that just moved won (opposite of current turn)
      const winner = state.game.turn() === 'w' ? 'b' : 'w';
      if (winner === 'w') { state.tally.w++; title = '⚪ 白方将死黑方'; }
      else { state.tally.b++; title = '⚫ 黑方将死白方'; }
      // 仅当 AI 模式下"人类方"获胜，才上传战绩榜
      const humanIsW = state.mode === 'ai-black';
      const humanIsB = state.mode === 'ai-white';
      if (humanIsW && winner === 'w') humanWon = true;
      if (humanIsB && winner === 'b') humanWon = true;
      if ((humanIsW && winner === 'b') || (humanIsB && winner === 'w')) humanLost = true;
    } else {
      state.tally.d++;
      isDraw = true;
      if (state.game.in_stalemate()) title = '— 逼和 —';
      else if (state.game.in_threefold_repetition()) title = '— 三次重复，和棋 —';
      else if (state.game.insufficient_material()) title = '— 子力不足，和棋 —';
      else title = '— 50 步规则，和棋 —';
    }
    persist();
    ovTitle.textContent = title;
    overlay.classList.add('show');
    if (humanWon) chTryAutoSubmit();
    if (typeof chSave !== 'undefined' && chSave) chSave.discard();
    // 结算图：仅 AI 模式才有 win/lose/draw 概念
    if (state.mode && state.mode.startsWith('ai-')) {
      chLastResult = humanWon ? 'win' : (humanLost ? 'lose' : (isDraw ? 'draw' : null));
      if (chSettleBtn && chLastResult) chSettleBtn.setEnabled(true);
    }
    return true;
  }

  function applyMove(moveObj) {
    // moveObj must include from/to (and optionally promotion)
    const result = state.game.move(moveObj);
    if (!result) return null;
    state.lastMove = { from: result.from, to: result.to };
    state.selected = null;
    state.legalTargets = [];
    renderBoard();
    if (!endGameIfOver()) {
      updateStatus();
      // If AI's turn now, queue AI move
      if (!state.paused && aiSide() === state.game.turn()) {
        setTimeout(triggerAiMove, 100);
      }
    } else {
      updateStatus();
    }
    return result;
  }

  function triggerAiMove() {
    if (state.over || state.paused) return;
    if (aiSide() !== state.game.turn()) return;
    state.aiThinking = true;
    updateStatus();
    const cfg = DIFFICULTY[state.difficulty];
    setTimeout(() => {
      const startedAt = Date.now();
      const move = pickAiMove(state.game, cfg);
      const elapsed = Date.now() - startedAt;
      const wait = Math.max(0, cfg.delayMs - elapsed);
      setTimeout(() => {
        state.aiThinking = false;
        if (state.paused || state.over) { updateStatus(); return; }
        if (move) applyMove({ from: move.from, to: move.to, promotion: move.promotion || 'q' });
        else { updateStatus(); }
      }, wait);
    }, 30);
  }

  // Click handling
  board.addEventListener('click', (e) => {
    if (state.over || state.aiThinking || state.paused) return;
    const cell = e.target.closest('.ch-cell');
    if (!cell) return;
    const sq = cell.dataset.sq;
    const turn = state.game.turn();
    const piece = state.game.get(sq);

    // In AI mode, prevent the human from moving the AI's pieces
    if (aiSide() !== null && turn !== humanSide()) return;

    // If a target was clicked, attempt move
    if (state.selected) {
      const target = state.legalTargets.find(m => m.to === sq);
      if (target) {
        applyMove({ from: state.selected, to: sq, promotion: target.promotion || 'q' });
        return;
      }
      // Re-select if clicking another own piece
      if (piece && piece.color === turn) {
        state.selected = sq;
        state.legalTargets = state.game.moves({ square: sq, verbose: true });
        renderBoard();
        return;
      }
      // Otherwise deselect
      state.selected = null;
      state.legalTargets = [];
      renderBoard();
      return;
    }

    // No selection → select if it's own piece
    if (piece && piece.color === turn) {
      state.selected = sq;
      state.legalTargets = state.game.moves({ square: sq, verbose: true });
      renderBoard();
    }
  });

  // Mode tabs
  document.getElementById('chModeTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.ch-mode-tab');
    if (!t) return;
    state.mode = t.dataset.mode;
    persist();
    newGame();
  });

  // Difficulty tabs
  difficultyTabs.addEventListener('click', (e) => {
    const t = e.target.closest('.ch-mode-tab');
    if (!t || !DIFFICULTY[t.dataset.diff]) return;
    if (state.difficulty === t.dataset.diff) return;
    state.difficulty = t.dataset.diff;
    persist();
    newGame();
  });

  // Pause toggle
  function togglePause() {
    if (aiSide() === null || state.over) return;
    state.paused = !state.paused;
    updateStatus();
    if (!state.paused && aiSide() === state.game.turn() && !state.aiThinking) {
      setTimeout(triggerAiMove, 100);
    }
  }
  pauseBtn.onclick = togglePause;
  resumeBtn.onclick = togglePause;

  // Undo: PvP rolls back 1 ply, AI mode rolls back to player's previous turn (2 plies)
  undoBtn.onclick = () => {
    if (state.aiThinking || state.paused) return;
    const steps = aiSide() != null ? 2 : 1;
    let undone = 0;
    for (let i = 0; i < steps; i++) {
      if (state.game.history().length === 0) break;
      state.game.undo();
      undone++;
    }
    if (undone === 0) return;
    state.over = false;
    state.selected = null;
    state.legalTargets = [];
    const hist = state.game.history({ verbose: true });
    state.lastMove = hist.length > 0 ? { from: hist[hist.length-1].from, to: hist[hist.length-1].to } : null;
    overlay.classList.remove('show');
    renderBoard();
    updateStatus();
  };

  newBtn.onclick = newGame;
  ovBtn.onclick = newGame;

  // ── games-shell：战绩榜 + 评论 ──────────────
  let chWlbWidget = null;
  let chNickPrompt = null;
  let chRunStartedAt = Date.now();
  let chRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
  let chSettleBtn = null;
  let chLastResult = null;   // 'win' | 'lose' | 'draw' | null

  const CH_DIFF_LABEL = { easy: '简单', normal: '普通', hard: '困难' };
  const CH_PIECE = {
    'wK': '♔', 'wQ': '♕', 'wR': '♖', 'wB': '♗', 'wN': '♘', 'wP': '♙',
    'bK': '♚', 'bQ': '♛', 'bR': '♜', 'bB': '♝', 'bN': '♞', 'bP': '♟',
  };

  function chFormatDuration(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function chPaintBoard(ctx, x, y, w, h) {
    const cell = Math.min(w, h) / 8;
    const ox = x + (w - cell * 8) / 2;
    const oy = y + (h - cell * 8) / 2;
    // 棋盘格
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        ctx.fillStyle = ((r + c) % 2 === 0) ? '#f0d9b5' : '#b58863';
        ctx.fillRect(ox + c * cell, oy + r * cell, cell, cell);
      }
    }
    // 最后一手高亮
    if (state.lastMove) {
      ctx.fillStyle = 'rgba(255, 215, 0, 0.45)';
      [state.lastMove.from, state.lastMove.to].forEach(sq => {
        const file = sq.charCodeAt(0) - 'a'.charCodeAt(0);
        const rank = 8 - parseInt(sq[1], 10);
        ctx.fillRect(ox + file * cell, oy + rank * cell, cell, cell);
      });
    }
    // 棋子
    if (!state.game) return;
    const board = state.game.board();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `${cell * 0.78}px "Noto Sans Symbols 2", "Segoe UI Symbol", "Arial Unicode MS", sans-serif`;
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const p = board[r][c];
        if (!p) continue;
        const ch = CH_PIECE[p.color + p.type.toUpperCase()];
        if (!ch) continue;
        if (p.color === 'w') {
          ctx.fillStyle = '#f4f4f4';
          ctx.lineWidth = Math.max(1, cell * 0.04);
          ctx.strokeStyle = '#1a1a1a';
          ctx.strokeText(ch, ox + c * cell + cell / 2, oy + r * cell + cell / 2 + cell * 0.04);
          ctx.fillText(ch, ox + c * cell + cell / 2, oy + r * cell + cell / 2 + cell * 0.04);
        } else {
          ctx.fillStyle = '#1a1a1a';
          ctx.fillText(ch, ox + c * cell + cell / 2, oy + r * cell + cell / 2 + cell * 0.04);
        }
      }
    }
  }

  function chGetSettlementOpts() {
    const isAi = state.mode && state.mode.startsWith('ai-');
    if (!isAi) return null;
    if (!chLastResult) return null;
    const moveCount = state.game ? state.game.history().length : 0;
    const elapsed = Math.floor((Date.now() - chRunStartedAt) / 1000);
    return {
      kind: 'duel',
      gameId: 'chess',
      title: '国际象棋',
      emoji: '♟',
      nick: GamesShell.Identity.getNick() || '匿名',
      opponent: 'vs AI · ' + (CH_DIFF_LABEL[state.difficulty] || state.difficulty),
      result: chLastResult,
      stats: [
        { label: '我执', value: state.mode === 'ai-black' ? '白' : '黑' },
        { label: '走子数', value: moveCount + ' 步' },
        { label: '用时', value: chFormatDuration(elapsed) },
      ],
      paintBoard: chPaintBoard,
      boardW: 480,
      boardAspect: 1,
      watermark: 'ruizhou03.github.io/toolbox/chess',
    };
  }

  function chSubmitWins(nick) {
    const submittedNick = nick;
    const moveCount = state.game.history().length;
    return GamesShell.WinsLeaderboard.submit({
      gameId: 'chess',
      nick,
      did: GamesShell.Identity.getDeviceId(),
      aiLevel: state.difficulty,
      moves: moveCount,
      durationMs: Math.max(5000, Date.now() - chRunStartedAt),
      clientNonce: chRunNonce,
    }).then(r => {
      if (r && r.ok) {
        if (chWlbWidget) chWlbWidget.refresh();
        if (chNickPrompt) chNickPrompt.hide();
        return;
      }
      if (r && r.reason === 'nick_taken') {
        GamesShell.Identity.clearNick();
        alert('"' + submittedNick + '" 已被别的玩家占用，请换一个昵称');
        if (chNickPrompt) { chNickPrompt.refresh(); chNickPrompt.show(); }
        return;
      }
      if (r && r.reason) console.warn('[chess] wins submit rejected:', r.reason);
    });
  }

  function chTryAutoSubmit() {
    if (!window.GamesShell) return;
    if (!state.mode || !state.mode.startsWith('ai-')) return;
    if (state.difficulty !== 'easy' && state.difficulty !== 'normal' && state.difficulty !== 'hard') return;
    const nick = GamesShell.Identity.getNick();
    if (nick) {
      chSubmitWins(nick);
      return;
    }
    if (chNickPrompt) chNickPrompt.show();
  }

  function chInitShell() {
    if (!window.GamesShell || !GamesShell.WinsLeaderboard) return;
    chWlbWidget = GamesShell.WinsLeaderboard.mount({
      container: document.getElementById('ch-wlb-mount'),
      gameId: 'chess',
      title: '🏆 国际象棋 战绩榜',
      getCurrentNick: () => GamesShell.Identity.getNick(),
    });
    GamesShell.Comments.mount({
      container: document.getElementById('ch-cm-mount'),
      path: '/toolbox/chess/',
      title: '💬 棋友交流',
      intro: 'AI 在 hard 难度下的真实水平如何？开局心得 · 残局技巧 ~',
      placeholder: '聊聊你的国际象棋心得 ~',
    });
    if (GamesShell.NickPrompt) {
      chNickPrompt = GamesShell.NickPrompt.mount({
        container: document.getElementById('ch-nick-mount'),
        prompt: '击败 AI！起个昵称上榜吧',
        onSubmit: nick => chSubmitWins(nick),
        onSkip: () => { if (chNickPrompt) chNickPrompt.hide(); },
      });
    }
    if (GamesShell.Settlement) {
      chSettleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('ch-settle-btn-mount'),
        gameId: 'chess',
        getOpts: chGetSettlementOpts,
        startDisabled: true,
      });
    }
  }

  // ── 48h 续局 ─────────────────────────────
  let chSave = null;
  function chSerialize() {
    if (state.over) return null;
    if (state.game.history().length === 0) return null;  // 还没走子，不存
    return {
      fen: state.game.fen(),
      mode: state.mode,
      difficulty: state.difficulty,
      lastMove: state.lastMove,
      runStartedAt: chRunStartedAt,
      runNonce: chRunNonce,
    };
  }
  function chRestore(saved) {
    state.mode = saved.mode || state.mode;
    state.difficulty = saved.difficulty || state.difficulty;
    state.game = new Chess();
    if (!state.game.load(saved.fen)) return false;  // 存档损坏
    state.selected = null;
    state.legalTargets = [];
    state.aiThinking = false;
    state.paused = false;
    state.over = false;
    state.lastMove = saved.lastMove || null;
    chRunStartedAt = Number(saved.runStartedAt) || Date.now();
    chRunNonce = saved.runNonce || ((window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now()));
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    chPgoOverlay.classList.remove('open');
    document.querySelectorAll('[data-mode]').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
    document.querySelectorAll('[data-difficulty]').forEach(t => t.classList.toggle('active', t.dataset.difficulty === state.difficulty));
    renderBoard();
    updateStatus();
    // 如果恢复后该 AI 走，主动触发
    if (!state.paused && aiSide() === state.game.turn()) {
      setTimeout(triggerAiMove, 320);
    }
    return true;
  }

  // ============ Pre-game Overlay ============
  const chPgoOverlay = document.getElementById('chPreGameOverlay');
  let chPgoSelectedMode = state.mode;
  let chPgoSelectedDiff = state.difficulty || 'normal';

  function chUpdatePgoUI() {
    document.querySelectorAll('#chPgoModePicker .gs-pgo-mode-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.value === chPgoSelectedMode);
    });
    const diffPicker = document.getElementById('chPgoDiffPicker');
    diffPicker.style.display = chPgoSelectedMode !== 'pvp' ? '' : 'none';
    document.querySelectorAll('#chPgoDiffPicker .gs-pgo-mode-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.value === chPgoSelectedDiff);
    });
  }

  document.getElementById('chPgoModePicker').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-mode-tab');
    if (!t) return;
    chPgoSelectedMode = t.dataset.value;
    chUpdatePgoUI();
  });
  document.getElementById('chPgoDiffPicker').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-mode-tab');
    if (!t) return;
    chPgoSelectedDiff = t.dataset.value;
    chUpdatePgoUI();
  });

  // ============ Room Client ============
  const BOARD_API = 'https://zircon-urge.fly.dev/api/board';
  let chRoomToken = null, chRoomPlayerId = null, chRoomCode = null, chRoomHost = false;
  let chRoomStatePoller = null, chIsOnline = false;
  const CH_MIN_PLAYERS = 2;

  function chRoomApi(method, action, body) {
    return fetch(`${BOARD_API}?action=${action}`, { method, headers: { 'Content-Type': 'application/json' }, signal: AbortSignal.timeout(12000), body: body ? JSON.stringify(body) : undefined }).then(r => r.json()).catch(e => ({ error: e.name === 'TimeoutError' ? 'timeout' : 'network' }));
  }
  function chGetNick() { return GamesShell.Identity.getNick() || ('玩家' + Math.floor(Math.random() * 9000 + 1000)); }

  document.getElementById('chPgoRoomTabs').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-room-tab');
    if (!t) return;
    const tab = t.dataset.tab;
    document.querySelectorAll('#chPgoRoomTabs .gs-pgo-room-tab').forEach(b => b.classList.toggle('selected', b.dataset.tab === tab));
    document.getElementById('chPgoLocalPanel').classList.toggle('active', tab === 'local');
    document.getElementById('chPgoOnlinePanel').classList.toggle('active', tab === 'online');
    document.getElementById('chPgoModePicker').style.display = tab === 'online' ? 'none' : '';
    document.getElementById('chPgoDiffPicker').style.display = tab === 'online' ? 'none' : (chPgoSelectedMode !== 'pvp' ? '' : 'none');
    document.getElementById('chPgoStartBtn').style.display = tab === 'online' ? 'none' : '';
    chIsOnline = tab === 'online';
  });

  function chShowError(msg) { document.getElementById('chPgoRoomError').textContent = msg || ''; }

  async function chRoomAction() {
    const code = (document.getElementById('chPgoRoomCodeInput').value || '').trim();
    const btn = document.getElementById('chPgoRoomActionBtn');
    chShowError('');
    btn.textContent = '连接中…'; btn.disabled = true;
    try {
      const nick = chGetNick(), did = GamesShell.Identity.getDeviceId();
      const ping = await chRoomApi('GET', 'ping');
      if (ping.error) { chShowError('无法连接到服务器，请确认网络后重试'); return; }
      if (/^\d{4}$/.test(code)) {
        const r = await chRoomApi('POST', 'join', { code, nick, deviceId: did });
        if (r.ok) { chEnterLobby(r); return; }
        if (r.reason === 'room_not_found') {
          const cr = await chRoomApi('POST', 'create', { gameId: 'chess', nick, deviceId: did, code });
          if (cr.ok) { chEnterLobby(cr); return; }
          const msgs = { code_taken: '该房号已被占用，换一个试试', timeout: '连接超时，请检查网络', network: '网络错误，请稍后再试' };
          chShowError(msgs[cr.reason] || msgs[cr.error] || '创建失败');
          return;
        }
        const msgs = { room_full: '房间已满，换一个房号试试', nick_taken_in_room: '昵称已被占用，换一个试试', room_in_progress: '游戏已开始，无法加入', timeout: '连接超时，请检查网络', network: '网络错误，请稍后再试' };
        chShowError(msgs[r.reason] || msgs[r.error] || '加入失败');
        return;
      }
      const r = await chRoomApi('POST', 'create', { gameId: 'chess', nick, deviceId: did });
      if (r.ok) { chEnterLobby(r); return; }
      chShowError('创建失败');
    } finally {
      btn.textContent = '创建 / 加入房间'; btn.disabled = false;
    }
  }

  function chEnterLobby(r) {
    chRoomToken = r.playerToken; chRoomPlayerId = r.playerId; chRoomCode = r.code;
    document.getElementById('chPgoRoomCodeInput').parentElement.style.display = 'none';
    document.getElementById('chPgoRoomLobby').style.display = '';
    document.getElementById('chPgoRoomCodeNum').textContent = r.code;
    if (window.GamesShell && GamesShell.QR) GamesShell.QR.render(document.getElementById('chPgoRoomQr'), location.origin + '/toolbox/chess/?room=' + r.code);
    chUpdateLobby(r.room); chStartPolling();
  }

  function gsEsc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function chUpdateLobby(room) {
    chRoomHost = room.youAreHost;
    const list = document.getElementById('chPgoRoomPlayers');
    list.innerHTML = (room.players || []).map((p, i) => {
      const isMe = p.id === chRoomPlayerId, isHost = p.isHost;
      let h = '<li>';
      if (chRoomHost && room.state === 'lobby' && !isMe) {
        if (i > 0) h += `<button class="ch-room-act up" data-act="up" data-id="${p.id}">▲</button>`;
        if (i < room.players.length - 1) h += `<button class="ch-room-act down" data-act="down" data-id="${p.id}">▼</button>`;
      }
      h += gsEsc(p.nick);
      if (isMe) h += ' (你)';
      if (isHost) h += ' <span class="gs-pgo-room-host-badge">房主</span>';
      if (chRoomHost && room.state === 'lobby' && !isMe) h += `<button class="ch-room-kick" data-act="kick" data-id="${p.id}">✕</button>`;
      h += '</li>';
      return h;
    }).join('');
    list.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const act = btn.dataset.act, pid = btn.dataset.id;
        if (act === 'kick') await chRoomApi('POST', 'kick', { code: chRoomCode, token: chRoomToken, targetPlayerId: pid });
        else if (act === 'up' || act === 'down') {
          const ids = room.players.map(p => p.id), idx = ids.indexOf(pid);
          if (act === 'up' && idx > 0) [ids[idx - 1], ids[idx]] = [ids[idx], ids[idx - 1]];
          else if (act === 'down' && idx < ids.length - 1) [ids[idx], ids[idx + 1]] = [ids[idx + 1], ids[idx]];
          await chRoomApi('POST', 'reorder', { code: chRoomCode, token: chRoomToken, playerIds: ids });
        }
      });
    });
    document.getElementById('chPgoRoomStartBtn').disabled = !(chRoomHost && room.players.length >= CH_MIN_PLAYERS);
    document.getElementById('chPgoRoomStartBtn').textContent = chRoomHost ? `开始游戏 (${room.players.length}/${CH_MIN_PLAYERS})` : '等待房主开始…';
  }

  async function chLeaveRoom() {
    if (chRoomStatePoller) { clearTimeout(chRoomStatePoller); chRoomStatePoller = null; }
    if (chRoomToken) await chRoomApi('POST', 'leave', { code: chRoomCode, token: chRoomToken });
    chRoomToken = null; chRoomPlayerId = null; chRoomCode = null; chRoomHost = false;
    document.getElementById('chPgoRoomCodeInput').parentElement.style.display = '';
    document.getElementById('chPgoRoomLobby').style.display = 'none';
    document.getElementById('chPgoRoomCodeInput').value = '';
  }

  function chStartPolling() {
    if (chRoomStatePoller) clearTimeout(chRoomStatePoller);
    let since = 0;
    async function poll() {
      if (!chRoomToken) return;
      const r = await chRoomApi('GET', `state&code=${chRoomCode}&token=${chRoomToken}&since=${since}`);
      if (!r.ok) { chRoomStatePoller = setTimeout(poll, 2000); return; }
      if (r.room) {
        since = r.version;
        if (r.room.state === 'playing') { chPgoOverlay.classList.remove('open'); state.mode = 'pvp'; persist(); newGame(); if (chSave) chSave.start(); return; }
        if (!r.room.players.some(p => p.id === chRoomPlayerId)) { chLeaveRoom(); chShowError('你已被房主移出房间'); return; }
        chUpdateLobby(r.room);
      }
      chRoomStatePoller = setTimeout(poll, 1500);
    }
    poll();
  }

  document.getElementById('chPgoRoomActionBtn').addEventListener('click', chRoomAction);
  document.getElementById('chPgoRoomLeaveBtn').addEventListener('click', chLeaveRoom);
  document.getElementById('chPgoRoomCopyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(`${location.origin}/toolbox/chess/?room=${chRoomCode}`).then(() => {
      const btn = document.getElementById('chPgoRoomCopyBtn'); btn.textContent = '✓ 已复制'; setTimeout(() => { btn.textContent = '🔗 复制链接'; }, 2000);
    }).catch(() => {});
  });
  document.getElementById('chPgoRoomCopyCodeBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(chRoomCode).then(() => {
      const btn = document.getElementById('chPgoRoomCopyCodeBtn'); btn.textContent = '✓ 已复制'; setTimeout(() => { btn.textContent = '📋 复制房号'; }, 2000);
    }).catch(() => {});
  });
  document.getElementById('chPgoRoomStartBtn').addEventListener('click', async () => {
    const r = await chRoomApi('POST', 'start', { code: chRoomCode, token: chRoomToken });
    if (r.ok) { chPgoOverlay.classList.remove('open'); state.mode = 'pvp'; persist(); newGame(); if (chSave) chSave.start(); }
  });

  (function chAutoJoin() {
    const code = new URLSearchParams(location.search).get('room');
    if (code && /^\d{4}$/.test(code)) {
      document.getElementById('chPgoRoomCodeInput').value = code;
      setTimeout(() => {
        document.querySelector('#chPgoRoomTabs .gs-pgo-room-tab[data-tab="online"]')?.click();
        setTimeout(chRoomAction, 800);
      }, 500);
    }
  })();

  document.getElementById('chPgoStartBtn').addEventListener('click', () => {
    if (chIsOnline) return;
    state.mode = chPgoSelectedMode; state.difficulty = chPgoSelectedDiff; persist();
    document.querySelectorAll('[data-mode]').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
    document.querySelectorAll('[data-difficulty]').forEach(t => t.classList.toggle('active', t.dataset.difficulty === state.difficulty));
    difficultyRow.hidden = (state.mode === 'pvp');
    if (chSave) chSave.discard(); newGame(); if (chSave) chSave.start();
  });

  // Render a preview frame before game starts
  renderBoard();
  updateStatus();

  chInitShell();

  if (window.GamesShell && GamesShell.SaveState) {
    chSave = GamesShell.SaveState.create({
      key: 'tool.chess.savestate.v1',
      ttlMs: 48 * 3600 * 1000,
      serialize: chSerialize,
    });
    const peek = chSave.peek();
    if (peek && peek.data && peek.data.fen) {
      const tmpGame = new Chess();
      const validFen = tmpGame.load(peek.data.fen);
      if (validFen) {
        chUpdatePgoUI();
        chPgoOverlay.classList.add('open');
      } else {
        chSave.discard();
        chUpdatePgoUI();
        chPgoOverlay.classList.add('open');
      }
    } else {
      chUpdatePgoUI();
      chPgoOverlay.classList.add('open');
    }
  } else {
    chUpdatePgoUI();
    chPgoOverlay.classList.add('open');
  }
})();
</script>
