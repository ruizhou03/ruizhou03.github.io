<script>
(() => {
  const STORE_KEY = 'tool.gomoku.v1';
  const N = 15;
  const EMPTY = 0, BLACK = 1, WHITE = 2;

  const DIFFICULTY = {
    easy:   { defenseWeight: 0.30, windowRadius: 1, scoreNoise: 0.20, topK: 5,  lookahead: 0, delayMs: 200 },
    normal: { defenseWeight: 0.85, windowRadius: 2, scoreNoise: 0,    topK: 1,  lookahead: 0, delayMs: 280 },
    hard:   { defenseWeight: 1.10, windowRadius: 2, scoreNoise: 0,    topK: 12, lookahead: 2, delayMs: 500 }
  };

  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  const state = {
    mode: stored.lastMode || 'pvp',
    difficulty: DIFFICULTY[stored.difficulty] ? stored.difficulty : 'normal',
    tally: Object.assign({ black: 0, white: 0 }, stored.tally || {}),
    board: [],
    history: [],
    turn: BLACK,
    over: false,
    winLine: null,
    aiThinking: false,
    paused: false
  };

  const canvas = document.getElementById('gmCanvas');
  const ctx = canvas.getContext('2d');
  const turnEl = document.getElementById('gmTurn');
  const tallyB = document.getElementById('gmTallyB');
  const tallyW = document.getElementById('gmTallyW');
  const undoBtn = document.getElementById('gmUndoBtn');
  const newBtn = document.getElementById('gmNewBtn');
  const pauseBtn = document.getElementById('gmPauseBtn');
  const overlay = document.getElementById('gmOverlay');
  const ovTitle = document.getElementById('gmOvTitle');
  const ovBtn = document.getElementById('gmOvBtn');
  const pausedOverlay = document.getElementById('gmPausedOverlay');
  const resumeBtn = document.getElementById('gmResumeBtn');
  const difficultyRow = document.getElementById('gmDifficultyRow');
  const difficultyTabs = document.getElementById('gmDifficultyTabs');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      tally: state.tally,
      lastMode: state.mode,
      difficulty: state.difficulty
    }));
  }

  function newGame() {
    if (typeof gmSave !== 'undefined' && gmSave) gmSave.discard();
    state.board = Array.from({ length: N }, () => Array(N).fill(EMPTY));
    state.history = [];
    state.turn = BLACK;
    state.over = false;
    state.winLine = null;
    state.paused = false;
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    gmPgoOverlay.classList.remove('open');
    updateStatus();
    draw();
    gmRunStartedAt = Date.now();
    gmRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
    gmLastResult = null;
    if (typeof gmSettleBtn !== 'undefined' && gmSettleBtn) gmSettleBtn.setEnabled(false);
    if (state.mode === 'ai-white' && state.turn === BLACK) {
      // AI plays black first
      setTimeout(aiMove, 300);
    }
  }

  function aiSide() {
    if (state.mode === 'ai-black') return WHITE;
    if (state.mode === 'ai-white') return BLACK;
    return null;
  }
  function humanSide() {
    if (state.mode === 'ai-black') return BLACK;
    if (state.mode === 'ai-white') return WHITE;
    return null;
  }

  function updateStatus() {
    if (state.paused) {
      turnEl.textContent = '⏸ 已暂停';
    } else if (state.over) {
      turnEl.textContent = state.winLine
        ? (state.winLine.who === BLACK ? '⚫ 黑方胜' : '⚪ 白方胜')
        : '— 平局 —';
    } else if (state.aiThinking) {
      turnEl.textContent = '🤖 AI 思考中…';
    } else {
      let label = state.turn === BLACK ? '⚫ 黑方下子' : '⚪ 白方下子';
      if (gmIsOnline && gmMyColor !== null) {
        label += (state.turn === gmMyColor ? '（你的回合）' : '（等对手）');
      }
      turnEl.textContent = label;
    }
    tallyB.textContent = state.tally.black;
    tallyW.textContent = state.tally.white;
    undoBtn.disabled = state.history.length === 0 || state.aiThinking || state.paused;

    document.querySelectorAll('#gmModeTabs .gm-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === state.mode);
    });
    document.querySelectorAll('#gmDifficultyTabs .gm-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.difficulty);
    });

    const isAi = aiSide() !== null;
    difficultyRow.hidden = !isAi;
    pauseBtn.hidden = !isAi;
    pauseBtn.textContent = state.paused ? '▶ 继续' : '⏸ 暂停';
    pauseBtn.disabled = state.over;
    pausedOverlay.classList.toggle('show', state.paused && !state.over);
  }

  function draw() {
    const W = canvas.clientWidth;
    if (canvas.width !== W) { canvas.width = W; canvas.height = W; }
    const cs = canvas.width / N;
    const off = cs / 2;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = '#5a4530';
    ctx.lineWidth = 1;
    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.moveTo(off + i * cs, off);
      ctx.lineTo(off + i * cs, off + (N - 1) * cs);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(off, off + i * cs);
      ctx.lineTo(off + (N - 1) * cs, off + i * cs);
      ctx.stroke();
    }
    // Star points
    [[3,3],[3,11],[11,3],[11,11],[7,7]].forEach(([r,c]) => {
      ctx.fillStyle = '#5a4530';
      ctx.beginPath();
      ctx.arc(off + c * cs, off + r * cs, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // Stones
    const stoneR = cs * 0.42;
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const v = state.board[r][c];
        if (v === EMPTY) continue;
        const x = off + c * cs, y = off + r * cs;
        const grad = ctx.createRadialGradient(x - stoneR / 3, y - stoneR / 3, stoneR / 6, x, y, stoneR);
        if (v === BLACK) {
          grad.addColorStop(0, '#666');
          grad.addColorStop(1, '#000');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#c8c8c8');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, stoneR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Last-move marker
    if (state.history.length > 0) {
      const last = state.history[state.history.length - 1];
      const x = off + last.c * cs, y = off + last.r * cs;
      ctx.strokeStyle = '#b07c75';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, stoneR * 0.35, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Win line highlight
    if (state.winLine) {
      ctx.strokeStyle = '#b07c75';
      ctx.lineWidth = 3;
      const a = state.winLine.cells[0];
      const b = state.winLine.cells[4];
      ctx.beginPath();
      ctx.moveTo(off + a.c * cs, off + a.r * cs);
      ctx.lineTo(off + b.c * cs, off + b.r * cs);
      ctx.stroke();
    }
  }

  function place(r, c, who, opts) {
    opts = opts || {};
    state.board[r][c] = who;
    state.history.push({ r, c, who });

    // Online relay: broadcast local move BEFORE end-of-game flag flips (incl. winning move).
    if (gmIsOnline && gmRoomToken && !opts.fromRemote && !gmRoomGameOver) {
      gmRoomApi('POST', 'move', { code: gmRoomCode, token: gmRoomToken, move: { r, c, who } }).then(resp => {
        if (resp && resp.ok) {
          gmMovesApplied++;
        } else if (resp && resp.reason === 'not_your_turn') {
          // Out of sync — rollback the local placement
          state.board[r][c] = EMPTY;
          state.history.pop();
          state.turn = who;
          state.over = false;
          state.winLine = null;
          overlay.classList.remove('show');
          draw();
          updateStatus();
        }
      });
    }

    const win = checkWin(r, c, who);
    if (win) {
      state.over = true;
      state.winLine = { cells: win, who };
      if (who === BLACK) state.tally.black++; else state.tally.white++;
      persist();
      ovTitle.textContent = (who === BLACK ? '⚫ 黑方胜' : '⚪ 白方胜');
      overlay.classList.add('show');
      // 仅当 AI 模式下"人类方"获胜，才上传战绩榜
      const human = humanSide();
      if (human != null && who === human) gmTryAutoSubmit();
      if (typeof gmSave !== 'undefined' && gmSave) gmSave.discard();
      // 结算图：仅 AI 模式
      if (state.mode && state.mode.startsWith('ai-') && human != null) {
        gmLastResult = (who === human) ? 'win' : 'lose';
        if (gmSettleBtn) gmSettleBtn.setEnabled(true);
      }
      gmRoomGameOver = true;
    } else if (state.history.length === N * N) {
      state.over = true;
      ovTitle.textContent = '— 平局 —';
      overlay.classList.add('show');
      if (typeof gmSave !== 'undefined' && gmSave) gmSave.discard();
      if (state.mode && state.mode.startsWith('ai-')) {
        gmLastResult = 'draw';
        if (gmSettleBtn) gmSettleBtn.setEnabled(true);
      }
      gmRoomGameOver = true;
    } else {
      state.turn = who === BLACK ? WHITE : BLACK;
    }
    draw();
    updateStatus();
  }

  function checkWin(r, c, who) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      const cells = [{ r, c }];
      for (let k = 1; k < 5; k++) {
        const nr = r + dr * k, nc = c + dc * k;
        if (nr<0||nr>=N||nc<0||nc>=N||state.board[nr][nc]!==who) break;
        cells.push({ r: nr, c: nc });
      }
      for (let k = 1; k < 5; k++) {
        const nr = r - dr * k, nc = c - dc * k;
        if (nr<0||nr>=N||nc<0||nc>=N||state.board[nr][nc]!==who) break;
        cells.unshift({ r: nr, c: nc });
      }
      if (cells.length >= 5) return cells.slice(0, 5);
    }
    return null;
  }

  // ============ AI ============
  // Heuristic evaluation: scan each line for patterns
  // Patterns scored: live 4 / live 3 / sleep 4 / sleep 3 / live 2 / sleep 2
  function evaluatePoint(r, c, who, defenseWeight) {
    const opp = who === BLACK ? WHITE : BLACK;
    let score = 0;
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      // Build a line of 9 centered at (r,c)
      const line = [];
      for (let k = -4; k <= 4; k++) {
        const nr = r + dr * k, nc = c + dc * k;
        if (nr < 0 || nr >= N || nc < 0 || nc >= N) line.push(-1);
        else line.push(state.board[nr][nc]);
      }
      line[4] = who; // hypothetical move
      score += scoreLineFor(line, who);
      line[4] = opp;
      score += scoreLineFor(line, opp) * defenseWeight;
    }
    return score;
  }

  function scoreLineFor(line, who) {
    // Scan windows of 6 (or 5) and score
    let s = 0;
    const opp = who === BLACK ? WHITE : BLACK;
    const str = line.map(x => x === who ? 'X' : x === opp ? 'O' : x === -1 ? 'B' : '.').join('');
    const patterns = [
      ['XXXXX', 100000],
      ['.XXXX.', 10000],
      ['.XXXX', 1000], ['XXXX.', 1000],
      ['XX.XX', 1000], ['X.XXX', 1000], ['XXX.X', 1000],
      ['.XXX.', 800],
      ['.XXX', 100], ['XXX.', 100],
      ['XX.X', 100], ['X.XX', 100],
      ['.XX.', 50],
      ['.X.X.', 30],
      ['.X.', 5]
    ];
    for (const [p, v] of patterns) {
      let i = str.indexOf(p);
      while (i !== -1) {
        s += v;
        i = str.indexOf(p, i + 1);
      }
    }
    return s;
  }

  function getCandidates(radius) {
    if (state.history.length === 0) return [{ r: 7, c: 7 }];
    const out = [];
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        if (state.board[r][c] !== EMPTY) continue;
        let near = false;
        for (let dr = -radius; dr <= radius && !near; dr++)
          for (let dc = -radius; dc <= radius && !near; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr>=0 && nr<N && nc>=0 && nc<N && state.board[nr][nc] !== EMPTY) near = true;
          }
        if (near) out.push({ r, c });
      }
    }
    return out;
  }

  function pickAiMove(ai) {
    const cfg = DIFFICULTY[state.difficulty];
    const opp = ai === BLACK ? WHITE : BLACK;
    const cands = getCandidates(cfg.windowRadius);
    if (cands.length === 0) return { r: 7, c: 7 };

    // Single-ply scoring (with optional noise)
    const scored = cands.map(({ r, c }) => {
      let s = evaluatePoint(r, c, ai, cfg.defenseWeight);
      if (cfg.scoreNoise > 0) s *= (1 + (Math.random() - 0.5) * cfg.scoreNoise * 2);
      return { r, c, s };
    });
    scored.sort((a, b) => b.s - a.s);

    // Easy: weighted random pick from top-K
    if (cfg.lookahead === 0 && cfg.topK > 1) {
      const top = scored.slice(0, Math.min(cfg.topK, scored.length));
      const minS = Math.min(...top.map(x => x.s));
      const weights = top.map(x => Math.max(1, x.s - minS + 50));
      const sum = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * sum;
      for (let i = 0; i < top.length; i++) {
        r -= weights[i];
        if (r <= 0) return { r: top[i].r, c: top[i].c };
      }
      return { r: top[0].r, c: top[0].c };
    }

    // Normal: greedy top-1
    if (cfg.lookahead === 0) return { r: scored[0].r, c: scored[0].c };

    // Hard: 2-ply minimax — for each top candidate, simulate, find opp's best response
    const top = scored.slice(0, Math.min(cfg.topK, scored.length));
    let best = top[0], bestVal = -Infinity;
    for (const cand of top) {
      state.board[cand.r][cand.c] = ai;
      let val;
      if (checkWin(cand.r, cand.c, ai)) {
        val = 1e9;
      } else {
        const oppCands = getCandidates(cfg.windowRadius);
        let oppBest = 0, oppWins = false;
        for (const oc of oppCands) {
          state.board[oc.r][oc.c] = opp;
          if (checkWin(oc.r, oc.c, opp)) { oppWins = true; state.board[oc.r][oc.c] = EMPTY; break; }
          state.board[oc.r][oc.c] = EMPTY;
          const os = evaluatePoint(oc.r, oc.c, opp, cfg.defenseWeight);
          if (os > oppBest) oppBest = os;
        }
        val = oppWins ? -1e8 : (cand.s - oppBest * cfg.defenseWeight);
      }
      state.board[cand.r][cand.c] = EMPTY;
      if (val > bestVal) { bestVal = val; best = cand; }
    }
    return { r: best.r, c: best.c };
  }

  function aiMove() {
    if (state.over || state.paused) return;
    const ai = aiSide();
    if (ai !== state.turn) return;
    state.aiThinking = true;
    updateStatus();

    const cfg = DIFFICULTY[state.difficulty];
    // Defer compute via setTimeout so UI repaints "thinking" state first
    setTimeout(() => {
      const move = pickAiMove(ai);
      setTimeout(() => {
        state.aiThinking = false;
        if (state.paused) { updateStatus(); return; }
        place(move.r, move.c, ai);
      }, Math.max(0, cfg.delayMs - 50));
    }, 50);
  }

    const rect = canvas.getBoundingClientRect();

    const off = cs / 2;
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    const c = Math.round((x - off) / cs);
    const r = Math.round((y - off) / cs);
    if (r < 0 || r >= N || c < 0 || c >= N) return;
    if (state.board[r][c] !== EMPTY) return;

  function gmPaintBoard(ctx, x, y, w, h) {
    const side = Math.min(w, h);
    const margin = side * 0.04;
    const inner = side - margin * 2;
    const cs = inner / (N - 1);
    const ox = x + (w - side) / 2 + margin;
    const oy = y + (h - side) / 2 + margin;
    // 棋盘底色（木色）
    ctx.fillStyle = '#e6c98a';
    ctx.fillRect(x + (w - side) / 2, y + (h - side) / 2, side, side);
    // 网格线
    ctx.strokeStyle = '#5a4520';
    ctx.lineWidth = Math.max(1, cs * 0.05);
    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.moveTo(ox, oy + i * cs);
      ctx.lineTo(ox + (N - 1) * cs, oy + i * cs);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ox + i * cs, oy);
      ctx.lineTo(ox + i * cs, oy + (N - 1) * cs);
      ctx.stroke();
    }
    // 五个星位（标准 15×15）
    const stars = [[3,3],[3,11],[11,3],[11,11],[7,7]];
    ctx.fillStyle = '#5a4520';
    for (const [r, c] of stars) {
      ctx.beginPath();
      ctx.arc(ox + c * cs, oy + r * cs, Math.max(2, cs * 0.12), 0, Math.PI * 2);
      ctx.fill();
    }
    // 棋子
    const radius = cs * 0.42;
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const v = state.board[r][c];
        if (v === EMPTY) continue;
        const cx = ox + c * cs, cy = oy + r * cs;
        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.beginPath();
        ctx.arc(cx + 1, cy + 2, radius, 0, Math.PI * 2);
        ctx.fill();
        // 主体
        const grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, cx, cy, radius);
        if (v === BLACK) {
          grad.addColorStop(0, '#5a5a5a'); grad.addColorStop(1, '#0a0a0a');
        } else {
          grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#cfcfcf');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // 最后一手标记（红圈）
    if (state.history.length) {
      const last = state.history[state.history.length - 1];
      ctx.strokeStyle = '#b07c75';
      ctx.lineWidth = Math.max(2, cs * 0.08);
      ctx.beginPath();
      ctx.arc(ox + last.c * cs, oy + last.r * cs, radius * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }
    // 五连高亮
    if (state.winLine && state.winLine.cells && state.winLine.cells.length === 5) {
      const a = state.winLine.cells[0];
      const b = state.winLine.cells[4];
      ctx.strokeStyle = 'rgba(231, 76, 60, 0.85)';
      ctx.lineWidth = Math.max(3, cs * 0.12);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ox + a.c * cs, oy + a.r * cs);
      ctx.lineTo(ox + b.c * cs, oy + b.r * cs);
      ctx.stroke();
    }
  }

  function gmRoomApi(method, action, body) {
    const url = `${BOARD_API}?action=${action}`;
    const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: AbortSignal.timeout(12000) };
    if (body) opts.body = JSON.stringify(body);
    return fetch(url, opts).then(r => r.json()).catch(e => ({ error: e.name === 'TimeoutError' ? 'timeout' : 'network' }));
  }

  async function gmRoomAction() {
    const codeEl = document.getElementById('gmPgoRoomCodeInput');
    const code = (codeEl.value || '').trim();
    const btn = document.getElementById('gmPgoRoomActionBtn');
    gmShowError('');
    btn.textContent = '连接中…';
    btn.disabled = true;

    try {
      const nick = gmGetNick(), did = gmGetDid();

      // Quick connectivity check first (3s timeout)
      const ping = await gmRoomApi('GET', 'ping');
      if (ping.error) {
        gmShowError('无法连接到服务器，请确认网络后重试');
        return;
      }

      if (/^\d{4}$/.test(code)) {
        const r = await gmRoomApi('POST', 'join', { code, nick, deviceId: did });
        if (r.ok) { gmEnterLobby(r); return; }
        if (r.reason === 'room_not_found') {
          const cr = await gmRoomApi('POST', 'create', { gameId: 'gomoku', nick, deviceId: did, code });
          if (cr.ok) { gmEnterLobby(cr); return; }
          const msgs = { code_taken: '该房号已被占用，换一个试试', timeout: '连接超时，请检查网络', network: '网络错误，请稍后再试' };
          gmShowError(msgs[cr.reason] || msgs[cr.error] || '创建失败');
          return;
        }
        const msgs = { room_full: '房间已满，换一个房号试试', nick_taken_in_room: '昵称已被占用，换一个试试', room_in_progress: '游戏已开始，无法加入', timeout: '连接超时，请检查网络', network: '网络错误，请稍后再试' };
        gmShowError(msgs[r.reason] || msgs[r.error] || '加入失败');
        return;
      }

      const r = await gmRoomApi('POST', 'create', { gameId: 'gomoku', nick, deviceId: did });
      if (r.ok) { gmEnterLobby(r); return; }
      gmShowError('创建失败，稍后再试');
    } finally {
      btn.textContent = '创建 / 加入房间';
      btn.disabled = false;
    }
  }

  function gmEnterLobby(r) {
    gmRoomToken = r.playerToken; gmRoomPlayerId = r.playerId; gmRoomCode = r.code;

    document.getElementById('gmPgoRoomLobby').style.display = '';

  function gsEsc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function gmUpdateLobby(room) {
    gmRoomHost = room.youAreHost;
    const list = document.getElementById('gmPgoRoomPlayers');
    list.innerHTML = (room.players || []).map((p, i) => {
      const isMe = p.id === gmRoomPlayerId, isHost = p.isHost;
      let h = '<li>';
      if (gmRoomHost && room.state === 'lobby' && !isMe) {
        if (i > 0) h += `<button class="gm-room-act up" data-act="up" data-id="${p.id}">▲</button>`;
        if (i < room.players.length - 1) h += `<button class="gm-room-act down" data-act="down" data-id="${p.id}">▼</button>`;
      }
      h += gsEsc(p.nick);
      if (isMe) h += ' (你)';
      if (isHost) h += ' <span class="gs-pgo-room-host-badge">房主</span>';
      if (gmRoomHost && room.state === 'lobby' && !isMe) {
        h += `<button class="gm-room-kick" data-act="kick" data-id="${p.id}" title="踢出">✕</button>`;
      }
      h += '</li>';
      return h;
    }).join('');

    // Wire reorder/kick clicks
    list.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const act = btn.dataset.act, pid = btn.dataset.id;
        if (act === 'kick') await gmRoomApi('POST', 'kick', { code: gmRoomCode, token: gmRoomToken, targetPlayerId: pid });
        else if (act === 'up' || act === 'down') {
          const ids = room.players.map(p => p.id);
          const idx = ids.indexOf(pid);
          if (act === 'up' && idx > 0) { [ids[idx - 1], ids[idx]] = [ids[idx], ids[idx - 1]]; }
          else if (act === 'down' && idx < ids.length - 1) { [ids[idx], ids[idx + 1]] = [ids[idx + 1], ids[idx]]; }
          await gmRoomApi('POST', 'reorder', { code: gmRoomCode, token: gmRoomToken, playerIds: ids });
        }
      });
    });

    const startBtn = document.getElementById('gmPgoRoomStartBtn');
    startBtn.disabled = !(gmRoomHost && room.players.length >= GM_MIN_PLAYERS);
    startBtn.textContent = gmRoomHost ? `开始游戏 (${room.players.length}/${GM_MIN_PLAYERS})` : '等待房主开始…';
  }

  async function gmLeaveRoom() {
    if (gmRoomStatePoller) { clearTimeout(gmRoomStatePoller); gmRoomStatePoller = null; }
    if (gmRoomToken) {
      await gmRoomApi('POST', 'leave', { code: gmRoomCode, token: gmRoomToken });
    }
    gmRoomToken = null; gmRoomPlayerId = null; gmRoomCode = null; gmRoomHost = false;
    gmMyColor = null; gmMovesApplied = 0; gmRoomGameOver = false;
    if (undoBtn) undoBtn.style.display = '';
    document.getElementById('gmPgoRoomCodeInput').parentElement.style.display = '';
    document.getElementById('gmPgoRoomLobby').style.display = 'none';
    document.getElementById('gmPgoRoomPlayers').innerHTML = '';
    document.getElementById('gmPgoRoomCodeInput').value = '';
  }

  function gmStartPolling() {
    if (gmRoomStatePoller) clearTimeout(gmRoomStatePoller);
    let since = 0;
    let gameStarted = false;
    async function poll() {
      if (!gmRoomToken) return;
      const r = await gmRoomApi('GET', `state&code=${gmRoomCode}&token=${gmRoomToken}&since=${since}`);
      if (!r.ok) { gmRoomStatePoller = setTimeout(poll, 2000); return; }
      if (r.room) {
        since = r.version;
        if (r.room.state === 'playing') {
          if (!gameStarted) {
            // First seat assignment: 'first' = BLACK (五子棋黑方先手), 'second' = WHITE
            const me = (r.room.players || []).find(p => p.id === gmRoomPlayerId);
            gmMyColor = (me && me.seat === 'first') ? BLACK : WHITE;
            gmPgoOverlay.classList.remove('open');
            state.mode = 'pvp'; persist();
            newGame();
            gmMovesApplied = 0;
            gmRoomGameOver = false;
            // Hide undo button — online PvP can't undo
            if (undoBtn) undoBtn.style.display = 'none';
            if (gmSave) gmSave.start();
            updateStatus();
            gameStarted = true;
          }
          // Replay any new opponent moves
          const moves = r.room.moves || [];
          for (let i = gmMovesApplied; i < moves.length; i++) {
            const entry = moves[i];
            if (entry.playerId === gmRoomPlayerId && i < gmMovesApplied) continue;
            try {
              const m = entry.move;
              if (m && typeof m.r === 'number' && typeof m.c === 'number' && state.board[m.r][m.c] === EMPTY) {
                place(m.r, m.c, m.who, { fromRemote: true });
              }
            } catch (e) { /* don't crash poll loop */ }
          }
          gmMovesApplied = moves.length;
          gmRoomStatePoller = setTimeout(poll, 400);
          return;
        }
        // Check if current player was removed
        if (!r.room.players.some(p => p.id === gmRoomPlayerId)) {
          gmLeaveRoom(); gmShowError('你已被房主移出房间');
          return;
        }
        gmUpdateLobby(r.room);
      }
      gmRoomStatePoller = setTimeout(poll, 1500);
    }
    poll();
  }

  // Wire buttons
  document.getElementById('gmPgoRoomActionBtn').addEventListener('click', gmRoomAction);
  document.getElementById('gmPgoRoomLeaveBtn').addEventListener('click', gmLeaveRoom);
  document.getElementById('gmPgoRoomCopyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(`${location.origin}/toolbox/gomoku/?room=${gmRoomCode}`).then(() => {
      const btn = document.getElementById('gmPgoRoomCopyBtn'); btn.textContent = '✓ 已复制'; setTimeout(() => { btn.textContent = '🔗 复制链接'; }, 2000);
    }).catch(() => {});
  });
  document.getElementById('gmPgoRoomCopyCodeBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(gmRoomCode).then(() => {
      const btn = document.getElementById('gmPgoRoomCopyCodeBtn'); btn.textContent = '✓ 已复制'; setTimeout(() => { btn.textContent = '📋 复制房号'; }, 2000);
    }).catch(() => {});
  });
  document.getElementById('gmPgoRoomStartBtn').addEventListener('click', async () => {
    // Don't init game here — let gmStartPolling pick up 'playing' state so host/guest take the same code path
    await gmRoomApi('POST', 'start', { code: gmRoomCode, token: gmRoomToken });
  });

  // URL room param → auto-join
  (function gmAutoJoin() {
    const code = new URLSearchParams(location.search).get('room');
    if (code && /^\d{4}$/.test(code)) {
      document.getElementById('gmPgoRoomCodeInput').value = code;
      setTimeout(() => {
        document.querySelector('#gmPgoRoomTabs .gs-pgo-room-tab[data-tab="online"]')?.click();
        setTimeout(gmRoomAction, 800);
      }, 500);
    }
  })();

  document.getElementById('gmPgoStartBtn').addEventListener('click', () => {
    if (gmIsOnline) return;
    state.mode = gmPgoSelectedMode;
    state.difficulty = gmPgoSelectedDiff;
    persist();
    document.querySelectorAll('[data-mode]').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
    document.querySelectorAll('[data-difficulty]').forEach(t => t.classList.toggle('active', t.dataset.difficulty === state.difficulty));
    difficultyRow.hidden = (state.mode === 'pvp');
    if (gmSave) gmSave.discard();
    newGame();
    if (gmSave) gmSave.start();
  });

  // Render a preview frame
  draw();

  gmInitShell();

  if (window.GamesShell && GamesShell.SaveState) {
    gmSave = GamesShell.SaveState.create({
      key: 'tool.gomoku.savestate.v1',
      ttlMs: 48 * 3600 * 1000,
      serialize: gmSerialize,
    });
    const peek = gmSave.peek();
    if (peek && peek.data && Array.isArray(peek.data.board)) {
      gmPgoOverlay.classList.add('open');
      // Show resume view injected into main view
      gmUpdatePgoUI();
    } else {
      gmUpdatePgoUI();
      gmPgoOverlay.classList.add('open');
    }
  } else {
    gmUpdatePgoUI();
    gmPgoOverlay.classList.add('open');
  }
})();
</script>
