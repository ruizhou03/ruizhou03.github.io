<script>
(() => {
  const STORE_KEY = 'tool.gomoku.v1';
  const N = 15;
  const EMPTY = 0, BLACK = 1, WHITE = 2;

  const DIFFICULTY = {
    easy:   { defenseWeight: 0.30, windowRadius: 1, scoreNoise: 0.20, topK: 5,  lookahead: 0, delayMs: 200 },
    normal: { defenseWeight: 0.85, windowRadius: 2, scoreNoise: 0,    topK: 1,  lookahead: 0, delayMs: 280 },
    hard:   { defenseWeight: 1.10, windowRadius: 2, scoreNoise: 0,    topK: 12, lookahead: 2, delayMs: 500 }
  };

  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  const state = {
    mode: stored.lastMode || 'pvp',
    difficulty: DIFFICULTY[stored.difficulty] ? stored.difficulty : 'normal',
    tally: Object.assign({ black: 0, white: 0 }, stored.tally || {}),
    board: [],
    history: [],
    turn: BLACK,
    over: false,
    winLine: null,
    aiThinking: false,
    paused: false
  };

  const canvas = document.getElementById('gmCanvas');
  const ctx = canvas.getContext('2d');
  const turnEl = document.getElementById('gmTurn');
  const tallyB = document.getElementById('gmTallyB');
  const tallyW = document.getElementById('gmTallyW');
  const undoBtn = document.getElementById('gmUndoBtn');
  const newBtn = document.getElementById('gmNewBtn');
  const pauseBtn = document.getElementById('gmPauseBtn');
  const overlay = document.getElementById('gmOverlay');
  const ovTitle = document.getElementById('gmOvTitle');
  const ovBtn = document.getElementById('gmOvBtn');
  const pausedOverlay = document.getElementById('gmPausedOverlay');
  const resumeBtn = document.getElementById('gmResumeBtn');
  const difficultyRow = document.getElementById('gmDifficultyRow');
  const difficultyTabs = document.getElementById('gmDifficultyTabs');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      tally: state.tally,
      lastMode: state.mode,
      difficulty: state.difficulty
    }));
  }

  function newGame() {
    if (typeof gmSave !== 'undefined' && gmSave) gmSave.discard();
    state.board = Array.from({ length: N }, () => Array(N).fill(EMPTY));
    state.history = [];
    state.turn = BLACK;
    state.over = false;
    state.winLine = null;
    state.paused = false;
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    updateStatus();
    draw();
    gmRunStartedAt = Date.now();
    gmRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
    gmLastResult = null;
    if (typeof gmSettleBtn !== 'undefined' && gmSettleBtn) gmSettleBtn.setEnabled(false);
    if (state.mode === 'ai-white' && state.turn === BLACK) {
      // AI plays black first
      setTimeout(aiMove, 300);
    }
  }

  function aiSide() {
    if (state.mode === 'ai-black') return WHITE;
    if (state.mode === 'ai-white') return BLACK;
    return null;
  }
  function humanSide() {
    if (state.mode === 'ai-black') return BLACK;
    if (state.mode === 'ai-white') return WHITE;
    return null;
  }

  function updateStatus() {
    if (state.paused) {
      turnEl.textContent = '⏸ 已暂停';
    } else if (state.over) {
      turnEl.textContent = state.winLine
        ? (state.winLine.who === BLACK ? '⚫ 黑方胜' : '⚪ 白方胜')
        : '— 平局 —';
    } else if (state.aiThinking) {
      turnEl.textContent = '🤖 AI 思考中…';
    } else {
      turnEl.textContent = state.turn === BLACK ? '⚫ 黑方下子' : '⚪ 白方下子';
    }
    tallyB.textContent = state.tally.black;
    tallyW.textContent = state.tally.white;
    undoBtn.disabled = state.history.length === 0 || state.aiThinking || state.paused;

    document.querySelectorAll('#gmModeTabs .gm-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === state.mode);
    });
    document.querySelectorAll('#gmDifficultyTabs .gm-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.difficulty);
    });

    const isAi = aiSide() !== null;
    difficultyRow.hidden = !isAi;
    pauseBtn.hidden = !isAi;
    pauseBtn.textContent = state.paused ? '▶ 继续' : '⏸ 暂停';
    pauseBtn.disabled = state.over;
    pausedOverlay.classList.toggle('show', state.paused && !state.over);
  }

  function draw() {
    const W = canvas.clientWidth;
    if (canvas.width !== W) { canvas.width = W; canvas.height = W; }
    const cs = canvas.width / N;
    const off = cs / 2;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = '#5a4530';
    ctx.lineWidth = 1;
    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.moveTo(off + i * cs, off);
      ctx.lineTo(off + i * cs, off + (N - 1) * cs);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(off, off + i * cs);
      ctx.lineTo(off + (N - 1) * cs, off + i * cs);
      ctx.stroke();
    }
    // Star points
    [[3,3],[3,11],[11,3],[11,11],[7,7]].forEach(([r,c]) => {
      ctx.fillStyle = '#5a4530';
      ctx.beginPath();
      ctx.arc(off + c * cs, off + r * cs, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // Stones
    const stoneR = cs * 0.42;
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const v = state.board[r][c];
        if (v === EMPTY) continue;
        const x = off + c * cs, y = off + r * cs;
        const grad = ctx.createRadialGradient(x - stoneR / 3, y - stoneR / 3, stoneR / 6, x, y, stoneR);
        if (v === BLACK) {
          grad.addColorStop(0, '#666');
          grad.addColorStop(1, '#000');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#c8c8c8');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, stoneR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Last-move marker
    if (state.history.length > 0) {
      const last = state.history[state.history.length - 1];
      const x = off + last.c * cs, y = off + last.r * cs;
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, stoneR * 0.35, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Win line highlight
    if (state.winLine) {
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 3;
      const a = state.winLine.cells[0];
      const b = state.winLine.cells[4];
      ctx.beginPath();
      ctx.moveTo(off + a.c * cs, off + a.r * cs);
      ctx.lineTo(off + b.c * cs, off + b.r * cs);
      ctx.stroke();
    }
  }

  function place(r, c, who) {
    state.board[r][c] = who;
    state.history.push({ r, c, who });
    const win = checkWin(r, c, who);
    if (win) {
      state.over = true;
      state.winLine = { cells: win, who };
      if (who === BLACK) state.tally.black++; else state.tally.white++;
      persist();
      ovTitle.textContent = (who === BLACK ? '⚫ 黑方胜' : '⚪ 白方胜');
      overlay.classList.add('show');
      // 仅当 AI 模式下"人类方"获胜，才上传战绩榜
      const human = humanSide();
      if (human != null && who === human) gmTryAutoSubmit();
      if (typeof gmSave !== 'undefined' && gmSave) gmSave.discard();
      // 结算图：仅 AI 模式
      if (state.mode && state.mode.startsWith('ai-') && human != null) {
        gmLastResult = (who === human) ? 'win' : 'lose';
        if (gmSettleBtn) gmSettleBtn.setEnabled(true);
      }
    } else if (state.history.length === N * N) {
      state.over = true;
      ovTitle.textContent = '— 平局 —';
      overlay.classList.add('show');
      if (typeof gmSave !== 'undefined' && gmSave) gmSave.discard();
      if (state.mode && state.mode.startsWith('ai-')) {
        gmLastResult = 'draw';
        if (gmSettleBtn) gmSettleBtn.setEnabled(true);
      }
    } else {
      state.turn = who === BLACK ? WHITE : BLACK;
    }
    draw();
    updateStatus();
  }

  function checkWin(r, c, who) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      const cells = [{ r, c }];
      for (let k = 1; k < 5; k++) {
        const nr = r + dr * k, nc = c + dc * k;
        if (nr<0||nr>=N||nc<0||nc>=N||state.board[nr][nc]!==who) break;
        cells.push({ r: nr, c: nc });
      }
      for (let k = 1; k < 5; k++) {
        const nr = r - dr * k, nc = c - dc * k;
        if (nr<0||nr>=N||nc<0||nc>=N||state.board[nr][nc]!==who) break;
        cells.unshift({ r: nr, c: nc });
      }
      if (cells.length >= 5) return cells.slice(0, 5);
    }
    return null;
  }

  // ============ AI ============
  // Heuristic evaluation: scan each line for patterns
  // Patterns scored: live 4 / live 3 / sleep 4 / sleep 3 / live 2 / sleep 2
  function evaluatePoint(r, c, who, defenseWeight) {
    const opp = who === BLACK ? WHITE : BLACK;
    let score = 0;
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      // Build a line of 9 centered at (r,c)
      const line = [];
      for (let k = -4; k <= 4; k++) {
        const nr = r + dr * k, nc = c + dc * k;
        if (nr < 0 || nr >= N || nc < 0 || nc >= N) line.push(-1);
        else line.push(state.board[nr][nc]);
      }
      line[4] = who; // hypothetical move
      score += scoreLineFor(line, who);
      line[4] = opp;
      score += scoreLineFor(line, opp) * defenseWeight;
    }
    return score;
  }

  function scoreLineFor(line, who) {
    // Scan windows of 6 (or 5) and score
    let s = 0;
    const opp = who === BLACK ? WHITE : BLACK;
    const str = line.map(x => x === who ? 'X' : x === opp ? 'O' : x === -1 ? 'B' : '.').join('');
    const patterns = [
      ['XXXXX', 100000],
      ['.XXXX.', 10000],
      ['.XXXX', 1000], ['XXXX.', 1000],
      ['XX.XX', 1000], ['X.XXX', 1000], ['XXX.X', 1000],
      ['.XXX.', 800],
      ['.XXX', 100], ['XXX.', 100],
      ['XX.X', 100], ['X.XX', 100],
      ['.XX.', 50],
      ['.X.X.', 30],
      ['.X.', 5]
    ];
    for (const [p, v] of patterns) {
      let i = str.indexOf(p);
      while (i !== -1) {
        s += v;
        i = str.indexOf(p, i + 1);
      }
    }
    return s;
  }

  function getCandidates(radius) {
    if (state.history.length === 0) return [{ r: 7, c: 7 }];
    const out = [];
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        if (state.board[r][c] !== EMPTY) continue;
        let near = false;
        for (let dr = -radius; dr <= radius && !near; dr++)
          for (let dc = -radius; dc <= radius && !near; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr>=0 && nr<N && nc>=0 && nc<N && state.board[nr][nc] !== EMPTY) near = true;
          }
        if (near) out.push({ r, c });
      }
    }
    return out;
  }

  function pickAiMove(ai) {
    const cfg = DIFFICULTY[state.difficulty];
    const opp = ai === BLACK ? WHITE : BLACK;
    const cands = getCandidates(cfg.windowRadius);
    if (cands.length === 0) return { r: 7, c: 7 };

    // Single-ply scoring (with optional noise)
    const scored = cands.map(({ r, c }) => {
      let s = evaluatePoint(r, c, ai, cfg.defenseWeight);
      if (cfg.scoreNoise > 0) s *= (1 + (Math.random() - 0.5) * cfg.scoreNoise * 2);
      return { r, c, s };
    });
    scored.sort((a, b) => b.s - a.s);

    // Easy: weighted random pick from top-K
    if (cfg.lookahead === 0 && cfg.topK > 1) {
      const top = scored.slice(0, Math.min(cfg.topK, scored.length));
      const minS = Math.min(...top.map(x => x.s));
      const weights = top.map(x => Math.max(1, x.s - minS + 50));
      const sum = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * sum;
      for (let i = 0; i < top.length; i++) {
        r -= weights[i];
        if (r <= 0) return { r: top[i].r, c: top[i].c };
      }
      return { r: top[0].r, c: top[0].c };
    }

    // Normal: greedy top-1
    if (cfg.lookahead === 0) return { r: scored[0].r, c: scored[0].c };

    // Hard: 2-ply minimax — for each top candidate, simulate, find opp's best response
    const top = scored.slice(0, Math.min(cfg.topK, scored.length));
    let best = top[0], bestVal = -Infinity;
    for (const cand of top) {
      state.board[cand.r][cand.c] = ai;
      let val;
      if (checkWin(cand.r, cand.c, ai)) {
        val = 1e9;
      } else {
        const oppCands = getCandidates(cfg.windowRadius);
        let oppBest = 0, oppWins = false;
        for (const oc of oppCands) {
          state.board[oc.r][oc.c] = opp;
          if (checkWin(oc.r, oc.c, opp)) { oppWins = true; state.board[oc.r][oc.c] = EMPTY; break; }
          state.board[oc.r][oc.c] = EMPTY;
          const os = evaluatePoint(oc.r, oc.c, opp, cfg.defenseWeight);
          if (os > oppBest) oppBest = os;
        }
        val = oppWins ? -1e8 : (cand.s - oppBest * cfg.defenseWeight);
      }
      state.board[cand.r][cand.c] = EMPTY;
      if (val > bestVal) { bestVal = val; best = cand; }
    }
    return { r: best.r, c: best.c };
  }

  function aiMove() {
    if (state.over || state.paused) return;
    const ai = aiSide();
    if (ai !== state.turn) return;
    state.aiThinking = true;
    updateStatus();

    const cfg = DIFFICULTY[state.difficulty];
    // Defer compute via setTimeout so UI repaints "thinking" state first
    setTimeout(() => {
      const move = pickAiMove(ai);
      setTimeout(() => {
        state.aiThinking = false;
        if (state.paused) { updateStatus(); return; }
        place(move.r, move.c, ai);
      }, Math.max(0, cfg.delayMs - 50));
    }, 50);
  }

  // Click to place
  canvas.addEventListener('click', (e) => {
    if (state.over || state.aiThinking || state.paused) return;
    const ai = aiSide();
    if (ai !== null && state.turn === ai) return;
    const rect = canvas.getBoundingClientRect();
    const cs = canvas.width / N;
    const off = cs / 2;
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    const c = Math.round((x - off) / cs);
    const r = Math.round((y - off) / cs);
    if (r < 0 || r >= N || c < 0 || c >= N) return;
    if (state.board[r][c] !== EMPTY) return;
    place(r, c, state.turn);
    if (!state.over && aiSide() === state.turn) {
      setTimeout(aiMove, 100);
    }
  });

  // Mode tabs
  document.getElementById('gmModeTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.gm-mode-tab');
    if (!t) return;
    state.mode = t.dataset.mode;
    persist();
    newGame();
  });

  // Difficulty tabs (only meaningful in AI mode; switching restarts the game)
  difficultyTabs.addEventListener('click', (e) => {
    const t = e.target.closest('.gm-mode-tab');
    if (!t || !DIFFICULTY[t.dataset.diff]) return;
    if (state.difficulty === t.dataset.diff) return;
    state.difficulty = t.dataset.diff;
    persist();
    newGame();
  });

  // Pause toggle (AI mode only)
  function togglePause() {
    if (aiSide() === null || state.over) return;
    state.paused = !state.paused;
    updateStatus();
    if (!state.paused && !state.over && aiSide() === state.turn && !state.aiThinking) {
      setTimeout(aiMove, 100);
    }
  }
  pauseBtn.onclick = togglePause;
  resumeBtn.onclick = togglePause;

  // Undo: in PvP rollback 1 step; in AI mode rollback 2 steps (to player's previous turn)
  undoBtn.onclick = () => {
    if (state.history.length === 0 || state.aiThinking || state.paused) return;
    const steps = aiSide() != null ? Math.min(2, state.history.length) : 1;
    for (let i = 0; i < steps; i++) {
      const last = state.history.pop();
      state.board[last.r][last.c] = EMPTY;
    }
    state.over = false;
    state.winLine = null;
    overlay.classList.remove('show');
    state.turn = state.history.length === 0 ? BLACK :
      (state.history[state.history.length - 1].who === BLACK ? WHITE : BLACK);
    draw();
    updateStatus();
  };

  newBtn.onclick = newGame;
  ovBtn.onclick = newGame;

  window.addEventListener('resize', draw);

  // ── games-shell：战绩榜 + 评论 ─────────────
  let gmWlbWidget = null;
  let gmRunStartedAt = Date.now();
  let gmRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
  let gmSettleBtn = null;
  let gmLastResult = null;     // 'win' | 'lose' | 'draw'

  const GM_DIFF_LABEL = { easy: '简单', normal: '普通', hard: '困难' };

  function gmFormatDuration(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function gmPaintBoard(ctx, x, y, w, h) {
    const side = Math.min(w, h);
    const margin = side * 0.04;
    const inner = side - margin * 2;
    const cs = inner / (N - 1);
    const ox = x + (w - side) / 2 + margin;
    const oy = y + (h - side) / 2 + margin;
    // 棋盘底色（木色）
    ctx.fillStyle = '#e6c98a';
    ctx.fillRect(x + (w - side) / 2, y + (h - side) / 2, side, side);
    // 网格线
    ctx.strokeStyle = '#5a4520';
    ctx.lineWidth = Math.max(1, cs * 0.05);
    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.moveTo(ox, oy + i * cs);
      ctx.lineTo(ox + (N - 1) * cs, oy + i * cs);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ox + i * cs, oy);
      ctx.lineTo(ox + i * cs, oy + (N - 1) * cs);
      ctx.stroke();
    }
    // 五个星位（标准 15×15）
    const stars = [[3,3],[3,11],[11,3],[11,11],[7,7]];
    ctx.fillStyle = '#5a4520';
    for (const [r, c] of stars) {
      ctx.beginPath();
      ctx.arc(ox + c * cs, oy + r * cs, Math.max(2, cs * 0.12), 0, Math.PI * 2);
      ctx.fill();
    }
    // 棋子
    const radius = cs * 0.42;
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const v = state.board[r][c];
        if (v === EMPTY) continue;
        const cx = ox + c * cs, cy = oy + r * cs;
        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.beginPath();
        ctx.arc(cx + 1, cy + 2, radius, 0, Math.PI * 2);
        ctx.fill();
        // 主体
        const grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, cx, cy, radius);
        if (v === BLACK) {
          grad.addColorStop(0, '#5a5a5a'); grad.addColorStop(1, '#0a0a0a');
        } else {
          grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#cfcfcf');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // 最后一手标记（红圈）
    if (state.history.length) {
      const last = state.history[state.history.length - 1];
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = Math.max(2, cs * 0.08);
      ctx.beginPath();
      ctx.arc(ox + last.c * cs, oy + last.r * cs, radius * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }
    // 五连高亮
    if (state.winLine && state.winLine.cells && state.winLine.cells.length === 5) {
      const a = state.winLine.cells[0];
      const b = state.winLine.cells[4];
      ctx.strokeStyle = 'rgba(231, 76, 60, 0.85)';
      ctx.lineWidth = Math.max(3, cs * 0.12);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ox + a.c * cs, oy + a.r * cs);
      ctx.lineTo(ox + b.c * cs, oy + b.r * cs);
      ctx.stroke();
    }
  }

  function gmGetSettlementOpts() {
    const isAi = state.mode && state.mode.startsWith('ai-');
    if (!isAi) return null;
    if (!gmLastResult) return null;
    const elapsed = Math.floor((Date.now() - gmRunStartedAt) / 1000);
    return {
      kind: 'duel',
      gameId: 'gomoku',
      title: '五子棋',
      emoji: '⚫',
      nick: GamesShell.Identity.getNick() || '匿名',
      opponent: 'vs AI · ' + (GM_DIFF_LABEL[state.difficulty] || state.difficulty),
      result: gmLastResult,
      stats: [
        { label: '我执', value: state.mode === 'ai-white' ? '黑' : '白' },
        { label: '总落子', value: state.history.length + ' 子' },
        { label: '用时', value: gmFormatDuration(elapsed) },
      ],
      paintBoard: gmPaintBoard,
      boardW: 480,
      boardAspect: 1,
      watermark: 'zirconeey.github.io/toolbox/gomoku',
    };
  }

  function gmTryAutoSubmit() {
    if (!window.GamesShell) return;
    if (!state.mode || !state.mode.startsWith('ai-')) return;
    if (!['easy', 'normal', 'hard'].includes(state.difficulty)) return;
    let nick = GamesShell.Identity.getNick();
    // 不合法就提示后再让用户重输，别一次失败就把战绩扔了
    let lastErr = '';
    while (!nick) {
      const hint = lastErr ? `${lastErr}，请重新输入：\n\n` : '恭喜击败 AI！起个昵称上传战绩榜？\n\n';
      const v = prompt(hint + '2-12 字（中英 / 数字 / 标点 / emoji 都算 1 字；按取消则不上传）');
      if (v === null) return;
      const r = GamesShell.Identity.setNick(v);
      if (r.ok) { nick = r.nick; break; }
      lastErr = r.reason || '昵称无效';
    }
    GamesShell.WinsLeaderboard.submit({
      gameId: 'gomoku',
      nick,
      did: GamesShell.Identity.getDeviceId(),
      aiLevel: state.difficulty,
      moves: state.history.length,
      durationMs: Math.max(5000, Date.now() - gmRunStartedAt),
      clientNonce: gmRunNonce,
    }).then(r => {
      if (r && r.ok && gmWlbWidget) gmWlbWidget.refresh();
      else if (r && r.data && r.data.reason) console.warn('[gomoku] wins submit rejected:', r.data.reason);
    });
  }

  function gmInitShell() {
    if (!window.GamesShell || !GamesShell.WinsLeaderboard) return;
    gmWlbWidget = GamesShell.WinsLeaderboard.mount({
      container: document.getElementById('gm-wlb-mount'),
      gameId: 'gomoku',
      title: '🏆 五子棋 战绩榜',
      getCurrentNick: () => GamesShell.Identity.getNick(),
    });
    GamesShell.Comments.mount({
      container: document.getElementById('gm-cm-mount'),
      path: '/toolbox/gomoku/',
      title: '💬 棋友交流',
      intro: '聊聊你击败 AI 的开局、决胜手 ~',
      placeholder: '聊聊你的五子棋心得 ~',
    });
    if (GamesShell.Settlement) {
      gmSettleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('gm-settle-btn-mount'),
        gameId: 'gomoku',
        getOpts: gmGetSettlementOpts,
        startDisabled: true,
      });
    }
  }

  // ── 48h 续局 ─────────────────────────────
  let gmSave = null;
  function gmSerialize() {
    if (state.over || state.history.length === 0) return null;
    return {
      mode: state.mode,
      difficulty: state.difficulty,
      board: state.board,
      history: state.history,
      turn: state.turn,
      runStartedAt: gmRunStartedAt,
      runNonce: gmRunNonce,
    };
  }
  function gmRestore(saved) {
    state.mode = saved.mode || state.mode;
    state.difficulty = saved.difficulty || state.difficulty;
    state.board = saved.board.map(row => row.slice());
    state.history = saved.history.slice();
    state.turn = saved.turn || BLACK;
    state.over = false;
    state.winLine = null;
    state.paused = false;
    gmRunStartedAt = Number(saved.runStartedAt) || Date.now();
    gmRunNonce = saved.runNonce || ((window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now()));
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    document.querySelectorAll('[data-mode]').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
    document.querySelectorAll('[data-difficulty]').forEach(t => t.classList.toggle('active', t.dataset.difficulty === state.difficulty));
    updateStatus();
    draw();
    // AI 该走就走
    if (!state.paused && aiSide() === state.turn) {
      setTimeout(aiMove, 320);
    }
  }

  gmInitShell();

  if (window.GamesShell && GamesShell.SaveState) {
    gmSave = GamesShell.SaveState.create({
      key: 'tool.gomoku.savestate.v1',
      ttlMs: 48 * 3600 * 1000,
      serialize: gmSerialize,
    });
    const peek = gmSave.peek();
    if (peek && peek.data && Array.isArray(peek.data.board)) {
      const moveCount = (peek.data.history || []).length;
      GamesShell.SaveState.showResumeModal({
        summaryHtml: `<strong>${peek.data.mode === 'pvp' ? 'PvP' : 'AI ' + (peek.data.difficulty || '')}</strong> 已走 <strong>${moveCount}</strong> 子<span class="gs-resume-meta">${peek.agoText}保存</span>`,
        onResume: () => { gmRestore(peek.data); gmSave.start(); },
        onDiscard: () => { gmSave.discard(); newGame(); gmSave.start(); },
      });
    } else {
      newGame();
      gmSave.start();
    }
  } else {
    newGame();
  }
})();
</script>
