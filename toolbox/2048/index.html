<link rel="stylesheet" href="/assets/css/games-shell.css">

<style>
  .g2048-wrap { max-width: 560px; margin: 0 auto; padding: 1rem; }
  .g2048-wrap header { text-align: center; margin-bottom: 1.2rem; }
  .g2048-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .g2048-wrap header .sub { color: var(--color-light); font-style: italic; font-size: 0.92rem; }

  .scorebar {
    display: flex; gap: 0.6rem; justify-content: center;
    margin-bottom: 0.9rem;
  }
  .score-box {
    flex: 1; max-width: 130px;
    background: var(--color-bg-warm);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 0.5rem 0.6rem;
    text-align: center;
  }
  .score-box .label {
    font-size: 0.72rem;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.1rem;
  }
  .score-box .value {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--color-ink);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .controls {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    justify-content: center; align-items: center;
    margin-bottom: 0.9rem;
  }
  .size-tabs { display: inline-flex; gap: 0.25rem; }
  .size-tab {
    padding: 0.36rem 0.72rem;
    font-size: 0.85rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: 8px;
    cursor: pointer;
    color: var(--color-muted);
    transition: all 0.18s ease;
  }
  .size-tab.active {
    background: var(--color-accent);
    color: #fff;
    border-color: var(--color-accent);
  }
  .size-tab:not(.active):hover { border-color: var(--color-accent); color: var(--color-ink); }
  .gbtn {
    padding: 0.4rem 0.85rem;
    font-size: 0.86rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: 8px;
    cursor: pointer;
    color: var(--color-ink);
    transition: all 0.18s ease;
  }
  .gbtn:hover:not(:disabled) { border-color: var(--color-accent); color: var(--color-accent); }
  .gbtn:disabled { opacity: 0.4; cursor: not-allowed; }

  .board {
    background: #bbada0;
    border-radius: 12px;
    padding: 10px;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }
  :root[data-theme="dark"] .board { background: #5e5247; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .board { background: #5e5247; }
  }
  .grid-bg {
    position: absolute; inset: 10px;
    display: grid; gap: 10px;
  }
  .cell-bg {
    background: rgba(238, 228, 218, 0.35);
    border-radius: 6px;
  }
  .tiles {
    position: absolute; inset: 10px;
    pointer-events: none;
  }
  .tile {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    font-family: var(--font-display);
    font-weight: 700;
    color: #776e65;
    transition: transform 130ms ease-out;
    will-change: transform;
    transform: translate(var(--tx, 0), var(--ty, 0));
  }
  .tile.pop { animation: pop 200ms ease-out; }
  .tile.merge { animation: merge 220ms ease-out; }
  @keyframes pop {
    0%   { transform: translate(var(--tx, 0), var(--ty, 0)) scale(0); }
    60%  { transform: translate(var(--tx, 0), var(--ty, 0)) scale(1.1); }
    100% { transform: translate(var(--tx, 0), var(--ty, 0)) scale(1); }
  }
  @keyframes merge {
    0%   { transform: translate(var(--tx, 0), var(--ty, 0)) scale(1); }
    50%  { transform: translate(var(--tx, 0), var(--ty, 0)) scale(1.18); }
    100% { transform: translate(var(--tx, 0), var(--ty, 0)) scale(1); }
  }

  /* Tile colors — classic 2048 palette */
  .v2    { background: #eee4da; color: #776e65; }
  .v4    { background: #ede0c8; color: #776e65; }
  .v8    { background: #f2b179; color: #f9f6f2; }
  .v16   { background: #f59563; color: #f9f6f2; }
  .v32   { background: #f67c5f; color: #f9f6f2; }
  .v64   { background: #f65e3b; color: #f9f6f2; }
  .v128  { background: #edcf72; color: #f9f6f2; }
  .v256  { background: #edcc61; color: #f9f6f2; }
  .v512  { background: #edc850; color: #f9f6f2; }
  .v1024 { background: #edc53f; color: #f9f6f2; }
  .v2048 { background: #edc22e; color: #f9f6f2; }
  .vbig  { background: #3c3a32; color: #f9f6f2; }

  .overlay {
    position: absolute; inset: 0;
    background: rgba(238, 228, 218, 0.78);
    border-radius: 12px;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.6rem;
    text-align: center;
    padding: 1rem;
    z-index: 10;
  }
  .overlay.show { display: flex; animation: fadein 280ms ease-out; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .overlay h2 {
    font-size: 1.8rem;
    color: #776e65;
    margin: 0;
    font-family: var(--font-display);
  }
  .overlay .o-msg { color: #776e65; font-size: 0.95rem; }
  .overlay-buttons { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; }
  :root[data-theme="dark"] .overlay { background: rgba(60, 58, 50, 0.85); }
  :root[data-theme="dark"] .overlay h2,
  :root[data-theme="dark"] .overlay .o-msg { color: #f9f6f2; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .overlay { background: rgba(60, 58, 50, 0.85); }
    :root:not([data-theme="light"]) .overlay h2,
    :root:not([data-theme="light"]) .overlay .o-msg { color: #f9f6f2; }
  }

  .help {
    margin-top: 1.2rem;
    font-size: 0.82rem;
    color: var(--color-muted);
    text-align: center;
    line-height: 1.7;
  }
  .help kbd {
    background: var(--color-bg-warm);
    border: 1px solid var(--color-border);
    border-radius: 4px;
    padding: 0.05rem 0.35rem;
    font-family: ui-monospace, monospace;
    font-size: 0.78rem;
  }

  /* 排名信息（结束后显示在 board 下方） */
  .g2048-rank-row {
    margin: 0.9rem auto 0;
    padding: 0.55rem 0.8rem;
    max-width: 480px;
    background: var(--color-bg-warm);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    text-align: center;
    font-size: 0.92rem;
    color: var(--color-ink);
    display: none;
  }
  .g2048-rank-row.show { display: block; }
  .g2048-rank-row strong { color: var(--color-highlight); font-weight: 700; }
  .g2048-rank-row.loading { color: var(--color-muted); }
  .g2048-rank-row.failed { color: var(--color-muted); font-size: 0.84rem; }
</style>

<div class="g2048-wrap">

  </div>

<script src="/assets/js/games-shell/identity.js"></script>
<script src="/assets/js/games-shell/leaderboard.js"></script>
<script src="/assets/js/games-shell/comments.js"></script>
<script src="/assets/js/games-shell/nick-prompt.js"></script>

<script>
(() => {
  const STORE_KEY = 'tool.2048.v1';
  const DEFAULT_SIZE = 4;

  let state = load();
  let runStartedAt = Date.now();
  let runNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
  let pendingSubmit = false;

  function load() {
    let raw;
    try { raw = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { raw = {}; }
    return {
      size: raw.size || DEFAULT_SIZE,
      board: raw.board || null,
      score: raw.score || 0,
      best: raw.best || { 3: 0, 4: 0, 5: 0 },
      won: !!raw.won,
      keepGoing: !!raw.keepGoing,
      snapshot: raw.snapshot || null
    };
  }
  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  }

  function emptyBoard(n) {
    return Array.from({ length: n }, () => Array(n).fill(0));
  }
  function clone(b) { return b.map(r => r.slice()); }

  function addRandomTile(b) {
    const empty = [];
    for (let r = 0; r < b.length; r++)
      for (let c = 0; c < b.length; c++)
        if (b[r][c] === 0) empty.push([r, c]);
    if (empty.length === 0) return false;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    b[r][c] = Math.random() < 0.9 ? 2 : 4;
    return true;
  }

  function slideRowLeft(row) {
    const n = row.length;
    const filtered = row.filter(v => v !== 0);
    const merged = [];
    const mergedFlags = [];
    for (let i = 0; i < filtered.length; i++) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        merged.push(filtered[i] * 2);
        mergedFlags.push(true);
        i++;
      } else {
        merged.push(filtered[i]);
        mergedFlags.push(false);
      }
    }
    while (merged.length < n) { merged.push(0); mergedFlags.push(false); }
    const gain = merged.reduce((s, v, i) => s + (mergedFlags[i] ? v : 0), 0);
    return { row: merged, gain, mergedFlags };
  }

  function move(b, dir) {
    const n = b.length;
    const out = emptyBoard(n);
    const mergedMap = emptyBoard(n).map(r => r.map(() => false));
    let totalGain = 0;
    let moved = false;

    if (dir === 0 || dir === 1) {
      for (let r = 0; r < n; r++) {
        let row = b[r].slice();
        if (dir === 1) row.reverse();
        const res = slideRowLeft(row);
        let newRow = res.row;
        let flags = res.mergedFlags;
        if (dir === 1) { newRow = newRow.slice().reverse(); flags = flags.slice().reverse(); }
        out[r] = newRow;
        for (let c = 0; c < n; c++) mergedMap[r][c] = flags[c];
        if (!moved) for (let c = 0; c < n; c++) if (b[r][c] !== newRow[c]) { moved = true; break; }
        totalGain += res.gain;
      }
    } else {
      for (let c = 0; c < n; c++) {
        let col = [];
        for (let r = 0; r < n; r++) col.push(b[r][c]);
        if (dir === 3) col.reverse();
        const res = slideRowLeft(col);
        let newCol = res.row;
        let flags = res.mergedFlags;
        if (dir === 3) { newCol = newCol.slice().reverse(); flags = flags.slice().reverse(); }
        for (let r = 0; r < n; r++) {
          out[r][c] = newCol[r];
          mergedMap[r][c] = flags[r];
        }
        if (!moved) for (let r = 0; r < n; r++) if (b[r][c] !== newCol[r]) { moved = true; break; }
        totalGain += res.gain;
      }
    }

    return { board: out, gain: totalGain, moved, mergedMap };
  }

  function canMove(b) {
    const n = b.length;
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++) {
        if (b[r][c] === 0) return true;
        if (r + 1 < n && b[r][c] === b[r + 1][c]) return true;
        if (c + 1 < n && b[r][c] === b[r][c + 1]) return true;
      }
    return false;
  }

  function hasValue(b, v) {
    for (let r = 0; r < b.length; r++)
      for (let c = 0; c < b.length; c++)
        if (b[r][c] === v) return true;
    return false;
  }

  // Render
  const boardEl = document.getElementById('board');
  const gridBgEl = document.getElementById('gridBg');
  const tilesEl = document.getElementById('tiles');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const undoBtn = document.getElementById('undoBtn');
  const newBtn = document.getElementById('newBtn');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const overlayButtons = document.getElementById('overlayButtons');
  const rankRow = document.getElementById('rankRow');

  function tileSize() {
    const n = state.size;
    const inner = boardEl.clientWidth - 20;
    const gap = 10;
    return (inner - gap * (n - 1)) / n;
  }

  function renderGrid() {
    const n = state.size;
    gridBgEl.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    gridBgEl.style.gridTemplateRows = `repeat(${n}, 1fr)`;
    gridBgEl.innerHTML = '';
    for (let i = 0; i < n * n; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell-bg';
      gridBgEl.appendChild(cell);
    }
  }

  function tileClass(v) {
    if (v <= 2048) return 'v' + v;
    return 'vbig';
  }
  function tileFontSize(v, size) {
    const s = tileSize();
    let factor = 0.45;
    if (v >= 1024) factor = 0.34;
    else if (v >= 128) factor = 0.4;
    return Math.max(14, s * factor) + 'px';
  }

  function renderTiles(prevBoard, mergedMap, freshlyAddedAt) {
    const n = state.size;
    const ts = tileSize();
    const gap = 10;
    tilesEl.innerHTML = '';
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const v = state.board[r][c];
        if (v === 0) continue;
        const t = document.createElement('div');
        t.className = 'tile ' + tileClass(v);
        t.style.width = ts + 'px';
        t.style.height = ts + 'px';
        t.style.fontSize = tileFontSize(v, n);
        t.style.setProperty('--tx', `${c * (ts + gap)}px`);
        t.style.setProperty('--ty', `${r * (ts + gap)}px`);
        t.textContent = v;
        if (mergedMap && mergedMap[r][c]) t.classList.add('merge');
        if (freshlyAddedAt && freshlyAddedAt[0] === r && freshlyAddedAt[1] === c) t.classList.add('pop');
        tilesEl.appendChild(t);
      }
    }
  }

  function renderScores() {
    scoreEl.textContent = state.score;
    bestEl.textContent = state.best[state.size] || 0;
    undoBtn.disabled = !state.snapshot;
    document.querySelectorAll('.size-tab').forEach(t => {
      t.classList.toggle('active', Number(t.dataset.size) === state.size);
    });
  }

  function showOverlay(title, msg, buttons) {
    overlayTitle.textContent = title;
    overlayMsg.textContent = msg || '';
    overlayButtons.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'gbtn';
      btn.textContent = b.label;
      btn.onclick = () => { hideOverlay(); b.action(); };
      overlayButtons.appendChild(btn);
    });
    overlay.classList.add('show');
  }
  function hideOverlay() { overlay.classList.remove('show'); }

  function newGame(size) {
    state.size = size || state.size;
    state.board = emptyBoard(state.size);
    state.score = 0;
    state.won = false;
    state.keepGoing = false;
    state.snapshot = null;
    addRandomTile(state.board);
    addRandomTile(state.board);
    save();
    renderGrid();
    renderTiles();
    renderScores();
    hideOverlay();
    rankRow.classList.remove('show');
    rankRow.textContent = '';
    nickPrompt && nickPrompt.hide();
    runStartedAt = Date.now();
    runNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
    pendingSubmit = false;
    if (lbWidget) lbWidget.onSplitChange();
  }

  function attemptMove(dir) {
    if (overlay.classList.contains('show') && !state.keepGoing) return;
    const snap = { board: clone(state.board), score: state.score, won: state.won, keepGoing: state.keepGoing };
    const res = move(state.board, dir);
    if (!res.moved) return;

    state.board = res.board;
    state.score += res.gain;
    if (state.score > (state.best[state.size] || 0)) state.best[state.size] = state.score;
    state.snapshot = snap;

    const beforeAdd = clone(state.board);
    addRandomTile(state.board);
    let added = null;
    for (let r = 0; r < state.size; r++)
      for (let c = 0; c < state.size; c++)
        if (beforeAdd[r][c] === 0 && state.board[r][c] !== 0) added = [r, c];

    save();
    renderTiles(null, res.mergedMap, added);
    renderScores();

    if (!state.won && hasValue(state.board, 2048)) {
      state.won = true;
      save();
      showOverlay('🎉 You Made It!', `凑出了 2048，得分 ${state.score}`, [
        { label: '继续到 4096', action: () => { state.keepGoing = true; save(); } },
        { label: '再来一局', action: () => newGame() }
      ]);
      // 凑出 2048 也算一次"里程碑战绩"，提交到排行榜
      tryAutoSubmit();
      return;
    }

    if (!canMove(state.board)) {
      showOverlay('Game Over', `最终得分 ${state.score}`, [
        { label: '再来一局', action: () => newGame() }
      ]);
      tryAutoSubmit();
    }
  }

  function undo() {
    if (!state.snapshot) return;
    state.board = state.snapshot.board;
    state.score = state.snapshot.score;
    state.won = state.snapshot.won;
    state.keepGoing = state.snapshot.keepGoing;
    state.snapshot = null;
    save();
    renderTiles();
    renderScores();
    hideOverlay();
  }

  // ============ 排行榜接入 ============
  let lbWidget = null;
  let nickPrompt = null;

  function setRank(stateName, data) {
    if (stateName === 'hidden') {
      rankRow.classList.remove('show', 'loading', 'failed');
      rankRow.innerHTML = '';
      return;
    }
    rankRow.classList.add('show');
    rankRow.classList.remove('loading', 'failed');
    if (stateName === 'loading') {
      rankRow.classList.add('loading');
      rankRow.textContent = '排名上传中…';
    } else if (stateName === 'failed') {
      rankRow.classList.add('failed');
      rankRow.textContent = '排行榜暂时不可用（不影响游戏）';
    } else if (stateName === 'pending') {
      rankRow.classList.add('failed');
      rankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
    } else if (stateName === 'success' && data && data.rank && data.total) {
      rankRow.innerHTML = '';
      rankRow.append(
        document.createTextNode('第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
    }
  }

  async function submitWithNick(nick) {
    if (!nick || pendingSubmit || state.score <= 0) return;
    pendingSubmit = true;
    setRank('loading');
    const r = await GamesShell.Leaderboard.submit({
      gameId: '2048',
      nick,
      score: state.score,
      durationMs: Math.max(5000, Date.now() - runStartedAt),
      clientNonce: runNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra: { boardSize: String(state.size) },
    });
    if (r && r.ok) {
      setRank('success', { rank: r.rank, total: r.total });
      if (lbWidget) lbWidget.refresh();
    } else {
      setRank('failed');
      pendingSubmit = false; // 失败可重试
      if (r && r.data && r.data.reason) console.warn('[2048] submit rejected:', r.data.reason);
    }
  }

  function tryAutoSubmit() {
    // game over 时调用：有 nick 就直接传，没 nick 就显示表单等用户填
    const nick = GamesShell.Identity.getNick();
    if (state.score <= 0) { setRank('hidden'); return; }
    if (nick) submitWithNick(nick);
    else { setRank('pending'); nickPrompt && nickPrompt.show(); }
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    let dir = -1;
    if (k === 'arrowleft' || k === 'a') dir = 0;
    else if (k === 'arrowright' || k === 'd') dir = 1;
    else if (k === 'arrowup' || k === 'w') dir = 2;
    else if (k === 'arrowdown' || k === 's') dir = 3;
    else return;
    // 在 input/textarea 里不拦键（昵称表单 / waline 评论框）
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
    e.preventDefault();
    attemptMove(dir);
  });

  // Touch
  let touchStart = null;
  boardEl.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  boardEl.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 30) { touchStart = null; return; }
    let dir;
    if (ax > ay) dir = dx > 0 ? 1 : 0;
    else dir = dy > 0 ? 3 : 2;
    attemptMove(dir);
    touchStart = null;
  }, { passive: true });

  undoBtn.onclick = undo;
  newBtn.onclick = () => {
    if (state.score > 0 && canMove(state.board)) {
      if (!confirm('放弃当前局，重新开始？')) return;
    }
    newGame();
  };
  document.getElementById('sizeTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.size-tab');
    if (!t) return;
    const newSize = Number(t.dataset.size);
    if (newSize === state.size) return;
    if (state.score > 0 && canMove(state.board)) {
      if (!confirm(`切换到 ${newSize}×${newSize} 会清空当前局，确定？`)) return;
    }
    newGame(newSize);
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => renderTiles(), 80);
  });

  // ============ Init ============
  function init() {
    let resumedGameOver = false;
    if (!state.board || state.board.length !== state.size) {
      newGame(state.size);
    } else {
      renderGrid();
      renderTiles();
      renderScores();
      if (!canMove(state.board)) {
        showOverlay('Game Over', `最终得分 ${state.score}`, [
          { label: '再来一局', action: () => newGame() }
        ]);
        resumedGameOver = true;
      }
    }

    // 排行榜（按 boardSize 分桶）
    if (window.GamesShell && GamesShell.Leaderboard) {
      lbWidget = GamesShell.Leaderboard.mount({
        container: document.getElementById('lbMount'),
        gameId: '2048',
        title: '🏆 2048 排行榜',
        scoreFormatter: v => Number(v).toLocaleString(),
        getCurrentNick: () => GamesShell.Identity.getNick(),
        getSplit: () => String(state.size),
      });
    }
    // 评论
    if (window.GamesShell && GamesShell.Comments) {
      GamesShell.Comments.mount({
        container: document.getElementById('cmMount'),
        path: '/toolbox/2048/',
        title: '💬 来玩玩交流',
        intro: '分享你最高分的小窍门、卡 1024 上不去的复盘 ~',
        placeholder: '聊聊你的 2048 心得 ~',
      });
    }
    // 昵称表单
    if (window.GamesShell && GamesShell.NickPrompt) {
      nickPrompt = GamesShell.NickPrompt.mount({
        container: document.getElementById('nickMount'),
        prompt: '想上排行榜？起个昵称吧',
        onSubmit: nick => submitWithNick(nick),
        onSkip: () => setRank('hidden'),
      });
    }

    // 进页面时如果发现是从老版本（没排行榜的 JS）遗留下来的 GG 局，
    // 同样尝试上传——不然玩家这局好成绩白瞎。
    // 用 score+size+won 派生稳定 nonce，刷新多次也不会重复入榜。
    if (resumedGameOver && state.score > 0 && window.GamesShell) {
      const stable = `2048-resume-${state.size}-${state.score}-${state.won ? 1 : 0}`;
      runNonce = stable;
      runStartedAt = Date.now() - 60000;   // 假设至少玩了 1 分钟
      tryAutoSubmit();
    }
  }
  init();
})();
</script>
