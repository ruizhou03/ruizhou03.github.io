---
layout: default
title: "生词本（间隔重复）| Rui Zhou"
permalink: /toolbox/vocab/
---

<style>
  .vc-wrap { max-width: 760px; margin: 0 auto; padding: 1rem; }
  .vc-wrap header { text-align: center; margin-bottom: 1.4rem; }
  .vc-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.4rem; }
  .vc-wrap header .sub { color: var(--color-light); font-style: italic; }

  /* ============ Stats bar ============ */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
    margin-bottom: 1.2rem;
  }
  .stat-card {
    text-align: center;
    padding: 0.75rem 0.5rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 10px;
  }
  .stat-card .stat-num {
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.5rem; color: var(--color-accent);
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .stat-card.due .stat-num { color: #d97706; }
  .stat-card.mastered .stat-num { color: #4a7c59; }
  .stat-card .stat-label {
    font-size: 0.74rem; color: var(--color-muted);
    margin-top: 0.3rem;
  }

  /* ============ Tab bar ============ */
  .tab-bar {
    display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
    margin-bottom: 1.4rem;
  }
  .tab-bar button {
    font: inherit; font-size: 0.95rem;
    padding: 0.5rem 1.2rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .tab-bar button.active {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
  }
  .tab-bar button:not(.active):hover { border-color: var(--color-accent); color: var(--color-accent); }

  /* ============ Flashcard (study) ============ */
  .study-zone {
    text-align: center;
  }
  .study-progress {
    color: var(--color-muted); font-size: 0.92rem;
    margin-bottom: 1rem;
  }
  .flashcard-container {
    perspective: 1200px;
    margin: 1rem auto 1.4rem;
    width: 100%;
    max-width: 480px;
    height: 280px;
  }
  .flashcard {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
  }
  .flashcard .face.back { transform: rotateY(180deg); }
  .flashcard .front-text {
    font-family: var(--font-display);
    font-size: 2rem; font-weight: 600;
    color: var(--color-ink);
    line-height: 1.2;
    word-break: break-word;
  }
  .flashcard .back-text {
    font-size: 1.15rem;
    color: var(--color-ink);
    line-height: 1.5;
    margin-bottom: 1rem;
    word-break: break-word;
  }
  .flashcard .example {
    font-size: 0.85rem;
    color: var(--color-muted);
    font-style: italic;
    line-height: 1.55;
    border-top: 1px dashed var(--color-border);
    padding-top: 0.7rem;
    margin-top: 0.3rem;
    width: 100%;
  }
  .flashcard .tags {
    margin-top: 0.7rem;
    display: flex; gap: 0.3rem; flex-wrap: wrap; justify-content: center;
  }
  .flashcard .tag {
    font-size: 0.72rem;
    color: var(--color-light);
    padding: 0.15rem 0.5rem;
    background: var(--color-bg-warm);
    border-radius: 4px;
  }
  .flashcard .box-badge {
    position: absolute;
    top: 0.7rem; right: 0.85rem;
    font-size: 0.72rem;
    color: var(--color-muted);
    padding: 0.2rem 0.55rem;
    background: var(--color-bg-warm);
    border-radius: 999px;
  }
  .flashcard .flip-hint {
    position: absolute;
    bottom: 0.85rem; left: 50%;
    transform: translateX(-50%);
    font-size: 0.78rem;
    color: var(--color-light);
    font-style: italic;
  }

  .study-actions {
    display: flex; gap: 0.7rem; justify-content: center;
    margin-top: 1rem;
  }
  .study-actions button {
    font: inherit; font-size: 0.95rem; font-weight: 600;
    padding: 0.7rem 1.6rem;
    border: none; border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .study-actions .know-btn {
    background: #4a7c59; color: #fff;
    box-shadow: 0 2px 8px rgba(74, 124, 89, 0.3);
  }
  .study-actions .know-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74, 124, 89, 0.4); }
  .study-actions .dunno-btn {
    background: #c0392b; color: #fff;
    box-shadow: 0 2px 8px rgba(192, 57, 43, 0.3);
  }
  .study-actions .dunno-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(192, 57, 43, 0.4); }
  .study-actions button:disabled { opacity: 0.5; cursor: not-allowed; }

  .session-end {
    text-align: center;
    padding: 3rem 1rem;
  }
  .session-end .end-emoji { font-size: 3rem; margin-bottom: 0.6rem; }
  .session-end .end-text { font-size: 1.1rem; color: var(--color-ink); margin-bottom: 0.5rem; }
  .session-end .end-stats { color: var(--color-muted); font-size: 0.9rem; }

  /* ============ All cards list ============ */
  .filter-bar {
    display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
    margin-bottom: 1rem;
    padding: 0.7rem 0.95rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 10px;
  }
  .filter-bar input[type="text"] {
    flex-grow: 1; min-width: 140px;
    padding: 0.4rem 0.7rem;
    font: inherit; font-size: 0.92rem;
    border: 1px solid var(--color-border); border-radius: 6px;
    background: var(--color-bg); color: var(--color-ink);
  }
  .filter-bar input:focus { outline: none; border-color: var(--color-accent); }
  .filter-bar select {
    padding: 0.4rem 1.6rem 0.4rem 0.6rem;
    font: inherit; font-size: 0.85rem;
    border: 1px solid var(--color-border); border-radius: 6px;
    background: var(--color-bg) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236b7280' d='M0 0l5 6 5-6z'/></svg>") right 0.5rem center no-repeat;
    -webkit-appearance: none; appearance: none; cursor: pointer;
    color: var(--color-ink);
  }

  .cards-list { display: grid; gap: 0.5rem; }
  .card-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 0.6rem; align-items: center;
    padding: 0.7rem 0.95rem;
    border: 1px solid var(--color-border); border-radius: 10px;
    background: var(--color-bg);
    transition: all 0.18s;
  }
  .card-row:hover { border-color: var(--color-accent); }
  .card-row .cr-front {
    font-weight: 600; font-size: 1rem; color: var(--color-ink);
    margin-bottom: 0.15rem;
  }
  .card-row .cr-back { font-size: 0.85rem; color: var(--color-muted); }
  .card-row .cr-meta {
    font-size: 0.74rem; color: var(--color-light);
    text-align: right; min-width: 80px;
  }
  .card-row .cr-actions { display: flex; gap: 0.3rem; }
  .card-row .cr-actions button {
    border: none; background: transparent;
    color: var(--color-light); cursor: pointer;
    padding: 0.3rem 0.5rem; border-radius: 4px;
    font-size: 0.85rem;
    transition: all 0.18s;
  }
  .card-row .cr-actions .edit-btn:hover { color: var(--color-accent); background: var(--color-bg-warm); }
  .card-row .cr-actions .delete-btn:hover { color: #c0392b; background: var(--color-bg-warm); }
  .card-row .box-pill {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.12rem 0.5rem;
    border-radius: 999px;
    background: var(--color-bg-warm);
    color: var(--color-muted);
  }
  .card-row .box-pill.box-5 { background: rgba(74, 124, 89, 0.18); color: #2d5a3d; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .card-row .box-pill.box-5 { background: rgba(74, 124, 89, 0.3); color: #6ee090; }
  }

  /* ============ Add form ============ */
  .add-form {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.4rem;
  }
  .add-form .field { margin-bottom: 0.9rem; }
  .add-form label {
    display: block; font-size: 0.85rem; color: var(--color-muted); margin-bottom: 0.3rem;
  }
  .add-form input, .add-form textarea {
    width: 100%; padding: 0.65rem 0.85rem;
    font: inherit; font-size: 0.95rem; color: var(--color-ink);
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
  }
  .add-form input:focus, .add-form textarea:focus { outline: none; border-color: var(--color-accent); }
  .add-form textarea { min-height: 60px; resize: vertical; }
  .add-form .submit-btn {
    font: inherit; font-size: 1rem; font-weight: 600;
    padding: 0.7rem 2rem;
    border: none; border-radius: 999px;
    background: var(--color-accent); color: #fff; cursor: pointer;
    transition: all 0.2s;
  }
  .add-form .submit-btn:hover { background: var(--color-accent-light); }

  .empty-zone {
    text-align: center; padding: 3rem 2rem; color: var(--color-light);
  }
  .empty-zone .empty-emoji { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

  /* ============ Modal ============ */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(3px);
    z-index: 1500;
    display: none; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.6rem;
    max-width: 460px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 {
    font-family: var(--font-display); font-size: 1.3rem;
    color: var(--color-ink); margin-bottom: 1rem;
  }
  .modal .field { margin-bottom: 0.9rem; }
  .modal label {
    display: block; font-size: 0.85rem; color: var(--color-muted); margin-bottom: 0.3rem;
  }
  .modal input, .modal textarea {
    width: 100%; padding: 0.65rem 0.85rem;
    font: inherit; font-size: 0.95rem; color: var(--color-ink);
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
  }
  .modal textarea { min-height: 50px; resize: vertical; }
  .modal-actions {
    display: flex; gap: 0.6rem; justify-content: flex-end;
    margin-top: 1.2rem;
  }
  .modal-actions button {
    font: inherit; font-size: 0.92rem;
    padding: 0.5rem 1.2rem; border-radius: 8px;
    cursor: pointer; transition: all 0.18s;
  }
  .modal-actions .cancel {
    background: var(--color-bg); border: 1px solid var(--color-border);
    color: var(--color-muted);
  }
  .modal-actions .save {
    background: var(--color-accent); border: 1px solid var(--color-accent);
    color: #fff; font-weight: 600;
  }
  .modal-actions .delete-btn {
    background: transparent; border: 1px solid var(--color-border);
    color: #c0392b; margin-right: auto;
  }

  .ie-toolbar {
    display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    margin-top: 1.4rem;
  }
  .ie-toolbar button {
    font: inherit; font-size: 0.82rem;
    padding: 0.4rem 1rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .ie-toolbar button:hover { border-color: var(--color-accent); color: var(--color-accent); }
</style>

<div class="vc-wrap">
  <header>
    <h1>📖 生词本</h1>
    <p class="sub">Vocabulary with Spaced Repetition (Leitner)</p>
  </header>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">总卡数</div>
    </div>
    <div class="stat-card due">
      <div class="stat-num" id="stat-due">0</div>
      <div class="stat-label">今天到期</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-learning">0</div>
      <div class="stat-label">学习中</div>
    </div>
    <div class="stat-card mastered">
      <div class="stat-num" id="stat-mastered">0</div>
      <div class="stat-label">已掌握</div>
    </div>
  </div>

  <div class="tab-bar">
    <button type="button" data-tab="study" class="active">📖 学习</button>
    <button type="button" data-tab="all">📋 全部</button>
    <button type="button" data-tab="add">+ 添加</button>
  </div>

  <!-- ============ Study tab ============ -->
  <div data-pane="study" id="pane-study">
    <div id="study-content"></div>
  </div>

  <!-- ============ All cards tab ============ -->
  <div data-pane="all" id="pane-all" style="display: none;">
    <div class="filter-bar">
      <input type="text" id="filter-search" placeholder="搜索单词或释义..." />
      <select id="filter-tag">
        <option value="">所有标签</option>
      </select>
      <select id="filter-box">
        <option value="">全部 box</option>
        <option value="1">Box 1（新）</option>
        <option value="2">Box 2</option>
        <option value="3">Box 3</option>
        <option value="4">Box 4</option>
        <option value="5">Box 5（已掌握）</option>
      </select>
    </div>
    <div class="cards-list" id="cards-list"></div>
    <div id="all-empty" style="display: none;" class="empty-zone">
      <div class="empty-emoji">📭</div>
      <div>没有匹配的卡片</div>
    </div>
  </div>

  <!-- ============ Add tab ============ -->
  <div data-pane="add" id="pane-add" style="display: none;">
    <div class="add-form">
      <div class="field">
        <label>单词 / 词组（正面）</label>
        <input type="text" id="add-front" placeholder="例如：serendipity" maxlength="120" />
      </div>
      <div class="field">
        <label>释义（背面）</label>
        <input type="text" id="add-back" placeholder="例如：意外发现的运气；机缘巧合" maxlength="200" />
      </div>
      <div class="field">
        <label>例句（可选）</label>
        <textarea id="add-example" placeholder="It was pure serendipity that I ran into her..." maxlength="300"></textarea>
      </div>
      <div class="field">
        <label>标签（用逗号分隔，可选）</label>
        <input type="text" id="add-tags" placeholder="GRE, reading, novel" maxlength="80" />
      </div>
      <button type="button" class="submit-btn" id="add-submit">+ 添加卡片</button>
      <span style="margin-left: 1rem; color: var(--color-light); font-size: 0.85rem;" id="add-feedback"></span>
    </div>
  </div>

  <div class="ie-toolbar">
    <button type="button" id="export-btn">📤 导出 JSON</button>
    <button type="button" id="import-btn">📥 导入 JSON</button>
    <button type="button" id="reset-btn" style="color: #c0392b;">🗑 清空所有卡片</button>
  </div>

  <!-- Edit Modal -->
  <div class="modal-backdrop" id="edit-modal">
    <div class="modal">
      <h2>编辑卡片</h2>
      <div class="field">
        <label>单词 / 词组</label>
        <input type="text" id="e-front" maxlength="120" />
      </div>
      <div class="field">
        <label>释义</label>
        <input type="text" id="e-back" maxlength="200" />
      </div>
      <div class="field">
        <label>例句</label>
        <textarea id="e-example" maxlength="300"></textarea>
      </div>
      <div class="field">
        <label>标签</label>
        <input type="text" id="e-tags" maxlength="80" />
      </div>
      <div class="modal-actions">
        <button type="button" class="delete-btn" id="e-delete">🗑 删除</button>
        <button type="button" class="cancel" id="e-cancel">取消</button>
        <button type="button" class="save" id="e-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-backdrop" id="import-modal">
    <div class="modal">
      <h2>导入卡片 (JSON)</h2>
      <div class="field">
        <label>粘贴上次导出的 JSON：</label>
        <textarea id="import-text" style="min-height: 120px; font-family: monospace; font-size: 0.85rem;"></textarea>
      </div>
      <div class="field" id="import-feedback" style="font-size: 0.85rem; color: var(--color-muted); min-height: 1.2em;"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" onclick="document.getElementById('import-modal').classList.remove('open')">取消</button>
        <button type="button" class="save" id="import-confirm">合并导入</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const STORE_KEY = 'tool.vocab.cards.v1';

  // Leitner box → 间隔（天）
  const BOX_INTERVAL = { 1: 1, 2: 2, 3: 4, 4: 7, 5: 14 };

  const state = {
    cards: [],
    activeTab: 'study',
    studyQueue: [],     // 当前学习队列
    studyIdx: 0,
    studyStats: { correct: 0, wrong: 0 },
    isFlipped: false,
    editingId: null,
  };

  // ===== DOM =====
  const $tabs = document.querySelectorAll('[data-tab]');
  const $panes = document.querySelectorAll('[data-pane]');
  const $statTotal = document.getElementById('stat-total');
  const $statDue = document.getElementById('stat-due');
  const $statLearning = document.getElementById('stat-learning');
  const $statMastered = document.getElementById('stat-mastered');
  const $studyContent = document.getElementById('study-content');
  const $cardsList = document.getElementById('cards-list');
  const $allEmpty = document.getElementById('all-empty');
  const $filterSearch = document.getElementById('filter-search');
  const $filterTag = document.getElementById('filter-tag');
  const $filterBox = document.getElementById('filter-box');
  const $addFront = document.getElementById('add-front');
  const $addBack = document.getElementById('add-back');
  const $addExample = document.getElementById('add-example');
  const $addTags = document.getElementById('add-tags');
  const $addSubmit = document.getElementById('add-submit');
  const $addFeedback = document.getElementById('add-feedback');
  const $exportBtn = document.getElementById('export-btn');
  const $importBtn = document.getElementById('import-btn');
  const $resetBtn = document.getElementById('reset-btn');

  const $editModal = document.getElementById('edit-modal');
  const $eFront = document.getElementById('e-front');
  const $eBack = document.getElementById('e-back');
  const $eExample = document.getElementById('e-example');
  const $eTags = document.getElementById('e-tags');
  const $eSave = document.getElementById('e-save');
  const $eCancel = document.getElementById('e-cancel');
  const $eDelete = document.getElementById('e-delete');

  const $importModal = document.getElementById('import-modal');
  const $importText = document.getElementById('import-text');
  const $importFeedback = document.getElementById('import-feedback');
  const $importConfirm = document.getElementById('import-confirm');

  // ===== Storage =====
  function load() {
    try { state.cards = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
    catch (e) { state.cards = []; }
  }
  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state.cards)); } catch (e) {}
  }
  function uuid() { return 'c-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }
  function todayIso() {
    const d = new Date(); d.setHours(0, 0, 0, 0);
    return d.toISOString().slice(0, 10);
  }
  function addDays(iso, days) {
    const d = new Date(iso);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ===== Stats =====
  function updateStats() {
    const today = todayIso();
    const total = state.cards.length;
    const due = state.cards.filter(c => c.nextReview <= today).length;
    const mastered = state.cards.filter(c => c.box === 5).length;
    const learning = total - mastered;
    $statTotal.textContent = total;
    $statDue.textContent = due;
    $statLearning.textContent = learning;
    $statMastered.textContent = mastered;
  }

  // ===== Tab switching =====
  $tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      $tabs.forEach(b => b.classList.toggle('active', b === btn));
      const t = btn.dataset.tab;
      state.activeTab = t;
      $panes.forEach(p => p.style.display = p.dataset.pane === t ? '' : 'none');
      if (t === 'study') startStudySession();
      else if (t === 'all') renderAllCards();
    });
  });

  // ===== Study session =====
  function startStudySession() {
    const today = todayIso();
    const due = state.cards.filter(c => c.nextReview <= today);
    // 随机洗牌
    state.studyQueue = due.sort(() => Math.random() - 0.5);
    state.studyIdx = 0;
    state.studyStats = { correct: 0, wrong: 0 };
    state.isFlipped = false;
    renderStudy();
  }

  function renderStudy() {
    if (state.cards.length === 0) {
      $studyContent.innerHTML = `
        <div class="empty-zone">
          <div class="empty-emoji">📚</div>
          <div style="margin-bottom: 1rem;">还没有任何卡片</div>
          <button type="button" class="submit-btn" onclick="document.querySelector('[data-tab=add]').click()" style="font: inherit; font-weight: 600; font-size: 1rem; padding: 0.7rem 1.6rem; border: none; border-radius: 999px; background: var(--color-accent); color: #fff; cursor: pointer;">+ 添加第一张卡</button>
        </div>
      `;
      return;
    }
    if (state.studyQueue.length === 0) {
      $studyContent.innerHTML = `
        <div class="session-end">
          <div class="end-emoji">🎉</div>
          <div class="end-text">今天没有要复习的卡片</div>
          <div class="end-stats">下次复习：明天到期 ${state.cards.filter(c => c.nextReview === addDays(todayIso(), 1)).length} 张</div>
        </div>
      `;
      return;
    }
    if (state.studyIdx >= state.studyQueue.length) {
      const total = state.studyStats.correct + state.studyStats.wrong;
      const acc = total > 0 ? Math.round(state.studyStats.correct / total * 100) : 0;
      $studyContent.innerHTML = `
        <div class="session-end">
          <div class="end-emoji">🎊</div>
          <div class="end-text">本轮完成！</div>
          <div class="end-stats">${state.studyStats.correct} 对 · ${state.studyStats.wrong} 错 · 正确率 ${acc}%</div>
          <div style="margin-top: 1.2rem;">
            <button type="button" class="submit-btn" onclick="location.reload()" style="font: inherit; font-weight: 600; font-size: 0.95rem; padding: 0.6rem 1.5rem; border: none; border-radius: 999px; background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-muted); cursor: pointer;">查看全部卡片 →</button>
          </div>
        </div>
      `;
      return;
    }
    const card = state.studyQueue[state.studyIdx];
    const tagsHtml = (card.tags && card.tags.length > 0)
      ? `<div class="tags">${card.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`
      : '';
    const exampleHtml = card.example
      ? `<div class="example">${escapeHtml(card.example)}</div>`
      : '';
    $studyContent.innerHTML = `
      <div class="study-progress">${state.studyIdx + 1} / ${state.studyQueue.length}</div>
      <div class="flashcard-container">
        <div class="flashcard ${state.isFlipped ? 'flipped' : ''}" id="flashcard">
          <div class="face front">
            <div class="box-badge">Box ${card.box}</div>
            <div class="front-text">${escapeHtml(card.front)}</div>
            <div class="flip-hint">点卡片翻面 / 按空格</div>
          </div>
          <div class="face back">
            <div class="box-badge">Box ${card.box}</div>
            <div class="front-text" style="font-size: 1.1rem; color: var(--color-muted); margin-bottom: 0.5rem;">${escapeHtml(card.front)}</div>
            <div class="back-text">${escapeHtml(card.back)}</div>
            ${exampleHtml}
            ${tagsHtml}
          </div>
        </div>
      </div>
      <div class="study-actions">
        <button type="button" class="dunno-btn" id="dunno-btn" ${state.isFlipped ? '' : 'disabled'}>不会</button>
        <button type="button" class="know-btn" id="know-btn" ${state.isFlipped ? '' : 'disabled'}>会</button>
      </div>
    `;
    document.getElementById('flashcard').addEventListener('click', flipCard);
    document.getElementById('know-btn').addEventListener('click', () => grade(true));
    document.getElementById('dunno-btn').addEventListener('click', () => grade(false));
  }

  function flipCard() {
    state.isFlipped = !state.isFlipped;
    document.getElementById('flashcard').classList.toggle('flipped', state.isFlipped);
    document.getElementById('know-btn').disabled = !state.isFlipped;
    document.getElementById('dunno-btn').disabled = !state.isFlipped;
  }

  function grade(correct) {
    const card = state.studyQueue[state.studyIdx];
    const now = todayIso();
    if (correct) {
      card.box = Math.min(5, card.box + 1);
      state.studyStats.correct++;
    } else {
      card.box = 1;
      state.studyStats.wrong++;
    }
    card.nextReview = addDays(now, BOX_INTERVAL[card.box]);
    card.history = card.history || [];
    card.history.push({ date: now, correct });
    save();
    state.studyIdx++;
    state.isFlipped = false;
    renderStudy();
    updateStats();
  }

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    if (state.activeTab !== 'study') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (state.studyQueue.length === 0 || state.studyIdx >= state.studyQueue.length) return;
    if (e.code === 'Space') {
      e.preventDefault();
      flipCard();
    } else if (e.code === 'ArrowRight' && state.isFlipped) {
      e.preventDefault();
      grade(true);
    } else if (e.code === 'ArrowLeft' && state.isFlipped) {
      e.preventDefault();
      grade(false);
    }
  });

  // ===== All cards =====
  function renderAllCards() {
    refreshTagFilter();
    const search = ($filterSearch.value || '').toLowerCase();
    const tagFilter = $filterTag.value;
    const boxFilter = $filterBox.value;

    let filtered = state.cards.slice();
    if (search) {
      filtered = filtered.filter(c =>
        c.front.toLowerCase().includes(search) ||
        c.back.toLowerCase().includes(search) ||
        (c.example || '').toLowerCase().includes(search)
      );
    }
    if (tagFilter) {
      filtered = filtered.filter(c => (c.tags || []).includes(tagFilter));
    }
    if (boxFilter) {
      filtered = filtered.filter(c => c.box === parseInt(boxFilter, 10));
    }

    filtered.sort((a, b) => {
      // due 优先 → box 升序 → createdAt 降序
      const today = todayIso();
      const aDue = a.nextReview <= today;
      const bDue = b.nextReview <= today;
      if (aDue !== bDue) return aDue ? -1 : 1;
      if (a.box !== b.box) return a.box - b.box;
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    });

    if (filtered.length === 0) {
      $cardsList.innerHTML = '';
      $allEmpty.style.display = '';
      return;
    }
    $allEmpty.style.display = 'none';
    $cardsList.innerHTML = filtered.map(c => {
      const tags = (c.tags || []).map(t => `<span style="font-size: 0.7rem; color: var(--color-light); margin-right: 0.4rem;">#${escapeHtml(t)}</span>`).join('');
      const today = todayIso();
      const dueText = c.nextReview <= today
        ? '<span style="color: #d97706;">🔔 到期</span>'
        : `下次：${c.nextReview}`;
      return `
        <div class="card-row">
          <div>
            <div class="cr-front">${escapeHtml(c.front)}</div>
            <div class="cr-back">${escapeHtml(c.back)} ${tags}</div>
          </div>
          <div class="cr-meta">
            <div class="box-pill ${c.box === 5 ? 'box-5' : ''}">Box ${c.box}</div>
            <div style="margin-top: 0.25rem;">${dueText}</div>
          </div>
          <div class="cr-actions">
            <button type="button" class="edit-btn" data-id="${c.id}">✎</button>
            <button type="button" class="delete-btn" data-id="${c.id}">×</button>
          </div>
        </div>
      `;
    }).join('');

    $cardsList.querySelectorAll('.edit-btn').forEach(b =>
      b.addEventListener('click', () => openEditModal(b.dataset.id))
    );
    $cardsList.querySelectorAll('.delete-btn').forEach(b =>
      b.addEventListener('click', () => deleteCard(b.dataset.id))
    );
  }

  function refreshTagFilter() {
    const allTags = new Set();
    state.cards.forEach(c => (c.tags || []).forEach(t => allTags.add(t)));
    const cur = $filterTag.value;
    $filterTag.innerHTML = '<option value="">所有标签</option>' +
      Array.from(allTags).sort().map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    if (allTags.has(cur)) $filterTag.value = cur;
  }

  $filterSearch.addEventListener('input', renderAllCards);
  $filterTag.addEventListener('change', renderAllCards);
  $filterBox.addEventListener('change', renderAllCards);

  // ===== Add card =====
  $addSubmit.addEventListener('click', () => {
    const front = $addFront.value.trim();
    const back = $addBack.value.trim();
    if (!front || !back) {
      $addFeedback.textContent = '⚠️ 单词和释义不能为空';
      setTimeout(() => { $addFeedback.textContent = ''; }, 2400);
      return;
    }
    const tags = $addTags.value.split(',').map(t => t.trim()).filter(Boolean);
    state.cards.push({
      id: uuid(),
      front, back,
      example: $addExample.value.trim(),
      tags,
      box: 1,
      nextReview: todayIso(),  // 立刻可学
      history: [],
      createdAt: new Date().toISOString(),
    });
    save();
    $addFront.value = '';
    $addBack.value = '';
    $addExample.value = '';
    $addTags.value = '';
    $addFeedback.textContent = '✓ 已添加';
    setTimeout(() => { $addFeedback.textContent = ''; }, 1800);
    $addFront.focus();
    updateStats();
  });
  // Enter 提交（front/back/tags 输入框）
  [$addFront, $addBack, $addTags].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        $addSubmit.click();
      }
    });
  });

  // ===== Edit modal =====
  function openEditModal(id) {
    const c = state.cards.find(x => x.id === id);
    if (!c) return;
    state.editingId = id;
    $eFront.value = c.front;
    $eBack.value = c.back;
    $eExample.value = c.example || '';
    $eTags.value = (c.tags || []).join(', ');
    $editModal.classList.add('open');
  }
  $eCancel.addEventListener('click', () => $editModal.classList.remove('open'));
  $eSave.addEventListener('click', () => {
    if (!state.editingId) return;
    const c = state.cards.find(x => x.id === state.editingId);
    if (!c) return;
    c.front = $eFront.value.trim();
    c.back = $eBack.value.trim();
    c.example = $eExample.value.trim();
    c.tags = $eTags.value.split(',').map(t => t.trim()).filter(Boolean);
    save();
    $editModal.classList.remove('open');
    state.editingId = null;
    if (state.activeTab === 'all') renderAllCards();
    if (state.activeTab === 'study') renderStudy();
  });
  $eDelete.addEventListener('click', () => {
    if (!state.editingId) return;
    if (!confirm('删除这张卡片？')) return;
    deleteCard(state.editingId);
    $editModal.classList.remove('open');
  });

  function deleteCard(id) {
    if (!confirm('删除这张卡片？')) return;
    state.cards = state.cards.filter(x => x.id !== id);
    save();
    updateStats();
    if (state.activeTab === 'all') renderAllCards();
  }

  // ===== Export / Import / Reset =====
  $exportBtn.addEventListener('click', async () => {
    if (state.cards.length === 0) { alert('没有卡片可导出'); return; }
    const json = JSON.stringify(state.cards, null, 2);
    try {
      await navigator.clipboard.writeText(json);
      $exportBtn.textContent = '✓ 已复制';
      setTimeout(() => { $exportBtn.textContent = '📤 导出 JSON'; }, 1800);
    } catch (e) { /* */ }
  });
  $importBtn.addEventListener('click', () => {
    $importText.value = '';
    $importFeedback.textContent = '';
    $importModal.classList.add('open');
  });
  $importConfirm.addEventListener('click', () => {
    const txt = $importText.value.trim();
    if (!txt) { $importFeedback.textContent = '请粘贴 JSON'; return; }
    try {
      const parsed = JSON.parse(txt);
      if (!Array.isArray(parsed)) throw new Error('JSON 必须是数组');
      let added = 0;
      const ids = new Set(state.cards.map(c => c.id));
      parsed.forEach(c => {
        if (!c.front || !c.back) return;
        if (c.id && ids.has(c.id)) return;
        state.cards.push({
          id: c.id || uuid(),
          front: c.front,
          back: c.back,
          example: c.example || '',
          tags: Array.isArray(c.tags) ? c.tags : [],
          box: parseInt(c.box, 10) || 1,
          nextReview: c.nextReview || todayIso(),
          history: Array.isArray(c.history) ? c.history : [],
          createdAt: c.createdAt || new Date().toISOString(),
        });
        added++;
      });
      save();
      updateStats();
      if (state.activeTab === 'all') renderAllCards();
      if (state.activeTab === 'study') startStudySession();
      $importFeedback.textContent = `✓ 已合并 ${added} 张卡片`;
      setTimeout(() => $importModal.classList.remove('open'), 1200);
    } catch (e) {
      $importFeedback.textContent = '❌ JSON 解析失败：' + e.message;
    }
  });
  $resetBtn.addEventListener('click', () => {
    if (state.cards.length === 0) return;
    if (!confirm(`清空全部 ${state.cards.length} 张卡片？这个操作不可撤销。`)) return;
    state.cards = [];
    save();
    updateStats();
    if (state.activeTab === 'all') renderAllCards();
    if (state.activeTab === 'study') renderStudy();
  });

  // ESC 关闭 modals
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      $editModal.classList.remove('open');
      $importModal.classList.remove('open');
    }
  });

  // ===== Init =====
  load();
  updateStats();
  renderStudy();
})();
</script>
