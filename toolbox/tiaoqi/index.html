<link rel="stylesheet" href="/assets/css/games-shell.css">

<style>
  .tq-wrap { max-width: 760px; margin: 0 auto; padding: 1rem; --gs-wrap-half: 380px; }
  .tq-wrap header { text-align: center; margin-bottom: 1.2rem; }
  .tq-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .tq-wrap header .sub { color: var(--color-light); font-style: normal; font-size: 0.92rem; }

  .tq-controls {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    justify-content: center; align-items: center;
    margin-bottom: 0.9rem;
  }
  .tq-btn {
    padding: 0.4rem 0.85rem;
    font-size: 0.86rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: 8px;
    cursor: pointer;
    color: var(--color-ink);
    transition: all 0.18s ease;
  }
  @media (hover: hover) {
    .tq-btn:hover:not(:disabled) { border-color: var(--color-accent); color: var(--color-accent); }
  }
  .tq-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tq-btn.primary {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
    font-weight: 600;
    padding: 0.55rem 1.4rem;
  }
  @media (hover: hover) {
    .tq-btn.primary:hover:not(:disabled) { filter: brightness(1.08); color: #fff; }
  }

  .tq-mode-tabs { display: inline-flex; gap: 0.25rem; }
  .tq-mode-tab {
    padding: 0.36rem 0.72rem;
    font-size: 0.85rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: 8px;
    cursor: pointer;
    color: var(--color-muted);
    transition: all 0.18s ease;
  }
  .tq-mode-tab.active {
    background: var(--color-accent);
    color: #fff;
    border-color: var(--color-accent);
  }
  @media (hover: hover) {
    .tq-mode-tab:not(.active):hover { border-color: var(--color-accent); color: var(--color-ink); }
  }

  .difficulty-row { margin-top: 0.6rem; }

  /* === Board stage: holds the bordered wrap + the centered config card ===
     The card floats over the board's middle; the 6 territories around it stay
     visible and tappable. Corner-tip seat badges are drawn inside the SVG (in
     the expanded viewBox padding ring) so they never clip. */
  .tq-board-stage {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0.6rem auto 1rem;
  }

  /* === Setup / lobby overlay ===
     One config card sits on each of the 6 home triangles; the board fills the
     whole frame (SVG viewBox 0 0 660 753). Start + room code live in the top
     status bar — nothing floats in the centre. */
  .tq-lobby { position: absolute; inset: 0; z-index: 7; pointer-events: none; }
  .tq-lobby[hidden] { display: none; }
  .tq-seat {
    position: absolute; transform: translate(-50%, -50%);
    display: flex; justify-content: center;
    /* width:max-content sizes to the label itself; without it an abs element with
       left:% shrink-fits to (stage − left), so right-side seats got squeezed and
       wrapped their difficulty chips. max-width keeps it inside the triangle. */
    width: max-content; max-width: 38%; pointer-events: auto;
  }
  .tq-seat.at-n  { top: 15.5%; left: 50%; }
  .tq-seat.at-ne { top: 32.7%; left: 84.1%; }
  .tq-seat.at-se { top: 67.3%; left: 84.1%; }
  .tq-seat.at-s  { top: 84.5%; left: 50%; }
  .tq-seat.at-sw { top: 67.3%; left: 15.9%; }
  .tq-seat.at-nw { top: 32.7%; left: 15.9%; }

  /* The card is just the centred text label; the SVG rounded-triangle frame
     behind it is the 底框 (white fill covering the whole base), so the card
     itself carries no rectangle background, border, or box-shadow. */
  .tq-seat-card {
    --seat: #888;
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.04rem; padding: 0.2rem 0.5rem;
    background: transparent; border: none;
    cursor: pointer; user-select: none; text-align: center;
    transition: transform 0.15s ease;
  }
  .tq-seat-card .ico { font-size: 1.25rem; line-height: 1; }
  .tq-seat-card .lbl { font-size: 0.82rem; font-weight: 700; color: var(--seat); font-family: var(--font-display); white-space: nowrap; }
  .tq-seat-card .sub { font-size: 0.62rem; color: var(--color-muted); white-space: nowrap; }
  .tq-seat-card.empty .lbl { color: var(--color-muted); }
  @media (hover: hover) { .tq-seat-card:hover { transform: scale(1.05); } }
  .tq-seat-badges { display: flex; gap: 0.18rem; flex-wrap: wrap; justify-content: center; }
  .tq-seat-tag { font-size: 0.54rem; padding: 0.02rem 0.3rem; border-radius: 999px; font-weight: 700; color: #fff; }
  .tq-seat-tag.host { background: linear-gradient(135deg, #ffd86b, #c9a227); }
  .tq-seat-tag.off { background: #9aa0a6; }
  .tq-seat-diff { display: flex; flex-wrap: nowrap; gap: 0.12rem; margin-top: 0.14rem; }
  .tq-seat-diff button { font-size: 0.56rem; padding: 0.06rem 0.28rem; border-radius: 6px; line-height: 1.25; white-space: nowrap; border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-muted); cursor: pointer; }
  .tq-seat-diff button.sel { background: var(--seat); color: #fff; border-color: var(--seat); font-weight: 700; }
  .tq-seat-mini { margin-top: 0.18rem; font-size: 0.58rem; padding: 0.1rem 0.4rem; border-radius: 999px; border: 1px solid var(--seat); background: #fff; color: var(--seat); cursor: pointer; font-weight: 700; white-space: nowrap; }
  .tq-seat-mini.kick { border-color: #c0563f; color: #c0563f; }

  .tq-lobby-hint { font-size: 0.78rem; color: var(--color-muted); text-align: center; line-height: 1.5; margin: 0.1rem auto 0; max-width: 34rem; }
  .tq-lobby-hint[hidden] { display: none; }
  .tq-lobby-err { font-size: 0.8rem; color: #c0392b; text-align: center; margin-top: 0.2rem; }
  .tq-lobby-err:empty { display: none; }
  .tq-lobby-room-chip { padding: 0.36rem 0.85rem; border-radius: 999px; background: var(--color-bg-warm); border: 1px solid var(--color-border); font-size: 0.85rem; cursor: pointer; font-family: var(--font-display); color: var(--color-ink); }
  .tq-lobby-room-chip[hidden] { display: none; }
  .tq-lobby-room-chip strong { color: var(--color-accent); letter-spacing: 0.08em; margin-left: 0.3rem; font-variant-numeric: tabular-nums; }
  @media (hover: hover) { .tq-lobby-room-chip:hover { border-color: var(--color-accent); } }

  .tq-statusbar {
    display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; align-items: center;
    margin-bottom: 0.9rem;
    font-size: 0.92rem;
    color: var(--color-ink);
  }
  .tq-turn {
    background: var(--color-bg-warm);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 0.4rem 0.9rem;
    font-family: var(--font-display);
    font-weight: 600;
  }
  .tq-turn .swatch { display: inline-block; width: 0.85rem; height: 0.85rem; border-radius: 50%; border: 1.5px solid #222; vertical-align: -2px; margin-right: 0.3rem; }

  .tq-roster {
    display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
    font-size: 0.78rem; color: var(--color-muted);
    margin-bottom: 0.7rem;
  }
  .tq-roster .item {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.18rem 0.5rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg-warm);
    border-radius: 6px;
  }
  .tq-roster .item .swatch { width: 0.7rem; height: 0.7rem; border-radius: 50%; border: 1px solid #222; }
  .tq-roster .item.is-current { border-color: var(--color-accent); color: var(--color-ink); font-weight: 600; }
  .tq-roster .item.is-done { opacity: 0.55; text-decoration: line-through; }

  .tq-board-wrap {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    aspect-ratio: 660 / 753;
    background: #f8f3e6;
    border: 2px solid #5a4530;
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  :root[data-theme="dark"] .tq-board-wrap { background: #d4c4a8; border-color: #2d2218; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .tq-board-wrap { background: #d4c4a8; border-color: #2d2218; }
  }
  .tq-svg { display: block; width: 100%; height: 100%; }

  .tq-svg .cell-bg {
    fill: rgba(255, 255, 255, 0.5);
    stroke: #8a7050;
    stroke-width: 1;
  }
  .tq-svg .cell-bg.start { /* per-corner tint via inline fill attr */ }
  .tq-svg .cell-hit {
    fill: transparent;
    cursor: pointer;
  }
  .tq-svg .piece {
    stroke: #1a1a1a;
    stroke-width: 1.5;
  }
  .tq-svg .piece.selected {
    stroke: #e6b400;
    stroke-width: 3.5;
    filter: drop-shadow(0 0 4px rgba(230, 180, 0, 0.7));
  }
  .tq-svg .target-dot {
    fill: rgba(20, 20, 20, 0.42);
    pointer-events: none;
  }
  .tq-svg .target-dot.hop {
    fill: rgba(220, 60, 60, 0.55);
  }
  .tq-svg .last-mark {
    fill: rgba(245, 209, 66, 0.45);
    pointer-events: none;
  }
  .tq-svg .ai-trail {
    pointer-events: none;
    opacity: 0.30;
  }

  .tq-overlay {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.6rem;
    text-align: center;
    color: #fff;
    padding: 1rem;
    z-index: 10;
  }
  .tq-overlay.show { display: flex; }
  .tq-overlay h2 { font-size: 1.6rem; margin: 0; font-family: var(--font-display); }
  .tq-overlay .ranking {
    font-size: 0.95rem;
    line-height: 1.7;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    margin: 0.3rem 0 0.5rem;
  }
  .tq-paused-overlay { background: rgba(0, 0, 0, 0.35); }

  .tq-help {
    margin-top: 1rem;
    font-size: 0.82rem;
    color: var(--color-muted);
    text-align: center;
    line-height: 1.7;
  }

  details.about {
    font-size: 0.88rem;
    color: var(--color-muted); line-height: 1.7;
  }
  details.about summary {
    cursor: pointer; padding: 0.4rem 0;
    color: var(--color-muted); font-weight: 500;
    list-style: none;
  }
  details.about summary::before { content: '+ '; transition: 0.2s; }
  details[open].about summary::before { content: '− '; }
  details.about p { margin: 0.6rem 0; }
</style>

<div class="tq-wrap">
  <header>
    <h1>[[zi:star]] 跳棋</h1>
  </header>

  <div class="tq-statusbar">
    <div class="tq-turn" id="tqTurn">— 请配置玩家 —</div>
    <button class="tq-lobby-room-chip" id="tqRoomChip" hidden>房号<strong id="tqRoomCodeNum">----</strong></button>
    <button class="tq-btn primary" id="tqStartBtn" hidden>[[zi:play]] 开始游戏</button>
  </div>
  <div class="tq-lobby-hint" id="tqLobbyHint" hidden></div>
  <div class="tq-lobby-err" id="tqLobbyErr"></div>

  <div class="tq-roster" id="tqRoster" hidden></div>

  <div class="tq-board-stage">
    <div class="tq-board-wrap">
      <svg class="tq-svg" id="tqSvg" viewBox="0 0 660 753" preserveAspectRatio="xMidYMid meet"></svg>

      <!-- Setup / lobby overlay: one config card on each of the 6 home triangles. -->
      <div class="tq-lobby" id="tqLobby">
        <div class="tq-seat at-n"  data-corner="N"  id="tqSeatN"></div>
        <div class="tq-seat at-ne" data-corner="NE" id="tqSeatNE"></div>
        <div class="tq-seat at-se" data-corner="SE" id="tqSeatSE"></div>
        <div class="tq-seat at-s"  data-corner="S"  id="tqSeatS"></div>
        <div class="tq-seat at-sw" data-corner="SW" id="tqSeatSW"></div>
        <div class="tq-seat at-nw" data-corner="NW" id="tqSeatNW"></div>
      </div>

      <div class="tq-overlay" id="tqOverlay">
        <h2 id="tqOvTitle">游戏结束</h2>
        <div class="ranking" id="tqOvRanking"></div>
        <button class="tq-btn" id="tqOvBtn">再来一局</button>
      </div>
      <div class="tq-overlay tq-paused-overlay" id="tqPausedOverlay">
        <h2>[[zi:pause]] 已暂停</h2>
        <button class="tq-btn" id="tqResumeBtn">[[zi:play]] 继续</button>
      </div>
    </div>
  </div>

  <!-- Game-only controls (hidden until a game starts) -->
  <div id="tqGameControls" hidden>
    <div class="tq-controls" style="margin-top: 0.9rem;">
      <button class="tq-btn primary" id="tqEndChainBtn" hidden>[[zi:check]] 结束跳跃</button>
      <button class="tq-btn" id="tqUndoBtn">↶ 悔棋</button>
      <button class="tq-btn" id="tqPauseBtn" hidden>[[zi:pause]] 暂停</button>
      <button class="tq-btn" id="tqNewBtn">[[zi:refresh]] 重新配置</button>
    </div>
  </div>

  <details class="about" style="max-width:600px;margin:1rem auto 0;">
    <summary>游戏规则</summary>
    <p>点击棋盘六角的圆形按钮切换「空 / 人类 / AI」。每队 10 颗棋子，目标是将全部棋子移到正对面的三角形里。至少需要 2 个角有玩家。</p>
    <p>点击棋子选中，再点目标落子。同色圆点 = 步走（相邻空孔），红色圈 = 跳跃（跨过同一直线上的一颗棋子，落到对侧等距离空孔）。连跳途中任一站均可作为终点。</p>
  </details>

  <div id="tq-wlb-mount" style="max-width: 600px; margin: 1.5rem auto 0;"></div>
  <div id="tq-nick-mount" style="max-width: 480px; margin: 0.6rem auto 0;"></div>
  <div id="tq-settle-btn-mount"></div>
  <div id="tq-cm-mount" style="max-width: 600px; margin: 0 auto;"></div>
</div>
