<style>
  .grouper-wrap { max-width: 760px; margin: 0 auto; padding: 1rem; }
  .grouper-wrap header { text-align: center; margin-bottom: 1.6rem; }
  .grouper-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.4rem; }
  .grouper-wrap header .sub { color: var(--color-light); font-style: normal; }

  .panel {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.4rem; margin-bottom: 1.2rem;
  }
  .panel-title {
    font-family: var(--font-display); font-size: 1.1rem;
    color: var(--color-ink); margin-bottom: 0.8rem; font-weight: 600;
  }

  /* Profile bar */
  .profile-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  .profile-bar select, .profile-bar button {
    font: inherit; font-size: 0.88rem; padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .profile-bar select { padding: 0.4rem 0.7rem; }
  .profile-bar button:hover { border-color: var(--color-accent); color: var(--color-accent); }
  .profile-bar button.danger:hover { border-color: #c0392b; color: #c0392b; }
  .profile-bar .spacer { flex-grow: 1; }

  /* Names textarea */
  .names-input {
    width: 100%; min-height: 160px; resize: vertical;
    padding: 0.85rem 1rem;
    border: 1px solid var(--color-border); border-radius: 10px;
    background: var(--color-bg); color: var(--color-ink);
    font-family: inherit; font-size: 0.96rem; line-height: 1.7;
    transition: border-color 0.18s;
  }
  .names-input:focus { outline: none; border-color: var(--color-accent); }
  .names-meta { margin-top: 0.4rem; font-size: 0.82rem; color: var(--color-light); }

  /* Mode tabs */
  .mode-tabs {
    display: flex; gap: 0.4rem; margin-bottom: 0.8rem; flex-wrap: wrap;
  }
  .mode-tabs button {
    font: inherit; font-size: 0.9rem; padding: 0.45rem 1rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .mode-tabs button.active {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
  }
  .mode-tabs button:not(.active):hover { border-color: var(--color-accent); color: var(--color-accent); }

  .mode-input-row { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }
  .mode-input-row label { font-size: 0.92rem; color: var(--color-muted); }
  .mode-input-row input[type="number"] {
    width: 80px; padding: 0.5rem 0.7rem; font: inherit; font-size: 0.95rem;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg); color: var(--color-ink); text-align: center;
  }
  .mode-input-row input[type="number"]:focus { outline: none; border-color: var(--color-accent); }
  .mode-input-row .balance-toggle { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none; font-size: 0.88rem; color: var(--color-muted); }

  /* Action button */
  .action-row { text-align: center; margin: 1.4rem 0; }
  .action-btn {
    font: inherit; font-size: 1.05rem; font-weight: 600;
    padding: 0.85rem 2.4rem; border: none; border-radius: 999px;
    background: var(--color-accent); color: #fff; cursor: pointer;
    box-shadow: 0 3px 10px rgba(30, 58, 95, 0.25);
    transition: all 0.2s;
  }
  .action-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 5px 14px rgba(30, 58, 95, 0.32);
  }
  .action-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }

  /* Results */
  .results-toolbar {
    display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-end;
    margin-bottom: 0.8rem;
  }
  .results-toolbar button {
    font: inherit; font-size: 0.85rem; padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .results-toolbar button:hover { border-color: var(--color-accent); color: var(--color-accent); }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.9rem;
  }
  .group-card {
    border: 1px solid var(--color-border); border-radius: 12px;
    padding: 0.9rem 1rem;
    background: var(--color-bg);
    border-top: 4px solid var(--g-color, var(--color-accent));
    animation: fade-in-up 0.35s cubic-bezier(0.4, 0, 0.2, 1) backwards;
  }
  .group-card .g-title {
    font-family: var(--font-display); font-weight: 600;
    color: var(--g-color, var(--color-accent));
    font-size: 1rem; margin-bottom: 0.5rem;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .group-card .g-count { font-size: 0.78rem; color: var(--color-light); font-weight: 400; }
  .group-card ul { list-style: none; padding: 0; margin: 0; }
  .group-card li {
    padding: 0.32rem 0;
    border-bottom: 1px dashed var(--color-border);
    color: var(--color-text); font-size: 0.94rem;
  }
  .group-card li:last-child { border-bottom: none; }

  @keyframes fade-in-up {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .empty-hint {
    text-align: center; color: var(--color-light);
    padding: 2rem 1rem; font-size: 0.92rem;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .panel { padding: 1.1rem; }
    .groups-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    .group-card { padding: 0.7rem 0.8rem; }
  }
</style>

<div class="grouper-wrap">
  <header>
    <h1>👥 随机分组器</h1>
    <p class="sub">Random Grouper</p>
  </header>

  <div class="panel">
    <div class="profile-bar">
      <select id="profile-select" aria-label="选择保存的名单">
        <option value="">— 未保存名单 —</option>
      </select>
      <button type="button" id="profile-save">💾 保存当前</button>
      <button type="button" id="profile-rename">✎ 重命名</button>
      <button type="button" id="profile-delete" class="danger">🗑 删除</button>
      <span class="spacer"></span>
    </div>

    <div class="panel-title">名单（每行一个）</div>
    <textarea class="names-input" id="names-input" placeholder="例如：&#10;张三&#10;李四&#10;王五"></textarea>
    <div class="names-meta" id="names-meta">0 个名字</div>
  </div>

  <div class="panel">
    <div class="panel-title">分组方式</div>
    <div class="mode-tabs">
      <button type="button" data-mode="groups" class="active">分 N 组</button>
      <button type="button" data-mode="size">每组 M 人</button>
    </div>
    <div class="mode-input-row">
      <label id="mode-label">N =</label>
      <input type="number" id="mode-value" inputmode="numeric" min="1" max="100" step="1" value="3" />
      <label class="balance-toggle" id="balance-wrap">
        <input type="checkbox" id="balance-toggle" checked />
        <span>余数随机分到前几组</span>
      </label>
    </div>
  </div>

  <div class="action-row">
    <button type="button" id="shuffle-btn" class="action-btn">🎲 开始分组</button>
  </div>

  <div id="results-zone" style="display: none;">
    <div class="results-toolbar">
      <button type="button" id="reshuffle-btn">🔁 再洗一次</button>
      <button type="button" id="copy-btn">📋 复制结果</button>
    </div>
    <div class="groups-grid" id="groups-grid"></div>
  </div>

  <div id="empty-zone" class="empty-hint">在上面贴名单，点「开始分组」试试看</div>
</div>

<script>
(function () {
  'use strict';

  const PROFILE_KEY = 'tool.grouper.profiles.v1';
  const COLORS = ['#1e3a5f', '#c9a96e', '#2d5a8e', '#8b5a3c', '#4a7c59', '#9b6d5e', '#5e7eb3', '#a67e44'];

  const state = {
    mode: 'groups',
    value: 3,
    balance: true,
    lastResult: null,
  };

  const $names    = document.getElementById('names-input');
  const $namesMeta= document.getElementById('names-meta');
  const $tabs     = document.querySelectorAll('.mode-tabs button');
  const $modeLbl  = document.getElementById('mode-label');
  const $modeVal  = document.getElementById('mode-value');
  const $balance  = document.getElementById('balance-toggle');
  const $shuffle  = document.getElementById('shuffle-btn');
  const $reshuffle= document.getElementById('reshuffle-btn');
  const $copy     = document.getElementById('copy-btn');
  const $results  = document.getElementById('results-zone');
  const $empty    = document.getElementById('empty-zone');
  const $grid     = document.getElementById('groups-grid');

  const $pSelect  = document.getElementById('profile-select');
  const $pSave    = document.getElementById('profile-save');
  const $pRename  = document.getElementById('profile-rename');
  const $pDelete  = document.getElementById('profile-delete');

  // ——— Names ———
  function parseNames(raw) {
    return raw.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
  }
  function updateMeta() {
    const names = parseNames($names.value);
    $namesMeta.textContent = `${names.length} 个名字`;
    $shuffle.disabled = names.length < 2;
  }
  $names.addEventListener('input', updateMeta);

  const $balanceWrap = document.getElementById('balance-wrap');
  function syncBalanceVisibility() {
    $balanceWrap.style.display = state.mode === 'groups' ? '' : 'none';
  }

  // ——— Mode tabs ———
  $tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      $tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
      $modeLbl.textContent = state.mode === 'groups' ? 'N =' : 'M =';
      syncBalanceVisibility();
    });
  });
  $modeVal.addEventListener('input', () => {
    state.value = Math.max(1, parseInt($modeVal.value, 10) || 1);
  });
  $balance.addEventListener('change', () => { state.balance = $balance.checked; });

  // ——— Shuffle (Fisher-Yates) ———
  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function divideIntoGroups(names, mode, value, balance) {
    if (names.length < 2) return [];
    const shuffled = shuffleArr(names);
    let groupCount;
    if (mode === 'groups') {
      groupCount = Math.min(Math.max(1, value), shuffled.length);
    } else {
      groupCount = Math.max(1, Math.ceil(shuffled.length / Math.max(1, value)));
    }

    const groups = Array.from({ length: groupCount }, () => []);

    if (mode === 'groups') {
      // 平衡模式：余数 r 随机洒给前 r 组
      const base = Math.floor(shuffled.length / groupCount);
      const remainder = shuffled.length - base * groupCount;
      const sizes = Array.from({ length: groupCount }, () => base);
      if (balance) {
        const idxs = shuffleArr(Array.from({ length: groupCount }, (_, i) => i));
        for (let i = 0; i < remainder; i++) sizes[idxs[i]] += 1;
      } else {
        // 不平衡：余数全堆到第一组
        sizes[0] += remainder;
      }
      let cur = 0;
      for (let g = 0; g < groupCount; g++) {
        for (let k = 0; k < sizes[g]; k++) {
          groups[g].push(shuffled[cur++]);
        }
      }
    } else {
      // 每组 M 人：直接顺序填充
      const M = Math.max(1, value);
      for (let i = 0; i < shuffled.length; i++) {
        groups[Math.floor(i / M)].push(shuffled[i]);
      }
    }

    return groups;
  }

  function renderResults(groups) {
    $grid.innerHTML = '';
    groups.forEach((members, idx) => {
      const card = document.createElement('div');
      card.className = 'group-card';
      card.style.setProperty('--g-color', COLORS[idx % COLORS.length]);
      card.style.animationDelay = (idx * 60) + 'ms';
      card.innerHTML = `
        <div class="g-title">
          <span>第 ${idx + 1} 组</span>
          <span class="g-count">${members.length} 人</span>
        </div>
        <ul>${members.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>
      `;
      $grid.appendChild(card);
    });
    $results.style.display = '';
    $empty.style.display = 'none';
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function doShuffle() {
    const names = parseNames($names.value);
    if (names.length < 2) return;
    const groups = divideIntoGroups(names, state.mode, state.value, state.balance);
    state.lastResult = groups;
    renderResults(groups);
  }

  $shuffle.addEventListener('click', doShuffle);
  $reshuffle.addEventListener('click', doShuffle);

  $copy.addEventListener('click', async () => {
    if (!state.lastResult) return;
    const txt = state.lastResult.map((g, i) =>
      `第 ${i + 1} 组（${g.length} 人）：\n${g.map(n => '  ' + n).join('\n')}`
    ).join('\n\n');
    try {
      await navigator.clipboard.writeText(txt);
      $copy.textContent = '✓ 已复制';
      setTimeout(() => { $copy.textContent = '📋 复制结果'; }, 1600);
    } catch (e) {
      $copy.textContent = '复制失败';
      setTimeout(() => { $copy.textContent = '📋 复制结果'; }, 1600);
    }
  });

  // ——— Profiles ———
  function loadProfiles() {
    try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function saveProfiles(p) {
    try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); }
    catch (e) {}
  }
  function refreshProfileSelect() {
    const profiles = loadProfiles();
    const cur = $pSelect.value;
    $pSelect.innerHTML = '<option value="">— 未保存名单 —</option>';
    Object.keys(profiles).sort().forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      if (name === cur) opt.selected = true;
      $pSelect.appendChild(opt);
    });
  }
  $pSelect.addEventListener('change', () => {
    const profiles = loadProfiles();
    const name = $pSelect.value;
    if (!name || !profiles[name]) return;
    $names.value = profiles[name].names || '';
    if (profiles[name].mode) {
      state.mode = profiles[name].mode;
      $tabs.forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
      $modeLbl.textContent = state.mode === 'groups' ? 'N =' : 'M =';
    }
    if (profiles[name].value) {
      state.value = profiles[name].value;
      $modeVal.value = state.value;
    }
    syncBalanceVisibility();
    updateMeta();
  });
  $pSave.addEventListener('click', () => {
    const name = (prompt('给这份名单起个名字：', $pSelect.value || '')) || '';
    const trimmed = name.trim();
    if (!trimmed) return;
    const profiles = loadProfiles();
    profiles[trimmed] = {
      names: $names.value,
      mode: state.mode,
      value: state.value,
    };
    saveProfiles(profiles);
    refreshProfileSelect();
    $pSelect.value = trimmed;
  });
  $pRename.addEventListener('click', () => {
    const old = $pSelect.value;
    if (!old) { alert('请先选一个已保存的名单'); return; }
    const name = (prompt('改名成：', old)) || '';
    const trimmed = name.trim();
    if (!trimmed || trimmed === old) return;
    const profiles = loadProfiles();
    profiles[trimmed] = profiles[old];
    delete profiles[old];
    saveProfiles(profiles);
    refreshProfileSelect();
    $pSelect.value = trimmed;
  });
  $pDelete.addEventListener('click', () => {
    const name = $pSelect.value;
    if (!name) { alert('请先选一个已保存的名单'); return; }
    if (!confirm(`确定删除「${name}」？`)) return;
    const profiles = loadProfiles();
    delete profiles[name];
    saveProfiles(profiles);
    refreshProfileSelect();
  });

  // ——— Init ———
  refreshProfileSelect();
  updateMeta();
  syncBalanceVisibility();
})();
</script>
