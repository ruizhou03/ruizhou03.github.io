<script>
(function () {
  'use strict';

  // ===== Tier 1: hardcoded baseline (USD = 1) =====
  // 编译进页面的兜底汇率，截至 2026-05-03
  const BASELINE = {
    date: '2026-05-03',
    rates: {
      USD: 1,
      CNY: 7.20,
      EUR: 0.92,
      GBP: 0.79,
      JPY: 149.5,
      HKD: 7.81,
    }
  };

  const CURRENCIES = ['USD', 'CNY', 'EUR', 'GBP', 'JPY', 'HKD'];
  const CUR_LABELS = {
    USD: 'USD 美元', CNY: 'CNY 人民币', EUR: 'EUR 欧元',
    GBP: 'GBP 英镑', JPY: 'JPY 日元', HKD: 'HKD 港币',
  };

  const CACHE_KEY = 'tool.converter.fxcache.v1';
  const CACHE_TTL = 24 * 60 * 60 * 1000;     // 24h

  // 状态
  let fxRates = null;       // { USD: 1, CNY: ..., ... }
  let fxDate  = null;       // 'YYYY-MM-DD'
  let fxSource = 'fallback';// 'live' | 'cache' | 'fallback'

  // ===== Tabs =====
  const $tabs = document.querySelectorAll('.tab-bar button');
  const $panels = document.querySelectorAll('[data-panel]');
  $tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      $tabs.forEach(b => b.classList.toggle('active', b === btn));
      $panels.forEach(p => p.style.display = p.dataset.panel === btn.dataset.tab ? '' : 'none');
    });
  });

  // ===== Helpers =====
  function fmt(n, decimals = 4) {
    if (!Number.isFinite(n)) return '';
    // 智能精度：大数少小数，小数多小数
    let d = decimals;
    if (Math.abs(n) >= 100) d = 2;
    else if (Math.abs(n) >= 10) d = 3;
    return parseFloat(n.toFixed(d)).toString();
  }
  function getNum($el) {
    const v = parseFloat($el.value);
    return Number.isFinite(v) ? v : 0;
  }

  // ============= CURRENCY =============
  const $curA  = document.getElementById('cur-a-val');
  const $curAu = document.getElementById('cur-a-unit');
  const $curB  = document.getElementById('cur-b-val');
  const $curBu = document.getElementById('cur-b-unit');
  const $curTag = document.getElementById('cur-tag');
  const $curText = document.getElementById('cur-source-text');
  const $curRefresh = document.getElementById('cur-refresh');

  CURRENCIES.forEach(c => {
    const o1 = document.createElement('option'); o1.value = c; o1.textContent = CUR_LABELS[c]; $curAu.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = c; o2.textContent = CUR_LABELS[c]; $curBu.appendChild(o2);
  });
  $curAu.value = 'USD';
  $curBu.value = 'CNY';

  function loadFxCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const d = JSON.parse(raw);
      if (!d.rates || !d.fetchedAt) return null;
      if (Date.now() - d.fetchedAt > CACHE_TTL) return d; // 过期但仍可用作缓存
      return d;
    } catch (e) { return null; }
  }
  function saveFxCache(rates, date) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        rates, date, fetchedAt: Date.now()
      }));
    } catch (e) {}
  }

  function setFxSource(rates, date, src) {
    fxRates = rates;
    fxDate  = date;
    fxSource = src;
    const tagMap = {
      live:     { cls: 'live',     text: '实时' },
      cache:    { cls: 'cache',    text: '缓存' },
      fallback: { cls: 'fallback', text: '离线兜底' },
    };
    $curTag.className = 'tag ' + tagMap[src].cls;
    $curTag.textContent = tagMap[src].text;
    $curText.textContent = `汇率截至 ${date}`;
    convertCurrency();
  }

  async function fetchLiveRates() {
    $curRefresh.disabled = true;
    $curRefresh.textContent = '⏳ 刷新中';
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD', { cache: 'no-store' });
      if (!res.ok) throw new Error('http ' + res.status);
      const data = await res.json();
      if (data.result !== 'success' || !data.rates) throw new Error('bad payload');
      // 只挑我们用到的
      const picked = {};
      CURRENCIES.forEach(c => {
        if (typeof data.rates[c] === 'number') picked[c] = data.rates[c];
      });
      // 必须包含所有需要的货币才算成功
      if (Object.keys(picked).length < CURRENCIES.length) throw new Error('missing currencies');
      const date = (data.time_last_update_utc || '').slice(0, 25)
        ? new Date(data.time_last_update_utc).toISOString().slice(0, 10)
        : new Date().toISOString().slice(0, 10);
      saveFxCache(picked, date);
      setFxSource(picked, date, 'live');
    } catch (e) {
      // 失败：尝试缓存，再不济用 baseline
      const cached = loadFxCache();
      if (cached) setFxSource(cached.rates, cached.date, 'cache');
      else setFxSource(BASELINE.rates, BASELINE.date, 'fallback');
      $curText.textContent = `汇率截至 ${fxDate}（实时拉取失败）`;
    } finally {
      $curRefresh.disabled = false;
      $curRefresh.textContent = '↻ 刷新';
    }
  }

  function convertCurrency(direction = 'a-to-b') {
    if (!fxRates) return;
    const aCode = $curAu.value, bCode = $curBu.value;
    const rA = fxRates[aCode], rB = fxRates[bCode];
    if (!rA || !rB) return;
    if (direction === 'a-to-b') {
      const v = getNum($curA);
      const b = (v / rA) * rB;
      $curB.value = fmt(b);
    } else {
      const v = getNum($curB);
      const a = (v / rB) * rA;
      $curA.value = fmt(a);
    }
  }

  $curA.addEventListener('input', () => convertCurrency('a-to-b'));
  $curB.addEventListener('input', () => convertCurrency('b-to-a'));
  $curAu.addEventListener('change', () => convertCurrency('a-to-b'));
  $curBu.addEventListener('change', () => convertCurrency('a-to-b'));

  document.querySelector('[data-swap="cur"]').addEventListener('click', () => {
    const aCode = $curAu.value, bCode = $curBu.value;
    $curAu.value = bCode; $curBu.value = aCode;
    convertCurrency('a-to-b');
  });
  $curRefresh.addEventListener('click', fetchLiveRates);

  document.querySelectorAll('[data-cur-quick]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [from, to] = btn.dataset.curQuick.split(',');
      $curAu.value = from; $curBu.value = to;
      $curA.value = '1';
      convertCurrency('a-to-b');
    });
  });

  // 启动汇率：先用缓存（哪怕过期）显示，再后台拉新
  function initCurrency() {
    const cached = loadFxCache();
    if (cached) {
      const fresh = (Date.now() - cached.fetchedAt) <= CACHE_TTL;
      setFxSource(cached.rates, cached.date, fresh ? 'cache' : 'cache');
    } else {
      setFxSource(BASELINE.rates, BASELINE.date, 'fallback');
    }
    if (navigator.onLine) {
      fetchLiveRates();
    }
  }

  // ============= WEIGHT =============
  // 全部以 g 为基准
  const W_TO_G = { kg: 1000, g: 1, lb: 453.59237, oz: 28.349523125 };
  const W_LABELS = { kg: 'kg 千克', g: 'g 克', lb: 'lb 磅', oz: 'oz 盎司' };
  setupLinearTab('w', W_TO_G, W_LABELS, 'kg', 'lb');

  // ============= LENGTH =============
  // 全部以 cm 为基准
  const L_TO_CM = { cm: 1, m: 100, km: 100000, in: 2.54, ft: 30.48, mi: 160934.4 };
  const L_LABELS = { cm: 'cm 厘米', m: 'm 米', km: 'km 公里', in: 'in 英寸', ft: 'ft 英尺', mi: 'mi 英里' };
  setupLinearTab('l', L_TO_CM, L_LABELS, 'm', 'ft');

  function setupLinearTab(prefix, factorMap, labelMap, defaultA, defaultB) {
    const $a  = document.getElementById(`${prefix}-a-val`);
    const $au = document.getElementById(`${prefix}-a-unit`);
    const $b  = document.getElementById(`${prefix}-b-val`);
    const $bu = document.getElementById(`${prefix}-b-unit`);
    Object.keys(factorMap).forEach(u => {
      const o1 = document.createElement('option'); o1.value = u; o1.textContent = labelMap[u]; $au.appendChild(o1);
      const o2 = document.createElement('option'); o2.value = u; o2.textContent = labelMap[u]; $bu.appendChild(o2);
    });
    $au.value = defaultA; $bu.value = defaultB;
    function conv(direction) {
      const fA = factorMap[$au.value], fB = factorMap[$bu.value];
      if (direction === 'a-to-b') {
        $b.value = fmt(getNum($a) * fA / fB);
      } else {
        $a.value = fmt(getNum($b) * fB / fA);
      }
    }
    $a.addEventListener('input', () => conv('a-to-b'));
    $b.addEventListener('input', () => conv('b-to-a'));
    $au.addEventListener('change', () => conv('a-to-b'));
    $bu.addEventListener('change', () => conv('a-to-b'));
    document.querySelector(`[data-swap="${prefix}"]`).addEventListener('click', () => {
      const aCode = $au.value, bCode = $bu.value;
      $au.value = bCode; $bu.value = aCode;
      conv('a-to-b');
    });
    conv('a-to-b');
  }

  // ============= TEMPERATURE =============
  // 不是线性的，单独处理
  const $tA  = document.getElementById('t-a-val');
  const $tAu = document.getElementById('t-a-unit');
  const $tB  = document.getElementById('t-b-val');
  const $tBu = document.getElementById('t-b-unit');
  ['C', 'F', 'K'].forEach(u => {
    const lbl = u === 'C' ? '℃ 摄氏度' : u === 'F' ? '℉ 华氏度' : 'K 开尔文';
    const o1 = document.createElement('option'); o1.value = u; o1.textContent = lbl; $tAu.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = u; o2.textContent = lbl; $tBu.appendChild(o2);
  });
  $tAu.value = 'F'; $tBu.value = 'C';

  // 任意 → ℃ → 任意
  function toCelsius(v, u) {
    if (u === 'C') return v;
    if (u === 'F') return (v - 32) * 5 / 9;
    if (u === 'K') return v - 273.15;
    return v;
  }
  function fromCelsius(c, u) {
    if (u === 'C') return c;
    if (u === 'F') return c * 9 / 5 + 32;
    if (u === 'K') return c + 273.15;
    return c;
  }
  function convT(direction) {
    if (direction === 'a-to-b') {
      const c = toCelsius(getNum($tA), $tAu.value);
      $tB.value = fmt(fromCelsius(c, $tBu.value), 2);
    } else {
      const c = toCelsius(getNum($tB), $tBu.value);
      $tA.value = fmt(fromCelsius(c, $tAu.value), 2);
    }
  }
  $tA.addEventListener('input', () => convT('a-to-b'));
  $tB.addEventListener('input', () => convT('b-to-a'));
  $tAu.addEventListener('change', () => convT('a-to-b'));
  $tBu.addEventListener('change', () => convT('a-to-b'));
  document.querySelector('[data-swap="t"]').addEventListener('click', () => {
    const aCode = $tAu.value, bCode = $tBu.value;
    $tAu.value = bCode; $tBu.value = aCode;
    convT('a-to-b');
  });
  document.querySelectorAll('[data-t-quick]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [val, unit] = btn.dataset.tQuick.split(',');
      $tAu.value = unit;
      $tA.value = val;
      // 默认转 ℃
      $tBu.value = unit === 'C' ? 'F' : 'C';
      convT('a-to-b');
    });
  });
  convT('a-to-b');

  // 启动
  initCurrency();
})();
</script>
