<style>
  /* ─── 全局 ─────────────────────────────────────────────────────── */
  .dg-wrap { max-width: 920px; margin: 0 auto; padding: 1.4rem 1rem 4rem; }
  .dg-header { text-align: center; margin-bottom: 1.2rem; }
  .dg-header h1 { font-size: 1.7rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .dg-header p { color: var(--color-light); font-style: normal; margin: 0; font-size: 0.92rem; }
  .dg-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 14px;
    padding: 1.1rem 1.1rem;
    margin-bottom: 1rem;
  }
  .dg-card h3 { margin: 0 0 0.7rem; color: var(--color-ink); font-size: 1.02rem; }

  .dg-btn {
    padding: 0.55rem 1.2rem;
    font: inherit; font-size: 0.95rem; font-weight: 600;
    border: none; border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .dg-btn.primary { background: var(--color-accent); color: #fff; box-shadow: 0 3px 10px rgba(30,58,95,0.22); }
  @media (hover: hover) {
    .dg-btn.primary:hover { transform: translateY(-1px); }
  }
  .dg-btn.primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .dg-btn.ghost { background: transparent; color: var(--color-muted); border: 1px solid var(--color-border); }
  @media (hover: hover) {
    .dg-btn.ghost:hover { color: var(--color-accent); border-color: var(--color-accent); }
  }
  .dg-btn.danger { background: #b07c75; color: #fff; }
  @media (hover: hover) {
    .dg-btn.danger:hover { background: #a93226; }
  }
  .dg-btn.tiny { padding: 0.2rem 0.6rem; font-size: 0.8rem; font-weight: 500; }

  .dg-input, .dg-select {
    width: 100%;
    padding: 0.55rem 0.8rem;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    background: var(--color-bg);
    color: var(--color-ink);
    font: inherit; font-size: 0.95rem;
    box-sizing: border-box;
  }
  .dg-input:focus, .dg-select:focus { outline: none; border-color: var(--color-accent); }
  .dg-label { display: block; font-size: 0.85rem; color: var(--color-light); margin-bottom: 0.3rem; margin-top: 0.6rem; }
  .dg-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }

  /* ─── Landing ─────────────────────────────────────────────────── */
  .dg-hero { text-align: center; padding: 1.4rem 0 1rem; }
  .dg-hero-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1rem;
  }
  .dg-hero-actions .dg-btn { width: 100%; padding: 0.9rem 0.6rem; font-size: 1rem; }
  .dg-tip {
    margin-top: 1rem; padding: 0.7rem 0.9rem;
    background: var(--color-bg-warm); border-radius: 10px;
    color: var(--color-muted); font-size: 0.85rem; line-height: 1.6;
  }
  .dg-resume {
    margin-top: 1rem; padding: 0.7rem 0.9rem;
    border: 1px dashed var(--color-accent);
    border-radius: 10px; text-align: center;
  }

  /* ─── 房号 banner ─────────────────────────────────────────────── */
  .dg-room-banner {
    display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
    padding: 0.8rem 1rem; margin-bottom: 1rem;
    background: linear-gradient(135deg, var(--color-accent) 0%, #4d6e96 100%);
    color: #fff; border-radius: 14px;
  }
  .dg-room-banner .label { font-size: 0.78rem; opacity: 0.85; }
  .dg-room-banner .code { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.15em; }
  .dg-room-banner .actions { margin-left: auto; display: flex; gap: 0.4rem; }
  .dg-room-banner .actions .dg-btn { background: rgba(255,255,255,0.18); color: #fff; border: none; }
  @media (hover: hover) {
    .dg-room-banner .actions .dg-btn:hover { background: rgba(255,255,255,0.3); }
  }

  /* ─── Lobby player list ───────────────────────────────────────── */
  .dg-player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
  .dg-player {
    position: relative;
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.5rem 0.7rem;
    background: var(--color-bg-warm);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    font-size: 0.9rem;
  }
  .dg-player.me { border-color: var(--color-accent); background: rgba(94, 121, 156, 0.08); }
  .dg-player.host .seat-num { background: #d4a017; }
  .dg-player.offline { opacity: 0.5; }
  .dg-player .seat-num {
    flex: none; width: 22px; height: 22px;
    background: var(--color-muted); color: #fff;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 600;
  }
  .dg-player .nick { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dg-player .score { flex: none; color: var(--color-accent); font-weight: 700; font-size: 0.88rem; }

    background: transparent; color: var(--color-muted); border: none;
    cursor: pointer; font-size: 0.9rem;
  }
  @media (hover: hover) {
    .dg-player .kick:hover { color: #b07c75; }
  }
  .dg-player .crown { flex: none; font-size: 0.78rem; color: #d4a017; }
  .dg-player .pen { flex: none; font-size: 0.85rem; }

  /* ─── Play view ───────────────────────────────────────────────── */
  .dg-topbar {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.7rem 0.9rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    margin-bottom: 0.7rem;
  }
  .dg-topbar .round-pill {
    padding: 0.2rem 0.6rem;
    background: var(--color-bg-warm);
    border-radius: 999px;
    font-size: 0.82rem; color: var(--color-muted);
  }
  .dg-topbar .countdown {
    padding: 0.2rem 0.7rem; border-radius: 999px;
    background: var(--color-accent); color: #fff;
    font-weight: 600; font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
  }
  .dg-topbar .countdown.warn { background: #e67e22; }
  .dg-topbar .countdown.danger { background: #b07c75; }
  .dg-topbar .word-display {
    flex: 1; text-align: center;
    font-size: 1.1rem; font-weight: 600;
    color: var(--color-ink);
    letter-spacing: 0.3em;
  }
  .dg-topbar .word-display.drawer-word {
    color: var(--color-accent); letter-spacing: 0.05em;
  }

  .dg-stage {
    display: grid; grid-template-columns: 1fr 280px; gap: 0.8rem;
  }
  @media (max-width: 720px) {
    .dg-stage { grid-template-columns: 1fr; }
  }
  .dg-canvas-wrap {
    position: relative;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    touch-action: none;
  }
  .dg-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; background: #fff; }
  .dg-canvas.readonly { cursor: default; }
  .dg-canvas-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.92);
    z-index: 5;
    padding: 1rem;
  }
  .dg-canvas-overlay .panel {
    text-align: center;
    max-width: 380px;
  }
  .dg-canvas-overlay h2 {
    margin: 0 0 0.6rem;
    font-size: 1.3rem;
    color: var(--color-ink);
  }
  .dg-canvas-overlay .word-choices {
    display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 0.8rem;
  }
  .dg-canvas-overlay .word-choices button {
    padding: 0.7rem 1.2rem;
    font-size: 1.05rem; font-weight: 600;
    background: var(--color-bg);
    border: 2px solid var(--color-accent);
    border-radius: 12px;
    color: var(--color-accent);
    cursor: pointer;
  }
  @media (hover: hover) {
    .dg-canvas-overlay .word-choices button:hover {
    background: var(--color-accent); color: #fff;
  }
  }
  .dg-canvas-overlay .reveal-word {
    font-size: 1.6rem; font-weight: 700; color: var(--color-accent);
    margin: 0.5rem 0;
  }
  .dg-canvas-overlay .reveal-meta { color: var(--color-muted); font-size: 0.9rem; }

  .dg-toolbar {
    display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
    margin-top: 0.5rem;
    padding: 0.5rem 0.6rem;
    background: var(--color-bg-warm);
    border-radius: 10px;
  }
  .dg-toolbar .swatch {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s;
  }
  @media (hover: hover) {
    .dg-toolbar .swatch:hover { transform: scale(1.1); }
  }
  .dg-toolbar .swatch.active { border-color: var(--color-ink); }
  .dg-toolbar .size-btn {
    padding: 0.2rem 0.5rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .dg-toolbar .size-btn.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .dg-toolbar .tool-spacer { flex: 1; }

  .dg-sidebar {
    display: flex; flex-direction: column; gap: 0.6rem;
    min-height: 0;
  }
  .dg-scoreboard {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 0.6rem 0.7rem;
  }
  .dg-scoreboard h4 { margin: 0 0 0.4rem; font-size: 0.85rem; color: var(--color-muted); font-weight: 600; }
  .dg-scoreboard .row {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.25rem 0;
    font-size: 0.88rem;
    border-bottom: 1px dashed var(--color-border);
  }
  .dg-scoreboard .row:last-child { border-bottom: none; }
  .dg-scoreboard .row.drawer { color: var(--color-accent); font-weight: 600; }
  .dg-scoreboard .row.correct { color: #27ae60; }
  .dg-scoreboard .row.me { background: rgba(94, 121, 156, 0.08); }
  .dg-scoreboard .row .nick { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dg-scoreboard .row .score { flex: none; font-weight: 700; }
  .dg-scoreboard .row .icon { flex: none; font-size: 0.85rem; }

  .dg-chat-input {
    display: flex; gap: 0.3rem;
    padding: 0.45rem 0.55rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
  }
  .dg-chat-input input {
    flex: 1; padding: 0.45rem 0.7rem;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    font: inherit; font-size: 0.9rem;
    background: var(--color-bg);
    color: var(--color-ink);
  }
  .dg-chat-input input:focus { outline: none; border-color: var(--color-accent); }

  .dg-chat-messages {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 0.45rem 0.7rem;
    min-height: 100px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.85rem;
  }
  .dg-chat-messages::-webkit-scrollbar { width: 6px; }
  .dg-chat-messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
  .dg-chat-messages .msg { margin-bottom: 0.22rem; line-height: 1.4; word-wrap: break-word; }
  .dg-chat-messages .msg.system { color: var(--color-muted); font-style: normal; font-size: 0.8rem; }
  .dg-chat-messages .msg.system.correct-cheer { color: #27ae60; font-style: normal; font-weight: 600; }
  .dg-chat-messages .msg.guess .nick { color: var(--color-accent); font-weight: 600; }
  .dg-chat-messages .msg.chat .nick { color: var(--color-light); font-weight: 600; }
  .dg-chat-messages .msg.chat-after .nick { color: #27ae60; font-weight: 600; }
  .dg-chat-messages .msg.chat-after { opacity: 0.85; }
  .dg-chat-messages .msg .nick::after { content: '：'; }

  .dg-modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .dg-modal {
    background: var(--color-bg);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    max-width: 460px; width: 100%;
  }
  .dg-modal h3 { margin: 0 0 0.7rem; font-size: 1.1rem; color: var(--color-ink); }
  .dg-modal .body { color: var(--color-muted); font-size: 0.92rem; line-height: 1.5; margin-bottom: 1rem; }
  .dg-modal .actions { display: flex; gap: 0.5rem; justify-content: flex-end; flex-wrap: wrap; }

  /* ─── Toast ───────────────────────────────────────────────────── */
  .dg-toast {
    position: fixed; left: 50%; top: 1.4rem;
    transform: translateX(-50%);
    padding: 0.6rem 1.1rem;
    background: rgba(0,0,0,0.78); color: #fff;
    border-radius: 10px; font-size: 0.9rem;
    z-index: 2000;
    animation: dg-toast-in 0.2s ease-out;
  }
  @keyframes dg-toast-in {
    from { opacity: 0; transform: translate(-50%, -10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ─── End view ────────────────────────────────────────────────── */
  .dg-final-list { padding: 0; margin: 0.7rem 0 0; list-style: none; }
  .dg-final-list li {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.5rem 0.7rem;
    background: var(--color-bg-warm);
    border-radius: 10px;
    margin-bottom: 0.4rem;
    font-size: 0.95rem;
  }
  .dg-final-list li.rank-1 { background: linear-gradient(135deg, #ffe69c, #ffcc4d); font-weight: 600; }
  .dg-final-list li.rank-2 { background: linear-gradient(135deg, #e0e0e0, #c0c0c0); font-weight: 600; }
  .dg-final-list li.rank-3 { background: linear-gradient(135deg, #f3c89c, #cd7f32); color: #fff; font-weight: 600; }
  .dg-final-list .rank { width: 28px; text-align: center; font-weight: 700; }
  .dg-final-list .nick { flex: 1; }
  .dg-final-list .score { font-weight: 700; }
</style>
