<link rel="stylesheet" href="/assets/css/games-shell.css">

<style>
  /* ============================================================
     掼蛋 调色板：与主站协调
     - 牌桌：浅奶油羊皮纸 + 暖金细边（呼应斗地主页）
     - 卡片：奶白纸面，暖金边框，红 #8b2e2e / 黑 #1a1a2e
     - 强调色：暖金 #c9a96e（同 --color-highlight）
     ============================================================ */
  .guandan-wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 1rem;
    --gs-wrap-half: 440px;
    --gd-card-w: 50px;
    --gd-card-h: 72px;
    --gd-card-overlap: 28px;
    --gd-card-mini-w: 34px;
    --gd-card-mini-h: 50px;
    --gd-card-mini-overlap: 20px;
    --gd-card-bg: #fafaf9;
    --gd-card-bg-2: #f5f4f0;
    --gd-card-border: rgba(201,169,110,0.55);
    --gd-suit-red: #8b2e2e;
    --gd-suit-black: #1a1a2e;
    --gd-felt-1: #f5f1e6;
    --gd-felt-2: #ebe5d3;
    --gd-felt-3: #ddd5be;
    --gd-frame: #c9a96e;
    --gd-frame-2: rgba(201,169,110,0.55);
    --gd-text-on-felt: #1f2a3d;
    --gd-text-on-felt-mute: rgba(31,42,61,0.62);
    --gd-accent: #c9a96e;
    --gd-accent-strong: #a87a2a;
    --gd-joker-red: #8b2e2e;
    --gd-joker-grey: #4a4a4a;
    --gd-team-you: #1e6f4f;
    --gd-team-opp: #8b2e2e;
  }
  :root[data-theme="dark"] .guandan-wrap {
    --gd-card-bg: #ece8de;
    --gd-card-bg-2: #ddd6c5;
    --gd-felt-1: #ebe4ce;
    --gd-felt-2: #ddd4b7;
    --gd-felt-3: #cbbfa0;
    --gd-joker-grey: #3a3a3a;
  }

  .guandan-wrap header { text-align: center; margin-bottom: 0.8rem; }
  .guandan-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .guandan-wrap header .sub { color: var(--color-light); font-style: normal; font-size: 0.92rem; }

  /* ======== 级牌角标：原来横放在表格上方占 ~85px，现在挤到牌桌左上角小气泡里 ======== */
  .gd-levelbar-corner {
    position: absolute;
    top: 0.55rem; left: 0.6rem;
    display: flex; gap: 0.35rem;
    z-index: 4;
    pointer-events: none;
  }
  .gd-level-chip {
    display: flex; flex-direction: row; align-items: baseline; gap: 0.3rem;
    padding: 0.18rem 0.55rem;
    border: 1px solid var(--color-border);
    background: rgba(255,255,255,0.6);
    border-radius: 999px;
    font-family: var(--font-body);
  }
  .gd-level-chip .lab {
    font-size: 0.66rem; color: var(--color-muted);
    letter-spacing: 0.02em;
  }
  .gd-level-chip .val {
    font-size: 0.95rem; font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .gd-level-chip.you { border-color: var(--gd-team-you); }
  .gd-level-chip.you .val { color: var(--gd-team-you); }
  .gd-level-chip.opp { border-color: var(--gd-team-opp); }
  .gd-level-chip.opp .val { color: var(--gd-team-opp); }
  /* 当前主级用一颗右侧亮点提示，比写"◀ 当前主级"省地方又一目了然 */
  .gd-level-chip.acting::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gd-accent-strong);
    box-shadow: 0 0 6px rgba(168,122,42,0.85);
    margin-left: 0.15rem;
    align-self: center;
  }

  /* ======== 牌桌 ======== */
  .gd-table {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(255,253,245,0.45) 0%, transparent 60%),
      linear-gradient(160deg, var(--gd-felt-1) 0%, var(--gd-felt-2) 65%, var(--gd-felt-3) 100%);
    border: 1px solid var(--gd-frame-2);
    border-radius: 14px;
    padding: 0.6rem 0.8rem 0.55rem;
    box-shadow: inset 0 0 40px rgba(141,110,55,0.10);
    min-height: 360px;
  }

  /* 三家：上(partner) / 左(opp 3) / 右(opp 1) */
  .gd-seats-top { display: flex; justify-content: center; margin-bottom: 0.25rem; }
  /* 中间一行高度写死：预留三家出牌区的纵向空间，避免开局 → 出牌后整张表延展 */
  .gd-seats-mid {
    display: flex; justify-content: space-between; align-items: stretch;
    gap: 0.5rem; height: 150px;
  }
  .gd-side { display: flex; flex-direction: column; align-items: center; width: 92px; flex: 0 0 auto; }
  .gd-center {
    flex: 1 1 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.3rem; padding: 0 0.3rem;
  }

  .gd-seat {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.15rem; transition: opacity 0.2s;
  }
  .gd-seat.dim { opacity: 0.45; }
  .gd-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    background: var(--color-bg);
    border: 2px solid var(--color-border);
    position: relative;
  }
  .gd-seat.turn .gd-avatar {
    border-color: var(--gd-accent);
    box-shadow: 0 0 0 3px rgba(201,169,110,0.35);
    animation: gd-pulse 1.1s ease-in-out infinite;
  }
  @keyframes gd-pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(201,169,110,0.30); }
    50%     { box-shadow: 0 0 0 6px rgba(201,169,110,0.12); }
  }
  .gd-avatar.team-you { border-color: var(--gd-team-you); }
  .gd-avatar.team-opp { border-color: var(--gd-team-opp); }
  .gd-clock {
    position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    font-size: 0.62rem; background: var(--gd-accent-strong); color: #fff;
    padding: 0 0.3rem; border-radius: 999px; font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .gd-name { font-size: 0.76rem; color: var(--gd-text-on-felt); font-weight: 600; }
  .gd-name .tag {
    font-size: 0.62rem; color: var(--gd-text-on-felt-mute); font-weight: 400;
  }
  .gd-count {
    font-size: 0.72rem; color: var(--gd-text-on-felt-mute);
    background: rgba(255,255,255,0.5); border: 1px solid var(--gd-frame-2);
    padding: 0.05rem 0.45rem; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .gd-rank-badge {
    font-size: 0.66rem; padding: 0.05rem 0.4rem; border-radius: 999px;
    color: #fff; font-weight: 600;
  }
  .gd-rank-badge.r1 { background: #c9a227; }
  .gd-rank-badge.r2 { background: #6b8f9c; }
  .gd-rank-badge.r3 { background: #b0784a; }
  .gd-rank-badge.r4 { background: #8b2e2e; }

  /* 出牌区：height 写死，避免开局空 → 有牌时整张表向下延展。
     宽方向若多于 5 张的炸弹会超出，但概率低，宽侧 overflow:hidden 兜底。 */
  .gd-played {
    height: 60px; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    overflow: hidden;
  }
  .gd-played-row {
    display: flex; flex-wrap: nowrap;
    justify-content: center; align-items: center;
  }
  .gd-played-row .gd-card.size-mini { margin-left: calc(-1 * var(--gd-card-mini-overlap)); }
  .gd-played-row .gd-card.size-mini:first-child { margin-left: 0; }
  .gd-side .gd-played { height: 60px; }
  .gd-side .gd-played-row .gd-card.size-mini { margin-left: -22px; }
  .gd-side .gd-played-row .gd-card.size-mini:first-child { margin-left: 0; }

  /* ======== 卡片自绘 ======== */
  .gd-card {
    display: inline-block;
    background: linear-gradient(160deg, var(--gd-card-bg) 0%, var(--gd-card-bg-2) 100%);
    border: 1px solid var(--gd-card-border);
    border-radius: 5px;
    box-shadow: 0 1px 3px rgba(20,37,63,0.18), inset 0 0 0 1px rgba(255,255,255,0.55);
    position: relative;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .gd-card.suit-red { color: var(--gd-suit-red); }
  .gd-card.suit-black { color: var(--gd-suit-black); }
  .gd-card .corner {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    line-height: 1;
    font-family: 'Cormorant Garamond', Georgia, "Songti SC", serif;
  }
  .gd-card .corner.tl { top: 4px; left: 5px; }
  .gd-card .corner.br { bottom: 4px; right: 5px; transform: rotate(180deg); }
  .gd-card .corner .rk { font-weight: 700; }
  .gd-card .pip {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: "Apple Symbols", "Segoe UI Symbol", "Noto Sans Symbols", monospace;
    opacity: 0.92;
  }
  .gd-card.size-full { width: var(--gd-card-w); height: var(--gd-card-h); }
  .gd-card.size-full .corner .rk { font-size: 14px; }
  .gd-card.size-full .corner .su { font-size: 10px; margin-top: 1px; }
  .gd-card.size-full .pip { font-size: 26px; }
  .gd-card.size-mini { width: var(--gd-card-mini-w); height: var(--gd-card-mini-h); }
  .gd-card.size-mini .corner .rk { font-size: 10px; }
  .gd-card.size-mini .corner .su { font-size: 8px; }
  .gd-card.size-mini .pip { font-size: 18px; }
  .gd-card.is-joker .pip {
    display: flex; flex-direction: column; align-items: center;
    line-height: 1; gap: 2px; font-family: var(--font-body); opacity: 1;
  }
  .gd-card.is-joker .pip .joker-text { font-weight: 800; letter-spacing: 1px; }
  .gd-card.is-joker .pip .joker-icon { font-family: "Apple Symbols", "Segoe UI Symbol", monospace; }
  .gd-card.is-joker .corner .rk { font-weight: 400; }
  .gd-card.is-joker .corner .su { display: none; }
  .gd-card.joker-big { color: var(--gd-joker-red); }
  .gd-card.joker-small { color: var(--gd-joker-grey); }
  .gd-card.size-full.is-joker .pip .joker-text { font-size: 8px; }
  .gd-card.size-full.is-joker .pip .joker-icon { font-size: 20px; }
  .gd-card.size-mini.is-joker .pip .joker-text { font-size: 6px; }
  .gd-card.size-mini.is-joker .pip .joker-icon { font-size: 14px; }
  .gd-card.is-wild {
    box-shadow: 0 0 0 2px rgba(201,162,39,0.85), 0 1px 3px rgba(20,37,63,0.18);
  }
  .gd-card.is-wild::after {
    content: '配'; position: absolute; top: 2px; right: 3px;
    font-size: 8px; color: var(--gd-accent-strong); font-weight: 700;
    background: rgba(255,255,255,0.7); border-radius: 3px; padding: 0 1px;
  }
  .gd-card-back {
    display: inline-block;
    width: var(--gd-card-mini-w); height: var(--gd-card-mini-h);
    border-radius: 5px; border: 1px solid var(--gd-frame);
    background:
      radial-gradient(circle at 50% 50%, rgba(201,169,110,0.40) 0%, transparent 50%),
      repeating-linear-gradient(45deg, rgba(201,169,110,0.16) 0 4px, transparent 4px 8px),
      linear-gradient(160deg, #2a4768 0%, #15253f 100%);
    position: relative;
  }
  .gd-card-back::after {
    content: '♦'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(201,169,110,0.88); font-size: 16px;
  }

  /* ======== 我的座位（左下角，参照斗地主）+ 手牌（中下）========
     把"我"挪到左下角，把视觉中心让给牌桌中央的出牌/trick 信息；
     手牌仍然居中，27 张时左右都有富余空间不会盖住头像。 */
  .gd-self-bar {
    display: flex; align-items: center; gap: 0.55rem;
    position: absolute;
    left: 0.9rem;
    bottom: 4.4rem;   /* 与手牌纵向中线齐高，再往下让出位置给 actions */
    z-index: 3;
  }
  .gd-self-bar .gd-name { font-size: 0.8rem; line-height: 1.25; }
  .gd-self-bar .gd-name .tag { font-size: 0.66rem; }
  /* 按"点数"竖向堆叠成列；列内每张牌往下错开一个角的高度，露出 rank+suit 角标。
     列横向并排（手牌多于屏宽时可滚）。长按某列可以拖到新位置，自定义理牌顺序；
     单击/拖选则照常多选。 */
  .gd-hand {
    --gd-stack-step: 22px;       /* 列内每张牌的纵向偏移 */
    --gd-col-gap: 4px;           /* 列之间的横向间距 */
    display: flex; flex-wrap: nowrap;
    align-items: flex-start;
    gap: var(--gd-col-gap);
    overflow-x: auto; overflow-y: visible;
    padding: 0.4rem 0.4rem 0.5rem;
    min-height: calc(var(--gd-card-h) + 6 * var(--gd-stack-step) + 10px);
    justify-content: safe center;
    scrollbar-width: none;
    touch-action: pan-x;
    position: relative;
  }
  .gd-hand::-webkit-scrollbar { display: none; }
  .gd-rank-col {
    position: relative;
    width: var(--gd-card-w);
    flex: 0 0 var(--gd-card-w);
    transition: transform 0.14s ease;
    cursor: grab;
  }
  .gd-rank-col.col-dragging {
    cursor: grabbing;
    z-index: 30;
    transform: translateY(-4px) scale(1.04);
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.25));
  }
  .gd-rank-col .gd-card.size-full {
    position: absolute;
    left: 0;
    margin: 0;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    /* 列叠放时不再需要 group-start 间距 */
  }
  /* 选中态：参考斗地主的"出过的牌"视觉——灰化 + 半透明，不上抬不挪位。
     好处：堆叠的列布局里牌的位置稳定（上抬会"穿过"上一张），
     滑动框选时也不会出现"高度跳变"打断手感。 */
  .gd-rank-col .gd-card.size-full.selected {
    filter: grayscale(0.95) brightness(0.62);
    opacity: 0.58;
    box-shadow: inset 0 0 0 2px var(--gd-accent), 0 1px 3px rgba(20,37,63,0.18);
  }
  /* 拖列时的插入位置指示条 */
  .gd-col-gap-marker {
    position: absolute;
    top: 4px; bottom: 4px;
    width: 3px;
    background: var(--gd-accent);
    border-radius: 2px;
    pointer-events: none;
    z-index: 31;
    box-shadow: 0 0 8px var(--gd-accent);
  }

  .gd-actions {
    display: flex; gap: 0.55rem; justify-content: center;
    flex-wrap: wrap; margin-top: 0.4rem; min-height: 2.4rem;
  }
  .gd-btn {
    padding: 0.5rem 1.1rem; font-size: 0.92rem;
    border: 1px solid var(--color-border); background: var(--color-bg);
    border-radius: 8px; cursor: pointer; color: var(--color-ink);
    transition: all 0.16s; font-family: inherit;
  }
  @media (hover: hover) {
    .gd-btn:hover:not(:disabled) { border-color: var(--color-accent); color: var(--color-accent); }
  }
  .gd-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .gd-btn.primary {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
    font-weight: 600;
  }
  @media (hover: hover) {
    .gd-btn.primary:hover:not(:disabled) { filter: brightness(1.08); color: #fff; }
  }
  .gd-btn.mini { padding: 0.32rem 0.7rem; font-size: 0.8rem; }
  /* 理牌按钮亮起态：颜色继承斗地主 toggle chip 的视觉语言 */
  .gd-btn.on {
    background: var(--gd-accent);
    border-color: var(--gd-accent);
    color: #fff;
  }
  .gd-btn.on:hover:not(:disabled) { color: #fff; filter: brightness(1.08); }

  /* 理牌模式下：列整体可拖；hand 上方加一行金色提示；列 hover 时微微抬升提示可抓 */
  .gd-hand.is-arranging .gd-rank-col { cursor: grab; }
  .gd-hand.is-arranging .gd-rank-col.col-dragging { cursor: grabbing; }
  @media (hover: hover) {
    .gd-hand.is-arranging .gd-rank-col:hover { transform: translateY(-3px); }
  }
  .gd-hand.is-arranging::before {
    content: '⇆ 拖动列调整顺序，再点"理牌"退出';
    position: absolute;
    top: -2px; left: 50%; transform: translateX(-50%);
    font-size: 0.74rem; color: var(--gd-accent-strong);
    background: rgba(255,255,255,0.7);
    padding: 0.1rem 0.7rem;
    border-radius: 999px;
    border: 1px solid var(--gd-frame-2);
    pointer-events: none;
    font-family: var(--font-body);
    white-space: nowrap;
    z-index: 5;
  }
  /* 理牌模式下：把上一次出牌的"选中（灰）"视觉抑制掉——理牌不是在选要出的牌 */
  .gd-hand.is-arranging .gd-card.size-full.selected {
    filter: none;
    opacity: 1;
    box-shadow: 0 1px 3px rgba(20,37,63,0.18), inset 0 0 0 1px rgba(255,255,255,0.55);
  }

  /* ======== 浮层（贡牌 / 回合结算 / 整局结束） ======== */
  .gd-overlay {
    position: absolute; inset: 0; z-index: 12;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(13,24,43,0.80) 0%, rgba(13,24,43,0.62) 100%);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    border-radius: 14px; padding: 1rem; text-align: center;
  }
  .gd-overlay.open { display: flex; }
  .gd-overlay .panel {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.2rem 1.4rem; max-width: 440px; width: 100%;
    max-height: 86vh; overflow-y: auto;
    box-shadow: 0 8px 28px rgba(13,24,43,0.4);
  }
  .gd-overlay h2 { color: var(--color-ink); margin-bottom: 0.6rem; font-size: 1.3rem; }
  .gd-overlay .sub { color: var(--color-muted); font-size: 0.9rem; margin-bottom: 0.9rem; }
  .gd-rank-list { list-style: none; padding: 0; margin: 0 0 1rem; }
  .gd-rank-list li {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.45rem 0.7rem; border: 1px solid var(--color-border);
    border-radius: 8px; margin-bottom: 0.4rem; text-align: left;
  }
  .gd-rank-list li .pos { font-weight: 700; min-width: 2.6em; color: var(--color-ink); }
  .gd-rank-list li .who { flex: 1; color: var(--color-ink); }
  .gd-rank-list li .who small { color: var(--color-muted); }
  .gd-rank-list li.win-team { background: rgba(30,111,79,0.08); border-color: var(--gd-team-you); }
  .gd-tribute-card { display: inline-flex; vertical-align: middle; margin: 0 0.2rem; }
  .gd-tribute-pick { display: flex; flex-wrap: wrap; gap: 0.3rem; justify-content: center; margin: 0.6rem 0; }
  .gd-tribute-pick .gd-card { cursor: pointer; }
  .gd-tribute-pick .gd-card.selected {
    box-shadow: 0 0 0 2px var(--gd-accent), 0 2px 6px rgba(0,0,0,0.25);
    transform: translateY(-6px);
  }

  /* ======== Pre-game overlay 难度小结 ======== */
  .gd-pgo-stats {
    display: flex; gap: 0.5rem; justify-content: center;
    margin: 0.4rem 0 0.2rem; flex-wrap: wrap;
  }
  .gd-pgo-stat {
    font-size: 0.78rem; color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.08);
    padding: 0.25rem 0.7rem; border-radius: 999px;
  }
  .gd-pgo-stat strong { color: #fff; }

  /* ======== about 规则块（内联，照 snake） ======== */
  .guandan-wrap details.about {
    max-width: 600px; margin: 1.4rem auto 0;
    border: 1px solid var(--color-border); border-radius: 10px;
    background: var(--color-bg-warm); overflow: hidden;
  }
  .guandan-wrap details.about summary {
    cursor: pointer; padding: 0.7rem 1rem;
    font-weight: 600; color: var(--color-ink);
    list-style: none;
  }
  .guandan-wrap details.about summary::-webkit-details-marker { display: none; }
  .guandan-wrap details.about summary::before { content: '📖 '; }
  .guandan-wrap details.about[open] summary { border-bottom: 1px solid var(--color-border); }
  .guandan-wrap details.about .body {
    padding: 0.8rem 1.1rem; font-size: 0.88rem;
    color: var(--color-muted); line-height: 1.7;
  }
  .guandan-wrap details.about .body strong { color: var(--color-ink); }
  .guandan-wrap details.about .body code {
    background: var(--color-bg); padding: 0.05rem 0.3rem;
    border-radius: 4px; font-size: 0.85em;
  }

  /* ======== 响应式 ======== */
  @media (max-width: 560px) {
    .guandan-wrap { padding: 0.7rem; }
    .guandan-wrap header h1 { font-size: 1.6rem; }
    .guandan-wrap {
      --gd-card-w: 40px;
      --gd-card-h: 58px;
      --gd-card-overlap: 23px;
      --gd-card-mini-w: 28px;
      --gd-card-mini-h: 41px;
      --gd-card-mini-overlap: 17px;
    }
    .gd-side { width: 64px; }
    .gd-table { padding: 0.55rem; }
    /* 窄屏：手牌占满整宽，左下角放不下头像 —— 回到 in-flow 居中 */
    .gd-self-bar {
      position: static;
      margin: 0.5rem 0 0.3rem;
      justify-content: center;
    }
  }
  @media (max-width: 380px) {
    .guandan-wrap { --gd-card-w: 34px; --gd-card-h: 50px; --gd-card-overlap: 20px; }
  }

  .gd-toast {
    position: fixed; left: 50%; bottom: 18%; transform: translateX(-50%);
    background: rgba(13,24,43,0.92); color: #fff;
    padding: 0.55rem 1.1rem; border-radius: 999px;
    font-size: 0.9rem; z-index: 60; pointer-events: none;
    opacity: 0; transition: opacity 0.25s;
  }
  .gd-toast.show { opacity: 1; }

  /* ======== 大字"不要"浮窗（替代以前的虚线 tag）========
     仿欢乐斗地主：玩家弃出时不画小角标，而是在出牌位置浮一行大字，
     0.9 秒后稳态停留为更小的标签。 */
  .gd-pass-big {
    font-family: var(--font-display);
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--gd-suit-red);
    letter-spacing: 0.1em;
    text-shadow: 0 1px 0 #fff5d4, 0 2px 8px rgba(139,46,46,0.32);
    padding: 0.15rem 0.85rem;
    animation: gd-pass-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  @keyframes gd-pass-pop {
    0%   { opacity: 0; transform: scale(0.4) rotate(-8deg); }
    60%  { opacity: 1; transform: scale(1.15) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* ======== 炸弹/同花顺/天王炸：起牌区红闪 + 整桌震屏 + 顶上大字 ======== */
  .gd-played.fx-bomb {
    background: radial-gradient(ellipse at center, rgba(200,40,40,0.28) 0%, transparent 70%);
    animation: gd-shake 0.5s, gd-bomb-flash 0.7s ease-out;
    border-radius: 8px;
  }
  .gd-played.fx-strflush {
    background: radial-gradient(ellipse at center, rgba(245,178,80,0.32) 0%, transparent 70%);
    animation: gd-shake 0.45s, gd-bomb-flash 0.7s ease-out;
    border-radius: 8px;
  }
  .gd-played.fx-jokerbomb {
    background: radial-gradient(ellipse at center, rgba(255,225,140,0.55) 0%, rgba(245,178,80,0.30) 40%, transparent 80%);
    animation: gd-shake-strong 0.8s, gd-bomb-flash 1.1s ease-out;
    border-radius: 8px;
  }
  @keyframes gd-shake {
    0%, 100% { transform: translateX(0); }
    18% { transform: translateX(-5px); }
    32% { transform: translateX(5px); }
    50% { transform: translateX(-3px); }
    66% { transform: translateX(3px); }
    82% { transform: translateX(-2px); }
  }
  @keyframes gd-shake-strong {
    0%, 100% { transform: translate(0, 0); }
    10%  { transform: translate(-9px, 4px) rotate(-0.4deg); }
    22%  { transform: translate(9px, -5px) rotate(0.5deg); }
    34%  { transform: translate(-7px, 5px) rotate(-0.3deg); }
    48%  { transform: translate(6px, -4px); }
    62%  { transform: translate(-4px, 3px); }
    78%  { transform: translate(3px, -2px); }
    92%  { transform: translate(-1px, 1px); }
  }
  @keyframes gd-bomb-flash {
    0%   { box-shadow: inset 0 0 0 rgba(200,40,40,0); }
    50%  { box-shadow: inset 0 0 30px rgba(200,40,40,0.55); }
    100% { box-shadow: inset 0 0 0 rgba(200,40,40,0); }
  }
  /* 桌面整体震屏（天王炸时短促） */
  .gd-table.mega-quake { animation: gd-mega-quake 0.9s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
  @keyframes gd-mega-quake {
    0%   { transform: translate(0, 0); }
    8%   { transform: translate(-10px, 5px) rotate(-0.3deg); }
    18%  { transform: translate(10px, -7px) rotate(0.4deg); }
    32%  { transform: translate(-8px, 6px); }
    48%  { transform: translate(6px, -4px); }
    66%  { transform: translate(-4px, 3px); }
    82%  { transform: translate(2px, -2px); }
    100% { transform: translate(0, 0); }
  }

  /* 全桌中央"炸弹/同花顺/天王炸"大字浮屏：1.0 s 出现 + 渐隐 */
  .gd-fx-banner {
    position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 2.6rem;
    color: #fff;
    text-shadow:
      0 0 8px rgba(255, 220, 100, 0.9),
      0 0 24px rgba(245, 130, 40, 0.85),
      0 4px 10px rgba(0, 0, 0, 0.6);
    letter-spacing: 0.18em;
    pointer-events: none;
    z-index: 40;
    animation: gd-fx-banner 1.1s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes gd-fx-banner {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-6deg); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(0deg); }
    55%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* ======== 全屏切换 chip（左上方），与斗地主一致 ========
     不用浏览器 Fullscreen API（桌面易把整窗进入全屏；iOS Safari 等基本不支持），
     而是给 body 加 .gd-game-fullscreen 类，让 .guandan-wrap fixed 铺满 viewport。 */
  .guandan-wrap header { position: relative; }
  .gd-fullscreen-toggle {
    position: absolute; top: 0.6rem; left: 0.6rem;
    padding: 0.28rem 0.65rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    color: var(--color-muted);
    border-radius: 999px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.18s;
    z-index: 5;
  }
  @media (hover: hover) {
    .gd-fullscreen-toggle:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }
  .gd-fullscreen-toggle.on {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
  }

  body.gd-game-fullscreen { overflow: hidden; }
  body.gd-game-fullscreen .guandan-wrap {
    position: fixed;
    inset: 0;
    z-index: 9999;
    margin: 0;
    padding: 0.6rem 0.6rem 0.4rem;
    background: var(--color-bg);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    max-width: none;
  }
  body.gd-game-fullscreen .guandan-wrap header { margin-bottom: 0.3rem; }
  body.gd-game-fullscreen .guandan-wrap header h1 { font-size: 1.2rem; }
  body.gd-game-fullscreen .guandan-wrap header .sub { display: none; }
  body.gd-game-fullscreen .gd-table { margin: 0 auto; max-width: 1100px; }
  body.gd-game-fullscreen .guandan-wrap details.about,
  body.gd-game-fullscreen #gd-wlb-mount,
  body.gd-game-fullscreen #gd-cm-mount,
  body.gd-game-fullscreen #gd-nick-mount { display: none !important; }
</style>

<div class="guandan-wrap">
  <header>
    <button type="button" class="gd-fullscreen-toggle" id="gdFullscreenToggle" title="切换全屏">⛶ 全屏</button>
    <h1>🀄 掼蛋</h1>
    <div class="sub">2 打 2 · 你与对家联手，打级牌到 A 取胜 · 三档 AI</div>
  </header>

  <div class="gd-table" id="gdTable">

    <!-- 级牌信息：占左上角小角标，节省纵向空间。当前主级用一颗亮点提示 -->
    <div class="gd-levelbar-corner">
      <div class="gd-level-chip you" id="gdChipYou"><span class="lab">我方</span><span class="val" id="gdLevelYou">2</span></div>
      <div class="gd-level-chip opp" id="gdChipOpp"><span class="lab">对方</span><span class="val" id="gdLevelOpp">2</span></div>
    </div>

    <!-- 上家：对家 -->
    <div class="gd-seats-top">
      <div class="gd-seat" id="gdSeat2" data-seat="2">
        <div class="gd-avatar team-you" id="gdAv2">🤝<span class="gd-clock" id="gdClk2" hidden></span></div>
        <div class="gd-name">对家 <span class="tag">AI</span></div>
        <div style="display:flex;gap:0.3rem;align-items:center;">
          <span class="gd-count" id="gdCnt2">27</span>
          <span class="gd-rank-badge" id="gdRk2" hidden></span>
        </div>
      </div>
    </div>

    <div class="gd-seats-mid">
      <!-- 左：下家上手（座位 3，对手） -->
      <div class="gd-side">
        <div class="gd-seat" id="gdSeat3" data-seat="3">
          <div class="gd-avatar team-opp" id="gdAv3">🐱<span class="gd-clock" id="gdClk3" hidden></span></div>
          <div class="gd-name">对手·左 <span class="tag">AI</span></div>
          <div style="display:flex;gap:0.3rem;align-items:center;">
            <span class="gd-count" id="gdCnt3">27</span>
            <span class="gd-rank-badge" id="gdRk3" hidden></span>
          </div>
        </div>
        <div class="gd-played" id="gdPlay3"></div>
      </div>

      <!-- 中央出牌区：上=对家最近一手，下=我最近一手；中间不再放文字提示 -->
      <div class="gd-center">
        <div class="gd-played" id="gdPlay2"></div>
        <div class="gd-played" id="gdPlay0Center"></div>
      </div>

      <!-- 右：上家（座位 1，对手） -->
      <div class="gd-side">
        <div class="gd-seat" id="gdSeat1" data-seat="1">
          <div class="gd-avatar team-opp" id="gdAv1">🦊<span class="gd-clock" id="gdClk1" hidden></span></div>
          <div class="gd-name">对手·右 <span class="tag">AI</span></div>
          <div style="display:flex;gap:0.3rem;align-items:center;">
            <span class="gd-count" id="gdCnt1">27</span>
            <span class="gd-rank-badge" id="gdRk1" hidden></span>
          </div>
        </div>
        <div class="gd-played" id="gdPlay1"></div>
      </div>
    </div>

    <!-- 我（座位 0） -->
    <div class="gd-self-bar">
      <div class="gd-seat" id="gdSeat0" data-seat="0">
        <div class="gd-avatar team-you" id="gdAv0">😎<span class="gd-clock" id="gdClk0" hidden></span></div>
      </div>
      <div>
        <div class="gd-name">我 <span class="tag" id="gdMyTag">座位 0</span></div>
        <div style="display:flex;gap:0.3rem;align-items:center;margin-top:0.15rem;">
          <span class="gd-count" id="gdCnt0">27</span>
          <span class="gd-rank-badge" id="gdRk0" hidden></span>
        </div>
      </div>
    </div>

    <div class="gd-hand" id="gdHand"></div>

    <div class="gd-actions" id="gdActions">
      <button class="gd-btn" id="gdArrangeBtn" type="button" title="进入理牌模式：直接拖动列即可调换位置（不用长按）">🔀 理牌</button>
      <button class="gd-btn" id="gdSortBtn" type="button" title="按点数恢复默认顺序">🧩 一键理牌</button>
      <button class="gd-btn" id="gdPassBtn" type="button" hidden>不要</button>
      <button class="gd-btn" id="gdHintBtn" type="button" hidden>提示</button>
      <button class="gd-btn primary" id="gdPlayBtn" type="button" hidden>出牌</button>
    </div>

    <!-- Pre-game overlay -->
    <div class="gs-pgo-overlay open" id="gdPgo">
      <div class="gs-pgo-view active" id="gdPgoMain">
        <div class="gs-pgo-icon">🀄</div>
        <h2 class="gs-pgo-title">掼蛋</h2>
        <div class="gs-pgo-subtitle">两副牌 · 2 打 2 · 逢人配 · 炸弹横飞 · 打过 A 才算赢</div>
        <div class="gs-pgo-highscore">
          <div class="gs-pgo-hs-value" id="gdHs">--</div>
          <div class="gs-pgo-hs-label">本机最高级牌</div>
        </div>
        <div class="gs-pgo-mode-picker" id="gdPgoDiff">
          <button class="gs-pgo-mode-tab" data-value="easy">🌱 新手</button>
          <button class="gs-pgo-mode-tab selected" data-value="normal">🙂 普通</button>
          <button class="gs-pgo-mode-tab" data-value="hard">🔥 高手</button>
        </div>
        <div class="gd-pgo-stats" id="gdPgoStats"></div>
        <button class="gs-pgo-start-btn" id="gdPgoStart">▶ 开始游戏</button>
      </div>
    </div>

    <!-- 进贡 / 还贡 浮层 -->
    <div class="gd-overlay" id="gdTributeOverlay">
      <div class="panel">
        <h2 id="gdTribTitle">进贡</h2>
        <div class="sub" id="gdTribDesc"></div>
        <div class="gd-tribute-pick" id="gdTribPick"></div>
        <button class="gd-btn primary" id="gdTribConfirm" type="button">确定</button>
      </div>
    </div>

    <!-- 回合结算 -->
    <div class="gd-overlay" id="gdRoundOverlay">
      <div class="panel">
        <h2 id="gdRoundTitle">本回合结束</h2>
        <ul class="gd-rank-list" id="gdRoundRanks"></ul>
        <div class="sub" id="gdRoundChange"></div>
        <button class="gd-btn primary" id="gdRoundNext" type="button">继续 ▶</button>
      </div>
    </div>

    <!-- 整局结束 -->
    <div class="gd-overlay" id="gdMatchOverlay">
      <div class="panel">
        <h2 id="gdMatchTitle">🎉 整局结束</h2>
        <div class="sub" id="gdMatchDesc"></div>
        <ul class="gd-rank-list" id="gdMatchSummary"></ul>
        <div style="display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;">
          <button class="gd-btn primary" id="gdMatchAgain" type="button">再来一局</button>
          <button class="gd-btn" id="gdMatchSetup" type="button">换难度</button>
        </div>
      </div>
    </div>

  </div><!-- /.gd-table -->

  <details class="about">
    <summary>游戏规则</summary>
    <div class="body" id="gdRulesBody"></div>
  </details>

  <div id="gd-wlb-mount" style="max-width: 600px; margin: 1.5rem auto 0;"></div>
  <div id="gd-nick-mount" style="max-width: 600px; margin: 0.6rem auto 0;"></div>
  <div id="gd-cm-mount" style="max-width: 600px; margin: 0 auto;"></div>

  <div class="gd-toast" id="gdToast"></div>
</div>
