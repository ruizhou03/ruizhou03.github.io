---
layout: default
title: "倒计时面板 | Rui Zhou"
permalink: /toolbox/countdown/
---

<style>
  .cd-wrap { max-width: 880px; margin: 0 auto; padding: 1rem; }
  .cd-wrap header { text-align: center; margin-bottom: 1.6rem; }
  .cd-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.4rem; }
  .cd-wrap header .sub { color: var(--color-light); font-style: normal; }

  .toolbar {
    display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center;
    margin-bottom: 1.2rem;
  }
  .toolbar .add-btn {
    font: inherit; font-size: 0.95rem; font-weight: 600;
    padding: 0.6rem 1.4rem;
    border: none; border-radius: 999px;
    background: var(--color-accent); color: #fff; cursor: pointer;
    box-shadow: 0 2px 8px rgba(30, 58, 95, 0.2);
    transition: all 0.2s;
  }
  @media (hover: hover) {
    .toolbar .add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(30, 58, 95, 0.28);
  }
  }
  .toolbar .secondary-btn {
    font: inherit; font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  @media (hover: hover) {
    .toolbar .secondary-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }
  .toolbar .spacer { flex-grow: 1; }
  .toolbar .filter-tabs { display: flex; gap: 0.3rem; }
  .toolbar .filter-tabs button {
    font: inherit; font-size: 0.85rem;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .toolbar .filter-tabs button.active {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
  }

  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .event-card {
    position: relative;
    padding: 1.2rem 1.2rem 1rem;
    border: 1px solid var(--color-border);
    border-left: 4px solid var(--ev-color, var(--color-accent));
    border-radius: 12px;
    background: var(--color-bg);
    transition: all 0.2s;
  }
  @media (hover: hover) {
    .event-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
  }
  }
  .event-card.urgent { background: var(--color-bg-warm); }
  .event-card.urgent::after {
    content: '紧迫';
    position: absolute; top: 0.6rem; right: 0.6rem;
    font-size: 0.7rem;
    background: #b07c75;
    color: #fff;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-weight: 600;
  }
  .event-card .ev-emoji {
    font-size: 1.6rem;
    margin-bottom: 0.4rem;
  }
  .event-card .ev-title {
    font-family: var(--font-display);
    font-weight: 600;
    color: var(--color-ink);
    font-size: 1.1rem;
    line-height: 1.3;
    margin-bottom: 0.55rem;
  }
  .event-card .ev-countdown {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.6rem;
    color: var(--ev-color, var(--color-accent));
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .event-card .ev-countdown small {
    font-size: 0.65em;
    color: var(--color-muted);
    font-weight: 400;
    margin-left: 0.25rem;
  }
  .event-card.past .ev-countdown { color: var(--color-light); }
  .event-card .ev-target {
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: var(--color-muted);
  }
  .event-card .ev-actions {
    position: absolute;
    top: 0.7rem; right: 0.7rem;
    display: flex; gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.2s;
  }
  @media (hover: hover) {
    .event-card:hover .ev-actions { opacity: 1; }
  }
  /* Touch / coarse-pointer: edit button never appears on hover, so always show */
  @media (hover: none) {
    .event-card .ev-actions { opacity: 1; }
  }
  .event-card .ev-actions button {
    border: none; background: transparent;
    font-size: 0.85rem; color: var(--color-muted);
    cursor: pointer; padding: 0.25rem 0.4rem;
    border-radius: 4px;
    transition: all 0.18s;
  }
  @media (hover: hover) {
    .event-card .ev-actions button:hover { background: var(--color-bg-warm); color: var(--color-accent); }
  }
  @media (hover: hover) {
    .event-card .ev-actions button.danger:hover { color: #a04030; }
  }

  .empty-zone {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--color-light);
  }
  .empty-zone .empty-emoji { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-zone .empty-text { font-size: 0.95rem; margin-bottom: 1.4rem; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(3px);
    z-index: 1500;
    display: none; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.6rem;
    max-width: 460px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
  }
  .modal h2 {
    font-family: var(--font-display);
    font-size: 1.3rem; color: var(--color-ink);
    margin-bottom: 1rem;
  }
  .modal .field { margin-bottom: 0.9rem; }
  .modal label {
    display: block; font-size: 0.85rem; color: var(--color-muted);
    margin-bottom: 0.3rem;
  }
  .modal input[type="text"], .modal input[type="datetime-local"], .modal textarea {
    width: 100%; padding: 0.65rem 0.85rem;
    font: inherit; font-size: 1rem; color: var(--color-ink);
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
    transition: border-color 0.18s;
  }
  .modal textarea { min-height: 100px; resize: vertical; font-family: 'SFMono-Regular', monospace; font-size: 0.85rem; }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--color-accent); }

  .emoji-picker, .color-picker {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
  }
  .emoji-picker button {
    width: 36px; height: 36px;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
    font-size: 1.1rem; cursor: pointer;
    transition: all 0.15s;
  }
  @media (hover: hover) {
    .emoji-picker button:hover { border-color: var(--color-accent); }
  }
  .emoji-picker button.selected { border-color: var(--color-accent); background: var(--color-bg-warm); }
  .color-picker button {
    width: 32px; height: 32px;
    border: 2px solid transparent; border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
  }
  .color-picker button.selected { border-color: var(--color-ink); transform: scale(1.1); }

  .modal-actions {
    display: flex; gap: 0.6rem; justify-content: flex-end;
    margin-top: 1.2rem;
  }
  .modal-actions button {
    font: inherit; font-size: 0.92rem;
    padding: 0.5rem 1.2rem; border-radius: 8px;
    cursor: pointer; transition: all 0.18s;
  }
  .modal-actions .cancel {
    background: var(--color-bg); border: 1px solid var(--color-border);
    color: var(--color-muted);
  }
  @media (hover: hover) {
    .modal-actions .cancel:hover { color: var(--color-accent); border-color: var(--color-accent); }
  }
  .modal-actions .save {
    background: var(--color-accent); border: 1px solid var(--color-accent);
    color: #fff; font-weight: 600;
  }
  @media (hover: hover) {
    .modal-actions .save:hover { background: var(--color-accent-light); }
  }
  .modal-actions .delete-btn {
    background: transparent; border: 1px solid var(--color-border);
    color: #a04030;
    margin-right: auto;
  }
  @media (hover: hover) {
    .modal-actions .delete-btn:hover { background: rgba(160, 64, 48, 0.08); border-color: #a04030; }
  }

  @media (max-width: 600px) {
    .events-grid { grid-template-columns: 1fr; }
    .toolbar { gap: 0.4rem; }
    .toolbar .filter-tabs { width: 100%; }
  }

  /* localStorage 已满时弹一次的顶部警告条 */
  .storage-warn {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #b07c75;
    color: #fff;
    padding: 0.55rem 1rem;
    font-size: 0.88rem;
    text-align: center;
    z-index: 9999;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  }
  .storage-warn .storage-warn-close {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.5);
    color: #fff;
    border-radius: 999px;
    padding: 0.1rem 0.55rem;
    margin-left: 0.7rem;
    font-size: 0.78rem;
    cursor: pointer;
  }
</style>

<div class="cd-wrap">
  <header>
    <h1>[[zi:hourglass-fine]] 倒计时面板</h1>
  </header>

  <div class="toolbar">
    <button type="button" class="add-btn" id="add-btn">+ 添加事件</button>
    <div class="filter-tabs">
      <button type="button" data-filter="all" class="active">全部</button>
      <button type="button" data-filter="future">未来</button>
      <button type="button" data-filter="past">已过</button>
    </div>
    <span class="spacer"></span>
    <button type="button" class="secondary-btn" id="presets-btn">[[zi:calendar]] 节日</button>
    <button type="button" class="secondary-btn" id="export-btn">[[zi:download]] 导出</button>
    <button type="button" class="secondary-btn" id="import-btn">[[zi:transfer]] 导入</button>
  </div>

  <div class="events-grid" id="events-grid"></div>

  <div class="empty-zone" id="empty-zone" style="display: none;">
    <div class="empty-emoji">[[zi:hourglass-fine]]</div>
    <div class="empty-text">还没有事件——点上面「+ 添加事件」开始吧</div>
    <button type="button" class="add-btn" onclick="document.getElementById('add-btn').click()">+ 添加第一个事件</button>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-backdrop" id="event-modal">
    <div class="modal">
      <h2 id="modal-title">添加事件</h2>
      <div class="field">
        <label>标题</label>
        <input type="text" id="m-title" placeholder="例如：ECON 510 期末" maxlength="60" />
      </div>
      <div class="field">
        <label>目标日期 / 时间</label>
        <input type="datetime-local" id="m-date" />
      </div>
      <div class="field">
        <label>图形</label>
        <div class="emoji-picker" id="m-emoji"></div>
      </div>
      <div class="field">
        <label>颜色</label>
        <div class="color-picker" id="m-color"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="delete-btn" id="m-delete" style="display: none;">[[zi:trash]] 删除</button>
        <button type="button" class="cancel" id="m-cancel">取消</button>
        <button type="button" class="save" id="m-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-backdrop" id="import-modal">
    <div class="modal">
      <h2>导入事件 (JSON)</h2>
      <div class="field">
        <label>粘贴上次导出的 JSON：</label>
        <textarea id="import-text" placeholder='[{"title":"...","date":"..."}]'></textarea>
      </div>
      <div class="field" id="import-feedback" style="font-size: 0.85rem; color: var(--color-muted); min-height: 1.2em;"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" onclick="document.getElementById('import-modal').classList.remove('open')">取消</button>
        <button type="button" class="save" id="import-confirm">合并导入</button>
      </div>
    </div>
  </div>

  <!-- Holiday Presets Modal -->
  <div class="modal-backdrop" id="presets-modal">
    <div class="modal" style="max-width: 540px;">
      <h2>导入节日预设</h2>
      <p style="font-size: 0.85rem; color: var(--color-muted); margin-bottom: 1rem; line-height: 1.55;">勾选要添加的节日。系统会按今天日期自动算出每个节日的<strong>下一次发生</strong>，加为倒计时事件。</p>

      <div style="margin-bottom: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
          <strong style="color: var(--color-ink); font-family: var(--font-display);">中国节日</strong>
          <span style="flex-grow: 1;"></span>
          <button type="button" class="secondary-btn" data-toggle-section="cn">全选 / 全不选</button>
        </div>
        <div class="preset-list" id="preset-list-cn"></div>
      </div>

      <div style="margin-bottom: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
          <strong style="color: var(--color-ink); font-family: var(--font-display);">美国节日</strong>
          <span style="flex-grow: 1;"></span>
          <button type="button" class="secondary-btn" data-toggle-section="us">全选 / 全不选</button>
        </div>
        <div class="preset-list" id="preset-list-us"></div>
      </div>

      <div class="field" id="presets-feedback" style="font-size: 0.85rem; color: var(--color-muted); min-height: 1.2em;"></div>
      <div class="modal-actions">
        <button type="button" class="cancel" onclick="document.getElementById('presets-modal').classList.remove('open')">取消</button>
        <button type="button" class="save" id="presets-confirm">导入勾选项</button>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="/assets/css/games-shell.css?v={{ site.time | date: '%s' }}">
  <div id="countdown-cm-mount" style="max-width: 720px; margin: 2rem auto 0;"></div>
</div>

<script src="/assets/js/games-shell/comments.js?v={{ site.time | date: '%s' }}"></script>

<style>
  .preset-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    max-height: 30vh;
    overflow-y: auto;
    padding: 0.4rem;
    background: var(--color-bg-warm);
    border-radius: 8px;
  }
  .preset-list label {
    display: flex; align-items: center; gap: 0.45rem;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    border-radius: 6px;
    font-size: 0.86rem;
    transition: background 0.15s;
  }
  @media (hover: hover) {
    .preset-list label:hover { background: var(--color-bg); }
  }
  .preset-list label .pl-badge {
    width: 2.35rem; min-height: 2.35rem; box-sizing: border-box; flex: 0 0 auto;
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    border: 1px solid var(--color-highlight); border-radius: 0.38rem;
    color: var(--color-accent); background: var(--color-bg);
    font-variant-numeric: tabular-nums; letter-spacing: 0.03em; line-height: 1.02;
  }
  .preset-list label .pl-badge b { font-size: 0.58rem; font-weight: 700; }
  .preset-list label .pl-badge small { font-size: 0.68rem; margin-top: 0.14rem; }
  .preset-list label .pl-name { color: var(--color-ink); flex-grow: 1; }
  .preset-list label .pl-date { font-size: 0.75rem; color: var(--color-light); font-variant-numeric: tabular-nums; }
  .preset-list input[type="checkbox"] { cursor: pointer; }
  .preset-list .pl-existing { opacity: 0.5; }
  .preset-list .pl-existing .pl-name::after {
    content: ' · 已添加';
    color: #4a7c59;
    font-size: 0.7rem;
  }
  @media (max-width: 600px) {
    .preset-list { grid-template-columns: 1fr; }
  }
  /* 节日预设小节里的「全选/全不选」按钮，比工具栏 secondary-btn 更紧凑 */
  .secondary-btn[data-toggle-section] {
    font-size: 0.78rem;
    padding: 0.3rem 0.7rem;
  }
</style>

<script>
(function () {
  'use strict';


  // localStorage 写入失败的可见反馈（仅 QuotaExceededError 时显示，一次性）
  let _storageWarnShown = false;
  function showStorageWarn() {
    if (_storageWarnShown) return;
    _storageWarnShown = true;
    const b = document.createElement('div');
    b.className = 'storage-warn';
    b.innerHTML = '[[zi:warning]] 浏览器存储空间已满，新数据可能保存失败。建议先导出现有数据再清理浏览器存储。 <button type="button" class="storage-warn-close">关闭</button>';
    b.querySelector('.storage-warn-close').addEventListener('click', () => b.remove());
    document.body.appendChild(b);
  }

  const STORE_KEY = 'tool.countdown.events.v1';
  const EMOJIS = ['[[zi:book]]', '[[zi:plane]]', '[[zi:cake]]', '[[zi:briefcase]]', '[[zi:graduation]]', '[[zi:ring-double]]', '[[zi:home]]', '[[zi:pin]]', '[[zi:dumbbell]]', '[[zi:sparkle]]', '[[zi:clock]]', '[[zi:calendar]]'];
  const LEGACY_EVENT_ICONS = {
    '\u{1F4DA}': '[[zi:book]]', '\u{2708}\u{FE0F}': '[[zi:plane]]', '\u{2708}': '[[zi:plane]]',
    '\u{1F382}': '[[zi:cake]]', '\u{1F4BC}': '[[zi:briefcase]]', '\u{1F393}': '[[zi:graduation]]',
    '\u{1F48D}': '[[zi:ring-double]]', '\u{1F3E0}': '[[zi:home]]', '\u{1F3AF}': '[[zi:pin]]',
    '\u{1F4AA}': '[[zi:dumbbell]]', '\u{1F389}': '[[zi:sparkle]]', '\u{23F0}': '[[zi:clock]]',
    '\u{1F4C5}': '[[zi:calendar]]', '\u{1F38A}': '[[zi:sparkle]]', '\u{1F9E7}': '[[zi:gift]]',
    '\u{1F3EE}': '[[zi:bulb]]', '\u{1F337}': '[[zi:heart]]', '\u{1F33F}': '[[zi:leaf]]',
    '\u{1F6E0}\u{FE0F}': '[[zi:toolbox]]', '\u{1F6E0}': '[[zi:toolbox]]', '\u{1F409}': '[[zi:gift]]',
    '\u{1F388}': '[[zi:gift]]', '\u{1F495}': '[[zi:heart]]', '\u{1F315}': '[[zi:moon]]',
    '\u{1F1E8}\u{1F1F3}': '[[zi:flag]]', '\u{1F342}': '[[zi:leaf]]', '\u{270A}': '[[zi:user]]',
    '\u{1F49D}': '[[zi:heart]]', '\u{1F1FA}\u{1F1F8}': '[[zi:flag]]', '\u{1F340}': '[[zi:leaf]]',
    '\u{1F339}': '[[zi:heart]]', '\u{1F338}': '[[zi:heart]]', '\u{1F454}': '[[zi:user]]',
    '\u{1F386}': '[[zi:sparkle]]', '\u{1F383}': '[[zi:clown]]', '\u{1F396}\u{FE0F}': '[[zi:medal]]',
    '\u{1F396}': '[[zi:medal]]', '\u{1F983}': '[[zi:gift]]', '\u{1F384}': '[[zi:gift]]',
    '\u{1F381}': '[[zi:gift]]', '\u{1F387}': '[[zi:sparkle]]'
  };
  function normalizeEventIcon(value) {
    if (/^\[\[zi:[a-z0-9-]+(?::[a-z0-9-]+)?\]\]$/.test(String(value || ''))) return value;
    return LEGACY_EVENT_ICONS[value] || '[[zi:calendar]]';
  }
  const COLORS = ['#1e3a5f', '#c9a96e', '#4a7c59', '#a04030', '#2d5a8e', '#8b5a3c', '#9b6d5e', '#5e7eb3'];

  const state = {
    events: [],
    filter: 'all',
    editingId: null,
    selectedEmoji: '[[zi:calendar]]',
    selectedColor: '#1e3a5f',
  };

  // ===== DOM =====
  const $grid = document.getElementById('events-grid');
  const $empty = document.getElementById('empty-zone');
  const $addBtn = document.getElementById('add-btn');
  const $tabs = document.querySelectorAll('[data-filter]');
  const $exportBtn = document.getElementById('export-btn');
  const $importBtn = document.getElementById('import-btn');

  const $modal = document.getElementById('event-modal');
  const $modalTitle = document.getElementById('modal-title');
  const $mTitle = document.getElementById('m-title');
  const $mDate = document.getElementById('m-date');
  const $mEmoji = document.getElementById('m-emoji');
  const $mColor = document.getElementById('m-color');
  const $mSave = document.getElementById('m-save');
  const $mCancel = document.getElementById('m-cancel');
  const $mDelete = document.getElementById('m-delete');

  const $importModal = document.getElementById('import-modal');
  const $importText = document.getElementById('import-text');
  const $importFeedback = document.getElementById('import-feedback');
  const $importConfirm = document.getElementById('import-confirm');

  // ===== Storage =====
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      state.events = raw ? JSON.parse(raw) : [];
      if (Array.isArray(state.events)) state.events.forEach(ev => { ev.emoji = normalizeEventIcon(ev.emoji); });
    } catch (e) { state.events = []; }
  }
  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state.events)); }
    catch (e) {if (e && e.name === 'QuotaExceededError') showStorageWarn(); }
  }

  function uuid() {
    return 'ev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }

  // ===== Time formatting =====
  const MIN = 60 * 1000;
  const HOUR = 60 * MIN;
  const DAY = 24 * HOUR;

  function formatDiff(ms) {
    const future = ms > 0;
    const abs = Math.abs(ms);
    const days = Math.floor(abs / DAY);
    const hours = Math.floor((abs % DAY) / HOUR);
    const minutes = Math.floor((abs % HOUR) / MIN);

    if (days >= 30) {
      const months = Math.floor(days / 30);
      const remDays = days - months * 30;
      return {
        main: `${months} 月 ${remDays} 天`,
        sub: future ? '后' : '前',
        urgent: false,
      };
    }
    if (days >= 1) {
      return {
        main: `${days} 天 ${hours} 小时`,
        sub: future ? '后' : '前',
        urgent: future && days <= 3,
      };
    }
    if (hours >= 1) {
      return {
        main: `${hours} 小时 ${minutes} 分`,
        sub: future ? '后' : '前',
        urgent: future,
      };
    }
    if (minutes >= 1) {
      return {
        main: `${minutes} 分钟`,
        sub: future ? '后' : '前',
        urgent: future,
      };
    }
    return {
      main: future ? '马上到' : '刚刚过去',
      sub: '',
      urgent: future,
    };
  }

  function formatTarget(iso) {
    const d = new Date(iso);
    const opts = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
    return d.toLocaleString('zh-CN', opts);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ===== Render =====
  function render() {
    const now = Date.now();
    let events = state.events.slice();
    if (state.filter === 'future') events = events.filter(ev => new Date(ev.date).getTime() > now);
    else if (state.filter === 'past') events = events.filter(ev => new Date(ev.date).getTime() <= now);

    // Sort: future ascending by remaining; past descending by elapsed
    events.sort((a, b) => {
      const da = new Date(a.date).getTime();
      const db = new Date(b.date).getTime();
      const aFuture = da > now, bFuture = db > now;
      if (aFuture && !bFuture) return -1;
      if (!aFuture && bFuture) return 1;
      if (aFuture) return da - db;
      return db - da;
    });

    if (events.length === 0) {
      $grid.innerHTML = '';
      $empty.style.display = '';
      return;
    }
    $empty.style.display = 'none';

    $grid.innerHTML = events.map(ev => {
      const t = new Date(ev.date).getTime();
      const diff = t - now;
      const f = formatDiff(diff);
      const isPast = diff <= 0;
      const cls = (isPast ? 'past' : '') + (f.urgent ? ' urgent' : '');
      return `
        <div class="event-card ${cls}" style="--ev-color: ${ev.color};" data-id="${ev.id}">
          <div class="ev-actions">
            <button type="button" class="edit" data-id="${ev.id}" title="编辑">[[zi:pencil]]</button>
          </div>
          <div class="ev-emoji">${ev.emoji}</div>
          <div class="ev-title">${escapeHtml(ev.title)}</div>
          <div class="ev-countdown">${f.main}<small>${f.sub}</small></div>
          <div class="ev-target">${formatTarget(ev.date)}</div>
        </div>
      `;
    }).join('');

    $grid.querySelectorAll('.edit').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openModal(btn.dataset.id);
      });
    });
    $grid.querySelectorAll('.event-card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });
  }

  // ===== Filter tabs =====
  $tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      $tabs.forEach(b => b.classList.toggle('active', b === btn));
      state.filter = btn.dataset.filter;
      render();
    });
  });

  // ===== Modal =====
  function buildEmojiPicker() {
    $mEmoji.innerHTML = EMOJIS.map(e =>
      `<button type="button" data-emoji="${e}">${e}</button>`
    ).join('');
    $mEmoji.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        $mEmoji.querySelectorAll('button').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        state.selectedEmoji = b.dataset.emoji;
      });
    });
  }
  function buildColorPicker() {
    $mColor.innerHTML = COLORS.map(c =>
      `<button type="button" data-color="${c}" style="background: ${c};"></button>`
    ).join('');
    $mColor.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        $mColor.querySelectorAll('button').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        state.selectedColor = b.dataset.color;
      });
    });
  }
  function selectEmoji(emoji) {
    state.selectedEmoji = emoji;
    $mEmoji.querySelectorAll('button').forEach(b =>
      b.classList.toggle('selected', b.dataset.emoji === emoji)
    );
  }
  function selectColor(color) {
    state.selectedColor = color;
    $mColor.querySelectorAll('button').forEach(b =>
      b.classList.toggle('selected', b.dataset.color === color)
    );
  }

  function openModal(id) {
    state.editingId = id || null;
    if (id) {
      const ev = state.events.find(e => e.id === id);
      if (!ev) return;
      $modalTitle.textContent = '编辑事件';
      $mTitle.value = ev.title;
      $mDate.value = ev.date.slice(0, 16);
      selectEmoji(ev.emoji);
      selectColor(ev.color);
      $mDelete.style.display = '';
    } else {
      $modalTitle.textContent = '添加事件';
      $mTitle.value = '';
      // 默认日期：明天 9:00
      const tomorrow = new Date(Date.now() + DAY);
      tomorrow.setHours(9, 0, 0, 0);
      $mDate.value = tomorrow.toISOString().slice(0, 16);
      selectEmoji(EMOJIS[0]);
      selectColor(COLORS[0]);
      $mDelete.style.display = 'none';
    }
    $modal.classList.add('open');
    setTimeout(() => $mTitle.focus(), 50);
  }
  function closeModal() {
    $modal.classList.remove('open');
    state.editingId = null;
  }

  $addBtn.addEventListener('click', () => openModal(null));
  $mCancel.addEventListener('click', closeModal);
  $modal.addEventListener('click', e => {
    if (e.target === $modal) closeModal();
  });

  $mSave.addEventListener('click', () => {
    const title = $mTitle.value.trim();
    const date = $mDate.value;
    if (!title) { alert('请输入标题'); return; }
    if (!date) { alert('请选择日期'); return; }

    if (state.editingId) {
      const ev = state.events.find(e => e.id === state.editingId);
      if (!ev) return;
      ev.title = title;
      ev.date = date;
      ev.emoji = state.selectedEmoji;
      ev.color = state.selectedColor;
    } else {
      state.events.push({
        id: uuid(),
        title, date,
        emoji: state.selectedEmoji,
        color: state.selectedColor,
        createdAt: new Date().toISOString(),
      });
    }
    save();
    render();
    closeModal();
  });

  $mDelete.addEventListener('click', () => {
    if (!state.editingId) return;
    if (!confirm('确定删除这个事件？')) return;
    state.events = state.events.filter(e => e.id !== state.editingId);
    save();
    render();
    closeModal();
  });

  // ===== Export / Import =====
  $exportBtn.addEventListener('click', async () => {
    if (state.events.length === 0) { alert('没有事件可导出'); return; }
    const json = JSON.stringify(state.events, null, 2);
    try {
      await navigator.clipboard.writeText(json);
      $exportBtn.textContent = '[[zi:check]] 已复制 JSON';
      setTimeout(() => { $exportBtn.textContent = '[[zi:upload]] 导出'; }, 1800);
    } catch (e) {
      const w = window.open();
      if (w) {
        w.document.body.innerHTML = `<pre>${escapeHtml(json)}</pre>`;
      } else {
        alert(json);
      }
    }
  });

  $importBtn.addEventListener('click', () => {
    $importText.value = '';
    $importFeedback.textContent = '';
    $importModal.classList.add('open');
  });
  $importConfirm.addEventListener('click', () => {
    const txt = $importText.value.trim();
    if (!txt) { $importFeedback.textContent = '请粘贴 JSON 内容'; return; }
    try {
      const parsed = JSON.parse(txt);
      if (!Array.isArray(parsed)) throw new Error('JSON 必须是数组');
      let added = 0;
      const existingIds = new Set(state.events.map(e => e.id));
      parsed.forEach(ev => {
        if (!ev.title || !ev.date) return;
        if (ev.id && existingIds.has(ev.id)) return;
        state.events.push({
          id: ev.id || uuid(),
          title: String(ev.title),
          date: String(ev.date),
          emoji: ev.emoji || '[[zi:calendar]]',
          color: ev.color || '#1e3a5f',
          createdAt: ev.createdAt || new Date().toISOString(),
        });
        added++;
      });
      save();
      render();
      $importFeedback.textContent = `[[zi:check]] 已合并 ${added} 个事件`;
      setTimeout(() => $importModal.classList.remove('open'), 1200);
    } catch (e) {
      $importFeedback.textContent = '[[zi:warning]] JSON 解析失败：' + e.message;
    }
  });

  // ===== Holiday presets =====
  // Helpers for movable holidays
  function nthWeekdayOfMonth(year, month, weekday, n) {
    // weekday: 0=Sun..6=Sat. n=1..5
    const first = new Date(year, month - 1, 1);
    const offset = (weekday - first.getDay() + 7) % 7;
    const d = new Date(year, month - 1, 1 + offset + (n - 1) * 7);
    return d.toISOString().slice(0, 10);
  }
  function lastWeekdayOfMonth(year, month, weekday) {
    const lastDay = new Date(year, month, 0).getDate();
    const last = new Date(year, month - 1, lastDay);
    const offset = (last.getDay() - weekday + 7) % 7;
    const d = new Date(year, month - 1, lastDay - offset);
    return d.toISOString().slice(0, 10);
  }
  function fixedDate(year, month, day) {
    return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
  }
  // 阴历 → 阳历 hardcoded map（2026-2030）
  // 数据来源：标准万年历，仅供参考；上线时建议人工核对
  const LUNAR_DATES = {
    '春节': { 2026: '2026-02-17', 2027: '2027-02-06', 2028: '2028-01-26', 2029: '2029-02-13', 2030: '2030-02-03' },
    '元宵节': { 2026: '2026-03-03', 2027: '2027-02-20', 2028: '2028-02-09', 2029: '2029-02-27', 2030: '2030-02-17' },
    '清明节': { 2026: '2026-04-05', 2027: '2027-04-05', 2028: '2028-04-04', 2029: '2029-04-04', 2030: '2030-04-05' },
    '端午节': { 2026: '2026-06-19', 2027: '2027-06-09', 2028: '2028-05-28', 2029: '2029-06-16', 2030: '2030-06-05' },
    '七夕': { 2026: '2026-08-19', 2027: '2027-08-08', 2028: '2028-08-26', 2029: '2029-08-16', 2030: '2030-08-05' },
    '中秋节': { 2026: '2026-09-25', 2027: '2027-09-15', 2028: '2028-10-03', 2029: '2029-09-22', 2030: '2030-09-12' },
    '重阳节': { 2026: '2026-10-19', 2027: '2027-10-08', 2028: '2028-10-27', 2029: '2029-10-16', 2030: '2030-10-05' },
  };

  // 给定一个 holiday spec，返回今天之后最近的一次 ISO 日期
  function nextOccurrence(spec) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let dy = 0; dy < 6; dy++) {
      const y = today.getFullYear() + dy;
      let iso;
      if (spec.kind === 'fixed') {
        iso = fixedDate(y, spec.month, spec.day);
      } else if (spec.kind === 'nth') {
        iso = nthWeekdayOfMonth(y, spec.month, spec.weekday, spec.n);
      } else if (spec.kind === 'last') {
        iso = lastWeekdayOfMonth(y, spec.month, spec.weekday);
      } else if (spec.kind === 'lunar') {
        iso = (LUNAR_DATES[spec.name] || {})[y];
        if (!iso) continue;
      }
      if (iso && new Date(iso) >= today) return iso;
    }
    return null;
  }

  const PRESETS = {
    cn: [
      { name: '元旦', color: '#a04030', kind: 'fixed', month: 1, day: 1 },
      { name: '春节', color: '#a04030', kind: 'lunar', badge: ['正月', '初一'] },
      { name: '元宵节', color: '#a04030', kind: 'lunar', badge: ['正月', '十五'] },
      { name: '三八妇女节', color: '#a04030', kind: 'fixed', month: 3, day: 8 },
      { name: '清明节', color: '#4a7c59', kind: 'lunar' },
      { name: '五一劳动节', color: '#a04030', kind: 'fixed', month: 5, day: 1 },
      { name: '端午节', color: '#a04030', kind: 'lunar', badge: ['五月', '初五'] },
      { name: '六一儿童节', color: '#c9a96e', kind: 'fixed', month: 6, day: 1 },
      { name: '七夕', color: '#a04030', kind: 'lunar', badge: ['七月', '初七'] },
      { name: '教师节', color: '#1e3a5f', kind: 'fixed', month: 9, day: 10 },
      { name: '中秋节', color: '#c9a96e', kind: 'lunar', badge: ['八月', '十五'] },
      { name: '国庆节', color: '#a04030', kind: 'fixed', month: 10, day: 1 },
      { name: '重阳节', color: '#8b5a3c', kind: 'lunar', badge: ['九月', '初九'] },
    ],
    us: [
      { name: "New Year's Day", color: '#1e3a5f', kind: 'fixed', month: 1, day: 1 },
      { name: 'MLK Day', color: '#1e3a5f', kind: 'nth', month: 1, weekday: 1, n: 3 },
      { name: "Valentine's Day", color: '#a04030', kind: 'fixed', month: 2, day: 14 },
      { name: 'Presidents Day', color: '#1e3a5f', kind: 'nth', month: 2, weekday: 1, n: 3 },
      { name: "St. Patrick's Day", color: '#4a7c59', kind: 'fixed', month: 3, day: 17 },
      { name: 'Memorial Day', color: '#a04030', kind: 'last', month: 5, weekday: 1 },
      { name: "Mother's Day", color: '#a04030', kind: 'nth', month: 5, weekday: 0, n: 2 },
      { name: "Father's Day", color: '#1e3a5f', kind: 'nth', month: 6, weekday: 0, n: 3 },
      { name: 'Independence Day', color: '#1e3a5f', kind: 'fixed', month: 7, day: 4 },
      { name: 'Labor Day', color: '#1e3a5f', kind: 'nth', month: 9, weekday: 1, n: 1 },
      { name: 'Halloween', color: '#8b5a3c', kind: 'fixed', month: 10, day: 31 },
      { name: 'Veterans Day', color: '#1e3a5f', kind: 'fixed', month: 11, day: 11 },
      { name: 'Thanksgiving', color: '#8b5a3c', kind: 'nth', month: 11, weekday: 4, n: 4 },
      { name: 'Christmas Eve', color: '#a04030', kind: 'fixed', month: 12, day: 24 },
      { name: 'Christmas', color: '#a04030', kind: 'fixed', month: 12, day: 25 },
      { name: "New Year's Eve", color: '#1e3a5f', kind: 'fixed', month: 12, day: 31 },
    ],
  };

  const $presetsBtn = document.getElementById('presets-btn');
  const $presetsModal = document.getElementById('presets-modal');
  const $presetsConfirm = document.getElementById('presets-confirm');
  const $presetsFeedback = document.getElementById('presets-feedback');
  const MONTH_CODES = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

  function presetBadge(spec, iso) {
    const parts = spec.badge || [MONTH_CODES[Number(iso.slice(5, 7)) - 1], iso.slice(8, 10)];
    return `<span class="pl-badge" aria-hidden="true"><b>${parts[0]}</b><small>${parts[1]}</small></span>`;
  }

  function buildPresetList(section) {
    const $container = document.getElementById('preset-list-' + section);
    const items = PRESETS[section];
    // 已有事件检查（按 title + date 完全匹配）
    const existing = new Set(state.events.map(e => e.title + '|' + e.date.slice(0, 10)));

    $container.innerHTML = items.map((spec, i) => {
      const iso = nextOccurrence(spec);
      if (!iso) return '';
      const dateLabel = iso.slice(5);  // MM-DD
      const exists = existing.has(spec.name + '|' + iso);
      return `
        <label class="${exists ? 'pl-existing' : ''}">
          <input type="checkbox" data-section="${section}" data-idx="${i}" ${exists ? 'disabled' : ''} />
          ${presetBadge(spec, iso)}
          <span class="pl-name">${spec.name}</span>
          <span class="pl-date">${dateLabel}</span>
        </label>
      `;
    }).join('');
  }

  $presetsBtn.addEventListener('click', () => {
    $presetsFeedback.textContent = '';
    buildPresetList('cn');
    buildPresetList('us');
    $presetsModal.classList.add('open');
  });

  document.querySelectorAll('[data-toggle-section]').forEach(btn => {
    btn.addEventListener('click', () => {
      const sec = btn.dataset.toggleSection;
      const boxes = document.querySelectorAll(`#preset-list-${sec} input[type="checkbox"]:not(:disabled)`);
      const allChecked = Array.from(boxes).every(b => b.checked);
      boxes.forEach(b => { b.checked = !allChecked; });
    });
  });

  $presetsConfirm.addEventListener('click', () => {
    const checkedBoxes = document.querySelectorAll('#presets-modal input[type="checkbox"]:checked:not(:disabled)');
    if (checkedBoxes.length === 0) {
      $presetsFeedback.textContent = '请至少勾选一个节日';
      return;
    }
    let added = 0;
    checkedBoxes.forEach(box => {
      const section = box.dataset.section;
      const spec = PRESETS[section][parseInt(box.dataset.idx, 10)];
      const iso = nextOccurrence(spec);
      if (!iso) return;
      // 加成 datetime-local 格式（默认 09:00）
      const dt = iso + 'T09:00';
      state.events.push({
        id: uuid(),
        title: spec.name,
        date: dt,
        emoji: '[[zi:calendar]]',
        color: spec.color,
        createdAt: new Date().toISOString(),
      });
      added++;
    });
    save();
    render();
    $presetsFeedback.textContent = `已添加 ${added} 个节日事件`;
    setTimeout(() => $presetsModal.classList.remove('open'), 1200);
  });

  // ===== Init =====
  load();
  buildEmojiPicker();
  buildColorPicker();
  render();

  // Re-render every minute to update countdowns
  setInterval(render, 60 * 1000);

  // ESC closes modals
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      $modal.classList.remove('open');
      $importModal.classList.remove('open');
      $presetsModal.classList.remove('open');
    }
  });
})();

window.addEventListener('DOMContentLoaded', () => {
  if (window.GamesShell && GamesShell.Comments) {
    GamesShell.Comments.mount({
      container: document.getElementById('countdown-cm-mount'),
      path: '/toolbox/countdown/',
      title: '[[zi:comment]] 倒计时交流',
      intro: '分享你在追的截止日、好用的倒计时玩法、bug 反馈～',
      placeholder: '聊聊你的倒计时清单 / 想加的事件类型 / 想到的功能…',
    });
  }
});
</script>
