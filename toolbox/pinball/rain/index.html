<script>
(() => {
  const W = 480, H = 640;

  // ─── 边墙（简化版：取消 plunger lane，整张表都是主区） ───
  const walls = [];
  const topArc = [
    [16, 80], [16, 56], [40, 28], [80, 14], [240, 6], [400, 18], [440, 14], [464, 30],
  ];
  for (let i = 0; i < topArc.length - 1; i++) {
    walls.push({ ax: topArc[i][0], ay: topArc[i][1], bx: topArc[i+1][0], by: topArc[i+1][1] });
  }
  walls.push(
    { ax: 16, ay: 80, bx: 16, by: 540 },
    { ax: 16, ay: 540, bx: 108, by: 590 },
    { ax: 108, ay: 590, bx: 158, by: 590 },
    { ax: 332, ay: 590, bx: 382, by: 590 },
    { ax: 382, ay: 590, bx: 464, by: 540 },
    { ax: 464, ay: 540, bx: 464, by: 30 },
    // 没有 plunger lane 的外右墙了，464 就是主区右边界
  );

  // ─── 钉墙（密集 zigzag） ───
  const pegs = [];
  const ROW_Y0 = 80, ROW_DY = 32, ROW_COUNT = 10;
  for (let r = 0; r < ROW_COUNT; r++) {
    const y = ROW_Y0 + r * ROW_DY;
    if (r % 2 === 0) {
      for (let c = 0; c < 8; c++) {
        const x = 50 + c * 52;
        pegs.push({ x, y, score: 5 });
      }
    } else {
      for (let c = 0; c < 7; c++) {
        const x = 76 + c * 52;
        pegs.push({ x, y, score: 5 });
      }
    }
  }

  // ─── 11 个 slot：JACKPOT 在中央，左右对称阶梯 ───
  const SLOT_X0 = 30, SLOT_X1 = 450;
  const SLOT_TOP = 440, SLOT_BOT = 500;
  const SLOT_COUNT = 11;
  const SLOT_W = (SLOT_X1 - SLOT_X0) / SLOT_COUNT;
  for (let i = 0; i <= SLOT_COUNT; i++) {
    const x = SLOT_X0 + i * SLOT_W;
    walls.push({ ax: x, ay: SLOT_TOP, bx: x, by: SLOT_BOT });
  }
  // 对称：50, 100, 200, 500, 1000, JKPT, 1000, 500, 200, 100, 50
  const SLOT_SCORES = [50, 100, 200, 500, 1000, -1, 1000, 500, 200, 100, 50];

  const slotTriggers = [];
  for (let i = 0; i < SLOT_COUNT; i++) {
    slotTriggers.push({
      id: 'slot' + i,
      kind: 'rect',
      x: SLOT_X0 + i * SLOT_W + 2,
      y: SLOT_BOT - 18,
      w: SLOT_W - 4,
      h: 18,
      on: 'enter',
      cooldown: 100,
      slotIndex: i,
      cb: (now, ball, game) => onSlotEnter(now, ball, game, i),
    });
  }

  // 下半部底层：双挡板 + 两组 slings（这次真的有用，因为球持续掉）
  const bumpers = [
    { x: 240, y: 580, r: 14, score: 30, color: '#88aaff' },
  ];
  const slings = [
    { ax: 98, ay: 545, bx: 132, by: 590, side: 'L', color: '#5dd4f0', score: 50 },
    { ax: 310, ay: 590, bx: 344, by: 545, side: 'R', color: '#5dd4f0', score: 50 },
  ];
  walls.push(
    { ax: 44, ay: 555, bx: 98, by: 545 },
    { ax: 44, ay: 555, bx: 132, by: 590 },
    { ax: 344, ay: 545, bx: 398, by: 555 },
    { ax: 398, ay: 555, bx: 310, by: 590 },
  );

  // ─── 状态 ───
  const GAME_LEN_MS = 60000;
  const SPAWN_INTERVAL = 1500;
  const state = {
    gameRunning: false,
    timeRemaining: GAME_LEN_MS,
    spawnTimer: 0,
    timerEnded: false,
    jackpotHits: 0,
    totalBallsSpawned: 0,
    laneReturnFlashTill: 0,
  };

  function rebuildState() {
    state.gameRunning = false;
    state.timeRemaining = GAME_LEN_MS;
    state.spawnTimer = 0;
    state.timerEnded = false;
    state.jackpotHits = 0;
    state.totalBallsSpawned = 0;
    state.laneReturnFlashTill = 0;
  }

  // 4 档奖励系统：T1 = 100，T2 = 1000，T3 = 3000
  function onRainLaneReturn(now, ball, gameRef) {
    game.addScore(1000, 458, 140, 'lane-return-t2');
    game.addPopup(458, 110, '⚡ +1000', 1300);
    state.laneReturnFlashTill = now + 500;
  }
  function onRainLaunch(b, gameRef, meta) {
    if (meta && meta.fieldReturn) {
      game.addScore(3000, 458, 580, 'launch-t3');
      game.addPopup(458, 560, '🌩️ GRAND +3000', 1600);
      state.laneReturnFlashTill = (typeof performance !== 'undefined' ? performance.now() : Date.now()) + 800;
    } else {
      game.addScore(100, 458, 580, 'launch-t1');
      game.addPopup(458, 560, '+100', 700);
    }
  }
  rebuildState();

  let game = null;

  function spawnRainBall() {
    if (!game) return;
    // 顶部随机 x，下抛初速度
    const x = 60 + Math.random() * 360;
    const vx = (Math.random() - 0.5) * 120;
    const vy = 80 + Math.random() * 80;
    game.addBall(x, 28, vx, vy);
    state.totalBallsSpawned++;
  }

  function updateGoal() {
    if (!game) return;
    const sec = Math.max(0, state.timeRemaining / 1000);
    const inPlay = game.state.balls.length;
    let html;
    if (state.timerEnded && inPlay === 0) {
      html = `<strong>结束</strong> · 共投 <strong>${state.totalBallsSpawned}</strong> 球 · JKPT <strong>${state.jackpotHits}</strong>`;
    } else if (state.timerEnded) {
      html = `<strong>等剩余 ${inPlay} 球结算…</strong> · JKPT <strong>${state.jackpotHits}</strong>`;
    } else {
      html = `剩 <strong style="color:${sec < 10 ? '#ff5566' : 'inherit'}">${sec.toFixed(1)}</strong>s · 在场 <strong>${inPlay}</strong> 球 · JKPT <strong>${state.jackpotHits}</strong>`;
    }
    game.setGoal(html);
  }

  function onSlotEnter(now, ball, gameRef, idx) {
    const baseScore = SLOT_SCORES[idx] === -1 ? 2000 : SLOT_SCORES[idx];
    const cx = SLOT_X0 + idx * SLOT_W + SLOT_W / 2;
    game.addScore(baseScore, cx, SLOT_BOT - 30, 'slot');
    if (SLOT_SCORES[idx] === -1) {
      game.addPopup(cx, SLOT_BOT - 50, 'JACKPOT', 1300);
      state.jackpotHits++;
    }
    // 移除球
    const arr = game.state.balls;
    const i2 = arr.indexOf(ball);
    if (i2 >= 0) arr.splice(i2, 1);
    // 立刻补一颗（保持球流不断；timer 结束后停补）
    if (state.gameRunning && !state.timerEnded) {
      spawnRainBall();
    }
    updateGoal();
  }

  // ─── 渲染 ───
  function paintBackground(ctx, now) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a1a28');
    grad.addColorStop(0.55, '#0e2438');
    grad.addColorStop(1, '#04101a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // 雨丝背景（垂直 motion lines）
    ctx.strokeStyle = 'rgba(160, 200, 230, 0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 30; i++) {
      const x = (i * 37 + (now * 0.2) % 480) % 480;
      const yOff = (i * 113 + now * 0.5) % 640;
      ctx.beginPath();
      ctx.moveTo(x, yOff);
      ctx.lineTo(x + 2, yOff + 18);
      ctx.stroke();
    }
    ctx.save();
    ctx.font = 'bold 22px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(140, 180, 220, 0.10)';
    ctx.fillText('PINBALL  RAIN', W/2, 54);
    ctx.restore();
  }

  function paintMidLayer(ctx, now) {
    // 弹射轨道闪电门（弹珠雨版回轨道奖励）：lane 内一条 zigzag 闪电
    const laneHit = state.laneReturnFlashTill > now;
    const laneT = laneHit ? (state.laneReturnFlashTill - now) / 500 : 0;
    ctx.save();
    if (laneHit) {
      ctx.shadowColor = 'rgba(255, 245, 220, 0.95)';
      ctx.shadowBlur = 16;
      ctx.strokeStyle = `rgba(255, 255, 220, ${0.7 + 0.3 * laneT})`;
      ctx.lineWidth = 2.6;
    } else {
      ctx.strokeStyle = 'rgba(180, 215, 255, ' + (0.30 + 0.10 * Math.sin(now / 180)) + ')';
      ctx.lineWidth = 1.4;
    }
    ctx.beginPath();
    ctx.moveTo(454, 110);
    ctx.lineTo(462, 122);
    ctx.lineTo(454, 134);
    ctx.lineTo(462, 146);
    ctx.lineTo(454, 158);
    ctx.stroke();
    ctx.shadowBlur = 0;
    if (laneHit) {
      ctx.fillStyle = `rgba(255, 255, 220, ${0.22 * laneT})`;
      ctx.fillRect(442, 100, 32, 60);
    }
    ctx.fillStyle = laneHit ? '#fff8c4' : 'rgba(180, 215, 255, 0.55)';
    ctx.font = '8px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('BOLT', 458, 170);
    ctx.restore();

    // 11 个 slot
    for (let i = 0; i < SLOT_COUNT; i++) {
      const cx = SLOT_X0 + i * SLOT_W + SLOT_W / 2;
      const score = SLOT_SCORES[i];
      const isJackpot = score === -1;
      const label = isJackpot ? 'JKPT' : String(score);
      let bg = 'rgba(160, 160, 180, 0.08)';
      let txt = '#bbbbcc';
      if (isJackpot) {
        bg = `rgba(255, 220, 80, ${0.18 + 0.10 * Math.sin(now / 200)})`;
        txt = '#ffdd80';
      } else if (score >= 1000) {
        bg = 'rgba(255, 120, 100, 0.18)';
        txt = '#ff9988';
      } else if (score >= 500) {
        bg = 'rgba(255, 180, 100, 0.16)';
        txt = '#ffcc99';
      } else if (score >= 200) {
        bg = 'rgba(200, 200, 220, 0.12)';
        txt = '#cccccc';
      }
      ctx.fillStyle = bg;
      ctx.fillRect(SLOT_X0 + i * SLOT_W + 1, SLOT_TOP + 1, SLOT_W - 2, SLOT_BOT - SLOT_TOP - 2);
      ctx.fillStyle = txt;
      ctx.font = isJackpot ? 'bold 10px system-ui' : '9px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(label, cx, SLOT_TOP - 4);
    }
  }

  function paintForeground(ctx, now) {
    if (state.timerEnded) {
      ctx.fillStyle = `rgba(0, 0, 0, 0.20)`;
      ctx.fillRect(0, 0, W, H);
    }
    // 大字倒计时（最后 10 秒红色闪烁）
    const sec = state.timeRemaining / 1000;
    if (sec > 0 && sec < 10 && !state.timerEnded) {
      ctx.fillStyle = `rgba(255, 80, 80, ${0.5 + 0.3 * Math.sin(now / 80)})`;
      ctx.font = 'bold 80px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(sec).toString(), W/2, 280);
    }
  }

  const canvas = document.getElementById('pbCanvas');
  game = PinballCore.createGame({
    canvas, designW: W, designH: H, id: 'rain',
    totalBalls: 99,  // 假装无限：实际用 timer 结算
    drainY: 626, drainXRange: [100, 442],
    physics: { gravity: 900, airDrag: 0.999, substeps: 8, maxSpeed: 1200, ballRadius: 9 },
    plunger: { x: 458, restY: 600, laneLeft: 442, laneRight: 474, maxCharge: 1.0, chargeRate: 1.6, maxVel: 1500, minVel: 520 },
    flippers: [
      { pivot: { x: 158, y: 590 }, length: 70, thick: 7, restDeg: 25, upDeg: -32, side: 'L' },
      { pivot: { x: 332, y: 590 }, length: 70, thick: 7, restDeg: 180 - 25, upDeg: 180 - (-32), side: 'R' },
    ],
    walls, bumpers, pegs, slings,
    triggers: [
      ...slotTriggers,
      // 弹射轨道闪电（弹珠雨版回轨道奖励）
      {
        id: 'rainLaneReturn', kind: 'segment',
        ax: 442, ay: 130, bx: 474, by: 130, thresh: 9,
        on: 'enter', cooldown: 1500,
        cb: (now, ball, game) => {
          if (ball.viaLane) return;
          onRainLaneReturn(now, ball, game);
        },
      },
    ],
    hud: {
      score: document.getElementById('pbScore'),
      best: document.getElementById('pbBest'),
      goalBar: document.getElementById('pbGoal'),
      chargeBar: null,  // 没有 charge bar 视觉
      launchHint: document.getElementById('pbLaunchHint'),
      overlay: document.getElementById('pbOverlay'),
      overlayTitle: document.getElementById('pbOvTitle'),
      overlayMsg: document.getElementById('pbOvMsg'),
      overlayBtn: document.getElementById('pbOvBtn'),
      pauseBtn: document.getElementById('pbPauseBtn'),
      newBtn: document.getElementById('pbNewBtn'),
      flipLBtn: document.getElementById('pbFlipL'),
      flipRBtn: document.getElementById('pbFlipR'),
      plungerBtn: null,  // 没有 plunger（手动发射禁用）
    },
    render: { paintBackground, paintMidLayer, paintForeground, wallColor: '#3a4a60' },
    store: { key: 'tool.pinball-rain.v1' },
    shell: {
      gameId: 'pinball-rain',
      title: '弹珠机·弹珠雨',
      emoji: '🌧️',
      rankRow: document.getElementById('pb-rank-row'),
      lbMount: document.getElementById('pb-lb-mount'),
      lbTitle: '🏆 弹珠雨 排行榜',
      commentsMount: document.getElementById('pb-cm-mount'),
      commentsPath: '/toolbox/pinball/rain/',
      commentsTitle: '💬 弹珠雨玩家交流',
      commentsIntro: '60 秒能甩多少 JKPT？',
      commentsPlaceholder: '聊聊心得 ~',
      nickMount: document.getElementById('pb-nick-mount'),
      settleBtnMount: document.getElementById('pb-settle-btn-mount'),
      extraSubmit: () => ({ jackpotHits: state.jackpotHits, balls: state.totalBallsSpawned }),
      statsBuilder: (s) => [
        { label: '投出球数', value: state.totalBallsSpawned },
        { label: 'JACKPOT 命中', value: state.jackpotHits },
        { label: '历史最高', value: Number(s.best || 0).toLocaleString() },
      ],
      watermark: 'zirconeey.github.io/toolbox/pinball/rain',
    },
    hooks: {
      onStart: (s, g) => {
        game = g;
        // 清掉 core 默认的 plunger ball，rain 用 auto-spawn
        s.balls.length = 0;
        s.lives = 99;
        rebuildState();
        state.gameRunning = true;
        state.spawnTimer = 0;
        // 立刻投第一颗，避免下一帧 balls=0 触发 onAllBallsDrained
        spawnRainBall();
        updateGoal();
      },
      onLaunch: onRainLaunch,
      onTick: (dt, now, g) => {
        if (!state.gameRunning && !state.timerEnded) {
          updateGoal();
          return;
        }
        // 防止 lives 在游戏过程中被消耗到 0（auto-spawn 期间球会进进出出）
        if (!state.timerEnded) {
          g.state.lives = 99;
          state.timeRemaining -= dt * 1000;
          if (state.timeRemaining > 0) {
            state.spawnTimer -= dt * 1000;
            if (state.spawnTimer <= 0) {
              spawnRainBall();
              state.spawnTimer = SPAWN_INTERVAL;
            }
          } else {
            // Timer 结束：停止投球，把 lives 清零，让剩余球自然漏完触发 gameOver
            state.timerEnded = true;
            state.gameRunning = false;
            g.state.lives = 0;
          }
        }
        updateGoal();
      },
      onBallDrain: (b, now, g) => {
        // 球漏掉（outlane）→ 立即补一颗保持球流
        if (state.gameRunning && !state.timerEnded) {
          spawnRainBall();
        }
      },
    },
  });

  updateGoal();
})();
</script>
