<script src="/assets/js/games-shell/settlement.js"></script>
<script src="/assets/js/pinball-core/pinball-core.js"></script>

<script>
(() => {
  const W = 480, H = 640;
  const { deg } = PinballCore.utils;

  const topArc = [
    [16, 80], [16, 56], [40, 28], [80, 14], [200, 6], [340, 6], [400, 18], [440, 14], [474, 30],
  ];
  const walls = [];
  for (let i = 0; i < topArc.length - 1; i++) {
    walls.push({ ax: topArc[i][0], ay: topArc[i][1], bx: topArc[i+1][0], by: topArc[i+1][1] });
  }
  walls.push(
    { ax: 16, ay: 80, bx: 16, by: 540 },
    { ax: 16, ay: 540, bx: 108, by: 590 },
    { ax: 108, ay: 590, bx: 158, by: 590 },
    { ax: 332, ay: 590, bx: 382, by: 590 },
    { ax: 382, ay: 590, bx: 442, by: 540 },
    { ax: 442, ay: 540, bx: 442, by: 90 },
    { ax: 474, ay: 30, bx: 474, by: 612 },
    { ax: 442, ay: 612, bx: 474, by: 612 },
  );

  // ─── HACKS 5 个字母 trigger（顶部 5 个 lane） ───
  const LETTER_TRIGGERS = [];
  const LETTERS = ['H', 'A', 'C', 'K', 'S'];
  const LETTER_X = [44, 144, 240, 336, 436];
  for (let i = 0; i < 5; i++) {
    LETTER_TRIGGERS.push({
      id: 'lane' + LETTERS[i],
      kind: 'segment',
      ax: LETTER_X[i] - 18, ay: 100,
      bx: LETTER_X[i] + 18, by: 100,
      thresh: 14, on: 'enter', cooldown: 800,
      letterIdx: i,
      cb: (now, ball, game) => onLetterHit(now, ball, game, i),
    });
  }

  // ─── Bumpers + Pegs ───
  const bumpers = [
    { x: 200, y: 220, r: 16, score: 100, color: '#ff3df8', flashColor: '#ffb0ff' },
    { x: 280, y: 220, r: 16, score: 100, color: '#3df8ff', flashColor: '#b0ffff' },
    { x: 200, y: 320, r: 16, score: 100, color: '#3df8ff', flashColor: '#b0ffff' },
    { x: 280, y: 320, r: 16, score: 100, color: '#ff3df8', flashColor: '#ffb0ff' },
  ];

  const pegs = [
    { x: 80, y: 200, score: 25 },
    { x: 400, y: 200, score: 25 },
    { x: 60, y: 320, score: 25 },
    { x: 420, y: 320, score: 25 },
    { x: 160, y: 280, score: 25 },
    { x: 320, y: 280, score: 25 },
    { x: 240, y: 400, score: 25 },
    { x: 100, y: 460, score: 25 },
    { x: 380, y: 460, score: 25 },
  ];

  const slings = [
    { ax: 98, ay: 460, bx: 132, by: 528, side: 'L', color: '#ff3df8', score: 50 },
    { ax: 310, ay: 528, bx: 344, by: 460, side: 'R', color: '#3df8ff', score: 50 },
  ];
  walls.push(
    { ax: 44, ay: 470, bx: 98, by: 460 },
    { ax: 44, ay: 470, bx: 132, by: 528 },
    { ax: 344, ay: 460, bx: 398, by: 470 },
    { ax: 398, ay: 470, bx: 310, by: 528 },
  );

  // ─── 状态 ───
  const state = {
    comboHits: 0,
    comboExpiry: 0,
    comboLevel: 1,  // 1, 2, 3, 5
    letters: [false, false, false, false, false],
    hacksCompleted: 0,
    multiballActive: false, multiballEnd: 0,
    inheritedMultiplier: 1,
  };

  function rebuildState() {
    state.comboHits = 0;
    state.comboExpiry = 0;
    state.comboLevel = 1;
    state.letters = [false, false, false, false, false];
    state.hacksCompleted = 0;
    state.multiballActive = false;
    state.multiballEnd = 0;
    state.inheritedMultiplier = 1;
  }
  rebuildState();

  let game = null;

  function comboLevelFor(hits) {
    if (hits >= 10) return 5;
    if (hits >= 6)  return 3;
    if (hits >= 3)  return 2;
    return 1;
  }

  function updateCombo(now) {
    const lvl = comboLevelFor(state.comboHits);
    if (lvl !== state.comboLevel) {
      state.comboLevel = lvl;
      // 高 combo 时 multiplier 上调（非 multiball 模式下）
      if (!state.multiballActive) game.setMultiplier(lvl);
      // 高 combo 加速重力
      game.phys.gravity = 1100 * (lvl >= 3 ? 1.1 : 1.0);
      if (lvl >= 2) {
        game.addPopup(W/2, 60, `COMBO ×${lvl}`, 900);
      }
    }
  }

  function bumpCombo(now) {
    state.comboHits++;
    state.comboExpiry = now + 3000;
    updateCombo(now);
  }

  function resetCombo() {
    state.comboHits = 0;
    state.comboLevel = 1;
    if (!state.multiballActive) game.setMultiplier(1);
    game.phys.gravity = 1100;
  }

  function updateGoal() {
    const lit = state.letters.filter(x => x).length;
    let html;
    if (state.multiballActive) {
      const rem = Math.max(0, (state.multiballEnd - performance.now()) / 1000);
      html = `<strong>HACK MULTIBALL ×${state.inheritedMultiplier}</strong>  ${rem.toFixed(1)}s`;
    } else {
      const lettersDisp = LETTERS.map((l, i) => state.letters[i] ? `<strong style="color:var(--pb-accent)">${l}</strong>` : `<span style="opacity:0.4">${l}</span>`).join(' ');
      html = `COMBO ×${state.comboLevel} (${state.comboHits}) · ${lettersDisp} · HACKS ${state.hacksCompleted}`;
    }
    game.setGoal(html);
  }

  function onLetterHit(now, ball, gameRef, idx) {
    if (state.letters[idx]) {
      game.addScore(80, ball.x, ball.y, 'lane');
      return;
    }
    state.letters[idx] = true;
    game.addScore(120, ball.x, ball.y - 10, 'lane');
    game.addPopup(ball.x, ball.y - 14, LETTERS[idx]);
    bumpCombo(now);
    if (state.letters.every(x => x)) {
      onHacksComplete(now);
    }
    updateGoal();
  }

  function onHacksComplete(now) {
    state.hacksCompleted++;
    game.addScore(5000, W/2, 80, 'hacks');
    game.addPopup(W/2, 80, 'HACKS  COMPLETE', 1400);
    state.letters = [false, false, false, false, false];
    // multiball
    state.inheritedMultiplier = state.comboLevel;
    startMultiball(now);
  }

  function startMultiball(now) {
    state.multiballActive = true;
    state.multiballEnd = now + 25000;
    game.setMultiplier(state.inheritedMultiplier);
    [Math.PI * -0.4, Math.PI * -0.5, Math.PI * -0.6].slice(0, 2).forEach(a => {
      const vx = Math.cos(a) * 750;
      const vy = Math.sin(a) * 750;
      game.addBall(240, 220, vx, vy);
    });
    game.addPopup(W/2, 200, 'HACK MULTIBALL', 1800);
    updateGoal();
  }

  function endMultiball() {
    state.multiballActive = false;
    state.inheritedMultiplier = 1;
    game.setMultiplier(state.comboLevel);
    updateGoal();
  }

  // ─── 渲染 ───
  function paintBackground(ctx, now) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0014');
    grad.addColorStop(0.55, '#0a0020');
    grad.addColorStop(1, '#02000a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // 扫描线 grid
    ctx.strokeStyle = 'rgba(255, 61, 248, 0.05)';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 24) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(61, 248, 255, 0.04)';
    for (let x = 0; x < W; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    // 顶部"赛博克"字
    ctx.save();
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255, 61, 248, ${0.10 + 0.05 * Math.sin(now / 500)})`;
    ctx.fillText('// CYBERPUNK', W/2, 56);
    ctx.restore();
    // 红光警报（combo>=3）
    if (state.comboLevel >= 3 && !state.multiballActive) {
      ctx.fillStyle = `rgba(255, 40, 80, ${0.05 + 0.05 * Math.sin(now / 80)})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function paintMidLayer(ctx, now) {
    // 5 letters lane lights
    for (let i = 0; i < 5; i++) {
      const cx = LETTER_X[i];
      const lit = state.letters[i];
      ctx.fillStyle = lit ? '#ff3df8' : 'rgba(120, 60, 140, 0.3)';
      ctx.fillRect(cx - 14, 96, 28, 8);
      if (lit) {
        ctx.shadowColor = '#ff3df8'; ctx.shadowBlur = 12;
        ctx.fillRect(cx - 14, 96, 28, 8);
        ctx.shadowBlur = 0;
      }
      ctx.fillStyle = lit ? '#fff' : 'rgba(180, 140, 200, 0.6)';
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(LETTERS[i], cx, 116);
    }
    // Combo 数字大字
    if (state.comboLevel > 1) {
      ctx.save();
      const pulse = 0.85 + 0.15 * Math.sin(now / 100);
      ctx.font = `bold ${48 * pulse}px monospace`;
      ctx.textAlign = 'center';
      const color = state.comboLevel >= 5 ? '#ff3df8' : (state.comboLevel >= 3 ? '#ffcc40' : '#3df8ff');
      ctx.fillStyle = `rgba(${color === '#ff3df8' ? '255,61,248' : color === '#ffcc40' ? '255,204,64' : '61,248,255'}, 0.25)`;
      ctx.fillText('×' + state.comboLevel, W/2, 200);
      ctx.restore();
    }
  }

  function paintForeground(ctx, now) {
    if (state.multiballActive) {
      ctx.fillStyle = `rgba(255, 61, 248, ${0.05 + 0.04 * Math.sin(now / 100)})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  const canvas = document.getElementById('pbCanvas');
  game = PinballCore.createGame({
    canvas, designW: W, designH: H, id: 'cyber',
    totalBalls: 1,
    drainY: 626, drainXRange: [100, 442],
    physics: { gravity: 1100, airDrag: 0.999, substeps: 8, maxSpeed: 1400, ballRadius: 9 },
    plunger: { x: 458, restY: 600, laneLeft: 442, laneRight: 474, maxCharge: 1.0, chargeRate: 1.6, maxVel: 1500, minVel: 520 },
    flippers: [
      { pivot: { x: 158, y: 590 }, length: 70, thick: 7, restDeg: 25, upDeg: -32, side: 'L', color: '#ff3df8' },
      { pivot: { x: 332, y: 590 }, length: 70, thick: 7, restDeg: 180 - 25, upDeg: 180 - (-32), side: 'R', color: '#3df8ff' },
    ],
    walls, bumpers, pegs, slings,
    triggers: LETTER_TRIGGERS,
    hud: {
      score: document.getElementById('pbScore'),
      best: document.getElementById('pbBest'),
      goalBar: document.getElementById('pbGoal'),
      chargeBar: document.getElementById('pbChargeBar'),
      launchHint: document.getElementById('pbLaunchHint'),
      overlay: document.getElementById('pbOverlay'),
      overlayTitle: document.getElementById('pbOvTitle'),
      overlayMsg: document.getElementById('pbOvMsg'),
      overlayBtn: document.getElementById('pbOvBtn'),
      pauseBtn: document.getElementById('pbPauseBtn'),
      newBtn: document.getElementById('pbNewBtn'),
      flipLBtn: document.getElementById('pbFlipL'),
      flipRBtn: document.getElementById('pbFlipR'),
      plungerBtn: document.getElementById('pbPlungerBtn'),
    },
    render: { paintBackground, paintMidLayer, paintForeground, wallColor: '#5a40a0' },
    store: { key: 'tool.pinball-cyber.v1' },
    shell: {
      gameId: 'pinball-cyber',
      title: '弹珠机·赛博克',
      emoji: '🌃',
      rankRow: document.getElementById('pb-rank-row'),
      lbMount: document.getElementById('pb-lb-mount'),
      lbTitle: '🏆 赛博克 排行榜',
      commentsMount: document.getElementById('pb-cm-mount'),
      commentsPath: '/toolbox/pinball/cyber/',
      commentsTitle: '💬 赛博克玩家交流',
      commentsIntro: '聊聊你的 combo ×5 和 hack multiball 心得 ~',
      commentsPlaceholder: '聊聊心得 ~',
      nickMount: document.getElementById('pb-nick-mount'),
      settleBtnMount: document.getElementById('pb-settle-btn-mount'),
      extraSubmit: () => ({ maxCombo: state.comboLevel, hacks: state.hacksCompleted }),
      statsBuilder: (s) => [
        { label: '最高 combo', value: '×' + state.comboLevel },
        { label: 'HACKS 完成', value: state.hacksCompleted },
        { label: '历史最高', value: Number(s.best || 0).toLocaleString() },
      ],
      watermark: 'zirconeey.github.io/toolbox/pinball/cyber',
    },
    hooks: {
      onStart: (s, g) => { game = g; rebuildState(); updateGoal(); },
      onBumperHit: (b, now) => { bumpCombo(now); updateGoal(); },
      onPegHit: (p, now) => { /* peg 不算 combo，避免太轻松 */ },
      onTick: (dt, now) => {
        // combo 衰减
        if (state.comboHits > 0 && now > state.comboExpiry) {
          resetCombo();
          updateGoal();
        }
        // multiball 计时
        if (state.multiballActive && now >= state.multiballEnd) {
          endMultiball();
        }
        if (state.multiballActive) updateGoal();
      },
      onAfterDrain: () => { resetCombo(); updateGoal(); },
    },
  });

  updateGoal();
})();
</script>
