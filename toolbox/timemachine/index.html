<style>
  .tm-wrap { max-width: 760px; margin: 0 auto; padding: 1rem; }
  .tm-wrap header { text-align: center; margin-bottom: 1.6rem; }
  .tm-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.4rem; }
  .tm-wrap header .sub { color: var(--color-light); font-style: normal; }

  .date-bar {
    display: flex; flex-wrap: wrap; gap: 0.7rem; align-items: center;
    justify-content: center;
    margin-bottom: 1.4rem;

  .date-bar input[type="date"] {
    font: inherit; font-size: 0.95rem; color: var(--color-ink);
    padding: 0.5rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg);
  }
  .date-bar input[type="date"]:focus { outline: none; border-color: var(--color-accent); }
  .date-bar .reset-btn {
    font: inherit; font-size: 0.85rem;
    padding: 0.5rem 0.95rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .date-bar .reset-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

  .featured-date {
    text-align: center;
    margin-bottom: 2rem;
  }
  .featured-date .display {
    font-family: var(--font-display);
    font-size: 2.4rem; font-weight: 600;
    color: var(--color-ink);
    line-height: 1.1;
  }
  .featured-date .hint {
    margin-top: 0.4rem;
    color: var(--color-muted);
    font-size: 0.9rem;
  }

  .results-zone { margin-top: 1.5rem; }

  .year-section {
    margin-bottom: 1.6rem;
    border-left: 3px solid var(--color-accent);

  .year-header {

    font-size: 0.8rem; font-weight: 400;

    display: block;

  .article-row:last-child { border-bottom: none; }
  .article-row:hover {
    color: var(--color-accent);
    transform: translateX(3px);
  }
  .article-row .ar-title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--color-ink);
    margin-bottom: 0.2rem;
    transition: color 0.18s;
  }
  .article-row:hover .ar-title { color: var(--color-accent); }
  .article-row .ar-meta {
    font-size: 0.78rem;
    color: var(--color-light);

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--color-light);
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 0.6rem; opacity: 0.5; }

  .nearest-fallback {
    margin-top: 1.5rem;
    padding: 1rem 1.2rem;
    background: var(--color-bg-warm);
    border-left: 3px solid var(--color-highlight);
    border-radius: 0 8px 8px 0;
  }
  .nearest-fallback .label {
    font-size: 0.82rem;
    color: var(--color-muted);
    margin-bottom: 0.5rem;
    font-style: normal;
  }

  .heatmap-zone {
    margin-top: 2.5rem;
    padding: 1.4rem 1.2rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 14px;
  }
  .heatmap-title {
    font-family: var(--font-display);
    font-weight: 600;
    margin-bottom: 0.9rem;
    color: var(--color-ink);
    display: flex; align-items: baseline; gap: 0.5rem;
  }
  .heatmap-title small {
    font-size: 0.78rem; font-weight: 400;

    font-family: var(--font-body);
  }
  .heatmap {
    display: grid;
    grid-template-columns: repeat(31, 1fr);

  }
  .heatmap .cell {
    aspect-ratio: 1;
    background: var(--color-bg-warm);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .heatmap .cell.has-posts.lvl-1 { background: rgba(30, 58, 95, 0.25); }
  .heatmap .cell.has-posts.lvl-2 { background: rgba(30, 58, 95, 0.5); }
  .heatmap .cell.has-posts.lvl-3 { background: rgba(30, 58, 95, 0.75); }
  .heatmap .cell.has-posts.lvl-4 { background: var(--color-accent); }
  .heatmap .cell.today { box-shadow: 0 0 0 2px var(--color-highlight); }
  .heatmap .cell.selected { box-shadow: 0 0 0 2px var(--color-accent); }
  .heatmap .cell:hover { transform: scale(1.15); z-index: 2; }
  .heatmap-month-row {
    display: grid;
    grid-template-columns: 32px 1fr;
    align-items: center;
    margin-bottom: 4px;
  }
  .heatmap-month-row .month-label {
    font-size: 0.78rem; color: var(--color-muted);
    text-align: right; padding-right: 0.5rem;
  }
  .heatmap-legend {
    margin-top: 0.8rem;
    display: flex; gap: 0.5rem; align-items: center;
    font-size: 0.78rem; color: var(--color-light);
    justify-content: flex-end;
  }
  .heatmap-legend .lc { width: 12px; height: 12px; border-radius: 2px; }

  .loading {
    text-align: center; padding: 3rem;
    color: var(--color-light);
    font-size: 0.95rem;
  }

  @media (max-width: 600px) {
    .featured-date .display { font-size: 1.9rem; }
    .heatmap-zone { padding: 1rem 0.8rem; }
    .heatmap { gap: 2px; }
  }
</style>

<div class="tm-wrap">
  <header>
    <h1>📅 X 年前的今天</h1>
    <p class="sub">Time Machine — 翻翻历年同一天的文章</p>
  </header>

  <div class="date-bar">
    <span class="label">查看日期：</span>
    <input type="date" id="date-input" />
    <button type="button" class="reset-btn" id="today-btn">📍 跳到今天</button>
  </div>

  <div class="featured-date">
    <div class="display" id="featured-display">…</div>
    <div class="hint" id="featured-hint">加载中…</div>
  </div>

  <div class="results-zone" id="results"></div>

  <div class="heatmap-zone" id="heatmap-zone" style="display: none;">
    <div class="heatmap-title">
      <span>📊 写作热力图</span>
      <small id="heatmap-subtitle"></small>
    </div>
    <div id="heatmap-body"></div>
    <div class="heatmap-legend">
      少 <div class="lc" style="background: var(--color-bg-warm);"></div>
      <div class="lc" style="background: rgba(30, 58, 95, 0.25);"></div>
      <div class="lc" style="background: rgba(30, 58, 95, 0.5);"></div>
      <div class="lc" style="background: rgba(30, 58, 95, 0.75);"></div>
      <div class="lc" style="background: var(--color-accent);"></div>
      多
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  let allPosts = [];
  let byMmdd = {};
  let allMmddSet = new Set();

  const $dateInput = document.getElementById('date-input');
  const $todayBtn = document.getElementById('today-btn');
  const $featDisplay = document.getElementById('featured-display');
  const $featHint = document.getElementById('featured-hint');
  const $results = document.getElementById('results');
  const $heatZone = document.getElementById('heatmap-zone');
  const $heatBody = document.getElementById('heatmap-body');
  const $heatSubtitle = document.getElementById('heatmap-subtitle');

  // ===== Util =====
  function pad2(n) { return String(n).padStart(2, '0'); }
  function todayMmdd() {
    const d = new Date();
    return pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function todayIso() {
    const d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function formatMmdd(mmdd) {
    const [m, d] = mmdd.split('-');
    return `${parseInt(m, 10)} 月 ${parseInt(d, 10)} 日`;
  }

  // ===== Data Loading =====
  async function loadData() {
    try {
      const res = await fetch('/assets/posts-by-mmdd.json', { cache: 'default' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allPosts = data.posts || [];
      // Group
      byMmdd = {};
      allPosts.forEach(p => {
        if (!byMmdd[p.mmdd]) byMmdd[p.mmdd] = [];
        byMmdd[p.mmdd].push(p);
        allMmddSet.add(p.mmdd);
      });
      // Sort each group by year desc
      Object.keys(byMmdd).forEach(k => {
        byMmdd[k].sort((a, b) => b.year - a.year);
      });
      return true;
    } catch (e) {
      $results.innerHTML = `<div class="empty"><div class="icon">⚠️</div>加载文章索引失败：${escapeHtml(e.message)}</div>`;
      return false;
    }
  }

  // ===== Render =====
  function renderForMmdd(mmdd, selectedFullDate) {
    $featDisplay.textContent = formatMmdd(mmdd);

    const hits = byMmdd[mmdd] || [];

    if (hits.length === 0) {
      $featHint.textContent = '这一天历史上还没写过文章';
      // 找最近的有文章的日期（±15 天内）
      const nearest = findNearestMmdd(mmdd, 15);
      if (nearest) {
        const nearestHits = byMmdd[nearest] || [];
        $results.innerHTML = `
          <div class="empty">
            <div class="icon">🤔</div>
            <div>这一天没有历史文章。</div>
          </div>
          <div class="nearest-fallback">
            <div class="label">最近的一天：${formatMmdd(nearest)}</div>
            ${nearestHits.map(renderArticleRow).join('')}
          </div>
        `;
      } else {
        $results.innerHTML = `
          <div class="empty">
            <div class="icon">🌱</div>
            <div>这一天还没有历史文章——也许就在今年开始？</div>
          </div>
        `;
      }
      return;
    }

    $featHint.textContent = `${hits.length} 篇历史文章`;

    // 按年份分组
    const byYear = {};
    hits.forEach(p => {
      if (!byYear[p.year]) byYear[p.year] = [];
      byYear[p.year].push(p);
    });
    const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);
    const currentYear = new Date().getFullYear();

    let html = '';
    years.forEach(y => {
      const delta = currentYear - y;
      const deltaText = delta === 0 ? '今年' : `${delta} 年前`;
      const distant = delta >= 3 ? 'distant' : '';
      html += `
        <div class="year-section ${distant}">
          <div class="year-header">
            <span>${y} 年</span>
            <span class="delta">· ${deltaText}</span>
          </div>
          ${byYear[y].map(renderArticleRow).join('')}
        </div>
      `;
    });
    $results.innerHTML = html;
  }

  function renderArticleRow(p) {
    const subTag = p.subCategory ? ` · ${escapeHtml(p.subCategory)}` : '';
    return `
      <a class="article-row" href="${p.url}">
        <div class="ar-title">${escapeHtml(p.title)}</div>
        <div class="ar-meta">${p.date}${escapeHtml(p.category)}${subTag}</div>
      </a>
    `;
  }

  function findNearestMmdd(targetMmdd, maxDelta) {
    const target = mmddToDayOfYear(targetMmdd);
    let best = null;
    let bestDelta = Infinity;
    allMmddSet.forEach(m => {
      const day = mmddToDayOfYear(m);
      // 圆周距离（4-月可以挨着 12 月 31 日）
      const d = Math.min(
        Math.abs(day - target),
        365 - Math.abs(day - target),
      );
      if (d < bestDelta && d > 0 && d <= maxDelta) {
        bestDelta = d;
        best = m;
      }
    });
    return best;
  }
  function mmddToDayOfYear(mmdd) {
    const [m, d] = mmdd.split('-').map(Number);
    const cum = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
    return cum[m - 1] + d;
  }

  // ===== Heatmap =====
  function renderHeatmap() {
    if (allPosts.length === 0) return;

    const months = [];
    const today = todayMmdd();
    const selected = currentSelectedMmdd();

    for (let m = 1; m <= 12; m++) {
      const days = new Date(2024, m, 0).getDate();
      let row = `<div class="heatmap-month-row"><span class="month-label">${m} 月</span><div class="heatmap">`;
      for (let d = 1; d <= 31; d++) {
        if (d > days) {
          row += `<div></div>`;
          continue;
        }
        const mmdd = pad2(m) + '-' + pad2(d);
        const count = (byMmdd[mmdd] || []).length;
        const lvl = count === 0 ? 0 : count === 1 ? 1 : count === 2 ? 2 : count === 3 ? 3 : 4;
        const cls = [
          'cell',
          count > 0 ? 'has-posts' : '',
          count > 0 ? 'lvl-' + lvl : '',
          mmdd === today ? 'today' : '',
          mmdd === selected ? 'selected' : '',
        ].filter(Boolean).join(' ');
        const titleAttr = count > 0
          ? `${m}/${d}：${count} 篇`
          : `${m}/${d}`;
        row += `<div class="${cls}" data-mmdd="${mmdd}" title="${titleAttr}"></div>`;
      }
      row += `</div></div>`;
      months.push(row);
    }
    $heatBody.innerHTML = months.join('');
    $heatBody.querySelectorAll('.cell[data-mmdd]').forEach(cell => {
      cell.addEventListener('click', () => {
        const mmdd = cell.dataset.mmdd;
        // 点击 heatmap → 用今年的对应日期
        const year = new Date().getFullYear();
        $dateInput.value = `${year}-${mmdd}`;
        renderForMmdd(mmdd);
        renderHeatmap();
      });
    });
    const totalDays = Object.keys(byMmdd).length;
    $heatSubtitle.textContent = `${allPosts.length} 篇文章，覆盖 ${totalDays} 个不同日期 · 点格子跳到那一天`;
    $heatZone.style.display = '';
  }

  function currentSelectedMmdd() {
    const v = $dateInput.value;
    if (!v) return todayMmdd();
    const parts = v.split('-');
    if (parts.length !== 3) return todayMmdd();
    return parts[1] + '-' + parts[2];
  }

  // ===== Wire up =====
  $dateInput.addEventListener('change', () => {
    const v = $dateInput.value;
    if (!v) return;
    const [y, m, d] = v.split('-');
    renderForMmdd(`${m}-${d}`, v);
    renderHeatmap();
  });
  $todayBtn.addEventListener('click', () => {
    $dateInput.value = todayIso();
    renderForMmdd(todayMmdd());
    renderHeatmap();
  });

  // ===== Init =====
  $results.innerHTML = '<div class="loading">加载文章索引…</div>';
  loadData().then(ok => {
    if (!ok) return;
    $dateInput.value = todayIso();
    renderForMmdd(todayMmdd());
    renderHeatmap();
  });
})();
</script>
