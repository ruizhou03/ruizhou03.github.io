<style>
  .ms-wrap {
    max-width: 860px; margin: 0 auto; padding: 1rem;
    /* light mode defaults */
    --ms-cell-size: 28px;
    --ms-cell-hidden: #d1d5db;
    --ms-cell-hidden-text: #1a1a2e;
    --ms-cell-hidden-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    --ms-cell-revealed: #f5f4f0;
    --ms-cell-revealed-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
    --ms-grid-line: #b8bcc2;
    --ms-mine-bg: #e74c3c;
    --ms-wrong-bg: #95a5a6;
    --ms-n1: #1976d2; --ms-n2: #388e3c; --ms-n3: #d32f2f; --ms-n4: #7b1fa2;
    --ms-n5: #c2185b; --ms-n6: #00838f; --ms-n7: #424242; --ms-n8: #616161;
  }
  :root[data-theme="dark"] .ms-wrap {
    --ms-cell-hidden: #5a5b58;
    --ms-cell-hidden-text: #f0f0f0;
    --ms-cell-hidden-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
    --ms-cell-revealed: #252422;
    --ms-cell-revealed-shadow: inset 0 1px 2px rgba(0,0,0,0.45);
    --ms-grid-line: #15140f;
    --ms-mine-bg: #c0392b;
    --ms-wrong-bg: #4f5b5d;
    --ms-n1: #5fa8ff; --ms-n2: #8bd17c; --ms-n3: #ff7a73; --ms-n4: #c79bff;
    --ms-n5: #ff8fc1; --ms-n6: #5fd0d9; --ms-n7: #e0e0e0; --ms-n8: #bdbdbd;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .ms-wrap {
      --ms-cell-hidden: #5a5b58;
      --ms-cell-hidden-text: #f0f0f0;
      --ms-cell-hidden-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
      --ms-cell-revealed: #252422;
      --ms-cell-revealed-shadow: inset 0 1px 2px rgba(0,0,0,0.45);
      --ms-grid-line: #15140f;
      --ms-mine-bg: #c0392b;
      --ms-wrong-bg: #4f5b5d;
      --ms-n1: #5fa8ff; --ms-n2: #8bd17c; --ms-n3: #ff7a73; --ms-n4: #c79bff;
      --ms-n5: #ff8fc1; --ms-n6: #5fd0d9; --ms-n7: #e0e0e0; --ms-n8: #bdbdbd;
    }
  }
  .ms-wrap[data-diff="easy"] { --ms-cell-size: 42px; }
  .ms-wrap[data-diff="mid"]  { --ms-cell-size: 32px; }
  .ms-wrap[data-diff="hard"] { --ms-cell-size: 26px; }
  /* On mobile, shrink to fit viewport so the whole board is visible without horizontal scroll.
     Buffer = 2×wrap padding + (cols-1) gap + 2 border ≈ 1rem + cols+1 px; use generous rem values.
     hard 在手机竖屏下被 JS 转置成 30×16（data-orient="tall"）→ 按 16 列算宽，腾出
     更大的格子（~22px vs 横版 ~12px），代价是页面会出现一段竖向滚动（700px+ 屏幕基本能装下）。 */
  @media (max-width: 600px) {
    .ms-wrap { padding: 0.5rem; }
    .ms-wrap[data-diff="easy"] { --ms-cell-size: min(42px, calc((100vw - 2rem) / 9)); }
    .ms-wrap[data-diff="mid"]  { --ms-cell-size: min(32px, calc((100vw - 2.5rem) / 16)); }
    .ms-wrap[data-diff="hard"] { --ms-cell-size: min(26px, calc((100vw - 3.5rem) / 30)); }
    .ms-wrap[data-diff="hard"][data-orient="tall"] { --ms-cell-size: min(34px, calc((100vw - 2.5rem) / 16)); }
  }

  .ms-wrap header { text-align: center; margin-bottom: 1.2rem; }
  .ms-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .ms-wrap header .sub { color: var(--color-light); font-style: italic; font-size: 0.92rem; }

  .ms-controls {
    display: flex; flex-wrap: wrap; gap: 0.5rem;

  .ms-cell.n1 { color: var(--ms-n1); }

</style>

<script>
(() => {
  const STORE_KEY = 'tool.minesweeper.v1';
  const DIFF = {
    easy: { rows: 9, cols: 9, mines: 10 },
    mid:  { rows: 16, cols: 16, mines: 40 },
    hard: { rows: 16, cols: 30, mines: 99 }
  };

  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  const state = {
    diff: stored.lastDiff || 'easy',
    best: Object.assign({ easy: null, mid: null, hard: null }, stored.best || {}),
    grid: [],
    revealed: [],
    flagged: [],
    wrong: [],
    rows: 0, cols: 0, mines: 0,
    started: false,
    over: false,
    won: false,
    mustGuess: false,
    firstR: -1, firstC: -1,
    startTime: 0,
    timer: null,
    elapsed: 0,
    longPressTimer: null,
    longPressFired: false
  };

  const wrapEl = document.querySelector('.ms-wrap');
  const boardEl = document.getElementById('msBoard');
  const flagsEl = document.getElementById('msFlags');
  const timeEl = document.getElementById('msTime');
  const bestEl = document.getElementById('msBest');
  const modalEl = document.getElementById('msModal');
  const newBtn = document.getElementById('msNewBtn');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({ best: state.best, lastDiff: state.diff }));
  }

  // 手机竖屏下把 hard 的 16×30 转置成 30×16，让宽方向只有 16 列、
  // 在 393px 屏幕能拿到 ~22px/格（vs 横版 ~12px），几乎翻倍。
  // 平板 / 桌面 / 横屏不触发，保留原版竞速布局。
  function shouldTransposeHardForPortrait() {
    return typeof window !== 'undefined' && window.matchMedia
      && window.matchMedia('(max-width: 600px) and (orientation: portrait)').matches;
  }

  function newGame() {
    const d = DIFF[state.diff];
    let rows = d.rows, cols = d.cols;
    if (state.diff === 'hard' && cols > rows && shouldTransposeHardForPortrait()) {
      [rows, cols] = [cols, rows];
    }
    state.rows = rows; state.cols = cols; state.mines = d.mines;
    state.grid = Array.from({ length: rows }, () => Array(cols).fill(0));
    state.revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
    state.flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
    state.wrong = Array.from({ length: rows }, () => Array(cols).fill(false));
    state.started = false;
    state.over = false;
    state.won = false;
    state.mustGuess = false;
    state.firstR = -1; state.firstC = -1;
    state.elapsed = 0;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    modalEl.textContent = '';
    modalEl.className = 'ms-modal-wrap';
    // 重置上榜状态：上一局的 PendingSubmit 锁要清，否则下一局赢了会被
    // msSubmitWithNick 第一行的 `if (msPendingSubmit) return` 静默挡掉
    if (typeof msPendingSubmit !== 'undefined') msPendingSubmit = false;
    if (typeof msLastRankInfo !== 'undefined') msLastRankInfo = null;
    if (typeof msSetRank === 'function') msSetRank('hidden');
    if (typeof msSettleBtn !== 'undefined' && msSettleBtn) msSettleBtn.setEnabled(false);
    renderBoard();
    updateStatus();
    document.querySelectorAll('.ms-diff-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.diff);
    });
  }

  // Single-attempt mine placement: clears state.grid, places mines avoiding the 3x3
  // safe area around the first click, then computes adjacent mine counts.
  function _plantMinesOnce(safeR, safeC) {
    state.grid = Array.from({ length: state.rows }, () => Array(state.cols).fill(0));
    let placed = 0;
    while (placed < state.mines) {
      const r = Math.floor(Math.random() * state.rows);
      const c = Math.floor(Math.random() * state.cols);
      if (state.grid[r][c] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      state.grid[r][c] = -1;
      placed++;
    }
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        if (state.grid[r][c] === -1) continue;
        let n = 0;
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols && state.grid[nr][nc] === -1) n++;
          }
        state.grid[r][c] = n;
      }
    }
  }

  // Basic constraint-propagation solver. Returns true iff the board is logically
  // solvable from (firstR, firstC) using only single-cell adjacency rules
  // (no subset / SAT). Used both for no-guess generation and end-of-game
  // must-guess detection. False positives (truly solvable boards labelled
  // "must-guess" because advanced patterns are needed) are intentional — the
  // game treats them as "lucky" rather than punishing the player.
  function simulateLogicSolver(grid, firstR, firstC, rows, cols) {
    const revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
    const flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
    const flood = (sr, sc) => {
      const stk = [[sr, sc]];
      while (stk.length) {
        const [r, c] = stk.pop();
        if (r < 0 || r >= rows || c < 0 || c >= cols) continue;
        if (revealed[r][c] || flagged[r][c]) continue;
        if (grid[r][c] === -1) return true; // contradiction; caller treats as unsolvable
        revealed[r][c] = true;
        if (grid[r][c] === 0) {
          for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++) {
              if (!dr && !dc) continue;
              stk.push([r + dr, c + dc]);
            }
        }
      }
      return false;
    };
    if (flood(firstR, firstC)) return false;
    let progress = true;
    while (progress) {
      progress = false;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (!revealed[r][c]) continue;
          const v = grid[r][c];
          if (v <= 0) continue;
          let flagCount = 0;
          const unknown = [];
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (!dr && !dc) continue;
              const nr = r + dr, nc = c + dc;
              if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
              if (flagged[nr][nc]) flagCount++;
              else if (!revealed[nr][nc]) unknown.push([nr, nc]);
            }
          }
          if (unknown.length === 0) continue;
          if (flagCount === v) {
            for (const [nr, nc] of unknown) if (flood(nr, nc)) return false;
            progress = true;
          } else if (v - flagCount === unknown.length) {
            for (const [nr, nc] of unknown) flagged[nr][nc] = true;
            progress = true;
          }
        }
      }
    }
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (grid[r][c] !== -1 && !revealed[r][c]) return false;
    return true;
  }

  // easy/mid: retry until a no-guess board is generated (or hit retry cap).
  // hard: density too high — accept the first random layout and rely on
  // end-of-game detection instead of retry generation.
  function plantMines(safeR, safeC) {
    const MAX_RETRY = (state.diff === 'hard') ? 1 : 50;
    for (let attempt = 0; attempt < MAX_RETRY; attempt++) {
      _plantMinesOnce(safeR, safeC);
      if (state.diff === 'hard') return;
      if (simulateLogicSolver(state.grid, safeR, safeC, state.rows, state.cols)) return;
    }
    // Fallback: cap exhausted. Keep the last random layout — must-guess
    // detection at end-of-game will still credit/excuse the player.
  }

  function renderBoard() {
    wrapEl.dataset.diff = state.diff;
    // tall: 行多于列（手机竖屏转置过的 hard）。CSS 据此切换 cell-size 公式。
    wrapEl.dataset.orient = (state.rows > state.cols) ? 'tall' : 'wide';
    boardEl.style.gridTemplateColumns = `repeat(${state.cols}, var(--ms-cell-size))`;
    boardEl.innerHTML = '';
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'ms-cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        boardEl.appendChild(cell);
      }
    }
    paintAll();
  }

  function paintAll() {
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        paintCell(r, c);
      }
    }
  }

  function paintCell(r, c) {
    const idx = r * state.cols + c;
    const el = boardEl.children[idx];
    el.className = 'ms-cell';
    el.textContent = '';
    if (state.flagged[r][c] && !state.revealed[r][c]) {
      el.classList.add('flagged');
      return;
    }
    if (!state.revealed[r][c]) return;
    el.classList.add('revealed');
    if (state.wrong[r][c]) { el.classList.add('wrong'); return; }
    const v = state.grid[r][c];
    if (v === -1) { el.classList.add('mine'); return; }
    if (v > 0) {
      el.classList.add('n' + v);
      el.textContent = v;
    }
  }

  function reveal(r, c) {
    if (state.over) return;
    if (state.revealed[r][c] || state.flagged[r][c]) return;
    if (!state.started) {
      plantMines(r, c);
      state.started = true;
      state.firstR = r; state.firstC = c;
      state.startTime = Date.now();
      state.timer = setInterval(() => {
        state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
        timeEl.textContent = state.elapsed;
      }, 250);
    }
    floodFill(r, c);
    paintAll();
    checkWin();
  }

  function floodFill(r, c) {
    const stack = [[r, c]];
    while (stack.length) {
      const [cr, cc] = stack.pop();
      if (cr < 0 || cr >= state.rows || cc < 0 || cc >= state.cols) continue;
      if (state.revealed[cr][cc] || state.flagged[cr][cc]) continue;
      state.revealed[cr][cc] = true;
      const v = state.grid[cr][cc];
      if (v === -1) {
        gameOver(false);
        return;
      }
      if (v === 0) {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            stack.push([cr + dr, cc + dc]);
          }
      }
    }
  }

  function chord(r, c) {
    if (state.over) return;
    if (!state.revealed[r][c]) return;
    const v = state.grid[r][c];
    if (v <= 0) return; // only number cells
    let flagCount = 0;
    const targets = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= state.rows || nc < 0 || nc >= state.cols) continue;
        if (state.flagged[nr][nc]) { flagCount++; continue; }
        if (state.revealed[nr][nc]) continue;
        targets.push([nr, nc]);
      }
    }
    if (flagCount !== v) return; // standard chord rule: only fire when flags match
    if (targets.length === 0) return;
    for (const [nr, nc] of targets) {
      if (state.over) break;
      floodFill(nr, nc);
    }
    paintAll();
    if (!state.over) checkWin();
  }

  function toggleFlag(r, c) {
    if (state.over) return;
    if (state.revealed[r][c]) return;
    state.flagged[r][c] = !state.flagged[r][c];
    paintCell(r, c);
    updateStatus();
    if (state.started) checkWin();
  }

  function checkWin() {
    // Win 1: all non-mine cells revealed (standard)
    let unrevealed = 0;
    for (let r = 0; r < state.rows; r++)
      for (let c = 0; c < state.cols; c++)
        if (!state.revealed[r][c]) unrevealed++;
    if (unrevealed === state.mines) { gameOver(true); return; }

    // Win 2: all mines correctly flagged → auto-reveal remaining safe cells
    let flagCount = 0, allCorrect = true;
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        if (state.flagged[r][c]) {
          flagCount++;
          if (state.grid[r][c] !== -1) { allCorrect = false; }
        }
      }
    }
    if (flagCount === state.mines && allCorrect) {
      for (let r = 0; r < state.rows; r++)
        for (let c = 0; c < state.cols; c++)
          if (!state.flagged[r][c] && !state.revealed[r][c]) state.revealed[r][c] = true;
      gameOver(true);
    }
  }

  function gameOver(won) {
    state.over = true;
    state.won = won;
    // Use direct computation so elapsed is accurate even if the interval
    // timer was throttled (mobile Safari, background tab, low-power mode).
    if (state.started) {
      state.elapsed = Math.max(state.elapsed,
        Math.floor((Date.now() - state.startTime) / 1000));
    }
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    // Detect "must-guess" boards: rerun the solver from the first click on the
    // final mine layout. If solver can't fully resolve, the player had to guess
    // at some point — credit a win as luck and excuse a loss.
    if (state.started && state.firstR >= 0) {
      state.mustGuess = !simulateLogicSolver(state.grid, state.firstR, state.firstC, state.rows, state.cols);
    }
    if (won) {
      const prefix = state.mustGuess ? '🍀' : '🎉';
      const suffix = state.mustGuess ? '，运气真好' : '';
      modalEl.textContent = `${prefix} ${state.elapsed} 秒通关${suffix}！`;
      modalEl.className = 'ms-modal-wrap win';
      const prev = state.best[state.diff];
      if (prev == null || state.elapsed < prev) {
        state.best[state.diff] = state.elapsed;
        persist();
        modalEl.textContent += '（新纪录）';
      }
      // Auto flag remaining mines for clarity
      for (let r = 0; r < state.rows; r++)
        for (let c = 0; c < state.cols; c++)
          if (state.grid[r][c] === -1) state.flagged[r][c] = true;
    } else {
      modalEl.textContent = state.mustGuess ? '💔 这局本来就要靠猜，不怪你' : '💥 踩到雷了';
      modalEl.className = 'ms-modal-wrap lose';
      // Reveal all mines + mark wrong flags via state (paintCell will render)
      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          if (state.grid[r][c] === -1 && !state.flagged[r][c]) state.revealed[r][c] = true;
          if (state.grid[r][c] !== -1 && state.flagged[r][c]) {
            state.revealed[r][c] = true;
            state.wrong[r][c] = true;
          }
        }
      }
    }
    paintAll();
    updateStatus();
    if (won || state.mustGuess) msTryAutoSubmit();
    else msSetRank('hidden');
    if (typeof msSave !== 'undefined' && msSave) msSave.discard();
    if (typeof msSettleBtn !== 'undefined' && msSettleBtn) msSettleBtn.setEnabled(true);
  }

  function updateStatus() {
    let flagged = 0;
    for (let r = 0; r < state.rows; r++)
      for (let c = 0; c < state.cols; c++)
        if (state.flagged[r][c]) flagged++;
    flagsEl.textContent = state.mines - flagged;
    bestEl.textContent = state.best[state.diff] != null ? state.best[state.diff] + 's' : '—';
  }

  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  // Right-click flag — works for desktop mice and touch devices with pointer access
  boardEl.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const cell = e.target.closest('.ms-cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    toggleFlag(r, c);
  });

  function dblTapAction(r, c) {
    if (state.revealed[r][c]) chord(r, c);
    else toggleFlag(r, c);
  }

  if (isTouch) {
    // Touch device: delay single-tap to disambiguate from double-tap.
    // Tap = reveal (after ~280ms); double-tap = flag (or chord if revealed); long-press = flag (backup).
    let pending = null; // { r, c, timer }
    const DBL_TAP_MS = 280;

    boardEl.addEventListener('click', (e) => {
      if (state.longPressFired) { state.longPressFired = false; return; }
      const cell = e.target.closest('.ms-cell');
      if (!cell) return;
      const r = +cell.dataset.r, c = +cell.dataset.c;
      if (pending && pending.r === r && pending.c === c) {
        clearTimeout(pending.timer);
        pending = null;
        dblTapAction(r, c);
        return;
      }
      if (pending) clearTimeout(pending.timer);
      pending = {
        r, c,
        timer: setTimeout(() => { reveal(r, c); pending = null; }, DBL_TAP_MS)
      };
    });

    let touchAnchor = null;
    boardEl.addEventListener('touchstart', (e) => {
      const cell = e.target.closest('.ms-cell');
      if (!cell) return;
      const r = +cell.dataset.r, c = +cell.dataset.c;
      const t = e.touches[0];
      touchAnchor = { x: t.clientX, y: t.clientY };
      state.longPressTimer = setTimeout(() => {
        state.longPressFired = true;
        toggleFlag(r, c);
        if (pending) { clearTimeout(pending.timer); pending = null; }
        state.longPressTimer = null;
      }, 400);
    }, { passive: true });
    boardEl.addEventListener('touchend', () => {
      if (state.longPressTimer) { clearTimeout(state.longPressTimer); state.longPressTimer = null; }
      touchAnchor = null;
    });
    // Lenient: only cancel long-press if the finger moves > 10px (avoids 1px jitter false-cancels)
    boardEl.addEventListener('touchmove', (e) => {
      if (!state.longPressTimer || !touchAnchor) return;
      const t = e.touches[0];
      const dx = t.clientX - touchAnchor.x;
      const dy = t.clientY - touchAnchor.y;
      if (dx * dx + dy * dy > 100) {
        clearTimeout(state.longPressTimer);
        state.longPressTimer = null;
        touchAnchor = null;
      }
    }, { passive: true });
  } else {
    // Desktop: instant click reveal, dblclick chord-or-flag (no latency)
    boardEl.addEventListener('click', (e) => {
      const cell = e.target.closest('.ms-cell');
      if (!cell) return;
      const r = +cell.dataset.r, c = +cell.dataset.c;
      reveal(r, c);
    });
    boardEl.addEventListener('dblclick', (e) => {
      e.preventDefault();
      const cell = e.target.closest('.ms-cell');
      if (!cell) return;
      const r = +cell.dataset.r, c = +cell.dataset.c;
      dblTapAction(r, c);
    });
  }

  // Difficulty tabs
  document.getElementById('msDiffTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.ms-diff-tab');
    if (!t) return;
    state.diff = t.dataset.diff;
    persist();
    newGame();
  });

  newBtn.onclick = () => { if (typeof msSave !== 'undefined' && msSave) msSave.discard(); newGame(); };

  // ── games-shell 接入 ──────────────────────
  let msLbWidget = null;
  let msNickPrompt = null;
  let msPendingSubmit = false;
  let msRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
  let msSettleBtn = null;
  let msLastRankInfo = null;
  const $msRankRow = document.getElementById('ms-rank-row');

  const MS_DIFF_LABEL = { easy: '简单', mid: '中等', hard: '高级' };
  const MS_NUMBER_COLORS = { 1: '#1976d2', 2: '#388e3c', 3: '#d32f2f', 4: '#1a237e',
                              5: '#7b1fa2', 6: '#00796b', 7: '#212121', 8: '#616161' };

  function msPaintBoard(ctx, x, y, w, h) {
    const cols = state.cols;
    const rows = state.rows;
    const cell = Math.min(w / cols, h / rows);
    const ox = x + (w - cell * cols) / 2;
    const oy = y + (h - cell * rows) / 2;
    ctx.fillStyle = '#bdbdbd';
    ctx.fillRect(x, y, w, h);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cx = ox + c * cell;
        const cy = oy + r * cell;
        const v = state.grid[r][c];
        const revealed = state.revealed[r][c];
        const flagged = state.flagged[r][c];
        const wrong = state.wrong && state.wrong[r][c];
        // 底色
        if (!revealed) {
          ctx.fillStyle = '#cfcfcf';
          ctx.fillRect(cx + 1, cy + 1, cell - 2, cell - 2);
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = Math.max(1, cell * 0.06);
          ctx.beginPath();
          ctx.moveTo(cx + 1, cy + cell - 1);
          ctx.lineTo(cx + 1, cy + 1);
          ctx.lineTo(cx + cell - 1, cy + 1);
          ctx.stroke();
          ctx.strokeStyle = '#8a8a8a';
          ctx.beginPath();
          ctx.moveTo(cx + 1, cy + cell - 1);
          ctx.lineTo(cx + cell - 1, cy + cell - 1);
          ctx.lineTo(cx + cell - 1, cy + 1);
          ctx.stroke();
        } else {
          ctx.fillStyle = (v === -1 && !flagged) ? '#ef9a9a' : '#e0e0e0';
          ctx.fillRect(cx + 1, cy + 1, cell - 2, cell - 2);
          ctx.strokeStyle = 'rgba(0,0,0,0.18)';
          ctx.lineWidth = 1;
          ctx.strokeRect(cx + 0.5, cy + 0.5, cell, cell);
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (flagged) {
          ctx.fillStyle = '#d32f2f';
          ctx.font = `${Math.max(8, cell * 0.6)}px sans-serif`;
          ctx.fillText(wrong && revealed ? '✗' : '⚑', cx + cell / 2, cy + cell / 2 + cell * 0.04);
        } else if (revealed) {
          if (v === -1) {
            ctx.fillStyle = '#212121';
            ctx.font = `${Math.max(8, cell * 0.55)}px sans-serif`;
            ctx.fillText('💣', cx + cell / 2, cy + cell / 2 + cell * 0.04);
          } else if (v > 0) {
            ctx.fillStyle = MS_NUMBER_COLORS[v] || '#212121';
            ctx.font = `700 ${Math.max(8, cell * 0.6)}px Georgia, serif`;
            ctx.fillText(String(v), cx + cell / 2, cy + cell / 2 + cell * 0.04);
          }
        }
      }
    }
  }

  function msGetSettlementOpts() {
    const ri = msLastRankInfo || {};
    const won = state.won;
    const mustGuess = state.mustGuess;
    const resultLabel = won
      ? (mustGuess ? '🍀 运气通关' : '🎉 通关')
      : (mustGuess ? '💔 必猜遗憾' : '💥 踩雷');
    return {
      kind: 'single',
      gameId: 'minesweeper',
      title: '扫雷',
      emoji: '💣',
      nick: GamesShell.Identity.getNick(),
      score: state.elapsed,
      scoreLabel: won ? '通 关 用 时' : '坚 持 用 时',
      scoreFormatter: v => v + ' s',
      rankInfo: ri,
      stats: [
        { label: '难度', value: MS_DIFF_LABEL[state.diff] || state.diff },
        { label: '盘面', value: `${state.cols}×${state.rows}　雷 ${state.mines}` },
        { label: '结果', value: resultLabel },
        { label: '历史最佳', value: state.best[state.diff] != null ? state.best[state.diff] + ' s' : '—' },
      ],
      paintBoard: msPaintBoard,
      boardW: 480,
      boardAspect: state.cols / state.rows,
      watermark: 'zirconeey.github.io/toolbox/minesweeper',
    };
  }

  function msSetRank(name, data) {
    if (name === 'hidden') {
      $msRankRow.classList.remove('show', 'loading', 'failed');
      $msRankRow.innerHTML = '';
      msLastRankInfo = null;
      return;
    }
    $msRankRow.classList.add('show');
    $msRankRow.classList.remove('loading', 'failed');
    const mode = MS_DIFF_LABEL[state.diff] || state.diff;
    if (name === 'loading') {
      $msRankRow.classList.add('loading'); $msRankRow.textContent = '排名上传中…';
      msLastRankInfo = { mode };
    }
    else if (name === 'failed') {
      $msRankRow.classList.add('failed'); $msRankRow.textContent = '排行榜暂时不可用（不影响游戏）';
      msLastRankInfo = { failed: true, mode };
    }
    else if (name === 'pending') {
      $msRankRow.classList.add('failed'); $msRankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
      msLastRankInfo = { pending: true, mode };
    }
    else if (name === 'success' && data && data.rank && data.total) {
      $msRankRow.innerHTML = '';
      $msRankRow.append(
        document.createTextNode('第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
      msLastRankInfo = { rank: data.rank, total: data.total, mode };
    }
    else if (name === 'not-best' && data) {
      $msRankRow.innerHTML = '';
      const cur = (Number(data.score) / 1000).toFixed(1);
      const best = (Number(data.best) / 1000).toFixed(1);
      $msRankRow.append(
        document.createTextNode('本局 '),
        Object.assign(document.createElement('strong'), { textContent: cur + ' s' }),
        document.createTextNode(' · 未刷新最佳（'),
        Object.assign(document.createElement('strong'), { textContent: best + ' s' }),
        document.createTextNode('）'),
      );
      msLastRankInfo = { mode, pending: false };
    }
  }

  async function msSubmitWithNick(nick) {
    // Widened gate: allow must-guess losses to submit too (no time penalty —
    // they show as a grey 🍀 badge on the leaderboard, not a clean win).
    if (!nick || msPendingSubmit || (!state.won && !state.mustGuess)) return;
    msPendingSubmit = true;
    msSetRank('loading');
    const timeMs = state.elapsed * 1000;
    const extra = { difficulty: state.diff };
    if (state.mustGuess) { extra.lucky = true; extra.won = state.won; }
    const r = await GamesShell.Leaderboard.submit({
      gameId: 'minesweeper',
      nick,
      score: timeMs,
      durationMs: Math.max(1000, timeMs),
      clientNonce: msRunNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra,
    });
    if (r && r.ok) {
      // 后端按 sortDir:'asc' + ZADD LT 处理：只在用时**更短**时才会替换。
      // isNewBest=false 说明这局没刷新自己的最佳——告知玩家避免误会。
      if (r.isNewBest === false) {
        msSetRank('not-best', { score: timeMs, best: r.best });
      } else {
        msSetRank('success', { rank: r.rank, total: r.total });
      }
      if (msLbWidget) msLbWidget.refresh();
      return;
    }
    msPendingSubmit = false;
    if (r && r.reason === 'nick_taken') {
      GamesShell.Identity.clearNick();
      alert('“' + nick + '” 已被别的玩家占用，请换一个昵称');
      msSetRank('pending');
      if (msNickPrompt) { msNickPrompt.refresh(); msNickPrompt.show(); }
      return;
    }
    msSetRank('failed');
    if (r && r.reason) console.warn('[ms] submit rejected:', r.reason);
  }

  function msTryAutoSubmit() {
    if (!window.GamesShell) return;
    if (!state.won && !state.mustGuess) { msSetRank('hidden'); return; }
    msRunNonce = GamesShell.Identity.newRunNonce();
    const nick = GamesShell.Identity.getNick();
    if (nick) msSubmitWithNick(nick);
    else { msSetRank('pending'); msNickPrompt && msNickPrompt.show(); }
  }

  function msInitShell() {
    if (!window.GamesShell) return;
    msLbWidget = GamesShell.Leaderboard.mount({
      container: document.getElementById('ms-lb-mount'),
      gameId: 'minesweeper',
      title: '🏆 扫雷 排行榜',
      scoreFormatter: v => (Number(v) / 1000).toFixed(1) + ' s',
      getCurrentNick: () => GamesShell.Identity.getNick(),
      getSplit: () => state.diff,
      splitTabs: [
        { value: 'easy', label: '简单' },
        { value: 'mid',  label: '中等' },
        { value: 'hard', label: '高级' },
      ],
      entryDecorator: (li, e) => {
        if (!e || !e.extra || !e.extra.lucky) return;
        const clover = document.createElement('span');
        clover.className = 'gs-lb-clover ' + (e.extra.won ? 'gs-clover-win' : 'gs-clover-loss');
        clover.textContent = '🍀';
        clover.title = e.extra.won ? '运气好通关' : '必猜遗憾失败';
        li.appendChild(clover);
      },
    });
    GamesShell.Comments.mount({
      container: document.getElementById('ms-cm-mount'),
      path: '/toolbox/minesweeper/',
      title: '💬 扫雷心得',
      intro: '聊聊 hard 难度的最佳成绩、经典开局、踩雷大笑话 ~',
      placeholder: '聊聊你的扫雷心得 ~',
    });
    msNickPrompt = GamesShell.NickPrompt.mount({
      container: document.getElementById('ms-nick-mount'),
      prompt: '想上排行榜？起个昵称吧',
      onSubmit: nick => msSubmitWithNick(nick),
      onSkip: () => msSetRank('hidden'),
    });
    if (GamesShell.Settlement) {
      msSettleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('ms-settle-btn-mount'),
        gameId: 'minesweeper',
        getOpts: msGetSettlementOpts,
        startDisabled: !state.over,
      });
    }
  }

  // 切换难度后排行榜面板同步切到对应 tab + 丢当前局存档
  document.getElementById('msDiffTabs').addEventListener('click', () => {
    if (typeof msSave !== 'undefined' && msSave) msSave.discard();
    if (msLbWidget) msLbWidget.setSplit(state.diff);
  });

  // ── 48h 续局 ─────────────────────────────
  // 注意：minesweeper 计分是用时（越短越好）。续局后玩家的 elapsed
  // 会带上离开期间的时间——也就是说"暂停 12 h 再回来速通"实际上会让
  // 这局成绩**变差**，不会作弊。后端 60 min 上限 + 已有的"用时短在前"
  // 自然约束。所以续局走原排行榜路径不需要任何特殊标记。
  let msSave = null;

  function msSerialize() {
    if (state.over || !state.started) return null;
    // Compute accurate elapsed in case the interval timer was throttled.
    const elapsed = Math.max(state.elapsed,
      Math.floor((Date.now() - state.startTime) / 1000));
    return {
      diff: state.diff,
      grid: state.grid,
      revealed: state.revealed,
      flagged: state.flagged,
      wrong: state.wrong,
      rows: state.rows, cols: state.cols, mines: state.mines,
      elapsed,
    };
  }
  function msRestore(saved) {
    state.diff = saved.diff || 'easy';
    state.rows = saved.rows;
    state.cols = saved.cols;
    state.mines = saved.mines;
    state.grid = saved.grid;
    state.revealed = saved.revealed;
    state.flagged = saved.flagged;
    state.wrong = saved.wrong || Array.from({ length: saved.rows }, () => Array(saved.cols).fill(false));
    state.started = true;
    state.over = false;
    state.won = false;
    state.elapsed = Number(saved.elapsed) || 0;
    state.startTime = Date.now() - state.elapsed * 1000;
    if (state.timer) { clearInterval(state.timer); }
    state.timer = setInterval(() => {
      if (state.over) return;
      state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      timeEl.textContent = state.elapsed;
    }, 250);
    timeEl.textContent = state.elapsed;
    modalEl.textContent = '';
    modalEl.className = 'ms-modal-wrap';
    renderBoard();
    updateStatus();
    document.querySelectorAll('.ms-diff-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.diff);
    });
  }

  // ============ Pre-game Overlay ============
  const msPgoOverlay = document.getElementById('msPreGameOverlay');
  const msPgoViewMain = document.getElementById('msPgoViewMain');
  const msPgoViewResume = document.getElementById('msPgoViewResume');
  const msPgoBestTime = document.getElementById('msPgoBestTime');
  const msPgoDiffPicker = document.getElementById('msPgoDiffPicker');

  let msPgoSelectedDiff = state.diff;

  function msShowOverlayView(name) {
    msPgoViewMain.classList.toggle('active', name === 'main');
    msPgoViewResume.classList.toggle('active', name === 'resume');
  }

  function msUpdatePgoBest() {
    const best = state.best[msPgoSelectedDiff];
    msPgoBestTime.textContent = best != null ? (best / 1000).toFixed(1) + ' s' : '—';
    document.querySelectorAll('#msPgoDiffPicker .gs-pgo-mode-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.value === msPgoSelectedDiff);
    });
  }

  function msStartFromOverlay() {
    state.diff = msPgoSelectedDiff;
    persist();
    updateStatus();
    if (msLbWidget) msLbWidget.setSplit(state.diff);
    msPgoOverlay.classList.remove('open');
    newGame();
    if (msSave) msSave.start();
  }

  msPgoDiffPicker.addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-mode-tab');
    if (!t) return;
    msPgoSelectedDiff = t.dataset.value;
    msUpdatePgoBest();
  });

  document.getElementById('msPgoStartBtn').addEventListener('click', msStartFromOverlay);

  // Resume buttons
  document.getElementById('msPgoResumeContinueBtn').addEventListener('click', () => {
    const peek = msSave ? msSave.peek() : null;
    if (peek && peek.data && peek.data.grid) {
      msPgoOverlay.classList.remove('open');
      msRestore(peek.data);
      msSave.start();
    }
  });
  document.getElementById('msPgoResumeNewBtn').addEventListener('click', () => {
    msSave && msSave.discard();
    msStartFromOverlay();
  });

  msInitShell();
  // Render a preview board so the overlay has a visible backdrop
  newGame();

  if (window.GamesShell && GamesShell.SaveState) {
    msSave = GamesShell.SaveState.create({
      key: 'tool.minesweeper.savestate.v1',
      ttlMs: 48 * 3600 * 1000,
      serialize: msSerialize,
    });
    const peek = msSave.peek();
    if (peek && peek.data && peek.data.grid) {
      msRestore(peek.data);
      msPgoResumeSummary.innerHTML = `<strong>${peek.data.diff || 'easy'}</strong> 难度 · 已用 <strong>${peek.data.elapsed || 0}</strong> s<span class="gs-pgo-resume-meta">${peek.agoText || ''}保存</span>`;
      msShowOverlayView('resume');
    } else {
      msUpdatePgoBest();
      msShowOverlayView('main');
    }
    msPgoOverlay.classList.add('open');
  } else {
    msUpdatePgoBest();
    msShowOverlayView('main');
    msPgoOverlay.classList.add('open');
  }

})();
</script>
