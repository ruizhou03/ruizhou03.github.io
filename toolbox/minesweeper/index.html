<style>
  .ms-wrap { max-width: 720px; margin: 0 auto; padding: 1rem; }
  .ms-wrap header { text-align: center; margin-bottom: 1.2rem; }
  .ms-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .ms-wrap header .sub { color: var(--color-light); font-style: italic; font-size: 0.92rem; }

  .ms-controls {
    display: flex; flex-wrap: wrap; gap: 0.5rem;

    margin-bottom: 0.9rem;
  }
  .ms-diff-tabs { display: inline-flex; gap: 0.25rem; }
  .ms-diff-tab {

  .ms-btn {
    padding: 0.4rem 0.85rem;
    font-size: 0.86rem;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: 8px;
    cursor: pointer;
    color: var(--color-ink);

  }
  .ms-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

  .ms-statusbar {
    display: flex; gap: 0.6rem; justify-content: center; align-items: center;
    margin-bottom: 0.9rem;
  }

    font-variant-numeric: tabular-nums;

  .ms-board-wrap {
    overflow-x: auto;

  }

  .ms-cell {
    width: 28px; height: 28px;

  :root[data-theme="dark"] .ms-cell { background: #4a4a48; color: #f0f0f0; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .ms-cell { background: #4a4a48; color: #f0f0f0; }
  }
  .ms-cell.revealed {

  }
  .ms-cell.flagged::before { content: '🚩'; font-size: 1rem; }
  .ms-cell.mine { background: #e74c3c; color: #fff; }

  .ms-cell.n2 { color: #388e3c; }
  .ms-cell.n3 { color: #d32f2f; }

  .ms-cell.n5 { color: #c2185b; }

<div class="ms-wrap">
  <header>
    <h1>💣 扫雷</h1>
    <div class="sub">数字代表周围 8 格的雷数 — 推理排雷</div>
  </header>

  <div class="ms-controls">
    <div class="ms-diff-tabs" id="msDiffTabs">
      <button class="ms-diff-tab active" data-diff="easy">简单 9×9</button>
      <button class="ms-diff-tab" data-diff="mid">中等 16×16</button>
      <button class="ms-diff-tab" data-diff="hard">高级 16×30</button>
    </div>
    <button class="ms-btn" id="msNewBtn">🔄 新游戏</button>
  </div>

  <div class="ms-statusbar">
    <div class="ms-stat"><span class="lab">剩余</span><span id="msFlags">10</span></div>
    <div class="ms-stat"><span class="lab">用时</span><span id="msTime">0</span></div>
    <div class="ms-stat"><span class="lab">最佳</span><span id="msBest">—</span></div>
  </div>

  <div class="ms-board-wrap">
    <div class="ms-board" id="msBoard"></div>
  </div>

  <div class="ms-modal-wrap" id="msModal"></div>

  <div class="ms-help">
    桌面：左键揭格、右键插旗、双击数字一键揭周围八格<br>
    移动端：短按揭、长按 0.4 秒插旗、双击数字同样可一键揭
  </div>
</div>

<script>
(() => {
  const STORE_KEY = 'tool.minesweeper.v1';
  const DIFF = {
    easy: { rows: 9, cols: 9, mines: 10 },
    mid:  { rows: 16, cols: 16, mines: 40 },
    hard: { rows: 16, cols: 30, mines: 99 }
  };

  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  const state = {
    diff: stored.lastDiff || 'easy',
    best: Object.assign({ easy: null, mid: null, hard: null }, stored.best || {}),
    grid: [],
    revealed: [],
    flagged: [],
    rows: 0, cols: 0, mines: 0,
    started: false,
    over: false,
    won: false,
    startTime: 0,
    timer: null,
    elapsed: 0,
    longPressTimer: null,
    longPressFired: false
  };

  const boardEl = document.getElementById('msBoard');
  const flagsEl = document.getElementById('msFlags');
  const timeEl = document.getElementById('msTime');
  const bestEl = document.getElementById('msBest');
  const modalEl = document.getElementById('msModal');
  const newBtn = document.getElementById('msNewBtn');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({ best: state.best, lastDiff: state.diff }));
  }

  function newGame() {
    const d = DIFF[state.diff];
    state.rows = d.rows; state.cols = d.cols; state.mines = d.mines;
    state.grid = Array.from({ length: d.rows }, () => Array(d.cols).fill(0));
    state.revealed = Array.from({ length: d.rows }, () => Array(d.cols).fill(false));
    state.flagged = Array.from({ length: d.rows }, () => Array(d.cols).fill(false));
    state.started = false;
    state.over = false;
    state.won = false;
    state.elapsed = 0;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    modalEl.textContent = '';
    modalEl.className = 'ms-modal-wrap';
    renderBoard();
    updateStatus();
    document.querySelectorAll('.ms-diff-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.diff);
    });
  }

  function plantMines(safeR, safeC) {
    let placed = 0;
    while (placed < state.mines) {
      const r = Math.floor(Math.random() * state.rows);
      const c = Math.floor(Math.random() * state.cols);
      if (state.grid[r][c] === -1) continue;
      // Keep first click and its neighbors safe
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      state.grid[r][c] = -1;
      placed++;
    }
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        if (state.grid[r][c] === -1) continue;
        let n = 0;
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols && state.grid[nr][nc] === -1) n++;
          }
        state.grid[r][c] = n;
      }
    }
  }

  function renderBoard() {
    boardEl.style.gridTemplateColumns = `repeat(${state.cols}, 28px)`;
    boardEl.innerHTML = '';
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'ms-cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        boardEl.appendChild(cell);
      }
    }
    paintAll();
  }

  function paintAll() {
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        paintCell(r, c);
      }
    }
  }

  function paintCell(r, c) {
    const idx = r * state.cols + c;
    const el = boardEl.children[idx];
    el.className = 'ms-cell';
    el.textContent = '';
    if (state.flagged[r][c] && !state.revealed[r][c]) {
      el.classList.add('flagged');
      return;
    }
    if (!state.revealed[r][c]) return;
    el.classList.add('revealed');
    const v = state.grid[r][c];
    if (v === -1) { el.classList.add('mine'); return; }
    if (v > 0) {
      el.classList.add('n' + v);
      el.textContent = v;
    }
  }

  function reveal(r, c) {
    if (state.over) return;
    if (state.revealed[r][c] || state.flagged[r][c]) return;
    if (!state.started) {
      plantMines(r, c);
      state.started = true;
      state.startTime = Date.now();
      state.timer = setInterval(() => {
        state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
        timeEl.textContent = state.elapsed;
      }, 250);
    }
    floodFill(r, c);
    paintAll();
    checkWin();
  }

  function floodFill(r, c) {
    const stack = [[r, c]];
    while (stack.length) {
      const [cr, cc] = stack.pop();
      if (cr < 0 || cr >= state.rows || cc < 0 || cc >= state.cols) continue;
      if (state.revealed[cr][cc] || state.flagged[cr][cc]) continue;
      state.revealed[cr][cc] = true;
      const v = state.grid[cr][cc];
      if (v === -1) {
        gameOver(false);
        return;
      }
      if (v === 0) {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            stack.push([cr + dr, cc + dc]);
          }
      }
    }
  }

  function chord(r, c) {
    if (state.over) return;
    if (!state.revealed[r][c]) return;
    const v = state.grid[r][c];
    if (v <= 0) return; // only number cells
    const targets = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= state.rows || nc < 0 || nc >= state.cols) continue;
        if (state.flagged[nr][nc] || state.revealed[nr][nc]) continue;
        targets.push([nr, nc]);
      }
    }
    if (targets.length === 0) return;
    for (const [nr, nc] of targets) {
      if (state.over) break;
      floodFill(nr, nc);
    }
    paintAll();
    if (!state.over) checkWin();
  }

  function toggleFlag(r, c) {
    if (state.over) return;
    if (state.revealed[r][c]) return;
    state.flagged[r][c] = !state.flagged[r][c];
    paintCell(r, c);
    updateStatus();
  }

  function checkWin() {
    let unrevealed = 0;
    for (let r = 0; r < state.rows; r++)
      for (let c = 0; c < state.cols; c++)
        if (!state.revealed[r][c]) unrevealed++;
    if (unrevealed === state.mines) gameOver(true);
  }

  function gameOver(won) {
    state.over = true;
    state.won = won;
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
    if (won) {
      modalEl.textContent = `🎉 ${state.elapsed} 秒通关！`;
      modalEl.className = 'ms-modal-wrap win';
      const prev = state.best[state.diff];
      if (prev == null || state.elapsed < prev) {
        state.best[state.diff] = state.elapsed;
        persist();
        modalEl.textContent += '（新纪录）';
      }
      // Auto flag remaining mines for clarity
      for (let r = 0; r < state.rows; r++)
        for (let c = 0; c < state.cols; c++)
          if (state.grid[r][c] === -1) state.flagged[r][c] = true;
    } else {
      modalEl.textContent = '💥 踩到雷了';
      modalEl.className = 'ms-modal-wrap lose';
      // Reveal all mines + mark wrong flags
      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          if (state.grid[r][c] === -1 && !state.flagged[r][c]) state.revealed[r][c] = true;
          if (state.grid[r][c] !== -1 && state.flagged[r][c]) {
            state.revealed[r][c] = true;
            const idx = r * state.cols + c;
            const el = boardEl.children[idx];
            el.classList.add('wrong');
          }
        }
      }
    }
    paintAll();
    updateStatus();
  }

  function updateStatus() {
    let flagged = 0;
    for (let r = 0; r < state.rows; r++)
      for (let c = 0; c < state.cols; c++)
        if (state.flagged[r][c]) flagged++;
    flagsEl.textContent = state.mines - flagged;
    bestEl.textContent = state.best[state.diff] != null ? state.best[state.diff] + 's' : '—';
  }

  // Click handlers
  boardEl.addEventListener('click', (e) => {
    if (state.longPressFired) { state.longPressFired = false; return; }
    const cell = e.target.closest('.ms-cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    reveal(r, c);
  });
  boardEl.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const cell = e.target.closest('.ms-cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    toggleFlag(r, c);
  });

  boardEl.addEventListener('dblclick', (e) => {
    e.preventDefault();
    const cell = e.target.closest('.ms-cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    chord(r, c);
  });

  // Touch long-press for flag
  boardEl.addEventListener('touchstart', (e) => {
    const cell = e.target.closest('.ms-cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    state.longPressTimer = setTimeout(() => {
      state.longPressFired = true;
      toggleFlag(r, c);
    }, 400);
  }, { passive: true });
  boardEl.addEventListener('touchend', () => {
    if (state.longPressTimer) { clearTimeout(state.longPressTimer); state.longPressTimer = null; }
  });
  boardEl.addEventListener('touchmove', () => {
    if (state.longPressTimer) { clearTimeout(state.longPressTimer); state.longPressTimer = null; }
  });

  // Difficulty tabs
  document.getElementById('msDiffTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.ms-diff-tab');
    if (!t) return;
    state.diff = t.dataset.diff;
    persist();
    newGame();
  });

  newBtn.onclick = newGame;

  newGame();
})();
</script>
