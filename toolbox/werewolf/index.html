  // ====================================================================
  // API
  // ====================================================================
  async function api(method, action, params) {
    const url = new URL(API_BASE);
    url.searchParams.set('action', action);
    if (method === 'GET' && params) {
      for (const [k, v] of Object.entries(params)) url.searchParams.set(k, String(v));
    }
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (method === 'POST') opts.body = JSON.stringify(params || {});
    let resp;
    try { resp = await fetch(url, opts); }
    catch (e) { throw Object.assign(new Error('network_error'), { network: true }); }
    let data = {};
    try { data = await resp.json(); } catch {}
    if (!resp.ok) throw Object.assign(new Error(data.error || ('http_' + resp.status)), { status: resp.status, data });
    return data;
  }

  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k === 'on' && typeof v === 'object') {
          for (const [evt, h] of Object.entries(v)) e.addEventListener(evt, h);
        } else if (k === 'style' && typeof v === 'object') {
          for (const [sk, sv] of Object.entries(v)) e.style[sk] = sv;
        } else if (v != null) e.setAttribute(k, v);
      }
    }
    if (children != null) {
      const arr = Array.isArray(children) ? children : [children];
      for (const c of arr) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
    }
    return e;
  }

  async function doCreate() {
    const nickV = GamesShell.Identity.validateNick(createForm.nick);
    if (!nickV.ok) { toast(nickV.reason); return; }
    GamesShell.Identity.setNick(nickV.nick);

    const did = GamesShell.Identity.getDeviceId();
    const body = {
      hostNick: nickV.nick,
      deviceId: did,
      config: {
        counts: createForm.counts,
        mode: createForm.mode,
        godSeat: createForm.godSeat,
        rules: { ...createForm.rules },
      },
    };
    if (createForm.customCode) body.customCode = createForm.customCode;

    const btn = document.getElementById('cf-submit');
    if (btn) { btn.disabled = true; btn.textContent = '创建中...'; }
    try {
      const r = await api('POST', 'create', body);
      const sess = {
        code: r.code,
        token: r.isGod ? r.godToken : r.playerToken,
        kind: r.isGod ? 'god' : 'player',
        playerId: r.isGod ? r.godId : r.playerId,
        hostToken: r.hostToken,
        isGod: !!r.isGod,
        deviceId: did,
        nick: nickV.nick,
      };
      saveSession(sess);
      state.session = sess;
      state.lastVersion = 0;
      nav('#/lobby');
    } catch (e) {
      toast(errMsg(e));
      if (btn) { btn.disabled = false; btn.textContent = '创建房间'; }
    }
  }

  function updateJoinBtn() {
    const btn = document.getElementById('jf-submit');
    if (!btn) return;
    const nickValid = window.GamesShell && GamesShell.Identity
      && GamesShell.Identity.validateNick(joinForm.nick).ok;
    btn.disabled = !(joinForm.code.length === 4 && nickValid);

  async function probeLobby() {
    const probe = document.getElementById('jf-probe');
    if (!probe) return;
    probe.textContent = '查询房间中...';
    try {
      const r = await api('GET', 'lobby', { code: joinForm.code });
      if (!r.exists) { probe.textContent = '房间不存在或已过期'; return; }
      const stateLabel = r.state === 'lobby' ? '等待中' : (r.state === 'playing' ? '游戏中' : '已结束');
      probe.innerHTML = `房间 ${joinForm.code}：${r.activePlayers}/${r.totalPlayers} 人，模式 ${MODE_LABELS[r.mode] || r.mode}（${stateLabel}）`;
    } catch (e) {
      probe.textContent = errMsg(e);
    }
  }

  async function doJoin() {
    const nickV = GamesShell.Identity.validateNick(joinForm.nick);
    if (!nickV.ok) { toast(nickV.reason); return; }
    GamesShell.Identity.setNick(nickV.nick);
    const did = GamesShell.Identity.getDeviceId();

    const btn = document.getElementById('jf-submit');
    if (btn) { btn.disabled = true; btn.textContent = '加入中...'; }
    try {
      const r = await api('POST', 'join', {
        code: joinForm.code, nick: nickV.nick, deviceId: did,
      });
      // 如果当前 session 是同一房间，保留 hostToken（防止房主点自己的链接丢失房主权限）
      const preservedHostToken = (state.session && state.session.code === r.code)
        ? state.session.hostToken : null;
      const sess = {
        code: r.code,
        token: r.godToken || r.playerToken,
        kind: r.godToken ? 'god' : 'player',
        playerId: r.godId || r.playerId,
        hostToken: preservedHostToken,
        isGod: !!r.godToken,
        deviceId: did,
        nick: nickV.nick,
      };
      saveSession(sess);
      state.session = sess;
      state.lastVersion = 0;
      nav('#/lobby');
    } catch (e) {
      toast(errMsg(e));
      if (btn) { btn.disabled = false; btn.textContent = '加入'; }
    }
  }

  // ====================================================================
  // Lobby view
  // ====================================================================
  function viewLobby() {
    const r = state.roomState;
    if (!r) {
      return el('div', { class: 'wait-msg' }, [
        el('div', { class: 'icon' }, '⏳'),
        el('div', null, '加载房间...'),
      ]);
    }
    const wrap = el('div');

    // 房号 + 分享
    const banner = el('section', { class: 'room-code-banner' });
    banner.appendChild(el('div', { class: 'label' }, '房号'));
    banner.appendChild(el('div', { class: 'code' }, r.code));
    banner.appendChild(el('div', { class: 'actions' }, [
      el('button', {
        class: 'ww-btn tiny',
        on: { click: () => copyToClipboard(r.code, '已复制房号') },
      }, '📋 复制房号'),
      el('button', {
        class: 'ww-btn tiny',
        on: { click: () => copyShareLink(r.code) },
      }, '🔗 复制链接'),
    ]));
    wrap.appendChild(banner);

    const qrBox = el('div', { class: 'gs-room-qr' });
    if (window.GamesShell && GamesShell.QR) GamesShell.QR.render(qrBox, location.origin + location.pathname + '?room=' + r.code);
    wrap.appendChild(qrBox);

    // 玩家列表
    const seats = el('section', { class: 'ww-card' });
    seats.appendChild(el('h3', null, `玩家（${r.players.length}/${r.config.totalPlayers}）`));
    const seatList = el('div', { class: 'seat-list' });
    const totalSeats = r.config.totalPlayers;
    const players = (r.players || []).filter((p) => !p.kicked);
    const isHost = amIHost();
    for (let i = 0; i < totalSeats; i++) {
      const p = players[i];
      if (!p) {
        seatList.appendChild(el('div', { class: 'seat empty' }, [
          el('div', { class: 'seat-num' }, String(i + 1)),
          el('div', { class: 'seat-nick' }, '等待加入...'),
        ]));
      } else {
        const isMe = state.session && p.id === state.session.playerId;
        const cls = ['seat'];
        if (isMe) cls.push('me');
        if (p.isHost) cls.push('host');
        cls.push(p.online ? 'online' : 'offline');
        const seat = el('div', { class: cls.join(' ') }, [
          el('div', { class: 'seat-num' }, String(p.seat)),
          el('span', { class: 'offline-dot' }),
          el('div', { class: 'seat-nick' }, p.nick),
        ]);
        if (isHost && !p.isHost) {
          seat.appendChild(el('button', {
            class: 'seat-kick',
            on: { click: () => doKick(p.id, p.nick) },
            title: '踢出',
          }, '✕'));
        }
        seatList.appendChild(seat);
      }
    }
    seats.appendChild(seatList);

    // 上帝位（如果存在）
    if (r.god) {
      seats.appendChild(el('div', { class: 'god-banner', style: { marginTop: '0.7rem' } },
        '👁 上帝位：' + r.god.nick + (r.god.isHost ? '（房主）' : '')));
    }

    if (isHost) {
      const activeCount = players.length;
      const fullEnough = activeCount === totalSeats;
      seats.appendChild(el('div', { style: { marginTop: '0.9rem', textAlign: 'center' } }, [
        el('button', {
          class: 'ww-btn primary',
          disabled: fullEnough ? null : '',
          on: { click: doStart },
        }, fullEnough ? '🌙 开始游戏' : `等待 ${totalSeats - activeCount} 人加入`),
      ]));
    }
    wrap.appendChild(seats);

    // 规则汇总
    const sum = el('section', { class: 'ww-card' });
    sum.appendChild(el('h3', null, '规则汇总'));
    sum.appendChild(el('div', { style: { fontSize: '0.88rem', lineHeight: '1.7', color: 'var(--color-muted)' } }, [
      el('div', null, `模式：${MODE_LABELS[r.config.mode]}（${MODE_DESC[r.config.mode]}）`),
      el('div', null, `角色：${
        ROLE_KEYS
          .filter((k) => (r.config.counts[k] || 0) > 0)
          .map((k) => `${ROLES[k].emoji}${ROLES[k].name}×${r.config.counts[k]}`)
          .join(' ')
      }`),
      el('div', null, [
        '细则：',
        r.config.rules.witchSelfSaveFirstNight ? '女巫首夜可自救 / ' : '',
        r.config.rules.witchSameNightBothPotions ? '女巫同夜可双药 / ' : '',
        r.config.rules.guardCanRepeatTarget ? '守卫可连守 / ' : '',
        r.config.rules.hunterCanShootIfPoisoned ? '猎人被毒可开枪 / ' : '',
        r.config.rules.cupidCrossCampThirdParty ? '异阵营情侣第三阵营' : '',
      ]),
    ]));
    wrap.appendChild(sum);

    // 离开 / 解散
    wrap.appendChild(el('div', { style: { textAlign: 'center', marginTop: '0.6rem', display: 'flex', gap: '0.4rem', justifyContent: 'center' } }, [
      el('button', {
        class: 'ww-btn ghost tiny',
        on: { click: doLeave },
      }, '退出房间'),
      isHost ? el('button', {
        class: 'ww-btn danger tiny',
        on: { click: () => doDissolve(false) },
      }, '🗑 解散房间') : null,
    ]));

    return wrap;
  }

  function copyToClipboard(text, msg) {
    try {
      navigator.clipboard.writeText(text);
      toast(msg || '已复制');
    } catch {
      toast('复制失败');
    }
  }

  function copyShareLink(code) {
    const url = location.origin + location.pathname + '?room=' + code;
    copyToClipboard(url, '已复制邀请链接');
  }

  async function doKick(targetPid, nick) {
    if (!confirm('确认踢出 ' + nick + '？')) return;
    try {
      await api('POST', 'kick', {
        code: state.session.code,
        token: state.session.token,
        targetPid,
      });
      toast('已踢出');
    } catch (e) { toast(errMsg(e)); }
  }

  async function doStart() {
    try {
      await api('POST', 'start', {
        code: state.session.code,
        token: state.session.token,
      });
    } catch (e) { toast(errMsg(e)); }
  }

  // 普通玩家直接走简单 leave；房主弹出 transfer/dissolve modal
  async function doLeave() {
    if (amIHost()) {
      showHostLeaveModal();
      return;
    }
    if (!confirm('确认离开房间？')) return;
    try {
      await api('POST', 'leave', {
        code: state.session.code,
        token: state.session.token,
      });
    } catch (e) {
      toast(errMsg(e));
      return;
    }
    saveSession(null);
    state.session = null;
    state.roomState = null;
    nav('#/');
  }

  async function doDissolve(skipConfirm) {
    if (!skipConfirm && !confirm('确认解散房间？所有玩家会被踢回首页。')) return;
    try {
      await api('POST', 'dissolve', {
        code: state.session.code,
        token: state.session.token,
      });
      toast('房间已解散');
    } catch (e) {
      toast(errMsg(e));
      return;
    }
    // 解散后本地也清掉，回首页
    saveSession(null);
    state.session = null;
    state.roomState = null;
    nav('#/');
  }

  async function doTransferAndLeave(targetPid) {
    try {
      await api('POST', 'leave', {
        code: state.session.code,
        token: state.session.token,
        transferTo: targetPid,
      });
    } catch (e) {
      toast(errMsg(e));
      return;
    }
    saveSession(null);
    state.session = null;
    state.roomState = null;
    nav('#/');
  }

  async function doAdvance() {
    if (!amIHost()) return;
    try {
      await api('POST', 'advance', {
        code: state.session.code,
        token: state.session.token,
      });
    } catch (e) { toast(errMsg(e)); }
  }

  // 房主退出弹窗：选新房主 or 解散
  function showHostLeaveModal() {
    closeModal();  // 防重复
    const r = state.roomState;
    if (!r) return;
    const candidates = (r.players || []).filter((p) => !p.kicked && p.id !== state.session.playerId);

    const bg = el('div', { id: 'ww-modal', class: 'ww-modal-bg', on: { click: closeModal } });
    const card = el('div', { class: 'ww-modal-card', on: { click: (e) => e.stopPropagation() } });
    card.appendChild(el('h3', { style: { margin: '0 0 0.5rem' } }, '房主离开'));
    card.appendChild(el('p', { style: { fontSize: '0.88rem', color: 'var(--color-muted)', margin: '0 0 0.8rem' } },
      '你是房主。离开前请指定一个玩家成为新房主，或者直接解散房间。'));

    if (candidates.length > 0) {
      card.appendChild(el('div', { style: { fontSize: '0.86rem', color: 'var(--color-light)', marginBottom: '0.4rem' } }, '指定新房主：'));
      const list = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.4rem', marginBottom: '0.8rem' } });
      for (const p of candidates) {
        list.appendChild(el('button', {
          class: 'ww-btn ghost',
          style: { textAlign: 'left', padding: '0.55rem 0.8rem' },
          on: { click: () => { closeModal(); doTransferAndLeave(p.id); } },
        }, `${p.seat}号 ${p.nick}` + (!p.online ? '（离线）' : '')));
      }
      card.appendChild(list);
    } else {
      card.appendChild(el('p', { style: { fontSize: '0.86rem', color: 'var(--color-light)', marginBottom: '0.8rem' } },
        '没有其他玩家可以接手，只能解散房间。'));
    }

    card.appendChild(el('div', { style: { display: 'flex', gap: '0.5rem', justifyContent: 'space-between', borderTop: '1px dashed var(--color-border)', paddingTop: '0.7rem' } }, [
      el('button', {
        class: 'ww-btn ghost',
        on: { click: closeModal },
      }, '取消'),
      el('button', {
        class: 'ww-btn danger',
        on: { click: () => { closeModal(); doDissolve(true); } },
      }, '🗑 解散房间'),
    ]));

    bg.appendChild(card);
    document.body.appendChild(bg);
  }

  function closeModal() {
    const m = document.getElementById('ww-modal');
    if (m) m.remove();
  }

  // ====================================================================
  // Play view（按 phase 分发）
  // ====================================================================
  function playerByPid(pid) {
    if (!state.roomState) return null;
    return (state.roomState.players || []).find((p) => p.id === pid);
  }
  function nickOf(pid) {
    const p = playerByPid(pid);
    return p ? `${p.seat}号 ${p.nick}` : pid;
  }
  function aliveAlivePlayers() {
    if (!state.roomState) return [];
    const alive = state.roomState.alive || null;
    return (state.roomState.players || []).filter((p) => {
      if (p.kicked) return false;
      if (alive && alive[p.id] === false) return false;
      return true;
    });
  }
  function isDead(pid) {
    return state.roomState && state.roomState.alive && state.roomState.alive[pid] === false;
  }

  function renderPlayHeader() {
    const r = state.roomState;
    const phase = r.phase;
    const phaseKind = phase ? phase.kind : 'lobby';
    const me = r.me || {};

    const header = el('div', { class: 'play-header' });
    header.appendChild(el('div', { class: 'day-chip' }, `第 ${phase ? phase.day : 1} 天`));
    header.appendChild(el('div', { class: 'phase-chip' }, PHASE_LABELS[phaseKind] || phaseKind));
    if (phase && phase.deadlineTs > 0) {
      const remain = Math.max(0, phase.deadlineTs - Date.now());
      header.appendChild(el('div', { class: 'countdown', id: 'play-countdown' }, fmtRemain(remain)));
    }
    if (!me.isGod) {
      const role = me.role && ROLES[me.role] ? ROLES[me.role] : null;
      const cls = ['my-role-chip'];
      if (me.alive === false) cls.push('dead');
      header.appendChild(el('div', { class: cls.join(' ') }, [
        el('span', null, role ? role.emoji : '❓'),
        el('span', null, role ? role.name : '?'),
        me.alive === false ? el('span', null, '（出局）') : null,
      ]));
    }
    return header;
  }

  function fmtRemain(ms) {
    const s = Math.ceil(ms / 1000);
    return s > 60 ? `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}` : `0:${String(s).padStart(2, '0')}`;
  }

  function tickCountdown() {
    const el = document.getElementById('play-countdown');
    if (!el || !state.roomState || !state.roomState.phase) return;
    const remain = Math.max(0, state.roomState.phase.deadlineTs - Date.now());
    el.textContent = fmtRemain(remain);
  }

  function viewPlay() {
    const r = state.roomState;
    if (!r) return el('div', { class: 'wait-msg' }, '加载中...');

    if (r.state === 'ended') return viewEnd();

    if (state.session.isGod) return viewGod();

    const wrap = el('div');
    wrap.appendChild(renderPlayHeader());

    const main = el('section', { class: 'ww-card' });
    const phase = r.phase || {};
    const me = r.me || {};
    main.appendChild(renderPhaseUI(phase, me));
    wrap.appendChild(main);

    // 私有笔记
    const notes = renderPrivateNotes(me);
    if (notes) wrap.appendChild(notes);

    // 公共日志
    wrap.appendChild(el('button', {
      class: 'public-log-toggle',
      on: { click: () => { state.showLog = !state.showLog; render(); } },
    }, (state.showLog ? '▾' : '▸') + ' 公共事件流（' + (r.publicLog ? r.publicLog.length : 0) + '）'));
    if (state.showLog) wrap.appendChild(renderPublicLog(r.publicLog));

    // 控制按钮（房主额外有推进/解散）
    const ctrl = el('div', { style: { textAlign: 'center', marginTop: '0.8rem', display: 'flex', gap: '0.4rem', justifyContent: 'center', flexWrap: 'wrap' } });
    if (amIHost()) {
      ctrl.appendChild(el('button', {
        class: 'ww-btn ghost tiny',
        on: { click: doAdvance },
      }, '🔧 推进阶段'));
    }
    ctrl.appendChild(el('button', {
      class: 'ww-btn ghost tiny',
      on: { click: doLeave },
    }, '退出房间'));
    if (amIHost()) {
      ctrl.appendChild(el('button', {
        class: 'ww-btn danger tiny',
        on: { click: () => doDissolve(false) },
      }, '🗑 解散房间'));
    }
    wrap.appendChild(ctrl);

    return wrap;
  }

  function renderPhaseUI(phase, me) {
    const kind = phase.kind;
    const isExpected = !!phase.isExpected;
    const mySubmitted = !!phase.mySubmitted;

    if (kind === 'night-cupid') {
      if (!isExpected) return waitMsg('丘比特正在选情侣...', phase);
      if (mySubmitted) return waitMsg('已提交，等待 ' + (phase.expectedActorsCount - phase.submittedCount) + ' 人...', phase);
      return cupidPickUI();
    }
    if (kind === 'night-lover-confirm') {
      if (me.lover) {
        const partner = playerByPid(me.lover);
        return el('div', { class: 'wait-msg' }, [
          el('div', { class: 'icon' }, '💘'),
          el('div', null, '你的情侣是 ' + (partner ? `${partner.seat}号 ${partner.nick}` : me.lover)),
          el('div', { class: 'wait-progress' }, '（其他玩家不知道）'),
        ]);
      }
      return waitMsg('情侣对望中...', phase);
    }
    if (kind === 'night-guard') {
      if (!isExpected) return waitMsg('守卫行动中...', phase);
      if (mySubmitted) return waitMsg('已提交', phase);
      return targetPickUI(kind, '守卫', '今晚要守谁？守了的人不会被狼刀。', { allowNull: true, excludeSelfRule: false });
    }
    if (kind === 'night-wolf') {
      if (me.role !== 'werewolf') return waitMsg('狼人投票中...', phase);
      return wolfVoteUI(phase, me);
    }
    if (kind === 'night-seer') {
      if (!isExpected) return waitMsg('预言家查验中...', phase);
      if (mySubmitted) return waitMsg('已查验', phase);
      return targetPickUI(kind, '预言家', '查验谁的身份？', { excludeSelfRule: true });
    }
    if (kind === 'night-witch') {
      if (!isExpected) return waitMsg('女巫行动中...', phase);
      if (mySubmitted) return waitMsg('已用药', phase);
      return witchUI();
    }
    if (kind === 'day-reveal') {
      return dayRevealUI(phase);
    }
    if (kind === 'day-hunter-shot') {
      const hunterPid = phase.details && phase.details.hunterPid;
      if (me.playerId !== hunterPid) {
        return waitMsg(`猎人${hunterPid ? `（${nickOf(hunterPid)}）` : ''}决定开枪中...`, phase);
      }
      if (mySubmitted) return waitMsg('已提交', phase);
      return targetPickUI('day-hunter-shot', '猎人开枪', '你已出局，可以带走一个人，或弃枪。', { allowNull: true, excludeSelfRule: true });
    }
    if (kind === 'day-discuss') {
      return el('div', null, [
        el('h2', { class: 'stage-title' }, '☀️ 全员讨论'),
        el('p', { class: 'stage-hint' }, '现在进入白天讨论环节。大家在线下按座位顺序发言，时间到自动进入投票。'),
        el('p', { style: { color: 'var(--color-light)', fontSize: '0.85rem' } }, '存活玩家：'),
        renderAliveBadges(),
      ]);
    }
    if (kind === 'day-vote') {
      if (!isExpected) return waitMsg('已无投票权（被翻牌的白痴/已出局）', phase);
      if (mySubmitted) return waitMsg('已投票', phase);
      return targetPickUI('day-vote', '投票放逐', '投谁出局？平票则集体免役进入下一夜。', { allowAbstain: true, excludeSelfRule: true });
    }
    if (kind === 'day-vote-result') {
      return dayVoteResultUI(phase);
    }
    return waitMsg(PHASE_LABELS[kind] || kind, phase);
  }

  function waitMsg(msg, phase) {
    const div = el('div', { class: 'wait-msg' }, [
      el('div', { class: 'icon' }, '⏳'),
      el('div', null, msg),
    ]);
    if (phase && phase.expectedActorsCount > 0) {
      div.appendChild(el('div', { class: 'wait-progress' },
        `已提交 ${phase.submittedCount}/${phase.expectedActorsCount}`));
    }
    return div;
  }

  function renderAliveBadges() {
    const grid = el('div', { class: 'player-pick-grid' });
    for (const p of aliveAlivePlayers()) {
      grid.appendChild(el('div', { class: 'player-pick' }, [
        el('span', { class: 'pp-seat' }, String(p.seat)),
        el('span', { class: 'pp-nick' }, p.nick),
      ]));
    }
    return grid;
  }

  // 通用：选一个目标玩家
  function targetPickUI(phaseKind, title, hint, opts) {
    opts = opts || {};
    let selected = null;
    let abstain = false;

    const grid = el('div', { class: 'player-pick-grid' });
    const myPid = state.roomState.me ? state.roomState.me.playerId : null;
    const players = aliveAlivePlayers();
    for (const p of players) {
      if (opts.excludeSelfRule && p.id === myPid) continue;
      const btn = el('button', { class: 'player-pick' }, [
        el('span', { class: 'pp-seat' }, String(p.seat)),
        el('span', { class: 'pp-nick' }, p.nick),
      ]);
      btn.addEventListener('click', () => {
        selected = p.id; abstain = false;
        grid.querySelectorAll('.player-pick').forEach((b) => b.classList.remove('selected'));
        btn.classList.add('selected');
        const sb = document.getElementById('pick-submit');
        if (sb) sb.disabled = false;
      });
      grid.appendChild(btn);
    }

    const wrap = el('div', null, [
      el('h2', { class: 'stage-title' }, title),
      el('p', { class: 'stage-hint' }, hint),
      grid,
    ]);

    const buttons = el('div', { style: { marginTop: '0.8rem', display: 'flex', gap: '0.5rem', justifyContent: 'space-between' } });
    if (opts.allowNull) {
      buttons.appendChild(el('button', {
        class: 'ww-btn ghost tiny',
        on: { click: () => submit(null, 'null') },
      }, '空守 / 弃枪'));
    }
    if (opts.allowAbstain) {
      buttons.appendChild(el('button', {
        class: 'ww-btn ghost tiny',
        on: { click: () => submit('abstain', 'abstain') },
      }, '弃票'));
    }
    buttons.appendChild(el('button', {
      id: 'pick-submit',
      class: 'ww-btn primary',
      disabled: '',
      on: { click: () => submit(selected, 'pick') },
    }, '提交'));
    wrap.appendChild(buttons);

    async function submit(target, mode) {
      const payload = {};
      if (phaseKind === 'day-vote') payload.targetPid = mode === 'abstain' ? 'abstain' : target;
      else payload.targetPid = mode === 'null' ? null : target;
      if (mode === 'pick' && !target) { toast('请先选一个目标'); return; }
      try {
        await api('POST', 'action', {
          code: state.session.code,
          token: state.session.token,
          phase: phaseKind,
          payload,
        });
      } catch (e) { toast(errMsg(e)); }
    }

    return wrap;
  }

  function cupidPickUI() {
    const picked = [];
    const grid = el('div', { class: 'player-pick-grid' });
    for (const p of aliveAlivePlayers()) {
      const btn = el('button', { class: 'player-pick' }, [
        el('span', { class: 'pp-seat' }, String(p.seat)),
        el('span', { class: 'pp-nick' }, p.nick),
      ]);
      btn.addEventListener('click', () => {
        const idx = picked.indexOf(p.id);
        if (idx >= 0) { picked.splice(idx, 1); btn.classList.remove('selected'); }
        else if (picked.length < 2) { picked.push(p.id); btn.classList.add('selected'); }
        else { toast('最多选 2 人'); return; }
        const sb = document.getElementById('cupid-submit');
        if (sb) sb.disabled = picked.length !== 2;
      });
      grid.appendChild(btn);
    }
    return el('div', null, [
      el('h2', { class: 'stage-title' }, '💘 丘比特：连结情侣'),
      el('p', { class: 'stage-hint' }, '选 2 个人作为情侣。一方死亡，另一方殉情。可以选你自己。'),
      grid,
      el('div', { style: { marginTop: '0.8rem', textAlign: 'right' } }, [
        el('button', {
          id: 'cupid-submit',
          class: 'ww-btn primary',
          disabled: '',
          on: {
            click: async () => {
              if (picked.length !== 2) return;
              try {
                await api('POST', 'action', {
                  code: state.session.code,
                  token: state.session.token,
                  phase: 'night-cupid',
                  payload: { pickedPids: picked },
                });
              } catch (e) { toast(errMsg(e)); }
            },
          },
        }, '提交'),
      ]),
    ]);
  }

  function wolfVoteUI(phase, me) {
    const grid = el('div', { class: 'player-pick-grid' });
    const myPid = me.playerId;
    let selected = null;
    const tally = phase.wolfTally || {};
    const teammates = me.teammates || [];
    for (const p of aliveAlivePlayers()) {
      if (p.id === myPid) continue;
      if (teammates.includes(p.id)) continue;  // 不能刀队友
      const btn = el('button', { class: 'player-pick' }, [
        el('span', { class: 'pp-seat' }, String(p.seat)),
        el('span', { class: 'pp-nick' }, p.nick),
        tally[p.id] ? el('span', { class: 'pp-tag' }, '🐺×' + tally[p.id]) : null,
      ]);
      btn.addEventListener('click', () => {
        selected = p.id;
        grid.querySelectorAll('.player-pick').forEach((b) => b.classList.remove('selected'));
        btn.classList.add('selected');
        const sb = document.getElementById('wolf-submit');
        if (sb) sb.disabled = false;
      });
      grid.appendChild(btn);
    }
    const teamLine = teammates.length > 0
      ? '🐺 你的狼队友：' + teammates.map(nickOf).join('、')
      : '你是独狼';

    return el('div', null, [
      el('h2', { class: 'stage-title' }, '🐺 狼人投票'),
      el('p', { class: 'stage-hint' }, teamLine + '。投票多数决，平票随机。'),
      phase.mySubmitted
        ? el('div', { class: 'wait-msg' }, [
            el('div', null, '你已投票，等待其他狼队友... ' + phase.submittedCount + '/' + phase.expectedActorsCount),
          ])
        : grid,
      phase.mySubmitted ? null : el('div', { style: { marginTop: '0.8rem', textAlign: 'right' } }, [
        el('button', {
          id: 'wolf-submit',
          class: 'ww-btn primary',
          disabled: '',
          on: {
            click: async () => {
              if (!selected) return;
              try {
                await api('POST', 'action', {
                  code: state.session.code,
                  token: state.session.token,
                  phase: 'night-wolf',
                  payload: { targetPid: selected },
                });
              } catch (e) { toast(errMsg(e)); }
            },
          },
        }, '投票'),
      ]),
    ]);
  }

  function witchUI() {
    let wantSave = false;
    let poisonTarget = null;

    const witchInfo = state.roomState.me && state.roomState.me.privateLog
      ? state.roomState.me.privateLog.filter((x) => x.type === 'witch') : [];
    const usedSave = witchInfo.some((x) => x.save);
    const usedPoison = witchInfo.some((x) => x.poisonPid);
    const phase = state.roomState.phase || {};
    const wolfVictim = phase.wolfVictimPid;

    const wrap = el('div');
    wrap.appendChild(el('h2', { class: 'stage-title' }, '🧪 女巫'));
    wrap.appendChild(el('p', { class: 'stage-hint' },
      `解药剩余：${usedSave ? '已用' : '1 瓶'} / 毒药剩余：${usedPoison ? '已用' : '1 瓶'}`));
    wrap.appendChild(el('p', { class: 'stage-hint', style: { color: 'var(--color-accent)' } },
      wolfVictim ? `🐺 今晚狼刀：${nickOf(wolfVictim)}` : '🌙 今晚狼人没有刀人（或还在投票）'));

    if (!usedSave && wolfVictim) {
      const saveRow = el('div', { class: 'rule-toggle' }, [
        el('div', null, [
          el('label', null, `💚 用解药救 ${nickOf(wolfVictim)}`),
          el('small', null, '解药每局只能用一次'),
        ]),
        el('input', {
          type: 'checkbox',
          on: { change: (e) => { wantSave = e.target.checked; } },
        }),
      ]);
      wrap.appendChild(saveRow);
    }

    if (!usedPoison) {
      wrap.appendChild(el('h3', { style: { marginTop: '0.8rem' } }, '💀 用毒药毒一人（可不用）'));
      const grid = el('div', { class: 'player-pick-grid' });
      for (const p of aliveAlivePlayers()) {
        const btn = el('button', { class: 'player-pick' }, [
          el('span', { class: 'pp-seat' }, String(p.seat)),
          el('span', { class: 'pp-nick' }, p.nick),
        ]);
        btn.addEventListener('click', () => {
          if (poisonTarget === p.id) {
            poisonTarget = null; btn.classList.remove('selected');
          } else {
            poisonTarget = p.id;
            grid.querySelectorAll('.player-pick').forEach((b) => b.classList.remove('selected'));
            btn.classList.add('selected');
          }
        });
        grid.appendChild(btn);
      }
      wrap.appendChild(grid);
    }

    wrap.appendChild(el('div', { style: { marginTop: '0.8rem', textAlign: 'right' } }, [
      el('button', {
        class: 'ww-btn primary',
        on: {
          click: async () => {
            try {
              await api('POST', 'action', {
                code: state.session.code,
                token: state.session.token,
                phase: 'night-witch',
                payload: { saveTonightVictim: wantSave, poisonTargetPid: poisonTarget },
              });
            } catch (e) { toast(errMsg(e)); }
          },
        },
      }, '提交（不用药也点提交）'),
    ]));

    return wrap;

  function dayVoteResultUI(phase) {
    const det = phase.details || {};
    const tally = det.tally || {};
    const day = phase.day;
    const lines = Object.entries(tally).sort((a, b) => b[1] - a[1])
      .map(([pid, n]) => `${nickOf(pid)}: ${n} 票`);

    let outcome;
    if (det.tied) outcome = `平票（${(det.tally && Object.entries(det.tally).filter(([_, n]) => n === Math.max(...Object.values(det.tally))).map(([pid]) => nickOf(pid)).join('、')) || ''}），无人放逐`;
    else if (det.exiled) outcome = (det.idiotRevealed ? '🤡 ' : '🪦 ') + nickOf(det.exiled) + (det.idiotRevealed ? ' 是白痴，翻牌存活，失去投票权' : ' 被放逐');
    else outcome = '全员弃票，无人放逐';

    return el('div', null, [
      el('h2', { class: 'stage-title' }, `第 ${day} 天投票结果`),
      el('p', { class: 'stage-hint' }, outcome),
      el('p', { style: { fontSize: '0.85rem', color: 'var(--color-light)' } }, lines.join(' / ')),
    ]);
  }

  function renderPrivateNotes(me) {
    if (!me || !me.role) return null;
    const role = ROLES[me.role];
    const log = me.privateLog || [];
    const items = [];

    if (me.role === 'werewolf' && me.teammates) {
      const list = me.teammates.length
        ? me.teammates.map(nickOf).join('、')
        : '（独狼，没有队友）';
      items.push('🐺 狼队友：' + list);
      const wolfVotes = log.filter((x) => x.type === 'wolf-vote');
      for (const v of wolfVotes) items.push(`第 ${v.day} 夜 你刀了 ${nickOf(v.targetPid)}`);
    }
    if (me.role === 'seer') {
      const checks = log.filter((x) => x.type === 'seer');
      for (const c of checks) {
        items.push(`第 ${c.day} 夜 ${nickOf(c.targetPid)} = ${c.result === 'bad' ? '🐺 狼' : '👨‍🌾 好人'}`);
      }
    }
    if (me.role === 'witch') {
      const acts = log.filter((x) => x.type === 'witch');
      for (const a of acts) {
        const parts = [];
        if (a.save) parts.push('用了解药');
        if (a.poisonPid) parts.push('毒了 ' + nickOf(a.poisonPid));
        if (parts.length) items.push(`第 ${a.day} 夜：` + parts.join(' / '));
      }
    }
    if (me.role === 'guard') {
      const acts = log.filter((x) => x.type === 'guard');
      for (const a of acts) {
        items.push(`第 ${a.day} 夜 守了 ${a.targetPid ? nickOf(a.targetPid) : '空守'}`);
      }
    }
    if (me.role === 'cupid') {
      const acts = log.filter((x) => x.type === 'cupid-pick');
      for (const a of acts) {
        items.push('💘 你连结的情侣：' + (a.picked || []).map(nickOf).join('、'));
      }
    }
    if (me.lover) {
      items.push('💘 你的情侣：' + nickOf(me.lover));
    }

    if (items.length === 0) return null;
    return el('div', { class: 'private-notes' }, [
      el('h4', null, role.emoji + ' 你的私有信息'),
      el('ul', null, items.map((s) => el('li', null, s))),
    ]);
  }

  function renderPublicLog(log) {
    const wrap = el('div', { class: 'public-log' });
    const recent = (log || []).slice().reverse();
    for (const e of recent) {
      let text = '';
      if (e.type === 'start') text = '🌙 游戏开始（第 1 夜降临）';
      else if (e.type === 'cupid-paired') text = '💘 丘比特已连结情侣';
      else if (e.type === 'night-end') text = `第 ${e.day} 夜结束 — ${e.deathCount > 0 ? '有人出局' : '平安夜'}`;
      else if (e.type === 'death') text = `🪦 ${nickOf(e.pid)} 出局${e.cause === 'lover' ? '（殉情）' : ''}`;
      else if (e.type === 'vote-result') {
        if (e.idiot) text = `🤡 投票最高 ${nickOf(e.exiledPid)} 翻牌为白痴，存活，失去投票权`;
        else if (e.tied) text = `第 ${e.day} 天投票平票，无人放逐`;
        else if (e.abstainedAll) text = `第 ${e.day} 天全员弃票，无人放逐`;
        else text = `🪦 ${nickOf(e.exiledPid)} 被放逐`;
      } else if (e.type === 'hunter-shot') {
        text = `🎯 猎人 ${nickOf(e.hunterPid)} 开枪带走 ${nickOf(e.targetPid)}`;
      } else {
        text = e.type;
      }
      wrap.appendChild(el('div', { class: 'log-entry' }, [
        el('span', { class: 'log-day' }, `D${e.day}`),
        el('span', null, text),
      ]));
    }
    return wrap;
  }

  function describeAction(kind, action) {
    if (!action) return '?';
    if (kind === 'night-cupid') return '连 ' + (action.pickedPids || []).map(nickOf).join('、');
    if (kind === 'night-guard') return '守 ' + (action.targetPid ? nickOf(action.targetPid) : '空');
    if (kind === 'night-wolf') return '刀 ' + nickOf(action.targetPid);
    if (kind === 'night-seer') return '查 ' + nickOf(action.targetPid);
    if (kind === 'night-witch') {
      const parts = [];
      if (action.saveTonightVictim) parts.push('救');
      if (action.poisonTargetPid) parts.push('毒 ' + nickOf(action.poisonTargetPid));
      return parts.join(' + ') || '不用药';
    }
    if (kind === 'day-vote') return '投 ' + (action.targetPid === 'abstain' ? '弃票' : nickOf(action.targetPid));
    if (kind === 'day-hunter-shot') return action.targetPid ? '射 ' + nickOf(action.targetPid) : '弃枪';
    return JSON.stringify(action);
  }

  // ====================================================================
  // 主路由
  // ====================================================================
  function render() {
    const hash = location.hash || '#/';
    const route = hash.split('?')[0];
    state.view = route;

    if (state.countdownTimer) { clearInterval(state.countdownTimer); state.countdownTimer = null; }

    let content;
    if (route === '#/' || route === '') {
      stopPolling();
      content = viewLanding();
    } else if (route === '#/create') {
      stopPolling();
      content = viewCreate();
    } else if (route === '#/join') {
      stopPolling();
      content = viewJoin();
    } else if (route === '#/lobby') {
      ensurePolling();
      content = viewLobby();
    } else if (route === '#/play' || route === '#/end') {
      ensurePolling();
      content = viewPlay();
    } else {
      content = viewLanding();
    }

    $view.innerHTML = '';
    $view.appendChild(content);

    if ((route === '#/play' || route === '#/lobby') && state.roomState && state.roomState.phase) {
      state.countdownTimer = setInterval(tickCountdown, 1000);
    }
  }

  // ====================================================================
  // 轮询
  // ====================================================================
  function ensurePolling() {
    if (state.polling) return;
    state.polling = true;
    pollLoop();
  }
  function stopPolling() {
    state.polling = false;
  }
  async function pollLoop() {
    while (state.polling && state.session && state.session.token) {
      try {
        const r = await api('GET', 'state', {
          code: state.session.code,
          token: state.session.token,
          since: state.lastVersion,
        });
        if (r.version > state.lastVersion) {
          state.lastVersion = r.version;
          state.roomState = r;
          onStateUpdate(r);
        }
      } catch (e) {
        if (e.status === 403 || e.status === 404) {
          toast(errMsg(e));
          saveSession(null);
          state.session = null;
          state.roomState = null;
          state.polling = false;
          nav('#/');
          return;
        }
        await new Promise((res) => setTimeout(res, 2500));
      }
    }
  }

  function onStateUpdate(r) {
    // 房间被解散
    if (r.state === 'dissolved') {
      toast('房主已解散房间');
      saveSession(null);
      state.session = null;
      state.roomState = null;
      state.polling = false;
      nav('#/');
      return;
    }
    // 检查是否被踢（仅限普通玩家）
    if (r.me && !r.me.isGod) {
      const meEntry = (r.players || []).find((p) => p.id === r.me.playerId);
      if (meEntry && meEntry.kicked) {
        toast('你被房主踢出了房间');
        saveSession(null);
        state.session = null;
        state.roomState = null;
        state.polling = false;
        nav('#/');
        return;
      }
    }
    // 自动路由切换
    if (r.state === 'lobby' && state.view !== '#/lobby') nav('#/lobby');
    else if (r.state === 'playing' && state.view !== '#/play') nav('#/play');
    else if (r.state === 'ended' && state.view !== '#/end') nav('#/end');
    else render();
  }

  // ====================================================================
  // 启动
  // ====================================================================
  function init() {
    // 恢复 session
    const s = loadSession();
    if (s && s.code && s.token) state.session = s;

    // ?room=XXXX → 智能跳转
    const params = new URLSearchParams(location.search);
    const roomParam = params.get('room');
    if (roomParam && /^\d{4}$/.test(roomParam)) {
      joinForm.code = roomParam;
      history.replaceState(null, '', location.pathname);
      // 已有该房间的 session（房主点了自己的分享链接），直接进 lobby 而不是覆盖成 joiner
      if (state.session && state.session.code === roomParam) {
        location.hash = '#/lobby';
      } else {
        location.hash = '#/join?code=' + roomParam;
      }
    } else if (state.session && (location.hash === '' || location.hash === '#/')) {
      // 有 session 但在 landing → 试着进 lobby
      location.hash = '#/lobby';
    }

    window.addEventListener('hashchange', render);
    render();
  }

  // 评论区
  window.addEventListener('DOMContentLoaded', () => {
    if (window.GamesShell && GamesShell.Comments) {
      GamesShell.Comments.mount({
        container: document.getElementById('ww-cm-mount'),
        path: '/toolbox/werewolf/',
        title: '💬 房间使用反馈',
        intro: '聊聊你常用的板子、规则细节、bug 反馈 ~',
        placeholder: '聊聊狼人杀心得 ~',
      });
    }
    init();
  });
})();
</script>
