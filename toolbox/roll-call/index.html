<style>
  .rc-wrap { max-width: 760px; margin: 0 auto; padding: 1rem; }
  .rc-wrap header { text-align: center; margin-bottom: 1.6rem; }
  .rc-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.4rem; }
  .rc-wrap header .sub { color: var(--color-light); font-style: normal; }

  .panel {
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 1.4rem; margin-bottom: 1.2rem;
  }
  .panel-title {
    font-family: var(--font-display); font-size: 1.05rem;
    color: var(--color-ink); margin-bottom: 0.7rem; font-weight: 600;
  }

  /* Profile bar */
  .profile-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  .profile-bar select, .profile-bar button {
    font: inherit; font-size: 0.88rem; padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .profile-bar select { padding: 0.4rem 0.7rem; }
  @media (hover: hover) {
    .profile-bar button:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }
  @media (hover: hover) {
    .profile-bar button.danger:hover { border-color: #b07c75; color: #b07c75; }
  }

  .names-input {
    width: 100%; min-height: 120px; resize: vertical;
    padding: 0.85rem 1rem;
    border: 1px solid var(--color-border); border-radius: 10px;
    background: var(--color-bg); color: var(--color-ink);
    font-family: inherit; font-size: 0.96rem; line-height: 1.7;
    transition: border-color 0.18s;
  }
  .names-input:focus { outline: none; border-color: var(--color-accent); }
  .names-meta { margin-top: 0.4rem; font-size: 0.82rem; color: var(--color-light); }

  /* Toggles */
  .options-row { display: flex; flex-wrap: wrap; gap: 1.2rem; align-items: center; }
  .options-row label.tg {
    display: flex; align-items: center; gap: 0.5rem;
    cursor: pointer; user-select: none;
    font-size: 0.92rem; color: var(--color-muted);
  }

  /* Slot display */
  .slot-zone {
    background: linear-gradient(180deg, var(--color-bg-warm) 0%, var(--color-bg) 100%);
    border: 1px solid var(--color-border); border-radius: 16px;
    padding: 2.2rem 1rem; margin: 1.4rem auto;
    text-align: center; min-height: 130px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    scroll-margin-top: 32px;
  }
  .slot-name {
    font-family: var(--font-display);
    font-size: 2.4rem; font-weight: 600;
    color: var(--color-ink);
    line-height: 1.2;
    transition: opacity 0.06s linear, transform 0.06s linear;
    word-break: break-all;
  }
  .slot-name.spinning {
    color: var(--color-muted);
  }
  .slot-name.landed {
    color: var(--color-accent);
    transform: scale(1.05);
    transition: color 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .slot-hint {
    margin-top: 0.6rem;
    font-size: 0.82rem; color: var(--color-light);
    min-height: 1.2em;
  }

  /* Action button */
  .action-row { text-align: center; margin: 1.4rem 0 0.6rem; }
  .action-btn {
    font: inherit; font-size: 1.05rem; font-weight: 600;
    padding: 0.85rem 2.4rem; border: none; border-radius: 999px;
    background: var(--color-accent); color: #fff; cursor: pointer;
    box-shadow: 0 3px 10px rgba(30, 58, 95, 0.25);
    transition: all 0.2s;
  }
  @media (hover: hover) {
    .action-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 5px 14px rgba(30, 58, 95, 0.32);
  }
  }
  .action-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }

  /* History */
  .history-zone { margin-top: 1.4rem; }
  .history-toolbar {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-bottom: 0.8rem; align-items: center;
  }
  .history-toolbar .progress {
    flex-grow: 1;
    color: var(--color-muted); font-size: 0.88rem;
  }
  .history-toolbar button {
    font: inherit; font-size: 0.85rem; padding: 0.4rem 0.85rem;
    border: 1px solid var(--color-border); border-radius: 999px;
    background: var(--color-bg); color: var(--color-muted); cursor: pointer;
    transition: all 0.18s;
  }
  @media (hover: hover) {
    .history-toolbar button:hover { border-color: var(--color-accent); color: var(--color-accent); }
  }

  .name-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .name-chip {
    padding: 0.35rem 0.8rem; border-radius: 999px;
    border: 1px solid var(--color-border);
    font-size: 0.88rem; color: var(--color-text);
    background: var(--color-bg);
  }
  .name-chip.drawn {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
    position: relative;
  }
  .name-chip.drawn::after {
    content: attr(data-order);
    position: absolute;
    top: -7px; right: -7px;
    width: 18px; height: 18px;
    background: var(--color-highlight); color: #fff;
    border-radius: 50%;
    font-size: 0.66rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
</style>

<div class="rc-wrap">
  <header>
    <h1>🎤 随机点名</h1>
    <p class="sub">Roll Call</p>
  </header>

  <div class="panel">
    <div class="profile-bar">
      <select id="profile-select" aria-label="选择保存的名单">
        <option value="">— 未保存名单 —</option>
      </select>
      <button type="button" id="profile-save">💾 保存</button>
      <button type="button" id="profile-rename">✎ 重命名</button>
      <button type="button" id="profile-delete" class="danger">🗑 删除</button>
      <button type="button" id="profile-export" style="margin-left:auto;">📤 导出</button>
      <button type="button" id="profile-import-btn">📥 导入</button>
      <input type="file" id="profile-import-file" accept=".json" style="display:none;" />
    </div>

    <div class="panel-title">名单（每行一个）</div>
    <textarea class="names-input" id="names-input" placeholder="例如：&#10;张三&#10;李四&#10;王五"></textarea>
    <div class="names-meta" id="names-meta">0 个名字</div>
  </div>

  <div class="panel">
    <div class="options-row">
      <label class="tg">
        <input type="checkbox" id="no-repeat" checked />
        <span>不重复模式（抽过的人不再抽）</span>
      </label>
      <label class="tg">
        <input type="checkbox" id="skip-anim" />
        <span>跳过动画</span>
      </label>
    </div>
  </div>

  <div class="slot-zone" id="slot-zone">
    <div class="slot-name" id="slot-name" aria-live="polite">点「抽」开始</div>
    <div class="slot-hint" id="slot-hint">&nbsp;</div>
  </div>

  <div class="action-row">
    <button type="button" id="draw-btn" class="action-btn">🎤 抽一个</button>
  </div>

  <div class="history-zone" id="history-zone" style="display: none;">
    <div class="history-toolbar">
      <div class="progress" id="progress-text"></div>
      <button type="button" id="reset-btn">🔄 重置已抽</button>
      <button type="button" id="copy-btn">📋 复制顺序</button>
    </div>
    <div class="name-chips" id="name-chips"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const PROFILE_KEY = 'tool.rollcall.profiles.v1';

  const state = {
    names: [],
    drawn: [],          // ordered list of drawn names
    drawnSet: new Set(),
    noRepeat: true,
    skipAnim: false,
    isSpinning: false,
  };

  const $names    = document.getElementById('names-input');
  const $namesMeta= document.getElementById('names-meta');
  const $noRepeat = document.getElementById('no-repeat');
  const $skipAnim = document.getElementById('skip-anim');
  const $draw     = document.getElementById('draw-btn');
  const $slotZone = document.getElementById('slot-zone');
  const $slotName = document.getElementById('slot-name');
  const $slotHint = document.getElementById('slot-hint');
  const $hist     = document.getElementById('history-zone');
  const $chips    = document.getElementById('name-chips');
  const $reset    = document.getElementById('reset-btn');
  const $copy     = document.getElementById('copy-btn');
  const $progress = document.getElementById('progress-text');

  const $pSelect  = document.getElementById('profile-select');
  const $pSave    = document.getElementById('profile-save');
  const $pRename  = document.getElementById('profile-rename');
  const $pDelete  = document.getElementById('profile-delete');

  // ——— Names ———
  function parseNames(raw) {
    return raw.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
  }
  function refreshFromInput() {
    state.names = parseNames($names.value);
    $namesMeta.textContent = `${state.names.length} 个名字`;
    // 已抽的名字如果不在新名单里就清掉
    state.drawn = state.drawn.filter(n => state.names.includes(n));
    state.drawnSet = new Set(state.drawn);
    updateUI();
  }
  $names.addEventListener('input', refreshFromInput);
  $noRepeat.addEventListener('change', () => { state.noRepeat = $noRepeat.checked; updateUI(); });
  $skipAnim.addEventListener('change', () => { state.skipAnim = $skipAnim.checked; });

  // ——— UI updates ———
  function updateUI() {
    const total = state.names.length;
    const drawn = state.drawn.length;
    const remaining = state.names.filter(n => !state.drawnSet.has(n)).length;

    if (total === 0) {
      $draw.disabled = true;
      $hist.style.display = 'none';
      return;
    }

    if (state.noRepeat && remaining === 0) {
      $draw.disabled = true;
      $slotHint.textContent = `全部 ${total} 人已抽完`;
    } else {
      $draw.disabled = state.isSpinning;
      $slotHint.textContent = '';
    }

    if (drawn > 0) {
      $hist.style.display = '';
      $progress.textContent = state.noRepeat
        ? `已抽 ${drawn} / ${total}（剩 ${remaining}）`
        : `已抽 ${drawn} 次`;
      renderChips();
    } else {
      $hist.style.display = 'none';
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderChips() {
    if (state.noRepeat) {
      // 显示所有名字，已抽的高亮 + 序号
      $chips.innerHTML = state.names.map(n => {
        if (state.drawnSet.has(n)) {
          const order = state.drawn.indexOf(n) + 1;
          return `<span class="name-chip drawn" data-order="${order}">${escapeHtml(n)}</span>`;
        } else {
          return `<span class="name-chip">${escapeHtml(n)}</span>`;
        }
      }).join('');
    } else {
      // 重复模式：只显示抽过的顺序
      $chips.innerHTML = state.drawn.map((n, i) =>
        `<span class="name-chip drawn" data-order="${i + 1}">${escapeHtml(n)}</span>`
      ).join('');
    }
  }

  // ——— Pool 计算（赢家和动画候选都从这里来）———
  function currentPool() {
    return state.noRepeat
      ? state.names.filter(n => !state.drawnSet.has(n))
      : state.names;
  }

  // ——— Slot animation ———
  // 滚动效果：以加速间隔切换显示名字，最后落到 winner
  // 动画候选只从 pool 里选——不重复模式下不会再闪过已抽的人
  function spinTo(winner, pool) {
    return new Promise((resolve) => {
      $slotName.classList.remove('landed');
      $slotName.classList.add('spinning');
      const intervals = [55, 55, 55, 70, 80, 95, 115, 140, 175, 220, 280, 360, 460];
      let i = 0;
      function tick() {
        if (i >= intervals.length) {
          $slotName.textContent = winner;
          $slotName.classList.remove('spinning');
          $slotName.classList.add('landed');
          resolve();
          return;
        }
        const candidates = pool.filter(n => n !== $slotName.textContent);
        const flash = candidates.length > 0
          ? candidates[Math.floor(Math.random() * candidates.length)]
          : winner;
        $slotName.textContent = flash;
        setTimeout(tick, intervals[i]);
        i++;
      }
      tick();
    });
  }

  async function doDraw() {
    if (state.isSpinning) return;
    const pool = currentPool();
    if (pool.length === 0) return;
    const winner = pool[Math.floor(Math.random() * pool.length)];

    state.isSpinning = true;
    $draw.disabled = true;
    $slotZone.scrollIntoView({ behavior: 'smooth', block: 'start' });

    if (state.skipAnim || pool.length === 1) {
      $slotName.classList.remove('spinning');
      $slotName.textContent = winner;
      $slotName.classList.add('landed');
    } else {
      await spinTo(winner, pool);
    }

    state.drawn.push(winner);
    state.drawnSet.add(winner);
    state.isSpinning = false;
    updateUI();
    beep();
  }

  $draw.addEventListener('click', doDraw);

  $reset.addEventListener('click', () => {
    if (state.drawn.length === 0) return;
    if (!confirm(`重置已抽名单（${state.drawn.length} 人）？`)) return;
    state.drawn = [];
    state.drawnSet = new Set();
    $slotName.textContent = '点「抽」开始';
    $slotName.classList.remove('landed', 'spinning');
    updateUI();
  });

  $copy.addEventListener('click', async () => {
    if (state.drawn.length === 0) return;
    const txt = state.drawn.map((n, i) => `${i + 1}. ${n}`).join('\n');
    try {
      await navigator.clipboard.writeText(txt);
      $copy.textContent = '✓ 已复制';
      setTimeout(() => { $copy.textContent = '📋 复制顺序'; }, 1600);
    } catch (e) {
      $copy.textContent = '复制失败';
      setTimeout(() => { $copy.textContent = '📋 复制顺序'; }, 1600);
    }
  });

  // ——— Beep ———
  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.connect(gain).connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch (e) { /* silent */ }
  }

  // ——— Profiles ———
  function loadProfiles() {
    try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function saveProfiles(p) {
    try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch (e) {}
  }
  function refreshProfileSelect() {
    const profiles = loadProfiles();
    const cur = $pSelect.value;
    $pSelect.innerHTML = '<option value="">— 未保存名单 —</option>';
    Object.keys(profiles).sort().forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      if (name === cur) opt.selected = true;
      $pSelect.appendChild(opt);
    });
  }
  $pSelect.addEventListener('change', () => {
    const profiles = loadProfiles();
    const name = $pSelect.value;
    if (!name || !profiles[name]) return;
    $names.value = profiles[name].names || '';
    state.drawn = []; state.drawnSet = new Set();
    refreshFromInput();
  });
  $pSave.addEventListener('click', () => {
    const name = (prompt('给这份名单起个名字：', $pSelect.value || '')) || '';
    const trimmed = name.trim();
    if (!trimmed) return;
    const profiles = loadProfiles();
    profiles[trimmed] = { names: $names.value };
    saveProfiles(profiles);
    refreshProfileSelect();
    $pSelect.value = trimmed;
  });
  $pRename.addEventListener('click', () => {
    const old = $pSelect.value;
    if (!old) { alert('请先选一个已保存的名单'); return; }
    const name = (prompt('改名成：', old)) || '';
    const trimmed = name.trim();
    if (!trimmed || trimmed === old) return;
    const profiles = loadProfiles();
    profiles[trimmed] = profiles[old];
    delete profiles[old];
    saveProfiles(profiles);
    refreshProfileSelect();
    $pSelect.value = trimmed;
  });
  $pDelete.addEventListener('click', () => {
    const name = $pSelect.value;
    if (!name) { alert('请先选一个已保存的名单'); return; }
    if (!confirm(`确定删除「${name}」？`)) return;
    const profiles = loadProfiles();
    delete profiles[name];
    saveProfiles(profiles);
    refreshProfileSelect();
  });

  // ——— JSON import / export ———
  const $pExport = document.getElementById('profile-export');
  const $pImportBtn = document.getElementById('profile-import-btn');
  const $pImportFile = document.getElementById('profile-import-file');

  $pExport.addEventListener('click', () => {
    const profiles = loadProfiles();
    const blob = new Blob([JSON.stringify(profiles, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'roll-call-profiles.json'; a.click();
    URL.revokeObjectURL(url);
  });

  $pImportBtn.addEventListener('click', () => { $pImportFile.click(); });
  $pImportFile.addEventListener('change', () => {
    const file = $pImportFile.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (typeof imported !== 'object' || imported === null) throw new Error();
        const existing = loadProfiles();
        const merged = Object.assign({}, existing, imported);
        saveProfiles(merged);
        refreshProfileSelect();
        alert(`已导入 ${Object.keys(imported).length} 份名单`);
      } catch (e) {
        alert('导入失败：文件格式不正确');
      }
    };
    reader.readAsText(file);
    $pImportFile.value = '';
  });

  // ——— Init ———
  refreshProfileSelect();
  refreshFromInput();
})();
</script>
