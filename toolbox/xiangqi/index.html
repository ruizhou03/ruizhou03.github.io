<script>
(() => {
  // ============================================================
  // Constants
  // ============================================================
  const STORE_KEY = 'tool.xiangqi.v1';
  const N_FILES = 9;
  const N_RANKS = 10;
  const RED = 'r', BLACK = 'b';

  // Piece types: K=将/帥, A=士, E=象/相, H=馬, R=車, C=炮/砲, P=兵/卒
  const PIECE_GLYPH = {
    r: { K: '帥', A: '仕', E: '相', H: '傌', R: '俥', C: '炮', P: '兵' },
    b: { K: '將', A: '士', E: '象', H: '馬', R: '車', C: '砲', P: '卒' }
  };

  // Material values (centi-pawn-ish)
  const PIECE_VALUE = { K: 100000, R: 900, H: 400, C: 450, A: 200, E: 200, P: 100 };
  const PAWN_CROSSED_BONUS = 100; // pawn after crossing river is worth ~200

  // SVG geometry
  const MARGIN = 40;
  const SPACING = 80;
  const SVG_W = MARGIN * 2 + SPACING * (N_FILES - 1); // 40+80*8+40 = 720
  const SVG_H = MARGIN * 2 + SPACING * (N_RANKS - 1); // 40+80*9+40 = 800

  // Difficulty configuration
  const DIFFICULTY = {
    easy:   { depth: 1, randomTopK: 4, noise: 0.20, delayMs: 250 },
    normal: { depth: 2, randomTopK: 1, noise: 0,    delayMs: 380 },
    hard:   { depth: 3, randomTopK: 1, noise: 0,    delayMs: 600 }
  };

  // ============================================================
  // Coordinate helpers
  // ============================================================
  // file: 0..8 (left to right from RED side)
  // rank: 0..9 (0 = red back rank at bottom; 9 = black back rank at top)
  function inBoard(f, r) { return f >= 0 && f < N_FILES && r >= 0 && r < N_RANKS; }
  function inOwnSide(r, color) { return color === RED ? r <= 4 : r >= 5; }
  function inPalace(f, r, color) {
    if (f < 3 || f > 5) return false;
    return color === RED ? (r >= 0 && r <= 2) : (r >= 7 && r <= 9);
  }
  function opp(c) { return c === RED ? BLACK : RED; }

  // SVG coords: file → x, rank → y. Note y flips: rank 0 (red bottom) → high y.
  function svgX(f) { return MARGIN + f * SPACING; }
  function svgY(r) { return MARGIN + (N_RANKS - 1 - r) * SPACING; }

  // ============================================================
  // Initial position
  // ============================================================
  function startingBoard() {
    const b = Array.from({ length: N_RANKS }, () => Array(N_FILES).fill(null));
    // Red back rank (rank 0): R H E A K A E H R
    const back = ['R','H','E','A','K','A','E','H','R'];
    for (let f = 0; f < N_FILES; f++) {
      b[0][f] = { type: back[f], color: RED };
      b[9][f] = { type: back[f], color: BLACK };
    }
    // Cannons
    b[2][1] = { type: 'C', color: RED };
    b[2][7] = { type: 'C', color: RED };
    b[7][1] = { type: 'C', color: BLACK };
    b[7][7] = { type: 'C', color: BLACK };
    // Pawns at files 0,2,4,6,8
    for (const f of [0, 2, 4, 6, 8]) {
      b[3][f] = { type: 'P', color: RED };
      b[6][f] = { type: 'P', color: BLACK };
    }
    return b;
  }

  // ============================================================
  // Move generation (pseudo-legal: doesn't check self-check)
  // ============================================================
  function pseudoMoves(board, color) {
    const moves = [];
    for (let r = 0; r < N_RANKS; r++) {
      for (let f = 0; f < N_FILES; f++) {
        const p = board[r][f];
        if (!p || p.color !== color) continue;
        appendPieceMoves(board, f, r, p, moves);
      }
    }
    return moves;
  }

  function appendPieceMoves(board, f, r, p, out) {
    switch (p.type) {
      case 'K': return appendKingMoves(board, f, r, p.color, out);
      case 'A': return appendAdvisorMoves(board, f, r, p.color, out);
      case 'E': return appendElephantMoves(board, f, r, p.color, out);
      case 'H': return appendHorseMoves(board, f, r, p.color, out);
      case 'R': return appendChariotMoves(board, f, r, p.color, out);
      case 'C': return appendCannonMoves(board, f, r, p.color, out);
      case 'P': return appendPawnMoves(board, f, r, p.color, out);
    }
  }

  function tryAdd(board, fromF, fromR, toF, toR, color, out) {
    if (!inBoard(toF, toR)) return;
    const tgt = board[toR][toF];
    if (tgt && tgt.color === color) return;
    out.push({ from: [fromF, fromR], to: [toF, toR], capture: tgt });
  }

  function appendKingMoves(board, f, r, color, out) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [df, dr] of dirs) {
      const nf = f + df, nr = r + dr;
      if (inPalace(nf, nr, color)) tryAdd(board, f, r, nf, nr, color, out);
    }
  }

  function appendAdvisorMoves(board, f, r, color, out) {
    const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    for (const [df, dr] of dirs) {
      const nf = f + df, nr = r + dr;
      if (inPalace(nf, nr, color)) tryAdd(board, f, r, nf, nr, color, out);
    }
  }

  function appendElephantMoves(board, f, r, color, out) {
    const dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
    for (const [df, dr] of dirs) {
      const nf = f + df, nr = r + dr;
      if (!inBoard(nf, nr)) continue;
      if (!inOwnSide(nr, color)) continue;          // can't cross river
      const ef = f + df / 2, er = r + dr / 2;
      if (board[er][ef]) continue;                   // 塞象眼
      tryAdd(board, f, r, nf, nr, color, out);
    }
  }

  function appendHorseMoves(board, f, r, color, out) {
    // Horse moves: leg first, then 2 destinations per leg
    const legs = [
      { df: 1,  dr: 0,  dests: [[2, 1], [2, -1]] },
      { df: -1, dr: 0,  dests: [[-2, 1], [-2, -1]] },
      { df: 0,  dr: 1,  dests: [[1, 2], [-1, 2]] },
      { df: 0,  dr: -1, dests: [[1, -2], [-1, -2]] }
    ];
    for (const leg of legs) {
      const lf = f + leg.df, lr = r + leg.dr;
      if (!inBoard(lf, lr) || board[lr][lf]) continue; // 蹩马腿
      for (const [df, dr] of leg.dests) {
        tryAdd(board, f, r, f + df, r + dr, color, out);
      }
    }
  }

  function appendChariotMoves(board, f, r, color, out) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [df, dr] of dirs) {
      let nf = f + df, nr = r + dr;
      while (inBoard(nf, nr)) {
        const t = board[nr][nf];
        if (!t) {
          out.push({ from: [f, r], to: [nf, nr], capture: null });
        } else {
          if (t.color !== color) out.push({ from: [f, r], to: [nf, nr], capture: t });
          break;
        }
        nf += df; nr += dr;
      }
    }
  }

  function appendCannonMoves(board, f, r, color, out) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [df, dr] of dirs) {
      let nf = f + df, nr = r + dr;
      // Phase 1: slide to empty squares
      while (inBoard(nf, nr) && !board[nr][nf]) {
        out.push({ from: [f, r], to: [nf, nr], capture: null });
        nf += df; nr += dr;
      }
      // Hit a screen piece — phase 2: jump to next piece (must be opponent)
      if (!inBoard(nf, nr)) continue;
      nf += df; nr += dr;
      while (inBoard(nf, nr) && !board[nr][nf]) {
        nf += df; nr += dr;
      }
      if (inBoard(nf, nr)) {
        const t = board[nr][nf];
        if (t.color !== color) out.push({ from: [f, r], to: [nf, nr], capture: t });
      }
    }
  }

  function appendPawnMoves(board, f, r, color, out) {
    const fwd = color === RED ? 1 : -1;
    // Forward
    tryAdd(board, f, r, f, r + fwd, color, out);
    // Sideways after crossing river
    const crossed = (color === RED ? r >= 5 : r <= 4);
    if (crossed) {
      tryAdd(board, f, r, f - 1, r, color, out);
      tryAdd(board, f, r, f + 1, r, color, out);
    }
  }

  // ============================================================
  // Check / mate detection
  // ============================================================
  function findKing(board, color) {
    for (let r = 0; r < N_RANKS; r++) {
      for (let f = 0; f < N_FILES; f++) {
        const p = board[r][f];
        if (p && p.type === 'K' && p.color === color) return [f, r];
      }
    }
    return null;
  }

  // Returns true if `color`'s king is attacked OR facing the opposing king on a clear file.
  function isInCheck(board, color) {
    const king = findKing(board, color);
    if (!king) return true; // king captured is the worst case
    const [kf, kr] = king;

    // Facing kings rule: if both kings on same file with no piece in between, it's illegal.
    const oppKing = findKing(board, opp(color));
    if (oppKing && oppKing[0] === kf) {
      let clear = true;
      const lo = Math.min(kr, oppKing[1]);
      const hi = Math.max(kr, oppKing[1]);
      for (let rr = lo + 1; rr < hi; rr++) {
        if (board[rr][kf]) { clear = false; break; }
      }
      if (clear) return true;
    }

    // Any opponent pseudo-move targeting our king's square = check
    const oppMoves = pseudoMoves(board, opp(color));
    for (const m of oppMoves) {
      if (m.to[0] === kf && m.to[1] === kr) return true;
    }
    return false;
  }

  // Apply move on a board (mutating), return the move record so we can undo.
  function makeMove(board, m) {
    const [ff, fr] = m.from;
    const [tf, tr] = m.to;
    const movingPiece = board[fr][ff];
    const captured = board[tr][tf];
    board[tr][tf] = movingPiece;
    board[fr][ff] = null;
    return { ...m, movingPiece, captured };
  }

  function undoMove(board, undo) {
    const [ff, fr] = undo.from;
    const [tf, tr] = undo.to;
    board[fr][ff] = undo.movingPiece;
    board[tr][tf] = undo.captured || null;
  }

  function legalMoves(board, color) {
    const out = [];
    const pseudos = pseudoMoves(board, color);
    for (const m of pseudos) {
      const undo = makeMove(board, m);
      const inChk = isInCheck(board, color);
      undoMove(board, undo);
      if (!inChk) out.push(m);
    }
    return out;
  }

  function isCheckmate(board, color) {
    return isInCheck(board, color) && legalMoves(board, color).length === 0;
  }
  function isStalemate(board, color) {
    return !isInCheck(board, color) && legalMoves(board, color).length === 0;
  }
  // In Xiangqi, both checkmate and stalemate (困毙) are losses for the side to move.
  function isLost(board, color) {
    return legalMoves(board, color).length === 0;
  }

  // ============================================================
  // Evaluation + AI (minimax + α-β)
  // ============================================================
  function evaluateBoard(board) {
    // Positive = good for RED
    let score = 0;
    for (let r = 0; r < N_RANKS; r++) {
      for (let f = 0; f < N_FILES; f++) {
        const p = board[r][f];
        if (!p) continue;
        let v = PIECE_VALUE[p.type];
        // Pawn bonus after crossing river
        if (p.type === 'P') {
          const crossed = (p.color === RED ? r >= 5 : r <= 4);
          if (crossed) v += PAWN_CROSSED_BONUS;
          // Center file bonus for pawns (controls central files)
          if (f >= 3 && f <= 5) v += 10;
        }
        // Mild centralization bonus for horses/cannons in middle game
        if (p.type === 'H' || p.type === 'C') {
          const distFromCenter = Math.abs(f - 4);
          v += (4 - distFromCenter) * 3;
        }
        score += (p.color === RED ? 1 : -1) * v;
      }
    }
    return score;
  }

  // Move ordering: captures first (MVV-LVA), checks second
  function moveOrderKey(m) {
    let k = 0;
    if (m.capture) {
      k += 10000 + PIECE_VALUE[m.capture.type] * 10 - PIECE_VALUE[m.movingPiece ? m.movingPiece.type : 'P'];
    }
    return k;
  }

  function negamax(board, color, depth, alpha, beta) {
    if (depth === 0) {
      return { score: (color === RED ? 1 : -1) * evaluateBoard(board), move: null };
    }
    const moves = legalMoves(board, color);
    if (moves.length === 0) {
      // Lose: heavy negative score (with depth penalty so faster mates beat slower ones)
      return { score: -1e6 + (1000 - depth), move: null };
    }
    // Annotate with capture for ordering
    moves.sort((a, b) => moveOrderKey(b) - moveOrderKey(a));
    let bestScore = -Infinity, bestMove = moves[0];
    for (const m of moves) {
      const undo = makeMove(board, m);
      const child = negamax(board, opp(color), depth - 1, -beta, -alpha);
      const score = -child.score;
      undoMove(board, undo);
      if (score > bestScore) {
        bestScore = score;
        bestMove = m;
      }
      if (score > alpha) alpha = score;
      if (alpha >= beta) break;
    }
    return { score: bestScore, move: bestMove };
  }

  function pickAiMove(board, color, cfg) {
    const moves = legalMoves(board, color);
    if (moves.length === 0) return null;
    moves.sort((a, b) => moveOrderKey(b) - moveOrderKey(a));
    const scored = moves.map(m => {
      const undo = makeMove(board, m);
      const child = negamax(board, opp(color), cfg.depth - 1, -Infinity, Infinity);
      let score = -child.score;
      undoMove(board, undo);
      if (cfg.noise > 0) score += (Math.random() - 0.5) * 2 * cfg.noise * Math.abs(score || 50);
      return { move: m, score };
    });
    scored.sort((a, b) => b.score - a.score);
    if (cfg.randomTopK > 1 && scored.length > 1) {
      const k = Math.min(cfg.randomTopK, scored.length);
      const top = scored.slice(0, k);
      const minS = Math.min(...top.map(x => x.score));
      const weights = top.map(x => Math.max(1, x.score - minS + 30));
      const sum = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * sum;
      for (let i = 0; i < top.length; i++) {
        r -= weights[i];
        if (r <= 0) return top[i].move;
      }
      return top[0].move;
    }
    return scored[0].move;
  }

  // ============================================================
  // State + DOM
  // ============================================================
  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
    catch { return {}; }
  })();

  const state = {
    mode: stored.lastMode || 'pvp',
    difficulty: DIFFICULTY[stored.difficulty] ? stored.difficulty : 'normal',
    tally: Object.assign({ r: 0, b: 0 }, stored.tally || {}),
    board: startingBoard(),
    turn: RED,
    history: [],          // [{undoRecord, prevTurn}]
    selected: null,       // [f, r] or null
    legalTargets: [],     // moves from selected
    aiThinking: false,
    paused: false,
    over: false,
    lastMove: null        // {from:[f,r], to:[f,r]}
  };

  const svg = document.getElementById('xqSvg');
  const turnEl = document.getElementById('xqTurn');
  const tallyR = document.getElementById('xqTallyR');
  const tallyB = document.getElementById('xqTallyB');
  const undoBtn = document.getElementById('xqUndoBtn');
  const newBtn = document.getElementById('xqNewBtn');
  const pauseBtn = document.getElementById('xqPauseBtn');
  const overlay = document.getElementById('xqOverlay');
  const ovTitle = document.getElementById('xqOvTitle');
  const ovBtn = document.getElementById('xqOvBtn');
  const pausedOverlay = document.getElementById('xqPausedOverlay');
  const resumeBtn = document.getElementById('xqResumeBtn');
  const difficultyRow = document.getElementById('xqDifficultyRow');
  const difficultyTabs = document.getElementById('xqDifficultyTabs');

  function persist() {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      tally: state.tally,
      lastMode: state.mode,
      difficulty: state.difficulty
    }));
  }

  function aiSide() {
    if (state.mode === 'ai-red') return BLACK;    // human plays red, AI is black
    if (state.mode === 'ai-black') return RED;    // human plays black, AI is red
    return null;
  }
  function humanSide() {
    if (state.mode === 'ai-red') return RED;
    if (state.mode === 'ai-black') return BLACK;
    return null;
  }
  // Flip board so the human plays from the bottom: by default red is at bottom; if human is black, flip.
  function isFlipped() {
    return state.mode === 'ai-black';
  }

  // ============================================================
  // Rendering (SVG)
  // ============================================================
  function svgEl(tag, attrs, children) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
    if (children) for (const c of children) el.appendChild(c);
    return el;
  }

  function drawBackground(g) {
    // Horizontal lines (10 ranks)
    for (let r = 0; r < N_RANKS; r++) {
      const y = svgY(r);
      g.appendChild(svgEl('line', { class: r === 0 || r === N_RANKS - 1 ? 'board-edge' : 'board-line', x1: svgX(0), x2: svgX(N_FILES - 1), y1: y, y2: y }));
    }
    // Vertical lines (9 files); inner files break at the river
    for (let f = 0; f < N_FILES; f++) {
      const x = svgX(f);
      if (f === 0 || f === N_FILES - 1) {
        g.appendChild(svgEl('line', { class: 'board-edge', x1: x, x2: x, y1: svgY(N_RANKS - 1), y2: svgY(0) }));
      } else {
        // top half: rank 9 down to rank 5
        g.appendChild(svgEl('line', { class: 'board-line', x1: x, x2: x, y1: svgY(N_RANKS - 1), y2: svgY(5) }));
        // bottom half: rank 4 down to rank 0
        g.appendChild(svgEl('line', { class: 'board-line', x1: x, x2: x, y1: svgY(4), y2: svgY(0) }));
      }
    }
    // Palace X marks
    // Red palace: files 3-5, ranks 0-2
    g.appendChild(svgEl('line', { class: 'palace-x', x1: svgX(3), y1: svgY(0), x2: svgX(5), y2: svgY(2) }));
    g.appendChild(svgEl('line', { class: 'palace-x', x1: svgX(5), y1: svgY(0), x2: svgX(3), y2: svgY(2) }));
    // Black palace: files 3-5, ranks 7-9
    g.appendChild(svgEl('line', { class: 'palace-x', x1: svgX(3), y1: svgY(7), x2: svgX(5), y2: svgY(9) }));
    g.appendChild(svgEl('line', { class: 'palace-x', x1: svgX(5), y1: svgY(7), x2: svgX(3), y2: svgY(9) }));

    // River text "楚 河    漢 界"
    const rivY = (svgY(4) + svgY(5)) / 2;
    g.appendChild(svgEl('text', { class: 'river-text', x: svgX(1.6), y: rivY + 10 }, [Object.assign(document.createTextNode('楚河'))]));
    g.appendChild(svgEl('text', { class: 'river-text', x: svgX(5.6), y: rivY + 10 }, [Object.assign(document.createTextNode('漢界'))]));

    // Position marks for cannon and pawn intersections (small "[" marks)
    const marks = [
      [1, 2], [7, 2], [1, 7], [7, 7],            // cannons
      [0, 3], [2, 3], [4, 3], [6, 3], [8, 3],    // red pawns
      [0, 6], [2, 6], [4, 6], [6, 6], [8, 6]     // black pawns
    ];
    for (const [f, r] of marks) {
      const x = svgX(f), y = svgY(r);
      const offs = 6, len = 8;
      // 4 small L corners around the intersection (skip at edges where impossible)
      const corners = [
        [+1, +1], [+1, -1], [-1, +1], [-1, -1]
      ];
      for (const [sx, sy] of corners) {
        // Skip outward-pointing arms that would fall outside the board
        if ((f === 0 && sx < 0) || (f === N_FILES - 1 && sx > 0)) continue;
        const path = `M ${x + sx * offs} ${y + sy * (offs + len)} L ${x + sx * offs} ${y + sy * offs} L ${x + sx * (offs + len)} ${y + sy * offs}`;
        g.appendChild(svgEl('path', { class: 'pawn-mark', d: path }));
      }
    }
  }

  function renderBoard() {
    svg.innerHTML = '';

    const bgGroup = svgEl('g', { class: 'board-bg' });
    drawBackground(bgGroup);
    svg.appendChild(bgGroup);

    const flipped = isFlipped();
    const dispCoord = (f, r) => flipped ? [N_FILES - 1 - f, N_RANKS - 1 - r] : [f, r];

    // Highlight last move (from/to halos)
    if (state.lastMove) {
      for (const sq of [state.lastMove.from, state.lastMove.to]) {
        const [df, dr] = dispCoord(sq[0], sq[1]);
        svg.appendChild(svgEl('circle', { class: 'last-mark', cx: svgX(df), cy: svgY(dr), r: 32 }));
      }
    }

    // Compute check info
    const kingInCheck = isInCheck(state.board, state.turn) ? findKing(state.board, state.turn) : null;

    // Pieces
    const pieceGroup = svgEl('g', { class: 'pieces' });
    for (let r = 0; r < N_RANKS; r++) {
      for (let f = 0; f < N_FILES; f++) {
        const p = state.board[r][f];
        if (!p) continue;
        const [df, dr] = dispCoord(f, r);
        const cx = svgX(df), cy = svgY(dr);
        const circleClasses = ['piece-circle', p.color === RED ? 'red' : 'black'];
        if (state.selected && state.selected[0] === f && state.selected[1] === r) circleClasses.push('selected');
        if (kingInCheck && kingInCheck[0] === f && kingInCheck[1] === r) circleClasses.push('in-check');
        pieceGroup.appendChild(svgEl('circle', { class: circleClasses.join(' '), cx, cy, r: 32 }));
        const txt = svgEl('text', { class: 'piece-text ' + (p.color === RED ? 'red' : 'black'), x: cx, y: cy + 1 });
        txt.appendChild(document.createTextNode(PIECE_GLYPH[p.color][p.type]));
        pieceGroup.appendChild(txt);
      }
    }
    svg.appendChild(pieceGroup);

    // Move dots / capture rings
    if (state.legalTargets.length > 0) {
      const dotsGroup = svgEl('g', { class: 'dots' });
      for (const m of state.legalTargets) {
        const [df, dr] = dispCoord(m.to[0], m.to[1]);
        if (m.capture) {
          dotsGroup.appendChild(svgEl('circle', { class: 'move-dot capture', cx: svgX(df), cy: svgY(dr), r: 34 }));
        } else {
          dotsGroup.appendChild(svgEl('circle', { class: 'move-dot', cx: svgX(df), cy: svgY(dr), r: 8 }));
        }
      }
      svg.appendChild(dotsGroup);
    }

    // Click hit targets — one rect per intersection (must be on top)
    const hitGroup = svgEl('g', { class: 'hit-targets' });
    for (let r = 0; r < N_RANKS; r++) {
      for (let f = 0; f < N_FILES; f++) {
        const [df, dr] = dispCoord(f, r);
        const rect = svgEl('rect', {
          class: 'cell-hit',
          x: svgX(df) - SPACING / 2,
          y: svgY(dr) - SPACING / 2,
          width: SPACING,
          height: SPACING,
          'data-f': f,
          'data-r': r
        });
        hitGroup.appendChild(rect);
      }
    }
    svg.appendChild(hitGroup);
  }

  function updateStatus() {
    let label;
    const turnPhrase = state.turn === RED ? '🔴 红方走子' : '⚫ 黑方走子';
    if (state.paused) {
      label = '⏸ 已暂停';
    } else if (state.over) {
      // Determined by last winner stored on overlay; reuse ovTitle text
      label = ovTitle.textContent;
    } else if (state.aiThinking) {
      label = '🤖 AI 思考中…';
    } else {
      const inChk = isInCheck(state.board, state.turn);
      label = turnPhrase + (inChk ? ' — 将军！' : '');
    }
    turnEl.textContent = label;
    tallyR.textContent = state.tally.r;
    tallyB.textContent = state.tally.b;
    undoBtn.disabled = state.history.length === 0 || state.aiThinking || state.paused;

    document.querySelectorAll('#xqModeTabs .xq-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === state.mode);
    });
    document.querySelectorAll('#xqDifficultyTabs .xq-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === state.difficulty);
    });
    const isAi = aiSide() !== null;
    difficultyRow.hidden = !isAi;
    pauseBtn.hidden = !isAi;
    pauseBtn.textContent = state.paused ? '▶ 继续' : '⏸ 暂停';
    pauseBtn.disabled = state.over;
    pausedOverlay.classList.toggle('show', state.paused && !state.over);
  }

  function newGame() {
    if (typeof xqSave !== 'undefined' && xqSave) xqSave.discard();
    state.board = startingBoard();
    state.turn = RED;
    state.history = [];
    state.selected = null;
    state.legalTargets = [];
    state.aiThinking = false;
    state.paused = false;
    state.over = false;
    state.lastMove = null;
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    xqPgoOverlay.classList.remove('open');
    renderBoard();
    updateStatus();
    xqRunStartedAt = Date.now();
    xqRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
    xqLastResult = null;
    if (typeof xqSettleBtn !== 'undefined' && xqSettleBtn) xqSettleBtn.setEnabled(false);
    if (aiSide() === RED) setTimeout(triggerAiMove, 320);
  }

  function endGameIfOver() {
    // Check if the side to move has any legal moves
    if (legalMoves(state.board, state.turn).length > 0) return false;
    state.over = true;
    const inChk = isInCheck(state.board, state.turn);
    const winner = opp(state.turn);
    if (winner === RED) state.tally.r++; else state.tally.b++;
    persist();
    let title;
    if (inChk) title = (winner === RED ? '🔴 红方将死黑方' : '⚫ 黑方将死红方');
    else title = (winner === RED ? '🔴 黑方困毙 — 红胜' : '⚫ 红方困毙 — 黑胜');
    ovTitle.textContent = title;
    overlay.classList.add('show');
    // 仅当 AI 模式下"人类方"获胜，才上传战绩榜
    const human = humanSide();
    if (human != null && winner === human) xqTryAutoSubmit();
    if (typeof xqSave !== 'undefined' && xqSave) xqSave.discard();
    // 结算图：仅 AI 模式
    if (state.mode && state.mode.startsWith('ai-') && human != null) {
      xqLastResult = (winner === human) ? 'win' : 'lose';
      if (typeof xqSettleBtn !== 'undefined' && xqSettleBtn) xqSettleBtn.setEnabled(true);
    }
    return true;
  }

  function applyMove(m) {
    const undo = makeMove(state.board, m);
    state.history.push({ undo, prevTurn: state.turn });
    state.lastMove = { from: m.from.slice(), to: m.to.slice() };
    state.selected = null;
    state.legalTargets = [];
    state.turn = opp(state.turn);
    renderBoard();
    if (!endGameIfOver()) {
      updateStatus();
      if (!state.paused && aiSide() === state.turn) {
        setTimeout(triggerAiMove, 100);
      }
    } else {
      updateStatus();
    }
  }

  function triggerAiMove() {
    if (state.over || state.paused) return;
    if (aiSide() !== state.turn) return;
    state.aiThinking = true;
    updateStatus();
    const cfg = DIFFICULTY[state.difficulty];
    setTimeout(() => {
      const t0 = Date.now();
      const move = pickAiMove(state.board, state.turn, cfg);
      const elapsed = Date.now() - t0;
      const wait = Math.max(0, cfg.delayMs - elapsed);
      setTimeout(() => {
        state.aiThinking = false;
        if (state.paused || state.over) { updateStatus(); return; }
        if (move) applyMove(move);
        else updateStatus();
      }, wait);
    }, 30);
  }

  // ============================================================
  // Event handlers
  // ============================================================
  svg.addEventListener('click', (e) => {
    if (state.over || state.aiThinking || state.paused) return;
    const target = e.target.closest('.cell-hit');
    if (!target) return;
    const f = parseInt(target.dataset.f, 10);
    const r = parseInt(target.dataset.r, 10);
    const piece = state.board[r][f];

    if (aiSide() !== null && state.turn !== humanSide()) return;

    if (state.selected) {
      const [sf, sr] = state.selected;
      const move = state.legalTargets.find(m => m.to[0] === f && m.to[1] === r);
      if (move) {
        applyMove(move);
        return;
      }
      // Re-select if clicking own piece
      if (piece && piece.color === state.turn) {
        state.selected = [f, r];
        const allLegal = legalMoves(state.board, state.turn);
        state.legalTargets = allLegal.filter(m => m.from[0] === f && m.from[1] === r);
        renderBoard();
        return;
      }
      // Deselect
      state.selected = null;
      state.legalTargets = [];
      renderBoard();
      return;
    }

    // No selection → select own piece
    if (piece && piece.color === state.turn) {
      state.selected = [f, r];
      const allLegal = legalMoves(state.board, state.turn);
      state.legalTargets = allLegal.filter(m => m.from[0] === f && m.from[1] === r);
      renderBoard();
    }
  });

  document.getElementById('xqModeTabs').addEventListener('click', (e) => {
    const t = e.target.closest('.xq-mode-tab');
    if (!t) return;
    state.mode = t.dataset.mode;
    persist();
    newGame();
  });

  difficultyTabs.addEventListener('click', (e) => {
    const t = e.target.closest('.xq-mode-tab');
    if (!t || !DIFFICULTY[t.dataset.diff]) return;
    if (state.difficulty === t.dataset.diff) return;
    state.difficulty = t.dataset.diff;
    persist();
    newGame();
  });

  function togglePause() {
    if (aiSide() === null || state.over) return;
    state.paused = !state.paused;
    updateStatus();
    if (!state.paused && aiSide() === state.turn && !state.aiThinking) {
      setTimeout(triggerAiMove, 100);
    }
  }
  pauseBtn.onclick = togglePause;
  resumeBtn.onclick = togglePause;

  undoBtn.onclick = () => {
    if (state.aiThinking || state.paused || state.history.length === 0) return;
    const steps = aiSide() != null ? Math.min(2, state.history.length) : 1;
    for (let i = 0; i < steps; i++) {
      const last = state.history.pop();
      undoMove(state.board, last.undo);
      state.turn = last.prevTurn;
    }
    state.over = false;
    state.selected = null;
    state.legalTargets = [];
    state.lastMove = state.history.length > 0
      ? { from: state.history[state.history.length - 1].undo.from.slice(), to: state.history[state.history.length - 1].undo.to.slice() }
      : null;
    overlay.classList.remove('show');
    renderBoard();
    updateStatus();
  };

  newBtn.onclick = newGame;
  ovBtn.onclick = newGame;

  // ── games-shell：战绩榜 + 评论 ─────────────
  let xqWlbWidget = null;
  let xqRunStartedAt = Date.now();
  let xqRunNonce = (window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now());
  let xqSettleBtn = null;
  let xqLastResult = null;     // 'win' | 'lose' | 'draw'

  const XQ_DIFF_LABEL = { easy: '简单', normal: '普通', hard: '困难' };

  function xqFormatDuration(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function xqPaintBoard(ctx, x, y, w, h) {
    const aspect = N_FILES / N_RANKS;     // 0.9
    const targetH = Math.min(h, w / aspect);
    const targetW = targetH * aspect;
    const ox = x + (w - targetW) / 2;
    const oy = y + (h - targetH) / 2;
    const margin = targetW * 0.06;
    const spacing = (targetW - margin * 2) / (N_FILES - 1);
    const startX = ox + margin;
    const topY = oy + margin;
    const xAt = f => startX + f * spacing;
    const yAt = r => topY + (N_RANKS - 1 - r) * spacing;
    const flipped = (state.mode === 'ai-red');
    const dispCoord = (f, r) => flipped ? [N_FILES - 1 - f, N_RANKS - 1 - r] : [f, r];

    // 背景（木色）
    ctx.fillStyle = '#f4d8a8';
    ctx.fillRect(x, y, w, h);

    // 网格
    ctx.strokeStyle = '#3a2a1a';
    ctx.lineWidth = Math.max(1, spacing * 0.025);
    for (let r = 0; r < N_RANKS; r++) {
      const py = yAt(r);
      ctx.beginPath();
      ctx.moveTo(xAt(0), py);
      ctx.lineTo(xAt(N_FILES - 1), py);
      ctx.stroke();
    }
    for (let f = 0; f < N_FILES; f++) {
      const px = xAt(f);
      ctx.beginPath();
      if (f === 0 || f === N_FILES - 1) {
        ctx.moveTo(px, yAt(0));
        ctx.lineTo(px, yAt(N_RANKS - 1));
      } else {
        ctx.moveTo(px, yAt(0));
        ctx.lineTo(px, yAt(4));
        ctx.moveTo(px, yAt(5));
        ctx.lineTo(px, yAt(N_RANKS - 1));
      }
      ctx.stroke();
    }
    // 九宫 X
    ctx.beginPath();
    ctx.moveTo(xAt(3), yAt(0)); ctx.lineTo(xAt(5), yAt(2));
    ctx.moveTo(xAt(5), yAt(0)); ctx.lineTo(xAt(3), yAt(2));
    ctx.moveTo(xAt(3), yAt(7)); ctx.lineTo(xAt(5), yAt(9));
    ctx.moveTo(xAt(5), yAt(7)); ctx.lineTo(xAt(3), yAt(9));
    ctx.stroke();

    // 楚河 漢界
    ctx.fillStyle = '#5a4030';
    ctx.font = `${spacing * 0.5}px "STKaiti", "KaiTi", "Songti SC", "Microsoft YaHei", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const riverY = (yAt(4) + yAt(5)) / 2;
    ctx.fillText('楚 河', xAt(2), riverY);
    ctx.fillText('漢 界', xAt(6), riverY);

    // 最后一手高亮
    if (state.lastMove) {
      ctx.fillStyle = 'rgba(255, 215, 0, 0.45)';
      for (const sq of [state.lastMove.from, state.lastMove.to]) {
        const [df, dr] = dispCoord(sq[0], sq[1]);
        ctx.beginPath();
        ctx.arc(xAt(df), yAt(dr), spacing * 0.45, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 棋子
    const r0 = spacing * 0.42;
    for (let r = 0; r < N_RANKS; r++) {
      for (let f = 0; f < N_FILES; f++) {
        const p = state.board[r][f];
        if (!p) continue;
        const [df, dr] = dispCoord(f, r);
        const cx = xAt(df), cy = yAt(dr);
        ctx.fillStyle = '#fbe6c2';
        ctx.beginPath();
        ctx.arc(cx, cy, r0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = (p.color === RED) ? '#c0392b' : '#1a1a1a';
        ctx.lineWidth = Math.max(1, spacing * 0.04);
        ctx.beginPath();
        ctx.arc(cx, cy, r0 - 1, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = (p.color === RED) ? '#c0392b' : '#1a1a1a';
        ctx.font = `bold ${spacing * 0.55}px "STKaiti", "KaiTi", "Songti SC", "Microsoft YaHei", serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText((PIECE_GLYPH[p.color] && PIECE_GLYPH[p.color][p.type]) || '?', cx, cy + spacing * 0.04);
      }
    }
  }

  function xqGetSettlementOpts() {
    const isAi = state.mode && state.mode.startsWith('ai-');
    if (!isAi) return null;
    if (!xqLastResult) return null;
    const elapsed = Math.floor((Date.now() - xqRunStartedAt) / 1000);
    return {
      kind: 'duel',
      gameId: 'xiangqi',
      title: '中国象棋',
      emoji: '♘',
      nick: GamesShell.Identity.getNick() || '匿名',
      opponent: 'vs AI · ' + (XQ_DIFF_LABEL[state.difficulty] || state.difficulty),
      result: xqLastResult,
      stats: [
        { label: '我执', value: state.mode === 'ai-black' ? '红' : '黑' },
        { label: '走子数', value: state.history.length + ' 步' },
        { label: '用时', value: xqFormatDuration(elapsed) },
      ],
      paintBoard: xqPaintBoard,
      boardW: 432,
      boardAspect: N_FILES / N_RANKS,
      watermark: 'zirconeey.github.io/toolbox/xiangqi',
    };
  }

  function xqTryAutoSubmit() {
    if (!window.GamesShell) return;
    if (!state.mode || !state.mode.startsWith('ai-')) return;
    if (!['easy', 'normal', 'hard'].includes(state.difficulty)) return;
    let nick = GamesShell.Identity.getNick();
    // 不合法就提示后再让用户重输，别一次失败就把战绩扔了
    let lastErr = '';
    while (!nick) {
      const hint = lastErr ? `${lastErr}，请重新输入：\n\n` : '恭喜击败 AI！起个昵称上传战绩榜？\n\n';
      const v = prompt(hint + '2-12 字（中英 / 数字 / 标点 / emoji 都算 1 字；按取消则不上传）');
      if (v === null) return;
      const r = GamesShell.Identity.setNick(v);
      if (r.ok) { nick = r.nick; break; }
      lastErr = r.reason || '昵称无效';
    }
    const submittedNick = nick;
    GamesShell.WinsLeaderboard.submit({
      gameId: 'xiangqi',
      nick,
      did: GamesShell.Identity.getDeviceId(),
      aiLevel: state.difficulty,
      moves: state.history.length,
      durationMs: Math.max(5000, Date.now() - xqRunStartedAt),
      clientNonce: xqRunNonce,
    }).then(r => {
      if (r && r.ok) {
        if (xqWlbWidget) xqWlbWidget.refresh();
        return;
      }
      if (r && r.reason === 'nick_taken') {
        GamesShell.Identity.clearNick();
        alert('“' + submittedNick + '” 已被别的玩家占用，请换一个昵称');
        xqTryAutoSubmit();
        return;
      }
      if (r && r.reason) console.warn('[xiangqi] wins submit rejected:', r.reason);
    });
  }

  function xqInitShell() {
    if (!window.GamesShell || !GamesShell.WinsLeaderboard) return;
    xqWlbWidget = GamesShell.WinsLeaderboard.mount({
      container: document.getElementById('xq-wlb-mount'),
      gameId: 'xiangqi',
      title: '🏆 中国象棋 战绩榜',
      getCurrentNick: () => GamesShell.Identity.getNick(),
    });
    GamesShell.Comments.mount({
      container: document.getElementById('xq-cm-mount'),
      path: '/toolbox/xiangqi/',
      title: '💬 棋友交流',
      intro: '聊聊击败 AI 的开局、跑炮 / 飞马心得 ~',
      placeholder: '聊聊你的中国象棋心得 ~',
    });
    if (GamesShell.Settlement) {
      xqSettleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('xq-settle-btn-mount'),
        gameId: 'xiangqi',
        getOpts: xqGetSettlementOpts,
        startDisabled: true,
      });
    }
  }
  // ============ Pre-game Overlay ============
  const xqPgoOverlay = document.getElementById('xqPreGameOverlay');
  let xqPgoSelectedMode = state.mode;
  let xqPgoSelectedDiff = state.difficulty || 'normal';

  function xqUpdatePgoUI() {
    document.querySelectorAll('#xqPgoModePicker .gs-pgo-mode-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.value === xqPgoSelectedMode);
    });
    const diffPicker = document.getElementById('xqPgoDiffPicker');
    diffPicker.style.display = xqPgoSelectedMode !== 'pvp' ? '' : 'none';
    document.querySelectorAll('#xqPgoDiffPicker .gs-pgo-mode-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.value === xqPgoSelectedDiff);
    });
  }

  document.getElementById('xqPgoModePicker').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-mode-tab');
    if (!t) return;
    xqPgoSelectedMode = t.dataset.value;
    xqUpdatePgoUI();
  });
  document.getElementById('xqPgoDiffPicker').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-mode-tab');
    if (!t) return;
    xqPgoSelectedDiff = t.dataset.value;
    xqUpdatePgoUI();
  });

  // ============ Room Client ============
  const BOARD_API = 'https://zircon-urge.fly.dev/api/board';
  let xqRoomToken = null, xqRoomPlayerId = null, xqRoomCode = null, xqRoomHost = false;
  let xqRoomStatePoller = null, xqIsOnline = false;
  const XQ_MIN_PLAYERS = 2;

  function xqRoomApi(method, action, body) {
    return fetch(`${BOARD_API}?action=${action}`, { method, headers: { 'Content-Type': 'application/json' }, signal: AbortSignal.timeout(12000), body: body ? JSON.stringify(body) : undefined }).then(r => r.json()).catch(e => ({ error: e.name === 'TimeoutError' ? 'timeout' : 'network' }));
  }
  function xqGetNick() { return GamesShell.Identity.getNick() || ('玩家' + Math.floor(Math.random() * 9000 + 1000)); }

  document.getElementById('xqPgoRoomTabs').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-room-tab');
    if (!t) return;
    const tab = t.dataset.tab;
    document.querySelectorAll('#xqPgoRoomTabs .gs-pgo-room-tab').forEach(b => b.classList.toggle('selected', b.dataset.tab === tab));
    document.getElementById('xqPgoLocalPanel').classList.toggle('active', tab === 'local');
    document.getElementById('xqPgoOnlinePanel').classList.toggle('active', tab === 'online');
    document.getElementById('xqPgoModePicker').style.display = tab === 'online' ? 'none' : '';
    document.getElementById('xqPgoDiffPicker').style.display = tab === 'online' ? 'none' : (xqPgoSelectedMode !== 'pvp' ? '' : 'none');
    document.getElementById('xqPgoStartBtn').style.display = tab === 'online' ? 'none' : '';
    xqIsOnline = tab === 'online';
  });

  function xqShowError(msg) { document.getElementById('xqPgoRoomError').textContent = msg || ''; }

  async function xqRoomAction() {
    const code = (document.getElementById('xqPgoRoomCodeInput').value || '').trim();
    const btn = document.getElementById('xqPgoRoomActionBtn');
    xqShowError(''); btn.textContent = '连接中…'; btn.disabled = true;
    try {
      const nick = xqGetNick(), did = GamesShell.Identity.getDeviceId();
      const ping = await xqRoomApi('GET', 'ping');
      if (ping.error) { xqShowError('无法连接到服务器，请确认网络后重试'); return; }
      if (/^\d{4}$/.test(code)) {
        const r = await xqRoomApi('POST', 'join', { code, nick, deviceId: did });
        if (r.ok) { xqEnterLobby(r); return; }
        if (r.reason === 'room_not_found') {
          const cr = await xqRoomApi('POST', 'create', { gameId: 'xiangqi', nick, deviceId: did, code });
          if (cr.ok) { xqEnterLobby(cr); return; }
          const msgs = { code_taken: '该房号已被占用，换一个试试', timeout: '连接超时，请检查网络', network: '网络错误，请稍后再试' };
          xqShowError(msgs[cr.reason] || msgs[cr.error] || '创建失败');
          return;
        }
        const msgs = { room_full: '房间已满，换一个房号试试', nick_taken_in_room: '昵称已被占用，换一个试试', room_in_progress: '游戏已开始，不能加入', timeout: '连接超时，请检查网络', network: '网络错误，请稍后再试' };
        xqShowError(msgs[r.reason] || msgs[r.error] || '加入失败');
        return;
      }
      const r = await xqRoomApi('POST', 'create', { gameId: 'xiangqi', nick, deviceId: did });
      if (r.ok) { xqEnterLobby(r); return; }
      xqShowError('创建失败');
    } finally {
      btn.textContent = '创建 / 加入房间'; btn.disabled = false;
    }
  }

  function xqEnterLobby(r) {
    xqRoomToken = r.playerToken; xqRoomPlayerId = r.playerId; xqRoomCode = r.code;
    document.getElementById('xqPgoRoomCodeInput').parentElement.style.display = 'none';
    document.getElementById('xqPgoRoomLobby').style.display = '';
    document.getElementById('xqPgoRoomCodeNum').textContent = r.code;
    xqUpdateLobby(r.room); xqStartPolling();
  }

  function xqUpdateLobby(room) {
    xqRoomHost = room.youAreHost;
    const list = document.getElementById('xqPgoRoomPlayers');
    list.innerHTML = (room.players || []).map((p, i) => {
      const isMe = p.id === xqRoomPlayerId, isHost = p.isHost;
      let h = '<li>';
      if (xqRoomHost && room.state === 'lobby' && !isMe) {
        if (i > 0) h += `<button class="xq-room-act up" data-act="up" data-id="${p.id}">▲</button>`;
        if (i < room.players.length - 1) h += `<button class="xq-room-act down" data-act="down" data-id="${p.id}">▼</button>`;
      }
      h += p.nick;
      if (isMe) h += ' (你)';
      if (isHost) h += ' <span class="gs-pgo-room-host-badge">房主</span>';
      if (xqRoomHost && room.state === 'lobby' && !isMe) h += `<button class="xq-room-kick" data-act="kick" data-id="${p.id}">✕</button>`;
      h += '</li>';
      return h;
    }).join('');
    list.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const act = btn.dataset.act, pid = btn.dataset.id;
        if (act === 'kick') await xqRoomApi('POST', 'kick', { code: xqRoomCode, token: xqRoomToken, targetPlayerId: pid });
        else if (act === 'up' || act === 'down') {
          const ids = room.players.map(p => p.id), idx = ids.indexOf(pid);
          if (act === 'up' && idx > 0) [ids[idx - 1], ids[idx]] = [ids[idx], ids[idx - 1]];
          else if (act === 'down' && idx < ids.length - 1) [ids[idx], ids[idx + 1]] = [ids[idx + 1], ids[idx]];
          await xqRoomApi('POST', 'reorder', { code: xqRoomCode, token: xqRoomToken, playerIds: ids });
        }
      });
    });
    document.getElementById('xqPgoRoomStartBtn').disabled = !(xqRoomHost && room.players.length >= XQ_MIN_PLAYERS);
    document.getElementById('xqPgoRoomStartBtn').textContent = xqRoomHost ? `开始游戏 (${room.players.length}/${XQ_MIN_PLAYERS})` : '等待房主开始…';
  }

  async function xqLeaveRoom() {
    if (xqRoomStatePoller) { clearTimeout(xqRoomStatePoller); xqRoomStatePoller = null; }
    if (xqRoomToken) await xqRoomApi('POST', 'leave', { code: xqRoomCode, token: xqRoomToken });
    xqRoomToken = null; xqRoomPlayerId = null; xqRoomCode = null; xqRoomHost = false;
    document.getElementById('xqPgoRoomCodeInput').parentElement.style.display = '';
    document.getElementById('xqPgoRoomLobby').style.display = 'none';
    document.getElementById('xqPgoRoomCodeInput').value = '';
  }

  function xqStartPolling() {
    if (xqRoomStatePoller) clearTimeout(xqRoomStatePoller);
    let since = 0;
    async function poll() {
      if (!xqRoomToken) return;
      const r = await xqRoomApi('GET', `state&code=${xqRoomCode}&token=${xqRoomToken}&since=${since}`);
      if (!r.ok) { xqRoomStatePoller = setTimeout(poll, 2000); return; }
      if (r.room) {
        since = r.version;
        if (r.room.state === 'playing') { xqPgoOverlay.classList.remove('open'); state.mode = 'pvp'; persist(); newGame(); if (typeof xqSave !== 'undefined' && xqSave) xqSave.start(); return; }
        if (!r.room.players.some(p => p.id === xqRoomPlayerId)) { xqLeaveRoom(); xqShowError('你已被房主移出房间'); return; }
        xqUpdateLobby(r.room);
      }
      xqRoomStatePoller = setTimeout(poll, 1500);
    }
    poll();
  }

  document.getElementById('xqPgoRoomActionBtn').addEventListener('click', xqRoomAction);
  document.getElementById('xqPgoRoomLeaveBtn').addEventListener('click', xqLeaveRoom);
  document.getElementById('xqPgoRoomCopyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(`${location.origin}/toolbox/xiangqi/?room=${xqRoomCode}`).then(() => {
      const btn = document.getElementById('xqPgoRoomCopyBtn'); btn.textContent = '✓ 已复制'; setTimeout(() => { btn.textContent = '🔗 复制链接'; }, 2000);
    }).catch(() => {});
  });
  document.getElementById('xqPgoRoomCopyCodeBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(xqRoomCode).then(() => {
      const btn = document.getElementById('xqPgoRoomCopyCodeBtn'); btn.textContent = '✓ 已复制'; setTimeout(() => { btn.textContent = '📋 复制房号'; }, 2000);
    }).catch(() => {});
  });
  document.getElementById('xqPgoRoomStartBtn').addEventListener('click', async () => {
    const r = await xqRoomApi('POST', 'start', { code: xqRoomCode, token: xqRoomToken });
    if (r.ok) { xqPgoOverlay.classList.remove('open'); state.mode = 'pvp'; persist(); newGame(); if (typeof xqSave !== 'undefined' && xqSave) xqSave.start(); }
  });

  document.getElementById('xqPgoStartBtn').addEventListener('click', () => {
    if (xqIsOnline) return;
    state.mode = xqPgoSelectedMode; state.difficulty = xqPgoSelectedDiff; persist();
    document.querySelectorAll('[data-mode]').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
    document.querySelectorAll('[data-difficulty]').forEach(t => t.classList.toggle('active', t.dataset.difficulty === state.difficulty));
    difficultyRow.hidden = (state.mode === 'pvp');
    if (typeof xqSave !== 'undefined' && xqSave) xqSave.discard();
    newGame(); if (typeof xqSave !== 'undefined' && xqSave) xqSave.start();
  });

  // Render a preview frame
  renderBoard();
  updateStatus();

  xqInitShell();

  // ── 48h 续局 ─────────────────────────────
  let xqSave = null;
  function xqSerialize() {
    if (state.over || state.history.length === 0) return null;
    return {
      mode: state.mode,
      difficulty: state.difficulty,
      board: state.board,
      turn: state.turn,
      history: state.history.length,
      lastMove: state.lastMove,
      runStartedAt: xqRunStartedAt,
      runNonce: xqRunNonce,
    };
  }
  function xqRestore(saved) {
    state.mode = saved.mode || state.mode;
    state.difficulty = saved.difficulty || state.difficulty;
    state.board = saved.board.map(col => col.slice());
    state.turn = saved.turn || RED;
    state.history = [];
    state.selected = null;
    state.legalTargets = [];
    state.aiThinking = false;
    state.paused = false;
    state.over = false;
    state.lastMove = saved.lastMove || null;
    xqRunStartedAt = Number(saved.runStartedAt) || Date.now();
    xqRunNonce = saved.runNonce || ((window.GamesShell && GamesShell.Identity.newRunNonce()) || ('r-' + Date.now()));
    overlay.classList.remove('show');
    pausedOverlay.classList.remove('show');
    xqPgoOverlay.classList.remove('open');
    document.querySelectorAll('[data-mode]').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
    document.querySelectorAll('[data-difficulty]').forEach(t => t.classList.toggle('active', t.dataset.difficulty === state.difficulty));
    renderBoard();
    updateStatus();
    if (!state.paused && aiSide() === state.turn) {
      setTimeout(triggerAiMove, 320);
    }
  }

  if (window.GamesShell && GamesShell.SaveState) {
    xqSave = GamesShell.SaveState.create({
      key: 'tool.xiangqi.savestate.v1',
      ttlMs: 48 * 3600 * 1000,
      serialize: xqSerialize,
    });
    const peek = xqSave.peek();
    if (peek && peek.data && Array.isArray(peek.data.board)) {
      xqUpdatePgoUI();
      xqPgoOverlay.classList.add('open');
    } else {
      xqUpdatePgoUI();
      xqPgoOverlay.classList.add('open');
    }
  } else {
    xqUpdatePgoUI();
    xqPgoOverlay.classList.add('open');
  }
})();
</script>
