<script>
(function () {
  'use strict';

  // ============ 连击倍率表 ============
  // combo = 单笔挥刀（pointer-down → pointer-up）斩到的水果数
  //   combo=1 →  10  ×1
  //   combo=2 →  25  ×2.5
  //   combo=3 →  55  ×5.5    三连切（首个 milestone）
  //   combo=4 →  95  ×9.5
  //   combo=5 → 150  ×15
  //   combo=6 → 220  ×22     超神
  //   combo=7 → 310  ×31     不可阻挡
  //   combo=8 → 420  ×42
  //   combo=9 → 550  ×55
  //   combo≥10 → combo² × 6   指数兜底
  // Combo Rush 模式独立用 combo² × 10（且松手不清零）；precision 模式 ×3 在外层叠加
  const COMBO_POINTS = [0, 10, 25, 55, 95, 150, 220, 310, 420, 550];
  function comboPoints(combo) {
    if (combo <= 0) return 0;
    if (combo < COMBO_POINTS.length) return COMBO_POINTS[combo];
    return Math.round(combo * combo * 6);
  }

  // ============ SVG 资产 ============
  // viewBox 80x80，水果中心 (40, 40)，半径约 30
  const SVG = {
    // 苹果：多段红色 radial 渐变 + 下方黄 blush + 5 条竖向暗纹 + 黄白色雀斑 +
    //       镜面高光 + 底部凹陷阴影 + 木质茎 + 带叶脉的绿叶。脱离了"红圆球 + 绿三角"emoji 感
    apple_whole:
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">'
      + '<defs>'
        + '<radialGradient id="ab" cx="36%" cy="30%" r="68%">'
          + '<stop offset="0" stop-color="#ff9080"/>'
          + '<stop offset="0.22" stop-color="#ff4848"/>'
          + '<stop offset="0.6" stop-color="#c8202a"/>'
          + '<stop offset="1" stop-color="#5e0a14"/>'
        + '</radialGradient>'
        + '<radialGradient id="ay" cx="62%" cy="64%" r="42%">'
          + '<stop offset="0" stop-color="#fdc060" stop-opacity="0.5"/>'
          + '<stop offset="1" stop-color="#fdc060" stop-opacity="0"/>'
        + '</radialGradient>'
      + '</defs>'
      + '<path d="M40 76C58 76 71 60 70 42C68 28 56 16 48 16C44 16 41 19 40 20C39 19 36 16 32 16C24 16 12 28 10 42C9 60 22 76 40 76Z" fill="url(#ab)"/>'
      + '<path d="M40 76C58 76 71 60 70 42C68 28 56 16 48 16C44 16 41 19 40 20C39 19 36 16 32 16C24 16 12 28 10 42C9 60 22 76 40 76Z" fill="url(#ay)"/>'
      + '<g stroke="#7a0a16" stroke-width="0.55" fill="none" opacity="0.32">'
        + '<path d="M28 30Q26 50 30 70"/>'
        + '<path d="M50 28Q52 50 48 70"/>'
        + '<path d="M40 24Q40 50 40 72"/>'
        + '<path d="M20 38Q18 56 24 68"/>'
        + '<path d="M60 38Q62 56 56 70"/>'
      + '</g>'
      + '<g fill="#fff4c0" opacity="0.55">'
        + '<circle cx="46" cy="44" r="0.6"/>'
        + '<circle cx="52" cy="52" r="0.5"/>'
        + '<circle cx="42" cy="60" r="0.55"/>'
        + '<circle cx="56" cy="56" r="0.5"/>'
        + '<circle cx="32" cy="58" r="0.45"/>'
        + '<circle cx="24" cy="50" r="0.55"/>'
        + '<circle cx="38" cy="68" r="0.5"/>'
        + '<circle cx="52" cy="46" r="0.45"/>'
        + '<circle cx="28" cy="64" r="0.4"/>'
        + '<circle cx="48" cy="38" r="0.4"/>'
      + '</g>'
      + '<ellipse cx="27" cy="30" rx="9" ry="6" transform="rotate(-25 27 30)" fill="#fff" opacity="0.30"/>'
      + '<ellipse cx="25" cy="30" rx="4" ry="2.2" transform="rotate(-25 25 30)" fill="#fff" opacity="0.85"/>'
      + '<ellipse cx="40" cy="73" rx="5.5" ry="1.6" fill="#3a0612" opacity="0.65"/>'
      + '<path d="M39.5 20L40 12L41 9L40.5 16Z" fill="#4a2810"/>'
      + '<path d="M40 20L40.5 11" stroke="#7a4a20" stroke-width="0.4" fill="none" opacity="0.7"/>'
      + '<path d="M41 13Q50 5 60 6Q58 14 50 17Q44 17 41 13Z" fill="#5fa83a"/>'
      + '<path d="M41 13Q50 5 60 6Q58 14 50 17Q44 17 41 13Z" fill="#000" opacity="0.16"/>'
      + '<path d="M42 14Q50 10 58 8" stroke="#2a6a1a" stroke-width="0.5" fill="none"/>'
      + '<path d="M44 14Q48 11 54 11" stroke="#2a6a1a" stroke-width="0.35" fill="none" opacity="0.6"/>'
      + '</svg>',
    apple_half:
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">'
      + '<defs>'
        + '<radialGradient id="ahb" cx="50%" cy="50%" r="60%">'
          + '<stop offset="0" stop-color="#fff8e0"/>'
          + '<stop offset="0.65" stop-color="#fde8ba"/>'

      + '</defs>'
      + '<path d="M40 16C38 18 36 16 32 16C24 16 12 28 10 42C9 60 22 76 40 76L40 16Z" fill="#9a1018"/>'

    let total = 0;
    for (const t of types) total += t.weight;

  // ============ AUDIO（Web Audio API 合成，无外部资源）============
  // chop（切水果）/ bomb（炸弹）。所有声音都是临时构建的 OscillatorNode/BufferSource，
  // 走 BiquadFilter → 包络 GainNode → master → DynamicsCompressor → destination。
  // iOS Safari 关键：ctx.resume() 必须同步在 user gesture 内调用（参见 startGame）。
  const FNAudio = (function () {
    let ctx = null, master = null, noiseBuffer = null;
    let muted = false, unlocked = false;
    try { muted = localStorage.getItem('fn:mute') === '1'; } catch (e) {}

    function init() {
      if (ctx) return ctx;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      try {
        ctx = new AC();
      } catch (e) {
        return null;
      }
      master = ctx.createGain();
      master.gain.value = muted ? 0 : 0.65;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -14;
      comp.knee.value = 20;
      comp.ratio.value = 6;
      comp.attack.value = 0.003;
      comp.release.value = 0.12;
      master.connect(comp);
      comp.connect(ctx.destination);
      // 预生成 1.5s 白噪声 buffer
      const dur = 1.5;
      noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      return ctx;
    }

    function unlock() {
      init();
      if (!ctx) return;
      // 必须同步：不要 .then() 包装，否则 iOS 拒绝
      if (ctx.state === 'suspended') {
        try { ctx.resume(); } catch (e) {}
      }
      unlocked = true;
    }

    function noiseSource(start, duration) {
      const src = ctx.createBufferSource();
      src.buffer = noiseBuffer;
      const maxOffset = Math.max(0, noiseBuffer.duration - duration - 0.05);
      const offset = Math.random() * maxOffset;
      src.start(start, offset);
      src.stop(start + duration + 0.02);
      return src;
    }

    function buildOut(pan) {
      const out = ctx.createGain();
      out.gain.value = 1;
      if (ctx.createStereoPanner && pan) {
        const panner = ctx.createStereoPanner();
        panner.pan.value = Math.max(-1, Math.min(1, pan));
        out.connect(panner);
        panner.connect(master);
      } else {
        out.connect(master);
      }
      return out;
    }

    function chop(opts) {
      const now = ctx.currentTime;
      const gain = (opts.gain != null) ? opts.gain : 0.82;
      const detune = opts.detune || 0;
      const out = buildOut(opts.pan || 0);
      // 每发 ±15% 随机化关键参数，避免连切音色完全一致显得机械
      const rvBody = 0.86 + Math.random() * 0.28;
      const rvSquelch = 0.86 + Math.random() * 0.28;

      // 1. Sub-bass 冲击（sine 75→28Hz）—— 切中的次声冲击，肚子里的"咚"
      const sub = ctx.createOscillator();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(76 * rvBody, now);
      sub.frequency.exponentialRampToValueAtTime(28, now + 0.075);
      const subG = ctx.createGain();
      subG.gain.setValueAtTime(0, now);
      subG.gain.linearRampToValueAtTime(gain * 0.70, now + 0.003);
      subG.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      sub.connect(subG); subG.connect(out);
      sub.start(now); sub.stop(now + 0.16);

      // 2. Body triangle（130→55Hz）—— 谐波丰富的"砍肉"身体感
      const body = ctx.createOscillator();
      body.type = 'triangle';
      body.frequency.setValueAtTime(132 * rvBody - Math.max(0, detune) * 0.05, now);
      body.frequency.exponentialRampToValueAtTime(55, now + 0.09);
      const bodyG = ctx.createGain();
      bodyG.gain.setValueAtTime(0, now);
      bodyG.gain.linearRampToValueAtTime(gain * 0.42, now + 0.005);
      bodyG.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
      body.connect(bodyG); bodyG.connect(out);
      body.start(now); body.stop(now + 0.18);

      // 3. 湿润撕裂低带（bandpass 340→180Hz 噪声）—— 主"切进肉里"质感
      const bpLow = ctx.createBiquadFilter();
      bpLow.type = 'bandpass';
      bpLow.Q.value = 0.95;
      const bpLowF = 340 * rvSquelch + detune * 0.5;
      bpLow.frequency.setValueAtTime(bpLowF, now);
      bpLow.frequency.exponentialRampToValueAtTime(180, now + 0.10);
      const sqLowG = ctx.createGain();
      // 微延迟 5ms：冲击先出，撕裂感跟上，整体不发"咔"
      sqLowG.gain.setValueAtTime(0, now);
      sqLowG.gain.setValueAtTime(0, now + 0.005);
      sqLowG.gain.linearRampToValueAtTime(gain * 0.55, now + 0.012);
      sqLowG.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      const sqLowNs = noiseSource(now, 0.17);
      sqLowNs.connect(bpLow); bpLow.connect(sqLowG); sqLowG.connect(out);

      // 4. 中频"shrrr"拉撕尾（bandpass 850→430Hz）—— 给湿润扩散感
      const bpMid = ctx.createBiquadFilter();
      bpMid.type = 'bandpass';
      bpMid.Q.value = 0.85;
      bpMid.frequency.setValueAtTime(880 * rvSquelch, now);
      bpMid.frequency.exponentialRampToValueAtTime(420, now + 0.10);
      const sqMidG = ctx.createGain();
      sqMidG.gain.setValueAtTime(0, now);
      sqMidG.gain.setValueAtTime(0, now + 0.012);
      sqMidG.gain.linearRampToValueAtTime(gain * 0.34, now + 0.022);
      sqMidG.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      const sqMidNs = noiseSource(now, 0.16);
      sqMidNs.connect(bpMid); bpMid.connect(sqMidG); sqMidG.connect(out);

      // 5. 刀刃高频咬合（highpass>2800Hz 极短）—— 清脆"咬住"
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 2800 + Math.max(0, detune) * 3.0;
      hp.Q.value = 0.45;
      const tickG = ctx.createGain();
      tickG.gain.setValueAtTime(0, now);
      tickG.gain.linearRampToValueAtTime(gain * 0.38, now + 0.002);
      tickG.gain.exponentialRampToValueAtTime(0.001, now + 0.030);
      const tickNs = noiseSource(now, 0.045);
      tickNs.connect(hp); hp.connect(tickG); tickG.connect(out);
    }

    function whoosh(opts) {
      const now = ctx.currentTime;
      const gain = (opts.gain != null) ? opts.gain : 0.26;
      const out = buildOut(opts.pan || 0);

      // 低位 highpass + 中频 bandpass：模拟刀划风声，避开蚊子嗡的 4-6kHz 带
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 850;
      hp.Q.value = 0.3;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.Q.value = 1.0;
      bp.frequency.setValueAtTime(1250, now);
      bp.frequency.exponentialRampToValueAtTime(2700, now + 0.085);
      bp.frequency.exponentialRampToValueAtTime(1450, now + 0.19);

      const g = ctx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(gain, now + 0.018);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

      const ns = noiseSource(now, 0.24);
      ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(out);
    }

    function bomb(opts) {
      opts = opts || {};
      const now = ctx.currentTime;
      const gain = (opts.gain != null) ? opts.gain : 0.85;
      const out = buildOut(0);

      // 初始 pop
      const pop = ctx.createOscillator();
      pop.type = 'square';
      pop.frequency.setValueAtTime(90, now);
      pop.frequency.exponentialRampToValueAtTime(35, now + 0.05);
      const popG = ctx.createGain();
      popG.gain.setValueAtTime(0, now);
      popG.gain.linearRampToValueAtTime(gain * 0.55, now + 0.003);
      popG.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
      pop.connect(popG); popG.connect(out);
      pop.start(now); pop.stop(now + 0.09);

      // 低音下行（saw + lowpass）
      const bass = ctx.createOscillator();
      bass.type = 'sawtooth';
      bass.frequency.setValueAtTime(180, now);
      bass.frequency.exponentialRampToValueAtTime(40, now + 0.35);
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(900, now);
      lp.frequency.exponentialRampToValueAtTime(120, now + 0.3);
      const bassG = ctx.createGain();
      bassG.gain.setValueAtTime(0, now);
      bassG.gain.linearRampToValueAtTime(gain * 0.6, now + 0.012);
      bassG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      bass.connect(lp); lp.connect(bassG); bassG.connect(out);
      bass.start(now); bass.stop(now + 0.55);

      // 噪声尾（残响感）
      const nlp = ctx.createBiquadFilter();
      nlp.type = 'lowpass';
      nlp.frequency.value = 600;
      const nG = ctx.createGain();
      nG.gain.setValueAtTime(0, now);
      nG.gain.linearRampToValueAtTime(gain * 0.5, now + 0.02);
      nG.gain.exponentialRampToValueAtTime(0.001, now + 0.65);
      const ns = noiseSource(now, 0.7);
      ns.connect(nlp); nlp.connect(nG); nG.connect(out);
    }

    function play(name, opts) {
      if (muted || !unlocked || !ctx) return;
      if (ctx.state !== 'running') return;
      try {
        if (name === 'chop') chop(opts || {});
        else if (name === 'bomb') bomb(opts || {});
        else if (name === 'whoosh') whoosh(opts || {});
      } catch (e) {
        // 静默：音频失败不影响游戏
      }
    }

    function setMuted(m) {
      muted = !!m;
      try { localStorage.setItem('fn:mute', muted ? '1' : '0'); } catch (e) {}
      if (master) master.gain.value = muted ? 0 : 0.65;
    }
    function isMuted() { return muted; }
    function suspend() { if (ctx && ctx.state === 'running') { try { ctx.suspend(); } catch (e) {} } }
    function resume() { if (ctx && ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} } }

    return { unlock, play, setMuted, isMuted, suspend, resume };
  })();

  // ============ 资产加载 ============
  const sprites = {};
  function loadSprite(name, src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => { sprites[name] = img; resolve(); };
      img.onerror = () => { console.warn('[fn] failed to load sprite:', name); resolve(); };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(src);
    });
  }
  function preloadSprites() {
    return Promise.all(Object.keys(SVG).map(k => loadSprite(k, SVG[k])));
  }

  // ============ DOM ============
  const canvas = document.getElementById('fn-canvas');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('game-stage');
  const belowStage = document.getElementById('below-stage');
  const modeBar = document.querySelector('.fn-mode-bar');
  const modeDescEl = document.getElementById('fn-mode-desc');
  const modeTabs = Array.from(document.querySelectorAll('.fn-mode-tab'));
  const MODE_INFO = {
    classic:   { name: '经典 60 秒',  desc: '限时 60 秒，连切水果加奖励分。切到炸弹立即结束。' },
    arcade:    { name: '街机三命',    desc: '无时限，但漏切 3 个或切到炸弹就 game over。' },
    endless:   { name: '无尽闯关',    desc: '每 25 秒升 1 阶，难度无上限。3 命；过 5 / 10 / 15 阶各回 1 命。' },
    zen:       { name: '禅意无炸弹',  desc: '无失败、无炸弹、纯练连击。比谁单局连击最高。' },
    comborush: { name: '连击狂飙',    desc: '90 秒。连击只在切到炸弹 / 漏切时重置。combo² × 10 计分，10+ 触发火焰刀痕。' },
    precision: { name: '精准模式',    desc: '水果上方有切线提示，沿提示角度（误差 < 20°）切中给 ×3 奖励。水果数减半，每刀都关键。' },
  };
  function setActiveModeTab(mode) {
    for (const t of modeTabs) t.classList.toggle('active', t.dataset.mode === mode);
    const info = MODE_INFO[mode];
    if (modeDescEl && info) modeDescEl.textContent = info.desc;
  }
  const pausedOverlay = document.getElementById('paused-overlay');
  const gameoverOverlay = document.getElementById('gameover-overlay');
  const hudTimer = document.querySelector('.hud-timer');
  const hudLives = document.querySelector('.hud-lives');
  const hudStage = document.querySelector('.hud-stage');
  const hudCombo = document.querySelector('.hud-combo');
  const bind = {};
  document.querySelectorAll('[data-bind]').forEach(el => {
    bind[el.dataset.bind] = el;
  });
  const rankRow = document.getElementById('rank-row');
  const muteBtn = document.getElementById('mute-btn');

  // ============ Logical canvas size ============
  // portrait 2:3，手机利用更多屏幕高度；桌面 max-width 600
  const LOG_W = 540, LOG_H = 810;
  // DPR cap 到 2：iPhone 默认 3 会让 backing buffer 像素 ×2.25，
  // 每帧 fill / drawImage 慢得多，限制 2 帧率明显回升
  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(LOG_W * dpr);
    canvas.height = Math.round(LOG_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    bakeBackground();
  }

  // ============ 背景系统 ============
  // 静态层一次性烘焙到 bgOffscreen；动画层每帧 draw（樱花飘落 / 月光波动 等）
  // 4 个主题：竹林 / 月夜 / 极简 / 霓虹(legacy)；右上 "🎨" 按钮循环切换；localStorage 持久化
  let bgOffscreen = null;
  const Bg = {
    options: ['bamboo', 'moonlit', 'minimal', 'neon'],
    labels: { bamboo: '竹林', moonlit: '月夜', minimal: '极简', neon: '霓虹' },
    chars:  { bamboo: '竹',   moonlit: '月',   minimal: '简',   neon: '虹' },
    current: 'bamboo',
    init() {
      try {
        const saved = localStorage.getItem('fn:bg');
        if (saved && this.options.indexOf(saved) >= 0) this.current = saved;
      } catch (e) {}
    },
    cycle() {
      const idx = this.options.indexOf(this.current);
      this.current = this.options[(idx + 1) % this.options.length];
      try { localStorage.setItem('fn:bg', this.current); } catch (e) {}
      bakeBackground();
    },
    label() { return this.labels[this.current] || this.current; },
  };
  Bg.init();
  const HORIZON_RATIO = 0.52;

  // 果汁印染层：独立 offscreen，每帧 destination-out 微量衰减（~2.5s 后近乎透明）
  // 性能策略：高频率小操作（一帧 destination-out fillRect），不重画所有 stain；
  // 仅在新切割时往上盖一层 splat 形状。Phase 12 会让 'low' 档关停整块（stainsEnabled=false）。
  let stainsCanvas = null;
  let stainsEnabled = true;          // Phase 12 可由 perfTier 翻转
  const JUICE_STAIN_COLOR = {
    apple: '#a01a22', orange: '#c46010',
    watermelon: '#a01a30', kiwi: '#5a8a2a',
  };

  function ensureStainsCanvas() {
    if (!stainsEnabled) return null;
    if (!stainsCanvas) {
      stainsCanvas = document.createElement('canvas');
      stainsCanvas.width = LOG_W;
      stainsCanvas.height = LOG_H;
    }
    return stainsCanvas;
  }
  function clearStains() {
    if (!stainsCanvas) return;
    stainsCanvas.getContext('2d').clearRect(0, 0, LOG_W, LOG_H);
  }
  function fadeStains() {
    if (!stainsCanvas || !stainsEnabled) return;
    const sx = stainsCanvas.getContext('2d');
    sx.save();
    sx.globalCompositeOperation = 'destination-out';
    sx.fillStyle = 'rgba(0,0,0,0.014)';   // 每帧消掉 ~1.4% alpha
    sx.fillRect(0, 0, LOG_W, LOG_H);
    sx.restore();
  }
  function spawnStain(x, y, fruitType) {
    if (!stainsEnabled) return;
    const cv = ensureStainsCanvas();
    if (!cv) return;
    const sx = cv.getContext('2d');
    const color = JUICE_STAIN_COLOR[fruitType] || '#882244';
    sx.save();
    sx.translate(x, y);
    sx.rotate(Math.random() * Math.PI * 2);
    sx.fillStyle = color;
    sx.globalAlpha = 0.5 + Math.random() * 0.22;
    // 不规则 splat：8 个角点扰动半径
    sx.beginPath();
    const baseR = 10 + Math.random() * 8;
    for (let i = 0; i < 9; i++) {
      const a = (i / 9) * Math.PI * 2;
      const r = baseR * (0.55 + Math.random() * 0.75);
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (i === 0) sx.moveTo(px, py);
      else sx.lineTo(px, py);
    }
    sx.closePath();
    sx.fill();
    // 中心高亮点（给"湿润"感）
    sx.globalAlpha *= 0.6;
    sx.beginPath();
    sx.arc(-baseR * 0.15, -baseR * 0.15, baseR * 0.3, 0, Math.PI * 2);
    sx.fillStyle = 'rgba(255,255,255,0.25)';
    sx.fill();
    sx.restore();
  }

  function bakeBackground() {
    if (!bgOffscreen) bgOffscreen = document.createElement('canvas');
    bgOffscreen.width = LOG_W;
    bgOffscreen.height = LOG_H;
    const bx = bgOffscreen.getContext('2d');
    if (Bg.current === 'bamboo') bakeBgBamboo(bx);
    else if (Bg.current === 'moonlit') bakeBgMoonlit(bx);
    else if (Bg.current === 'minimal') bakeBgMinimal(bx);
    else bakeBgNeon(bx);
    // 切换背景时把樱花/萤火虫等动画粒子重置一下
    bgPetals.length = 0;
  }

  // ---------- 竹林 ----------
  // 深绿森林：竹竿（带节）+ 顶部点点光斑（dappled light）+ 简单地面
  function bakeBgBamboo(bx) {
    // 整体背景渐变（深绿）
    const g = bx.createLinearGradient(0, 0, 0, LOG_H);
    g.addColorStop(0, '#0a1c14');
    g.addColorStop(0.5, '#0e2a1c');
    g.addColorStop(1, '#040d08');
    bx.fillStyle = g;
    bx.fillRect(0, 0, LOG_W, LOG_H);

    // 用稳定 seed 让每次烘焙竹林排列一致，但局间会不同（不刷新就一致）
    let seed = 2024;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

    // 竹竿：~9 根，宽 7–14 px，整高贯穿
    const culms = [];
    for (let i = 0; i < 9; i++) {
      const x = 12 + i * (LOG_W - 24) / 8 + (rnd() - 0.5) * 18;
      const w = 7 + rnd() * 7;
      const a = 0.42 + rnd() * 0.32;
      const shade = 0.75 + rnd() * 0.35;
      culms.push({ x, w, a, shade, phase: rnd() * 90 });
    }
    for (const c of culms) {
      const cg = bx.createLinearGradient(c.x, 0, c.x + c.w, 0);
      cg.addColorStop(0, 'rgba(' + Math.floor(40*c.shade) + ',' + Math.floor(80*c.shade) + ',38,' + c.a + ')');
      cg.addColorStop(0.32, 'rgba(' + Math.floor(80*c.shade) + ',' + Math.floor(150*c.shade) + ',70,' + c.a + ')');
      cg.addColorStop(0.62, 'rgba(' + Math.floor(60*c.shade) + ',' + Math.floor(120*c.shade) + ',55,' + c.a + ')');
      cg.addColorStop(1, 'rgba(' + Math.floor(28*c.shade) + ',' + Math.floor(70*c.shade) + ',32,' + c.a + ')');
      bx.fillStyle = cg;
      bx.fillRect(c.x, 0, c.w, LOG_H);
      // 节（竹竿上的横向环）
      const spacing = 95 + (c.phase % 30);
      for (let y = c.phase; y < LOG_H; y += spacing) {
        bx.fillStyle = 'rgba(18, 42, 22, ' + (c.a * 0.85).toFixed(3) + ')';
        bx.fillRect(c.x - 1, y, c.w + 2, 2.4);
        bx.fillStyle = 'rgba(150, 200, 120, ' + (c.a * 0.55).toFixed(3) + ')';
        bx.fillRect(c.x + 0.5, y + 2.4, c.w - 1, 0.9);
      }
    }
    // 散落的光斑 dappled light
    for (let i = 0; i < 12; i++) {
      const sx = rnd() * LOG_W;
      const sy = rnd() * LOG_H * 0.55;
      const r = 30 + rnd() * 28;
      const lg = bx.createRadialGradient(sx, sy, 0, sx, sy, r);
      lg.addColorStop(0, 'rgba(255, 240, 180, 0.10)');
      lg.addColorStop(1, 'rgba(255, 240, 180, 0)');
      bx.fillStyle = lg;
      bx.beginPath();
      bx.arc(sx, sy, r, 0, Math.PI * 2);
      bx.fill();
    }
  }

  // ---------- 月夜 ----------
  // 深蓝夜空 + 大月亮 + 星点 + 山脊 silhouette + (动画) 樱花飘落
  function bakeBgMoonlit(bx) {
    const g = bx.createLinearGradient(0, 0, 0, LOG_H);
    g.addColorStop(0, '#040820');
    g.addColorStop(0.55, '#0a1230');
    g.addColorStop(1, '#020410');
    bx.fillStyle = g;
    bx.fillRect(0, 0, LOG_W, LOG_H);

    // 月亮 halo
    const mx = LOG_W * 0.72;
    const my = LOG_H * 0.20;
    const mr = 64;
    const halo = bx.createRadialGradient(mx, my, 0, mx, my, mr * 2.4);
    halo.addColorStop(0, 'rgba(255, 240, 200, 0)');
    halo.addColorStop(0.45, 'rgba(255, 230, 180, 0.14)');
    halo.addColorStop(1, 'rgba(255, 230, 180, 0)');
    bx.fillStyle = halo;
    bx.fillRect(0, 0, LOG_W, LOG_H);

    // 月亮本体
    const moon = bx.createRadialGradient(mx - 10, my - 10, 2, mx, my, mr);
    moon.addColorStop(0, '#fffaee');
    moon.addColorStop(0.7, '#fff0c8');
    moon.addColorStop(1, '#fadca0');
    bx.fillStyle = moon;
    bx.beginPath();
    bx.arc(mx, my, mr, 0, Math.PI * 2);
    bx.fill();
    // 月坑
    bx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    [[16, -12, 5], [-20, 4, 7], [4, 22, 4], [22, 14, 3.5], [-10, -18, 3]].forEach(([dx, dy, cr]) => {
      bx.beginPath();
      bx.arc(mx + dx, my + dy, cr, 0, Math.PI * 2);
      bx.fill();
    });

    // 星点
    let s = 9001;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    bx.fillStyle = '#ffffff';
    for (let i = 0; i < 80; i++) {
      const sx = rnd() * LOG_W;
      const sy = rnd() * LOG_H * 0.55;
      const sr = 0.4 + rnd() * 1.3;
      // 避开月亮本体区域
      if (Math.hypot(sx - mx, sy - my) < mr + 8) continue;
      bx.globalAlpha = 0.3 + rnd() * 0.6;
      bx.beginPath();
      bx.arc(sx, sy, sr, 0, Math.PI * 2);
      bx.fill();
    }
    bx.globalAlpha = 1;

    // 远山 silhouette
    bx.fillStyle = '#020613';
    bx.beginPath();
    bx.moveTo(0, LOG_H);
    bx.lineTo(0, LOG_H * 0.80);
    bx.lineTo(LOG_W * 0.18, LOG_H * 0.70);
    bx.lineTo(LOG_W * 0.35, LOG_H * 0.78);
    bx.lineTo(LOG_W * 0.5, LOG_H * 0.64);
    bx.lineTo(LOG_W * 0.65, LOG_H * 0.74);
    bx.lineTo(LOG_W * 0.82, LOG_H * 0.68);
    bx.lineTo(LOG_W, LOG_H * 0.78);
    bx.lineTo(LOG_W, LOG_H);
    bx.closePath();
    bx.fill();
  }

  // ---------- 极简 ----------
  // 单色深底 + vignette；连击 / 切水果时 the action is the star，没干扰
  function bakeBgMinimal(bx) {
    bx.fillStyle = '#0a0e14';
    bx.fillRect(0, 0, LOG_W, LOG_H);
    const v = bx.createRadialGradient(LOG_W / 2, LOG_H / 2, LOG_W * 0.3, LOG_W / 2, LOG_H / 2, LOG_W * 0.78);
    v.addColorStop(0, 'rgba(0, 0, 0, 0)');
    v.addColorStop(1, 'rgba(0, 0, 0, 0.55)');
    bx.fillStyle = v;
    bx.fillRect(0, 0, LOG_W, LOG_H);
    // 极淡的水平参考线
    bx.fillStyle = 'rgba(255, 255, 255, 0.04)';
    bx.fillRect(0, LOG_H * 0.62, LOG_W, 1);
  }

  // ---------- 霓虹（legacy 蒸汽波）----------
  function bakeBgNeon(bx) {
    const horizonY = LOG_H * HORIZON_RATIO;
    const skyGrad = bx.createLinearGradient(0, 0, 0, horizonY);
    skyGrad.addColorStop(0, '#06010f');
    skyGrad.addColorStop(0.55, '#1a0838');
    skyGrad.addColorStop(1, '#3a0e5e');
    bx.fillStyle = skyGrad;
    bx.fillRect(0, 0, LOG_W, horizonY);
    const sunCx = LOG_W / 2;
    const sunCy = horizonY - 18;
    const sunR = 120;
    const sunGrad = bx.createRadialGradient(sunCx, sunCy, 6, sunCx, sunCy, sunR);
    sunGrad.addColorStop(0, '#fff8c4');
    sunGrad.addColorStop(0.28, '#ffc070');
    sunGrad.addColorStop(0.55, '#ff4ea8');
    sunGrad.addColorStop(1, 'rgba(120, 20, 90, 0)');
    bx.fillStyle = sunGrad;
    bx.beginPath();
    bx.arc(sunCx, sunCy, sunR, 0, Math.PI * 2);
    bx.fill();
    bx.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < 7; i++) {
      const sy = sunCy + 28 + i * 10;
      const sh = 3 + i * 0.7;
      if (sy + sh > horizonY) break;
      bx.fillRect(sunCx - sunR, sy, sunR * 2, sh);
    }
    bx.globalCompositeOperation = 'source-over';
    const floorGrad = bx.createLinearGradient(0, horizonY, 0, LOG_H);
    floorGrad.addColorStop(0, '#0c031e');
    floorGrad.addColorStop(1, '#02000a');
    bx.fillStyle = floorGrad;
    bx.fillRect(0, horizonY, LOG_W, LOG_H - horizonY);
    const glowGrad = bx.createLinearGradient(0, horizonY - 10, 0, horizonY + 10);
    glowGrad.addColorStop(0, 'rgba(0, 220, 255, 0)');
    glowGrad.addColorStop(0.5, 'rgba(0, 220, 255, 0.42)');
    glowGrad.addColorStop(1, 'rgba(0, 220, 255, 0)');
    bx.fillStyle = glowGrad;
    bx.fillRect(0, horizonY - 10, LOG_W, 20);
    bx.strokeStyle = 'rgba(120, 250, 255, 0.95)';
    bx.lineWidth = 1.5;
    bx.beginPath();
    bx.moveTo(0, horizonY);
    bx.lineTo(LOG_W, horizonY);
    bx.stroke();
    bx.fillStyle = '#ffffff';
    let s = 7777;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    for (let i = 0; i < 22; i++) {
      const sx = rnd() * LOG_W;
      const sy = rnd() * horizonY * 0.75;
      const sr = rnd() * 1.2 + 0.3;
      bx.globalAlpha = 0.35 + rnd() * 0.5;
      bx.beginPath();
      bx.arc(sx, sy, sr, 0, Math.PI * 2);
      bx.fill();
    }
    bx.globalAlpha = 1;
  }

  // ---------- 动画层（dispatcher）----------
  const bgPetals = [];
  function ensureMoonPetals() {
    if (bgPetals.length > 0) return;
    for (let i = 0; i < 14; i++) {
      bgPetals.push({
        x: Math.random() * LOG_W,
        y: Math.random() * LOG_H,
        vy: 18 + Math.random() * 14,
        vx: -10 + Math.random() * 20,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.8,
        sz: 3.4 + Math.random() * 2.6,
      });
    }
  }
  function drawMoonPetals(dtSec) {
    ensureMoonPetals();
    ctx.save();
    for (const p of bgPetals) {
      p.x += p.vx * dtSec;
      p.y += p.vy * dtSec;
      p.rot += p.vrot * dtSec;
      if (p.y > LOG_H + 16) { p.y = -10; p.x = Math.random() * LOG_W; }
      if (p.x < -20) p.x = LOG_W + 10;
      if (p.x > LOG_W + 20) p.x = -10;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = 'rgba(255, 200, 220, 0.65)';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.sz * 0.5, p.sz, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
  function drawNeonGrid(gameTimeMs) {
    const horizonY = LOG_H * HORIZON_RATIO;
    const floorBottom = LOG_H;
    const numHoriz = 14;
    const scroll = ((gameTimeMs * 0.00018) % 1 + 1) % 1;
    ctx.save();
    for (let i = 0; i < numHoriz; i++) {
      const t = ((i + scroll) / numHoriz) % 1;
      const yT = Math.pow(t, 2.4);
      const y = horizonY + (floorBottom - horizonY) * yT;
      const alpha = 0.16 + 0.55 * yT;
      const isAccent = (Math.floor(i + scroll) % 4 === 0);
      ctx.strokeStyle = isAccent
        ? 'rgba(255, 90, 200, ' + alpha.toFixed(3) + ')'
        : 'rgba(0, 220, 255, ' + alpha.toFixed(3) + ')';
      ctx.lineWidth = isAccent ? 1.6 : 1.0;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(LOG_W, y);
      ctx.stroke();
    }
    const vanishX = LOG_W / 2;
    const verts = 13;
    ctx.lineWidth = 0.9;
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.28)';
    for (let i = 0; i <= verts; i++) {
      const tX = i / verts;
      const xBottom = -LOG_W * 0.4 + tX * (LOG_W * 1.8);
      ctx.beginPath();
      ctx.moveTo(vanishX, horizonY);
      ctx.lineTo(xBottom, floorBottom);
      ctx.stroke();
    }
    ctx.restore();
  }

  const Perf = {

    autoTier: 'high',

    init() {
      if (reducedMotion) {
        this.autoTier = 'med';

    },

    tick(dtWallMs) {
      if (dtWallMs <= 0 || dtWallMs > 200) return;

      if (this.manual) return;
      if (this.fpsEma < 48) {
        this.badStreakMs += dtWallMs;
        if (this.badStreakMs > 2000) {

          if (next !== this.autoTier) {
            this.autoTier = next;
            this.tier = next;

      } else if (this.tier === 'med') {

  // ============ 屏幕震动 ============
  const shake = { x: 0, y: 0, startWall: 0, until: 0, strength: 0, durMs: 0 };
  function triggerShake(strength, ms) {
    if (reducedMotion) return;
    if (Perf.tier === 'low') return;
    const wall = performance.now();
    // 已有震动且更强时不打断；新震动更强则覆盖
    if (wall >= shake.until || strength * (1 - (wall - shake.startWall) / shake.durMs) < strength) {
      shake.strength = strength;
      shake.startWall = wall;
      shake.until = wall + ms;
      shake.durMs = ms;
    }
  }
  function updateShake() {
    const wall = performance.now();
    if (wall >= shake.until) { shake.x = 0; shake.y = 0; return; }
    const t = (wall - shake.startWall) / shake.durMs;     // 0..1
    const k = 1 - t;
    const amp = shake.strength * k * k;
    shake.x = (Math.random() - 0.5) * 2 * amp;
    shake.y = (Math.random() - 0.5) * 2 * amp;
  }

  // ============ 冲击波环 ============
  function spawnShockwave(x, y, opts) {
    opts = opts || {};

      x, y,
      r0: opts.r0 || 22,
      rMax: opts.rMax || 220,
      life: opts.life || 0.45,
      age: 0,
      colorRGB: opts.colorRGB || '255, 90, 110',
      lineWidth: opts.lineWidth || 4.5,

  function drawShockwaves() {
    if (!shockwaves.length) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const w of shockwaves) {
      const t = Math.min(1, w.age / w.life);
      const r = w.r0 + (w.rMax - w.r0) * t;
      const inv = 1 - t;

      // 1. 内部很淡的 radial gradient 烟雾（仅前 40% 寿命）
      if (t < 0.4) {
        const fillT = t / 0.4;
        const fillAlpha = (1 - fillT * fillT) * 0.22;
        const g = ctx.createRadialGradient(w.x, w.y, r * 0.35, w.x, w.y, r);
        g.addColorStop(0, 'rgba(' + w.colorRGB + ', 0)');
        g.addColorStop(1, 'rgba(' + w.colorRGB + ', ' + fillAlpha.toFixed(3) + ')');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(w.x, w.y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.strokeStyle = 'rgba(' + w.colorRGB + ', ' + (inv * inv * 0.7).toFixed(3) + ')';
      ctx.lineWidth = w.lineWidth * 0.7 * (1 - t * 0.45);
      ctx.beginPath();
      ctx.arc(w.x, w.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();

  // wall-clock 只在 RAF 取 dt 和音频调度时使用。
  const Time = {
    game: 0,         // 累积游戏时间（ms），受暂停/冻结/scale 控制
    wall: 0,         // 最近一帧的 performance.now()
    scale: 1.0,      // 时间缩放（slow-mo 时 < 1）

    if (state.paused || performance.now() < Time.frozenUntil || !Time.wall) return Time.game;
    const d = Math.min(performance.now() - Time.wall, 100);
    return Time.game + d * Time.scale;
  }
