<style>
  .fn-wrap { max-width: 760px; margin: 0 auto; padding: 1rem; }
  .fn-wrap header { text-align: center; margin-bottom: 1rem; }
  .fn-wrap header h1 { font-size: 2rem; color: var(--color-ink); margin-bottom: 0.3rem; }
  .fn-wrap header .sub { color: var(--color-light); font-style: italic; font-size: 0.92rem; }

  .fn-stage-wrap { position: relative; }
  #fn-canvas {
    display: block;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 4 / 3;
    margin: 0 auto;
    background: linear-gradient(180deg, #2a3a52 0%, #1a2436 100%);
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    cursor: crosshair;
    touch-action: none;
  }

  .hud {
    position: absolute;
    top: 0.6rem;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0.9rem;
    pointer-events: none;
    color: #fff;
    font-family: var(--font-display, Georgia, serif);
    font-size: 1.05rem;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }
  .hud-left, .hud-right { display: flex; gap: 0.9rem; align-items: center; }
  .hud .label { font-size: 0.7rem; color: rgba(255, 255, 255, 0.65); margin-right: 0.2rem; }
  .hud .lives { letter-spacing: 0.15em; }
  .hud .combo { color: #ffd95a; }
  .hud .combo.hidden { visibility: hidden; }

  .pause-btn {
    position: absolute;
    top: 0.6rem;
    right: 50%;
    transform: translateX(50%);
    background: rgba(0, 0, 0, 0.4);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    font-size: 0.82rem;
    cursor: pointer;
    pointer-events: auto;
  }
  .pause-btn:hover { background: rgba(0, 0, 0, 0.6); }

  .mode-select {
    text-align: center;
    padding: 1.5rem 0;
  }
  .mode-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    max-width: 640px;
    margin: 0 auto 1rem;
  }
  .mode-card {
    background: var(--color-bg-warm);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.1rem 0.9rem;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
  }
  .mode-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    border-color: var(--color-accent);
  }
  .mode-card .mc-emoji { font-size: 1.6rem; margin-bottom: 0.4rem; }
  .mode-card .mc-name { font-size: 1.05rem; color: var(--color-ink); font-weight: 600; margin-bottom: 0.2rem; }
  .mode-card .mc-desc { font-size: 0.82rem; color: var(--color-muted); line-height: 1.5; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    color: #fff;
    text-align: center;
    z-index: 5;
    backdrop-filter: blur(2px);
  }
  .overlay-card {
    background: rgba(20, 24, 32, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    padding: 1.5rem 1.8rem;
    max-width: 80%;
  }
  .overlay-card h2 { font-size: 1.6rem; margin-bottom: 0.4rem; }
  .overlay-card .ov-stats { color: rgba(255, 255, 255, 0.75); margin-bottom: 1rem; line-height: 1.7; font-size: 0.95rem; }
  .overlay-card .ov-stats strong { color: #ffd95a; font-size: 1.15rem; }
  .overlay-card button {
    background: var(--color-accent);
    color: var(--color-ink);
    border: none;
    border-radius: 8px;
    padding: 0.55rem 1.4rem;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
  }
  .overlay-card button + button { margin-left: 0.5rem; background: rgba(255, 255, 255, 0.1); color: #fff; }

  .below-stage {
    margin-top: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .rank-row {
    text-align: center;
    color: var(--color-muted);
    font-size: 0.92rem;
    min-height: 1.4em;
  }
  .rank-row strong { color: var(--color-accent); }
  .rank-row.failed { color: var(--color-light); }

  #settle-btn-mount { display: flex; justify-content: center; }

  .fn-tips {
    text-align: center;
    color: var(--color-muted);
    font-size: 0.85rem;
    margin-top: 0.4rem;
  }

  /* Hidden SVG sprite container */
  .fn-sprites { display: none; }
</style>

    bomb:
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">'
      + '<defs><radialGradient id="bg" cx="35%" cy="35%"><stop offset="0" stop-color="#666"/><stop offset="1" stop-color="#0a0a0a"/></radialGradient></defs>'
      + '<circle cx="40" cy="46" r="28" fill="url(#bg)"/>'
      + '<rect x="38" y="14" width="4" height="6" fill="#3a2a1a"/>'

  const FRUIT_TYPES = ['apple', 'orange', 'watermelon', 'kiwi'];
  const JUICE_COLOR = {
    apple: '#e64545', orange: '#ffaa44',
    watermelon: '#ff5560', kiwi: '#a8d050',
  };

  // ============ 资产加载 ============
  const sprites = {};
  function loadSprite(name, src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => { sprites[name] = img; resolve(); };
      img.onerror = () => { console.warn('[fn] failed to load sprite:', name); resolve(); };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(src);
    });
  }
  function preloadSprites() {
    return Promise.all(Object.keys(SVG).map(k => loadSprite(k, SVG[k])));
  }

  // ============ DOM ============
  const canvas = document.getElementById('fn-canvas');
  const ctx = canvas.getContext('2d');
  const modeSelect = document.getElementById('mode-select');
  const stage = document.getElementById('game-stage');
  const belowStage = document.getElementById('below-stage');
  const pausedOverlay = document.getElementById('paused-overlay');
  const gameoverOverlay = document.getElementById('gameover-overlay');
  const hudTimer = document.querySelector('.hud-timer');
  const hudLives = document.querySelector('.hud-lives');
  const hudCombo = document.querySelector('.hud-combo');
  const bind = {};
  document.querySelectorAll('[data-bind]').forEach(el => {
    bind[el.dataset.bind] = el;
  });
  const rankRow = document.getElementById('rank-row');

  // ============ Logical canvas size ============
  const LOG_W = 720, LOG_H = 540;
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(LOG_W * dpr);
    canvas.height = Math.round(LOG_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ============ State ============
  const state = {
    mode: null,             // 'classic' | 'arcade' | 'zen'
    running: false,
    paused: false,
    over: false,
    score: 0,
    combo: 0,
    bestCombo: 0,
    lastSliceAt: 0,
    timeLeft: 60,
    lives: 3,
    runStartedAt: 0,
    runNonce: '',
  };

  let fruits = [];        // active 水果 / 半个水果 / 炸弹
  let particles = [];     // 果汁飞溅
  let trail = [];         // pointer 轨迹

  const GRAVITY = 900;     // px/s²
  const COMBO_TIMEOUT = 900;

  // ============ 输入 ============
  let pointerActive = false;
  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = LOG_W / r.width, sy = LOG_H / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }
  canvas.addEventListener('pointerdown', e => {
    if (!state.running || state.paused || state.over) return;
    pointerActive = true;
    canvas.setPointerCapture(e.pointerId);
    const p = canvasPos(e);
    trail.push({ x: p.x, y: p.y, t: performance.now() });
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', e => {
    if (!pointerActive) return;
    const p = canvasPos(e);
    trail.push({ x: p.x, y: p.y, t: performance.now() });
  });
  function endPointer() { pointerActive = false; }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // ============ 水果生成 ============
  function spawnOne(t) {
    const margin = 80;
    const x = margin + Math.random() * (LOG_W - 2 * margin);
    const targetX = LOG_W / 2 + (Math.random() - 0.5) * (LOG_W * 0.7);
    const dt = 1.2;                                 // 大致到峰顶时间
    const vy = -GRAVITY * dt - 80;                  // 调整使峰高接近顶部
    const vx = (targetX - x) / dt + (Math.random() - 0.5) * 80;
    let type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    if (state.mode !== 'zen' && Math.random() < 0.07) type = 'bomb';
    const r = (type === 'watermelon') ? 38 : (type === 'kiwi') ? 32 : 30;
    fruits.push({
      kind: 'whole', type,
      x, y: LOG_H + r,
      vx, vy,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 6,
      r,
      bornAt: t,
    });
  }

  let nextSpawnAt = 0;
  function scheduleNextSpawn(now) {
    const elapsed = (now - state.runStartedAt) / 1000;
    let interval = 1100 - Math.min(elapsed * 6, 350);     // 难度递增
    if (state.mode === 'zen') interval = Math.max(interval, 800);
    nextSpawnAt = now + interval;
  }

  function maybeSpawn(now) {
    if (now < nextSpawnAt) return;
    const groupSize = 1 + (Math.random() < 0.35 ? 1 : 0) + (Math.random() < 0.12 ? 1 : 0);
    for (let i = 0; i < groupSize; i++) {
      setTimeout(() => {
        if (!state.running || state.paused || state.over) return;
        spawnOne(performance.now());
      }, i * 110);
    }
    scheduleNextSpawn(now);
  }

  // ============ 切片检测 ============
  function segCircleHit(a, b, cx, cy, r) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1) {
      return Math.hypot(a.x - cx, a.y - cy) < r;
    }
    let t = ((cx - a.x) * dx + (cy - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx, py = a.y + t * dy;
    return Math.hypot(px - cx, py - cy) < r;
  }

  function checkSlices() {
    if (trail.length < 2) return;
    const now = performance.now();
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i - 1], b = trail[i];
        if (now - b.t > 220) continue;
        if (segCircleHit(a, b, f.x, f.y, f.r)) {
          const angle = Math.atan2(b.y - a.y, b.x - a.x);
          onSlice(f, angle);
          break;
        }
      }
    }
  }

  function onSlice(f, angle) {
    f.sliced = true;
    if (f.type === 'bomb') {
      bombHit();
      return;
    }
    state.combo += 1;
    if (state.combo > state.bestCombo) state.bestCombo = state.combo;
    const bonus = Math.min(state.combo, 10) * 5;
    state.score += 10 + (state.combo > 1 ? bonus : 0);
    state.lastSliceAt = performance.now();

    spawnHalves(f, angle);
    spawnJuice(f, angle);
    updateHud();
  }

  function spawnHalves(f, angle) {
    const nx = -Math.sin(angle), ny = Math.cos(angle);
    const speed = 280;
    const baseVx = f.vx * 0.4, baseVy = f.vy * 0.4 + 60;
    fruits.push({
      kind: 'half', type: f.type, side: 'l',
      x: f.x, y: f.y,
      vx: baseVx + nx * speed,
      vy: baseVy + ny * speed,
      rot: f.rot, vrot: f.vrot - 2,
      r: f.r,
      cutAngle: angle,
    });
    fruits.push({
      kind: 'half', type: f.type, side: 'r',
      x: f.x, y: f.y,
      vx: baseVx - nx * speed,
      vy: baseVy - ny * speed,
      rot: f.rot, vrot: f.vrot + 2,
      r: f.r,
      cutAngle: angle,
    });
  }

  function spawnJuice(f, angle) {
    const color = JUICE_COLOR[f.type] || '#fff';
    const n = 12;
    for (let i = 0; i < n; i++) {
      const a = angle + (Math.random() - 0.5) * Math.PI;
      const sp = 120 + Math.random() * 220;
      particles.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 80,
        r: 3 + Math.random() * 4,
        color,
        life: 0.8,
        age: 0,
      });
    }
  }

  function bombHit() {
    flashScreen();
    state.combo = 0;
    setTimeout(() => endRun('boom'), 350);
  }

  let flashUntil = 0;
  function flashScreen() { flashUntil = performance.now() + 280; }

  // ============ 物理更新 ============
  let lastTick = 0;
  function update(now) {
    if (!lastTick) lastTick = now;
    const dt = Math.min((now - lastTick) / 1000, 0.05);
    lastTick = now;

    if (state.mode === 'classic') {
      const elapsed = (now - state.runStartedAt) / 1000;
      state.timeLeft = Math.max(0, 60 - elapsed);
      if (state.timeLeft <= 0 && !state.over) {
        endRun('time');
        return;
      }
    }

    for (const f of fruits) {
      f.vy += GRAVITY * dt;
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.rot += f.vrot * dt;
    }

    // 出屏处理
    fruits = fruits.filter(f => {
      if (f.y > LOG_H + 100) {
        if (f.kind === 'whole' && !f.sliced && f.type !== 'bomb') {
          onMissed(f);
        }
        return false;
      }
      if (f.x < -120 || f.x > LOG_W + 120) return false;
      return true;
    });

    for (const p of particles) {
      p.vy += GRAVITY * 0.6 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.age += dt;
    }
    particles = particles.filter(p => p.age < p.life);

    // 连击衰减
    if (state.combo > 0 && now - state.lastSliceAt > COMBO_TIMEOUT) {
      state.combo = 0;
      updateHud();
    }

    // trail 老化
    while (trail.length > 0 && now - trail[0].t > 220) trail.shift();
    if (trail.length > 14) trail.splice(0, trail.length - 14);

    checkSlices();
    maybeSpawn(now);
  }

  function onMissed(f) {
    if (state.mode !== 'arcade') return;
    state.lives -= 1;
    state.combo = 0;
    flashScreen();
    updateHud();
    if (state.lives <= 0) endRun('lives');
  }

  // ============ 渲染 ============
  function drawFruit(f) {
    let img;
    if (f.kind === 'whole') {
      img = sprites[f.type === 'bomb' ? 'bomb' : (f.type + '_whole')];
    } else {
      img = sprites[f.type + '_half'];
    }
    if (!img) return;
    const size = f.r * 2.4;     // SVG viewBox 是 80, 内容半径 ~30, 留些空间
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    if (f.kind === 'half' && f.side === 'r') ctx.scale(-1, 1);
    ctx.drawImage(img, -size / 2, -size / 2, size, size);
    ctx.restore();
  }

  function drawTrail() {
    if (trail.length < 2) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const now = performance.now();
    for (let i = 1; i < trail.length; i++) {
      const a = trail[i - 1], b = trail[i];
      const age = (now - b.t) / 220;
      const alpha = Math.max(0, 1 - age);
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alpha * 0.85).toFixed(3) + ')';
      ctx.lineWidth = 2 + alpha * 7;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0, 1 - p.age / p.life);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 - p.age / p.life * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    // 背景
    const grad = ctx.createLinearGradient(0, 0, 0, LOG_H);
    grad.addColorStop(0, '#2a3a52');
    grad.addColorStop(1, '#1a2436');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, LOG_W, LOG_H);

    // 装饰：星点
    if (!render._stars) {
      render._stars = [];
      for (let i = 0; i < 30; i++) {
        render._stars.push({
          x: Math.random() * LOG_W,
          y: Math.random() * LOG_H * 0.7,
          r: Math.random() * 1.4 + 0.3,
          a: 0.3 + Math.random() * 0.4,
        });
      }
    }
    ctx.fillStyle = '#fff';
    for (const s of render._stars) {
      ctx.globalAlpha = s.a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 水果
    for (const f of fruits) drawFruit(f);
    drawParticles();
    drawTrail();

    // 闪屏
    const now = performance.now();
    if (now < flashUntil) {
      const a = (flashUntil - now) / 280;
      ctx.fillStyle = 'rgba(255, 80, 80, ' + (a * 0.5).toFixed(3) + ')';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }
  }

  // ============ HUD ============
  function updateHud() {
    bind.score.textContent = String(Math.round(state.score));
    if (state.combo >= 2) {
      hudCombo.classList.remove('hidden');
      bind.combo.textContent = String(state.combo);
    } else {
      hudCombo.classList.add('hidden');
    }
    if (state.mode === 'classic') {
      bind.timer.textContent = state.timeLeft.toFixed(1);
    }
    if (state.mode === 'arcade') {
      bind.lives.textContent = '❤'.repeat(state.lives) + '🤍'.repeat(Math.max(0, 3 - state.lives));
    }
  }

  // ============ 主循环 ============
  let rafId = 0;
  function loop(now) {
    if (state.over || !state.running) return;
    if (!state.paused) {
      update(now);
      render();
      updateHud();
    }
    rafId = requestAnimationFrame(loop);
  }

  // ============ 模式 / 流程 ============
  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => startGame(card.dataset.mode));
  });

  function startGame(mode) {
    state.mode = mode;
    state.running = true;
    state.paused = false;
    state.over = false;
    state.score = 0;
    state.combo = 0;
    state.bestCombo = 0;
    state.lastSliceAt = 0;
    state.timeLeft = 60;
    state.lives = 3;
    state.runStartedAt = performance.now();
    state.runNonce = (window.GamesShell && GamesShell.Identity) ? GamesShell.Identity.newRunNonce() : ('r-' + Date.now());
    fruits = [];
    particles = [];
    trail = [];
    lastTick = 0;
    render._stars = null;        // 重新生成星点
    nextSpawnAt = state.runStartedAt + 600;

    modeSelect.hidden = true;
    stage.hidden = false;
    belowStage.hidden = true;
    gameoverOverlay.hidden = true;
    pausedOverlay.hidden = true;

    hudTimer.hidden = mode !== 'classic';
    hudLives.hidden = mode !== 'arcade';
    bind.score.textContent = '0';
    bind.timer.textContent = '60.0';
    bind.lives.textContent = '❤❤❤';
    hudCombo.classList.add('hidden');

    pendingSubmit = false;
    resetRank();

    preloadSprites().then(() => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
  }

  function endRun(reason) {
    if (state.over) return;
    state.over = true;
    state.running = false;
    cancelAnimationFrame(rafId);

    let title = '时间到';
    if (reason === 'boom') title = '炸弹被切到了！';
    else if (reason === 'lives') title = '漏切太多';
    else if (reason === 'manual') title = '本局结束';

    const lines = [];
    lines.push(state.mode === 'zen'
      ? `<strong>最高连击 ${state.bestCombo}</strong>`
      : `<strong>${Math.round(state.score)} 分</strong>`);
    if (state.mode !== 'zen') {
      lines.push(`最高连击 ${state.bestCombo} · 用时 ${((performance.now() - state.runStartedAt)/1000).toFixed(0)}s`);
    } else {
      lines.push(`累计得分 ${Math.round(state.score)}`);
    }

    bind['go-title'].textContent = title;
    bind['go-stats'].innerHTML = lines.join('<br>');

    if (state.mode === 'zen' && reason !== 'manual') {
      // 禅意只有手动结束
      gameoverOverlay.hidden = true;
    } else {
      gameoverOverlay.hidden = false;
    }
    belowStage.hidden = false;

    // 排行榜：切到当前模式 tab
    if (lbWidget) lbWidget.setSplit(state.mode);

    tryAutoSubmit();
    if (settleBtn) settleBtn.setEnabled(true);

    // 1.5 秒后清空残余水果
    setTimeout(() => {
      if (state.over) {
        fruits = [];
        particles = [];
        render();
      }
    }, 1500);
  }

  // ============ 暂停 ============
  document.getElementById('pause-btn').addEventListener('click', () => {
    if (state.over || !state.running) return;
    state.paused = true;
    pausedOverlay.hidden = false;
  });
  document.getElementById('resume-btn').addEventListener('click', () => {
    state.paused = false;
    pausedOverlay.hidden = true;
    lastTick = 0;
    rafId = requestAnimationFrame(loop);
  });
  document.getElementById('quit-btn').addEventListener('click', () => {
    if (confirm('退出当前局？分数会保留并尝试上传')) {
      pausedOverlay.hidden = true;
      endRun('manual');
    }
  });
  document.getElementById('restart-btn').addEventListener('click', () => {
    startGame(state.mode);
  });
  document.getElementById('changemode-btn').addEventListener('click', () => {
    state.over = true;
    state.running = false;
    stage.hidden = true;
    modeSelect.hidden = false;
    belowStage.hidden = true;
    fruits = []; particles = []; trail = [];
    cancelAnimationFrame(rafId);
    render();
  });

  // ============ Visibility：自动暂停 ============
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.running && !state.over && !state.paused) {
      state.paused = true;
      pausedOverlay.hidden = false;
    }
  });

  // ============ 排行榜 / 评论 / 结算 接入 ============
  let lbWidget = null;
  let nickPrompt = null;
  let settleBtn = null;
  let pendingSubmit = false;
  let lastRankInfo = null;

  function modeLabel(m) {
    return m === 'classic' ? '经典 60s' : m === 'arcade' ? '街机三命' : '禅意';
  }

  function getSubmitScore() {
    if (state.mode === 'zen') return state.bestCombo * 100;
    return Math.round(state.score);
  }
  function fmtScore(v) {
    return Number(v).toLocaleString();
  }

  function setRank(name, data) {
    if (name === 'hidden') {
      rankRow.classList.remove('failed');
      rankRow.innerHTML = '';
      lastRankInfo = null;
      return;
    }
    rankRow.classList.remove('failed');
    if (name === 'loading') {
      rankRow.textContent = '排名上传中…';
      lastRankInfo = { mode: modeLabel(state.mode) };
    } else if (name === 'failed') {
      rankRow.classList.add('failed');
      rankRow.textContent = '排行榜暂时不可用（不影响游戏）';
      lastRankInfo = { failed: true, mode: modeLabel(state.mode) };
    } else if (name === 'pending') {
      rankRow.classList.add('failed');
      rankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
      lastRankInfo = { pending: true, mode: modeLabel(state.mode) };
    } else if (name === 'success' && data && data.rank && data.total) {
      rankRow.innerHTML = '';
      rankRow.append(
        document.createTextNode(modeLabel(state.mode) + ' · 第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
      lastRankInfo = { rank: data.rank, total: data.total, mode: modeLabel(state.mode) };
    }
  }
  function resetRank() { setRank('hidden'); }

  async function submitWithNick(nick) {
    if (!nick || pendingSubmit) return;
    const score = getSubmitScore();
    if (score <= 0) { setRank('hidden'); return; }
    pendingSubmit = true;
    setRank('loading');
    const r = await GamesShell.Leaderboard.submit({
      gameId: 'fruit-ninja',
      nick,
      score,
      durationMs: Math.max(3000, Math.round(performance.now() - state.runStartedAt)),
      clientNonce: state.runNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra: { mode: state.mode, bestCombo: state.bestCombo },
    });
    if (r && r.ok) {
      setRank('success', { rank: r.rank, total: r.total });
      if (lbWidget) lbWidget.refresh();
      return;
    }
    pendingSubmit = false;
    if (r && r.reason === 'nick_taken') {
      GamesShell.Identity.clearNick();
      alert('"' + nick + '" 已被别的玩家占用，请换一个昵称');
      setRank('pending');
      if (nickPrompt) { nickPrompt.refresh(); nickPrompt.show(); }
      return;
    }
    setRank('failed');
    if (r && r.reason) console.warn('[fruit-ninja] submit rejected:', r.reason);
  }

  function tryAutoSubmit() {
    if (getSubmitScore() <= 0) { setRank('hidden'); return; }
    const nick = GamesShell.Identity.getNick();
    if (nick) submitWithNick(nick);
    else { setRank('pending'); nickPrompt && nickPrompt.show(); }
  }

  // ============ 结算图 ============
  function paintSettlementBoard(ctx2, x, y, w, h) {
    const grad = ctx2.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, '#2a3a52');
    grad.addColorStop(1, '#1a2436');
    ctx2.fillStyle = grad;
    ctx2.fillRect(x, y, w, h);

    // 散布几个水果
    const samples = ['apple_whole', 'orange_whole', 'watermelon_whole', 'kiwi_whole'];
    const cx = x + w / 2, cy = y + h / 2;
    samples.forEach((name, i) => {
      const img = sprites[name];
      if (!img) return;
      const angle = (i / samples.length) * Math.PI * 2 - Math.PI / 2;
      const rr = Math.min(w, h) * 0.3;
      const fx = cx + Math.cos(angle) * rr;
      const fy = cy + Math.sin(angle) * rr;
      const size = Math.min(w, h) * 0.22;
      ctx2.save();
      ctx2.translate(fx, fy);
      ctx2.rotate(angle);
      ctx2.drawImage(img, -size / 2, -size / 2, size, size);
      ctx2.restore();
    });

    // 中心刀光
    ctx2.save();
    ctx2.strokeStyle = 'rgba(255, 240, 180, 0.85)';
    ctx2.lineWidth = Math.min(w, h) * 0.012;
    ctx2.lineCap = 'round';
    ctx2.beginPath();
    ctx2.moveTo(x + w * 0.2, y + h * 0.7);
    ctx2.quadraticCurveTo(x + w * 0.5, y + h * 0.2, x + w * 0.8, y + h * 0.7);
    ctx2.stroke();
    ctx2.restore();

    // 中心 emoji
    ctx2.fillStyle = '#fff';
    ctx2.font = `${Math.min(w, h) * 0.18}px Georgia, serif`;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText('🍉', cx, cy);
  }

  function getSettlementOpts() {
    const ri = lastRankInfo || {};
    const mode = state.mode;
    return {
      kind: 'single',
      gameId: 'fruit-ninja',
      title: '水果忍者',
      emoji: '🍉',
      nick: GamesShell.Identity.getNick(),
      score: getSubmitScore(),
      scoreLabel: mode === 'zen' ? '最 高 连 击 × 100' : '本 局 得 分',
      scoreFormatter: fmtScore,
      rankInfo: ri,
      stats: [
        { label: '模式', value: modeLabel(mode) },
        { label: '最高连击', value: state.bestCombo },
        { label: '用时', value: `${((performance.now() - state.runStartedAt) / 1000).toFixed(0)} s` },
      ],
      paintBoard: paintSettlementBoard,
      boardAspect: 4 / 3,
      watermark: 'zirconeey.github.io/toolbox/fruit-ninja',
    };
  }

  // ============ Init games-shell ============
  function initShell() {
    if (!window.GamesShell) return;

    if (GamesShell.Leaderboard) {
      lbWidget = GamesShell.Leaderboard.mount({
        container: document.getElementById('lb-mount'),
        gameId: 'fruit-ninja',
        title: '🏆 水果忍者排行榜',
        scoreFormatter: fmtScore,
        getCurrentNick: () => GamesShell.Identity.getNick(),
        getSplit: () => state.mode || 'classic',
        splitTabs: [
          { value: 'classic', label: '经典 60s' },
          { value: 'arcade', label: '街机三命' },
          { value: 'zen', label: '禅意（连击×100）' },
        ],
      });
    }
    if (GamesShell.Comments) {
      GamesShell.Comments.mount({
        container: document.getElementById('cm-mount'),
        path: '/toolbox/fruit-ninja/',
        title: '💬 来玩玩交流',
        intro: '聊聊你的最高分、最长连击，或者哪种模式最上头 ~',
        placeholder: '说点什么 ~',
      });
    }
    if (GamesShell.NickPrompt) {
      nickPrompt = GamesShell.NickPrompt.mount({
        container: document.getElementById('nick-mount'),
        prompt: '想上排行榜？起个昵称吧',
        onSubmit: nick => submitWithNick(nick),
        onSkip: () => setRank('hidden'),
      });
    }
    if (GamesShell.Settlement) {
      settleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('settle-btn-mount'),
        gameId: 'fruit-ninja',
        getOpts: getSettlementOpts,
        startDisabled: true,
      });
    }
  }

  // ============ Boot ============
  preloadSprites().then(() => {
    initShell();
    // 模式选择页面也预先画一帧
    render();
  });
})();
</script>
