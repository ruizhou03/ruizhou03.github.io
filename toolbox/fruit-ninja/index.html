      checkSliceLastSegment();
      // 快速划动时播 whoosh（节流：120ms 内最多一次；距离阈值过滤悬停）
      if (pushed && trail.length >= 2) {
        const a = trail[trail.length - 2];
        const b = trail[trail.length - 1];
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const wall = performance.now();
        if (dist > 38 && wall - lastWhooshWall > 120) {
          lastWhooshWall = wall;
          FNAudio.play('whoosh', {
            pan: (p.x / LOG_W - 0.5) * 0.5,
            gain: Math.min(0.36, 0.16 + dist * 0.0018),
          });
        }
      }
    }
  });
  function endPointer() {
    pointerActive = false;
    // Combo Rush：松手不重置 combo（只有炸弹 / 漏切才重置）
    if (state.mode !== 'comborush') state.combo = 0;
    updateHud();
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // ============ 水果生成（phase 调度：normal / burst / pinata / lull）============
  function spawnOne(t, opts) {
    opts = opts || {};
    const margin = 60;
    let x, vx, vy;
    if (opts.fanTotal) {
      // 烟花扇形：起点沿屏幕底部均匀分布，朝中心略汇聚
      const ratio = opts.fanTotal === 1 ? 0.5 : (opts.fanIndex / (opts.fanTotal - 1));
      x = margin + ratio * (LOG_W - 2 * margin);
      const dt = opts.fan === 'pinata' ? 1.45 : 1.3;
      vy = (-GRAVITY * dt - 60) * gameSpeed;
      const sideOffset = (LOG_W / 2 - x) * 0.35;
      vx = sideOffset / dt + (Math.random() - 0.5) * 50;
    } else {
      x = margin + Math.random() * (LOG_W - 2 * margin);
      const targetX = LOG_W / 2 + (Math.random() - 0.5) * (LOG_W * 0.7);
      const dt = 1.2;
      vy = (-GRAVITY * dt - 80) * gameSpeed;
      vx = (targetX - x) / dt + (Math.random() - 0.5) * 80;
    }
    let type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    // 炸弹概率按当前 Director act 调制（fan 形态——burst/pinata/climax——不出炸弹）
    if (state.mode !== 'zen' && !opts.fan) {
      let bombP = 0;
      const act = Director.act;
      if (act === 'Calm') bombP = 0.02;
      else if (act === 'Flow') bombP = 0.06;
      else if (act === 'Tension') bombP = 0.14;
      // Climax: no bombs（让玩家放心连切）
      if (state.mode === 'endless') bombP += endlessFactor() * 0.005;
      if (Math.random() < bombP) type = 'bomb';
    }
    const r = (type === 'watermelon') ? 38 : (type === 'kiwi') ? 32 : 30;
    const fruitObj = {
      kind: 'whole', type,
      x, y: LOG_H + r,
      vx, vy,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 6,
      r,
      bornAt: t,
    };
    // 精准模式：给每个非炸弹水果分配一个随机切线提示角度
    if (state.mode === 'precision' && type !== 'bomb') {
      fruitObj.precisionAngle = Math.random() * Math.PI;
      fruitObj.precisionHintBornAt = t;
    }
    fruits.push(fruitObj);
  }

  // ============ Director（导演式状态机：4 幕情绪曲线）============
  // Calm → Flow → Tension → Climax → 循环。每幕固定时长 + 各自的 spawn 风格 +
  // 炸弹概率梯度。模式适配器在 getModeCfg：zen 跳过 Tension/Climax，
  // classic 最后 15s 压缩，endless 按 stage 收缩节奏。
  function getModeCfg(mode) {
    if (mode === 'zen') {
      return {
        actOrder: ['Calm', 'Flow'],
        durations: { Calm: 5000, Flow: 8000 },
        spawnK: 1.0,
      };
    }
    if (mode === 'endless') {
      return {
        actOrder: ['Calm', 'Flow', 'Tension', 'Climax'],
        durations: { Calm: 3500, Flow: 9000, Tension: 5500, Climax: 4500 },
        spawnK: 1.0,
      };
    }
    if (mode === 'comborush') {
      // 持续高强度流，几乎不喘气，但保留 Climax 高潮（无炸弹幕）
      return {
        actOrder: ['Flow', 'Climax', 'Flow', 'Tension'],
        durations: { Flow: 8000, Climax: 3500, Tension: 4500, Calm: 2000 },
        spawnK: 0.85,    // 更密的 spawn
      };
    }
    if (mode === 'precision') {
      // 水果稀少：长 Calm + 短 Flow，无 Climax / Tension（炸弹仍存在但低）
      return {
        actOrder: ['Calm', 'Flow'],
        durations: { Calm: 6000, Flow: 7000 },
        spawnK: 1.55,    // 间隔放大
      };
    }
    // classic / arcade
    return {
      actOrder: ['Calm', 'Flow', 'Tension', 'Climax'],
      durations: { Calm: 4000, Flow: 10000, Tension: 5500, Climax: 4000 },
      spawnK: 1.0,
    };
  }

  const Director = {
    act: 'Calm',
    actStartedAt: 0,
    actDuration: 4000,
    nextSpawnAt: 0,
    modeCfg: null,

    reset(mode) {
      this.modeCfg = getModeCfg(mode);
      this.act = this.modeCfg.actOrder[0];
      this.actStartedAt = 0;
      this.actDuration = this.modeCfg.durations[this.act];
      this.nextSpawnAt = 800;   // 0.8s 后第一个水果
    },

    effectiveSpawnK() {
      let k = this.modeCfg.spawnK;
      if (state.mode === 'endless') k *= Math.pow(0.93, endlessFactor());
      if (state.mode === 'classic' && state.timeLeft <= 15 && state.timeLeft > 0) k *= 0.72;
      return Math.max(0.35, k);
    },

    advance(now) {
      const order = this.modeCfg.actOrder;
      const idx = order.indexOf(this.act);
      this.act = order[(idx + 1) % order.length];
      this.actStartedAt = now;
      this.actDuration = this.modeCfg.durations[this.act];
      // Climax 入场触发柔和 slow-mo（让全屏 fan 看得清）
      if (this.act === 'Climax') {
        const until = now + 1200;
        if (until > state.slowMoUntil) {
          state.slowMoUntil = until;
          state.slowMoFactor = Math.min(state.slowMoFactor || 1, 0.78);
        }
        showPopup(LOG_W / 2, LOG_H * 0.24, '🎆 来了！', '#ff90d0', true);
      }
      this.nextSpawnAt = now + (this.act === 'Calm' ? 700 : 250);
    },

    spawn(now) {
      const k = this.effectiveSpawnK();
      const act = this.act;
      if (act === 'Calm') {
        // 1-2 个慢水果，单飞抛物线
        spawnOne(now);
        this.nextSpawnAt = now + (1300 + Math.random() * 700) * k;
      } else if (act === 'Flow') {
        const group = 1 + (Math.random() < 0.40 ? 1 : 0);
        for (let i = 0; i < group; i++) {
          setTimeout(() => {
            if (state.running && !state.paused && !state.over) spawnOne(gameNow());
          }, i * 90);
        }
        this.nextSpawnAt = now + (700 + Math.random() * 400) * k;
      } else if (act === 'Tension') {
        // 小型 burst（3-4 fan）+ 炸弹混入
        if (Math.random() < 0.42) {
          const count = 3 + Math.floor(Math.random() * 2);
          for (let i = 0; i < count; i++) {
            setTimeout(() => {
              if (state.running && !state.paused && !state.over) {
                spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'burst' });
              }
            }, i * 75);
          }
          this.nextSpawnAt = now + count * 75 + (850 + Math.random() * 350) * k;
        } else {
          spawnOne(now);
          this.nextSpawnAt = now + (550 + Math.random() * 350) * k;
        }
      } else if (act === 'Climax') {
        // 大型 fan formation：7-11 水果齐发
        const count = 7 + Math.floor(Math.random() * 5);
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            if (state.running && !state.paused && !state.over) {
              spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'pinata' });
            }
          }, i * 75);
        }
        // 整个 climax 一次发完即可，剩余时间留给玩家爽切
        this.nextSpawnAt = now + this.actDuration + 1000;
      }
    },

    tick(now) {
      // Boss 触发（彩蛋）：arcade / endless 每局 1 次，~25s 后的 Flow 幕里
      if (!state.bossSpawned
          && (state.mode === 'arcade' || state.mode === 'endless')
          && now > 25000
          && this.act === 'Flow'
          && !fruits.some(f => f.boss && !f.sliced)) {
        spawnBoss(now);
        state.bossSpawned = true;
      }

      if (now - this.actStartedAt >= this.actDuration) {
        this.advance(now);
        return;
      }
      if (now >= this.nextSpawnAt) this.spawn(now);
    },
  };

  function spawnBoss(t) {
    const x = LOG_W * 0.5 + (Math.random() - 0.5) * 160;
    fruits.push({
      kind: 'whole', type: 'watermelon',
      boss: true, hp: 4, maxHp: 4,
      x, y: LOG_H + 90,
      vx: (Math.random() - 0.5) * 40,
      vy: (-GRAVITY * 1.55 - 40) * gameSpeed,    // 抛得更高更慢，给玩家时间反应
      rot: 0, vrot: 0.4,
      r: 78,
      bornAt: t,
    });
    showPopup(LOG_W / 2, LOG_H * 0.18, 'BOSS', '#ff7ec0', true, '255, 80, 200');
    triggerShake(7, 240);
    FNAudio.play('bomb', { gain: 0.55 });   // 低吼登场
  }

  // ============ 切片检测 ============
  function segCircleHit(a, b, cx, cy, r) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1) {
      return Math.hypot(a.x - cx, a.y - cy) < r;
    }
    let t = ((cx - a.x) * dx + (cy - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx, py = a.y + t * dy;
    return Math.hypot(px - cx, py - cy) < r;
  }

  function checkSlices(gameNowMs) {
    if (trail.length < 2) return;
    if (performance.now() < Time.frozenUntil) return;   // hit pause 期间不再切中
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i - 1], b = trail[i];
        if (gameNowMs - b.t > 220) continue;
        if (segCircleHit(a, b, f.x, f.y, f.r)) {
          const angle = Math.atan2(b.y - a.y, b.x - a.x);
          onSlice(f, angle);
          break;
        }
      }
    }
  }

  // 仅检测最后一段轨迹 — 在 pointermove 立即调用，让切片响应不等下一帧
  function checkSliceLastSegment() {
    if (trail.length < 2) return;
    if (performance.now() < Time.frozenUntil) return;   // hit pause 内禁止再切（防 40ms 内多次堆 combo）
    const a = trail[trail.length - 2];
    const b = trail[trail.length - 1];
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      if (segCircleHit(a, b, f.x, f.y, f.r)) {
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        onSlice(f, angle);
      }
    }
  }

  function onSlice(f, angle) {
    f.sliced = true;
    if (f.type === 'bomb') {
      bombHit(f);
      return;
    }
    // Boss：前几刀只扣 HP，不分裂；最后一刀（hp 已减到 1）正常 split + reward shower
    if (f.boss && f.hp > 1) {
      f.sliced = false;   // 仍允许下次再切
      f.hp -= 1;
      // 半量粒子 + 火花
      spawnSlashSpark(f.x, f.y, angle);
      const def = FRUIT_PARTICLES[f.type] || FRUIT_PARTICLES.apple;
      const count = Math.floor(def.count * 0.45);
      for (let i = 0; i < count; i++) {
        const pt = pickParticleType(def.types);
        const a = angle + (Math.random() - 0.5) * Math.PI * 1.1;
        const sp = 100 + Math.random() * 280;
        const sz = pt.size[0] + Math.random() * (pt.size[1] - pt.size[0]);
        particles.push({
          x: f.x, y: f.y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 80,
          r: sz, color: pt.color, shape: pt.shape,
          rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 9,
          life: 0.6 + Math.random() * 0.4, age: 0,
        });
      }
      // 计分 / 反馈
      state.combo += 1;
      if (state.combo > state.bestCombo) state.bestCombo = state.combo;
      const bossPoints = 80;
      state.score += bossPoints;
      Time.frozenUntil = performance.now() + 45;
      state.cameraPunchAt = performance.now();
      triggerShake(6, 160);
      vibrate(45);
      FNAudio.play('chop', { gain: 0.65, detune: -200 });   // 低沉一些
      showPopup(f.x, f.y - 54, '+' + bossPoints, '#ff9ad5', false);
      updateHud();
      return;
    }
    // Boss 最后一刀：标记 reward shower
    const isBossKill = !!f.boss;
    // combo 即「一笔切到的水果数」（pointerdown 时清零，pointerup 重置）
    state.combo += 1;
    if (state.combo > state.bestCombo) state.bestCombo = state.combo;
    // hit pause：wall-clock 冻结 ~26ms 让玩家感受到"切中"的重量
    // 太长会被 fan formation 期间的连续切感受成"卡顿"，所以收紧到 26
    Time.frozenUntil = performance.now() + 26;
    // camera punch：触发后 ~200ms 缓动回零（独立于 game-time，用 wall 计时）
    state.cameraPunchAt = performance.now();
    // 高 combo 触发轻震 + 强触觉
    if (state.combo >= 5) {
      triggerShake(3 + Math.min(state.combo - 5, 5), 130);
      vibrate(35);
    } else {
      vibrate(18);
    }
    // 连击 8 一次性触发 slow-mo（每笔最多一次）
    if (state.combo === 8) {
      state.slowMoUntil = Time.game + 500;
      state.slowMoFactor = 0.60;
    } else if (state.combo === 15) {
      // 单刀 15 连 → ULTRA 慢动作
      state.slowMoUntil = Time.game + 800;
      state.slowMoFactor = 0.45;
      showPopup(LOG_W / 2, LOG_H * 0.22, 'ULTRA', '#fff48b', true);
      triggerShake(8, 250);
    }
    // chop 音：combo 越高音越亮（detune 上行），位置在屏幕 pan 上反映
    FNAudio.play('chop', {
      detune: Math.min(state.combo - 1, 12) * 30,
      pan: (f.x / LOG_W - 0.5) * 0.65,
    });

    // 精准模式：切割角度与提示角度差 < 20° 则 ×3 奖励
    let precisionMult = 1;
    if (state.mode === 'precision' && f.precisionAngle != null) {
      let diff = ((angle - f.precisionAngle) % Math.PI + Math.PI) % Math.PI;
      if (diff > Math.PI / 2) diff = Math.PI - diff;
      if (diff < Math.PI / 9) {     // < 20°
        precisionMult = 3;
        showPopup(f.x, f.y - 42, 'PERFECT ×3', '#ffd95a', false);
        FNAudio.play('chop', { detune: 600, gain: 0.5 });   // 高音清脆
      }
    }
    // 计分：单笔挥刀斩 N 个 = combo N。一张倍率表说清楚每个 combo 的得分，
    // 不再做"基础线性 + 后置 milestone bonus"双段相加（玩家算不清）
    let points = (state.mode === 'comborush')
      ? state.combo * state.combo * 10      // Combo Rush 不清零 + 指数增长
      : comboPoints(state.combo);
    points *= precisionMult;
    state.score += points;

    // 多连提示（不再二次加分，points 已是终值）
    showPopup(f.x, f.y - 38, '+' + points, '#fff', false);

    if (state.combo >= 3) {
      const labels = { 3: '三连切！', 4: '四连切！', 5: '五连切！', 6: '超神！', 7: '不可阻挡！' };
      const lbl = labels[state.combo] || (state.combo + ' 连切！');
      const color = state.combo >= 5 ? '#ff7878' : '#ffd95a';
      const auraColor = state.combo >= 7 ? '255, 220, 90'
        : state.combo >= 5 ? '255, 80, 200'
        : '0, 220, 255';
      showPopup(LOG_W / 2, LOG_H * 0.32, lbl, color, true, state.combo >= 4 ? auraColor : false);
      showPopup(LOG_W / 2, LOG_H * 0.32 + 46, '+' + points, '#fff');
    }

    spawnHalves(f, angle);
    spawnJuice(f, angle);
    spawnSlashSpark(f.x, f.y, angle);
    // 1 个果汁印在 fruit 附近（之前 2-3 个，密集 fan 时 stain canvas path 是热点）
    if (stainsEnabled) {
      const sx = f.x + (Math.random() - 0.5) * 70;
      const sy = f.y + (Math.random() - 0.5) * 70;
      spawnStain(sx, sy, f.type);
    }
    // Boss 击杀：奖励雨（10 个小水果扇形落下）+ 重 shake + 大额加分
    if (isBossKill) {
      state.score += 300;
      showPopup(LOG_W / 2, LOG_H * 0.22, 'BOSS DOWN', '#ffd95a', true, '255, 220, 90');
      triggerShake(14, 380);
      const until = Time.game + 800;
      if (until > state.slowMoUntil) {
        state.slowMoUntil = until; state.slowMoFactor = 0.55;
      }
      const count = 10;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          if (!state.running || state.paused || state.over) return;
          spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'pinata' });
        }, 200 + i * 70);
      }
    }
    updateHud();
  }

  function spawnHalves(f, angle) {
    const nx = -Math.sin(angle), ny = Math.cos(angle);
    const speed = 280;
    const baseVx = f.vx * 0.4, baseVy = f.vy * 0.4 + 60;
    const cutRot = angle - Math.PI / 2;  // 让切面对齐切割方向
    fruits.push({
      kind: 'half', type: f.type, side: 'l',
      x: f.x, y: f.y,
      vx: baseVx + nx * speed,
      vy: baseVy + ny * speed,
      rot: cutRot, vrot: (Math.random() - 0.5) * 4,
      r: f.r,
      cutAngle: angle,
    });
    fruits.push({
      kind: 'half', type: f.type, side: 'r',
      x: f.x, y: f.y,
      vx: baseVx - nx * speed,
      vy: baseVy - ny * speed,
      rot: cutRot, vrot: (Math.random() - 0.5) * 4,
      r: f.r,
      cutAngle: angle,
    });
  }

  function showPopup(x, y, text, color, big, aura) {
    popups.push({
      x, y, text,
      color: color || '#ffd95a',
      big: !!big,
      aura: !!aura,
      auraColor: (typeof aura === 'string') ? aura : '255, 90, 200',
      age: 0,
      life: big ? 1.4 : 0.9,
    });
  }

  function spawnSlashSpark(x, y, angle) {
    sparks.push({ x, y, angle, age: 0, life: 0.18 });
  }

  // 预烘焙刀光 sprite：避免每帧 createGradient
  // slashFlash —— 暖白径向闪光（圆形 halo）
  // slashBeam  —— 沿刀刃方向的横向光束（两轴渐隐的细长条），rotate 后 drawImage
  let slashFlashSprite = null;
  let slashBeamSprite = null;
  function bakeSlashSprites() {
    if (slashFlashSprite) return;
    const sz = 128;
    slashFlashSprite = document.createElement('canvas');
    slashFlashSprite.width = sz;
    slashFlashSprite.height = sz;
    const fs = slashFlashSprite.getContext('2d');
    const g = fs.createRadialGradient(sz / 2, sz / 2, 2, sz / 2, sz / 2, sz / 2);
    g.addColorStop(0, 'rgba(255, 255, 245, 1)');
    g.addColorStop(0.22, 'rgba(255, 240, 200, 0.75)');
    g.addColorStop(0.52, 'rgba(255, 160, 90, 0.22)');
    g.addColorStop(1, 'rgba(255, 70, 30, 0)');
    fs.fillStyle = g;
    fs.fillRect(0, 0, sz, sz);

    const bw = 256, bh = 36;
    slashBeamSprite = document.createElement('canvas');
    slashBeamSprite.width = bw;
    slashBeamSprite.height = bh;
    const bs = slashBeamSprite.getContext('2d');
    // 水平方向：两端渐隐
    const lg = bs.createLinearGradient(0, 0, bw, 0);
    lg.addColorStop(0, 'rgba(255, 255, 255, 0)');
    lg.addColorStop(0.5, 'rgba(255, 255, 255, 1)');
    lg.addColorStop(1, 'rgba(255, 255, 255, 0)');
    bs.fillStyle = lg;
    bs.fillRect(0, 0, bw, bh);
    // 垂直方向：上下渐隐 → 形成一条中间厚两端尖的光束
    bs.globalCompositeOperation = 'destination-in';
    const vg = bs.createLinearGradient(0, 0, 0, bh);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(0.5, 'rgba(0,0,0,1)');
    vg.addColorStop(1, 'rgba(0,0,0,0)');
    bs.fillStyle = vg;
    bs.fillRect(0, 0, bw, bh);
  }

  function drawSparks() {
    if (!sparks.length) return;
    bakeSlashSprites();
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of sparks) {
      const t = Math.min(1, s.age / s.life);
      const inv = 1 - t;

      // 1. 小型撞击 halo —— 固定 ~42px 不扩张，只是亮起后快速衰减
      // 原本会从 70 扩到 140 px，那是"波纹"感的主要来源；现在不再扩散，避免抢眼
      const flashSize = 42;
      ctx.globalAlpha = inv * inv * 0.45;
      ctx.drawImage(
        slashFlashSprite,
        s.x - flashSize / 2, s.y - flashSize / 2,
        flashSize, flashSize
      );

      // 2. 沿切刀方向的细光束 —— 给"刀刚划过"的方向感，比原来收敛
      const beamW = 110 * (1 - t * 0.15);
      const beamH = 9 * inv * inv;
      ctx.globalAlpha = inv * 0.7;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.angle);
      ctx.drawImage(slashBeamSprite, -beamW / 2, -beamH / 2, beamW, beamH);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function spawnJuice(f, angle) {
    const def = FRUIT_PARTICLES[f.type] || FRUIT_PARTICLES.apple;
    let count = def.count;
    if (Perf.tier === 'med') count = Math.floor(count * 0.6);
    else if (Perf.tier === 'low') count = Math.floor(count * 0.35);
    // 硬上限防 GC 抖动：堆积过多时按剩余空间裁剪
    const room = Math.max(0, 260 - particles.length);
    if (count > room) count = room;
    for (let i = 0; i < count; i++) {
      const pt = pickParticleType(def.types);
      // 沿切割角度偏移 ±π/2，强调"裂开"方向
      const a = angle + (Math.random() - 0.5) * Math.PI * 1.05;
      const sp = 90 + Math.random() * 340;
      const sz = pt.size[0] + Math.random() * (pt.size[1] - pt.size[0]);
      particles.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 90,
        r: sz,
        color: pt.color,
        shape: pt.shape,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 9,
        life: 0.7 + Math.random() * 0.55,
        age: 0,
      });
    }
  }

  function bombHit(f) {
    flashScreen();
    FNAudio.play('bomb');
    triggerShake(20, 420);
    spawnShockwave(f ? f.x : LOG_W / 2, f ? f.y : LOG_H / 2, {
      rMax: 190, colorRGB: '255, 90, 100', lineWidth: 5, life: 0.42,
    });
    spawnShockwave(f ? f.x : LOG_W / 2, f ? f.y : LOG_H / 2, {
      r0: 8, rMax: 110, colorRGB: '255, 220, 90', lineWidth: 2.5, life: 0.32,
    });
    vibrate([80, 40, 80]);
    state.combo = 0;
    if (state.mode === 'endless') {
      state.lives -= 1;
      updateHud();
      showPopup(LOG_W / 2, LOG_H * 0.4, '💥 炸弹 -1 命', '#ff7878', true);
      if (state.lives <= 0) setTimeout(() => endRun('boom'), 400);
      return;
    }
    setTimeout(() => endRun('boom'), 350);
  }

  // 无尽模式 stage 升级 + 难度系数
  const STAGE_DURATION = 25;            // 每 stage 秒数
  function checkStageUp(now) {
    if (state.mode !== 'endless') return;
    const elapsed = (now - state.stageStartedAt) / 1000;
    if (elapsed < STAGE_DURATION) return;
    state.stage += 1;
    state.stageStartedAt = now;
    state.score += 100;
    let lifeMsg = '';
    // 每过 5 阶里程碑回 1 命（最多 3）
    if (state.stage % 5 === 1 && state.stage > 1 && state.lives < 3) {
      state.lives += 1;
      lifeMsg = ' · ❤+1';
    }
    showPopup(LOG_W / 2, LOG_H * 0.30, '🔥 STAGE ' + state.stage, '#ff9a44', true);
    showPopup(LOG_W / 2, LOG_H * 0.30 + 50, '难度提升 +100' + lifeMsg, '#fff');
    updateHud();
  }
  function endlessFactor() {
    // 每升 1 阶难度系数：spawn 间隔 ×0.93，burst 间隔 ×0.92，炸弹概率 +0.5%
    return Math.max(0, state.stage - 1);
  }

  let flashUntil = 0;
  function flashScreen() { flashUntil = gameNow() + 280; }

  // ============ 物理更新 ============
  function update(gameNowMs, dt) {
    if (state.mode === 'classic' || state.mode === 'comborush') {
      const limit = state.mode === 'comborush' ? 90 : 60;
      const elapsed = (gameNowMs - state.runStartedAt) / 1000;
      state.timeLeft = Math.max(0, limit - elapsed);
      if (state.timeLeft <= 0 && !state.over) {
        endRun('time');
        return;
      }
    }
    if (state.mode === 'endless') checkStageUp(gameNowMs);

    for (const f of fruits) {
      f.vy += GRAVITY * gameSpeed * dt;
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.rot += f.vrot * dt;
    }

    // 出屏处理 + 移除 sliced 的 whole（不再渲染原水果，只剩两个 half 飞出）
    fruits = fruits.filter(f => {
      if (f.kind === 'whole' && f.sliced) return false;
      if (f.y > LOG_H + 100) {
        if (f.kind === 'whole' && !f.sliced && f.type !== 'bomb') {
          onMissed(f);
        }
        return false;
      }
      if (f.x < -120 || f.x > LOG_W + 120) return false;
      return true;
    });

    for (const p of particles) {
      p.vy += GRAVITY * 0.6 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.age += dt;
      if (p.vrot) p.rot += p.vrot * dt;
    }
    particles = particles.filter(p => p.age < p.life);

    for (const pp of popups) pp.age += dt;
    popups = popups.filter(pp => pp.age < pp.life);

    for (const w of shockwaves) w.age += dt;
    shockwaves = shockwaves.filter(w => w.age < w.life);

    for (const sp of sparks) sp.age += dt;
    sparks = sparks.filter(sp => sp.age < sp.life);

    fadeStains();

    // trail 老化（用 game-time 时间戳）
    while (trail.length > 0 && gameNowMs - trail[0].t > 220) trail.shift();
    if (trail.length > 14) trail.splice(0, trail.length - 14);

    checkSlices(gameNowMs);
    Director.tick(gameNowMs);
  }

  function onMissed(f) {
    // Combo Rush：漏切只重置 combo，不掉命也不结束
    if (state.mode === 'comborush') {
      if (state.combo > 0) {
        state.combo = 0;
        flashScreen();
        updateHud();
      }
      return;
    }
    if (state.mode !== 'arcade' && state.mode !== 'endless') return;
    state.lives -= 1;
    state.combo = 0;
    flashScreen();
    updateHud();
    if (state.lives <= 0) endRun('lives');
  }

  // ============ 渲染 ============
  function drawFruit(f) {
    let img;
    if (f.kind === 'whole') {
      img = sprites[f.type === 'bomb' ? 'bomb' : (f.type + '_whole')];
    } else {
      img = sprites[f.type + '_half'];
    }
    if (!img) return;
    const size = f.r * 2.4;

    // Boss aura + HP bar
    if (f.boss && !f.sliced) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const pulse = 0.85 + 0.15 * Math.sin(Time.game * 0.008);
      const aR = f.r * 1.35 * pulse;
      const ag = ctx.createRadialGradient(f.x, f.y, f.r * 0.7, f.x, f.y, aR);
      ag.addColorStop(0, 'rgba(255, 90, 200, 0.4)');
      ag.addColorStop(1, 'rgba(255, 90, 200, 0)');
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.arc(f.x, f.y, aR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 地面投影：光线从左上方来，阴影落在右下方。不跟水果旋转。
    if (f.kind === 'whole') {
      ctx.save();
      const sx = f.x + f.r * 0.22;
      const sy = f.y + f.r * 0.32;
      const sr = f.r * 0.78;
      const sg = ctx.createRadialGradient(sx, sy, sr * 0.08, sx, sy, sr);
      sg.addColorStop(0, 'rgba(0,0,0,0.18)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.ellipse(sx, sy, sr, sr * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    if (f.kind === 'half' && f.side === 'r') ctx.scale(-1, 1);
    ctx.drawImage(img, -size / 2, -size / 2, size, size);
    ctx.restore();

    // Boss HP bar（在 fruit 上方）
    if (f.boss && !f.sliced && f.hp > 0) {
      const w = 100, h = 6;
      const bx = f.x - w / 2, by = f.y - f.r - 18;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx, by, w, h);
      const hpR = f.hp / f.maxHp;
      ctx.fillStyle = hpR > 0.5 ? '#ff9aa5' : '#ff4060';
      ctx.fillRect(bx, by, w * hpR, h);
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, w, h);
    }
  }

  function drawPrecisionHints() {
    const now = Time.game;
    ctx.save();
    ctx.lineCap = 'round';
    for (const f of fruits) {
      if (f.precisionAngle == null || f.kind !== 'whole' || f.sliced) continue;
      const age = (now - f.precisionHintBornAt) / 1000;     // 秒
      const fade = Math.max(0.15, 1 - age / 1.2);
      ctx.translate(0, 0);
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.precisionAngle);
      // 双层：外发光 + 内点划
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(255, 240, 90, ' + (fade * 0.32).toFixed(3) + ')';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-f.r * 1.7, 0);
      ctx.lineTo(f.r * 1.7, 0);
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(255, 250, 180, ' + fade.toFixed(3) + ')';
      ctx.lineWidth = 1.6;
      ctx.setLineDash([7, 5]);
      ctx.beginPath();
      ctx.moveTo(-f.r * 1.7, 0);
      ctx.lineTo(f.r * 1.7, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawTrail() {
    const n = trail.length;
    if (n < 2) return;

    // 关键变化：不再用等宽 stroke（那看起来像 marker 画笔），改成多边形 ribbon。
    // 每个轨迹点带一个"半宽" hw_i，沿运动方向垂直方向各偏 hw_i 形成左/右两条边，
    // 用 quadratic 曲线连接成一个封闭多边形然后 fill。
    // 宽度沿位置 t∈[0..1] 走刀片轮廓：
    //   t=0（尾，最旧）→ 0
    //   t≈0.85       → 最宽
    //   t=1 (头/光标) → 微微收口 ~70% 给个"利尖"
    // 多层：halo + mid glow + 锐核 + 中线高光

    // 估算平均速度 → 整体半宽。快=较细锐 / 慢=较厚
    let totalDist = 0, totalDt = 0;
    for (let i = 1; i < n; i++) {
      const a = trail[i - 1], b = trail[i];
      totalDist += Math.hypot(b.x - a.x, b.y - a.y);
      totalDt += Math.max(1, b.t - a.t);
    }
    const avgSpeed = totalDt > 0 ? totalDist / totalDt * 1000 : 0;
    const speedK = 1 - Math.min(1, avgSpeed / 2400) * 0.18;             // 0.82..1

    // 每点切向（用前后邻居平均）→ 90° 旋转得到法向
    const tx = new Float32Array(n), ty = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      let dx = 0, dy = 0;
      if (i > 0) {
        const p = trail[i - 1];
        dx += trail[i].x - p.x;
        dy += trail[i].y - p.y;
      }
      if (i < n - 1) {
        const p = trail[i + 1];
        dx += p.x - trail[i].x;
        dy += p.y - trail[i].y;
      }
      const len = Math.hypot(dx, dy) || 1;
      tx[i] = dx / len;
      ty[i] = dy / len;
    }
    // 法向 = 切向旋转 90°：(nx, ny) = (-ty, tx)

    // 宽度轮廓 w(t) ∈ [0, 1]：尾尖 → 体最宽 → 头微收
    function widthAt(t) {
      // 尾部用 t^0.85 快速涨；最尖那一截再收口给个利尖
      let w;
      if (t <= 0.88) {
        const u = t / 0.88;
        w = Math.pow(u, 0.85);          // 0..1
      } else {
        const u = (t - 0.88) / 0.12;    // 0..1 last 12%
        w = 1 - u * 0.35;                // 1.0 → 0.65 利尖
      }
      return w;
    }

    // Combo Rush ≥10 时调色板切到火焰
    const fireMode = state.mode === 'comborush' && state.combo >= 10;
    const glowRGB = fireMode ? '255, 130, 50' : '170, 225, 255';
    const coreRGB = fireMode ? '255, 240, 200' : '255, 255, 255';

    // 构造一条 ribbon path：左边 tail→head 用 quadratic 平滑，右边 head→tail 同
    // hwScale 控制本层半宽
    function buildRibbon(hwScale) {
      const lx = new Float32Array(n), ly = new Float32Array(n);
      const rx = new Float32Array(n), ry = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const t = (n === 1) ? 1 : i / (n - 1);
        const hw = widthAt(t) * hwScale;
        const nxh = -ty[i] * hw;
        const nyh = tx[i] * hw;
        lx[i] = trail[i].x + nxh;
        ly[i] = trail[i].y + nyh;
        rx[i] = trail[i].x - nxh;
        ry[i] = trail[i].y - nyh;
      }
      ctx.beginPath();
      // 左边：tail → head，midpoint-quadratic 平滑
      ctx.moveTo(lx[0], ly[0]);
      if (n === 2) {
        ctx.lineTo(lx[1], ly[1]);
      } else {
        for (let i = 1; i < n - 1; i++) {
          const mxv = (lx[i] + lx[i + 1]) / 2;
          const myv = (ly[i] + ly[i + 1]) / 2;
          ctx.quadraticCurveTo(lx[i], ly[i], mxv, myv);
        }
        ctx.lineTo(lx[n - 1], ly[n - 1]);
      }
      // 头部封口（绕过 head 点稍微弧形过渡到右边）
      ctx.lineTo(rx[n - 1], ry[n - 1]);
      // 右边：head → tail
      if (n === 2) {
        ctx.lineTo(rx[0], ry[0]);
      } else {
        for (let i = n - 2; i >= 1; i--) {
          const mxv = (rx[i] + rx[i - 1]) / 2;
          const myv = (ry[i] + ry[i - 1]) / 2;
          ctx.quadraticCurveTo(rx[i], ry[i], mxv, myv);
        }
        ctx.lineTo(rx[0], ry[0]);
      }
      ctx.closePath();
    }

    const tier = Perf.tier;
    ctx.save();

    // 1. 外层 halo（仅 high 档）—— 厚重的发光余韵
    if (tier === 'high') {
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(' + glowRGB + ', 0.22)';
      buildRibbon(16 * speedK);
      ctx.fill();
    }
    // 2. 中层 glow —— 主体彩色发光
    if (tier !== 'low') {
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(' + glowRGB + ', 0.55)';
      buildRibbon(8 * speedK);
      ctx.fill();
    }
    // 3. 锐利核心 —— 白热刀片
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(' + coreRGB + ', 0.96)';
    buildRibbon(3.4 * speedK);
    ctx.fill();
    // 4. 中线"刀脊"高光 —— 1.2px 沿中心线的极亮 stroke，给"刀刃"反光感
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.88)';
    ctx.lineWidth = 1.3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(trail[0].x, trail[0].y);
    if (n === 2) {
      ctx.lineTo(trail[1].x, trail[1].y);
    } else {
      for (let i = 1; i < n - 1; i++) {
        const mxv = (trail[i].x + trail[i + 1].x) / 2;
        const myv = (trail[i].y + trail[i + 1].y) / 2;
        ctx.quadraticCurveTo(trail[i].x, trail[i].y, mxv, myv);
      }
      ctx.lineTo(trail[n - 1].x, trail[n - 1].y);
    }
    ctx.stroke();

    ctx.restore();
  }

  function drawPopups() {
    for (const p of popups) {
      const t = p.age / p.life;
      const a = Math.max(0, 1 - t);
      const yOff = -55 * t * t;

      // 连击光环：固定大小（不再扩散成波纹）的色光垫在文字背后，仅给"重量"不抢眼
      if (p.aura) {
        const auraA = a * Math.min(1, 1.6 * (1 - t));   // 跟着文字一起淡出
        if (auraA > 0.04) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.translate(p.x, p.y + yOff);
          const r = p.big ? 72 : 50;
          const g = ctx.createRadialGradient(0, 0, 4, 0, 0, r);
          g.addColorStop(0, 'rgba(' + p.auraColor + ', ' + (auraA * 0.55).toFixed(3) + ')');
          g.addColorStop(0.55, 'rgba(' + p.auraColor + ', ' + (auraA * 0.18).toFixed(3) + ')');
          g.addColorStop(1, 'rgba(' + p.auraColor + ', 0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      const scale = p.big ? (1 + Math.sin(Math.min(t * 6, Math.PI)) * 0.15) : 1;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y + yOff);
      ctx.scale(scale, scale);
      ctx.font = (p.big ? '700 32px ' : '600 18px ') + 'Georgia, "Noto Serif SC", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = p.big ? 4 : 2.5;
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.strokeText(p.text, 0, 0);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      const t = p.age / p.life;
      const alpha = Math.max(0, 1 - t);
      const sz = p.r * (1 - t * 0.35);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      if (p.rot) ctx.rotate(p.rot);
      if (p.shape === 'oval') {
        ctx.beginPath();
        ctx.ellipse(0, 0, sz * 0.55, sz, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'rect') {
        ctx.fillRect(-sz, -sz * 0.45, sz * 2, sz * 0.9);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, sz, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    // 屏幕震动（wall-clock 驱动，叠加在 camera punch 之外）
    updateShake();
    const shakeOn = shake.x !== 0 || shake.y !== 0;
    if (shakeOn) {
      ctx.save();
      ctx.translate(shake.x, shake.y);
    }
    // camera punch：切中瞬间镜头微推 1.04×，200ms 内缓动回零（独立 wall-clock）
    // 'low' 档跳过（避免移动端额外的 transform 成本）
    let cs = 1.0;
    if (state.cameraPunchAt && Perf.tier !== 'low') {
      const dt = performance.now() - state.cameraPunchAt;
      if (dt < 200) {
        const k = 1 - dt / 200;
        cs = 1 + 0.04 * k * k;   // 二次缓动
      }
    }
    const cameraOn = cs !== 1.0;
    if (cameraOn) {
      ctx.save();
      ctx.translate(LOG_W / 2, LOG_H / 2);
      ctx.scale(cs, cs);
      ctx.translate(-LOG_W / 2, -LOG_H / 2);
    }

    // 背景（烘焙的霓虹场景 + 动画网格）
    if (bgOffscreen) {
      ctx.drawImage(bgOffscreen, 0, 0, LOG_W, LOG_H);
    } else {
      ctx.fillStyle = '#0a0418';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }
    drawBgAnimated(Time.game, lastDtGameMs);

    // 果汁残印（在水果下方）
    if (stainsCanvas && stainsEnabled) {
      ctx.drawImage(stainsCanvas, 0, 0, LOG_W, LOG_H);
    }

    // 精准模式：切线提示（在水果之下）
    if (state.mode === 'precision') drawPrecisionHints();
    // 水果
    for (const f of fruits) drawFruit(f);
    drawParticles();
    drawShockwaves();
    drawSparks();
    drawTrail();
    drawPopups();

    // 闪屏
    const now = Time.game;
    if (now < flashUntil) {
      const a = (flashUntil - now) / 280;
      ctx.fillStyle = 'rgba(255, 80, 80, ' + (a * 0.5).toFixed(3) + ')';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }

    if (cameraOn) ctx.restore();
    if (shakeOn) ctx.restore();
  }

  // ============ HUD ============
  let hudPrevScore = 0;
  function updateHud() {
    const cur = Math.round(state.score);
    bind.score.textContent = String(cur);
    // 加分时触发 bump 动画
    if (cur !== hudPrevScore) {
      bind.score.classList.remove('bump');
      void bind.score.offsetWidth; // force reflow
      bind.score.classList.add('bump');
      hudPrevScore = cur;
    }
    if (state.combo >= 2) {
      hudCombo.classList.remove('hidden');
      bind.combo.textContent = String(state.combo);
    } else {
      hudCombo.classList.add('hidden');
    }
    if (state.mode === 'classic' || state.mode === 'comborush') {
      bind.timer.textContent = state.timeLeft.toFixed(1);
    }
    if (state.mode === 'arcade' || state.mode === 'endless') {
      bind.lives.textContent = '❤'.repeat(state.lives) + '🤍'.repeat(Math.max(0, 3 - state.lives));
    }
    if (state.mode === 'endless') {
      bind.stage.textContent = String(state.stage);
    }
  }

  // ============ 主循环 ============
  let rafId = 0;
  let lastWall = 0;        // 上一帧的 performance.now()（wall-clock）

  // 每帧根据当前情绪触发条件计算 Time.scale（≤1.0）
  function updateTimeScale() {
    let scale = 1.0;
    // 高 combo slow-mo（game-time gated）
    if (state.slowMoUntil && Time.game < state.slowMoUntil) {
      scale = Math.min(scale, state.slowMoFactor);
    }
    // 经典模式最后 5 秒：轻微减速提醒
    if (state.mode === 'classic' && state.timeLeft > 0 && state.timeLeft <= 5) {
      scale = Math.min(scale, 0.85);
    }
    Time.scale = scale;
  }

  let lastDtGameMs = 0;        // 给背景动画层用（樱花 etc）
  function loop(now) {
    if (state.over || !state.running) return;
    if (!state.paused) {
      updateTimeScale();
      const dtWall = lastWall ? Math.min(now - lastWall, 50) : 0;
      Perf.tick(dtWall);
      // hit pause：Time.game 暂停推进，但仍渲染（让玩家看到冻结瞬间）
      const isFrozen = now < Time.frozenUntil;
      const dtGameMs = isFrozen ? 0 : dtWall * Time.scale;
      Time.game += dtGameMs;
      Time.wall = now;
      lastDtGameMs = dtGameMs;
      update(Time.game, dtGameMs / 1000);
      render();
      updateHud();
    }
    lastWall = now;
    rafId = requestAnimationFrame(loop);
  }

  // ============ 模式 / 流程 ============
  // tab 始终可见。点击 = 切换 + 立即新开一局；点已激活的 tab 时若正在玩则 no-op，避免误触失分
  for (const tab of modeTabs) {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      // iOS Safari 需要在 user gesture 内同步 resume AudioContext
      FNAudio.unlock();
      if (mode === state.mode && state.running && !state.over) return;
      startGame(mode);
    });
  }

  function startGame(mode) {
    state.mode = mode;
    state.running = true;
    state.paused = false;
    state.over = false;
    state.score = 0;
    hudPrevScore = 0;
    state.combo = 0;
    state.bestCombo = 0;
    state.timeLeft = (mode === 'comborush') ? 90 : 60;
    state.lives = 3;
    // 重置 Time：每局 game-time 从 0 起算
    Time.game = 0;
    Time.scale = 1.0;
    Time.frozenUntil = 0;
    Time.wall = 0;
    lastWall = 0;
    state.runStartedAt = 0;
    state.runNonce = (window.GamesShell && GamesShell.Identity) ? GamesShell.Identity.newRunNonce() : ('r-' + Date.now());
    fruits = [];
    particles = [];
    trail = [];
    popups = [];
    shockwaves = [];
    sparks = [];
    clearStains();
    flashUntil = 0;
    Director.reset(mode);
    state.stage = 1;
    state.stageStartedAt = 0;
    state.cameraPunchAt = 0;
    state.slowMoUntil = 0;
    state.slowMoFactor = 0.55;
    state.bossSpawned = false;

    gameoverOverlay.hidden = true;
    pausedOverlay.hidden = true;
    setActiveModeTab(mode);

    hudTimer.hidden = !(mode === 'classic' || mode === 'comborush');
    hudLives.hidden = !(mode === 'arcade' || mode === 'endless');
    hudStage.hidden = mode !== 'endless';
    bind.score.textContent = '0';
    bind.timer.textContent = ((mode === 'comborush') ? 90 : 60).toFixed(1);
    bind.lives.textContent = '❤❤❤';
    bind.stage.textContent = '1';
    hudCombo.classList.add('hidden');

    pendingSubmit = false;
    resetRank();

    preloadSprites().then(() => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
  }

  function endRun(reason) {
    if (state.over) return;
    state.over = true;
    state.running = false;
    cancelAnimationFrame(rafId);

    let title = '时间到';
    if (reason === 'boom') title = state.mode === 'endless' ? '撑住了，但还是炸了 💥' : '炸弹被切到了！';
    else if (reason === 'lives') title = state.mode === 'endless' ? `撑到 Stage ${state.stage}！` : '漏切太多';
    else if (reason === 'manual') title = '本局结束';

    const lines = [];
    lines.push(state.mode === 'zen'
      ? `<strong>最高连击 ${state.bestCombo}</strong>`
      : `<strong>${Math.round(state.score)} 分</strong>`);
    if (state.mode === 'endless') {
      lines.push(`Stage ${state.stage} · 最高一刀 ${state.bestCombo} 连切 · 用时 ${((Time.game - state.runStartedAt)/1000).toFixed(0)}s`);
    } else if (state.mode !== 'zen') {
      lines.push(`最高连击 ${state.bestCombo} · 用时 ${((Time.game - state.runStartedAt)/1000).toFixed(0)}s`);
    } else {
      lines.push(`累计得分 ${Math.round(state.score)}`);
    }

    bind['go-title'].textContent = title;
    bind['go-stats'].innerHTML = lines.join('<br>');

    if (state.mode === 'zen' && reason !== 'manual') {
      // 禅意只有手动结束
      gameoverOverlay.hidden = true;
    } else {
      gameoverOverlay.hidden = false;
    }

    // 排行榜：切到当前模式 tab
    if (lbWidget) lbWidget.setSplit(state.mode);

    tryAutoSubmit();
    if (settleBtn) settleBtn.setEnabled(true);

    // 1.5 秒后清空残余水果
    setTimeout(() => {
      if (state.over) {
        fruits = [];
        particles = [];
        popups = [];
        render();
      }
    }, 1500);
  }

  // ============ 暂停 ============
  document.getElementById('pause-btn').addEventListener('click', () => {
    if (state.over || !state.running) return;
    state.paused = true;
    pausedOverlay.hidden = false;
    FNAudio.suspend();
  });
  document.getElementById('resume-btn').addEventListener('click', () => {
    state.paused = false;
    pausedOverlay.hidden = true;
    lastWall = 0;             // 防止 resume 后第一帧累积巨大 dt
    FNAudio.resume();
    rafId = requestAnimationFrame(loop);
  });
  document.getElementById('quit-btn').addEventListener('click', () => {
    if (confirm('退出当前局？分数会保留并尝试上传')) {
      pausedOverlay.hidden = true;
      endRun('manual');
    }
  });
  document.getElementById('restart-btn').addEventListener('click', () => {
    startGame(state.mode);
  });

  // ============ Visibility：自动暂停 ============
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.running && !state.over && !state.paused) {
      state.paused = true;
      pausedOverlay.hidden = false;
      FNAudio.suspend();
    }
  });

  // ============ 排行榜 / 评论 / 结算 接入 ============
  let lbWidget = null;
  let nickPrompt = null;
  let settleBtn = null;
  let pendingSubmit = false;
  let lastRankInfo = null;

  function modeLabel(m) {
    if (m === 'classic') return '经典 60s';
    if (m === 'arcade') return '街机三命';
    if (m === 'endless') return '无尽闯关';
    if (m === 'zen') return '禅意';
    if (m === 'comborush') return '连击狂飙';
    if (m === 'precision') return '精准模式';
    return m;
  }

  function getSubmitScore() {
    if (state.mode === 'zen') return state.bestCombo * 100;
    return Math.round(state.score);
  }
  function fmtScore(v) {
    return Number(v).toLocaleString();
  }

  function setRank(name, data) {
    if (name === 'hidden') {
      rankRow.classList.remove('failed');
      rankRow.innerHTML = '';
      lastRankInfo = null;
      return;
    }
    rankRow.classList.remove('failed');
    if (name === 'loading') {
      rankRow.textContent = '排名上传中…';
      lastRankInfo = { mode: modeLabel(state.mode) };
    } else if (name === 'failed') {
      rankRow.classList.add('failed');
      rankRow.textContent = '排行榜暂时不可用（不影响游戏）';
      lastRankInfo = { failed: true, mode: modeLabel(state.mode) };
    } else if (name === 'pending') {
      rankRow.classList.add('failed');
      rankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
      lastRankInfo = { pending: true, mode: modeLabel(state.mode) };
    } else if (name === 'success' && data && data.rank && data.total) {
      rankRow.innerHTML = '';
      rankRow.append(
        document.createTextNode(modeLabel(state.mode) + ' · 第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
      lastRankInfo = { rank: data.rank, total: data.total, mode: modeLabel(state.mode) };
    }
  }
  function resetRank() { setRank('hidden'); }

  async function submitWithNick(nick) {
    if (!nick || pendingSubmit) return;
    const score = getSubmitScore();
    if (score <= 0) { setRank('hidden'); return; }
    pendingSubmit = true;
    setRank('loading');
    const r = await GamesShell.Leaderboard.submit({
      gameId: 'fruit-ninja',
      nick,
      score,
      durationMs: Math.max(3000, Math.round(Time.game - state.runStartedAt)),
      clientNonce: state.runNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra: { mode: state.mode, bestCombo: state.bestCombo, stage: state.stage },
    });
    if (r && r.ok) {
      setRank('success', { rank: r.rank, total: r.total });
      if (lbWidget) lbWidget.refresh();
      return;
    }
    pendingSubmit = false;
    if (r && r.reason === 'nick_taken') {
      GamesShell.Identity.clearNick();
      alert('"' + nick + '" 已被别的玩家占用，请换一个昵称');
      setRank('pending');
      if (nickPrompt) { nickPrompt.refresh(); nickPrompt.show(); }
      return;
    }
    setRank('failed');
    if (r && r.reason) console.warn('[fruit-ninja] submit rejected:', r.reason);
  }

  function tryAutoSubmit() {
    if (getSubmitScore() <= 0) { setRank('hidden'); return; }
    const nick = GamesShell.Identity.getNick();
    if (nick) submitWithNick(nick);
    else { setRank('pending'); nickPrompt && nickPrompt.show(); }
  }

  // ============ 结算图 ============
  function paintSettlementBoard(ctx2, x, y, w, h) {
    const horizonY = y + h * 0.55;
    const minDim = Math.min(w, h);

    // 天空：深紫纵向渐变
    const skyGrad = ctx2.createLinearGradient(x, y, x, horizonY);
    skyGrad.addColorStop(0, '#06010f');
    skyGrad.addColorStop(0.55, '#1a0838');
    skyGrad.addColorStop(1, '#3a0e5e');
    ctx2.fillStyle = skyGrad;
    ctx2.fillRect(x, y, w, horizonY - y);

    // 夕阳（粉红 → 橙黄）
    const sunCx = x + w / 2;
    const sunCy = horizonY - minDim * 0.04;
    const sunR = minDim * 0.32;
    const sunGrad = ctx2.createRadialGradient(sunCx, sunCy, 4, sunCx, sunCy, sunR);
    sunGrad.addColorStop(0, '#fff8c4');
    sunGrad.addColorStop(0.28, '#ffc070');
    sunGrad.addColorStop(0.55, '#ff4ea8');
    sunGrad.addColorStop(1, 'rgba(120, 20, 90, 0)');
    ctx2.fillStyle = sunGrad;
    ctx2.beginPath();
    ctx2.arc(sunCx, sunCy, sunR, 0, Math.PI * 2);
    ctx2.fill();
    // 蒸汽波横纹
    ctx2.save();
    ctx2.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < 6; i++) {
      const sy = sunCy + sunR * 0.18 + i * sunR * 0.08;
      const sh = sunR * 0.04 + i * sunR * 0.008;
      if (sy + sh > horizonY) break;
      ctx2.fillRect(sunCx - sunR, sy, sunR * 2, sh);
    }
    ctx2.restore();

    // 地板
    const floorGrad = ctx2.createLinearGradient(x, horizonY, x, y + h);
    floorGrad.addColorStop(0, '#0c031e');
    floorGrad.addColorStop(1, '#02000a');
    ctx2.fillStyle = floorGrad;
    ctx2.fillRect(x, horizonY, w, y + h - horizonY);

    // 地平线 + 辉光
    const glowGrad = ctx2.createLinearGradient(x, horizonY - 12, x, horizonY + 12);
    glowGrad.addColorStop(0, 'rgba(0, 220, 255, 0)');
    glowGrad.addColorStop(0.5, 'rgba(0, 220, 255, 0.45)');
    glowGrad.addColorStop(1, 'rgba(0, 220, 255, 0)');
    ctx2.fillStyle = glowGrad;
    ctx2.fillRect(x, horizonY - 12, w, 24);
    ctx2.strokeStyle = 'rgba(120, 250, 255, 0.95)';
    ctx2.lineWidth = Math.max(1.2, minDim * 0.003);
    ctx2.beginPath();
    ctx2.moveTo(x, horizonY);
    ctx2.lineTo(x + w, horizonY);
    ctx2.stroke();

    // 透视网格（静态）
    const vanishX = x + w / 2;
    ctx2.strokeStyle = 'rgba(0, 200, 255, 0.25)';
    ctx2.lineWidth = 0.8;
    const verts = 11;
    for (let i = 0; i <= verts; i++) {
      const tX = i / verts;
      const xBottom = x - w * 0.3 + tX * (w * 1.6);
      ctx2.beginPath();
      ctx2.moveTo(vanishX, horizonY);
      ctx2.lineTo(xBottom, y + h);
      ctx2.stroke();
    }
    const numHoriz = 7;
    for (let i = 1; i <= numHoriz; i++) {
      const tY = Math.pow(i / numHoriz, 2.2);
      const ly = horizonY + (y + h - horizonY) * tY;
      const alpha = 0.18 + 0.4 * tY;
      const isAccent = (i % 3 === 0);
      ctx2.strokeStyle = isAccent
        ? 'rgba(255, 90, 200, ' + alpha.toFixed(3) + ')'
        : 'rgba(0, 220, 255, ' + alpha.toFixed(3) + ')';
      ctx2.lineWidth = isAccent ? 1.4 : 0.9;
      ctx2.beginPath();
      ctx2.moveTo(x, ly);
      ctx2.lineTo(x + w, ly);
      ctx2.stroke();
    }

    // 4 水果环绕在 sun 周围（上半部分）
    const samples = ['apple_whole', 'orange_whole', 'watermelon_whole', 'kiwi_whole'];
    samples.forEach((name, i) => {
      const img = sprites[name];
      if (!img) return;
      const angle = (i / samples.length) * Math.PI - Math.PI;   // 上半圈
      const rr = minDim * 0.32;
      const fx = sunCx + Math.cos(angle) * rr;
      const fy = sunCy + Math.sin(angle) * rr * 0.85;
      const size = minDim * 0.18;
      // 霓虹后辉
      ctx2.save();
      ctx2.globalCompositeOperation = 'lighter';
      const aurG = ctx2.createRadialGradient(fx, fy, 4, fx, fy, size * 0.7);
      aurG.addColorStop(0, 'rgba(255, 120, 220, 0.45)');
      aurG.addColorStop(1, 'rgba(255, 120, 220, 0)');
      ctx2.fillStyle = aurG;
      ctx2.beginPath();
      ctx2.arc(fx, fy, size * 0.7, 0, Math.PI * 2);
      ctx2.fill();
      ctx2.restore();
      ctx2.save();
      ctx2.translate(fx, fy);
      ctx2.rotate(angle * 0.6);
      ctx2.drawImage(img, -size / 2, -size / 2, size, size);
      ctx2.restore();
    });

    // 中心霓虹刀光（cyan glow + magenta mid + 白 core）
    const slashY1 = y + h * 0.75, slashY2 = y + h * 0.78;
    const slashCx = x + w * 0.5, slashTop = y + h * 0.42;
    const drawSlash = (color, width) => {
      ctx2.strokeStyle = color;
      ctx2.lineWidth = width;
      ctx2.lineCap = 'round';
      ctx2.beginPath();
      ctx2.moveTo(x + w * 0.2, slashY1);
      ctx2.quadraticCurveTo(slashCx, slashTop, x + w * 0.8, slashY2);
      ctx2.stroke();
    };
    ctx2.save();
    ctx2.globalCompositeOperation = 'lighter';
    drawSlash('rgba(0, 220, 255, 0.35)', minDim * 0.020);
    drawSlash('rgba(255, 90, 210, 0.65)', minDim * 0.010);
    ctx2.globalCompositeOperation = 'source-over';
    drawSlash('rgba(255, 255, 255, 0.95)', minDim * 0.004);
    ctx2.restore();

    // 中心 🍉
    ctx2.fillStyle = '#fff';
    ctx2.font = `${minDim * 0.18}px Georgia, serif`;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText('🍉', sunCx, sunCy);
  }

  function getSettlementOpts() {
    const ri = lastRankInfo || {};
    const mode = state.mode;
    return {
      kind: 'single',
      gameId: 'fruit-ninja',
      title: '水果忍者',
      emoji: '🍉',
      nick: GamesShell.Identity.getNick(),
      score: getSubmitScore(),
      scoreLabel: mode === 'zen' ? '最 高 连 击 × 100' : '本 局 得 分',
      scoreFormatter: fmtScore,
      rankInfo: ri,
      stats: (mode === 'endless'
        ? [
            { label: '模式', value: modeLabel(mode) },
            { label: '撑到', value: 'Stage ' + state.stage },
            { label: '最高一刀', value: state.bestCombo + ' 连切' },
            { label: '用时', value: `${((Time.game - state.runStartedAt) / 1000).toFixed(0)} s` },
          ]
        : [
            { label: '模式', value: modeLabel(mode) },
            { label: '最高一刀', value: state.bestCombo + ' 连切' },
            { label: '用时', value: `${((Time.game - state.runStartedAt) / 1000).toFixed(0)} s` },
          ]),
      paintBoard: paintSettlementBoard,
      boardAspect: 4 / 3,
      watermark: 'zirconeey.github.io/toolbox/fruit-ninja',
    };
  }

  // ============ Init games-shell ============
  function initShell() {
    if (!window.GamesShell) return;

    if (GamesShell.Leaderboard) {
      lbWidget = GamesShell.Leaderboard.mount({
        container: document.getElementById('lb-mount'),
        gameId: 'fruit-ninja',
        title: '🏆 水果忍者排行榜',
        scoreFormatter: fmtScore,
        getCurrentNick: () => GamesShell.Identity.getNick(),
        getSplit: () => state.mode || 'classic',
        splitTabs: [
          { value: 'classic', label: '经典 60s' },
          { value: 'arcade', label: '街机三命' },
          { value: 'endless', label: '无尽闯关' },
          { value: 'zen', label: '禅意（连击×100）' },
          { value: 'comborush', label: '连击狂飙' },
          { value: 'precision', label: '精准模式' },
        ],
      });
    }
    if (GamesShell.Comments) {
      GamesShell.Comments.mount({
        container: document.getElementById('cm-mount'),
        path: '/toolbox/fruit-ninja/',
        title: '💬 来玩玩交流',
        intro: '聊聊你的最高分、最长连击，或者哪种模式最上头 ~',
        placeholder: '说点什么 ~',
      });
    }
    if (GamesShell.NickPrompt) {
      nickPrompt = GamesShell.NickPrompt.mount({
        container: document.getElementById('nick-mount'),
        prompt: '想上排行榜？起个昵称吧',
        onSubmit: nick => submitWithNick(nick),
        onSkip: () => setRank('hidden'),
      });
    }
    if (GamesShell.Settlement) {
      settleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('settle-btn-mount'),
        gameId: 'fruit-ninja',
        getOpts: getSettlementOpts,
        startDisabled: true,
      });
    }
  }

  // ============ Pre-game Overlay ============
  const fnPgoOverlay = document.getElementById('fnPreGameOverlay');
  const MODE_DESCS = {
    classic: '限时 60 秒，连切水果加奖励分。切到炸弹立即结束。',
    arcade: '三命制。漏掉水果扣一命，切到炸弹直接 Game Over。',
    endless: '无限时间，难度递增。坚持越久分越高。',
    zen: '无炸弹！纯切水果享受，连击 ×100 计分。',
    comborush: '限时连击冲刺，最短时间凑出最高连击。',
    precision: '精准模式，只切一个水果。切错扣分。',
  };
  let fnPgoSelectedMode = 'classic';

  function fnUpdatePgoMode() {
    document.querySelectorAll('#fnPgoModePicker .gs-pgo-mode-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.value === fnPgoSelectedMode);
    });
    document.getElementById('fnPgoModeDesc').textContent = MODE_DESCS[fnPgoSelectedMode] || '';
  }

  document.getElementById('fnPgoModePicker').addEventListener('click', e => {
    const t = e.target.closest('.gs-pgo-mode-tab');
    if (!t) return;
    fnPgoSelectedMode = t.dataset.value;
    fnUpdatePgoMode();
  });

  document.getElementById('fnPgoStartBtn').addEventListener('click', () => {
    fnPgoOverlay.classList.remove('open');
    initShell();
    startGame(fnPgoSelectedMode);
    // Update the mode bar below the stage to match
    document.querySelectorAll('.fn-mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === fnPgoSelectedMode);
    });
    document.getElementById('fn-mode-desc').textContent = MODE_DESCS[fnPgoSelectedMode] || '';
  });

  // ============ Boot ============
  preloadSprites().then(() => {
    fnUpdatePgoMode();
    fnPgoOverlay.classList.add('open');
  });
})();
</script>
