    let total = 0;
    for (const t of types) total += t.weight;

    for (const t of types) { r -= t.weight; if (r <= 0) return t; }

  const FNAudio = (function () {

    let muted = false, unlocked = false;
    try { muted = localStorage.getItem('fn:mute') === '1'; } catch (e) {}

    function init() {
      if (ctx) return ctx;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      try {
        ctx = new AC();
      } catch (e) {
        return null;
      }
      master = ctx.createGain();
      master.gain.value = muted ? 0 : 0.65;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -14;
      comp.knee.value = 20;
      comp.ratio.value = 6;
      comp.attack.value = 0.003;
      comp.release.value = 0.12;
      master.connect(comp);
      comp.connect(ctx.destination);
      // 预生成 1.5s 白噪声 buffer
      const dur = 1.5;
      noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      return ctx;
    }

    function unlock() {
      init();
      if (!ctx) return;
      // 必须同步：不要 .then() 包装，否则 iOS 拒绝
      if (ctx.state === 'suspended') {
        try { ctx.resume(); } catch (e) {}
      }
      unlocked = true;
    }

    function noiseSource(start, duration) {
      const src = ctx.createBufferSource();
      src.buffer = noiseBuffer;
      const maxOffset = Math.max(0, noiseBuffer.duration - duration - 0.05);
      const offset = Math.random() * maxOffset;
      src.start(start, offset);
      src.stop(start + duration + 0.02);
      return src;
    }

    function buildOut(pan) {
      const out = ctx.createGain();
      out.gain.value = 1;
      if (ctx.createStereoPanner && pan) {
        const panner = ctx.createStereoPanner();
        panner.pan.value = Math.max(-1, Math.min(1, pan));
        out.connect(panner);
        panner.connect(master);
      } else {
        out.connect(master);
      }
      return out;
    }

    function chop(opts) {
      const now = ctx.currentTime;
      const gain = (opts.gain != null) ? opts.gain : 0.55;
      const out = buildOut(opts.pan || 0);

      // 噪声切击瞬态
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 1100;
      hp.Q.value = 0.6;
      const noiseG = ctx.createGain();
      noiseG.gain.setValueAtTime(0, now);
      noiseG.gain.linearRampToValueAtTime(gain * 0.95, now + 0.003);
      noiseG.gain.exponentialRampToValueAtTime(0.001, now + 0.10);
      const ns = noiseSource(now, 0.12);
      ns.connect(hp); hp.connect(noiseG); noiseG.connect(out);

      // 三角波 thwack 主音（combo 越高音越亮）
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      const baseFreq = 280 + (opts.detune || 0) * 1.4;
      osc.frequency.setValueAtTime(baseFreq, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.09);
      const oscG = ctx.createGain();
      oscG.gain.setValueAtTime(0, now);
      oscG.gain.linearRampToValueAtTime(gain * 0.55, now + 0.005);
      oscG.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(oscG); oscG.connect(out);
      osc.start(now); osc.stop(now + 0.14);
    }

    function whoosh(opts) {
      const now = ctx.currentTime;
      const gain = (opts.gain != null) ? opts.gain : 0.32;
      const out = buildOut(opts.pan || 0);

      // 高通 + bandpass 扫频：模拟刀划破空气
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 2200;
      hp.Q.value = 0.4;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.Q.value = 1.4;
      bp.frequency.setValueAtTime(2400, now);
      bp.frequency.exponentialRampToValueAtTime(5500, now + 0.075);
      bp.frequency.exponentialRampToValueAtTime(2200, now + 0.16);

      const g = ctx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(gain, now + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

      const ns = noiseSource(now, 0.20);
      ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(out);
    }

    function bomb(opts) {
      opts = opts || {};
      const now = ctx.currentTime;
      const gain = (opts.gain != null) ? opts.gain : 0.85;
      const out = buildOut(0);

      // 初始 pop
      const pop = ctx.createOscillator();
      pop.type = 'square';
      pop.frequency.setValueAtTime(90, now);
      pop.frequency.exponentialRampToValueAtTime(35, now + 0.05);
      const popG = ctx.createGain();
      popG.gain.setValueAtTime(0, now);
      popG.gain.linearRampToValueAtTime(gain * 0.55, now + 0.003);
      popG.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
      pop.connect(popG); popG.connect(out);
      pop.start(now); pop.stop(now + 0.09);

      // 低音下行（saw + lowpass）
      const bass = ctx.createOscillator();
      bass.type = 'sawtooth';
      bass.frequency.setValueAtTime(180, now);
      bass.frequency.exponentialRampToValueAtTime(40, now + 0.35);
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(900, now);
      lp.frequency.exponentialRampToValueAtTime(120, now + 0.3);
      const bassG = ctx.createGain();
      bassG.gain.setValueAtTime(0, now);
      bassG.gain.linearRampToValueAtTime(gain * 0.6, now + 0.012);
      bassG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      bass.connect(lp); lp.connect(bassG); bassG.connect(out);
      bass.start(now); bass.stop(now + 0.55);

      // 噪声尾（残响感）
      const nlp = ctx.createBiquadFilter();
      nlp.type = 'lowpass';
      nlp.frequency.value = 600;
      const nG = ctx.createGain();
      nG.gain.setValueAtTime(0, now);
      nG.gain.linearRampToValueAtTime(gain * 0.5, now + 0.02);
      nG.gain.exponentialRampToValueAtTime(0.001, now + 0.65);
      const ns = noiseSource(now, 0.7);
      ns.connect(nlp); nlp.connect(nG); nG.connect(out);
    }

    function play(name, opts) {
      if (muted || !unlocked || !ctx) return;
      if (ctx.state !== 'running') return;
      try {
        if (name === 'chop') chop(opts || {});
        else if (name === 'bomb') bomb(opts || {});
        else if (name === 'whoosh') whoosh(opts || {});
      } catch (e) {
        // 静默：音频失败不影响游戏
      }
    }

    function setMuted(m) {
      muted = !!m;
      try { localStorage.setItem('fn:mute', muted ? '1' : '0'); } catch (e) {}
      if (master) master.gain.value = muted ? 0 : 0.65;
    }
    function isMuted() { return muted; }
    function suspend() { if (ctx && ctx.state === 'running') { try { ctx.suspend(); } catch (e) {} } }
    function resume() { if (ctx && ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} } }

    return { unlock, play, setMuted, isMuted, suspend, resume };
  })();

  // ============ 资产加载 ============
  const sprites = {};
  function loadSprite(name, src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => { sprites[name] = img; resolve(); };
      img.onerror = () => { console.warn('[fn] failed to load sprite:', name); resolve(); };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(src);
    });
  }
  function preloadSprites() {
    return Promise.all(Object.keys(SVG).map(k => loadSprite(k, SVG[k])));
  }

  // ============ DOM ============
  const canvas = document.getElementById('fn-canvas');
  const ctx = canvas.getContext('2d');
  const modeSelect = document.getElementById('mode-select');
  const stage = document.getElementById('game-stage');
  const belowStage = document.getElementById('below-stage');
  const pausedOverlay = document.getElementById('paused-overlay');
  const gameoverOverlay = document.getElementById('gameover-overlay');
  const hudTimer = document.querySelector('.hud-timer');
  const hudLives = document.querySelector('.hud-lives');
  const hudStage = document.querySelector('.hud-stage');
  const hudCombo = document.querySelector('.hud-combo');
  const bind = {};
  document.querySelectorAll('[data-bind]').forEach(el => {
    bind[el.dataset.bind] = el;
  });
  const rankRow = document.getElementById('rank-row');
  const muteBtn = document.getElementById('mute-btn');
  const perfBtn = document.getElementById('perf-btn');

  function syncMuteBtn() {
    if (!muteBtn) return;
    muteBtn.textContent = FNAudio.isMuted() ? '🔇' : '🔊';
  }
  syncMuteBtn();
  if (muteBtn) {
    muteBtn.addEventListener('click', () => {
      FNAudio.setMuted(!FNAudio.isMuted());
      syncMuteBtn();
    });
  }

  function updatePerfBtn() {
    if (!perfBtn) return;
    const label = Perf.manual ? Perf.tier.toUpperCase() : 'AUTO·' + Perf.tier.toUpperCase();
    perfBtn.textContent = label;
  }
  if (perfBtn) {
    perfBtn.addEventListener('click', () => {
      Perf.cycleManual();
      updatePerfBtn();
    });
  }
  Perf.init();
  updatePerfBtn();

  // ============ Logical canvas size ============
  // portrait 2:3，手机利用更多屏幕高度；桌面 max-width 600
  const LOG_W = 540, LOG_H = 810;
  // DPR cap 到 2：iPhone 默认 3 会让 backing buffer 像素 ×2.25，
  // 每帧 fill / drawImage 慢得多，限制 2 帧率明显回升
  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(LOG_W * dpr);
    canvas.height = Math.round(LOG_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    bakeBackground();
  }

  // ============ 霓虹背景（烘焙静态层 + 动画网格）============
  // 静态层一次烘焙到离屏 canvas（深紫天空 + 粉红夕阳 + 青色地平线 + 星点）。
  // 网格floor 每帧绘制（开销极低 ~36 条线），scroll 由 game-time 驱动。
  let bgOffscreen = null;
  const HORIZON_RATIO = 0.52;

  // 果汁印染层：独立 offscreen，每帧 destination-out 微量衰减（~2.5s 后近乎透明）
  // 性能策略：高频率小操作（一帧 destination-out fillRect），不重画所有 stain；
  // 仅在新切割时往上盖一层 splat 形状。Phase 12 会让 'low' 档关停整块（stainsEnabled=false）。
  let stainsCanvas = null;
  let stainsEnabled = true;          // Phase 12 可由 perfTier 翻转
  const JUICE_STAIN_COLOR = {
    apple: '#a01a22', orange: '#c46010',
    watermelon: '#a01a30', kiwi: '#5a8a2a',
  };

  function ensureStainsCanvas() {
    if (!stainsEnabled) return null;
    if (!stainsCanvas) {
      stainsCanvas = document.createElement('canvas');
      stainsCanvas.width = LOG_W;
      stainsCanvas.height = LOG_H;
    }
    return stainsCanvas;
  }
  function clearStains() {
    if (!stainsCanvas) return;
    stainsCanvas.getContext('2d').clearRect(0, 0, LOG_W, LOG_H);
  }
  function fadeStains() {
    if (!stainsCanvas || !stainsEnabled) return;
    const sx = stainsCanvas.getContext('2d');
    sx.save();
    sx.globalCompositeOperation = 'destination-out';
    sx.fillStyle = 'rgba(0,0,0,0.014)';   // 每帧消掉 ~1.4% alpha
    sx.fillRect(0, 0, LOG_W, LOG_H);
    sx.restore();
  }
  function spawnStain(x, y, fruitType) {
    if (!stainsEnabled) return;
    const cv = ensureStainsCanvas();
    if (!cv) return;
    const sx = cv.getContext('2d');
    const color = JUICE_STAIN_COLOR[fruitType] || '#882244';
    sx.save();
    sx.translate(x, y);
    sx.rotate(Math.random() * Math.PI * 2);
    sx.fillStyle = color;
    sx.globalAlpha = 0.5 + Math.random() * 0.22;
    // 不规则 splat：8 个角点扰动半径
    sx.beginPath();
    const baseR = 10 + Math.random() * 8;
    for (let i = 0; i < 9; i++) {
      const a = (i / 9) * Math.PI * 2;
      const r = baseR * (0.55 + Math.random() * 0.75);
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (i === 0) sx.moveTo(px, py);
      else sx.lineTo(px, py);
    }
    sx.closePath();
    sx.fill();
    // 中心高亮点（给"湿润"感）
    sx.globalAlpha *= 0.6;
    sx.beginPath();
    sx.arc(-baseR * 0.15, -baseR * 0.15, baseR * 0.3, 0, Math.PI * 2);
    sx.fillStyle = 'rgba(255,255,255,0.25)';
    sx.fill();
    sx.restore();
  }

  function bakeBackground() {
    if (!bgOffscreen) bgOffscreen = document.createElement('canvas');
    bgOffscreen.width = LOG_W;
    bgOffscreen.height = LOG_H;
    const bx = bgOffscreen.getContext('2d');
    const horizonY = LOG_H * HORIZON_RATIO;

    // 天空：深紫渐变
    const skyGrad = bx.createLinearGradient(0, 0, 0, horizonY);
    skyGrad.addColorStop(0, '#06010f');
    skyGrad.addColorStop(0.55, '#1a0838');
    skyGrad.addColorStop(1, '#3a0e5e');
    bx.fillStyle = skyGrad;
    bx.fillRect(0, 0, LOG_W, horizonY);

    // 夕阳（粉红 → 橙黄）
    const sunCx = LOG_W / 2;
    const sunCy = horizonY - 18;
    const sunR = 120;
    const sunGrad = bx.createRadialGradient(sunCx, sunCy, 6, sunCx, sunCy, sunR);
    sunGrad.addColorStop(0, '#fff8c4');
    sunGrad.addColorStop(0.28, '#ffc070');
    sunGrad.addColorStop(0.55, '#ff4ea8');
    sunGrad.addColorStop(1, 'rgba(120, 20, 90, 0)');
    bx.fillStyle = sunGrad;
    bx.beginPath();
    bx.arc(sunCx, sunCy, sunR, 0, Math.PI * 2);
    bx.fill();

    // 夕阳横条带（80s 复古蒸汽波标志）
    bx.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < 7; i++) {
      const sy = sunCy + 28 + i * 10;
      const sh = 3 + i * 0.7;
      if (sy + sh > horizonY) break;
      bx.fillRect(sunCx - sunR, sy, sunR * 2, sh);
    }
    bx.globalCompositeOperation = 'source-over';

    // 地板（地平线下方）
    const floorGrad = bx.createLinearGradient(0, horizonY, 0, LOG_H);
    floorGrad.addColorStop(0, '#0c031e');
    floorGrad.addColorStop(1, '#02000a');
    bx.fillStyle = floorGrad;
    bx.fillRect(0, horizonY, LOG_W, LOG_H - horizonY);

    // 地平线 + 青色辉光
    const glowGrad = bx.createLinearGradient(0, horizonY - 10, 0, horizonY + 10);
    glowGrad.addColorStop(0, 'rgba(0, 220, 255, 0)');
    glowGrad.addColorStop(0.5, 'rgba(0, 220, 255, 0.42)');
    glowGrad.addColorStop(1, 'rgba(0, 220, 255, 0)');
    bx.fillStyle = glowGrad;
    bx.fillRect(0, horizonY - 10, LOG_W, 20);
    bx.strokeStyle = 'rgba(120, 250, 255, 0.95)';
    bx.lineWidth = 1.5;
    bx.beginPath();
    bx.moveTo(0, horizonY);
    bx.lineTo(LOG_W, horizonY);
    bx.stroke();

    // 远景星点（仅天空区域）
    bx.fillStyle = '#ffffff';
    for (let i = 0; i < 22; i++) {
      const sx = Math.random() * LOG_W;
      const sy = Math.random() * horizonY * 0.75;
      const sr = Math.random() * 1.2 + 0.3;
      bx.globalAlpha = 0.35 + Math.random() * 0.5;
      bx.beginPath();
      bx.arc(sx, sy, sr, 0, Math.PI * 2);
      bx.fill();
    }
    bx.globalAlpha = 1;
  }

  function drawNeonGrid(gameTimeMs) {
    const horizonY = LOG_H * HORIZON_RATIO;
    const floorBottom = LOG_H;
    const numHoriz = 14;
    // 0..1 滚动循环（每 ~6s 一周），向玩家方向流
    const scroll = ((gameTimeMs * 0.00018) % 1 + 1) % 1;

    ctx.save();

    // 横向地板线（透视：靠近玩家越亮越粗，间距非线性）
    for (let i = 0; i < numHoriz; i++) {
      const t = ((i + scroll) / numHoriz) % 1;
      const yT = Math.pow(t, 2.4);                       // 透视曲线
      const y = horizonY + (floorBottom - horizonY) * yT;
      const alpha = 0.16 + 0.55 * yT;
      const isAccent = (Math.floor(i + scroll) % 4 === 0);
      ctx.strokeStyle = isAccent
        ? 'rgba(255, 90, 200, ' + alpha.toFixed(3) + ')'
        : 'rgba(0, 220, 255, ' + alpha.toFixed(3) + ')';
      ctx.lineWidth = isAccent ? 1.6 : 1.0;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(LOG_W, y);
      ctx.stroke();
    }

    // 纵向放射线（消失点在地平线中心）
    const vanishX = LOG_W / 2;
    const verts = 13;
    ctx.lineWidth = 0.9;
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.28)';
    for (let i = 0; i <= verts; i++) {
      const tX = i / verts;
      const xBottom = -LOG_W * 0.4 + tX * (LOG_W * 1.8);
      ctx.beginPath();
      ctx.moveTo(vanishX, horizonY);
      ctx.lineTo(xBottom, floorBottom);
      ctx.stroke();
    }

    ctx.restore();
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ============ State ============
  const state = {
    mode: null,             // 'classic' | 'arcade' | 'zen'
    running: false,
    paused: false,
    over: false,
    score: 0,
    combo: 0,
    bestCombo: 0,
    timeLeft: 60,
    lives: 3,
    runStartedAt: 0,
    runNonce: '',
    stage: 1,               // 无尽模式 stage 等级
    stageStartedAt: 0,      // 当前 stage 开始时间
    cameraPunchAt: 0,       // 切中后的"镜头微推"起点（wall-clock ms）
    slowMoUntil: 0,         // slow-mo 截止 game-time（0 = 不启用）
    slowMoFactor: 0.55,     // 当前 slow-mo 时的 Time.scale
    bossSpawned: false,     // 本局是否已触发 boss（arcade/endless 才有）
  };

  let fruits = [];        // active 水果 / 半个水果 / 炸弹
  let particles = [];     // 果汁飞溅
  let trail = [];         // pointer 轨迹
  let popups = [];        // 多连切提示文字
  let shockwaves = [];    // 冲击波环（炸弹）
  let sparks = [];        // 斩击火花（切中瞬间径向白光）

  const GRAVITY = 900;     // px/s²

  // ============ 触觉 / 减少动态 ============
  const reducedMotion = (() => {
    try { return window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
    catch (e) { return false; }
  })();
  function vibrate(pattern) {
    if (reducedMotion) return;
    if (!navigator.vibrate) return;
    try { navigator.vibrate(pattern); } catch (e) {}
  }

  // ============ 性能分级（FPS EMA → tier auto-demote）============
  // 三档：high（全开）/ med（无 stains + 粒子 0.6× + 刀痕去 cyan glow）
  //      / low（再去 magenta 中层 + 关 stains + 关 camera punch + 关 shake）
  // EMA < 48 持续 2s 自动降级；不自动升级（避免抖动）；用户手动按钮可强制覆盖。
  const Perf = {
    fpsEma: 60,
    badStreakMs: 0,
    autoTier: 'high',
    tier: 'high',
    manual: false,

    init() {
      if (reducedMotion) {
        this.autoTier = 'med';
        this.tier = 'med';
      }
      this.applyTier();
    },

    tick(dtWallMs) {
      if (dtWallMs <= 0 || dtWallMs > 200) return;
      const inst = 1000 / dtWallMs;
      this.fpsEma = this.fpsEma * 0.94 + inst * 0.06;
      if (this.manual) return;
      if (this.fpsEma < 48) {
        this.badStreakMs += dtWallMs;
        if (this.badStreakMs > 2000) {
          const next = this.autoTier === 'high' ? 'med'
            : this.autoTier === 'med' ? 'low'
            : 'low';
          if (next !== this.autoTier) {
            this.autoTier = next;
            this.tier = next;
            this.applyTier();
            updatePerfBtn();
          }
          this.badStreakMs = 0;
        }
      } else {
        this.badStreakMs = Math.max(0, this.badStreakMs - dtWallMs * 0.5);
      }
    },

    cycleManual() {
      // auto → high → med → low → auto
      if (!this.manual) {
        this.manual = true;
        this.tier = 'high';
      } else if (this.tier === 'high') {
        this.tier = 'med';
      } else if (this.tier === 'med') {
        this.tier = 'low';
      } else {
        this.manual = false;
        this.tier = this.autoTier;
      }
      this.applyTier();
    },

    applyTier() {
      stainsEnabled = (this.tier !== 'low');
    },
  };

  // ============ 屏幕震动 ============
  const shake = { x: 0, y: 0, startWall: 0, until: 0, strength: 0, durMs: 0 };
  function triggerShake(strength, ms) {
    if (reducedMotion) return;
    if (Perf.tier === 'low') return;
    const wall = performance.now();
    // 已有震动且更强时不打断；新震动更强则覆盖
    if (wall >= shake.until || strength * (1 - (wall - shake.startWall) / shake.durMs) < strength) {
      shake.strength = strength;
      shake.startWall = wall;
      shake.until = wall + ms;
      shake.durMs = ms;
    }
  }
  function updateShake() {
    const wall = performance.now();
    if (wall >= shake.until) { shake.x = 0; shake.y = 0; return; }
    const t = (wall - shake.startWall) / shake.durMs;     // 0..1
    const k = 1 - t;
    const amp = shake.strength * k * k;
    shake.x = (Math.random() - 0.5) * 2 * amp;
    shake.y = (Math.random() - 0.5) * 2 * amp;
  }

  // ============ 冲击波环 ============
  function spawnShockwave(x, y, opts) {
    opts = opts || {};
    shockwaves.push({
      x, y,
      r0: opts.r0 || 22,
      rMax: opts.rMax || 220,
      life: opts.life || 0.45,
      age: 0,
      colorRGB: opts.colorRGB || '255, 90, 110',
      lineWidth: opts.lineWidth || 4.5,
    });
  }
  function drawShockwaves() {
    for (const w of shockwaves) {
      const t = Math.min(1, w.age / w.life);
      const r = w.r0 + (w.rMax - w.r0) * t;
      const alpha = (1 - t) * 0.9;
      ctx.strokeStyle = 'rgba(' + w.colorRGB + ', ' + alpha.toFixed(3) + ')';
      ctx.lineWidth = w.lineWidth * (1 - t * 0.45);
      ctx.beginPath();
      ctx.arc(w.x, w.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // ============ Time 抽象 ============
  // 所有"游戏内时间"都用 Time.game（毫秒，自每局开始累计）。
  // 暂停时 Time.game 停滞；hit pause 期间 Time.game 停滞；slow-mo 时 Time.game 按 Time.scale 减速推进。
  // wall-clock 只在 RAF 取 dt 和音频调度时使用。
  const Time = {
    game: 0,         // 累积游戏时间（ms），受暂停/冻结/scale 控制
    wall: 0,         // 最近一帧的 performance.now()
    scale: 1.0,      // 时间缩放（slow-mo 时 < 1）
    frozenUntil: 0,  // hit pause 截止（game-time）；Time.game 未到则本帧 dt=0
  };
  function gameNow() {
    // pointer 事件等帧外回调用：基于上一帧 Time.game + 估算 wall-delta，更平滑
    if (state.paused || Time.game < Time.frozenUntil || !Time.wall) return Time.game;
    const d = Math.min(performance.now() - Time.wall, 100);
    return Time.game + d * Time.scale;
  }

  // ============ 输入 ============
  let pointerActive = false;
  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = LOG_W / r.width, sy = LOG_H / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }
  canvas.addEventListener('pointerdown', e => {
    if (!state.running || state.paused || state.over) return;
    FNAudio.unlock();              // 安全兜底：mode-card 之外的 user gesture
    pointerActive = true;
    state.combo = 0;              // 新一笔，重置 combo
    updateHud();
    canvas.setPointerCapture(e.pointerId);
    const p = canvasPos(e);
    trail.push({ x: p.x, y: p.y, t: gameNow() });
    e.preventDefault();
  });
  let lastWhooshWall = 0;
  canvas.addEventListener('pointermove', e => {
    if (!pointerActive) return;
    const p = canvasPos(e);
    trail.push({ x: p.x, y: p.y, t: gameNow() });
    if (state.running && !state.paused && !state.over) {
      checkSliceLastSegment();
      // 快速划动时播 whoosh（节流：120ms 内最多一次；距离阈值过滤悬停）
      if (trail.length >= 2) {
        const a = trail[trail.length - 2];
        const b = trail[trail.length - 1];
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const wall = performance.now();
        if (dist > 38 && wall - lastWhooshWall > 120) {
          lastWhooshWall = wall;
          FNAudio.play('whoosh', {
            pan: (p.x / LOG_W - 0.5) * 0.5,
            gain: Math.min(0.42, 0.18 + dist * 0.002),
          });
        }
      }
    }
  });
  function endPointer() {
    pointerActive = false;
    // Combo Rush：松手不重置 combo（只有炸弹 / 漏切才重置）
    if (state.mode !== 'comborush') state.combo = 0;
    updateHud();
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // ============ 水果生成（phase 调度：normal / burst / pinata / lull）============
  function spawnOne(t, opts) {
    opts = opts || {};
    const margin = 60;
    let x, vx, vy;
    if (opts.fanTotal) {
      // 烟花扇形：起点沿屏幕底部均匀分布，朝中心略汇聚
      const ratio = opts.fanTotal === 1 ? 0.5 : (opts.fanIndex / (opts.fanTotal - 1));
      x = margin + ratio * (LOG_W - 2 * margin);
      const dt = opts.fan === 'pinata' ? 1.45 : 1.3;
      vy = -GRAVITY * dt - 60;
      const sideOffset = (LOG_W / 2 - x) * 0.35;
      vx = sideOffset / dt + (Math.random() - 0.5) * 50;
    } else {
      x = margin + Math.random() * (LOG_W - 2 * margin);
      const targetX = LOG_W / 2 + (Math.random() - 0.5) * (LOG_W * 0.7);
      const dt = 1.2;
      vy = -GRAVITY * dt - 80;
      vx = (targetX - x) / dt + (Math.random() - 0.5) * 80;
    }
    let type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    // 炸弹概率按当前 Director act 调制（fan 形态——burst/pinata/climax——不出炸弹）
    if (state.mode !== 'zen' && !opts.fan) {
      let bombP = 0;
      const act = Director.act;
      if (act === 'Calm') bombP = 0.02;
      else if (act === 'Flow') bombP = 0.06;
      else if (act === 'Tension') bombP = 0.14;
      // Climax: no bombs（让玩家放心连切）
      if (state.mode === 'endless') bombP += endlessFactor() * 0.005;
      if (Math.random() < bombP) type = 'bomb';
    }
    const r = (type === 'watermelon') ? 38 : (type === 'kiwi') ? 32 : 30;
    const fruitObj = {
      kind: 'whole', type,
      x, y: LOG_H + r,
      vx, vy,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 6,
      r,
      bornAt: t,
    };
    // 精准模式：给每个非炸弹水果分配一个随机切线提示角度
    if (state.mode === 'precision' && type !== 'bomb') {
      fruitObj.precisionAngle = Math.random() * Math.PI;
      fruitObj.precisionHintBornAt = t;
    }
    fruits.push(fruitObj);
  }

  // ============ Director（导演式状态机：4 幕情绪曲线）============
  // Calm → Flow → Tension → Climax → 循环。每幕固定时长 + 各自的 spawn 风格 +
  // 炸弹概率梯度。模式适配器在 getModeCfg：zen 跳过 Tension/Climax，
  // classic 最后 15s 压缩，endless 按 stage 收缩节奏。
  function getModeCfg(mode) {
    if (mode === 'zen') {
      return {
        actOrder: ['Calm', 'Flow'],
        durations: { Calm: 5000, Flow: 8000 },
        spawnK: 1.0,
      };
    }
    if (mode === 'endless') {
      return {
        actOrder: ['Calm', 'Flow', 'Tension', 'Climax'],
        durations: { Calm: 3500, Flow: 9000, Tension: 5500, Climax: 4500 },
        spawnK: 1.0,
      };
    }
    if (mode === 'comborush') {
      // 持续高强度流，几乎不喘气，但保留 Climax 高潮（无炸弹幕）
      return {
        actOrder: ['Flow', 'Climax', 'Flow', 'Tension'],
        durations: { Flow: 8000, Climax: 3500, Tension: 4500, Calm: 2000 },
        spawnK: 0.85,    // 更密的 spawn
      };
    }
    if (mode === 'precision') {
      // 水果稀少：长 Calm + 短 Flow，无 Climax / Tension（炸弹仍存在但低）
      return {
        actOrder: ['Calm', 'Flow'],
        durations: { Calm: 6000, Flow: 7000 },
        spawnK: 1.55,    // 间隔放大
      };
    }
    // classic / arcade
    return {
      actOrder: ['Calm', 'Flow', 'Tension', 'Climax'],
      durations: { Calm: 4000, Flow: 10000, Tension: 5500, Climax: 4000 },
      spawnK: 1.0,
    };
  }

  const Director = {
    act: 'Calm',
    actStartedAt: 0,
    actDuration: 4000,
    nextSpawnAt: 0,
    modeCfg: null,

    reset(mode) {
      this.modeCfg = getModeCfg(mode);
      this.act = this.modeCfg.actOrder[0];
      this.actStartedAt = 0;
      this.actDuration = this.modeCfg.durations[this.act];
      this.nextSpawnAt = 800;   // 0.8s 后第一个水果
    },

    effectiveSpawnK() {
      let k = this.modeCfg.spawnK;
      if (state.mode === 'endless') k *= Math.pow(0.93, endlessFactor());
      if (state.mode === 'classic' && state.timeLeft <= 15 && state.timeLeft > 0) k *= 0.72;
      return Math.max(0.35, k);
    },

    advance(now) {
      const order = this.modeCfg.actOrder;
      const idx = order.indexOf(this.act);
      this.act = order[(idx + 1) % order.length];
      this.actStartedAt = now;
      this.actDuration = this.modeCfg.durations[this.act];
      // Climax 入场触发柔和 slow-mo（让全屏 fan 看得清）
      if (this.act === 'Climax') {
        const until = now + 1200;
        if (until > state.slowMoUntil) {
          state.slowMoUntil = until;
          state.slowMoFactor = Math.min(state.slowMoFactor || 1, 0.78);
        }
        showPopup(LOG_W / 2, LOG_H * 0.24, '🎆 来了！', '#ff90d0', true);
      }
      this.nextSpawnAt = now + (this.act === 'Calm' ? 700 : 250);
    },

    spawn(now) {
      const k = this.effectiveSpawnK();
      const act = this.act;
      if (act === 'Calm') {
        // 1-2 个慢水果，单飞抛物线
        spawnOne(now);
        this.nextSpawnAt = now + (1300 + Math.random() * 700) * k;
      } else if (act === 'Flow') {
        const group = 1 + (Math.random() < 0.40 ? 1 : 0);
        for (let i = 0; i < group; i++) {
          setTimeout(() => {
            if (state.running && !state.paused && !state.over) spawnOne(gameNow());
          }, i * 90);
        }
        this.nextSpawnAt = now + (700 + Math.random() * 400) * k;
      } else if (act === 'Tension') {
        // 小型 burst（3-4 fan）+ 炸弹混入
        if (Math.random() < 0.42) {
          const count = 3 + Math.floor(Math.random() * 2);
          for (let i = 0; i < count; i++) {
            setTimeout(() => {
              if (state.running && !state.paused && !state.over) {
                spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'burst' });
              }
            }, i * 75);
          }
          this.nextSpawnAt = now + count * 75 + (850 + Math.random() * 350) * k;
        } else {
          spawnOne(now);
          this.nextSpawnAt = now + (550 + Math.random() * 350) * k;
        }
      } else if (act === 'Climax') {
        // 大型 fan formation：7-11 水果齐发
        const count = 7 + Math.floor(Math.random() * 5);
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            if (state.running && !state.paused && !state.over) {
              spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'pinata' });
            }
          }, i * 75);
        }
        // 整个 climax 一次发完即可，剩余时间留给玩家爽切
        this.nextSpawnAt = now + this.actDuration + 1000;
      }
    },

    tick(now) {
      // Boss 触发（彩蛋）：arcade / endless 每局 1 次，~25s 后的 Flow 幕里
      if (!state.bossSpawned
          && (state.mode === 'arcade' || state.mode === 'endless')
          && now > 25000
          && this.act === 'Flow'
          && !fruits.some(f => f.boss && !f.sliced)) {
        spawnBoss(now);
        state.bossSpawned = true;
      }

      if (now - this.actStartedAt >= this.actDuration) {
        this.advance(now);
        return;
      }
      if (now >= this.nextSpawnAt) this.spawn(now);
    },
  };

  function spawnBoss(t) {
    const x = LOG_W * 0.5 + (Math.random() - 0.5) * 160;
    fruits.push({
      kind: 'whole', type: 'watermelon',
      boss: true, hp: 4, maxHp: 4,
      x, y: LOG_H + 90,
      vx: (Math.random() - 0.5) * 40,
      vy: -GRAVITY * 1.55 - 40,    // 抛得更高更慢，给玩家时间反应
      rot: 0, vrot: 0.4,
      r: 78,
      bornAt: t,
    });
    showPopup(LOG_W / 2, LOG_H * 0.18, 'BOSS', '#ff7ec0', true, '255, 80, 200');
    triggerShake(7, 240);
    FNAudio.play('bomb', { gain: 0.55 });   // 低吼登场
  }

  // ============ 切片检测 ============
  function segCircleHit(a, b, cx, cy, r) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1) {
      return Math.hypot(a.x - cx, a.y - cy) < r;
    }
    let t = ((cx - a.x) * dx + (cy - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx, py = a.y + t * dy;
    return Math.hypot(px - cx, py - cy) < r;
  }

  function checkSlices(gameNowMs) {
    if (trail.length < 2) return;
    if (gameNowMs < Time.frozenUntil) return;   // hit pause 期间不再切中
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i - 1], b = trail[i];
        if (gameNowMs - b.t > 220) continue;
        if (segCircleHit(a, b, f.x, f.y, f.r)) {
          const angle = Math.atan2(b.y - a.y, b.x - a.x);
          onSlice(f, angle);
          break;
        }
      }
    }
  }

  // 仅检测最后一段轨迹 — 在 pointermove 立即调用，让切片响应不等下一帧
  function checkSliceLastSegment() {
    if (trail.length < 2) return;
    if (Time.game < Time.frozenUntil) return;   // hit pause 内禁止再切（防 40ms 内多次堆 combo）
    const a = trail[trail.length - 2];
    const b = trail[trail.length - 1];
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      if (segCircleHit(a, b, f.x, f.y, f.r)) {
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        onSlice(f, angle);
      }
    }
  }

  function onSlice(f, angle) {
    f.sliced = true;
    if (f.type === 'bomb') {
      bombHit(f);
      return;
    }
    // Boss：前几刀只扣 HP，不分裂；最后一刀（hp 已减到 1）正常 split + reward shower
    if (f.boss && f.hp > 1) {
      f.sliced = false;   // 仍允许下次再切
      f.hp -= 1;
      // 半量粒子 + 火花
      spawnSlashSpark(f.x, f.y, angle);
      const def = FRUIT_PARTICLES[f.type] || FRUIT_PARTICLES.apple;
      const count = Math.floor(def.count * 0.45);
      for (let i = 0; i < count; i++) {
        const pt = pickParticleType(def.types);
        const a = angle + (Math.random() - 0.5) * Math.PI * 1.1;
        const sp = 100 + Math.random() * 280;
        const sz = pt.size[0] + Math.random() * (pt.size[1] - pt.size[0]);
        particles.push({
          x: f.x, y: f.y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 80,
          r: sz, color: pt.color, shape: pt.shape,
          rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 9,
          life: 0.6 + Math.random() * 0.4, age: 0,
        });
      }
      // 计分 / 反馈
      state.combo += 1;
      if (state.combo > state.bestCombo) state.bestCombo = state.combo;
      const bossPoints = 80;
      state.score += bossPoints;
      Time.frozenUntil = Time.game + 45;
      state.cameraPunchAt = performance.now();
      triggerShake(6, 160);
      vibrate(45);
      FNAudio.play('chop', { gain: 0.65, detune: -200 });   // 低沉一些
      showPopup(f.x, f.y - 54, '+' + bossPoints, '#ff9ad5', false);
      updateHud();
      return;
    }
    // Boss 最后一刀：标记 reward shower
    const isBossKill = !!f.boss;
    // combo 即「一笔切到的水果数」（pointerdown 时清零，pointerup 重置）
    state.combo += 1;
    if (state.combo > state.bestCombo) state.bestCombo = state.combo;
    // hit pause：冻结 ~35ms 让玩家感受到"切中"的重量
    Time.frozenUntil = Time.game + 35;
    // camera punch：触发后 ~200ms 缓动回零（独立于 game-time，用 wall 计时）
    state.cameraPunchAt = performance.now();
    // 高 combo 触发轻震 + 强触觉
    if (state.combo >= 5) {
      triggerShake(3 + Math.min(state.combo - 5, 5), 130);
      vibrate(35);
    } else {
      vibrate(18);
    }
    // 连击 6 一次性触发 slow-mo（每笔最多一次：crossing combo===6 时点）
    if (state.combo === 6) {
      state.slowMoUntil = Time.game + 600;
      state.slowMoFactor = 0.55;
    } else if (state.combo === 10) {
      // 单刀 10 连 → ULTRA 慢动作
      state.slowMoUntil = Time.game + 850;
      state.slowMoFactor = 0.42;
      showPopup(LOG_W / 2, LOG_H * 0.22, 'ULTRA', '#fff48b', true);
      triggerShake(8, 250);
    }
    // chop 音：combo 越高音越亮（detune 上行），位置在屏幕 pan 上反映
    FNAudio.play('chop', {
      detune: Math.min(state.combo - 1, 12) * 30,
      pan: (f.x / LOG_W - 0.5) * 0.65,
    });

    // 精准模式：切割角度与提示角度差 < 20° 则 ×3 奖励
    let precisionMult = 1;
    if (state.mode === 'precision' && f.precisionAngle != null) {
      let diff = ((angle - f.precisionAngle) % Math.PI + Math.PI) % Math.PI;
      if (diff > Math.PI / 2) diff = Math.PI - diff;
      if (diff < Math.PI / 9) {     // < 20°
        precisionMult = 3;
        showPopup(f.x, f.y - 42, 'PERFECT ×3', '#ffd95a', false);
        FNAudio.play('chop', { detune: 600, gain: 0.5 });   // 高音清脆
      }
    }
    // 计分：Combo Rush 用 combo² × 10（高 combo 指数增长），其他用 10 + (N-1)*10
    let points = state.mode === 'comborush'
      ? state.combo * state.combo * 10
      : 10 + (state.combo - 1) * 10;
    points *= precisionMult;
    state.score += points;

    // 多连提示
    if (state.combo === 2) {
      showPopup(f.x, f.y - 38, '+' + points, '#fff');
    } else if (state.combo >= 3) {
      const labels = { 3: '三连切！', 4: '四连切！', 5: '五连切！', 6: '超神！', 7: '不可阻挡！' };
      const lbl = labels[state.combo] || (state.combo + ' 连切！');
      const color = state.combo >= 5 ? '#ff7878' : '#ffd95a';
      // Combo Rush 不再叠加 milestone 奖励分（combo² 已经爆炸增长）
      const extra = state.mode === 'comborush' ? 0 : state.combo * 20;
      state.score += extra;
      // combo ≥ 4 popup 带光环；颜色随 combo 升级（青 → 粉 → 黄）
      const auraColor = state.combo >= 7 ? '255, 220, 90'
        : state.combo >= 5 ? '255, 80, 200'
        : '0, 220, 255';
      showPopup(LOG_W / 2, LOG_H * 0.32, lbl, color, true, state.combo >= 4 ? auraColor : false);
      showPopup(LOG_W / 2, LOG_H * 0.32 + 46, '+' + (points + extra), '#fff');
    }

    spawnHalves(f, angle);
    spawnJuice(f, angle);
    spawnSlashSpark(f.x, f.y, angle);
    // 2-3 个果汁印随机散布在 fruit 附近（不上 sliced 远端，避免污染整屏）
    if (stainsEnabled) {
      const stainCount = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < stainCount; i++) {
        const sx = f.x + (Math.random() - 0.5) * 90;
        const sy = f.y + (Math.random() - 0.5) * 90;
        spawnStain(sx, sy, f.type);
      }
    }
    // Boss 击杀：奖励雨（10 个小水果扇形落下）+ 重 shake + 大额加分
    if (isBossKill) {
      state.score += 300;
      showPopup(LOG_W / 2, LOG_H * 0.22, 'BOSS DOWN', '#ffd95a', true, '255, 220, 90');
      triggerShake(14, 380);
      const until = Time.game + 800;
      if (until > state.slowMoUntil) {
        state.slowMoUntil = until; state.slowMoFactor = 0.55;
      }
      const count = 10;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          if (!state.running || state.paused || state.over) return;
          spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'pinata' });
        }, 200 + i * 70);
      }
    }
    updateHud();
  }

  function spawnHalves(f, angle) {
    const nx = -Math.sin(angle), ny = Math.cos(angle);
    const speed = 280;
    const baseVx = f.vx * 0.4, baseVy = f.vy * 0.4 + 60;
    fruits.push({
      kind: 'half', type: f.type, side: 'l',
      x: f.x, y: f.y,
      vx: baseVx + nx * speed,
      vy: baseVy + ny * speed,
      rot: f.rot, vrot: f.vrot - 2,
      r: f.r,
      cutAngle: angle,
    });
    fruits.push({
      kind: 'half', type: f.type, side: 'r',
      x: f.x, y: f.y,
      vx: baseVx - nx * speed,
      vy: baseVy - ny * speed,
      rot: f.rot, vrot: f.vrot + 2,
      r: f.r,
      cutAngle: angle,
    });
  }

  function showPopup(x, y, text, color, big, aura) {
    popups.push({
      x, y, text,
      color: color || '#ffd95a',
      big: !!big,
      aura: !!aura,
      auraColor: (typeof aura === 'string') ? aura : '255, 90, 200',
      age: 0,
      life: big ? 1.4 : 0.9,
    });
  }

  function spawnSlashSpark(x, y, angle) {
    sparks.push({ x, y, angle, age: 0, life: 0.16 });
  }
  function drawSparks() {
    if (!sparks.length) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of sparks) {
      const t = s.age / s.life;
      const alpha = (1 - t) * (1 - t);
      const len = 62 * (1 - t * 0.45);
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + alpha.toFixed(3) + ')';
      ctx.lineWidth = 2.2 * (1 - t);
      ctx.lineCap = 'round';
      // 16 道径向白光，与切割角度对齐做主轴
      for (let i = 0; i < 16; i++) {
        const a = s.angle + (i / 16) * Math.PI * 2;
        const cosA = Math.cos(a), sinA = Math.sin(a);
        // 距离主切割轴越近越长
        const align = Math.abs(Math.cos(a - s.angle));   // 0..1
        const r = len * (0.55 + 0.45 * align);
        ctx.beginPath();
        ctx.moveTo(s.x + cosA * 4, s.y + sinA * 4);
        ctx.lineTo(s.x + cosA * r, s.y + sinA * r);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function spawnJuice(f, angle) {
    const def = FRUIT_PARTICLES[f.type] || FRUIT_PARTICLES.apple;
    let count = def.count;
    if (Perf.tier === 'med') count = Math.floor(count * 0.6);
    else if (Perf.tier === 'low') count = Math.floor(count * 0.35);
    for (let i = 0; i < count; i++) {
      const pt = pickParticleType(def.types);
      // 沿切割角度偏移 ±π/2，强调"裂开"方向
      const a = angle + (Math.random() - 0.5) * Math.PI * 1.05;
      const sp = 90 + Math.random() * 340;
      const sz = pt.size[0] + Math.random() * (pt.size[1] - pt.size[0]);
      particles.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 90,
        r: sz,
        color: pt.color,
        shape: pt.shape,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 9,
        life: 0.7 + Math.random() * 0.55,
        age: 0,
      });
    }
  }

  function bombHit(f) {
    flashScreen();
    FNAudio.play('bomb');
    triggerShake(20, 420);
    spawnShockwave(f ? f.x : LOG_W / 2, f ? f.y : LOG_H / 2, {
      rMax: 260, colorRGB: '255, 90, 100', lineWidth: 6, life: 0.5,
    });
    spawnShockwave(f ? f.x : LOG_W / 2, f ? f.y : LOG_H / 2, {
      r0: 8, rMax: 160, colorRGB: '255, 220, 90', lineWidth: 3, life: 0.35,
    });
    vibrate([80, 40, 80]);
    state.combo = 0;
    if (state.mode === 'endless') {
      state.lives -= 1;
      updateHud();
      showPopup(LOG_W / 2, LOG_H * 0.4, '💥 炸弹 -1 命', '#ff7878', true);
      if (state.lives <= 0) setTimeout(() => endRun('boom'), 400);
      return;
    }
    setTimeout(() => endRun('boom'), 350);
  }

  // 无尽模式 stage 升级 + 难度系数
  const STAGE_DURATION = 25;            // 每 stage 秒数
  function checkStageUp(now) {
    if (state.mode !== 'endless') return;
    const elapsed = (now - state.stageStartedAt) / 1000;
    if (elapsed < STAGE_DURATION) return;
    state.stage += 1;
    state.stageStartedAt = now;
    state.score += 100;
    let lifeMsg = '';
    // 每过 5 阶里程碑回 1 命（最多 3）
    if (state.stage % 5 === 1 && state.stage > 1 && state.lives < 3) {
      state.lives += 1;
      lifeMsg = ' · ❤+1';
    }
    showPopup(LOG_W / 2, LOG_H * 0.30, '🔥 STAGE ' + state.stage, '#ff9a44', true);
    showPopup(LOG_W / 2, LOG_H * 0.30 + 50, '难度提升 +100' + lifeMsg, '#fff');
    updateHud();
  }
  function endlessFactor() {
    // 每升 1 阶难度系数：spawn 间隔 ×0.93，burst 间隔 ×0.92，炸弹概率 +0.5%
    return Math.max(0, state.stage - 1);
  }

  let flashUntil = 0;
  function flashScreen() { flashUntil = gameNow() + 280; }

  // ============ 物理更新 ============
  function update(gameNowMs, dt) {
    if (state.mode === 'classic' || state.mode === 'comborush') {
      const limit = state.mode === 'comborush' ? 90 : 60;
      const elapsed = (gameNowMs - state.runStartedAt) / 1000;
      state.timeLeft = Math.max(0, limit - elapsed);
      if (state.timeLeft <= 0 && !state.over) {
        endRun('time');
        return;
      }
    }
    if (state.mode === 'endless') checkStageUp(gameNowMs);

    for (const f of fruits) {
      f.vy += GRAVITY * dt;
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.rot += f.vrot * dt;
    }

    // 出屏处理 + 移除 sliced 的 whole（不再渲染原水果，只剩两个 half 飞出）
    fruits = fruits.filter(f => {
      if (f.kind === 'whole' && f.sliced) return false;
      if (f.y > LOG_H + 100) {
        if (f.kind === 'whole' && !f.sliced && f.type !== 'bomb') {
          onMissed(f);
        }
        return false;
      }
      if (f.x < -120 || f.x > LOG_W + 120) return false;
      return true;
    });

    for (const p of particles) {
      p.vy += GRAVITY * 0.6 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.age += dt;
      if (p.vrot) p.rot += p.vrot * dt;
    }
    particles = particles.filter(p => p.age < p.life);

    for (const pp of popups) pp.age += dt;
    popups = popups.filter(pp => pp.age < pp.life);

    for (const w of shockwaves) w.age += dt;
    shockwaves = shockwaves.filter(w => w.age < w.life);

    for (const sp of sparks) sp.age += dt;
    sparks = sparks.filter(sp => sp.age < sp.life);

    fadeStains();

    // trail 老化（用 game-time 时间戳）
    while (trail.length > 0 && gameNowMs - trail[0].t > 220) trail.shift();
    if (trail.length > 14) trail.splice(0, trail.length - 14);

    checkSlices(gameNowMs);
    Director.tick(gameNowMs);
  }

  function onMissed(f) {
    // Combo Rush：漏切只重置 combo，不掉命也不结束
    if (state.mode === 'comborush') {
      if (state.combo > 0) {
        state.combo = 0;
        flashScreen();
        updateHud();
      }
      return;
    }
    if (state.mode !== 'arcade' && state.mode !== 'endless') return;
    state.lives -= 1;
    state.combo = 0;
    flashScreen();
    updateHud();
    if (state.lives <= 0) endRun('lives');
  }

  // ============ 渲染 ============
  function drawFruit(f) {
    let img;
    if (f.kind === 'whole') {
      img = sprites[f.type === 'bomb' ? 'bomb' : (f.type + '_whole')];
    } else {
      img = sprites[f.type + '_half'];
    }
    if (!img) return;
    const size = f.r * 2.4;

    // Boss aura + HP bar
    if (f.boss && !f.sliced) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const pulse = 0.85 + 0.15 * Math.sin(Time.game * 0.008);
      const aR = f.r * 1.35 * pulse;
      const ag = ctx.createRadialGradient(f.x, f.y, f.r * 0.7, f.x, f.y, aR);
      ag.addColorStop(0, 'rgba(255, 90, 200, 0.4)');
      ag.addColorStop(1, 'rgba(255, 90, 200, 0)');
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.arc(f.x, f.y, aR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    if (f.kind === 'half' && f.side === 'r') ctx.scale(-1, 1);
    ctx.drawImage(img, -size / 2, -size / 2, size, size);
    ctx.restore();

    // Boss HP bar（在 fruit 上方）
    if (f.boss && !f.sliced && f.hp > 0) {
      const w = 100, h = 6;
      const bx = f.x - w / 2, by = f.y - f.r - 18;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx, by, w, h);
      const hpR = f.hp / f.maxHp;
      ctx.fillStyle = hpR > 0.5 ? '#ff9aa5' : '#ff4060';
      ctx.fillRect(bx, by, w * hpR, h);
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, w, h);
    }
  }

  function drawPrecisionHints() {
    const now = Time.game;
    ctx.save();
    ctx.lineCap = 'round';
    for (const f of fruits) {
      if (f.precisionAngle == null || f.kind !== 'whole' || f.sliced) continue;
      const age = (now - f.precisionHintBornAt) / 1000;     // 秒
      const fade = Math.max(0.15, 1 - age / 1.2);
      ctx.translate(0, 0);
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.precisionAngle);
      // 双层：外发光 + 内点划
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(255, 240, 90, ' + (fade * 0.32).toFixed(3) + ')';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-f.r * 1.7, 0);
      ctx.lineTo(f.r * 1.7, 0);
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(255, 250, 180, ' + fade.toFixed(3) + ')';
      ctx.lineWidth = 1.6;
      ctx.setLineDash([7, 5]);
      ctx.beginPath();
      ctx.moveTo(-f.r * 1.7, 0);
      ctx.lineTo(f.r * 1.7, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawTrail() {
    if (trail.length < 2) return;
    const now = Time.game;
    // 预收集有效段（按 age + 速度调制）
    const segs = [];
    for (let i = 1; i < trail.length; i++) {
      const a = trail[i - 1], b = trail[i];
      const age = (now - b.t) / 220;
      const alpha = Math.max(0, 1 - age);
      if (alpha < 0.03) continue;
      const d = Math.hypot(b.x - a.x, b.y - a.y);
      // 划得越快越锐（lineWidth 缩到 ~0.5×）；悬停/慢移则更粗
      const speedK = 1 - Math.min(1, d / 70) * 0.45;
      segs.push({ a, b, alpha, speedK });
    }
    if (!segs.length) return;

    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const tier = Perf.tier;
    // Combo Rush 高 combo 时调色板切到火焰（红/黄）
    const fireMode = state.mode === 'comborush' && state.combo >= 10;
    const glowColor = fireMode ? '255, 80, 30' : '0, 220, 255';
    const midColor  = fireMode ? '255, 200, 60' : '255, 90, 210';
    const coreColor = fireMode ? '255, 255, 200' : '255, 255, 255';

    // 外层 glow（cyan / 火橙；仅 high 档）
    if (tier === 'high') {
      ctx.globalCompositeOperation = 'lighter';
      for (const s of segs) {
        ctx.strokeStyle = 'rgba(' + glowColor + ', ' + (s.alpha * 0.30).toFixed(3) + ')';
        ctx.lineWidth = 17 * s.alpha * s.speedK;
        ctx.beginPath();
        ctx.moveTo(s.a.x, s.a.y);
        ctx.lineTo(s.b.x, s.b.y);
        ctx.stroke();
      }
    }
    // 中层 magenta / 火黄（high + med）
    if (tier !== 'low') {
      ctx.globalCompositeOperation = 'lighter';
      for (const s of segs) {
        ctx.strokeStyle = 'rgba(' + midColor + ', ' + (s.alpha * 0.55).toFixed(3) + ')';
        ctx.lineWidth = 7.5 * s.alpha * s.speedK;
        ctx.beginPath();
        ctx.moveTo(s.a.x, s.a.y);
        ctx.lineTo(s.b.x, s.b.y);
        ctx.stroke();
      }
    }
    // 核心锐线（所有档）
    ctx.globalCompositeOperation = 'source-over';
    for (const s of segs) {
      ctx.strokeStyle = 'rgba(' + coreColor + ', ' + (s.alpha * 0.95).toFixed(3) + ')';
      ctx.lineWidth = 2.2 * Math.max(0.45, s.alpha);
      ctx.beginPath();
      ctx.moveTo(s.a.x, s.a.y);
      ctx.lineTo(s.b.x, s.b.y);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawPopups() {
    for (const p of popups) {
      const t = p.age / p.life;
      const a = Math.max(0, 1 - t);
      const yOff = -55 * t * t;

      // 连击光环：在文字下方一圈扩散彩色 ring（仅 aura popup）
      if (p.aura) {
        const auraT = Math.min(1, p.age / 0.6);
        const auraR = 32 + 96 * auraT;
        const auraA = a * (1 - auraT * 0.85);
        if (auraA > 0.02) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.translate(p.x, p.y + yOff);
          ctx.strokeStyle = 'rgba(' + p.auraColor + ', ' + auraA.toFixed(3) + ')';
          ctx.lineWidth = 5 * (1 - auraT * 0.5);
          ctx.beginPath();
          ctx.arc(0, 0, auraR, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      const scale = p.big ? (1 + Math.sin(Math.min(t * 6, Math.PI)) * 0.15) : 1;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y + yOff);
      ctx.scale(scale, scale);
      ctx.font = (p.big ? '700 32px ' : '600 18px ') + 'Georgia, "Noto Serif SC", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = p.big ? 4 : 2.5;
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.strokeText(p.text, 0, 0);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      const t = p.age / p.life;
      const alpha = Math.max(0, 1 - t);
      const sz = p.r * (1 - t * 0.35);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      if (p.rot) ctx.rotate(p.rot);
      if (p.shape === 'oval') {
        ctx.beginPath();
        ctx.ellipse(0, 0, sz * 0.55, sz, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'rect') {
        ctx.fillRect(-sz, -sz * 0.45, sz * 2, sz * 0.9);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, sz, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    // 屏幕震动（wall-clock 驱动，叠加在 camera punch 之外）
    updateShake();
    const shakeOn = shake.x !== 0 || shake.y !== 0;
    if (shakeOn) {
      ctx.save();
      ctx.translate(shake.x, shake.y);
    }
    // camera punch：切中瞬间镜头微推 1.04×，200ms 内缓动回零（独立 wall-clock）
    // 'low' 档跳过（避免移动端额外的 transform 成本）
    let cs = 1.0;
    if (state.cameraPunchAt && Perf.tier !== 'low') {
      const dt = performance.now() - state.cameraPunchAt;
      if (dt < 200) {
        const k = 1 - dt / 200;
        cs = 1 + 0.04 * k * k;   // 二次缓动
      }
    }
    const cameraOn = cs !== 1.0;
    if (cameraOn) {
      ctx.save();
      ctx.translate(LOG_W / 2, LOG_H / 2);
      ctx.scale(cs, cs);
      ctx.translate(-LOG_W / 2, -LOG_H / 2);
    }

    // 背景（烘焙的霓虹场景 + 动画网格）
    if (bgOffscreen) {
      ctx.drawImage(bgOffscreen, 0, 0, LOG_W, LOG_H);
    } else {
      ctx.fillStyle = '#0a0418';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }
    drawNeonGrid(Time.game);

    // 果汁残印（在水果下方）
    if (stainsCanvas && stainsEnabled) {
      ctx.drawImage(stainsCanvas, 0, 0, LOG_W, LOG_H);
    }

    // 精准模式：切线提示（在水果之下）
    if (state.mode === 'precision') drawPrecisionHints();
    // 水果
    for (const f of fruits) drawFruit(f);
    drawParticles();
    drawShockwaves();
    drawSparks();
    drawTrail();
    drawPopups();

    // 闪屏
    const now = Time.game;
    if (now < flashUntil) {
      const a = (flashUntil - now) / 280;
      ctx.fillStyle = 'rgba(255, 80, 80, ' + (a * 0.5).toFixed(3) + ')';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }

    if (cameraOn) ctx.restore();
    if (shakeOn) ctx.restore();
  }

  // ============ HUD ============
  function updateHud() {
    bind.score.textContent = String(Math.round(state.score));
    if (state.combo >= 2) {
      hudCombo.classList.remove('hidden');
      bind.combo.textContent = String(state.combo);
    } else {
      hudCombo.classList.add('hidden');
    }
    if (state.mode === 'classic' || state.mode === 'comborush') {
      bind.timer.textContent = state.timeLeft.toFixed(1);
    }
    if (state.mode === 'arcade' || state.mode === 'endless') {
      bind.lives.textContent = '❤'.repeat(state.lives) + '🤍'.repeat(Math.max(0, 3 - state.lives));
    }
    if (state.mode === 'endless') {
      bind.stage.textContent = String(state.stage);
    }
  }

  // ============ 主循环 ============
  let rafId = 0;
  let lastWall = 0;        // 上一帧的 performance.now()（wall-clock）

  // 每帧根据当前情绪触发条件计算 Time.scale（≤1.0）
  function updateTimeScale() {
    let scale = 1.0;
    // 高 combo slow-mo（game-time gated）
    if (state.slowMoUntil && Time.game < state.slowMoUntil) {
      scale = Math.min(scale, state.slowMoFactor);
    }
    // 经典模式最后 5 秒：戏剧性收尾
    if (state.mode === 'classic' && state.timeLeft > 0 && state.timeLeft <= 5) {
      scale = Math.min(scale, 0.7);
    }
    Time.scale = scale;
  }

  function loop(now) {
    if (state.over || !state.running) return;
    if (!state.paused) {
      updateTimeScale();
      const dtWall = lastWall ? Math.min(now - lastWall, 50) : 0;
      Perf.tick(dtWall);
      // hit pause：Time.game 暂停推进，但仍渲染（让玩家看到冻结瞬间）
      const isFrozen = Time.game < Time.frozenUntil;
      const dtGameMs = isFrozen ? 0 : dtWall * Time.scale;
      Time.game += dtGameMs;
      Time.wall = now;
      update(Time.game, dtGameMs / 1000);
      render();
      updateHud();
    }
    lastWall = now;
    rafId = requestAnimationFrame(loop);
  }

  // ============ 模式 / 流程 ============
  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => {
      // iOS Safari 需要在 user gesture 内同步 resume AudioContext
      FNAudio.unlock();
      startGame(card.dataset.mode);
    });
  });

  function startGame(mode) {
    state.mode = mode;
    state.running = true;
    state.paused = false;
    state.over = false;
    state.score = 0;
    state.combo = 0;
    state.bestCombo = 0;
    state.timeLeft = (mode === 'comborush') ? 90 : 60;
    state.lives = 3;
    // 重置 Time：每局 game-time 从 0 起算
    Time.game = 0;
    Time.scale = 1.0;
    Time.frozenUntil = 0;
    Time.wall = 0;
    lastWall = 0;
    state.runStartedAt = 0;
    state.runNonce = (window.GamesShell && GamesShell.Identity) ? GamesShell.Identity.newRunNonce() : ('r-' + Date.now());
    fruits = [];
    particles = [];
    trail = [];
    popups = [];
    shockwaves = [];
    sparks = [];
    clearStains();
    flashUntil = 0;
    Director.reset(mode);
    state.stage = 1;
    state.stageStartedAt = 0;
    state.cameraPunchAt = 0;
    state.slowMoUntil = 0;
    state.slowMoFactor = 0.55;
    state.bossSpawned = false;

    modeSelect.hidden = true;
    stage.hidden = false;
    belowStage.hidden = true;
    gameoverOverlay.hidden = true;
    pausedOverlay.hidden = true;

    hudTimer.hidden = !(mode === 'classic' || mode === 'comborush');
    hudLives.hidden = !(mode === 'arcade' || mode === 'endless');
    hudStage.hidden = mode !== 'endless';
    bind.score.textContent = '0';
    bind.timer.textContent = ((mode === 'comborush') ? 90 : 60).toFixed(1);
    bind.lives.textContent = '❤❤❤';
    bind.stage.textContent = '1';
    hudCombo.classList.add('hidden');

    pendingSubmit = false;
    resetRank();

    preloadSprites().then(() => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
  }

  function endRun(reason) {
    if (state.over) return;
    state.over = true;
    state.running = false;
    cancelAnimationFrame(rafId);

    let title = '时间到';
    if (reason === 'boom') title = state.mode === 'endless' ? '撑住了，但还是炸了 💥' : '炸弹被切到了！';
    else if (reason === 'lives') title = state.mode === 'endless' ? `撑到 Stage ${state.stage}！` : '漏切太多';
    else if (reason === 'manual') title = '本局结束';

    const lines = [];
    lines.push(state.mode === 'zen'
      ? `<strong>最高连击 ${state.bestCombo}</strong>`
      : `<strong>${Math.round(state.score)} 分</strong>`);
    if (state.mode === 'endless') {
      lines.push(`Stage ${state.stage} · 最高一刀 ${state.bestCombo} 连切 · 用时 ${((Time.game - state.runStartedAt)/1000).toFixed(0)}s`);
    } else if (state.mode !== 'zen') {
      lines.push(`最高连击 ${state.bestCombo} · 用时 ${((Time.game - state.runStartedAt)/1000).toFixed(0)}s`);
    } else {
      lines.push(`累计得分 ${Math.round(state.score)}`);
    }

    bind['go-title'].textContent = title;
    bind['go-stats'].innerHTML = lines.join('<br>');

    if (state.mode === 'zen' && reason !== 'manual') {
      // 禅意只有手动结束
      gameoverOverlay.hidden = true;
    } else {
      gameoverOverlay.hidden = false;
    }
    belowStage.hidden = false;

    // 排行榜：切到当前模式 tab
    if (lbWidget) lbWidget.setSplit(state.mode);

    tryAutoSubmit();
    if (settleBtn) settleBtn.setEnabled(true);

    // 1.5 秒后清空残余水果
    setTimeout(() => {
      if (state.over) {
        fruits = [];
        particles = [];
        popups = [];
        render();
      }
    }, 1500);
  }

  // ============ 暂停 ============
  document.getElementById('pause-btn').addEventListener('click', () => {
    if (state.over || !state.running) return;
    state.paused = true;
    pausedOverlay.hidden = false;
    FNAudio.suspend();
  });
  document.getElementById('resume-btn').addEventListener('click', () => {
    state.paused = false;
    pausedOverlay.hidden = true;
    lastWall = 0;             // 防止 resume 后第一帧累积巨大 dt
    FNAudio.resume();
    rafId = requestAnimationFrame(loop);
  });
  document.getElementById('quit-btn').addEventListener('click', () => {
    if (confirm('退出当前局？分数会保留并尝试上传')) {
      pausedOverlay.hidden = true;
      endRun('manual');
    }
  });
  document.getElementById('restart-btn').addEventListener('click', () => {
    startGame(state.mode);
  });
  document.getElementById('changemode-btn').addEventListener('click', () => {
    state.over = true;
    state.running = false;
    stage.hidden = true;
    modeSelect.hidden = false;
    belowStage.hidden = true;
    fruits = []; particles = []; trail = []; popups = [];
    cancelAnimationFrame(rafId);
    render();
  });

  // ============ Visibility：自动暂停 ============
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.running && !state.over && !state.paused) {
      state.paused = true;
      pausedOverlay.hidden = false;
      FNAudio.suspend();
    }
  });

  // ============ 排行榜 / 评论 / 结算 接入 ============
  let lbWidget = null;
  let nickPrompt = null;
  let settleBtn = null;
  let pendingSubmit = false;
  let lastRankInfo = null;

  function modeLabel(m) {
    if (m === 'classic') return '经典 60s';
    if (m === 'arcade') return '街机三命';
    if (m === 'endless') return '无尽闯关';
    if (m === 'zen') return '禅意';
    if (m === 'comborush') return '连击狂飙';
    if (m === 'precision') return '精准模式';
    return m;
  }

  function getSubmitScore() {
    if (state.mode === 'zen') return state.bestCombo * 100;
    return Math.round(state.score);
  }
  function fmtScore(v) {
    return Number(v).toLocaleString();
  }

  function setRank(name, data) {
    if (name === 'hidden') {
      rankRow.classList.remove('failed');
      rankRow.innerHTML = '';
      lastRankInfo = null;
      return;
    }
    rankRow.classList.remove('failed');
    if (name === 'loading') {
      rankRow.textContent = '排名上传中…';
      lastRankInfo = { mode: modeLabel(state.mode) };
    } else if (name === 'failed') {
      rankRow.classList.add('failed');
      rankRow.textContent = '排行榜暂时不可用（不影响游戏）';
      lastRankInfo = { failed: true, mode: modeLabel(state.mode) };
    } else if (name === 'pending') {
      rankRow.classList.add('failed');
      rankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
      lastRankInfo = { pending: true, mode: modeLabel(state.mode) };
    } else if (name === 'success' && data && data.rank && data.total) {
      rankRow.innerHTML = '';
      rankRow.append(
        document.createTextNode(modeLabel(state.mode) + ' · 第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
      lastRankInfo = { rank: data.rank, total: data.total, mode: modeLabel(state.mode) };
    }
  }
  function resetRank() { setRank('hidden'); }

  async function submitWithNick(nick) {
    if (!nick || pendingSubmit) return;
    const score = getSubmitScore();
    if (score <= 0) { setRank('hidden'); return; }
    pendingSubmit = true;
    setRank('loading');
    const r = await GamesShell.Leaderboard.submit({
      gameId: 'fruit-ninja',
      nick,
      score,
      durationMs: Math.max(3000, Math.round(Time.game - state.runStartedAt)),
      clientNonce: state.runNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra: { mode: state.mode, bestCombo: state.bestCombo, stage: state.stage },
    });
    if (r && r.ok) {
      setRank('success', { rank: r.rank, total: r.total });
      if (lbWidget) lbWidget.refresh();
      return;
    }
    pendingSubmit = false;
    if (r && r.reason === 'nick_taken') {
      GamesShell.Identity.clearNick();
      alert('"' + nick + '" 已被别的玩家占用，请换一个昵称');
      setRank('pending');
      if (nickPrompt) { nickPrompt.refresh(); nickPrompt.show(); }
      return;
    }
    setRank('failed');
    if (r && r.reason) console.warn('[fruit-ninja] submit rejected:', r.reason);
  }

  function tryAutoSubmit() {
    if (getSubmitScore() <= 0) { setRank('hidden'); return; }
    const nick = GamesShell.Identity.getNick();
    if (nick) submitWithNick(nick);
    else { setRank('pending'); nickPrompt && nickPrompt.show(); }
  }

  // ============ 结算图 ============
  function paintSettlementBoard(ctx2, x, y, w, h) {
    const grad = ctx2.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, '#2a3a52');
    grad.addColorStop(1, '#1a2436');
    ctx2.fillStyle = grad;
    ctx2.fillRect(x, y, w, h);

    // 散布几个水果
    const samples = ['apple_whole', 'orange_whole', 'watermelon_whole', 'kiwi_whole'];
    const cx = x + w / 2, cy = y + h / 2;
    samples.forEach((name, i) => {
      const img = sprites[name];
      if (!img) return;
      const angle = (i / samples.length) * Math.PI * 2 - Math.PI / 2;
      const rr = Math.min(w, h) * 0.3;
      const fx = cx + Math.cos(angle) * rr;
      const fy = cy + Math.sin(angle) * rr;
      const size = Math.min(w, h) * 0.22;
      ctx2.save();
      ctx2.translate(fx, fy);
      ctx2.rotate(angle);
      ctx2.drawImage(img, -size / 2, -size / 2, size, size);
      ctx2.restore();
    });

    // 中心刀光
    ctx2.save();
    ctx2.strokeStyle = 'rgba(255, 240, 180, 0.85)';
    ctx2.lineWidth = Math.min(w, h) * 0.012;
    ctx2.lineCap = 'round';
    ctx2.beginPath();
    ctx2.moveTo(x + w * 0.2, y + h * 0.7);
    ctx2.quadraticCurveTo(x + w * 0.5, y + h * 0.2, x + w * 0.8, y + h * 0.7);
    ctx2.stroke();
    ctx2.restore();

    // 中心 emoji
    ctx2.fillStyle = '#fff';
    ctx2.font = `${Math.min(w, h) * 0.18}px Georgia, serif`;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText('🍉', cx, cy);
  }

  function getSettlementOpts() {
    const ri = lastRankInfo || {};
    const mode = state.mode;
    return {
      kind: 'single',
      gameId: 'fruit-ninja',
      title: '水果忍者',
      emoji: '🍉',
      nick: GamesShell.Identity.getNick(),
      score: getSubmitScore(),
      scoreLabel: mode === 'zen' ? '最 高 连 击 × 100' : '本 局 得 分',
      scoreFormatter: fmtScore,
      rankInfo: ri,
      stats: (mode === 'endless'
        ? [
            { label: '模式', value: modeLabel(mode) },
            { label: '撑到', value: 'Stage ' + state.stage },
            { label: '最高一刀', value: state.bestCombo + ' 连切' },
            { label: '用时', value: `${((Time.game - state.runStartedAt) / 1000).toFixed(0)} s` },
          ]
        : [
            { label: '模式', value: modeLabel(mode) },
            { label: '最高一刀', value: state.bestCombo + ' 连切' },
            { label: '用时', value: `${((Time.game - state.runStartedAt) / 1000).toFixed(0)} s` },
          ]),
      paintBoard: paintSettlementBoard,
      boardAspect: 4 / 3,
      watermark: 'zirconeey.github.io/toolbox/fruit-ninja',
    };
  }

  // ============ Init games-shell ============
  function initShell() {
    if (!window.GamesShell) return;

    if (GamesShell.Leaderboard) {
      lbWidget = GamesShell.Leaderboard.mount({
        container: document.getElementById('lb-mount'),
        gameId: 'fruit-ninja',
        title: '🏆 水果忍者排行榜',
        scoreFormatter: fmtScore,
        getCurrentNick: () => GamesShell.Identity.getNick(),
        getSplit: () => state.mode || 'classic',
        splitTabs: [
          { value: 'classic', label: '经典 60s' },
          { value: 'arcade', label: '街机三命' },
          { value: 'endless', label: '无尽闯关' },
          { value: 'zen', label: '禅意（连击×100）' },
          { value: 'comborush', label: '连击狂飙' },
          { value: 'precision', label: '精准模式' },
        ],
      });
    }
    if (GamesShell.Comments) {
      GamesShell.Comments.mount({
        container: document.getElementById('cm-mount'),
        path: '/toolbox/fruit-ninja/',
        title: '💬 来玩玩交流',
        intro: '聊聊你的最高分、最长连击，或者哪种模式最上头 ~',
        placeholder: '说点什么 ~',
      });
    }
    if (GamesShell.NickPrompt) {
      nickPrompt = GamesShell.NickPrompt.mount({
        container: document.getElementById('nick-mount'),
        prompt: '想上排行榜？起个昵称吧',
        onSubmit: nick => submitWithNick(nick),
        onSkip: () => setRank('hidden'),
      });
    }
    if (GamesShell.Settlement) {
      settleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('settle-btn-mount'),
        gameId: 'fruit-ninja',
        getOpts: getSettlementOpts,
        startDisabled: true,
      });
    }
  }

  // ============ Boot ============
  preloadSprites().then(() => {
    initShell();
    // 模式选择页面也预先画一帧
    render();
  });
})();
</script>
