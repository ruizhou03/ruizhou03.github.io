      + '<rect x="38" y="14" width="4" height="6" fill="#3a2a1a"/>'

  const FRUIT_TYPES = ['apple', 'orange', 'watermelon', 'kiwi'];
  const JUICE_COLOR = {
    apple: '#e64545', orange: '#ffaa44',
    watermelon: '#ff5560', kiwi: '#a8d050',
  };

  // ============ 资产加载 ============
  const sprites = {};
  function loadSprite(name, src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => { sprites[name] = img; resolve(); };
      img.onerror = () => { console.warn('[fn] failed to load sprite:', name); resolve(); };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(src);
    });
  }
  function preloadSprites() {
    return Promise.all(Object.keys(SVG).map(k => loadSprite(k, SVG[k])));
  }

  // ============ DOM ============
  const canvas = document.getElementById('fn-canvas');
  const ctx = canvas.getContext('2d');
  const modeSelect = document.getElementById('mode-select');
  const stage = document.getElementById('game-stage');
  const belowStage = document.getElementById('below-stage');
  const pausedOverlay = document.getElementById('paused-overlay');
  const gameoverOverlay = document.getElementById('gameover-overlay');
  const hudTimer = document.querySelector('.hud-timer');
  const hudLives = document.querySelector('.hud-lives');
  const hudStage = document.querySelector('.hud-stage');
  const hudCombo = document.querySelector('.hud-combo');
  const bind = {};
  document.querySelectorAll('[data-bind]').forEach(el => {
    bind[el.dataset.bind] = el;
  });
  const rankRow = document.getElementById('rank-row');

  // ============ Logical canvas size ============
  // portrait 2:3，手机利用更多屏幕高度；桌面 max-width 600
  const LOG_W = 540, LOG_H = 810;
  // DPR cap 到 2：iPhone 默认 3 会让 backing buffer 像素 ×2.25，
  // 每帧 fill / drawImage 慢得多，限制 2 帧率明显回升
  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(LOG_W * dpr);
    canvas.height = Math.round(LOG_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    bakeBackground();
  }

  // ============ 霓虹背景（烘焙静态层 + 动画网格）============
  // 静态层一次烘焙到离屏 canvas（深紫天空 + 粉红夕阳 + 青色地平线 + 星点）。
  // 网格floor 每帧绘制（开销极低 ~36 条线），scroll 由 game-time 驱动。
  let bgOffscreen = null;
  const HORIZON_RATIO = 0.52;

  function bakeBackground() {
    if (!bgOffscreen) bgOffscreen = document.createElement('canvas');
    bgOffscreen.width = LOG_W;
    bgOffscreen.height = LOG_H;
    const bx = bgOffscreen.getContext('2d');
    const horizonY = LOG_H * HORIZON_RATIO;

    // 天空：深紫渐变
    const skyGrad = bx.createLinearGradient(0, 0, 0, horizonY);
    skyGrad.addColorStop(0, '#06010f');
    skyGrad.addColorStop(0.55, '#1a0838');
    skyGrad.addColorStop(1, '#3a0e5e');
    bx.fillStyle = skyGrad;
    bx.fillRect(0, 0, LOG_W, horizonY);

    // 夕阳（粉红 → 橙黄）
    const sunCx = LOG_W / 2;
    const sunCy = horizonY - 18;
    const sunR = 120;
    const sunGrad = bx.createRadialGradient(sunCx, sunCy, 6, sunCx, sunCy, sunR);
    sunGrad.addColorStop(0, '#fff8c4');
    sunGrad.addColorStop(0.28, '#ffc070');
    sunGrad.addColorStop(0.55, '#ff4ea8');
    sunGrad.addColorStop(1, 'rgba(120, 20, 90, 0)');
    bx.fillStyle = sunGrad;
    bx.beginPath();
    bx.arc(sunCx, sunCy, sunR, 0, Math.PI * 2);
    bx.fill();

    // 夕阳横条带（80s 复古蒸汽波标志）
    bx.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < 7; i++) {
      const sy = sunCy + 28 + i * 10;
      const sh = 3 + i * 0.7;
      if (sy + sh > horizonY) break;
      bx.fillRect(sunCx - sunR, sy, sunR * 2, sh);
    }
    bx.globalCompositeOperation = 'source-over';

    // 地板（地平线下方）
    const floorGrad = bx.createLinearGradient(0, horizonY, 0, LOG_H);
    floorGrad.addColorStop(0, '#0c031e');
    floorGrad.addColorStop(1, '#02000a');
    bx.fillStyle = floorGrad;
    bx.fillRect(0, horizonY, LOG_W, LOG_H - horizonY);

    // 地平线 + 青色辉光
    const glowGrad = bx.createLinearGradient(0, horizonY - 10, 0, horizonY + 10);
    glowGrad.addColorStop(0, 'rgba(0, 220, 255, 0)');
    glowGrad.addColorStop(0.5, 'rgba(0, 220, 255, 0.42)');
    glowGrad.addColorStop(1, 'rgba(0, 220, 255, 0)');
    bx.fillStyle = glowGrad;
    bx.fillRect(0, horizonY - 10, LOG_W, 20);
    bx.strokeStyle = 'rgba(120, 250, 255, 0.95)';
    bx.lineWidth = 1.5;
    bx.beginPath();
    bx.moveTo(0, horizonY);
    bx.lineTo(LOG_W, horizonY);
    bx.stroke();

    // 远景星点（仅天空区域）
    bx.fillStyle = '#ffffff';
    for (let i = 0; i < 22; i++) {
      const sx = Math.random() * LOG_W;
      const sy = Math.random() * horizonY * 0.75;
      const sr = Math.random() * 1.2 + 0.3;
      bx.globalAlpha = 0.35 + Math.random() * 0.5;
      bx.beginPath();
      bx.arc(sx, sy, sr, 0, Math.PI * 2);
      bx.fill();
    }
    bx.globalAlpha = 1;
  }

  function drawNeonGrid(gameTimeMs) {
    const horizonY = LOG_H * HORIZON_RATIO;
    const floorBottom = LOG_H;
    const numHoriz = 14;
    // 0..1 滚动循环（每 ~6s 一周），向玩家方向流
    const scroll = ((gameTimeMs * 0.00018) % 1 + 1) % 1;

    ctx.save();

    // 横向地板线（透视：靠近玩家越亮越粗，间距非线性）
    for (let i = 0; i < numHoriz; i++) {
      const t = ((i + scroll) / numHoriz) % 1;
      const yT = Math.pow(t, 2.4);                       // 透视曲线
      const y = horizonY + (floorBottom - horizonY) * yT;
      const alpha = 0.16 + 0.55 * yT;
      const isAccent = (Math.floor(i + scroll) % 4 === 0);
      ctx.strokeStyle = isAccent
        ? 'rgba(255, 90, 200, ' + alpha.toFixed(3) + ')'
        : 'rgba(0, 220, 255, ' + alpha.toFixed(3) + ')';
      ctx.lineWidth = isAccent ? 1.6 : 1.0;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(LOG_W, y);
      ctx.stroke();
    }

    // 纵向放射线（消失点在地平线中心）
    const vanishX = LOG_W / 2;
    const verts = 13;
    ctx.lineWidth = 0.9;
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.28)';
    for (let i = 0; i <= verts; i++) {
      const tX = i / verts;
      const xBottom = -LOG_W * 0.4 + tX * (LOG_W * 1.8);
      ctx.beginPath();
      ctx.moveTo(vanishX, horizonY);
      ctx.lineTo(xBottom, floorBottom);
      ctx.stroke();
    }

    ctx.restore();
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ============ State ============
  const state = {
    mode: null,             // 'classic' | 'arcade' | 'zen'
    running: false,
    paused: false,
    over: false,
    score: 0,
    combo: 0,
    bestCombo: 0,
    timeLeft: 60,
    lives: 3,
    runStartedAt: 0,
    runNonce: '',
    stage: 1,               // 无尽模式 stage 等级
    stageStartedAt: 0,      // 当前 stage 开始时间
  };

  let fruits = [];        // active 水果 / 半个水果 / 炸弹
  let particles = [];     // 果汁飞溅
  let trail = [];         // pointer 轨迹
  let popups = [];        // 多连切提示文字

  const GRAVITY = 900;     // px/s²

  // ============ Time 抽象 ============
  // 所有"游戏内时间"都用 Time.game（毫秒，自每局开始累计）。
  // 暂停时 Time.game 停滞；hit pause 期间 Time.game 停滞；slow-mo 时 Time.game 按 Time.scale 减速推进。
  // wall-clock 只在 RAF 取 dt 和音频调度时使用。
  const Time = {
    game: 0,         // 累积游戏时间（ms），受暂停/冻结/scale 控制
    wall: 0,         // 最近一帧的 performance.now()
    scale: 1.0,      // 时间缩放（slow-mo 时 < 1）
    frozenUntil: 0,  // hit pause 截止（game-time）；Time.game 未到则本帧 dt=0
  };
  function gameNow() {
    // pointer 事件等帧外回调用：基于上一帧 Time.game + 估算 wall-delta，更平滑
    if (state.paused || Time.game < Time.frozenUntil || !Time.wall) return Time.game;
    const d = Math.min(performance.now() - Time.wall, 100);
    return Time.game + d * Time.scale;
  }

  // ============ 输入 ============
  let pointerActive = false;
  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = LOG_W / r.width, sy = LOG_H / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }
  canvas.addEventListener('pointerdown', e => {
    if (!state.running || state.paused || state.over) return;
    pointerActive = true;
    state.combo = 0;              // 新一笔，重置 combo
    updateHud();
    canvas.setPointerCapture(e.pointerId);
    const p = canvasPos(e);
    trail.push({ x: p.x, y: p.y, t: gameNow() });
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', e => {
    if (!pointerActive) return;
    const p = canvasPos(e);
    trail.push({ x: p.x, y: p.y, t: gameNow() });
    if (state.running && !state.paused && !state.over) {
      checkSliceLastSegment();
    }
  });
  function endPointer() {
    pointerActive = false;
    state.combo = 0;
    updateHud();
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // ============ 水果生成（phase 调度：normal / burst / pinata / lull）============
  function spawnOne(t, opts) {
    opts = opts || {};
    const margin = 60;
    let x, vx, vy;
    if (opts.fanTotal) {
      // 烟花扇形：起点沿屏幕底部均匀分布，朝中心略汇聚
      const ratio = opts.fanTotal === 1 ? 0.5 : (opts.fanIndex / (opts.fanTotal - 1));
      x = margin + ratio * (LOG_W - 2 * margin);
      const dt = opts.fan === 'pinata' ? 1.45 : 1.3;
      vy = -GRAVITY * dt - 60;
      const sideOffset = (LOG_W / 2 - x) * 0.35;
      vx = sideOffset / dt + (Math.random() - 0.5) * 50;
    } else {
      x = margin + Math.random() * (LOG_W - 2 * margin);
      const targetX = LOG_W / 2 + (Math.random() - 0.5) * (LOG_W * 0.7);
      const dt = 1.2;
      vy = -GRAVITY * dt - 80;
      vx = (targetX - x) / dt + (Math.random() - 0.5) * 80;
    }
    let type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    // burst / pinata 大波次不混炸弹（经典 Fruit Ninja 同款约定）；
    // 炸弹只出现在 normal phase 的单/双果里
    if (state.mode !== 'zen' && !opts.fan) {
      let bombP = 0.07;
      if (state.mode === 'endless') bombP += endlessFactor() * 0.006;
      if (Math.random() < bombP) type = 'bomb';
    }
    const r = (type === 'watermelon') ? 38 : (type === 'kiwi') ? 32 : 30;
    fruits.push({
      kind: 'whole', type,
      x, y: LOG_H + r,
      vx, vy,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 6,
      r,
      bornAt: t,
    });
  }

  // phase 状态机
  let spawnPhase = 'normal';        // 'normal' | 'lull'
  let nextEventAt = 0;
  let lastBurstAt = -Infinity;
  let lastPinataAt = -Infinity;

  function scheduleNextNormal(now) {
    const elapsed = (now - state.runStartedAt) / 1000;
    let interval = 1100 - Math.min(elapsed * 4, 280);
    if (state.mode === 'endless') {
      // 每升 1 阶 spawn 间隔 ×0.93，stage 10 时 ≈0.48，节奏明显加快
      interval *= Math.pow(0.93, endlessFactor());
      interval = Math.max(interval, 280);
    }
    interval *= 0.8 + Math.random() * 0.4;
    if (state.mode === 'zen') interval = Math.max(interval, 700);
    nextEventAt = now + interval;
  }

  function spawnNormalGroup(now) {
    const groupSize = 1 + (Math.random() < 0.30 ? 1 : 0);
    for (let i = 0; i < groupSize; i++) {
      setTimeout(() => {
        if (!state.running || state.paused || state.over) return;
        spawnOne(gameNow());
      }, i * 100);
    }
  }

  function triggerBurst(now) {
    lastBurstAt = now;
    const count = 4 + Math.floor(Math.random() * 3);   // 4-6
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        if (!state.running || state.paused || state.over) return;
        spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'burst' });
      }, i * 70);
    }
    spawnPhase = 'lull';
    nextEventAt = now + count * 70 + 1500;
  }

  function triggerPinata(now) {
    lastPinataAt = now;
    const count = 9 + Math.floor(Math.random() * 4);   // 9-12
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        if (!state.running || state.paused || state.over) return;
        spawnOne(gameNow(), { fanIndex: i, fanTotal: count, fan: 'pinata' });
      }, i * 80);
    }
    spawnPhase = 'lull';
    nextEventAt = now + count * 80 + 2200;
    showPopup(LOG_W / 2, LOG_H * 0.25, '🎆 来了！', '#ff7878', true);
  }

  function tickSpawn(now) {
    if (now < nextEventAt) return;
    if (spawnPhase === 'lull') {
      spawnPhase = 'normal';
      scheduleNextNormal(now);
      return;
    }
    const elapsed = (now - state.runStartedAt) / 1000;
    const sf = state.mode === 'endless' ? endlessFactor() : 0;
    // pinata：经典/街机 22s 后；endless 12s 起，stage 升级时间隔变短
    const pinataReady = state.mode === 'endless' ? elapsed > 12 : elapsed > 22;
    const pinataGap = Math.max(12000, 26000 - sf * 1500);
    const pinataP = Math.min(0.45, 0.20 + sf * 0.025);
    if (pinataReady && now - lastPinataAt > pinataGap && Math.random() < pinataP) {
      triggerPinata(now);
      return;
    }
    // burst：每 ~9s 有概率（endless 越往后越频繁）
    const burstGap = Math.max(4500, 9000 - sf * 500);
    const burstP = Math.min(0.6, 0.32 + sf * 0.025);
    if (now - lastBurstAt > burstGap && Math.random() < burstP) {
      triggerBurst(now);
      return;
    }
    spawnNormalGroup(now);
    scheduleNextNormal(now);
  }

  // ============ 切片检测 ============
  function segCircleHit(a, b, cx, cy, r) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1) {
      return Math.hypot(a.x - cx, a.y - cy) < r;
    }
    let t = ((cx - a.x) * dx + (cy - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx, py = a.y + t * dy;
    return Math.hypot(px - cx, py - cy) < r;
  }

  function checkSlices(gameNowMs) {
    if (trail.length < 2) return;
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i - 1], b = trail[i];
        if (gameNowMs - b.t > 220) continue;
        if (segCircleHit(a, b, f.x, f.y, f.r)) {
          const angle = Math.atan2(b.y - a.y, b.x - a.x);
          onSlice(f, angle);
          break;
        }
      }
    }
  }

  // 仅检测最后一段轨迹 — 在 pointermove 立即调用，让切片响应不等下一帧
  function checkSliceLastSegment() {
    if (trail.length < 2) return;
    const a = trail[trail.length - 2];
    const b = trail[trail.length - 1];
    for (const f of fruits) {
      if (f.kind !== 'whole' || f.sliced) continue;
      if (segCircleHit(a, b, f.x, f.y, f.r)) {
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        onSlice(f, angle);
      }
    }
  }

  function onSlice(f, angle) {
    f.sliced = true;
    if (f.type === 'bomb') {
      bombHit();
      return;
    }
    // combo 即「一笔切到的水果数」（pointerdown 时清零，pointerup 重置）
    state.combo += 1;
    if (state.combo > state.bestCombo) state.bestCombo = state.combo;

    // 第 N 个水果分数：10 + (N-1)*10（指数爽感）
    const points = 10 + (state.combo - 1) * 10;
    state.score += points;

    // 多连提示
    if (state.combo === 2) {
      showPopup(f.x, f.y - 38, '+' + points, '#fff');
    } else if (state.combo >= 3) {
      const labels = { 3: '三连切！', 4: '四连切！', 5: '五连切！', 6: '超神！', 7: '不可阻挡！' };
      const lbl = labels[state.combo] || (state.combo + ' 连切！');
      const color = state.combo >= 5 ? '#ff7878' : '#ffd95a';
      const extra = state.combo * 20;
      state.score += extra;
      showPopup(LOG_W / 2, LOG_H * 0.32, lbl, color, true);
      showPopup(LOG_W / 2, LOG_H * 0.32 + 46, '+' + (points + extra), '#fff');
    }

    spawnHalves(f, angle);
    spawnJuice(f, angle);
    updateHud();
  }

  function spawnHalves(f, angle) {
    const nx = -Math.sin(angle), ny = Math.cos(angle);
    const speed = 280;
    const baseVx = f.vx * 0.4, baseVy = f.vy * 0.4 + 60;
    fruits.push({
      kind: 'half', type: f.type, side: 'l',
      x: f.x, y: f.y,
      vx: baseVx + nx * speed,
      vy: baseVy + ny * speed,
      rot: f.rot, vrot: f.vrot - 2,
      r: f.r,
      cutAngle: angle,
    });
    fruits.push({
      kind: 'half', type: f.type, side: 'r',
      x: f.x, y: f.y,
      vx: baseVx - nx * speed,
      vy: baseVy - ny * speed,
      rot: f.rot, vrot: f.vrot + 2,
      r: f.r,
      cutAngle: angle,
    });
  }

  function showPopup(x, y, text, color, big) {
    popups.push({
      x, y, text,
      color: color || '#ffd95a',
      big: !!big,
      age: 0,
      life: big ? 1.4 : 0.9,
    });
  }

  function spawnJuice(f, angle) {
    const color = JUICE_COLOR[f.type] || '#fff';
    const n = 12;
    for (let i = 0; i < n; i++) {
      const a = angle + (Math.random() - 0.5) * Math.PI;
      const sp = 120 + Math.random() * 220;
      particles.push({
        x: f.x, y: f.y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 80,
        r: 3 + Math.random() * 4,
        color,
        life: 0.8,
        age: 0,
      });
    }
  }

  function bombHit() {
    flashScreen();
    state.combo = 0;
    if (state.mode === 'endless') {
      state.lives -= 1;
      updateHud();
      showPopup(LOG_W / 2, LOG_H * 0.4, '💥 炸弹 -1 命', '#ff7878', true);
      if (state.lives <= 0) setTimeout(() => endRun('boom'), 400);
      return;
    }
    setTimeout(() => endRun('boom'), 350);
  }

  // 无尽模式 stage 升级 + 难度系数
  const STAGE_DURATION = 25;            // 每 stage 秒数
  function checkStageUp(now) {
    if (state.mode !== 'endless') return;
    const elapsed = (now - state.stageStartedAt) / 1000;
    if (elapsed < STAGE_DURATION) return;
    state.stage += 1;
    state.stageStartedAt = now;
    state.score += 100;
    let lifeMsg = '';
    // 每过 5 阶里程碑回 1 命（最多 3）
    if (state.stage % 5 === 1 && state.stage > 1 && state.lives < 3) {
      state.lives += 1;
      lifeMsg = ' · ❤+1';
    }
    showPopup(LOG_W / 2, LOG_H * 0.30, '🔥 STAGE ' + state.stage, '#ff9a44', true);
    showPopup(LOG_W / 2, LOG_H * 0.30 + 50, '难度提升 +100' + lifeMsg, '#fff');
    updateHud();
  }
  function endlessFactor() {
    // 每升 1 阶难度系数：spawn 间隔 ×0.93，burst 间隔 ×0.92，炸弹概率 +0.5%
    return Math.max(0, state.stage - 1);
  }

  let flashUntil = 0;
  function flashScreen() { flashUntil = gameNow() + 280; }

  // ============ 物理更新 ============
  function update(gameNowMs, dt) {
    if (state.mode === 'classic') {
      const elapsed = (gameNowMs - state.runStartedAt) / 1000;
      state.timeLeft = Math.max(0, 60 - elapsed);
      if (state.timeLeft <= 0 && !state.over) {
        endRun('time');
        return;
      }
    }
    if (state.mode === 'endless') checkStageUp(gameNowMs);

    for (const f of fruits) {
      f.vy += GRAVITY * dt;
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.rot += f.vrot * dt;
    }

    // 出屏处理 + 移除 sliced 的 whole（不再渲染原水果，只剩两个 half 飞出）
    fruits = fruits.filter(f => {
      if (f.kind === 'whole' && f.sliced) return false;
      if (f.y > LOG_H + 100) {
        if (f.kind === 'whole' && !f.sliced && f.type !== 'bomb') {
          onMissed(f);
        }
        return false;
      }
      if (f.x < -120 || f.x > LOG_W + 120) return false;
      return true;
    });

    for (const p of particles) {
      p.vy += GRAVITY * 0.6 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.age += dt;
    }
    particles = particles.filter(p => p.age < p.life);

    for (const pp of popups) pp.age += dt;
    popups = popups.filter(pp => pp.age < pp.life);

    // trail 老化（用 game-time 时间戳）
    while (trail.length > 0 && gameNowMs - trail[0].t > 220) trail.shift();
    if (trail.length > 14) trail.splice(0, trail.length - 14);

    checkSlices(gameNowMs);
    tickSpawn(gameNowMs);
  }

  function onMissed(f) {
    if (state.mode !== 'arcade' && state.mode !== 'endless') return;
    state.lives -= 1;
    state.combo = 0;
    flashScreen();
    updateHud();
    if (state.lives <= 0) endRun('lives');
  }

  // ============ 渲染 ============
  function drawFruit(f) {
    let img;
    if (f.kind === 'whole') {
      img = sprites[f.type === 'bomb' ? 'bomb' : (f.type + '_whole')];
    } else {
      img = sprites[f.type + '_half'];
    }
    if (!img) return;
    const size = f.r * 2.4;     // SVG viewBox 是 80, 内容半径 ~30, 留些空间
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    if (f.kind === 'half' && f.side === 'r') ctx.scale(-1, 1);
    ctx.drawImage(img, -size / 2, -size / 2, size, size);
    ctx.restore();
  }

  function drawTrail() {
    if (trail.length < 2) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const now = Time.game;
    for (let i = 1; i < trail.length; i++) {
      const a = trail[i - 1], b = trail[i];
      const age = (now - b.t) / 220;
      const alpha = Math.max(0, 1 - age);
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alpha * 0.85).toFixed(3) + ')';
      ctx.lineWidth = 2 + alpha * 7;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPopups() {
    for (const p of popups) {
      const t = p.age / p.life;
      const a = Math.max(0, 1 - t);
      const yOff = -55 * t * t;
      const scale = p.big ? (1 + Math.sin(Math.min(t * 6, Math.PI)) * 0.15) : 1;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y + yOff);
      ctx.scale(scale, scale);
      ctx.font = (p.big ? '700 32px ' : '600 18px ') + 'Georgia, "Noto Serif SC", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = p.big ? 4 : 2.5;
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.strokeText(p.text, 0, 0);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0, 1 - p.age / p.life);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 - p.age / p.life * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    // 背景（烘焙的霓虹场景 + 动画网格）
    if (bgOffscreen) {
      ctx.drawImage(bgOffscreen, 0, 0, LOG_W, LOG_H);
    } else {
      ctx.fillStyle = '#0a0418';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }
    drawNeonGrid(Time.game);

    // 水果
    for (const f of fruits) drawFruit(f);
    drawParticles();
    drawTrail();
    drawPopups();

    // 闪屏
    const now = Time.game;
    if (now < flashUntil) {
      const a = (flashUntil - now) / 280;
      ctx.fillStyle = 'rgba(255, 80, 80, ' + (a * 0.5).toFixed(3) + ')';
      ctx.fillRect(0, 0, LOG_W, LOG_H);
    }
  }

  // ============ HUD ============
  function updateHud() {
    bind.score.textContent = String(Math.round(state.score));
    if (state.combo >= 2) {
      hudCombo.classList.remove('hidden');
      bind.combo.textContent = String(state.combo);
    } else {
      hudCombo.classList.add('hidden');
    }
    if (state.mode === 'classic') {
      bind.timer.textContent = state.timeLeft.toFixed(1);
    }
    if (state.mode === 'arcade' || state.mode === 'endless') {
      bind.lives.textContent = '❤'.repeat(state.lives) + '🤍'.repeat(Math.max(0, 3 - state.lives));
    }
    if (state.mode === 'endless') {
      bind.stage.textContent = String(state.stage);
    }
  }

  // ============ 主循环 ============
  let rafId = 0;
  let lastWall = 0;        // 上一帧的 performance.now()（wall-clock）
  function loop(now) {
    if (state.over || !state.running) return;
    if (!state.paused) {
      const dtWall = lastWall ? Math.min(now - lastWall, 50) : 0;
      // hit pause：Time.game 暂停推进，但仍渲染（让玩家看到冻结瞬间）
      const isFrozen = Time.game < Time.frozenUntil;
      const dtGameMs = isFrozen ? 0 : dtWall * Time.scale;
      Time.game += dtGameMs;
      Time.wall = now;
      update(Time.game, dtGameMs / 1000);
      render();
      updateHud();
    }
    lastWall = now;
    rafId = requestAnimationFrame(loop);
  }

  // ============ 模式 / 流程 ============
  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => startGame(card.dataset.mode));
  });

  function startGame(mode) {
    state.mode = mode;
    state.running = true;
    state.paused = false;
    state.over = false;
    state.score = 0;
    state.combo = 0;
    state.bestCombo = 0;
    state.timeLeft = 60;
    state.lives = 3;
    // 重置 Time：每局 game-time 从 0 起算
    Time.game = 0;
    Time.scale = 1.0;
    Time.frozenUntil = 0;
    Time.wall = 0;
    lastWall = 0;
    state.runStartedAt = 0;
    state.runNonce = (window.GamesShell && GamesShell.Identity) ? GamesShell.Identity.newRunNonce() : ('r-' + Date.now());
    fruits = [];
    particles = [];
    trail = [];
    popups = [];
    flashUntil = 0;
    spawnPhase = 'normal';
    nextEventAt = 600;           // game-time 0.6s 后第一个水果
    lastBurstAt = -Infinity;
    lastPinataAt = -Infinity;
    state.stage = 1;
    state.stageStartedAt = 0;

    modeSelect.hidden = true;
    stage.hidden = false;
    belowStage.hidden = true;
    gameoverOverlay.hidden = true;
    pausedOverlay.hidden = true;

    hudTimer.hidden = mode !== 'classic';
    hudLives.hidden = !(mode === 'arcade' || mode === 'endless');
    hudStage.hidden = mode !== 'endless';
    bind.score.textContent = '0';
    bind.timer.textContent = '60.0';
    bind.lives.textContent = '❤❤❤';
    bind.stage.textContent = '1';
    hudCombo.classList.add('hidden');

    pendingSubmit = false;
    resetRank();

    preloadSprites().then(() => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
  }

  function endRun(reason) {
    if (state.over) return;
    state.over = true;
    state.running = false;
    cancelAnimationFrame(rafId);

    let title = '时间到';
    if (reason === 'boom') title = state.mode === 'endless' ? '撑住了，但还是炸了 💥' : '炸弹被切到了！';
    else if (reason === 'lives') title = state.mode === 'endless' ? `撑到 Stage ${state.stage}！` : '漏切太多';
    else if (reason === 'manual') title = '本局结束';

    const lines = [];
    lines.push(state.mode === 'zen'
      ? `<strong>最高连击 ${state.bestCombo}</strong>`
      : `<strong>${Math.round(state.score)} 分</strong>`);
    if (state.mode === 'endless') {
      lines.push(`Stage ${state.stage} · 最高一刀 ${state.bestCombo} 连切 · 用时 ${((Time.game - state.runStartedAt)/1000).toFixed(0)}s`);
    } else if (state.mode !== 'zen') {
      lines.push(`最高连击 ${state.bestCombo} · 用时 ${((Time.game - state.runStartedAt)/1000).toFixed(0)}s`);
    } else {
      lines.push(`累计得分 ${Math.round(state.score)}`);
    }

    bind['go-title'].textContent = title;
    bind['go-stats'].innerHTML = lines.join('<br>');

    if (state.mode === 'zen' && reason !== 'manual') {
      // 禅意只有手动结束
      gameoverOverlay.hidden = true;
    } else {
      gameoverOverlay.hidden = false;
    }
    belowStage.hidden = false;

    // 排行榜：切到当前模式 tab
    if (lbWidget) lbWidget.setSplit(state.mode);

    tryAutoSubmit();
    if (settleBtn) settleBtn.setEnabled(true);

    // 1.5 秒后清空残余水果
    setTimeout(() => {
      if (state.over) {
        fruits = [];
        particles = [];
        popups = [];
        render();
      }
    }, 1500);
  }

  // ============ 暂停 ============
  document.getElementById('pause-btn').addEventListener('click', () => {
    if (state.over || !state.running) return;
    state.paused = true;
    pausedOverlay.hidden = false;
  });
  document.getElementById('resume-btn').addEventListener('click', () => {
    state.paused = false;
    pausedOverlay.hidden = true;
    lastWall = 0;             // 防止 resume 后第一帧累积巨大 dt
    rafId = requestAnimationFrame(loop);
  });
  document.getElementById('quit-btn').addEventListener('click', () => {
    if (confirm('退出当前局？分数会保留并尝试上传')) {
      pausedOverlay.hidden = true;
      endRun('manual');
    }
  });
  document.getElementById('restart-btn').addEventListener('click', () => {
    startGame(state.mode);
  });
  document.getElementById('changemode-btn').addEventListener('click', () => {
    state.over = true;
    state.running = false;
    stage.hidden = true;
    modeSelect.hidden = false;
    belowStage.hidden = true;
    fruits = []; particles = []; trail = []; popups = [];
    cancelAnimationFrame(rafId);
    render();
  });

  // ============ Visibility：自动暂停 ============
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.running && !state.over && !state.paused) {
      state.paused = true;
      pausedOverlay.hidden = false;
    }
  });

  // ============ 排行榜 / 评论 / 结算 接入 ============
  let lbWidget = null;
  let nickPrompt = null;
  let settleBtn = null;
  let pendingSubmit = false;
  let lastRankInfo = null;

  function modeLabel(m) {
    if (m === 'classic') return '经典 60s';
    if (m === 'arcade') return '街机三命';
    if (m === 'endless') return '无尽闯关';
    return '禅意';
  }

  function getSubmitScore() {
    if (state.mode === 'zen') return state.bestCombo * 100;
    return Math.round(state.score);
  }
  function fmtScore(v) {
    return Number(v).toLocaleString();
  }

  function setRank(name, data) {
    if (name === 'hidden') {
      rankRow.classList.remove('failed');
      rankRow.innerHTML = '';
      lastRankInfo = null;
      return;
    }
    rankRow.classList.remove('failed');
    if (name === 'loading') {
      rankRow.textContent = '排名上传中…';
      lastRankInfo = { mode: modeLabel(state.mode) };
    } else if (name === 'failed') {
      rankRow.classList.add('failed');
      rankRow.textContent = '排行榜暂时不可用（不影响游戏）';
      lastRankInfo = { failed: true, mode: modeLabel(state.mode) };
    } else if (name === 'pending') {
      rankRow.classList.add('failed');
      rankRow.textContent = '想上排行榜？看下面的昵称表单 ↓';
      lastRankInfo = { pending: true, mode: modeLabel(state.mode) };
    } else if (name === 'success' && data && data.rank && data.total) {
      rankRow.innerHTML = '';
      rankRow.append(
        document.createTextNode(modeLabel(state.mode) + ' · 第 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.rank) }),
        document.createTextNode(' 名 · 共 '),
        Object.assign(document.createElement('strong'), { textContent: String(data.total) }),
        document.createTextNode(' 位玩家'),
      );
      lastRankInfo = { rank: data.rank, total: data.total, mode: modeLabel(state.mode) };
    }
  }
  function resetRank() { setRank('hidden'); }

  async function submitWithNick(nick) {
    if (!nick || pendingSubmit) return;
    const score = getSubmitScore();
    if (score <= 0) { setRank('hidden'); return; }
    pendingSubmit = true;
    setRank('loading');
    const r = await GamesShell.Leaderboard.submit({
      gameId: 'fruit-ninja',
      nick,
      score,
      durationMs: Math.max(3000, Math.round(Time.game - state.runStartedAt)),
      clientNonce: state.runNonce,
      did: GamesShell.Identity.getDeviceId(),
      extra: { mode: state.mode, bestCombo: state.bestCombo, stage: state.stage },
    });
    if (r && r.ok) {
      setRank('success', { rank: r.rank, total: r.total });
      if (lbWidget) lbWidget.refresh();
      return;
    }
    pendingSubmit = false;
    if (r && r.reason === 'nick_taken') {
      GamesShell.Identity.clearNick();
      alert('"' + nick + '" 已被别的玩家占用，请换一个昵称');
      setRank('pending');
      if (nickPrompt) { nickPrompt.refresh(); nickPrompt.show(); }
      return;
    }
    setRank('failed');
    if (r && r.reason) console.warn('[fruit-ninja] submit rejected:', r.reason);
  }

  function tryAutoSubmit() {
    if (getSubmitScore() <= 0) { setRank('hidden'); return; }
    const nick = GamesShell.Identity.getNick();
    if (nick) submitWithNick(nick);
    else { setRank('pending'); nickPrompt && nickPrompt.show(); }
  }

  // ============ 结算图 ============
  function paintSettlementBoard(ctx2, x, y, w, h) {
    const grad = ctx2.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, '#2a3a52');
    grad.addColorStop(1, '#1a2436');
    ctx2.fillStyle = grad;
    ctx2.fillRect(x, y, w, h);

    // 散布几个水果
    const samples = ['apple_whole', 'orange_whole', 'watermelon_whole', 'kiwi_whole'];
    const cx = x + w / 2, cy = y + h / 2;
    samples.forEach((name, i) => {
      const img = sprites[name];
      if (!img) return;
      const angle = (i / samples.length) * Math.PI * 2 - Math.PI / 2;
      const rr = Math.min(w, h) * 0.3;
      const fx = cx + Math.cos(angle) * rr;
      const fy = cy + Math.sin(angle) * rr;
      const size = Math.min(w, h) * 0.22;
      ctx2.save();
      ctx2.translate(fx, fy);
      ctx2.rotate(angle);
      ctx2.drawImage(img, -size / 2, -size / 2, size, size);
      ctx2.restore();
    });

    // 中心刀光
    ctx2.save();
    ctx2.strokeStyle = 'rgba(255, 240, 180, 0.85)';
    ctx2.lineWidth = Math.min(w, h) * 0.012;
    ctx2.lineCap = 'round';
    ctx2.beginPath();
    ctx2.moveTo(x + w * 0.2, y + h * 0.7);
    ctx2.quadraticCurveTo(x + w * 0.5, y + h * 0.2, x + w * 0.8, y + h * 0.7);
    ctx2.stroke();
    ctx2.restore();

    // 中心 emoji
    ctx2.fillStyle = '#fff';
    ctx2.font = `${Math.min(w, h) * 0.18}px Georgia, serif`;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText('🍉', cx, cy);
  }

  function getSettlementOpts() {
    const ri = lastRankInfo || {};
    const mode = state.mode;
    return {
      kind: 'single',
      gameId: 'fruit-ninja',
      title: '水果忍者',
      emoji: '🍉',
      nick: GamesShell.Identity.getNick(),
      score: getSubmitScore(),
      scoreLabel: mode === 'zen' ? '最 高 连 击 × 100' : '本 局 得 分',
      scoreFormatter: fmtScore,
      rankInfo: ri,
      stats: (mode === 'endless'
        ? [
            { label: '模式', value: modeLabel(mode) },
            { label: '撑到', value: 'Stage ' + state.stage },
            { label: '最高一刀', value: state.bestCombo + ' 连切' },
            { label: '用时', value: `${((Time.game - state.runStartedAt) / 1000).toFixed(0)} s` },
          ]
        : [
            { label: '模式', value: modeLabel(mode) },
            { label: '最高一刀', value: state.bestCombo + ' 连切' },
            { label: '用时', value: `${((Time.game - state.runStartedAt) / 1000).toFixed(0)} s` },
          ]),
      paintBoard: paintSettlementBoard,
      boardAspect: 4 / 3,
      watermark: 'zirconeey.github.io/toolbox/fruit-ninja',
    };
  }

  // ============ Init games-shell ============
  function initShell() {
    if (!window.GamesShell) return;

    if (GamesShell.Leaderboard) {
      lbWidget = GamesShell.Leaderboard.mount({
        container: document.getElementById('lb-mount'),
        gameId: 'fruit-ninja',
        title: '🏆 水果忍者排行榜',
        scoreFormatter: fmtScore,
        getCurrentNick: () => GamesShell.Identity.getNick(),
        getSplit: () => state.mode || 'classic',
        splitTabs: [
          { value: 'classic', label: '经典 60s' },
          { value: 'arcade', label: '街机三命' },
          { value: 'endless', label: '无尽闯关' },
          { value: 'zen', label: '禅意（连击×100）' },
        ],
      });
    }
    if (GamesShell.Comments) {
      GamesShell.Comments.mount({
        container: document.getElementById('cm-mount'),
        path: '/toolbox/fruit-ninja/',
        title: '💬 来玩玩交流',
        intro: '聊聊你的最高分、最长连击，或者哪种模式最上头 ~',
        placeholder: '说点什么 ~',
      });
    }
    if (GamesShell.NickPrompt) {
      nickPrompt = GamesShell.NickPrompt.mount({
        container: document.getElementById('nick-mount'),
        prompt: '想上排行榜？起个昵称吧',
        onSubmit: nick => submitWithNick(nick),
        onSkip: () => setRank('hidden'),
      });
    }
    if (GamesShell.Settlement) {
      settleBtn = GamesShell.Settlement.mountButton({
        container: document.getElementById('settle-btn-mount'),
        gameId: 'fruit-ninja',
        getOpts: getSettlementOpts,
        startDisabled: true,
      });
    }
  }

  // ============ Boot ============
  preloadSprites().then(() => {
    initShell();
    // 模式选择页面也预先画一帧
    render();
  });
})();
</script>
