---
layout: default
title: 我的主页 | Rui Zhou
permalink: /account/
sitemap: false
noindex: true
---

<article class="acc-wrap">
  {%- comment -%} 未登录态 {%- endcomment -%}
  <div id="acc-guest" class="acc-guest" style="display:none;">
    <div class="acc-guest-emoji">🔐</div>
    <p class="acc-guest-t">登录后管理你的资料，回看收藏、点赞、浏览与评论。</p>
    <button id="acc-login-btn" class="acc-primary" type="button">登录 / 注册</button>
  </div>

  {%- comment -%} 登录态：资料 hero + 控制台 {%- endcomment -%}
  <div id="acc-main" style="display:none;">
    <section id="acc-hero" class="acc-hero"></section>

    <div class="acc-console">
      <nav class="acc-nav" id="acc-nav">
        <div class="acc-nav-cap">我的内容</div>
        <button class="acc-nav-item on" type="button" data-pane="fav"><span class="acc-nav-ic">⭐</span>收藏</button>
        <button class="acc-nav-item" type="button" data-pane="like"><span class="acc-nav-ic">👍</span>点赞</button>
        <button class="acc-nav-item" type="button" data-pane="hist"><span class="acc-nav-ic">🕘</span>浏览记录</button>
        <button class="acc-nav-item" type="button" data-pane="comment"><span class="acc-nav-ic">💬</span>评论记录</button>
        <div class="acc-nav-cap">账号</div>
        <button class="acc-nav-item" type="button" data-pane="settings"><span class="acc-nav-ic">⚙️</span>设置</button>
      </nav>

      <div class="acc-content">
        <section class="acc-sec" id="acc-listsec">
          <div id="acc-toolbar" class="acc-toolbar">
            <button id="acc-manage" class="acc-tool-btn" type="button">管理</button>
            <span id="acc-manage-actions" style="display:none;">
              <button id="acc-selall" class="acc-tool-btn" type="button">全选本页</button>
              <button id="acc-delsel" class="acc-tool-btn danger" type="button">删除所选</button>
              <button id="acc-mgr-done" class="acc-tool-btn" type="button">完成</button>
            </span>
            <button id="acc-clear" class="acc-tool-btn danger-ghost" type="button" style="margin-left:auto;">清空</button>
          </div>
          <div id="acc-search-row" class="acc-search-row" hidden>
            <input type="search" id="acc-search" class="acc-search" placeholder="搜标题…" autocomplete="off" aria-label="搜索本类记录">
          </div>
          <div id="acc-list" class="acc-list"></div>
          <div id="acc-pager" class="acc-pager" hidden>
            <button class="acc-tool-btn" id="acc-prev" type="button">‹ 上一页</button>
            <span class="acc-pager-info" id="acc-pager-info"></span>
            <button class="acc-tool-btn" id="acc-next" type="button">下一页 ›</button>
            <label class="acc-pager-size">每页
              <select id="acc-pagesize"><option value="10">10</option><option value="20" selected>20</option><option value="50">50</option></select>
            </label>
          </div>
        </section>

        <section class="acc-sec" id="acc-setsec" hidden>
          <div id="acc-settings"></div>
        </section>
      </div>
    </div>
  </div>
</article>

<style>
  .acc-wrap { max-width: 940px; margin: 0 auto; padding: 2.4rem 1rem 4rem; }

  /* ── 游客态 ── */
  .acc-guest { text-align:center; padding:4rem 1.5rem; border:1px dashed var(--color-border);
    border-radius: var(--radius-lg); background: var(--color-bg-warm); }
  .acc-guest-emoji { font-size:2.6rem; margin-bottom:0.8rem; }
  .acc-guest-t { color:var(--color-muted); margin-bottom:1.4rem; }
  .acc-primary { padding:0.6rem 1.7rem; font-size:0.95rem; font-weight:700; font-family:inherit; cursor:pointer;
    background:var(--color-accent); color:#fff; border:none; border-radius: var(--radius-sm); box-shadow: var(--shadow-1); }
  .acc-primary:hover { filter:brightness(1.06); }

  /* ── 资料 hero ── */
  .acc-hero-card { display:flex; gap:1.4rem; align-items:flex-start; padding: var(--space-5);
    background: var(--color-bg-warm); border:1px solid var(--color-border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-1); }
  .acc-hero-av { width:88px; height:88px; border-radius:50%; flex-shrink:0;
    background:var(--color-accent); color:#fff; font-family:var(--font-display); font-size:2.6rem; font-weight:700;
    display:flex; align-items:center; justify-content:center; background-size:cover; background-position:center; }
  .acc-hero-body { flex:1; min-width:0; }
  .acc-hero-top { display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
  .acc-hero-nick { font-family:var(--font-display); font-size:1.7rem; color:var(--color-ink); margin:0; line-height:1.15; word-break:break-word; }
  .acc-lv { flex-shrink:0; font-family:var(--font-display); font-size:0.9rem; font-weight:700; line-height:1;
    color:#fff; background:var(--color-accent); border-radius:999px; padding:0.28rem 0.62rem;
    font-variant-numeric: tabular-nums lining-nums; box-shadow: var(--shadow-1); }
  .acc-lv.shine { animation: acc-shine 2.4s linear infinite; background-size:200% 100%; }
  @keyframes acc-shine { to { background-position:200% 0; } }
  .acc-lv-help { flex-shrink:0; width:20px; height:20px; border-radius:50%; border:1px solid var(--color-border);
    background:var(--color-bg); color:var(--color-muted); font-size:0.72rem; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; padding:0; font-family:inherit; }
  .acc-lv-help:hover { color:var(--color-accent); border-color:var(--color-accent); }
  .acc-hero-edit { margin-left:auto; flex-shrink:0; padding:0.4rem 0.95rem; font-size:0.85rem; }
  .acc-hero-bio { font-size:0.92rem; color:var(--color-text); line-height:1.6; margin:0.55rem 0 0; word-break:break-word; }
  .acc-hero-bio.empty { color:var(--color-light); }
  .acc-hero-meta { font-size:0.78rem; color:var(--color-light); margin:0.55rem 0 0; word-break:break-all; }
  .acc-lv-wrap { margin-top:0.9rem; max-width:340px; }
  .acc-lv-bar { height:7px; border-radius:999px; background:var(--color-border); overflow:hidden; }
  .acc-lv-fill { height:100%; background:var(--color-accent); border-radius:999px; transition:width .4s; }
  .acc-lv-note { font-size:0.72rem; color:var(--color-light); margin-top:0.35rem; font-variant-numeric: tabular-nums lining-nums; }
  .acc-hero-stats { display:flex; gap:2rem; margin-top:1.1rem; padding-top:1rem; border-top:1px solid var(--color-border); }
  .acc-stat-n { font-family:var(--font-display); font-size:1.5rem; font-weight:700; color:var(--color-ink);
    line-height:1; font-variant-numeric: tabular-nums lining-nums; }
  .acc-stat-l { font-size:0.74rem; color:var(--color-light); margin-top:0.3rem; }
  @media (max-width:560px) {
    /* 手机端把 hero 压成一行身份条：头像+昵称+等级+编辑，隐藏简介/邮箱/进度/统计，
       让导航与列表尽快进入首屏。段位信息不丢——点等级旁「?」仍可看升级细则。 */
    .acc-hero-card { gap:0.85rem; align-items:center; padding: var(--space-4); }
    .acc-hero-av { width:52px; height:52px; font-size:1.5rem; }
    .acc-hero-top { flex-wrap:wrap; gap:0.35rem 0.5rem; }
    .acc-hero-nick { font-size:1.25rem; }
    .acc-hero-edit { margin-left:auto; padding:0.32rem 0.7rem; }
    .acc-hero-bio, .acc-hero-meta, .acc-lv-wrap, .acc-hero-stats { display:none; }
  }

  /* ── 控制台：左导航 + 内容 ── */
  .acc-console { display:flex; gap: var(--space-4); align-items:flex-start; margin-top:1.6rem; }
  .acc-nav { flex:none; width:180px; position:sticky; top:5rem; display:flex; flex-direction:column; gap:0.15rem; }
  .acc-nav-cap { font-size:0.68rem; font-weight:700; letter-spacing:0.08em; color:var(--color-light); padding:0.6rem 0.65rem 0.25rem; }
  .acc-nav-item { display:flex; align-items:center; gap:0.55rem; text-align:left; padding:0.55rem 0.7rem; border:none;
    background:none; border-radius: var(--radius-md); color:var(--color-muted); font-family:inherit; font-size:0.92rem;
    cursor:pointer; transition:background .12s, color .12s; }
  .acc-nav-item:hover { background:var(--color-bg-warm); color:var(--color-ink); }
  .acc-nav-item.on { background:var(--color-accent); color:#fff; }
  .acc-nav-ic { font-size:0.95rem; }
  .acc-content { flex:1; min-width:0; }
  .acc-sec { padding: var(--space-5); background:var(--color-bg-warm); border:1px solid var(--color-border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-1); }
  @media (max-width:720px) {
    .acc-console { flex-direction:column; gap: var(--space-3); }
    .acc-nav { width:100%; position:static; flex-direction:row; overflow-x:auto; gap:0.35rem; padding-bottom:0.3rem; }
    .acc-nav-cap { display:none; }
    .acc-nav-item { white-space:nowrap; border:1px solid var(--color-border); flex-shrink:0; }
    .acc-nav-item.on { border-color:var(--color-accent); }
  }

  /* ── 工具条 / 批量管理 ── */
  .acc-toolbar { display:flex; align-items:center; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; }
  #acc-manage-actions { display:inline-flex; gap:0.5rem; }
  .acc-tool-btn { padding:0.42rem 0.85rem; font-size:0.82rem; font-weight:600; font-family:inherit; cursor:pointer;
    color:var(--color-muted); background:var(--color-bg); border:1px solid var(--color-border); border-radius: var(--radius-sm); }
  .acc-tool-btn:hover { color:var(--color-accent); border-color:var(--color-accent); }
  .acc-tool-btn:disabled { opacity:0.4; cursor:default; }
  .acc-tool-btn.danger { color:#fff; background:#b5483a; border-color:#b5483a; }
  .acc-tool-btn.danger:hover { color:#fff; filter:brightness(1.05); }
  .acc-tool-btn.danger-ghost:hover { color:#b5483a; border-color:#b5483a; }
  .acc-save { padding:0.5rem 1.2rem; font-size:0.9rem; font-weight:700; font-family:inherit; cursor:pointer;
    color:#fff; background:var(--color-accent); border:none; border-radius: var(--radius-sm); }
  .acc-save:disabled { opacity:0.6; cursor:default; }

  /* ── 搜索框（仅本类记录 >10 条且非管理态时出现）── */
  .acc-search-row { margin-bottom:1rem; }
  .acc-search { width:100%; box-sizing:border-box; padding:0.5rem 0.8rem; font-size:0.88rem; font-family:inherit;
    color:var(--color-text); background:var(--color-bg); border:1px solid var(--color-border); border-radius: var(--radius-sm); }
  .acc-search::placeholder { color:var(--color-light); }
  .acc-search:focus { outline:none; border-color:var(--color-accent); }

  /* ── 收藏专辑（收藏夹）网格 ── */
  .acc-albgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:0.9rem; padding:0.4rem 0; }
  .acc-alb { position:relative; text-align:left; border:1px solid var(--color-border); border-radius:var(--radius-lg);
    background:var(--color-bg); padding:0.95rem; cursor:pointer; overflow:hidden; font-family:inherit;
    display:flex; flex-direction:column; min-height:118px; transition:border-color .18s, transform .18s, box-shadow .18s; }
  .acc-alb::before { content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--color-highlight); opacity:.85; }
  .acc-alb:hover { border-color:var(--color-highlight); transform:translateY(-2px); box-shadow:var(--shadow-1); }
  .acc-alb-n { font-family:var(--font-display); font-weight:600; color:var(--color-ink); font-size:1.02rem; padding-left:0.35rem; }
  .acc-alb-c { font-size:0.74rem; color:var(--color-light); padding-left:0.35rem; margin:0.1rem 0 0.5rem; }
  .acc-alb-sps { display:flex; flex-direction:column; gap:0.24rem; padding-left:0.35rem; }
  .acc-alb-sp { font-family:var(--font-body); font-size:0.76rem; color:var(--color-muted); white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; padding-left:0.45rem; border-left:2px solid var(--color-accent-soft); }
  .acc-alb-new { align-items:center; justify-content:center; color:var(--color-accent); border-style:dashed; background:var(--color-bg-warm); gap:0.3rem; }
  .acc-alb-new::before { display:none; }
  .acc-alb-plus { font-size:1.5rem; line-height:1; }
  .acc-albhead { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.7rem; }
  .acc-alb-back { border:1px solid var(--color-border); background:var(--color-bg); color:var(--color-muted); cursor:pointer;
    font-family:inherit; font-size:0.82rem; padding:0.28rem 0.7rem; border-radius:999px; }
  .acc-alb-back:hover { border-color:var(--color-accent); color:var(--color-accent); }
  .acc-albhead-n { font-family:var(--font-display); font-weight:600; color:var(--color-ink); font-size:1.1rem; }
  .acc-albhead-del { margin-left:auto; border:none; background:none; color:var(--color-light); cursor:pointer; font-size:0.8rem; }
  .acc-albhead-del:hover { color:#b4453a; }
  .acc-alb-picklist { display:flex; flex-direction:column; gap:0.4rem; margin-top:0.8rem; }
  .acc-alb-pick { display:flex; align-items:center; justify-content:space-between; border:1px solid var(--color-border);
    background:var(--color-bg); border-radius:var(--radius-sm); padding:0.6rem 0.85rem; cursor:pointer; font-family:inherit;
    font-size:0.95rem; color:var(--color-text); }
  .acc-alb-pick:hover { border-color:var(--color-highlight); background:var(--color-bg-warm); }
  .acc-alb-pick span { color:var(--color-light); font-size:0.78rem; }
  .acc-alb-pick-new { color:var(--color-accent); border-style:dashed; justify-content:center; }

  /* ── 列表 ── */
  .acc-list { min-height:120px; }
  .acc-item { display:flex; align-items:center; gap:0.8rem; padding:0.85rem 0.2rem; border-bottom:1px solid var(--color-border); }
  .acc-item:last-child { border-bottom:none; }
  .acc-item .acc-cb { display:none; width:18px; height:18px; flex-shrink:0; accent-color:var(--color-accent); cursor:pointer; }
  .acc-list.manage .acc-cb { display:block; }
  .acc-list.manage .acc-item-rm { display:none; }
  .acc-item-main { flex:1; min-width:0; }
  .acc-item-title { font-size:0.98rem; color:var(--color-text); text-decoration:none; display:block;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .acc-item-title:hover { color:var(--color-accent); }
  .acc-item-meta { font-size:0.76rem; color:var(--color-light); margin-top:0.2rem; }
  .acc-item-rm { border:none; background:none; color:var(--color-light); cursor:pointer; font-size:1.1rem;
    padding:0.2rem 0.4rem; border-radius:6px; flex-shrink:0; }
  .acc-item-rm:hover { color:#b5483a; background:var(--color-bg); }
  .acc-empty, .acc-loading { text-align:center; color:var(--color-light); padding:2.6rem 1rem; font-size:0.9rem; }
  .acc-comment-body { font-size:0.92rem; color:var(--color-text); line-height:1.6; margin-top:0.2rem; }
  .acc-comment-body :is(p) { margin:0.2rem 0; }

  /* ── 翻页 ── */
  .acc-pager { display:flex; align-items:center; gap:0.6rem; margin-top:1.1rem; padding-top:0.9rem;
    border-top:1px solid var(--color-border); flex-wrap:wrap; }
  .acc-pager-info { font-size:0.8rem; color:var(--color-light); font-variant-numeric: tabular-nums lining-nums; }
  .acc-pager-size { margin-left:auto; font-size:0.8rem; color:var(--color-muted); display:inline-flex; align-items:center; gap:0.35rem; }
  .acc-pager-size select { font-family:inherit; font-size:0.8rem; padding:0.25rem 0.4rem; color:var(--color-text);
    background:var(--color-bg); border:1px solid var(--color-border); border-radius:6px; cursor:pointer; }

  /* ── 账号设置行 ── */
  .acc-set-row { display:flex; align-items:center; gap:1rem; padding:0.95rem 0; border-bottom:1px solid var(--color-border); }
  .acc-set-row:first-child { padding-top:0.2rem; }
  .acc-set-row:last-child { border-bottom:none; }
  .acc-set-info { flex:1; min-width:0; }
  .acc-set-t { font-size:0.95rem; font-weight:600; color:var(--color-text); }
  .acc-set-d { font-size:0.78rem; color:var(--color-light); margin-top:0.2rem; line-height:1.5; word-break:break-word; }
  .acc-set-d a { color:var(--color-accent); text-decoration:none; }
  .acc-set-d a:hover { text-decoration:underline; }
  .acc-set-row .acc-tool-btn { flex-shrink:0; }
  .acc-set-panel { padding-bottom:0.2rem; }
  .acc-switch { position:relative; display:inline-block; width:44px; height:24px; flex-shrink:0; }
  .acc-switch input { opacity:0; width:0; height:0; }
  .acc-switch-slider { position:absolute; inset:0; background:var(--color-border); border-radius:24px; transition:.2s; cursor:pointer; }
  .acc-switch-slider::before { content:''; position:absolute; height:18px; width:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .acc-switch input:checked + .acc-switch-slider { background:var(--color-accent); }
  .acc-switch input:checked + .acc-switch-slider::before { transform:translateX(20px); }

  /* ── 通用弹窗（编辑资料 / 升级细则）── */
  .acc-modal { position:fixed; inset:0; z-index:2600; background:rgba(20,28,40,0.5); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; padding:1rem; }
  .acc-modal-card { background:var(--color-bg); border:1px solid var(--color-border); border-radius:16px;
    box-shadow:0 18px 50px rgba(0,0,0,0.28); padding:1.5rem; width:400px; max-width:100%; max-height:88vh; overflow:auto; position:relative; }
  .acc-modal-x { position:absolute; top:0.7rem; right:0.85rem; border:none; background:none; font-size:1.4rem; line-height:1;
    color:var(--color-muted); cursor:pointer; }
  .acc-modal-title { font-family:var(--font-display); font-size:1.3rem; color:var(--color-ink); margin:0 0 1rem; }
  .acc-ef-row { margin-bottom:0.95rem; }
  .acc-ef-row > label { display:block; font-size:0.78rem; color:var(--color-muted); margin-bottom:0.35rem; }
  .acc-ef-row input[type=text], .acc-ef-row input[type=password], .acc-ef-row textarea {
    width:100%; box-sizing:border-box; padding:0.58rem 0.72rem; font-size:0.95rem; font-family:inherit;
    color:var(--color-text); background:var(--color-bg); border:1px solid var(--color-border); border-radius: var(--radius-sm); resize:vertical; }
  .acc-ef-row input:focus, .acc-ef-row textarea:focus { outline:none; border-color:var(--color-accent); }
  .acc-ef-av-row { display:flex; align-items:center; gap:1rem; }
  .acc-ef-av { width:72px; height:72px; border-radius:50%; flex-shrink:0; background:var(--color-accent); color:#fff;
    font-family:var(--font-display); font-size:1.9rem; font-weight:700; display:flex; align-items:center; justify-content:center;
    background-size:cover; background-position:center; }
  .acc-ef-av-btns { display:flex; flex-direction:column; gap:0.45rem; }
  .acc-ef-count { color:var(--color-light); font-weight:400; }
  .acc-ef-actions { display:flex; align-items:center; gap:0.6rem; margin-top:0.4rem; }
  .acc-ef-actions .acc-ef-err { flex:1; font-size:0.8rem; color:#c0392b; }

  /* 升级细则 */
  .acc-rules h4 { font-size:0.9rem; color:var(--color-ink); margin:1rem 0 0.5rem; }
  .acc-rules h4:first-child { margin-top:0; }
  .acc-rules-list { list-style:none; padding:0; margin:0; }
  .acc-rules-list li { display:flex; justify-content:space-between; gap:1rem; padding:0.4rem 0;
    border-bottom:1px dashed var(--color-border); font-size:0.86rem; color:var(--color-text); }
  .acc-rules-list li span:last-child { color:var(--color-muted); font-variant-numeric: tabular-nums lining-nums; white-space:nowrap; }
  .acc-tier-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:0.5rem; }
  .acc-tier { display:flex; align-items:center; gap:0.5rem; font-size:0.82rem; color:var(--color-text); }
  .acc-tier-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
  .acc-rules-note { font-size:0.76rem; color:var(--color-light); margin:0.8rem 0 0; line-height:1.6; }

  /* ── 头像裁剪弹窗 ── */
  #acc-crop { position:fixed; inset:0; z-index:3000; background:rgba(20,28,40,0.55); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; padding:1rem; }
  .acc-crop-card { background:var(--color-bg); border:1px solid var(--color-border); border-radius:16px;
    box-shadow:0 18px 50px rgba(0,0,0,0.3); padding:1.4rem; width:340px; max-width:100%; }
  .acc-crop-title { font-family:var(--font-display); font-size:1.2rem; color:var(--color-ink); margin:0 0 0.3rem; }
  .acc-crop-sub { font-size:0.78rem; color:var(--color-light); margin:0 0 1rem; }
  .acc-crop-vp { position:relative; width:260px; height:260px; margin:0 auto; overflow:hidden; border-radius:12px;
    background:#0002; touch-action:none; cursor:grab; }
  .acc-crop-vp.dragging { cursor:grabbing; }
  .acc-crop-vp img { position:absolute; left:0; top:0; user-select:none; -webkit-user-drag:none; max-width:none; }
  .acc-crop-mask { position:absolute; inset:0; pointer-events:none; box-shadow:0 0 0 999px rgba(0,0,0,0.35) inset; border-radius:50%; }
  .acc-crop-zoom { display:flex; align-items:center; gap:0.6rem; margin:1rem 0 0.2rem; }
  .acc-crop-zoom input[type=range] { flex:1; accent-color:var(--color-accent); }
  .acc-crop-actions { display:flex; gap:0.6rem; justify-content:flex-end; margin-top:1rem; }
</style>

<script>
(function () {
  function start() {
    if (!window.SiteAuth) { setTimeout(start, 100); return; }
    var guest = document.getElementById('acc-guest');
    var main = document.getElementById('acc-main');
    var heroEl = document.getElementById('acc-hero');
    var listEl = document.getElementById('acc-list');
    var listSec = document.getElementById('acc-listsec');
    var setSec = document.getElementById('acc-setsec');
    var settingsEl = document.getElementById('acc-settings');
    var toolbar = document.getElementById('acc-toolbar');
    var pagerEl = document.getElementById('acc-pager');
    var searchRow = document.getElementById('acc-search-row');
    var searchInput = document.getElementById('acc-search');
    var navItems = document.querySelectorAll('.acc-nav-item');
    var api = SiteAuth.API_BASE + '/me';

    // 列表分页状态
    var state = { kind: 'fav', items: [], page: 0, pageSize: 20, manage: false, query: '' };

    document.getElementById('acc-login-btn').addEventListener('click', function () {
      SiteAuth.openLogin && SiteAuth.openLogin('login');
    });

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
    function fmtDate(ts) {
      if (!ts) return '';
      try { return new Date(ts).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' }); }
      catch (e) { return ''; }
    }
    function paintAvatar(el, dataUrl) { el.style.backgroundImage = 'url("' + dataUrl + '")'; el.style.color = 'transparent'; el.textContent = ''; }
    function paintInitial(el, nick) { el.style.backgroundImage = ''; el.style.color = ''; el.textContent = (nick || '?').trim().charAt(0).toUpperCase(); }
    function isAvatar(v) { return v && /^data:image\//.test(v); }

    var KIND_EMPTY = {
      fav: '还没有收藏。读到喜欢的文章，点文末的「收藏」吧。',
      like: '还没有点赞过文章。',
      hist: '还没有浏览记录。',
      comment: '还没有评论记录。',
    };
    var CLEAR_LABEL = { fav: '清空收藏', like: '清空点赞', hist: '清空浏览记录' };
    var CLEAR_CONFIRM = {
      fav: '确定清空全部收藏吗？此操作不可撤销。',
      like: '确定取消全部点赞吗？此操作不可撤销。',
      hist: '确定清空全部浏览记录吗？此操作不可撤销。',
    };

    // ── 等级特权：按等级分层的徽章配色 + 头像光环 + Lv10 闪光 ─────────
    function levelOf(user) {
      if (user.level && typeof user.level.level === 'number') return user.level;
      return { level: 1, name: 'Lv1', points: user.points || 0, cur: 0, next: 50, progress: 0 };
    }
    var TIERS = [
      { min: 10, tier: '钻石', ring: '#d9b44a', bg: 'linear-gradient(100deg,#e6c766,#c88a2d,#e6c766)', shine: true },
      { min: 9,  tier: '翡翠', ring: '#2f8f6b', bg: '#2f8f6b' },
      { min: 7,  tier: '琥珀金', ring: '#c0912f', bg: '#c0912f' },
      { min: 5,  tier: '白银', ring: '#6b7480', bg: '#6b7480' },
      { min: 3,  tier: '青铜', ring: '#9c6b3c', bg: '#9c6b3c' },
      { min: 1,  tier: '藏蓝', ring: 'var(--color-accent)', bg: 'var(--color-accent)' },
    ];
    function perkOf(level) { for (var i = 0; i < TIERS.length; i++) if (level >= TIERS[i].min) return TIERS[i]; return TIERS[TIERS.length - 1]; }

    // ── 资料 hero ─────────────────────────────────────────────
    function renderHero(user) {
      if (!user) { heroEl.innerHTML = ''; return; }
      var joined = user.createdAt ? fmtDate(user.createdAt) : '';
      var lv = levelOf(user), perk = perkOf(lv.level);
      var lvNote = lv.next == null
        ? '积分 ' + lv.points + ' · 已满级 🎉'
        : '积分 ' + lv.points + ' · 距 Lv' + (lv.level + 1) + ' 还差 ' + (lv.next - lv.points);
      heroEl.innerHTML =
        '<div class="acc-hero-card">' +
          '<div class="acc-hero-av" id="acc-hero-av"></div>' +
          '<div class="acc-hero-body">' +
            '<div class="acc-hero-top">' +
              '<h1 class="acc-hero-nick">' + esc(user.nick || '锆友') + '</h1>' +
              '<span class="acc-lv' + (perk.shine ? ' shine' : '') + '" id="acc-lv-badge" title="' + esc(perk.tier) + '">' + esc(lv.name) + '</span>' +
              '<button class="acc-lv-help" id="acc-lv-help" type="button" title="升级细则" aria-label="升级细则">?</button>' +
              '<button class="acc-primary acc-hero-edit" type="button">编辑资料</button>' +
            '</div>' +
            '<p class="acc-hero-bio' + (user.bio ? '' : ' empty') + '">' + esc(user.bio || '还没有简介，写一句介绍自己吧。') + '</p>' +
            '<p class="acc-hero-meta">' + esc(user.email || '') + (joined ? ' · 加入于 ' + joined : '') + '</p>' +
            '<div class="acc-lv-wrap">' +
              '<div class="acc-lv-bar"><div class="acc-lv-fill" style="width:' + Math.round(lv.progress * 100) + '%"></div></div>' +
              '<div class="acc-lv-note">' + lvNote + '</div>' +
            '</div>' +
            '<div class="acc-hero-stats">' +
              '<div><div class="acc-stat-n" id="acc-stat-fav">–</div><div class="acc-stat-l">收藏</div></div>' +
              '<div><div class="acc-stat-n" id="acc-stat-like">–</div><div class="acc-stat-l">点赞</div></div>' +
              '<div><div class="acc-stat-n" id="acc-stat-hist">–</div><div class="acc-stat-l">浏览</div></div>' +
            '</div>' +
          '</div>' +
        '</div>';
      var av = heroEl.querySelector('.acc-hero-av');
      if (isAvatar(user.avatar)) paintAvatar(av, user.avatar); else paintInitial(av, user.nick);
      av.style.boxShadow = '0 0 0 3px var(--color-bg-warm), 0 0 0 5px ' + perk.ring;   // 光环
      var badge = document.getElementById('acc-lv-badge');
      badge.style.background = perk.bg;
      heroEl.querySelector('.acc-hero-edit').addEventListener('click', function () { openEditModal(user); });
      document.getElementById('acc-lv-help').addEventListener('click', openRulesModal);
      loadStats();
    }

    function loadStats() {
      ['fav', 'like', 'hist'].forEach(function (k) {
        SiteAuth.authedFetch(api + '?action=list&kind=' + k).then(function (r) { return r.json(); }).then(function (d) {
          var el = document.getElementById('acc-stat-' + k);
          if (el && d && d.ok) el.textContent = (d.items || []).length;
        }).catch(function () {});
      });
    }

    // ── 通用弹窗 ──────────────────────────────────────────────
    function modal(innerHTML) {
      var ov = document.createElement('div');
      ov.className = 'acc-modal';
      ov.innerHTML = '<div class="acc-modal-card"><button class="acc-modal-x" type="button" aria-label="关闭">&times;</button>' + innerHTML + '</div>';
      document.body.appendChild(ov);
      function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); document.removeEventListener('keydown', onKey); }
      function onKey(e) { if (e.key === 'Escape') close(); }
      ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
      ov.querySelector('.acc-modal-x').addEventListener('click', close);
      document.addEventListener('keydown', onKey);
      return { ov: ov, close: close };
    }

    // ── 编辑资料（弹窗）───────────────────────────────────────
    function openEditModal(user) {
      var m = modal(
        '<h3 class="acc-modal-title">编辑资料</h3>' +
        '<div class="acc-ef-row acc-ef-av-row">' +
          '<div class="acc-ef-av" id="acc-ef-av"></div>' +
          '<div class="acc-ef-av-btns">' +
            '<label class="acc-tool-btn" style="cursor:pointer;text-align:center;">上传头像<input type="file" id="acc-ef-file" accept="image/*" hidden></label>' +
            '<button type="button" class="acc-tool-btn" id="acc-ef-rmav">移除头像</button>' +
          '</div>' +
        '</div>' +
        '<div class="acc-ef-row"><label for="acc-ef-nick">昵称</label>' +
          '<input type="text" id="acc-ef-nick" maxlength="16" value="' + esc(user.nick || '') + '"></div>' +
        '<div class="acc-ef-row"><label for="acc-ef-bio">一句话简介 <span id="acc-ef-count" class="acc-ef-count"></span></label>' +
          '<textarea id="acc-ef-bio" maxlength="80" rows="2" placeholder="介绍一下自己…">' + esc(user.bio || '') + '</textarea></div>' +
        '<div class="acc-ef-actions">' +
          '<span class="acc-ef-err" id="acc-ef-err"></span>' +
          '<button type="button" class="acc-tool-btn" id="acc-ef-cancel">取消</button>' +
          '<button type="button" class="acc-save" id="acc-ef-save">保存</button>' +
        '</div>');

      var pendingAvatar;   // undefined=不变，''=移除，dataURL=新头像
      var avEl = m.ov.querySelector('#acc-ef-av');
      var nickEl = m.ov.querySelector('#acc-ef-nick');
      var bioEl = m.ov.querySelector('#acc-ef-bio');
      var countEl = m.ov.querySelector('#acc-ef-count');
      var errEl = m.ov.querySelector('#acc-ef-err');
      if (isAvatar(user.avatar)) paintAvatar(avEl, user.avatar); else paintInitial(avEl, user.nick);
      function updateCount() { countEl.textContent = bioEl.value.length + '/80'; }
      updateCount(); bioEl.addEventListener('input', updateCount);

      m.ov.querySelector('#acc-ef-file').addEventListener('change', function (e) {
        var f = e.target.files && e.target.files[0];
        if (!f) return;
        openCropper(f, function (dataUrl) { pendingAvatar = dataUrl; paintAvatar(avEl, dataUrl); });
        e.target.value = '';
      });
      m.ov.querySelector('#acc-ef-rmav').addEventListener('click', function () { pendingAvatar = ''; paintInitial(avEl, nickEl.value); });
      m.ov.querySelector('#acc-ef-cancel').addEventListener('click', m.close);
      m.ov.querySelector('#acc-ef-save').addEventListener('click', async function () {
        errEl.textContent = '';
        var nick = nickEl.value.trim();
        if (!nick) { errEl.textContent = '昵称不能为空'; return; }
        this.disabled = true;
        var fields = { nick: nick, bio: bioEl.value.trim() };
        if (pendingAvatar !== undefined) fields.avatar = pendingAvatar;
        var r;
        try { r = await SiteAuth.updateProfile(fields); } catch (e) { r = { ok: false, error: 'network' }; }
        this.disabled = false;
        if (r.ok) m.close();   // onChange → renderHero 重渲染
        else errEl.textContent = r.error === 'bad_avatar' ? '头像格式不支持或太大'
          : r.error === 'empty_nick' ? '昵称不能为空' : '保存失败，再试一次';
      });
    }

    // ── 升级细则（弹窗）───────────────────────────────────────
    function openRulesModal() {
      var THRESHOLDS = [0, 50, 150, 300, 500, 800, 1200, 1800, 2600, 4000];
      var rules = [
        ['每日登录签到', '+2 / 天'],
        ['发表评论', '+5（每日至多 20）'],
        ['收藏文章', '+2 / 篇（每日至多 20）'],
        ['分享链接', '+3（每日至多 15）'],
      ];
      var lvRows = THRESHOLDS.map(function (t, i) {
        var perk = perkOf(i + 1);
        return '<li><span><span class="acc-tier-dot" style="background:' + perk.ring + '"></span> Lv' + (i + 1) + ' · ' + perk.tier + '</span><span>' + t + ' 分</span></li>';
      }).join('');
      modal(
        '<h3 class="acc-modal-title">升级细则</h3>' +
        '<div class="acc-rules">' +
          '<h4>怎么攒积分</h4>' +
          '<ul class="acc-rules-list">' + rules.map(function (r) { return '<li><span>' + r[0] + '</span><span>' + r[1] + '</span></li>'; }).join('') + '</ul>' +
          '<h4>等级与专属配色</h4>' +
          '<ul class="acc-rules-list">' + lvRows + '</ul>' +
          '<p class="acc-rules-note">升到对应等级，头像光环与等级徽章会换成该段位的专属配色；Lv10「钻石」还有流光特效。更多等级特权在路上。</p>' +
        '</div>');
    }

    // ── 头像裁剪 ──────────────────────────────────────────────
    function openCropper(file, onDone) {
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () { buildCropper(img, onDone); };
        img.onerror = function () { alert('这张图片打不开，换一张试试'); };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }
    function buildCropper(img, onDone) {
      var VP = 260;
      var natW = img.naturalWidth, natH = img.naturalHeight;
      var coverScale = VP / Math.min(natW, natH);
      var minScale = coverScale, maxScale = coverScale * 4;
      var scale = coverScale;
      var offX = (VP - natW * scale) / 2, offY = (VP - natH * scale) / 2;

      var ov = document.createElement('div');
      ov.id = 'acc-crop';
      ov.innerHTML =
        '<div class="acc-crop-card">' +
          '<h3 class="acc-crop-title">裁剪头像</h3>' +
          '<p class="acc-crop-sub">拖动调整位置，滑块缩放。圆圈内即为头像。</p>' +
          '<div class="acc-crop-vp" id="cropvp"><div class="acc-crop-mask"></div></div>' +
          '<div class="acc-crop-zoom"><span>−</span><input type="range" id="cropzoom" min="1" max="4" step="0.01" value="1"><span>+</span></div>' +
          '<div class="acc-crop-actions">' +
            '<button type="button" class="acc-tool-btn" id="cropcancel">取消</button>' +
            '<button type="button" class="acc-save" id="cropok">确定</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(ov);
      var vp = ov.querySelector('#cropvp'), zoom = ov.querySelector('#cropzoom');
      vp.insertBefore(img, vp.firstChild);

      function clamp() {
        var w = natW * scale, h = natH * scale;
        offX = Math.min(0, Math.max(VP - w, offX));
        offY = Math.min(0, Math.max(VP - h, offY));
      }
      function render() {
        clamp();
        img.style.width = (natW * scale) + 'px'; img.style.height = (natH * scale) + 'px';
        img.style.left = offX + 'px'; img.style.top = offY + 'px';
      }
      function setScale(ns, fx, fy) {
        ns = Math.max(minScale, Math.min(maxScale, ns));
        var ix = (fx - offX) / scale, iy = (fy - offY) / scale;
        offX = fx - ix * ns; offY = fy - iy * ns; scale = ns; render();
      }
      render();

      var dragging = false, lastX = 0, lastY = 0;
      vp.addEventListener('pointerdown', function (e) { dragging = true; lastX = e.clientX; lastY = e.clientY; vp.classList.add('dragging'); vp.setPointerCapture && vp.setPointerCapture(e.pointerId); });
      vp.addEventListener('pointermove', function (e) { if (!dragging) return; offX += e.clientX - lastX; offY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; render(); });
      function endDrag() { dragging = false; vp.classList.remove('dragging'); }
      vp.addEventListener('pointerup', endDrag); vp.addEventListener('pointercancel', endDrag);
      zoom.addEventListener('input', function () { setScale(coverScale * parseFloat(zoom.value), VP / 2, VP / 2); });
      vp.addEventListener('wheel', function (e) { e.preventDefault(); setScale(scale * (e.deltaY < 0 ? 1.06 : 0.94), VP / 2, VP / 2); zoom.value = Math.max(1, Math.min(4, scale / coverScale)); }, { passive: false });

      function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); }
      ov.querySelector('#cropcancel').addEventListener('click', close);
      ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
      ov.querySelector('#cropok').addEventListener('click', function () {
        var out = 160, canvas = document.createElement('canvas'); canvas.width = out; canvas.height = out;
        var ctx = canvas.getContext('2d');
        var srcSize = VP / scale, srcX = -offX / scale, srcY = -offY / scale;
        ctx.drawImage(img, srcX, srcY, srcSize, srcSize, 0, 0, out, out);
        var url; try { url = canvas.toDataURL('image/jpeg', 0.85); } catch (e) { url = null; }
        close();
        if (url) onDone(url);
      });
    }

    // ── 列表渲染 + 分页 ───────────────────────────────────────
    function itemHTML(kind, it) {
      if (kind === 'comment') {
        return '<div class="acc-item"><div class="acc-item-main">' +
          '<a class="acc-item-title" href="' + esc(it.url || '#') + '">' + esc(it.title || it.url || '某篇文章') + '</a>' +
          '<div class="acc-comment-body">' + (it.html || esc(it.text || '')) + '</div>' +
          '<div class="acc-item-meta">' + fmtDate(it.ts) + '</div>' +
        '</div></div>';
      }
      var url = it.url || it.post || '#';
      return '<div class="acc-item" data-post="' + encodeURIComponent(it.post) + '">' +
          '<input type="checkbox" class="acc-cb" aria-label="选择">' +
          '<div class="acc-item-main">' +
            '<a class="acc-item-title" href="' + esc(url) + '">' + esc(it.title || it.post) + '</a>' +
            '<div class="acc-item-meta">' + fmtDate(it.ts) + '</div>' +
          '</div>' +
          '<button class="acc-item-rm" title="移除" aria-label="移除">×</button>' +
        '</div>';
    }

    function matchQuery(it) {
      return ((it.title || it.post || it.url || it.text || '') + '').toLowerCase().indexOf(state.query) >= 0;
    }
    function renderPage() {
      var kind = state.kind, items = state.items;
      // 搜索框显隐：本类记录 >10 条即出现（管理态下也保留——支持「搜出某话题→选中→删除」）
      searchRow.hidden = !(items.length > 10);
      // 过滤视图：搜索只作用于当前类目
      var view = state.query ? items.filter(matchQuery) : items;
      if (!items.length) { listEl.innerHTML = '<div class="acc-empty">' + KIND_EMPTY[kind] + '</div>'; pagerEl.hidden = true; return; }
      if (state.query && !view.length) { listEl.innerHTML = '<div class="acc-empty">没有匹配的记录。</div>'; pagerEl.hidden = true; return; }
      var pages = Math.max(1, Math.ceil(view.length / state.pageSize));
      if (state.page >= pages) state.page = pages - 1;
      var startI = state.page * state.pageSize;
      var slice = view.slice(startI, startI + state.pageSize);
      listEl.innerHTML = slice.map(function (it) { return itemHTML(kind, it); }).join('');
      // 分页条：过滤后仍 >10 条才显示
      pagerEl.hidden = view.length <= 10;
      document.getElementById('acc-pager-info').textContent =
        '第 ' + (state.page + 1) + ' / ' + pages + ' 页 · 共 ' + view.length + ' 条';
      document.getElementById('acc-prev').disabled = state.page === 0;
      document.getElementById('acc-next').disabled = state.page >= pages - 1;
      // 逐条移除（收藏/点赞/浏览）
      if (kind !== 'comment') {
        listEl.querySelectorAll('.acc-item-rm').forEach(function (btn) {
          btn.addEventListener('click', function () { removePosts([decodeURIComponent(btn.closest('.acc-item').dataset.post)]); });
        });
      }
      updateSelAllLabel();   // 每次重渲后复位「全选本页 / 取消全选」文案
    }

    async function loadKind(kind) {
      state.kind = kind; state.page = 0; state.items = []; state.query = '';
      if (searchInput) searchInput.value = '';
      setManage(false);
      // 离开收藏专辑视图时清理其专属 UI
      state.favView = null; state.album = null;
      removeAlbumHead();
      var _mv = document.getElementById('acc-movesel'); if (_mv) _mv.style.display = 'none';
      document.getElementById('acc-clear').style.display = '';
      var canManage = kind !== 'comment';
      toolbar.style.display = canManage ? 'flex' : 'none';
      if (canManage) document.getElementById('acc-clear').textContent = CLEAR_LABEL[kind] || '清空';
      listEl.innerHTML = '<div class="acc-loading">加载中…</div>'; pagerEl.hidden = true;
      try {
        if (kind === 'comment') {
          var base = SiteAuth.API_BASE.replace('zircon-urge', 'zircon-comments');
          var rc = await SiteAuth.authedFetch(base + '/my-comments');
          if (!rc.ok) throw new Error('comment endpoint');
          var dc = await rc.json();
          state.items = (dc && dc.items) || [];
          renderPage();
          return;
        }
        var r = await SiteAuth.authedFetch(api + '?action=list&kind=' + kind);
        var d = await r.json();
        if (d && d.ok) { state.items = d.items || []; renderPage(); }
        else listEl.innerHTML = '<div class="acc-empty">加载失败，稍后再试。</div>';
      } catch (e) {
        listEl.innerHTML = kind === 'comment'
          ? '<div class="acc-empty">评论记录暂时拉不到，稍后再试。</div>'
          : '<div class="acc-empty">网络不太顺，稍后再试。</div>';
      }
    }

    // ── 收藏专辑（收藏夹）─────────────────────────────────────
    // 收藏页先给出「收藏夹网格」；点进一个夹子 = 复用下面的列表机制（按 album 过滤）。
    function ensureAlbBtns() {
      var mv = document.getElementById('acc-movesel');
      if (!mv) {
        mv = document.createElement('button');
        mv.id = 'acc-movesel'; mv.type = 'button'; mv.className = 'acc-tool-btn';
        mv.textContent = '移动到…'; mv.style.display = 'none';
        var delsel = document.getElementById('acc-delsel');
        delsel.parentNode.insertBefore(mv, delsel);
        mv.addEventListener('click', function () {
          var posts = selectedPosts();
          if (!posts.length) { alert('先勾选要移动的文章'); return; }
          chooseAlbumModal(function (albId) { moveSelected(posts, albId); });
        });
      }
      return mv;
    }
    function removeAlbumHead() { var h = document.getElementById('acc-albhead'); if (h) h.remove(); }
    function showAlbumHead(album) {
      removeAlbumHead();
      var head = document.createElement('div');
      head.id = 'acc-albhead'; head.className = 'acc-albhead';
      head.innerHTML = '<button type="button" class="acc-alb-back">‹ 收藏夹</button>' +
        '<span class="acc-albhead-n">' + esc(album.name) + '</span>' +
        (album.id ? '<button type="button" class="acc-albhead-del">删除收藏夹</button>' : '');
      listSec.insertBefore(head, toolbar);
      head.querySelector('.acc-alb-back').addEventListener('click', showFavGrid);
      var del = head.querySelector('.acc-albhead-del');
      if (del) del.addEventListener('click', function () { deleteAlbum(album); });
    }
    function showFavGrid() {
      state.kind = 'fav'; state.favView = 'grid'; state.album = null;
      setManage(false);
      toolbar.style.display = 'none';
      searchRow.hidden = true; pagerEl.hidden = true;
      removeAlbumHead();
      var mv = document.getElementById('acc-movesel'); if (mv) mv.style.display = 'none';
      document.getElementById('acc-clear').style.display = '';
      listEl.classList.remove('manage');
      listEl.innerHTML = '<div class="acc-loading">加载中…</div>';
      SiteAuth.authedFetch(api + '?action=albums').then(function (r) { return r.json(); }).then(function (d) {
        if (!d || !d.ok) { listEl.innerHTML = '<div class="acc-empty">加载失败，稍后再试。</div>'; return; }
        renderFavGrid(d.albums || []);
      }).catch(function () { listEl.innerHTML = '<div class="acc-empty">网络不太顺，稍后再试。</div>'; });
    }
    function renderFavGrid(albums) {
      var tiles = albums.map(function (a) {
        var sps = (a.samples || []).map(function (t) { return '<span class="acc-alb-sp">' + esc(t) + '</span>'; }).join('');
        return '<button class="acc-alb" type="button" data-alb="' + esc(a.id) + '" data-name="' + esc(a.name) + '">' +
          '<span class="acc-alb-n">' + esc(a.name) + '</span>' +
          '<span class="acc-alb-c">' + (a.count || 0) + ' 篇</span>' +
          '<span class="acc-alb-sps">' + sps + '</span></button>';
      }).join('');
      listEl.innerHTML = '<div class="acc-albgrid">' + tiles +
        '<button class="acc-alb acc-alb-new" type="button" id="acc-alb-new"><span class="acc-alb-plus">＋</span><span>新建收藏夹</span></button></div>';
      listEl.querySelectorAll('.acc-alb[data-alb]').forEach(function (t) {
        t.addEventListener('click', function () { openFavAlbum({ id: t.dataset.alb, name: t.dataset.name }); });
      });
      document.getElementById('acc-alb-new').addEventListener('click', function () { promptNewAlbum(null); });
    }
    function openFavAlbum(album) {
      state.kind = 'fav'; state.favView = 'list'; state.album = album;
      state.page = 0; state.query = ''; state.items = [];
      if (searchInput) searchInput.value = '';
      setManage(false);
      toolbar.style.display = 'flex';
      document.getElementById('acc-clear').style.display = 'none';
      ensureAlbBtns().style.display = '';
      showAlbumHead(album);
      listEl.innerHTML = '<div class="acc-loading">加载中…</div>'; pagerEl.hidden = true;
      SiteAuth.authedFetch(api + '?action=list&kind=fav&album=' + encodeURIComponent(album.id))
        .then(function (r) { return r.json(); }).then(function (d) {
          if (d && d.ok) { state.items = d.items || []; renderPage(); }
          else listEl.innerHTML = '<div class="acc-empty">加载失败，稍后再试。</div>';
        }).catch(function () { listEl.innerHTML = '<div class="acc-empty">网络不太顺，稍后再试。</div>'; });
    }
    function promptNewAlbum(cb) {
      var m = modal('<h3 class="acc-modal-title">新建收藏夹</h3>' +
        '<div class="acc-ef-row"><input type="text" id="acc-newalb" maxlength="40" placeholder="收藏夹名字" autocomplete="off"></div>' +
        '<div class="acc-ef-actions"><span class="acc-ef-err" id="acc-newalb-err"></span>' +
        '<button type="button" class="acc-tool-btn" id="acc-newalb-cancel">取消</button>' +
        '<button type="button" class="acc-save" id="acc-newalb-ok">创建</button></div>');
      var inp = m.ov.querySelector('#acc-newalb'); setTimeout(function () { inp.focus(); }, 30);
      var ok = m.ov.querySelector('#acc-newalb-ok');
      m.ov.querySelector('#acc-newalb-cancel').addEventListener('click', m.close);
      function submit() {
        var name = inp.value.trim();
        if (!name) { m.ov.querySelector('#acc-newalb-err').textContent = '起个名字吧'; return; }
        ok.disabled = true;
        SiteAuth.authedFetch(api + '?action=album-create', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name }),
        }).then(function (r) { return r.json(); }).then(function (d) {
          m.close();
          if (d && d.ok && d.album) { if (cb) cb(d.album.id); else showFavGrid(); }
          else if (cb) cb(null);
        }).catch(function () { m.close(); if (cb) cb(null); });
      }
      ok.addEventListener('click', submit);
      inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    }
    function deleteAlbum(album) {
      if (!album.id) return;
      if (!confirm('删除「' + album.name + '」？里面的收藏会退回「默认收藏夹」，文章本身不会删。')) return;
      SiteAuth.authedFetch(api + '?action=album-delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: album.id }),
      }).then(function (r) { return r.json(); }).then(function () { showFavGrid(); }).catch(function () {});
    }
    function chooseAlbumModal(cb) {
      SiteAuth.authedFetch(api + '?action=albums').then(function (r) { return r.json(); }).then(function (d) {
        var albums = (d && d.ok && d.albums) || [{ id: '', name: '默认收藏夹', count: 0 }];
        var opts = albums.map(function (a) {
          return '<button class="acc-alb-pick" type="button" data-alb="' + esc(a.id) + '">' + esc(a.name) +
            '<span>' + (a.count || 0) + ' 篇</span></button>';
        }).join('');
        var m = modal('<h3 class="acc-modal-title">移动到收藏夹</h3><div class="acc-alb-picklist">' + opts +
          '<button class="acc-alb-pick acc-alb-pick-new" type="button" id="acc-pick-new">＋ 新建收藏夹</button></div>');
        m.ov.querySelectorAll('.acc-alb-pick[data-alb]').forEach(function (b) {
          b.addEventListener('click', function () { m.close(); cb(b.dataset.alb); });
        });
        m.ov.querySelector('#acc-pick-new').addEventListener('click', function () {
          m.close(); promptNewAlbum(function (id) { if (id != null) cb(id); });
        });
      }).catch(function () {});
    }
    function moveSelected(posts, albId) {
      var byPost = {}; state.items.forEach(function (it) { byPost[it.post] = it; });
      Promise.all(posts.map(function (p) {
        var it = byPost[p] || {};
        return SiteAuth.authedFetch(api + '?action=fav-move', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ post: p, album: albId, title: it.title, url: it.url }),
        }).then(function (r) { return r.json(); }).catch(function () { return null; });
      })).then(function () {
        setManage(false);
        if (state.album) openFavAlbum(state.album);
      });
    }

    // 翻页控件
    document.getElementById('acc-prev').addEventListener('click', function () { if (state.page > 0) { state.page--; renderPage(); } });
    document.getElementById('acc-next').addEventListener('click', function () { state.page++; renderPage(); });
    document.getElementById('acc-pagesize').addEventListener('change', function () { state.pageSize = parseInt(this.value, 10) || 20; state.page = 0; renderPage(); });

    // 搜索：即输即滤，作用于当前类目、内存过滤零延迟
    searchInput.addEventListener('input', function () { state.query = this.value.trim().toLowerCase(); state.page = 0; renderPage(); });
    // 勾选变化时同步「全选本页 / 取消全选」文案（事件委托，跨重渲存活）
    listEl.addEventListener('change', function (e) {
      if (e.target && e.target.classList && e.target.classList.contains('acc-cb')) updateSelAllLabel();
    });

    // ── 批量管理 ─────────────────────────────────────────────
    function updateSelAllLabel() {
      var btn = document.getElementById('acc-selall');
      if (!btn) return;
      var boxes = listEl.querySelectorAll('.acc-cb');
      var all = boxes.length && Array.prototype.every.call(boxes, function (b) { return b.checked; });
      btn.textContent = all ? '取消全选' : '全选本页';
    }
    function setManage(on) {
      state.manage = on;
      listEl.classList.toggle('manage', on);
      document.getElementById('acc-manage').style.display = on ? 'none' : '';
      document.getElementById('acc-manage-actions').style.display = on ? 'inline-flex' : 'none';
      if (!on) listEl.querySelectorAll('.acc-cb').forEach(function (cb) { cb.checked = false; });
      updateSelAllLabel();
    }
    function selectedPosts() {
      var out = [];
      listEl.querySelectorAll('.acc-item').forEach(function (item) {
        var cb = item.querySelector('.acc-cb');
        if (cb && cb.checked && item.dataset.post) out.push(decodeURIComponent(item.dataset.post));
      });
      return out;
    }
    async function removePosts(posts) {
      if (!posts.length) return;
      try {
        await SiteAuth.authedFetch(api + '?action=remove-batch', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ kind: state.kind, posts: posts }),
        });
        var gone = {}; posts.forEach(function (p) { gone[p] = 1; });
        state.items = state.items.filter(function (it) { return !gone[it.post]; });
        setManage(false); renderPage(); loadStats();
      } catch (e) {}
    }
    document.getElementById('acc-manage').addEventListener('click', function () { if (state.items.length) { setManage(true); renderPage(); } });
    document.getElementById('acc-mgr-done').addEventListener('click', function () { setManage(false); renderPage(); });
    document.getElementById('acc-selall').addEventListener('click', function () {
      var boxes = listEl.querySelectorAll('.acc-cb');
      if (!boxes.length) return;
      var allChecked = Array.prototype.every.call(boxes, function (b) { return b.checked; });
      boxes.forEach(function (b) { b.checked = !allChecked; });
      updateSelAllLabel();
    });
    document.getElementById('acc-delsel').addEventListener('click', async function () {
      var posts = selectedPosts();
      if (!posts.length) return;
      if (!confirm('删除所选的 ' + posts.length + ' 条？此操作不可撤销。')) return;
      this.disabled = true; await removePosts(posts); this.disabled = false;
    });
    document.getElementById('acc-clear').addEventListener('click', async function () {
      if (!confirm(CLEAR_CONFIRM[state.kind] || '确定清空吗？此操作不可撤销。')) return;
      this.disabled = true;
      try {
        var r = await SiteAuth.authedFetch(api + '?action=clear', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ kind: state.kind }),
        });
        if (r.ok) { state.items = []; setManage(false); renderPage(); loadStats(); }
      } catch (e) {}
      this.disabled = false;
    });

    // ── 左导航切换 ────────────────────────────────────────────
    function showPane(pane) {
      navItems.forEach(function (n) { n.classList.toggle('on', n.dataset.pane === pane); });
      if (pane === 'settings') { listSec.hidden = true; setSec.hidden = false; }
      else if (pane === 'fav') { setSec.hidden = true; listSec.hidden = false; showFavGrid(); }
      else { setSec.hidden = true; listSec.hidden = false; loadKind(pane); }
    }
    navItems.forEach(function (n) { n.addEventListener('click', function () { showPane(n.dataset.pane); }); });

    // ── 账号设置 ──────────────────────────────────────────────
    function renderSettings(user) {
      if (!user) { settingsEl.innerHTML = ''; return; }
      settingsEl.innerHTML =
        '<div class="acc-set-row">' +
          '<div class="acc-set-info"><div class="acc-set-t">公开主页</div>' +
            '<div class="acc-set-d">开启后，别人可通过链接查看你的昵称、头像和简介（不含邮箱）；在评论区点你的名字也会跳到这里。' +
            '<br><a id="acc-pub-link" href="/u/?id=' + encodeURIComponent(user.accountId) + '" target="_blank" rel="noopener">查看我的公开主页 →</a></div></div>' +
          '<label class="acc-switch"><input type="checkbox" id="acc-pub-toggle"' + (user.profilePublic !== false ? ' checked' : '') + '><span class="acc-switch-slider"></span></label>' +
        '</div>' +
        '<div class="acc-set-row">' +
          '<div class="acc-set-info"><div class="acc-set-t">登录密码</div>' +
            '<div class="acc-set-d">' + (user.hasPassword ? '已设置，可修改。' : '你现在用 Google 登录；设置密码后也能用「邮箱 + 密码」登录。') + '</div></div>' +
          '<button class="acc-tool-btn" id="acc-pw-btn">' + (user.hasPassword ? '修改密码' : '设置密码') + '</button>' +
        '</div>' +
        '<div class="acc-set-panel" id="acc-pw-panel" hidden></div>' +
        '<div class="acc-set-row">' +
          '<div class="acc-set-info"><div class="acc-set-t">导出我的数据</div>' +
            '<div class="acc-set-d">下载你的资料、收藏、点赞、浏览记录（JSON）。</div></div>' +
          '<button class="acc-tool-btn" id="acc-export-btn">导出</button>' +
        '</div>' +
        '<div class="acc-set-row">' +
          '<div class="acc-set-info"><div class="acc-set-t" style="color:#b5483a;">注销账号</div>' +
            '<div class="acc-set-d">永久删除账号及其收藏 / 点赞 / 浏览记录，不可恢复。</div></div>' +
          '<button class="acc-tool-btn danger-ghost" id="acc-del-btn">注销</button>' +
        '</div>' +
        '<div class="acc-set-panel" id="acc-del-panel" hidden></div>';
      var pubToggle = document.getElementById('acc-pub-toggle');
      if (pubToggle) pubToggle.addEventListener('change', async function () {
        pubToggle.disabled = true;
        var r; try { r = await SiteAuth.updateProfile({ profilePublic: pubToggle.checked }); } catch (e) { r = { ok: false }; }
        if (!r.ok) { pubToggle.checked = !pubToggle.checked; pubToggle.disabled = false; alert('保存失败，再试一次'); }
      });
      document.getElementById('acc-pw-btn').addEventListener('click', function () { togglePwPanel(user); });
      document.getElementById('acc-export-btn').addEventListener('click', doExport);
      document.getElementById('acc-del-btn').addEventListener('click', function () { toggleDelPanel(user); });
    }

    function togglePwPanel(user) {
      var p = document.getElementById('acc-pw-panel');
      if (!p.hidden) { p.hidden = true; p.innerHTML = ''; return; }
      p.hidden = false;
      p.innerHTML =
        '<div style="padding:0.4rem 0 0.6rem;">' +
          (user.hasPassword ? '<div class="acc-ef-row"><label for="acc-pw-old">当前密码</label><input type="password" id="acc-pw-old" autocomplete="current-password"></div>' : '') +
          '<div class="acc-ef-row"><label for="acc-pw-new">新密码（至少 6 位）</label><input type="password" id="acc-pw-new" autocomplete="new-password"></div>' +
          '<div class="acc-ef-row"><label for="acc-pw-new2">确认新密码</label><input type="password" id="acc-pw-new2" autocomplete="new-password"></div>' +
          '<div class="acc-ef-actions"><span class="acc-ef-err" id="acc-pw-err"></span>' +
            '<button type="button" class="acc-tool-btn" id="acc-pw-cancel">取消</button>' +
            '<button type="button" class="acc-save" id="acc-pw-save">保存</button></div>' +
        '</div>';
      document.getElementById('acc-pw-cancel').addEventListener('click', function () { p.hidden = true; p.innerHTML = ''; });
      document.getElementById('acc-pw-save').addEventListener('click', async function () {
        var err = document.getElementById('acc-pw-err'); err.textContent = '';
        var oldP = user.hasPassword ? document.getElementById('acc-pw-old').value : '';
        var n1 = document.getElementById('acc-pw-new').value, n2 = document.getElementById('acc-pw-new2').value;
        if (n1.length < 6) { err.textContent = '新密码至少 6 位'; return; }
        if (n1 !== n2) { err.textContent = '两次输入不一致'; return; }
        this.disabled = true;
        var r; try { r = await SiteAuth.setPassword(oldP, n1); } catch (e) { r = { ok: false }; }
        this.disabled = false;
        if (r.ok) { p.hidden = true; p.innerHTML = ''; alert(user.hasPassword ? '密码已修改' : '密码已设置，以后也能用邮箱 + 密码登录'); }
        else err.textContent = r.error === 'bad_old_password' ? '当前密码不对' : r.error === 'weak_password' ? '新密码至少 6 位' : '保存失败，再试一次';
      });
    }

    async function doExport() {
      var btn = document.getElementById('acc-export-btn');
      var label = btn.textContent; btn.disabled = true; btn.textContent = '导出中…';
      try {
        var r = await SiteAuth.exportData();
        if (r.ok) {
          var blob = new Blob([JSON.stringify(r.data, null, 2)], { type: 'application/json' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'ruizhou-account-' + ((r.data.account && r.data.account.accountId) || 'me') + '.json';
          document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        } else alert('导出失败，稍后再试');
      } catch (e) { alert('导出失败，稍后再试'); }
      btn.disabled = false; btn.textContent = label;
    }

    function toggleDelPanel(user) {
      var p = document.getElementById('acc-del-panel');
      if (!p.hidden) { p.hidden = true; p.innerHTML = ''; return; }
      p.hidden = false;
      p.innerHTML =
        '<div style="border:1px solid #e0b4ad; border-radius:var(--radius-md); padding:1rem; margin:0.4rem 0;">' +
          '<p style="margin:0 0 0.8rem; font-size:0.88rem; color:var(--color-text); line-height:1.6;">注销后，你的账号、收藏、点赞、浏览记录会被<strong>永久删除</strong>、无法恢复。（评论请在评论区自行删除）</p>' +
          (user.hasPassword
            ? '<div class="acc-ef-row"><label for="acc-del-pw">输入密码确认</label><input type="password" id="acc-del-pw" autocomplete="current-password"></div>'
            : '<div class="acc-ef-row"><label for="acc-del-word">输入「注销」二字确认</label><input type="text" id="acc-del-word" placeholder="注销"></div>') +
          '<div class="acc-ef-actions"><span class="acc-ef-err" id="acc-del-err"></span>' +
            '<button type="button" class="acc-tool-btn" id="acc-del-cancel">取消</button>' +
            '<button type="button" class="acc-tool-btn danger" id="acc-del-confirm">确认注销</button></div>' +
        '</div>';
      document.getElementById('acc-del-cancel').addEventListener('click', function () { p.hidden = true; p.innerHTML = ''; });
      document.getElementById('acc-del-confirm').addEventListener('click', async function () {
        var err = document.getElementById('acc-del-err'); err.textContent = '';
        var pw = '';
        if (user.hasPassword) { pw = document.getElementById('acc-del-pw').value; if (!pw) { err.textContent = '请输入密码'; return; } }
        else if (document.getElementById('acc-del-word').value.trim() !== '注销') { err.textContent = '请输入「注销」二字'; return; }
        if (!confirm('最后确认：真的要永久注销账号吗？此操作不可撤销。')) return;
        this.disabled = true;
        var r; try { r = await SiteAuth.deleteAccount(pw); } catch (e) { r = { ok: false }; }
        this.disabled = false;
        if (r.ok) alert('账号已注销。');
        else err.textContent = r.error === 'bad_password' ? '密码不对' : '注销失败，稍后再试';
      });
    }

    var startupHashDone = false;
    function applyAuth(user) {
      if (user) {
        guest.style.display = 'none';
        main.style.display = 'block';
        renderHero(user);
        renderSettings(user);
        // 头像菜单「设置」深链 /account/#settings：首次进入直接落设置面板（在 renderSettings 之后，避免竞态画空面板）
        if (!startupHashDone && location.hash === '#settings') { startupHashDone = true; showPane('settings'); }
        else if (setSec.hidden) { if (state.kind === 'fav') showFavGrid(); else loadKind(state.kind); }
      } else {
        main.style.display = 'none';
        guest.style.display = 'block';
        heroEl.innerHTML = ''; settingsEl.innerHTML = '';
      }
    }
    SiteAuth.onChange(applyAuth);
    // 已在本页时点「设置」深链（hash 变化不重载页面）也切到设置面板
    window.addEventListener('hashchange', function () { if (location.hash === '#settings') showPane('settings'); });
  }
  start();
})();
</script>
