# Site settings
title: 周睿的中文博客 | Rui Zhou
description: 个人随笔与课程笔记存档
url: "https://zirconeey.github.io"
baseurl: ""

author:
  name: 周睿 (Rui Zhou)
  email: ruizhou@psu.edu

# Build settings
markdown: kramdown

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
  # 内部文档（DAILY_REVIEW 是 routine 自动更新目标，保留根路径触发 workflow）
  - docs/
  - DAILY_REVIEW.md
  - "*.log"
  - .claude/
  - .githooks/
  - scripts/
  - tools/

# Collections (if needed)
collections:
  notes:
    output: true            # 让每一篇笔记生成独立的网页
    permalink: /notes/:path/ # URL 路径保持与文件夹结构一致

# 学习资料页：学科分组与显示顺序（思政按惯例排最后）
discipline_order:
  - 经济学
  - 数学
  - 心理学
  - 管理学
  - 通识
  - 体育
  - 思政

study_order:
  - adv-micro-psu
  - adv-metrics-psu
  - adv-metrics-pku
  - adv-micro-pku
  - interm-metrics
  - interm-macro
  - public-econ
  - monetary-econ
  - game-theory
  - causal-id
  - causal-inference
  - china-econ
  - real-anal
  - psy-stat-I
  - psy-stat-II
  - or
  - china-hist
  - corp-fin
  - accounting
  - marxism
  - mao-thought
  - tennis
  - swimming
