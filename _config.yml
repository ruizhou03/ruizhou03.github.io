# Site settings
title: 周睿的中文博客 | Rui Zhou
description: 个人随笔与课程笔记存档
url: "https://ruizhou03.github.io"
baseurl: ""

author:
  name: 周睿 (Rui Zhou)
  email: ruizhou@psu.edu

# 分享卡片（微信/朋友圈/Twitter/通用 OG）的默认封面
# 文章 front-matter 没写 image/cover 时回退到这张
default_share_image: /assets/share/share-default.png

# Build settings
markdown: kramdown

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
  # 内部文档（DAILY_REVIEW / EMAIL_SUMMARY 是 routine 自动更新目标，保留根路径触发 workflow）
  - docs/
  - DAILY_REVIEW.md
  - EMAIL_SUMMARY.md
  - SPOTCHECK_100_REPORT.md
  - SPOTCHECK_100_AGENT_REPORTS.md
  - "*.log"
  - .claude/
  - .githooks/
  - scripts/
  - tools/
  # 播客流水线：参考音 / 生成的 mp3 / 播客稿，都不进 Jekyll 构建
  - audio/

# 播客音频根地址（Cloudflare R2 公共域名 + 前缀）。
# post.html 检测到文章 podcast: true 就自动拼 {{ podcast_base }}/{{ slug }}.mp3。
# 换成你 R2 bucket 开 public access 后拿到的 pub-xxxx.r2.dev 域名。
podcast_base: "https://pub-6ce548df24434edb9fea591e78eecdbd.r2.dev/p"

# Collections (if needed)
collections:
  notes:
    output: true            # 让每一篇笔记生成独立的网页
    permalink: /notes/:path/ # URL 路径保持与文件夹结构一致

# 学习资料页：学科分组与显示顺序
# 通识/体育/思政 合并为"其他"；TOEFL & GRE / 课程测评 / 初升高衔接 由侧栏专区提升为顶级大类
discipline_order:
  - 经济学
  - 数学
  - 心理学
  - 管理学
  - TOEFL & GRE
  - 初升高衔接
  - 其他
  - 课程测评

study_order:
  - adv-micro-psu
  - adv-metrics-psu
  - adv-metrics-pku
  - adv-micro-pku
  - interm-metrics
  - interm-macro
  - public-econ
  - monetary-econ
  - game-theory
  - causal-id
  - causal-inference
  - china-econ
  - real-anal
  - psy-stat-I
  - psy-stat-II
  - or
  - china-hist
  - corp-fin
  - accounting
  - marxism
  - mao-thought
  - tennis
  - swimming
