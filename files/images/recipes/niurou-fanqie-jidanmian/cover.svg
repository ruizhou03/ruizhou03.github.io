<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#ffe8ca"/>
      <stop offset="55%" stop-color="#c83820"/>
      <stop offset="100%" stop-color="#3a0a04"/>
    </radialGradient>
    <radialGradient id="broth" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e85828"/>
      <stop offset="100%" stop-color="#8a2010"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- bowl shadow -->
  <ellipse cx="400" cy="440" rx="280" ry="30" fill="#1a0504" opacity="0.5"/>
  <!-- bowl -->
  <path d="M130,260 Q130,440 400,440 Q670,440 670,260 Z" fill="#f2e8d0" stroke="#6a4018" stroke-width="3"/>
  <!-- broth surface -->
  <ellipse cx="400" cy="260" rx="270" ry="50" fill="url(#broth)"/>
  <!-- egg noodles (thicker, deeper yellow) -->
  <g stroke="#e8b048" stroke-width="3" fill="none" opacity="0.9">
    <path d="M195,256 Q255,246 320,258 Q385,268 445,253 Q505,244 575,262"/>
    <path d="M205,272 Q280,260 345,274 Q415,283 475,268 Q525,262 595,278"/>
    <path d="M215,244 Q290,234 365,248 Q435,260 505,242 Q555,236 605,250"/>
    <path d="M225,284 Q310,272 385,288 Q455,295 515,280 Q565,273 615,288"/>
    <path d="M250,266 Q330,258 405,272 Q470,280 525,266"/>
  </g>
  <!-- tomato chunks -->
  <g stroke="#7a1404" stroke-width="1.5">
    <circle cx="275" cy="245" r="26" fill="#e83820"/>
    <circle cx="355" cy="262" r="22" fill="#f04828"/>
    <circle cx="465" cy="248" r="28" fill="#e83820"/>
    <circle cx="540" cy="266" r="22" fill="#f04828"/>
  </g>
  <!-- tomato highlights -->
  <g fill="#ff7848" opacity="0.6">
    <ellipse cx="270" cy="237" rx="11" ry="5"/>
    <ellipse cx="350" cy="255" rx="9" ry="4"/>
    <ellipse cx="460" cy="240" rx="12" ry="5"/>
    <ellipse cx="535" cy="259" rx="9" ry="4"/>
  </g>
  <!-- ground beef bits (small dark brown clusters) -->
  <g fill="#5a2810" stroke="#3a1808" stroke-width="0.6">
    <ellipse cx="232" cy="270" rx="6" ry="4"/>
    <ellipse cx="246" cy="262" rx="5" ry="3"/>
    <ellipse cx="305" cy="278" rx="6" ry="4"/>
    <ellipse cx="320" cy="270" rx="5" ry="3"/>
    <ellipse cx="395" cy="282" rx="6" ry="4"/>
    <ellipse cx="412" cy="272" rx="5" ry="3"/>
    <ellipse cx="495" cy="278" rx="6" ry="4"/>
    <ellipse cx="510" cy="270" rx="5" ry="3"/>
    <ellipse cx="585" cy="270" rx="5" ry="3"/>
    <ellipse cx="600" cy="278" rx="6" ry="4"/>
  </g>
  <!-- ground beef highlights -->
  <g fill="#8a4828" opacity="0.5">
    <ellipse cx="232" cy="268" rx="3" ry="1.5"/>
    <ellipse cx="305" cy="276" rx="3" ry="1.5"/>
    <ellipse cx="395" cy="280" rx="3" ry="1.5"/>
    <ellipse cx="495" cy="276" rx="3" ry="1.5"/>
    <ellipse cx="600" cy="276" rx="3" ry="1.5"/>
  </g>
  <!-- scallion green flecks -->
  <g fill="#5a9028">
    <ellipse cx="245" cy="252" rx="5" ry="2"/>
    <ellipse cx="325" cy="248" rx="5" ry="2"/>
    <ellipse cx="400" cy="258" rx="5" ry="2"/>
    <ellipse cx="490" cy="252" rx="5" ry="2"/>
    <ellipse cx="570" cy="255" rx="5" ry="2"/>
  </g>
  <!-- cilantro tiny leaves -->
  <g fill="#3a7818">
    <circle cx="290" cy="258" r="2.5"/>
    <circle cx="370" cy="252" r="2.5"/>
    <circle cx="450" cy="262" r="2.5"/>
    <circle cx="520" cy="252" r="2.5"/>
  </g>
  <text x="400" y="555" font-family="'Noto Serif SC', serif" font-size="38" font-weight="700"
        fill="#2a0604" text-anchor="middle" letter-spacing="5">牛 肉 番 茄 鸡 蛋 面</text>
</svg>
