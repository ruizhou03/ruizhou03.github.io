<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#f4ead4"/>
      <stop offset="55%" stop-color="#3e5a4f"/>
      <stop offset="100%" stop-color="#0a1815"/>
    </radialGradient>
    <radialGradient id="soup" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f4e0a8"/>
      <stop offset="60%" stop-color="#c8a560"/>
      <stop offset="100%" stop-color="#705028"/>
    </radialGradient>
    <linearGradient id="bowl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafaf6"/>
      <stop offset="100%" stop-color="#c8c4b0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- bowl outer shadow -->
  <ellipse cx="400" cy="475" rx="280" ry="35" fill="#0a0a02" opacity="0.35"/>
  <!-- bowl rim -->
  <ellipse cx="400" cy="280" rx="275" ry="55" fill="url(#bowl)" stroke="#6a6248" stroke-width="2"/>
  <!-- bowl body -->
  <path d="M125,280 Q125,460 400,465 Q675,460 675,280 Z" fill="url(#bowl)" stroke="#6a6248" stroke-width="2"/>
  <!-- soup surface -->
  <ellipse cx="400" cy="280" rx="260" ry="48" fill="url(#soup)"/>
  <!-- silken tofu cubes (off-white, semi-transparent) -->
  <g fill="#f6f1e0" opacity="0.85" stroke="#d8cea8" stroke-width="0.8">
    <rect x="225" y="282" width="14" height="12" rx="1.5"/>
    <rect x="285" y="270" width="13" height="11" rx="1.5"/>
    <rect x="340" y="288" width="14" height="12" rx="1.5"/>
    <rect x="395" y="272" width="14" height="11" rx="1.5"/>
    <rect x="455" y="290" width="13" height="12" rx="1.5"/>
    <rect x="510" y="276" width="14" height="11" rx="1.5"/>
    <rect x="555" y="293" width="13" height="11" rx="1.5"/>
    <rect x="265" y="298" width="13" height="10" rx="1.5"/>
    <rect x="430" y="305" width="14" height="11" rx="1.5"/>
  </g>
  <!-- tilapia fillet slices (white, slightly translucent) -->
  <g fill="#fafaf2" opacity="0.95" stroke="#cbb88a" stroke-width="1">
    <ellipse cx="305" cy="295" rx="22" ry="6" transform="rotate(-12 305 295)"/>
    <ellipse cx="375" cy="278" rx="22" ry="6" transform="rotate(8 375 278)"/>
    <ellipse cx="445" cy="282" rx="22" ry="6" transform="rotate(-5 445 282)"/>
    <ellipse cx="500" cy="298" rx="20" ry="6" transform="rotate(15 500 298)"/>
    <ellipse cx="245" cy="280" rx="20" ry="5" transform="rotate(20 245 280)"/>
  </g>
  <!-- egg drop ribbons (golden yellow streaks) -->
  <g stroke="#f4d870" stroke-width="3" fill="none" opacity="0.9" stroke-linecap="round">
    <path d="M210,272 Q260,266 310,278 Q360,288 410,276 Q460,266 510,280 Q560,290 600,278"/>
    <path d="M230,300 Q290,294 350,303 Q410,310 470,300 Q530,292 580,302" opacity="0.7"/>
    <path d="M270,260 Q320,258 370,266 Q420,272 470,262" opacity="0.6"/>
    <path d="M195,288 Q230,283 265,290" opacity="0.7"/>
    <path d="M540,270 Q570,267 600,275" opacity="0.6"/>
  </g>
  <!-- ginger julienne -->
  <g stroke="#e8c878" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
    <line x1="265" y1="276" x2="282" y2="278"/>
    <line x1="395" y1="290" x2="412" y2="291"/>
    <line x1="475" y1="270" x2="492" y2="272"/>
    <line x1="335" y1="305" x2="352" y2="306"/>
  </g>
  <!-- cilantro green specks -->
  <g fill="#4a8028">
    <circle cx="280" cy="268" r="2.5"/>
    <circle cx="350" cy="265" r="2"/>
    <circle cx="405" cy="268" r="2.5"/>
    <circle cx="470" cy="265" r="2"/>
    <circle cx="525" cy="272" r="2.5"/>
    <circle cx="310" cy="310" r="2"/>
    <circle cx="425" cy="315" r="2.5"/>
    <circle cx="495" cy="312" r="2"/>
    <circle cx="370" cy="255" r="2"/>
  </g>
  <!-- scallion green slivers -->
  <g fill="#5fa030" opacity="0.9">
    <ellipse cx="300" cy="270" rx="3" ry="1"/>
    <ellipse cx="430" cy="276" rx="3" ry="1"/>
    <ellipse cx="500" cy="272" rx="3" ry="1"/>
    <ellipse cx="360" cy="305" rx="3" ry="1"/>
    <ellipse cx="455" cy="310" rx="3" ry="1"/>
  </g>
  <!-- white pepper specks -->
  <g fill="#f8f0d8" opacity="0.5">
    <circle cx="330" cy="285" r="1"/>
    <circle cx="430" cy="290" r="1"/>
    <circle cx="380" cy="278" r="1"/>
    <circle cx="510" cy="285" r="1"/>
  </g>
  <!-- sesame oil shine -->
  <g fill="#f8d878" opacity="0.55">
    <ellipse cx="355" cy="272" rx="5" ry="2"/>
    <ellipse cx="440" cy="280" rx="4" ry="1.5"/>
    <ellipse cx="290" cy="285" rx="4" ry="1.5"/>
  </g>
  <!-- steam -->
  <g stroke="#fafaf6" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round">
    <path d="M320,230 Q310,200 320,170 Q335,145 320,115"/>
    <path d="M400,225 Q390,195 405,165 Q420,135 405,105"/>
    <path d="M480,230 Q470,200 485,170 Q500,145 485,115"/>
  </g>
  <text x="400" y="555" font-family="'Noto Serif SC', serif" font-size="40" font-weight="700"
        fill="#0a1815" text-anchor="middle" letter-spacing="5">罗 非 鱼 羹</text>
</svg>
