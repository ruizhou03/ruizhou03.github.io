# 百宝箱（toolbox）单一数据源
# 字段说明：
#   id          — 标识符（保留以便日后接 stats / 活动图等用）
#   name        — 显示名（不带 " | Rui Zhou" 后缀）
#   icon        — 卡片左上角 emoji
#   tagline     — 8-12 字精简描述
#   url         — 工具页面 permalink
#   category    — 游戏 / 工作 / 生活
#   subcategory — 仅游戏类用：棋类对战 / 牌类游戏 / 单人小游戏 / 派对多人
#   status      — live | coming
#
# 顺序即页面渲染顺序（Liquid where filter 保持原序）。

