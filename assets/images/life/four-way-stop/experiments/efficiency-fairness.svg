<svg xmlns="http://www.w3.org/2000/svg" width="700" height="460" viewBox="0 0 700 460" role="img" aria-labelledby="title desc">
<title id="title">信号优先程度下的效率公平前沿</title>
<desc id="desc">固定偏流需求下，信号灯主路优先参数改变全部车辆平均延误和最差方向平均延误。四向停车作为参照点。</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;fill:#28313b}
.muted{fill:#66717d} .axis{stroke:#66717d;stroke-width:1} .grid{stroke:#d8dde3;stroke-width:1}
.awsc{stroke:#c65d4b;fill:none} .signal{stroke:#347d67;fill:none}
.awsc-fill{fill:#c65d4b} .signal-fill{fill:#347d67} .surge{fill:#b58a35}
@media(prefers-color-scheme:dark){
  text{fill:#f2f0eb} .muted{fill:#c5c8cc} .axis{stroke:#c5c8cc} .grid{stroke:#555b63}
  .awsc{stroke:#ef8c78} .signal{stroke:#65b99d} .awsc-fill{fill:#ef8c78} .signal-fill{fill:#65b99d} .surge{fill:#d8b566}
}
</style>
<text x="350" y="23" text-anchor="middle" font-size="16" font-weight="600">偏向主路，究竟换来了什么？</text><line class="grid" x1="85" y1="342.0" x2="635" y2="342.0"/><text class="muted" x="77" y="346.0" text-anchor="end" font-size="10">20</text><line class="grid" x1="85" y1="276.0" x2="635" y2="276.0"/><text class="muted" x="77" y="280.0" text-anchor="end" font-size="10">30</text><line class="grid" x1="85" y1="210.0" x2="635" y2="210.0"/><text class="muted" x="77" y="214.0" text-anchor="end" font-size="10">40</text><line class="grid" x1="85" y1="144.0" x2="635" y2="144.0"/><text class="muted" x="77" y="148.0" text-anchor="end" font-size="10">50</text><line class="grid" x1="85" y1="78.0" x2="635" y2="78.0"/><text class="muted" x="77" y="82.0" text-anchor="end" font-size="10">60</text><text class="muted" x="85.0" y="393" text-anchor="middle" font-size="10">10</text><text class="muted" x="268.3" y="393" text-anchor="middle" font-size="10">15</text><text class="muted" x="451.7" y="393" text-anchor="middle" font-size="10">20</text><text class="muted" x="635.0" y="393" text-anchor="middle" font-size="10">25</text><path d="M539.0,298.3 L304.0,356.4 L204.8,332.5 L147.2,306.2 L121.3,272.2 L135.4,237.3 L149.3,206.1" class="signal" stroke-width="2.5"/><circle class="signal-fill" cx="539.0" cy="298.3" r="4"/><text x="546.0" y="293.3" font-size="9">α=0</text><circle class="signal-fill" cx="304.0" cy="356.4" r="4"/><text x="311.0" y="351.4" font-size="9">α=0.25</text><circle class="signal-fill" cx="204.8" cy="332.5" r="4"/><text x="211.8" y="327.5" font-size="9">α=0.5</text><circle class="signal-fill" cx="147.2" cy="306.2" r="4"/><text x="154.2" y="301.2" font-size="9">α=0.75</text><circle class="signal-fill" cx="121.3" cy="272.2" r="4"/><text x="128.3" y="267.2" font-size="9">α=1</text><circle class="signal-fill" cx="135.4" cy="237.3" r="4"/><text x="142.4" y="232.3" font-size="9">α=1.1</text><circle class="signal-fill" cx="149.3" cy="206.1" r="4"/><text x="156.3" y="201.1" font-size="9">α=1.2</text><path class="awsc-fill" d="M447.3,329.8 L453.3,335.8 L447.3,341.8 L441.3,335.8 Z"/><text x="457.3" y="339.8" font-size="10">四向停车</text><line class="axis" x1="85" y1="45" x2="85" y2="375"/><line class="axis" x1="85" y1="375" x2="635" y2="375"/><text class="muted" x="360" y="420" text-anchor="middle" font-size="11">全部车辆平均延误（秒/辆，越左越好）</text><text class="muted" x="20" y="210" transform="rotate(-90 20 210)" text-anchor="middle" font-size="11">最差方向平均延误（秒/辆，越低越好）</text><text class="muted" x="350" y="448" text-anchor="middle" font-size="9">固定需求：总流量 1,600 辆/小时，主路占 80%；α 越大，绿灯越偏向主路</text>
</svg>
