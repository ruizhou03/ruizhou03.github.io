<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
<title id="title">敏感性因素与平均延误反转流量</title>
<desc id="desc">点图比较左转比例、行人流量和停车遵从度变化时，四向停车与信号灯平均延误反转边界的位置。</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;fill:#28313b}
.muted{fill:#66717d} .axis{stroke:#66717d;stroke-width:1} .grid{stroke:#d8dde3;stroke-width:1}
.awsc{stroke:#c65d4b;fill:none} .signal{stroke:#347d67;fill:none}
.awsc-fill{fill:#c65d4b} .signal-fill{fill:#347d67} .surge{fill:#b58a35}
@media(prefers-color-scheme:dark){
  text{fill:#f2f0eb} .muted{fill:#c5c8cc} .axis{stroke:#c5c8cc} .grid{stroke:#555b63}
  .awsc{stroke:#ef8c78} .signal{stroke:#65b99d} .awsc-fill{fill:#ef8c78} .signal-fill{fill:#65b99d} .surge{fill:#d8b566}
}
</style>
<text x="380" y="24" text-anchor="middle" font-size="16" font-weight="600">哪些变量会移动平均延误反转边界？</text><line class="grid" x1="535" y1="42" x2="535" y2="470" stroke-dasharray="4 4"/><text class="muted" x="541" y="51" font-size="9">基准约 1,500</text><text x="12" y="62" font-size="12" font-weight="600">左转比例</text><text class="muted" x="233" y="86" text-anchor="end" font-size="10">0%</text><line class="grid" x1="245" y1="82" x2="710" y2="82"/><circle class="signal-fill" cx="604.7" cy="82" r="4"/><text x="612.7" y="86" font-size="9">1619</text><text class="muted" x="233" y="110" text-anchor="end" font-size="10">10%</text><line class="grid" x1="245" y1="106" x2="710" y2="106"/><circle class="signal-fill" cx="547.9" cy="106" r="4"/><text x="555.9" y="110" font-size="9">1521</text><text class="muted" x="233" y="134" text-anchor="end" font-size="10">20%</text><line class="grid" x1="245" y1="130" x2="710" y2="130"/><circle class="signal-fill" cx="499.2" cy="130" r="4"/><text x="507.2" y="134" font-size="9">1437</text><text class="muted" x="233" y="158" text-anchor="end" font-size="10">30%</text><line class="grid" x1="245" y1="154" x2="710" y2="154"/><circle class="signal-fill" cx="472.5" cy="154" r="4"/><text x="480.5" y="158" font-size="9">1391</text><text class="muted" x="233" y="182" text-anchor="end" font-size="10">40%</text><line class="grid" x1="245" y1="178" x2="710" y2="178"/><circle class="signal-fill" cx="425.8" cy="178" r="4"/><text x="433.8" y="182" font-size="9">1311</text><text x="12" y="206" font-size="12" font-weight="600">行人流量（人/小时）</text><text class="muted" x="233" y="230" text-anchor="end" font-size="10">0</text><line class="grid" x1="245" y1="226" x2="710" y2="226"/><circle class="signal-fill" cx="550.7" cy="226" r="4"/><text x="558.7" y="230" font-size="9">1526</text><text class="muted" x="233" y="254" text-anchor="end" font-size="10">50</text><line class="grid" x1="245" y1="250" x2="710" y2="250"/><circle class="signal-fill" cx="481.9" cy="250" r="4"/><text x="489.9" y="254" font-size="9">1408</text><text class="muted" x="233" y="278" text-anchor="end" font-size="10">100</text><line class="grid" x1="245" y1="274" x2="710" y2="274"/><circle class="signal-fill" cx="422.1" cy="274" r="4"/><text x="430.1" y="278" font-size="9">1305</text><text class="muted" x="233" y="302" text-anchor="end" font-size="10">200</text><line class="grid" x1="245" y1="298" x2="710" y2="298"/><circle class="signal-fill" cx="337.8" cy="298" r="4"/><text x="345.8" y="302" font-size="9">1160</text><text class="muted" x="233" y="326" text-anchor="end" font-size="10">400</text><line class="grid" x1="245" y1="322" x2="710" y2="322"/><circle class="signal-fill" cx="239.4" cy="322" r="4"/><text x="247.4" y="326" font-size="9">990</text><text x="12" y="350" font-size="12" font-weight="600">完整停车比例</text><text class="muted" x="233" y="374" text-anchor="end" font-size="10">60%</text><line class="grid" x1="245" y1="370" x2="710" y2="370"/><circle class="signal-fill" cx="662.1" cy="370" r="4"/><text x="670.1" y="374" font-size="9">1718</text><text class="muted" x="233" y="398" text-anchor="end" font-size="10">70%</text><line class="grid" x1="245" y1="394" x2="710" y2="394"/><circle class="signal-fill" cx="603.8" cy="394" r="4"/><text x="611.8" y="398" font-size="9">1617</text><text class="muted" x="233" y="422" text-anchor="end" font-size="10">80%</text><line class="grid" x1="245" y1="418" x2="710" y2="418"/><circle class="signal-fill" cx="551.5" cy="418" r="4"/><text x="559.5" y="422" font-size="9">1527</text><text class="muted" x="233" y="446" text-anchor="end" font-size="10">90%</text><line class="grid" x1="245" y1="442" x2="710" y2="442"/><circle class="signal-fill" cx="503.7" cy="442" r="4"/><text x="511.7" y="446" font-size="9">1445</text><text class="muted" x="233" y="470" text-anchor="end" font-size="10">100%</text><line class="grid" x1="245" y1="466" x2="710" y2="466"/><circle class="signal-fill" cx="471.5" cy="466" r="4"/><text x="479.5" y="470" font-size="9">1390</text><line class="axis" x1="245" y1="475" x2="710" y2="475"/><text class="muted" x="245.0" y="492" text-anchor="middle" font-size="10">1000</text><text class="muted" x="361.2" y="492" text-anchor="middle" font-size="10">1200</text><text class="muted" x="477.5" y="492" text-anchor="middle" font-size="10">1400</text><text class="muted" x="593.8" y="492" text-anchor="middle" font-size="10">1600</text><text class="muted" x="710.0" y="492" text-anchor="middle" font-size="10">1800</text><text class="muted" x="478" y="514" text-anchor="middle" font-size="11">插值得到的反转流量（辆/小时）</text>
