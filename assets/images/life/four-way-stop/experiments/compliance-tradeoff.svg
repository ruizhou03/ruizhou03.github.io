<svg xmlns="http://www.w3.org/2000/svg" width="700" height="390" viewBox="0 0 700 390" role="img" aria-labelledby="title desc">
<title id="title">停车遵从度的效率与冲突暴露</title>
<desc id="desc">四向停车在每小时一千四百辆的均衡需求下，完整停车比例变化对平均延误和冲突暴露代理的影响。</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;fill:#28313b}
.muted{fill:#66717d} .axis{stroke:#66717d;stroke-width:1} .grid{stroke:#d8dde3;stroke-width:1}
.awsc{stroke:#c65d4b;fill:none} .signal{stroke:#347d67;fill:none}
.awsc-fill{fill:#c65d4b} .signal-fill{fill:#347d67} .surge{fill:#b58a35}
@media(prefers-color-scheme:dark){
  text{fill:#f2f0eb} .muted{fill:#c5c8cc} .axis{stroke:#c5c8cc} .grid{stroke:#555b63}
  .awsc{stroke:#ef8c78} .signal{stroke:#65b99d} .awsc-fill{fill:#ef8c78} .signal-fill{fill:#65b99d} .surge{fill:#d8b566}
}
</style>
<text x="350" y="23" text-anchor="middle" font-size="16" font-weight="600">Rolling stop：一点效率，多少风险暴露？</text><text x="190.0" y="48" text-anchor="middle" font-size="11">平均延误（秒/辆）</text><line class="grid" x1="70" y1="302.0" x2="310" y2="302.0"/><text class="muted" x="62" y="306.0" text-anchor="end" font-size="9">0</text><line class="grid" x1="70" y1="222.0" x2="310" y2="222.0"/><text class="muted" x="62" y="226.0" text-anchor="end" font-size="9">10</text><line class="grid" x1="70" y1="142.0" x2="310" y2="142.0"/><text class="muted" x="62" y="146.0" text-anchor="end" font-size="9">20</text><line class="grid" x1="70" y1="62.0" x2="310" y2="62.0"/><text class="muted" x="62" y="66.0" text-anchor="end" font-size="9">30</text><path d="M70.0,241.3 L130.0,233.5 L190.0,222.3 L250.0,206.9 L310.0,179.2" class="awsc" stroke-width="2.5"/><circle class="awsc-fill" cx="70.0" cy="241.3" r="4"/><circle class="awsc-fill" cx="130.0" cy="233.5" r="4"/><circle class="awsc-fill" cx="190.0" cy="222.3" r="4"/><circle class="awsc-fill" cx="250.0" cy="206.9" r="4"/><circle class="awsc-fill" cx="310.0" cy="179.2" r="4"/><line class="axis" x1="70" y1="62" x2="70" y2="302"/><line class="axis" x1="70" y1="302" x2="310" y2="302"/><text class="muted" x="70.0" y="319" text-anchor="middle" font-size="9">60%</text><text class="muted" x="130.0" y="319" text-anchor="middle" font-size="9">70%</text><text class="muted" x="190.0" y="319" text-anchor="middle" font-size="9">80%</text><text class="muted" x="250.0" y="319" text-anchor="middle" font-size="9">90%</text><text class="muted" x="310.0" y="319" text-anchor="middle" font-size="9">100%</text><text x="510.0" y="48" text-anchor="middle" font-size="11">冲突暴露代理（每千辆）</text><line class="grid" x1="390" y1="302.0" x2="630" y2="302.0"/><text class="muted" x="382" y="306.0" text-anchor="end" font-size="9">0</text><line class="grid" x1="390" y1="222.0" x2="630" y2="222.0"/><text class="muted" x="382" y="226.0" text-anchor="end" font-size="9">150</text><line class="grid" x1="390" y1="142.0" x2="630" y2="142.0"/><text class="muted" x="382" y="146.0" text-anchor="end" font-size="9">300</text><line class="grid" x1="390" y1="62.0" x2="630" y2="62.0"/><text class="muted" x="382" y="66.0" text-anchor="end" font-size="9">450</text><path d="M390.0,91.7 L450.0,138.4 L510.0,190.7 L570.0,243.6 L630.0,302.0" class="awsc" stroke-width="2.5"/><circle class="awsc-fill" cx="390.0" cy="91.7" r="4"/><circle class="awsc-fill" cx="450.0" cy="138.4" r="4"/><circle class="awsc-fill" cx="510.0" cy="190.7" r="4"/><circle class="awsc-fill" cx="570.0" cy="243.6" r="4"/><circle class="awsc-fill" cx="630.0" cy="302.0" r="4"/><line class="axis" x1="390" y1="62" x2="390" y2="302"/><line class="axis" x1="390" y1="302" x2="630" y2="302"/><text class="muted" x="390.0" y="319" text-anchor="middle" font-size="9">60%</text><text class="muted" x="450.0" y="319" text-anchor="middle" font-size="9">70%</text><text class="muted" x="510.0" y="319" text-anchor="middle" font-size="9">80%</text><text class="muted" x="570.0" y="319" text-anchor="middle" font-size="9">90%</text><text class="muted" x="630.0" y="319" text-anchor="middle" font-size="9">100%</text><text class="muted" x="350" y="350" text-anchor="middle" font-size="11">完整停车比例</text><text class="muted" x="350" y="378" text-anchor="middle" font-size="9">冲突暴露不是事故概率：仅计未完整停车且同时存在其它进口车辆或行人的服务事件</text>
</svg>
