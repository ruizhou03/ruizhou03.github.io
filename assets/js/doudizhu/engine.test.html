<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DDZ Engine Tests</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    .case { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; font-family: monospace; font-size: 0.86rem; }
    .pass { color: #2a7a3a; }
    .fail { color: #c0392b; font-weight: bold; }
    .summary { padding: 0.8rem; background: #f5f5f5; margin: 1rem 0; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>🃏 斗地主 engine 测试</h1>
  <p>打开 <code>console</code> 看详细信息；下方展示用例结果。</p>
  <div class="summary" id="summary">运行中…</div>
  <div id="cases"></div>

  <script src="./engine.js"></script>
  <script>
    const E = window.DDZEngine;
    const T = E.TYPES;

    let pass = 0, fail = 0;
    const casesEl = document.getElementById('cases');

    // 辅助：把"♠A,♥A,♦A,♣A"风格描述转成 cardId 数组
    // 简化：用 R(rank, suit) 函数手写
    function R(rank, suit) {
      // rank: 0..12 → 3..2 (我们的 weight)
      return (rank << 2) | suit;
    }
    const SJ = 52, BJ = 53;

    function show(name, ok, detail) {
      const div = document.createElement('div');
      div.className = 'case';
      div.innerHTML = `<span class="${ok ? 'pass' : 'fail'}">${ok ? '✓' : '✗'}</span> ${name}` +
        (detail ? `<span style="color:#888"> — ${detail}</span>` : '');
      casesEl.appendChild(div);
      if (ok) pass++;
      else { fail++; console.error('[FAIL]', name, detail); }
    }

    function expectType(cards, type, weight, extra) {
      const p = E.parsePattern(cards);
      const ok = p && p.type === type && p.weight === weight &&
        (extra?.length == null || p.length === extra.length) &&
        (extra?.kickerCount == null || p.kickerCount === extra.kickerCount);
      show(`parse ${cards.map(E.cardLabel).join(',')} → ${type}@w${weight}${extra?.length ? '(L'+extra.length+')' : ''}`, ok,
        ok ? '' : 'got ' + JSON.stringify(p));
    }

    function expectNull(cards, label) {
      const p = E.parsePattern(cards);
      show(`parse ${label || cards.map(E.cardLabel).join(',')} → null`, p === null, p ? 'got ' + JSON.stringify(p) : '');
    }

    function expectBeat(meCards, prevCards, expected) {
      const me = E.parsePattern(meCards);
      const prev = prevCards ? E.parsePattern(prevCards) : null;
      const got = E.canBeat(me, prev);
      show(`canBeat(${meCards.map(E.cardLabel).join('')} vs ${prevCards?prevCards.map(E.cardLabel).join(''):'null'}) = ${expected}`,
        got === expected, '');
    }

    // ============== 1. 基础牌型 ==============
    expectType([R(0, 0)], T.SINGLE, 0);                     // 单 3
    expectType([SJ], T.SINGLE, 13);                          // 小王
    expectType([BJ], T.SINGLE, 14);                          // 大王
    expectType([R(0, 0), R(0, 1)], T.PAIR, 0);              // 对 3
    expectType([R(11, 0), R(11, 1)], T.PAIR, 11);           // 对 A
    expectNull([SJ, BJ], '小王+大王 → ROCKET（特殊处理）'); // 实际是 rocket，下面单独测
    expectNull([R(0, 0), R(1, 0)], '不同点单非对');

    // 三张
    expectType([R(0, 0), R(0, 1), R(0, 2)], T.TRIPLE, 0);
    expectNull([R(0, 0), R(0, 1), R(1, 0)], '一对+一单不是三');

    // 王炸
    show('rocket parse', E.parsePattern([SJ, BJ]).type === T.ROCKET);

    // 炸弹
    expectType([R(0, 0), R(0, 1), R(0, 2), R(0, 3)], T.BOMB, 0);

    // 三带一
    expectType([R(0, 0), R(0, 1), R(0, 2), R(1, 0)], T.TRIPLE_ONE, 0, { kickerCount: 1 });
    expectType([R(0, 0), R(0, 1), R(0, 2), SJ], T.TRIPLE_ONE, 0, { kickerCount: 1 });

    // 三带二
    expectType([R(0, 0), R(0, 1), R(0, 2), R(1, 0), R(1, 1)], T.TRIPLE_PAIR, 0, { kickerCount: 2 });

    // ============== 2. 单顺 ==============
    expectType([R(0,0),R(1,0),R(2,0),R(3,0),R(4,0)], T.STRAIGHT, 0, { length: 5 }); // 3-4-5-6-7
    expectType([R(7,0),R(8,0),R(9,0),R(10,0),R(11,0)], T.STRAIGHT, 7, { length: 5 }); // 10-J-Q-K-A
    expectNull([R(8,0),R(9,0),R(10,0),R(11,0),R(12,0)], '顺子不能含 2'); // J-Q-K-A-2 非法
    expectNull([R(0,0),R(1,0),R(2,0),R(3,0)], '顺子至少 5 张');
    expectNull([R(0,0),R(1,0),R(2,0),R(3,0),R(5,0)], '不连续');

    // 长顺子 12 张
    const longS = [];
    for (let i = 0; i < 12; i++) longS.push(R(i, 0));
    expectType(longS, T.STRAIGHT, 0, { length: 12 });

    // ============== 3. 连对 ==============
    expectType(
      [R(0,0),R(0,1),R(1,0),R(1,1),R(2,0),R(2,1)],
      T.PAIR_STRAIGHT, 0, { length: 3 }
    );
    expectNull([R(0,0),R(0,1),R(1,0),R(1,1)], '连对至少 3 对');
    expectNull(
      [R(10,0),R(10,1),R(11,0),R(11,1),R(12,0),R(12,1)],
      '连对不能含 2'
    );

    // ============== 4. 飞机 ==============
    expectType(
      [R(0,0),R(0,1),R(0,2),R(1,0),R(1,1),R(1,2)],
      T.PLANE, 0, { length: 2 }
    );
    // 飞机带翼（带单）
    expectType(
      [R(0,0),R(0,1),R(0,2),R(1,0),R(1,1),R(1,2),R(5,0),R(7,0)],
      T.PLANE_ONE, 0, { length: 2, kickerCount: 1 }
    );
    // 飞机带翼（带对）
    expectType(
      [R(0,0),R(0,1),R(0,2),R(1,0),R(1,1),R(1,2),R(5,0),R(5,1),R(7,0),R(7,1)],
      T.PLANE_PAIR, 0, { length: 2, kickerCount: 2 }
    );

    // ============== 5. 四带二 ==============
    expectType(
      [R(0,0),R(0,1),R(0,2),R(0,3),R(5,0),R(7,0)],
      T.FOUR_TWO, 0, { kickerCount: 2 }
    );
    expectType(
      [R(0,0),R(0,1),R(0,2),R(0,3),R(5,0),R(5,1),R(7,0),R(7,1)],
      T.FOUR_TWO_PAIR, 0, { kickerCount: 2 }
    );

    // ============== 6. canBeat 测试 ==============
    expectBeat([R(1,0)], [R(0,0)], true);                                      // 4 > 3
    expectBeat([R(0,0)], [R(1,0)], false);                                     // 3 < 4
    expectBeat([R(12,0)], [R(11,0)], true);                                    // 2 > A
    expectBeat([SJ], [R(12,0)], true);                                         // 小王 > 2
    expectBeat([BJ], [SJ], true);                                              // 大王 > 小王
    // 同型不同长不可比
    expectBeat(
      [R(0,0),R(1,0),R(2,0),R(3,0),R(4,0),R(5,0)],     // 6-顺
      [R(0,0),R(1,0),R(2,0),R(3,0),R(4,0)],            // 5-顺
      false
    );
    // 跨类型不能比（除非炸弹/王炸）
    expectBeat([R(2,0),R(2,1)], [R(0,0)], false);  // pair 不能盖 single
    // 炸弹 vs 普通牌
    expectBeat([R(0,0),R(0,1),R(0,2),R(0,3)], [R(11,0)], true);      // 炸弹盖单 A
    // 炸弹 vs 炸弹
    expectBeat(
      [R(5,0),R(5,1),R(5,2),R(5,3)],
      [R(2,0),R(2,1),R(2,2),R(2,3)],
      true
    );
    // 王炸最大
    expectBeat([SJ, BJ], [R(0,0),R(0,1),R(0,2),R(0,3)], true);
    expectBeat([R(0,0),R(0,1),R(0,2),R(0,3)], [SJ, BJ], false);
    // 首出（prev=null）任意合法都能出
    expectBeat([R(5,0)], null, true);

    // ============== 7. 边界与陷阱 ==============
    // J-Q-K-A-2 不是顺子
    expectNull([R(8,0),R(9,0),R(10,0),R(11,0),R(12,0)]);
    // 王不能进顺子
    expectNull([R(8,0),R(9,0),R(10,0),R(11,0),BJ]);
    // 三带一不能带"和三同点"的牌（其实拆出来也只剩 3 张同点，不可能有第 4 张）
    // 这里测试三带的 kicker 是单不是对 — parser 看到 4 张应判 TRIPLE_ONE 或 BOMB
    // 三带一里 4 张牌 = 三同点 + 一别的 ✓
    expectType([R(0,0),R(0,1),R(0,2),R(1,0)], T.TRIPLE_ONE, 0, { kickerCount: 1 });

    // 飞机带对的对子不能含飞机自己的点
    // [333,444,55,55] 不应该被识别为 plane_pair（只有一种对子 5）— 实际上对子需要 2 种不同点
    // 我们的解析：n=10，groups[3]=[0,1] (3,4), groups[2]=[2] (5) 但只 1 对，flags pairWs.length<2 → 返回 null
    expectNull(
      [R(0,0),R(0,1),R(0,2),R(1,0),R(1,1),R(1,2),R(2,0),R(2,1),R(2,2),R(2,3)],
      '飞机+一对+一炸弹拆不开'
    );

    // ============== 8. enumerateBeats ==============
    function countBeats(handCards, prevCards) {
      const prev = prevCards ? E.parsePattern(prevCards) : null;
      return E.enumerateBeats(handCards, prev).length;
    }
    // 手里有 5,7,9,J，对家出对 4，应该有 0 个对能盖
    show('enum: hand has no pairs higher than prev pair',
      countBeats([R(2,0),R(4,0),R(6,0),R(8,0)], [R(1,0),R(1,1)]) === 0);
    // 手里有炸弹 + 大小王，对单 5 应当有：(单牌 ≥ 6 的) + 炸弹 + 王炸
    const hand1 = [R(3,0),R(4,0),SJ,BJ,R(8,0),R(8,1),R(8,2),R(8,3)];
    show('enum: bomb + rocket count',
      E.enumerateBeats(hand1, E.parsePattern([R(2,0)])).filter(p => p.type === T.BOMB).length === 1 &&
      E.enumerateBeats(hand1, E.parsePattern([R(2,0)])).filter(p => p.type === T.ROCKET).length === 1);

    // ============== 9. decomposeHand ==============
    const dh1 = [R(0,0),R(1,0),R(2,0),R(3,0),R(4,0),R(7,0),R(7,1),R(8,0),R(8,1),R(8,2)];
    // 期望分解：5-顺 (3..7) + 对 J + 三 10 — 共 3 手
    const decomposed1 = E.decomposeHand(dh1);
    const totalCards = decomposed1.reduce((s, p) => s + p.cards.length, 0);
    show('decompose returns full coverage',
      totalCards === dh1.length,
      `got ${decomposed1.length} plays, ${totalCards} cards (expected ${dh1.length})`);

    // 全单：17 张 3..K 各一 + A
    const dh2 = [];
    for (let i = 0; i < 12; i++) dh2.push(R(i, 0));
    dh2.push(SJ); dh2.push(BJ); dh2.push(R(0, 1)); dh2.push(R(1, 1)); dh2.push(R(2, 1));
    const decomposed2 = E.decomposeHand(dh2);
    const total2 = decomposed2.reduce((s, p) => s + p.cards.length, 0);
    show('decompose 17 张全分解到位', total2 === dh2.length);

    // ============== 10. 真实场景 ==============
    // 起手 17 张随机，必须能分解
    for (let trial = 0; trial < 5; trial++) {
      const d = E.deal();
      const hand = d.hands[0];
      const dec = E.decomposeHand(hand);
      const totalC = dec.reduce((s, p) => s + p.cards.length, 0);
      show(`随机起手 trial${trial}: 分解覆盖完整`,
        totalC === hand.length,
        `${dec.length} plays for ${hand.length} cards`);
    }

    // ============== 总结 ==============
    const total = pass + fail;
    document.getElementById('summary').innerHTML =
      `<strong>${pass}/${total} 通过</strong>` +
      (fail > 0 ? `, <span style="color:#c0392b"><strong>${fail} 失败</strong></span>` : '');
    document.title = `${fail === 0 ? '✅' : '❌'} DDZ Tests (${pass}/${total})`;
    console.log(`Tests done: ${pass}/${total} pass, ${fail} fail`);
  </script>
</body>
</html>
