{%- comment -%}
  锆铌小助手 —— 站内问答小助手，由 default.html 全站挂载。
  问题发给后端 DeepSeek 端点，后端把整站目录喂给 AI，由它判断回答与推荐卡片。
  后端不可用 / 超预算 / 离线时，自动降级回 /assistant-index.json 上的纯前端检索。
  整段用 raw 包裹：里面的 JS 模板字符串/对象字面量不会被 Liquid 误解析。
{%- endcomment -%}
{% raw %}
<style>
  #za-fab {
    position: fixed; right: 2rem;
    bottom: calc(2rem + env(safe-area-inset-bottom));
    z-index: 1080;
    width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--color-highlight); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(30,58,95,0.28);
    transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s, opacity .25s ease;
  }
  #za-fab:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 26px rgba(30,58,95,0.34); }
  #za-fab:active { transform: scale(.94); }
  #za-fab svg { width: 26px; height: 26px; }
  #za-fab.za-hidden { transform: scale(0); opacity: 0; pointer-events: none; }
  /* 阅读时滚动会自动调暗 fab，停下后再亮回——避免长文阅读时金色按钮总在余光里干扰 */
  #za-fab.za-scroll-dim { opacity: .25; }

  #za-panel {
    position: fixed; right: 2rem; bottom: 2rem; z-index: 1085;
    width: 300px; max-width: calc(100vw - 4rem);
    height: 552px; max-height: calc(100vh - 4rem);
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 16px; box-shadow: 0 16px 48px rgba(20,30,50,0.28);
    display: flex; flex-direction: column; overflow: hidden;
    opacity: 0; transform: translateY(16px) scale(.98); pointer-events: none;
    transition: opacity .22s ease, transform .22s cubic-bezier(.4,0,.2,1);
  }
  #za-panel.za-open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

  .za-head {
    background: var(--color-bg); color: var(--color-ink);
    border-bottom: 1px solid var(--color-border);
    padding: .85rem 1rem; display: flex; align-items: center; gap: .5rem; flex: none;
  }
  .za-head h3 { font-size: 1.02rem; font-weight: 600; margin: 0; flex: 1; font-family: var(--font-display); color: var(--color-ink); }
  .za-head .za-spark { color: var(--color-highlight); }
  .za-head .za-sub { font-size: .72rem; color: var(--color-muted); font-weight: 400; }
  .za-close {
    background: transparent; border: none; color: var(--color-muted); cursor: pointer;
    font-size: 1.3rem; line-height: 1; padding: 0 .2rem;
  }
  .za-close:hover { color: var(--color-ink); }

  .za-body {
    flex: 1; overflow-y: auto; padding: 1rem .9rem;
    display: flex; flex-direction: column; gap: .75rem;
    background: var(--color-bg-warm);
  }
  .za-msg { display: flex; }
  .za-msg.user { justify-content: flex-end; }
  .za-bubble {
    max-width: 86%; padding: .6rem .8rem; border-radius: 14px;
    font-size: .9rem; line-height: 1.65; word-break: break-word;
  }
  .za-msg.bot  .za-bubble { background: var(--color-bg); border: 1px solid var(--color-border); border-bottom-left-radius: 4px; color: var(--color-text); }
  .za-msg.user .za-bubble { background: var(--color-accent); color: #fff; border-bottom-right-radius: 4px; }

  .za-card {
    display: block; text-decoration: none; margin-top: .5rem;
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 12px; padding: .65rem .75rem; transition: border-color .15s, transform .15s;
  }
  a.za-card:hover { border-color: var(--color-highlight); transform: translateX(2px); }
  .za-ctype { font-size: .68rem; color: var(--color-highlight); font-weight: 600; letter-spacing: .03em; }
  .za-ctitle { font-size: .9rem; font-weight: 600; color: var(--color-ink); margin: .15rem 0; line-height: 1.4; }
  .za-ccat { font-size: .72rem; color: var(--color-light); }
  .za-csum { font-size: .78rem; color: var(--color-muted); margin-top: .3rem; line-height: 1.55; }
  .za-cact { display: flex; gap: .5rem; margin-top: .55rem; flex-wrap: wrap; }
  .za-btn-dl {
    display: inline-flex; align-items: center; gap: .3rem; text-decoration: none;
    background: var(--color-highlight); color: #fff; font-size: .78rem; font-weight: 600;
    padding: .32rem .7rem; border-radius: 999px;
  }
  .za-btn-dl:hover { color: #fff; filter: brightness(1.06); }
  .za-link {
    display: inline-flex; align-items: center; text-decoration: none;
    color: var(--color-accent); font-size: .78rem; font-weight: 600;
    padding: .32rem .6rem; border-radius: 999px; border: 1px solid var(--color-border);
  }
  .za-link:hover { border-color: var(--color-accent); color: var(--color-accent); }

  .za-chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .55rem; }
  .za-chip {
    background: var(--color-bg); border: 1px solid var(--color-border); cursor: pointer;
    color: var(--color-accent); font-size: .78rem; font-family: inherit;
    padding: .32rem .65rem; border-radius: 999px; transition: border-color .15s;
  }
  .za-chip:hover { border-color: var(--color-highlight); }

  .za-typing span {
    display: inline-block; width: 6px; height: 6px; margin: 0 1px; border-radius: 50%;
    background: var(--color-light); animation: za-blink 1.2s infinite both;
  }
  .za-typing span:nth-child(2) { animation-delay: .2s; }
  .za-typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes za-blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }

  .za-foot {
    flex: none; display: flex; gap: .5rem; padding: .7rem .8rem;
    border-top: 1px solid var(--color-border); background: var(--color-bg);
    align-items: flex-end;
  }
  .za-input {
    flex: 1; border: 1px solid var(--color-border); border-radius: 18px;
    padding: .55rem .9rem; font-size: .88rem; background: var(--color-bg-warm);
    color: var(--color-text); outline: none; font-family: inherit;
    line-height: 1.5; resize: none; overflow-y: auto;
    /* 默认两行高，最多长到 6 行后内部滚动 */
    min-height: 3.75rem; height: 3.75rem; max-height: 9.5rem;
    box-sizing: border-box;
  }
  .za-input:focus { border-color: var(--color-highlight); }
  .za-send {
    flex: none; width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--color-accent); color: #fff; display: flex; align-items: center; justify-content: center;
  }
  .za-send:hover { filter: brightness(1.1); }
  .za-send svg { width: 18px; height: 18px; }

  .za-fb {
    display: flex; gap: .35rem; margin-top: .4rem;
    opacity: .65; transition: opacity .15s;
  }
  .za-msg.bot:hover .za-fb { opacity: 1; }
  .za-fb-btn {
    background: transparent; border: 1px solid var(--color-border); cursor: pointer;
    color: var(--color-muted); font-size: .78rem; line-height: 1; font-family: inherit;
    padding: .22rem .5rem; border-radius: 999px;
    display: inline-flex; align-items: center; gap: .25rem;
    transition: border-color .15s, color .15s, background .15s;
  }
  .za-fb-btn:hover { border-color: var(--color-highlight); color: var(--color-ink); }
  .za-fb-btn.za-fb-on-up { border-color: var(--color-highlight); color: var(--color-highlight); background: rgba(201,169,110,.08); }
  .za-fb-btn.za-fb-on-down { border-color: #c97070; color: #c97070; background: rgba(201,112,112,.08); }

  @media (max-width: 600px) {
    #za-fab {
      right: 1rem;
      bottom: calc(1.5rem + env(safe-area-inset-bottom));
    }
    #za-panel {
      left: 0; right: 0; bottom: 0; width: 100%; max-width: 100%;
      height: 82vh; max-height: 82vh; border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
  }

  /* ===== 顶部搜索 modal（cmd-k 风格）===== */
  #zs-mask {
    position: fixed; inset: 0; z-index: 1090;
    background: rgba(15,23,42,.45);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none; transition: opacity .18s ease;
  }
  #zs-mask.zs-open { opacity: 1; pointer-events: auto; }

  #zs-modal {
    position: fixed; z-index: 1091;
    top: 12vh; left: 50%; transform: translateX(-50%) translateY(-12px) scale(.98);
    width: min(620px, calc(100vw - 2.4rem));
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 14px; box-shadow: 0 24px 60px rgba(15,23,42,.32);
    display: flex; flex-direction: column; overflow: hidden;
    opacity: 0; pointer-events: none;
    transition: opacity .22s ease, transform .22s cubic-bezier(.4,0,.2,1);
    max-height: 76vh;
  }
  #zs-modal.zs-open { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); pointer-events: auto; }

  .zs-input-row {
    display: flex; align-items: center; gap: .65rem;
    padding: .85rem 1rem; border-bottom: 1px solid var(--color-border);
    flex: none;
  }
  .zs-input-row svg { width: 18px; height: 18px; color: var(--color-muted); flex: none; }
  #zs-input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 1rem; color: var(--color-ink);
    padding: .2rem 0; min-width: 0;
  }
  #zs-input::placeholder { color: var(--color-light); }
  .zs-esc {
    flex: none; font-family: inherit; font-size: .72rem; color: var(--color-muted);
    border: 1px solid var(--color-border); border-radius: 4px;
    padding: .15rem .4rem; background: var(--color-bg-warm);
  }

  .zs-body {
    flex: 1; overflow-y: auto; padding: .4rem 0;
    background: var(--color-bg);
  }
  .zs-empty {
    padding: 1.4rem 1rem; text-align: center;
    color: var(--color-muted); font-size: .88rem; line-height: 1.7;
  }
  .zs-empty .zs-empty-strong { color: var(--color-ink); font-weight: 600; }
  .zs-chip-row { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin-top: .7rem; }
  .zs-chip {
    background: var(--color-bg-warm); border: 1px solid var(--color-border); cursor: pointer;
    color: var(--color-accent); font-size: .8rem; font-family: inherit;
    padding: .32rem .7rem; border-radius: 999px; transition: border-color .15s, color .15s;
  }
  .zs-chip:hover { border-color: var(--color-highlight); color: var(--color-highlight); }

  .zs-group {
    font-size: .68rem; color: var(--color-muted); font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    padding: .55rem 1rem .25rem;
  }
  .zs-row {
    display: flex; align-items: center; gap: .7rem;
    padding: .55rem 1rem; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .zs-row:hover, .zs-row.zs-sel {
    background: var(--color-bg-warm); border-left-color: var(--color-highlight);
  }
  .zs-row-icon {
    width: 24px; height: 24px; border-radius: 6px; flex: none;
    display: flex; align-items: center; justify-content: center;
    background: var(--color-bg-warm); font-size: .85rem;
  }
  .zs-row.zs-sel .zs-row-icon { background: var(--color-bg); }
  .zs-row-text { flex: 1; min-width: 0; }
  .zs-row-title {
    font-size: .92rem; font-weight: 500; color: var(--color-ink);
    line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .zs-row-cat {
    font-size: .72rem; color: var(--color-muted); margin-top: .1rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .zs-row-enter {
    flex: none; font-size: .7rem; color: var(--color-muted);
    opacity: 0; transition: opacity .12s;
  }
  .zs-row.zs-sel .zs-row-enter { opacity: 1; }

  .zs-row-dl {
    flex: none; display: inline-flex; align-items: center; gap: .25rem;
    background: var(--color-highlight); color: #fff;
    border: none; cursor: pointer; font-family: inherit;
    font-size: .75rem; font-weight: 600;
    padding: .28rem .6rem; border-radius: 999px;
    text-decoration: none;
    transition: filter .15s, transform .15s;
  }
  .zs-row-dl:hover { color: #fff; filter: brightness(1.07); transform: translateY(-1px); }
  .zs-row:has(.zs-row-dl) .zs-row-enter { display: none; }

  .zs-foot {
    flex: none; padding: .7rem 1rem;
    border-top: 1px solid var(--color-border); background: var(--color-bg-warm);
    display: flex; align-items: center; justify-content: space-between; gap: .8rem;
    flex-wrap: wrap;
  }
  .zs-foot-tip {
    font-size: .72rem; color: var(--color-muted);
    display: flex; align-items: center; gap: .35rem; flex-wrap: wrap;
  }
  .zs-foot-tip kbd {
    font-family: inherit; font-size: .7rem; color: var(--color-muted);
    border: 1px solid var(--color-border); border-radius: 4px;
    padding: 0 .3rem; background: var(--color-bg);
  }
  .zs-ask-bridge {
    display: inline-flex; align-items: center; gap: .35rem;
    background: var(--color-highlight); color: #fff;
    border: none; cursor: pointer; font-family: inherit;
    font-size: .82rem; font-weight: 600;
    padding: .42rem .9rem; border-radius: 999px;
    transition: filter .15s, transform .15s;
  }
  .zs-ask-bridge:hover { filter: brightness(1.07); transform: translateY(-1px); }
  .zs-ask-bridge .zs-ask-spark { letter-spacing: .04em; }

  @media (max-width: 600px) {
    #zs-modal {
      top: 0; left: 0; right: 0; transform: none;
      width: 100%; max-width: 100%; max-height: 100vh; height: 100vh;
      border-radius: 0; border: none;
    }
    #zs-modal.zs-open { transform: none; }
    .zs-esc { display: none; }
  }
</style>

<button id="za-fab" aria-label="打开站内小助手" title="问问锆铌小助手">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.4 8.5 8.5 0 0 1-3.9-.9L3 21l1.9-5.6a8.38 8.38 0 0 1-.9-3.9 8.5 8.5 0 0 1 8.5-8.4 8.38 8.38 0 0 1 8.5 8.4z"/>
  </svg>
</button>

<div id="zs-mask" aria-hidden="true"></div>
<div id="zs-modal" role="dialog" aria-modal="true" aria-label="搜索">
  <div class="zs-input-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="zs-input" type="text" autocomplete="off" placeholder="搜索文章、笔记或工具…">
    <span class="zs-esc">ESC</span>
  </div>
  <div class="zs-body" id="zs-body"></div>
  <div class="zs-foot">
    <div class="zs-foot-tip"><kbd>↑</kbd><kbd>↓</kbd> 选择 · <kbd>Enter</kbd> 打开 · <kbd>Esc</kbd> 关闭</div>
    <button class="zs-ask-bridge" id="zs-ask-bridge" type="button">
      <span class="zs-ask-spark">✦</span> 让小助手帮我找
    </button>

<div id="za-panel" role="dialog" aria-label="站内小助手">
  <div class="za-head">
    <h3>锆铌小助手<span class="za-spark"> ✦ </span><span class="za-sub">站内检索</span></h3>
    <button class="za-close" aria-label="关闭">×</button>
  </div>
  <div class="za-body" id="za-body"></div>
  <div class="za-foot">
    <textarea class="za-input" id="za-input" placeholder="有什么想找的，尽管问我～" rows="2" autocomplete="off"></textarea>
    <button class="za-send" id="za-send" aria-label="发送">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>

</div>

<script>
(function () {
  'use strict';
  var INDEX_URL = '/assistant-index.json';
  var AI_URL = 'https://zircon-urge.fly.dev/api/assistant';
  var FB_URL  = 'https://zircon-urge.fly.dev/api/assistant-feedback';
  var idx = null, idxLoading = null, greeted = false;

  var fab   = document.getElementById('za-fab');
  var panel = document.getElementById('za-panel');
  var body  = document.getElementById('za-body');
  var input = document.getElementById('za-input');
  var send  = document.getElementById('za-send');
  if (!fab || !panel) return;

  // ---------- 索引加载 ----------
  function loadIndex() {
    if (idx) return Promise.resolve(idx);
    if (idxLoading) return idxLoading;
    idxLoading = fetch(INDEX_URL)
      .then(function (r) { if (!r.ok) throw new Error('idx ' + r.status); return r.json(); })
      .then(function (data) {
        idx = data.map(function (it) {
          return {
            title: it.title || '', url: it.url || '', category: it.category || '',
            type: it.type || 'article', download: it.download || '', summary: it.summary || '',
            hidden: !!it.hidden,
            blob: ((it.title || '') + ' ' + (it.keywords || '') + ' ' + (it.summary || '')).toLowerCase(),
            titleLow: (it.title || '').toLowerCase()
          };
        });
        return idx;
      });
    return idxLoading;
  }

  // ---------- 检索 ----------
  // 纯噪声词：命中也不计分，避免「什么」「资料」之类把无关项拉上来
  var STOP = {'什么':1,'怎么':1,'怎样':1,'如何':1,'哪些':1,'哪个':1,'介绍':1,'想找':1,
    '我想':1,'有没':1,'没有':1,'可以':1,'一下':1,'请问':1,'告诉':1,'关于':1,'这个':1,
    '网站':1,'文章':1,'资料':1,'帮我':1,'谢谢':1,'一篇':1,'推荐':1,'看看':1,'是什':1,
    '找找':1,'内容':1,'一些':1,'这些':1,'那些':1,'知道':1,'想看':1,'一点':1,'东西':1,'有关':1};

  function terms(q) {
    q = (q || '').toLowerCase();
    var out = [], seen = {};
    function add(t) { if (t && t.length >= 2 && !seen[t]) { seen[t] = 1; out.push(t); } }
    (q.match(/[a-z0-9]+/g) || []).forEach(add);
    (q.match(/[一-鿿]+/g) || []).forEach(function (run) {
      if (run.length >= 2 && run.length <= 6) add(run);
      var i;
      for (i = 0; i + 3 <= run.length; i++) add(run.slice(i, i + 3));
      for (i = 0; i + 2 <= run.length; i++) add(run.slice(i, i + 2));
    });
    return out;
  }

  function search(q) {
    var ts = terms(q);
    var matIntent = /资料|下载|pdf|讲义|习题|作业|真题|试卷|往年题|课件|速查|cheat/i.test(q);
    var scored = [];
    var saAdmin = !!(window.SiteAuth && SiteAuth.getUser && SiteAuth.getUser() && SiteAuth.getUser().isAdmin);
    idx.forEach(function (it) {
      if (it.hidden && !saAdmin) return;   // 软隐藏文章：非管理员搜不到
      var s = 0, hit = 0;
      ts.forEach(function (t) {
        if (STOP[t]) return;
        var w = t.length;
        if (it.blob.indexOf(t) >= 0) { s += w; hit++; }
        if (it.titleLow.indexOf(t) >= 0) s += w * 2;
      });
      if (!hit) return;
      if (matIntent && it.type === 'material') s += 6;
      scored.push({ it: it, s: s });
    });
    scored.sort(function (a, b) { return b.s - a.s; });
    var top = scored.length ? scored[0].s : 0;
    var keep = scored.filter(function (x) { return x.s >= Math.max(2, top * 0.22); }).slice(0, 8);
    return { hits: keep.map(function (x) { return x.it; }), matIntent: matIntent };
  }

  // ---------- 渲染 ----------
  function scrollDown() { body.scrollTop = body.scrollHeight; }

  function bubble(role) {
    var msg = document.createElement('div');
    msg.className = 'za-msg ' + role;
    var b = document.createElement('div');
    b.className = 'za-bubble';
    msg.appendChild(b);
    body.appendChild(msg);
    return { msg: msg, b: b };
  }

  function addText(el, text) {
    String(text).split('\n').forEach(function (line, i) {
      if (i) el.appendChild(document.createElement('br'));
      el.appendChild(document.createTextNode(line));
    });
  }

  function pushUser(text) {
    var x = bubble('user');
    addText(x.b, text);
    scrollDown();
  }

  function pushBot(text) {
    var x = bubble('bot');
    addText(x.b, text);
    scrollDown();
    return x.b;
  }

  function showTyping() {
    var x = bubble('bot');
    var t = document.createElement('span');
    t.className = 'za-typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    x.b.appendChild(t);
    scrollDown();
    return x.msg;
  }

  var TYPE_LABEL = { article: '📄 文章', material: '📎 资料', tool: '🧩 小工具' };

  function makeCard(it) {
    var isMat = it.type === 'material';
    var card = document.createElement(isMat ? 'div' : 'a');
    card.className = 'za-card' + (isMat ? ' material' : '');
    if (!isMat) card.href = it.url;

    var type = document.createElement('div');
    type.className = 'za-ctype';
    type.textContent = TYPE_LABEL[it.type] || '📄 文章';
    card.appendChild(type);

    var title = document.createElement('div');
    title.className = 'za-ctitle';
    title.textContent = it.title;
    card.appendChild(title);

    var cat = document.createElement('div');
    cat.className = 'za-ccat';
    cat.textContent = it.category;
    card.appendChild(cat);

    if (it.summary && it.summary.length >= 10) {
      var sum = document.createElement('div');
      sum.className = 'za-csum';
      sum.textContent = it.summary;
      card.appendChild(sum);
    }

    if (isMat) {
      var act = document.createElement('div');
      act.className = 'za-cact';
      if (it.download) {
        var dl = document.createElement('a');
        dl.className = 'za-btn-dl';
        dl.href = it.download;
        dl.setAttribute('download', '');
        dl.textContent = '⬇ 下载文件';
        act.appendChild(dl);
      }
      var more = document.createElement('a');
      more.className = 'za-link';
      more.href = it.url;
      more.textContent = '查看详情';
      act.appendChild(more);
      card.appendChild(act);
    }
    return card;
  }

  function pushCards(lead, hits) {
    var x = bubble('bot');
    if (lead) addText(x.b, lead);
    hits.forEach(function (it) { x.b.appendChild(makeCard(it)); });
    scrollDown();
  }

  // ---------- 👍 / 👎 反馈 ----------
  // 把 {query, reply, cards, kind} 发给后端，后端按归一化问句存到 Redis；
  // 下次同问句到来时，后端可走 shortcut 直接回好评答案，或把好评/差评样例塞进 prompt。
  function sendFeedback(query, reply, cards, kind) {
    try {
      fetch(FB_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: query, reply: reply, cards: cards || [], kind: kind })
      }).catch(function () { /* 失败静默 */ });
    } catch (e) { /* ignore */ }
  }

  function attachFeedback(bubbleEl, query, reply, cards) {
    if (!bubbleEl || !query || !reply) return;
    var wrap = document.createElement('div');
    wrap.className = 'za-fb';

    var up = document.createElement('button');
    up.className = 'za-fb-btn';
    up.type = 'button';
    up.setAttribute('aria-label', '有帮助');
    up.title = '有帮助';
    up.innerHTML = '<span aria-hidden="true">👍</span>';

    var down = document.createElement('button');
    down.className = 'za-fb-btn';
    down.type = 'button';
    down.setAttribute('aria-label', '不好');
    down.title = '不好';
    down.innerHTML = '<span aria-hidden="true">👎</span>';

    // 当前用户态：null = 没投 / 'up' / 'down'。允许反复切换；点同一个再点 = 取消。
    var current = null;
    function applyVisual() {
      up.classList.toggle('za-fb-on-up', current === 'up');
      down.classList.toggle('za-fb-on-down', current === 'down');
    }
    function vote(kind) {
      var next = current === kind ? null : kind;
      current = next;
      applyVisual();
      sendFeedback(query, reply, cards, next || 'none');
    }
    up.addEventListener('click', function () { vote('up'); });
    down.addEventListener('click', function () { vote('down'); });

    wrap.appendChild(up);
    wrap.appendChild(down);
    bubbleEl.appendChild(wrap);
  }

  var CHIPS = ['高微的资料', '怎么报税', '有什么好玩的小游戏', 'VPN 是怎么回事', '推荐一道家常菜'];

  function pushChips() {
    var x = bubble('bot');
    addText(x.b, '要不点个话题，我帮你找找看：');
    var wrap = document.createElement('div');
    wrap.className = 'za-chips';
    CHIPS.forEach(function (c) {
      var chip = document.createElement('button');
      chip.className = 'za-chip';
      chip.textContent = c;
      chip.addEventListener('click', function () { handle(c); });
      wrap.appendChild(chip);
    });
    x.b.appendChild(wrap);
    scrollDown();
  }

  // ---------- 后端 AI（DeepSeek）----------
  // 只发用户问题；后端把整站目录喂给 DeepSeek，由 AI 自己判断回答与推荐。
  // 成功返回 {reply, cards}，任何失败 / 降级 / 离线都返回 null，调用方退回纯检索。
  function askAI(q) {
    var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    var timer = ctrl ? setTimeout(function () { ctrl.abort(); }, 28000) : null;
    return fetch(AI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q }),
      signal: ctrl ? ctrl.signal : undefined
    }).then(function (r) {
      if (timer) clearTimeout(timer);
      return r.ok ? r.json() : null;
    }).then(function (d) {
      if (!d || d.fallback || !d.reply) return null;
      // 防御性：AI 偶尔在回复里塞 [3]、（[0]、[1]）这类条目序号，擦掉再渲染
      var cleaned = String(d.reply)
        .replace(/[（(]\s*(?:\[\s*\d+\s*\][\s、,，]*)+[）)]/g, '')
        .replace(/\[\s*\d+\s*\]/g, '')
        .replace(/[，,]\s*([。；;])/g, '$1')
        .replace(/\s{2,}/g, ' ')
        .trim();
      return { reply: cleaned, cards: Array.isArray(d.cards) ? d.cards : [] };
    }).catch(function () {
      if (timer) clearTimeout(timer);
      return null;
    });
  }

  // 纯检索渲染（AI 不可用时的降级路径，也是 DeepSeek 接入前的原始行为）
  function renderLocal(r, q) {
    if (!r.hits.length) {
      pushBot('没找到和「' + q + '」直接相关的内容 🥲\n换个说法试试，或者点下面的标签逛逛：');
      pushChips();
      return;
    }
    var hasMat = r.hits.some(function (h) { return h.type === 'material'; });
    var lead = (r.matIntent && hasMat)
      ? '为你找到这些资料，点「下载文件」直接保存：'
      : '为你找到这些内容，点卡片就能跳过去：';
    pushCards(lead, r.hits.slice(0, 5));
  }

  // ---------- 对话主流程 ----------
  var INTRO = '你好，我是锆铌小助手 ✦\n' +
    '告诉我你想找什么，我帮你从站里翻出来：\n' +
    '📄 想读的文章（比如「VPN 原理」「报税怎么弄」）\n' +
    '📎 想下载的课程资料（比如「实分析讲义」「中级宏观往年题」）\n' +
    '直接打字问我就行。';

  var ABOUT = '我是这个网站的站内小助手——你问我问题，我会在周睿写过的文章、课程资料和百宝箱小工具里帮你找：' +
    '文章给你卡片、点开直接跳转，资料给你下载按钮、点一下就能存。\n' +
    '我只依据站里真实写过的内容回答，不会瞎编，找不到就是站里暂时还没有。';

  function handle(raw) {
    var q = (raw || '').trim();
    if (!q) return;
    pushUser(q);
    input.value = '';

    if (/^(你好|您好|hi|hello|hey|嗨|哈喽|在吗)/i.test(q)) { pushBot(INTRO); pushChips(); return; }
    if (/你是谁|你是什么|你能(做什么|干什么)|怎么用你|你叫什么|你会什么|帮助/.test(q)) { pushBot(ABOUT); return; }
    if (/^(谢谢|多谢|thx|thanks|感谢)/i.test(q)) { pushBot('不客气～还想找别的随时问我 🙂'); return; }

    var typing = showTyping();
    askAI(q).then(function (ai) {
      if (ai) {
        // AI 路径：把文字 + 推荐卡片整合到同一个气泡里，反馈按钮挂在末尾
        if (typing.parentNode) body.removeChild(typing);
        var replyBubble = pushBot(ai.reply);
        if (ai.cards.length) ai.cards.forEach(function (c) { replyBubble.appendChild(makeCard(c)); });
        attachFeedback(replyBubble, q, ai.reply, ai.cards);
        scrollDown();
        return;
      }
      // 降级路径：AI 不可用时回退到纯前端检索
      return loadIndex().then(function () {
        if (typing.parentNode) body.removeChild(typing);
        renderLocal(search(q), q);
      });
    }).catch(function () {
      if (typing.parentNode) body.removeChild(typing);
      pushBot('一时没连上，可以先用页面顶部的搜索框找找 🙏');
    });
  }

  // ---------- 开关 ----------
  function openPanel() {
    panel.classList.add('za-open');
    fab.classList.add('za-hidden');
    document.body.classList.add('za-panel-open');
    if (!greeted) { greeted = true; pushBot(INTRO); pushChips(); loadIndex().catch(function () {}); }
    setTimeout(function () { input.focus(); }, 250);
  }
  function closePanel() {
    panel.classList.remove('za-open');
    fab.classList.remove('za-hidden');
    document.body.classList.remove('za-panel-open');
  }

  // ---------- 输入框自适应高度 ----------
  // textarea 默认显示两行（CSS .za-input 的 min-height/height），输入跨行时拉到内容
  // 高度，最多 max-height（约 6 行）后内部滚动。autoGrow 从计算样式取边界，不写死 px。
  function autoGrow() {
    input.style.height = 'auto';
    var cs = getComputedStyle(input);
    var minH = parseFloat(cs.minHeight) || 0;
    var maxH = parseFloat(cs.maxHeight) || 9999;
    var next = Math.max(minH, Math.min(input.scrollHeight, maxH));
    input.style.height = next + 'px';
  }
  function resetInput() {
    input.value = '';
    input.style.height = '';  // 回到 CSS 默认（min-height / height）
  }

  fab.addEventListener('click', openPanel);
  panel.querySelector('.za-close').addEventListener('click', closePanel);
  send.addEventListener('click', function () {
    var v = input.value;
    if (!v.trim()) return;
    resetInput();
    handle(v);
  });
  input.addEventListener('input', autoGrow);
  input.addEventListener('keydown', function (e) {
    // Enter 发送，Shift+Enter 换行（IME 输入法候选阶段不拦截）
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
      e.preventDefault();
      var v = input.value;
      if (!v.trim()) return;
      resetInput();
      handle(v);
    }
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && panel.classList.contains('za-open')) closePanel();
  });

  // 点 panel 外（含手机端抽屉露出的上半段）自动收 panel——比每次都点右上 × 顺手
  // setTimeout 0 是为了让 openPanel 的同一 click 事件先冒泡完再绑监听器，否则刚开就被关掉
  function outsideClose(e) {
    if (panel.contains(e.target) || fab.contains(e.target)) return;
    closePanel();
  }
  var _origOpen = openPanel;
  openPanel = function () { _origOpen(); setTimeout(function () { document.addEventListener('click', outsideClose); }, 0); };
  var _origClose = closePanel;
  closePanel = function () { _origClose(); document.removeEventListener('click', outsideClose); };
  fab.removeEventListener('click', _origOpen);
  fab.addEventListener('click', openPanel);
  panel.querySelector('.za-close').removeEventListener('click', _origClose);
  panel.querySelector('.za-close').addEventListener('click', closePanel);

  // 滚动时 fab 自动调暗，500ms 静止后恢复——长文阅读时金色按钮在余光里干扰小一点
  // panel 已 open 时 fab 本来就 hidden，不参与
  var scrollDimTimer = null;
  window.addEventListener('scroll', function () {
    if (panel.classList.contains('za-open')) return;
    fab.classList.add('za-scroll-dim');
    if (scrollDimTimer) clearTimeout(scrollDimTimer);
    scrollDimTimer = setTimeout(function () { fab.classList.remove('za-scroll-dim'); }, 500);
  }, { passive: true });

  // ============================================================
  // 顶部搜索 modal —— cmd-k 风格，与小助手共用 search() / loadIndex()
  // 入口：导航栏 #nav-search-btn 或 ⌘K / Ctrl+K
  // 桥接：modal 底部「让小助手帮我找」按钮 → 关 modal、开 panel、把问题丢给 AI
  // ============================================================
  var mask    = document.getElementById('zs-mask');
  var modal   = document.getElementById('zs-modal');
  var zsInput = document.getElementById('zs-input');
  var zsBody  = document.getElementById('zs-body');
  var zsAsk   = document.getElementById('zs-ask-bridge');
  var navBtn  = document.getElementById('nav-search-btn');

  if (mask && modal && zsInput && zsBody) {
    var TYPE_ICON = { article: '📄', material: '📎', tool: '🧩' };
    var TYPE_NAME = { article: '文章', material: '资料', tool: '小工具' };
    var EMPTY_CHIPS = ['摩擦圆', 'VPN 原理', '报税', '高微讲义', '小游戏'];
    var curHits = [];
    var selIdx = -1;
    var lastQuery = '';

    function renderEmpty() {
      curHits = []; selIdx = -1;
      zsBody.innerHTML = '';
      var wrap = document.createElement('div');
      wrap.className = 'zs-empty';
      wrap.innerHTML = '<span class="zs-empty-strong">站内全局搜索</span><br>'
        + '搜文章、课程资料、百宝箱小工具——试试这些：';
      var chips = document.createElement('div');
      chips.className = 'zs-chip-row';
      EMPTY_CHIPS.forEach(function (c) {
        var b = document.createElement('button');
        b.type = 'button'; b.className = 'zs-chip'; b.textContent = c;
        b.addEventListener('click', function () {
          zsInput.value = c; doSearch(c); zsInput.focus();
        });
        chips.appendChild(b);
      });
      wrap.appendChild(chips);
      zsBody.appendChild(wrap);
      updateAskLabel('');
    }

    function renderNoResults(q) {
      curHits = []; selIdx = -1;
      zsBody.innerHTML = '';
      var wrap = document.createElement('div');
      wrap.className = 'zs-empty';
      wrap.innerHTML = '没找到和「' + escapeHtml(q) + '」直接匹配的内容 🥲<br>'
        + '可以让小助手帮你想想——它能跨措辞猜你的意图。';
      zsBody.appendChild(wrap);
      updateAskLabel(q);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function renderResults(hits, q) {
      curHits = hits; selIdx = hits.length ? 0 : -1;
      zsBody.innerHTML = '';
      // 按 type 分组
      var groups = { article: [], material: [], tool: [] };
      hits.forEach(function (h) {
        (groups[h.type] || groups.article).push(h);
      });
      var globalIdx = 0;
      ['article', 'material', 'tool'].forEach(function (t) {
        if (!groups[t].length) return;
        var head = document.createElement('div');
        head.className = 'zs-group';
        head.textContent = (TYPE_ICON[t] || '📄') + ' ' + TYPE_NAME[t];
        zsBody.appendChild(head);
        groups[t].forEach(function (it) {
          var row = makeRow(it, globalIdx);
          zsBody.appendChild(row);
          globalIdx++;
        });
      });
      updateSelection();
      updateAskLabel(q);
    }

    function makeRow(it, idx) {
      var row = document.createElement('div');
      row.className = 'zs-row';
      row.setAttribute('data-idx', idx);
      var icon = document.createElement('div');
      icon.className = 'zs-row-icon';
      icon.textContent = TYPE_ICON[it.type] || '📄';
      var text = document.createElement('div');
      text.className = 'zs-row-text';
      var title = document.createElement('div');
      title.className = 'zs-row-title';
      title.textContent = it.title;
      var cat = document.createElement('div');
      cat.className = 'zs-row-cat';
      cat.textContent = it.category || '';
      text.appendChild(title);
      if (it.category) text.appendChild(cat);
      row.appendChild(icon); row.appendChild(text);

      if (it.type === 'material' && it.download) {
        var dl = document.createElement('a');
        dl.className = 'zs-row-dl';
        dl.href = it.download;
        dl.setAttribute('download', '');
        dl.innerHTML = '<span aria-hidden="true">⬇</span> 下载';
        dl.title = '直接下载文件';
        // 阻止冒泡，避免点下载触发到 goToHit
        dl.addEventListener('click', function (e) { e.stopPropagation(); });
        row.appendChild(dl);
      } else {
        var enter = document.createElement('span');
        enter.className = 'zs-row-enter';
        enter.textContent = '↵';
        row.appendChild(enter);
      }

      row.addEventListener('mouseenter', function () {
        selIdx = idx; updateSelection();
      });
      row.addEventListener('click', function () { goToHit(it); });
      return row;
    }

    function updateSelection() {
      var rows = zsBody.querySelectorAll('.zs-row');
      rows.forEach(function (r, i) {
        r.classList.toggle('zs-sel', i === selIdx);
        if (i === selIdx) {
          var rect = r.getBoundingClientRect();
          var bodyRect = zsBody.getBoundingClientRect();
          if (rect.top < bodyRect.top) zsBody.scrollTop -= (bodyRect.top - rect.top + 8);
          else if (rect.bottom > bodyRect.bottom) zsBody.scrollTop += (rect.bottom - bodyRect.bottom + 8);
        }
      });
    }

    function updateAskLabel(q) {
      if (q && q.trim()) {
        zsAsk.innerHTML = '<span class="zs-ask-spark">✦</span> 让小助手回答「' + escapeHtml(q.length > 14 ? q.slice(0, 14) + '…' : q) + '」';
      } else {
        zsAsk.innerHTML = '<span class="zs-ask-spark">✦</span> 让小助手帮我找';
      }
    }

    function goToHit(it) {
      if (it.type === 'material' && it.download) {
        // material：先跳详情页（页面里有下载按钮 + 元信息），符合现有交互习惯
        window.location.href = it.url || it.download;
      } else {
        window.location.href = it.url;
      }
    }

    function doSearch(q) {
      lastQuery = q;
      q = (q || '').trim();
      if (!q) { renderEmpty(); return; }
      loadIndex().then(function () {
        var r = search(q);
        if (!r.hits.length) renderNoResults(q);
        else renderResults(r.hits, q);
      }).catch(function () {
        renderNoResults(q);
      });
    }

    function openSearch(prefill) {
      mask.classList.add('zs-open');
      modal.classList.add('zs-open');
      document.body.style.overflow = 'hidden';
      if (typeof prefill === 'string' && prefill) {
        zsInput.value = prefill; doSearch(prefill);
      } else if (!zsInput.value) {
        renderEmpty();
      } else {
        doSearch(zsInput.value);
      }
      setTimeout(function () { zsInput.focus(); zsInput.select(); }, 80);
    }
    function closeSearch() {
      mask.classList.remove('zs-open');
      modal.classList.remove('zs-open');
      document.body.style.overflow = '';
    }

    function bridgeToAssistant(q) {
      q = (q || zsInput.value || '').trim();
      closeSearch();
      // 跳过 INTRO 直接进入对话（避免 panel 第一次打开时铺一屏欢迎语再才看到自己的问题）
      greeted = true;
      panel.classList.add('za-open');
      fab.classList.add('za-hidden');
      document.body.classList.add('za-panel-open');
      loadIndex().catch(function () {});
      if (q) {
        // 直接走聊天主流程：会 push 用户气泡 + 调 AI
        setTimeout(function () { handle(q); }, 60);
      } else {
        // 没有 query 时退到普通的 INTRO 体验
        pushBot(INTRO); pushChips();
        setTimeout(function () { input.focus(); }, 250);
      }
    }

    // 输入框：节流 100ms 触发搜索
    var debounceTimer = null;
    zsInput.addEventListener('input', function () {
      var v = zsInput.value;
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () { doSearch(v); }, 100);
    });

    // 键盘导航
    zsInput.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowDown') {
        if (!curHits.length) return;
        e.preventDefault();
        selIdx = Math.min(selIdx + 1, curHits.length - 1);
        updateSelection();
      } else if (e.key === 'ArrowUp') {
        if (!curHits.length) return;
        e.preventDefault();
        selIdx = Math.max(selIdx - 1, 0);
        updateSelection();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (selIdx >= 0 && curHits[selIdx]) {
          goToHit(curHits[selIdx]);
        } else if (zsInput.value.trim()) {
          // 有 query 但无结果 → 桥接到小助手
          bridgeToAssistant(zsInput.value);
        }
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeSearch();
      }
    });

    // mask 点击关闭
    mask.addEventListener('click', closeSearch);

    // ✦ 桥接按钮
    zsAsk.addEventListener('click', function () { bridgeToAssistant(zsInput.value); });

    // 导航栏入口（只用点击唤起；不再绑定 ⌘K/Ctrl+K/「/」——Windows、手机端本就用不上键盘快捷键）
    if (navBtn) navBtn.addEventListener('click', function () { openSearch(); });

    // 初始化空态
    renderEmpty();
  }
})();
</script>
{% endraw %}
