{%- comment -%}
  统一账号 —— 登录/注册弹窗 + 导航头像组件，由 default.html 全站挂载。
  依赖 /assets/js/auth/auth.js（window.SiteAuth）。导航里放一个 #auth-slot 占位，
  本组件在其中渲染「登录」按钮或登录后的头像菜单。下方 JS 整段用 raw 包裹保护。
{%- endcomment -%}
{% raw %}
<style>
  /* ── 导航里的账号入口 ── */
  #auth-slot { display: flex; align-items: center; }
  /* 管理员专属「数据分析 / 内容管理」按钮（EN 旁），样式对齐 EN/搜索 */
  .nav-admin-links { display: inline-flex; align-items: center; }
  .nav-dash-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.28rem;
    color: var(--color-muted); border: 1px solid var(--color-border); border-radius: 4px;
    padding: 0.26rem 0.5rem; margin-left: 0.4rem; cursor: pointer; text-decoration: none;
    transition: color .2s, border-color .2s; }
  .nav-dash-btn:hover { color: var(--color-highlight); border-color: var(--color-highlight); }
  .nav-dash-tx { display: none; }                          /* 顶栏管理按钮只图标 */
  /* 头像下拉项：图标 + 文字对齐 */
  .sa-menu .sa-mi { display: flex; align-items: center; gap: 0.6rem; }
  .sa-menu .sa-mi svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sa-menu .sa-admin-link { display: none; }                                  /* 桌面：管理入口在顶栏，下拉不显示 */
  @media (max-width: 768px) { .sa-menu .sa-admin-link { display: flex; } }     /* 手机：管理入口收进头像下拉 */
  /* 桌面端：账号入口绝对定位到导航最右（脱离 flex 流 → 主题/语言切换完全不受影响、
     与英文站绝对位置一致）。锚定 position:fixed 的 <nav>，距视口右缘 2.2rem。
     ≤980px 退回内联（窄屏右侧无富余空间，绝对定位会和 EN 重叠）。 */
  @media (min-width: 981px) {
    #auth-slot { position: absolute; right: 2.2rem; top: 50%; transform: translateY(-50%); }
  }
  .sa-login-btn {
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em;
    color: var(--color-muted); background: none;
    border: 1px solid var(--color-border); padding: 0.3rem 0.6rem;
    border-radius: 4px; cursor: pointer; white-space: nowrap;
    transition: color .2s, border-color .2s;
  }
  .sa-login-btn:hover { color: var(--color-highlight); border-color: var(--color-highlight); }
  .sa-avatar-wrap { position: relative; }
  .sa-avatar {
    width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--color-highlight); color: #fff;
    font-size: 0.85rem; font-weight: 700; line-height: 30px; text-align: center;
    padding: 0; font-family: inherit;
  }
  .sa-avatar.sa-avatar-img { background-size: cover; background-position: center; color: transparent; }
  .sa-menu {
    position: absolute; right: 0; top: calc(100% + 8px);
    min-width: 148px; background: var(--color-bg);
    border: 1px solid var(--color-border); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12); padding: 0.35rem;
    display: none; z-index: 1090;
  }
  .sa-menu.open { display: block; }
  .sa-menu-name {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.78rem; color: var(--color-muted); padding: 0.35rem 0.6rem 0.45rem;
    border-bottom: 1px solid var(--color-border); margin-bottom: 0.3rem;
  }
  .sa-menu-nick { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sa-lvpill {
    flex-shrink: 0; font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; line-height: 1;
    color: #fff; background: var(--color-accent); border-radius: 999px; padding: 0.2rem 0.44rem;
    font-variant-numeric: tabular-nums lining-nums;
  }
  .sa-menu a, .sa-menu button {
    display: block; width: 100%; text-align: left; box-sizing: border-box;
    padding: 0.45rem 0.6rem; font-size: 0.85rem; color: var(--color-text);
    background: none; border: none; border-radius: 5px; cursor: pointer;
    text-decoration: none; font-family: inherit;
  }
  .sa-menu a:hover, .sa-menu button:hover { background: var(--color-bg-warm); }
  .sa-menu .sa-logout { color: #b5483a; }

  /* ── 弹窗 ── */
  #sa-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(20,28,40,0.45); backdrop-filter: blur(3px);
    display: none; align-items: center; justify-content: center;
    padding: 1rem;
  }
  #sa-overlay.open { display: flex; }
  .sa-card {
    width: 360px; max-width: 100%; background: var(--color-bg);
    border: 1px solid var(--color-border); border-radius: 14px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.25); padding: 1.6rem 1.6rem 1.8rem;
    position: relative;
  }
  .sa-close {
    position: absolute; top: 0.8rem; right: 0.9rem; z-index: 6; border: none; background: none;
    font-size: 1.4rem; line-height: 1; color: var(--color-muted); cursor: pointer;
  }
  .sa-title { font-size: 1.25rem; font-weight: 700; color: var(--color-ink); margin: 0 0 0.3rem; }
  .sa-sub { font-size: 0.82rem; color: var(--color-muted); margin: 0 0 1.2rem; }
  .sa-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.1rem; }
  .sa-tab {
    flex: 1; padding: 0.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    background: var(--color-bg-warm); color: var(--color-muted);
    border: 1px solid var(--color-border); border-radius: 7px; font-family: inherit;
  }
  .sa-tab.active { background: var(--color-highlight); color: #fff; border-color: var(--color-highlight); }
  .sa-field { margin-bottom: 0.85rem; }
  .sa-field label { display: block; font-size: 0.78rem; color: var(--color-muted); margin-bottom: 0.3rem; }
  .sa-field input {
    width: 100%; box-sizing: border-box; padding: 0.6rem 0.7rem;
    font-size: 0.95rem; font-family: inherit; color: var(--color-text);
    background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 7px;
  }
  .sa-field input:focus { outline: none; border-color: var(--color-highlight); }
  .sa-submit {
    width: 100%; padding: 0.65rem; margin-top: 0.4rem; cursor: pointer;
    font-size: 0.95rem; font-weight: 700; font-family: inherit;
    background: var(--color-highlight); color: #fff; border: none; border-radius: 8px;
  }
  .sa-submit:disabled { opacity: 0.6; cursor: default; }
  .sa-error { min-height: 1.1rem; font-size: 0.8rem; color: #c0392b; margin: 0.5rem 0 0; text-align: center; }
  .sa-hint { font-size: 0.74rem; color: var(--color-light); text-align: center; margin-top: 0.9rem; line-height: 1.5; }
  .sa-google-wrap { margin-top: 1rem; }
  .sa-divider { display: flex; align-items: center; gap: 0.6rem; margin: 0.2rem 0 0.9rem; color: var(--color-light); font-size: 0.78rem; }
  .sa-divider::before, .sa-divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }
  #sa-google-btn { display: flex; justify-content: center; min-height: 40px; }
  /* ── 登录中遮罩：Google 弹窗关闭后到拿到 token 期间盖在卡片上，避免"像是失败了" ── */
  .sa-loading {
    position: absolute; inset: 0; z-index: 5; border-radius: 14px;
    background: var(--color-bg); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.9rem;
  }
  .sa-loading[hidden] { display: none; }
  .sa-spinner {
    width: 30px; height: 30px; border-radius: 50%;
    border: 3px solid var(--color-border); border-top-color: var(--color-highlight);
    animation: sa-spin 0.7s linear infinite;
  }
  @keyframes sa-spin { to { transform: rotate(360deg); } }
  .sa-loading p { margin: 0; font-size: 0.9rem; color: var(--color-muted); letter-spacing: 0.03em; }
  @media (prefers-reduced-motion: reduce) { .sa-spinner { animation-duration: 1.6s; } }
</style>

<div id="auth-modal-root">
  <div id="sa-overlay" role="dialog" aria-modal="true" aria-label="登录或注册">
    <div class="sa-card">
      <button class="sa-close" type="button" aria-label="关闭">&times;</button>
      <h3 class="sa-title" id="sa-title">登录</h3>
      <p class="sa-sub">一个账号，打通收藏、点赞、浏览记录与百宝箱。</p>
      <div class="sa-tabs">
        <button type="button" class="sa-tab active" data-mode="login">登录</button>
        <button type="button" class="sa-tab" data-mode="register">注册</button>
      </div>
      <form id="sa-form" autocomplete="on">
        <div class="sa-field" id="sa-nick-field" style="display:none;">
          <label for="sa-nick">昵称（选填）</label>
          <input type="text" id="sa-nick" maxlength="16" autocomplete="nickname" placeholder="留空就用邮箱前缀">
        </div>
        <div class="sa-field">
          <label for="sa-email">邮箱</label>
          <input type="email" id="sa-email" autocomplete="email" required placeholder="you@example.com">
        </div>
        <div class="sa-field">
          <label for="sa-password">密码</label>
          <input type="password" id="sa-password" autocomplete="current-password" required placeholder="至少 6 位">
        </div>
        <button type="submit" class="sa-submit" id="sa-submit">登录</button>
        <p class="sa-error" id="sa-error"></p>
      </form>
      <!-- Google 登录：仅当配置了 client_id 且 GIS 脚本加载成功才显示（国内被墙时自动隐藏） -->
      <div id="sa-google-wrap" class="sa-google-wrap" style="display:none;">
        <div class="sa-divider"><span>或</span></div>
        <div id="sa-google-btn"></div>
      </div>
      <p class="sa-hint">密码经加盐哈希存储，本站看不到你的明文密码。</p>
      <div class="sa-loading" id="sa-loading" hidden>
        <div class="sa-spinner" aria-hidden="true"></div>
        <p>正在登录…</p>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  if (!window.SiteAuth) return;
  var overlay = document.getElementById('sa-overlay');
  var titleEl = document.getElementById('sa-title');
  var form = document.getElementById('sa-form');
  var emailEl = document.getElementById('sa-email');
  var pwEl = document.getElementById('sa-password');
  var nickEl = document.getElementById('sa-nick');
  var nickField = document.getElementById('sa-nick-field');
  var submitBtn = document.getElementById('sa-submit');
  var errorEl = document.getElementById('sa-error');
  var loadingEl = document.getElementById('sa-loading');
  var tabs = overlay.querySelectorAll('.sa-tab');
  var mode = 'login';

  function setLoading(on) { if (loadingEl) loadingEl.hidden = !on; }

  function setMode(m) {
    mode = m;
    titleEl.textContent = m === 'login' ? '登录' : '注册';
    submitBtn.textContent = m === 'login' ? '登录' : '注册并登录';
    nickField.style.display = m === 'register' ? 'block' : 'none';
    pwEl.setAttribute('autocomplete', m === 'login' ? 'current-password' : 'new-password');
    tabs.forEach(function (t) { t.classList.toggle('active', t.dataset.mode === m); });
    errorEl.textContent = '';
  }
  function open(m) { setMode(m || 'login'); overlay.classList.add('open'); setTimeout(function () { emailEl.focus(); }, 50); }
  function close() { overlay.classList.remove('open'); errorEl.textContent = ''; setLoading(false); form.reset(); }

  tabs.forEach(function (t) { t.addEventListener('click', function () { setMode(t.dataset.mode); }); });
  overlay.querySelector('.sa-close').addEventListener('click', close);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && overlay.classList.contains('open')) close(); });

  var ERRORS = {
    invalid_email: '邮箱格式不对', weak_password: '密码至少 6 位',
    email_taken: '这个邮箱已经注册过了，直接登录吧', bad_credentials: '邮箱或密码不对',
    missing_fields: '请把邮箱和密码填完', login_required: '请先登录',
  };

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    errorEl.textContent = '';
    submitBtn.disabled = true;
    setLoading(true);
    var email = emailEl.value.trim();
    var pw = pwEl.value;
    var nick = nickEl.value.trim();
    var r;
    try {
      r = mode === 'login'
        ? await SiteAuth.login(email, pw)
        : await SiteAuth.register(email, pw, nick);
    } catch (err) {
      r = { ok: false, error: 'network' };
    }
    submitBtn.disabled = false;
    if (r.ok) { close(); return; }
    setLoading(false);
    errorEl.textContent = ERRORS[r.error] || (r.error === 'network' ? '网络不太顺，再试一次' : '出错了，再试一次');
  });

  // ── 导航入口渲染 ──
  var slot = document.getElementById('auth-slot');
  function initial(nick) { return (nick || '?').trim().charAt(0).toUpperCase(); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  // 管理员专属：在导航右侧注入「管理后台」单入口（非管理员则移除）。
  // 进去后再用页内的「数据分析 / 内容管理」板块 tab 切换——顶栏不再重复两个按钮。
  var NAV_ICON_ADMIN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>';
  var ICON_HOME = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>';
  var ICON_LOGOUT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>';
  var ICON_GEAR = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>';
  // 等级段位色（镜像 account/index.html 的 TIERS/perkOf；改配色请两处同步）。下拉只做静态段位色点缀，无流光/无进度条。
  function menuPerkBg(level) {
    if (level >= 10) return 'linear-gradient(100deg,#e6c766,#c88a2d,#e6c766)';
    if (level >= 9)  return '#2f8f6b';
    if (level >= 7)  return '#c0912f';
    if (level >= 5)  return '#6b7480';
    if (level >= 3)  return '#9c6b3c';
    return 'var(--color-accent)';
  }
  function lvPill(user) {
    var lv = user && user.level;
    if (!lv || typeof lv.level !== 'number') return '';
    return '<span class="sa-lvpill" style="background:' + menuPerkBg(lv.level) + '">' + esc(lv.name || ('Lv' + lv.level)) + '</span>';
  }
  function syncAdminNav(user) {
    var controls = document.querySelector('.nav-controls');
    if (!controls) return;
    var existing = document.getElementById('nav-admin-links');
    if (user && user.isAdmin) {
      if (!existing) {
        var wrap = document.createElement('span');
        wrap.id = 'nav-admin-links';
        wrap.className = 'nav-admin-links';
        wrap.innerHTML =
          '<a class="nav-dash-btn" href="/admin/" title="管理后台" aria-label="管理后台">' + NAV_ICON_ADMIN + '<span class="nav-dash-tx">管理后台</span></a>';
        controls.appendChild(wrap);
      }
    } else if (existing && existing.parentNode) {
      existing.parentNode.removeChild(existing);
    }
  }
  function render(user) {
    syncAdminNav(user);
    if (!slot) return;
    if (!user) {
      slot.innerHTML = '<button class="sa-login-btn" type="button">登录</button>';
      slot.querySelector('button').addEventListener('click', function () { open('login'); });
      return;
    }
    slot.innerHTML =
      '<div class="sa-avatar-wrap">' +
        '<button class="sa-avatar" type="button" title="' + esc(user.nick || '') + '">' + esc(initial(user.nick)) + '</button>' +
        '<div class="sa-menu">' +
          '<div class="sa-menu-name">' +
            '<span class="sa-menu-nick">' + esc(user.nick || user.email || '') + '</span>' + lvPill(user) +
          '</div>' +
          '<a class="sa-mi" href="/account/">' + ICON_HOME + '我的主页</a>' +
          '<a class="sa-mi" href="/account/#settings">' + ICON_GEAR + '设置</a>' +
          (user.isAdmin ? '<a class="sa-mi sa-admin-link" href="/admin/">' + NAV_ICON_ADMIN + '管理后台</a>' : '') +
          '<button type="button" class="sa-logout sa-mi">' + ICON_LOGOUT + '退出登录</button>' +
        '</div>' +
      '</div>';
    var avatarBtn = slot.querySelector('.sa-avatar');
    var menu = slot.querySelector('.sa-menu');
    // 有自定义头像则用图片铺满，否则保留首字母
    if (user.avatar && /^data:image\//.test(user.avatar)) {
      avatarBtn.classList.add('sa-avatar-img');
      avatarBtn.style.backgroundImage = 'url("' + user.avatar + '")';
      avatarBtn.textContent = '';
    }
    avatarBtn.addEventListener('click', function (e) { e.stopPropagation(); menu.classList.toggle('open'); });
    document.addEventListener('click', function () { menu.classList.remove('open'); });
    slot.querySelector('.sa-logout').addEventListener('click', function () { SiteAuth.logout(); menu.classList.remove('open'); });
  }

  SiteAuth.onChange(render);

  // 对外暴露：任何按钮都能 SiteAuth.openLogin() 唤起弹窗
  window.SiteAuth.openLogin = open;

  // ── Google 登录（Google Identity Services）──
  // 填上 Google Cloud 的 OAuth Web Client ID 即启用；留空则整块不出现。
  // 国内 gsi/client 脚本被墙，加载失败时按钮静默隐藏，不影响邮箱密码登录。
  var GOOGLE_CLIENT_ID = '845656839887-f6d403jvh63a2vg7bjrdikblrs3u7ufp.apps.googleusercontent.com';
  // 提前与 Google / 后端建立连接（DNS+TLS），等用户走完 Google 弹窗时这几条链路已是热的
  function preconnect(href, cors) {
    var l = document.createElement('link');
    l.rel = 'preconnect'; l.href = href; if (cors) l.crossOrigin = '';
    document.head.appendChild(l);
  }
  function initGoogle() {
    if (!GOOGLE_CLIENT_ID) return;
    var wrap = document.getElementById('sa-google-wrap');
    var btnBox = document.getElementById('sa-google-btn');
    if (!wrap || !btnBox) return;
    preconnect('https://accounts.google.com', true);
    preconnect('https://zircon-urge.fly.dev', true);
    var s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.async = true; s.defer = true;
    s.onload = function () {
      if (!(window.google && google.accounts && google.accounts.id)) return;
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: async function (resp) {
          if (!resp || !resp.credential) return;
          errorEl.textContent = '';
          setLoading(true);   // 弹窗刚关、正在向后端换 token：立刻给"登录中"反馈，别让用户以为失败了
          var r;
          try { r = await SiteAuth.loginWithGoogle(resp.credential); }
          catch (e) { r = { ok: false, error: 'network' }; }
          if (r.ok) { close(); }
          else {
            setLoading(false);
            errorEl.textContent = r.error === 'google_not_configured' ? 'Google 登录暂未开启' : 'Google 登录失败，换邮箱试试';
          }
        },
      });
      google.accounts.id.renderButton(btnBox, {
        theme: 'outline', size: 'large', type: 'standard',
        text: 'continue_with', shape: 'pill', logo_alignment: 'center', width: 296,
      });
      wrap.style.display = 'block';  // 脚本加载成功才显示
    };
    s.onerror = function () { /* 被墙/失败：保持隐藏 */ };
    document.head.appendChild(s);
  }
  initGoogle();
})();
</script>
{% endraw %}
