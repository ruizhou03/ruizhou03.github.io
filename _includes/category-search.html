{%- comment -%}
分类页顶部的全局搜索框：风格与「学习资料」页一致，跨所有小节按标题筛选。
配套 JS 在 category-listing-tools.html 里（按 #cat-search 驱动各小节）。
{%- endcomment -%}
<div class="cat-search-wrap">
  <input type="search" id="cat-search" class="cat-search-input"
         placeholder="{{ include.placeholder | default: '搜索文章或专栏…' }}"
         aria-label="搜索本栏目文章" />
  <div id="cat-search-empty" class="cat-search-empty" hidden>
    没有匹配「<span id="cat-search-q"></span>」的文章 🥲
  </div>
</div>
