{%- comment -%}
全局样式 + JS，扫所有 .post-list-section 容器，给每个加上：折叠搜索 + 翻页（默认 8 条/页）。
每个分类 landing 页面在末尾 include 一次即可。
{%- endcomment -%}
<style>
  .post-list-section { margin-top: 2.5rem; }
  .post-list-head {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .post-list-title {
    font-size: 1.4rem; color: var(--color-accent);
    font-family: var(--font-display); margin: 0;
    flex: 1; min-width: 0;
  }
  .post-list-title .sec-icon { color: var(--color-muted); margin-right: 0.5rem; }

  .section-tools {
    display: flex; align-items: center;
    flex-shrink: 0; gap: 0.15rem;
  }
  /* 分类内筛选框（次要 UI——主搜走顶栏 ⌘K，这里只在本栏内按标题缩小范围）
     设计上嵌入 <header> 内部，由 header 的 margin-bottom 控制到下方内容的间距 */
  .cat-search-wrap { margin: 1.2rem auto 0; text-align: center; }
  .cat-search-input {
    width: 100%; max-width: 260px;
    padding: 0.32rem 0.85rem;
    border: 1px solid var(--color-border);
    border-radius: 16px;
    background: transparent;
    color: var(--color-muted);
    font-family: var(--font-body);
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .cat-search-input::placeholder { color: var(--color-light); }
  .cat-search-input:focus {
    border-color: var(--color-accent); color: var(--color-text);
    background: var(--color-bg);
  }
  .cat-search-empty {
    margin-top: 0.8rem; color: var(--color-light);
    font-style: normal; font-size: 0.88rem;
  }
  .post-list-section.cat-hidden,
  .yearly-story-section.cat-hidden { display: none; }
  /* 专区小节：平时隐藏，仅顶部搜索命中时由 JS 加 .cat-shown 显示 */
  .post-list-section.cat-search-only { display: none; }
  .post-list-section.cat-search-only.cat-shown { display: block; }
  .cat-search-only .download-toggle { display: none; }

  .download-toggle {
    background: transparent; border: 0; cursor: pointer;
    padding: 0.4rem 0.45rem; color: var(--color-muted);
    display: inline-flex; align-items: center; gap: 0.32rem;
    border-radius: 4px; font: inherit; font-size: 0.82rem;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .download-toggle:hover:not(:disabled) { color: var(--color-accent); background: var(--color-bg-warm); }
  .download-toggle:disabled { cursor: wait; }
  .download-toggle.dl-done { color: #6fa878; }
  .download-toggle.dl-done:hover { color: #6fa878; background: transparent; }
  .download-toggle .dl-text { letter-spacing: 0.02em; }
  .download-toggle .dl-text:empty { display: none; }

  .paginated-list { list-style: none; padding: 0; margin: 0; }
  .paginated-item {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0.6rem 0; gap: 1rem;
    border-bottom: 1px dashed var(--color-border);
  }
  .paginated-item.hidden { display: none; }
  .paginated-item a {
    text-decoration: none; color: var(--color-text); font-weight: 500;
    flex: 1; min-width: 0;
  }
  .paginated-item a:hover { color: var(--color-accent); }
  .paginated-item .post-date {
    color: var(--color-light); font-size: 0.88rem;
    font-family: 'Cormorant Garamond', serif;
    white-space: nowrap;
  }
  .paginated-empty {
    padding: 1.2rem 0; text-align: center;
    color: var(--color-light); font-style: normal; font-size: 0.92rem;
  }

  .pagination-wrap {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 0.4rem; margin-top: 1rem; flex-wrap: wrap;
    font-size: 0.92rem;
  }
  .pagination-wrap:empty { display: none; }
  .pg-btn {
    min-width: 30px; padding: 0.25rem 0.55rem;
    border: 1px solid var(--color-border); border-radius: 6px;
    background: var(--color-bg); color: var(--color-text);
    cursor: pointer; font: inherit;
    transition: all 0.15s;
  }
  .pg-btn:hover:not(:disabled):not(.pg-active) {
    border-color: var(--color-accent); color: var(--color-accent);
  }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pg-btn.pg-active {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
  }
  .pg-arrow { font-weight: 600; font-size: 1rem; }
  .pg-ellipsis { color: var(--color-muted); padding: 0 0.2rem; }

  @media (max-width: 768px) {
    .post-list-head { flex-wrap: nowrap; }
  }
</style>

<script>
(function() {
  function computeVisiblePages(current, totalPages) {
    if (totalPages <= 7) {
      var arr = [];
      for (var i = 1; i <= totalPages; i++) arr.push(i);
      return arr;
    }
    var pageSet = {};
    [1, totalPages, current, current - 1, current + 1].forEach(function(p) {
      if (p >= 1 && p <= totalPages) pageSet[p] = true;
    });
    var sorted = Object.keys(pageSet).map(Number).sort(function(a, b) { return a - b; });
    var result = [];
    for (var i = 0; i < sorted.length; i++) {
      if (i > 0 && sorted[i] - sorted[i-1] > 1) result.push('...');
      result.push(sorted[i]);
    }
    return result;
  }

  // 全局搜索词（顶部 #cat-search 驱动，所有小节共用同一个）
  var GQ = '';
  var sections = [];

  function saIsAdmin() {
    try { var u = window.SiteAuth && SiteAuth.getUser && SiteAuth.getUser(); return !!(u && u.isAdmin); }
    catch (e) { return false; }
  }

  function wireSection(section) {
    var list = section.querySelector('.paginated-list');
    if (!list) return;
    var allItems = Array.prototype.slice.call(list.querySelectorAll('.paginated-item'));
    var items = allItems;  // 当前可见集；applyFilter 按管理员状态重算（访客排除软隐藏项 → 消除分页弹坑）
    var pageSize = parseInt(list.dataset.pageSize, 10) || 5;
    var paginationEl = section.querySelector('.pagination-wrap');
    var emptyEl = section.querySelector('.paginated-empty');

    var filteredItems = items.slice();
    var currentPage = 1;
    // search-only 小节（如生活攻略里的菜谱）：平时不出现，只有搜索命中才显示
    var searchOnly = section.classList.contains('cat-search-only');

    function applyFilter() {
      allItems = Array.prototype.slice.call(list.querySelectorAll('.paginated-item'));  // 每次重查，纳入后注入的墓碑(参与分页/回原位)
      // 访客视角排除软隐藏 / 已删除（回收站）项（管理员则纳入并变灰）；分页按可见集重排，不留弹坑
      items = saIsAdmin() ? allItems : allItems.filter(function (i) {
        return i.getAttribute('data-hidden') !== 'true' && i.getAttribute('data-trashed') !== 'true';
      });
      filteredItems = GQ ? items.filter(function(i) {
        return (i.dataset.title || '').indexOf(GQ) !== -1;
      }) : items.slice();
      currentPage = 1;
      if (searchOnly) {
        // 默认 CSS 已隐藏；只有搜索且命中时加 cat-shown 显示出来（无闪烁）
        section.classList.toggle('cat-shown', !!GQ && filteredItems.length > 0);
      } else {
        section.classList.toggle('cat-hidden', !!GQ && filteredItems.length === 0);
      }
      render();
    }

    function render() {
      if (emptyEl) emptyEl.hidden = true;          // 空态交给顶部统一提示
      if (GQ) {
        // 搜索时：命中的全部铺开，不分页、不藏在折叠里 —— 结果直接可见
        var matchSet = new Set(filteredItems);
        items.forEach(function(i) { i.classList.toggle('hidden', !matchSet.has(i)); });
        list.style.display = filteredItems.length === 0 ? 'none' : '';
        paginationEl.innerHTML = '';
        list.style.minHeight = '';
        return;
      }
      var totalPages = Math.max(1, Math.ceil(filteredItems.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      var visible = filteredItems.slice((currentPage - 1) * pageSize, currentPage * pageSize);
      var visibleSet = new Set(visible);
      items.forEach(function(i) {
        if (visibleSet.has(i)) i.classList.remove('hidden');
        else i.classList.add('hidden');
      });

      list.style.display = filteredItems.length === 0 ? 'none' : '';

      renderPagination(totalPages);
      maybeLockHeight(visible.length);
    }

    // 锁定列表 min-height，让翻到最后一页（条目少于满页）时翻页按钮 Y 坐标不跳。
    function maybeLockHeight(visibleCount) {
      if (filteredItems.length <= pageSize) {
        // 全部条目 ≤ 一页：不存在翻页，解锁让列表自然高度
        list.style.minHeight = '';
        return;
      }
      if (visibleCount === pageSize) {
        // 用 rAF 推到下一帧测量——保证 .hidden 类的 display:none 已经
        // 把那些 li 从布局里抽走。如果同步读 offsetHeight，某些浏览器
        // 时序下会返回"所有 li 都还在排队"时的高度，导致 min-height
        // 被锁到几千 px，造成巨大空白。
        requestAnimationFrame(function() {
          var measured = list.offsetHeight;
          // Sanity guard：pageSize 条目对应的合理高度 < pageSize × 80px。
          // 测出来的值如果远超这个上限，几乎肯定是测量时机错了 → 不锁。
          var maxReasonable = pageSize * 80;
          if (measured > 0 && measured <= maxReasonable) {
            list.style.minHeight = measured + 'px';
          } else {
            list.style.minHeight = '';
          }
        });
      }
      // 部分页：沿用之前满页时锁定的值，不更新
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1 || filteredItems.length === 0) {
        paginationEl.innerHTML = '';
        return;
      }
      var html = '';
      html += '<button class="pg-btn pg-arrow" ' + (currentPage === 1 ? 'disabled' : '') + ' data-page="' + (currentPage - 1) + '" aria-label="上一页">‹</button>';
      var pages = computeVisiblePages(currentPage, totalPages);
      pages.forEach(function(p) {
        if (p === '...') {
          html += '<span class="pg-ellipsis">…</span>';
        } else {
          html += '<button class="pg-btn ' + (p === currentPage ? 'pg-active' : '') + '" data-page="' + p + '">' + p + '</button>';
        }
      });
      html += '<button class="pg-btn pg-arrow" ' + (currentPage === totalPages ? 'disabled' : '') + ' data-page="' + (currentPage + 1) + '" aria-label="下一页">›</button>';
      paginationEl.innerHTML = html;
      paginationEl.querySelectorAll('.pg-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (btn.disabled) return;
          var p = parseInt(btn.dataset.page, 10);
          if (!isNaN(p) && p >= 1 && p <= totalPages) {
            currentPage = p;
            render();
          }
        });
      });
    }

    sections.push({ apply: applyFilter, count: function() { return filteredItems.length; } });
    applyFilter();
  }

  document.querySelectorAll('.post-list-section').forEach(wireSection);

  // ── 管理员：把本栏目「已删除」(真404)的文章就地注入到各自 sub_category 小节，成带删除线的墓碑 ──
  function escHtml(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function escAttr(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function tombstoneLi(it) {
    return '<li class="paginated-item sa-tombstone" data-path="' + escAttr(it.path) + '" data-date="' + escAttr(it.date || '') + '" title="已删除 · 点进去是 404">' +
      '<a href="' + escAttr(it.url) + '" style="text-decoration:line-through;opacity:0.55">' + escHtml(it.title || it.url) + '</a>' +
      '<span class="post-date">' + escHtml(it.date || '') + '</span>' +
      '<span class="sa-item-tools"><button type="button" class="sa-item-toggle" data-a="restore">还原</button>' +
      '<button type="button" class="sa-item-toggle sa-danger" data-a="purge">彻底删除</button></span></li>';
  }
  // 按日期(降序)把墓碑插回它原来的位置：插在第一个比它更早的条目前；找不到则追加。
  function insertByDate(list, li, date) {
    if (date) {
      var items = list.querySelectorAll('.paginated-item');
      for (var i = 0; i < items.length; i++) {
        var dd = items[i].getAttribute('data-date') || '';
        if (dd && dd < date) { list.insertBefore(li, items[i]); return; }
      }
    }
    list.appendChild(li);
  }
  function findOrMakeList(article, sub) {
    var secs = article.querySelectorAll('.post-list-section[data-sub]');
    for (var i = 0; i < secs.length; i++) { if (secs[i].getAttribute('data-sub') === sub) return secs[i].querySelector('.paginated-list'); }
    var sec = document.createElement('section');   // 该 sub 的文章被删光了、小节不存在 → 新建一个
    sec.className = 'post-list-section'; sec.setAttribute('data-sub', sub || '其他');
    sec.innerHTML = '<div class="post-list-head"><h2 class="post-list-title"><span class="sec-icon">📂</span>' + escHtml(sub || '其他') + '</h2></div><ul class="paginated-list"></ul>';
    article.appendChild(sec);
    return sec.querySelector('.paginated-list');
  }
  function wireTombstones() {
    Array.prototype.forEach.call(document.querySelectorAll('.sa-tombstone:not([data-sa-wired])'), function (li) {
      li.setAttribute('data-sa-wired', '1');
      var p = li.getAttribute('data-path');
      Array.prototype.forEach.call(li.querySelectorAll('.sa-item-toggle'), function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault(); e.stopPropagation();
          var a = btn.getAttribute('data-a');
          if (a === 'purge' && !window.confirm('彻底删除？从仓库抹除该文件、站内不可恢复（只能翻 git 历史）。')) return;
          btn.disabled = true; btn.textContent = '…';
          window.SiteAuth.authedFetch('/api/admin?action=' + (a === 'restore' ? 'del-restore' : 'purge'), {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: p })
          })
            .then(function (r) { return r.json().then(function (j) { if (!r.ok) throw j; return j; }); })
            .then(function () { if (li.parentNode) li.parentNode.removeChild(li); })
            .catch(function () { btn.disabled = false; btn.textContent = a === 'restore' ? '还原' : '彻底删除'; });
        });
      });
    });
  }
  var tombstonesDone = false;
  function injectDeletedTombstones() {
    if (tombstonesDone || !window.SiteAuth) return;
    var article = document.querySelector('article');
    if (!article) return;
    var base = location.pathname.replace(/\/+$/, '');   // 例如 /life
    if (!base) return;
    tombstonesDone = true;
    window.SiteAuth.authedFetch('/api/admin?action=deleted-list')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d || !d.items) return;
        var mine = d.items.filter(function (it) {
          var u = (it.url || '').replace(/\/+$/, '');
          return u && u !== base && (u + '/').indexOf(base + '/') === 0;
        });
        if (!mine.length) return;
        function byPath(sel, p) { try { return document.querySelector(sel + '[data-path="' + ((window.CSS && CSS.escape) ? CSS.escape(p) : p) + '"]'); } catch (e) { return null; } }
        mine.forEach(function (it) {
          if (byPath('.sa-tombstone', it.path)) return;                       // 已注入
          var stale = byPath('li.paginated-item:not(.sa-tombstone)', it.path); // 旧构建残留的同路径条 → 移除(避免重复/双计数)，墓碑会插回原位
          if (stale && stale.parentNode) stale.parentNode.removeChild(stale);
          var list = findOrMakeList(article, it.sub || '其他');
          if (!list) return;
          var tmp = document.createElement('div'); tmp.innerHTML = tombstoneLi(it);
          insertByDate(list, tmp.firstChild, it.date);                        // 按日期插回原位
        });
        wireTombstones();
        sections.forEach(function (s) { s.apply(); });                        // 重排分页 → 墓碑回到它原本所在的那一页/那一位
      })
      .catch(function () { tombstonesDone = false; });
  }

  // 管理员登录态确定/变化后重排各小节：访客视角排除软隐藏项（不留弹坑），管理员则纳入并变灰
  (function waitAuth() {
    if (window.SiteAuth && window.SiteAuth.onChange) {
      var last = null;
      window.SiteAuth.onChange(function (u) {
        var a = !!(u && u.isAdmin);
        if (a !== last) { last = a; sections.forEach(function (s) { s.apply(); }); }
        if (a) injectDeletedTombstones();
      });
    } else { setTimeout(waitAuth, 150); }
  })();

  // ─── 顶部全局搜索：跨所有小节按标题筛选，空小节整块隐藏 ───
  (function () {
    var input = document.getElementById('cat-search');
    if (!input) return;
    var emptyEl = document.getElementById('cat-search-empty');
    var qEl = document.getElementById('cat-search-q');
    // 时间线型小节（随笔·生命故事）不按标题搜 —— 搜索时整块收起，清空后恢复
    var timelines = document.querySelectorAll('.yearly-story-section');
    var t;

    function run() {
      GQ = (input.value || '').trim().toLowerCase();
      sections.forEach(function (s) { s.apply(); });
      var total = sections.reduce(function (a, s) { return a + s.count(); }, 0);
      timelines.forEach(function (el) { el.classList.toggle('cat-hidden', !!GQ); });
      if (emptyEl) emptyEl.hidden = !(GQ && total === 0);
      if (qEl) qEl.textContent = GQ;
    }

    input.addEventListener('input', function () {
      clearTimeout(t);
      t = setTimeout(run, 120);
    });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { input.value = ''; run(); }
    });
  })();

  // ─── 每个分组的下载按钮：把该组所有文章 + 同源图片缓存到本地 ───
  function wireDownload(btn) {
    if (!('serviceWorker' in navigator)) {
      btn.style.display = 'none';
      return;
    }
    var section = btn.closest('section');
    if (!section) return;
    var items = section.querySelectorAll('[data-url]');
    var urls = Array.prototype.slice.call(items)
      .map(function (i) { return i.getAttribute('data-url'); })
      .filter(Boolean);
    if (!urls.length) {
      btn.style.display = 'none';
      return;
    }

    var dlText = btn.querySelector('.dl-text');

    function updateLabel(cached, total) {
      if (!cached || cached === 0) {
        dlText.textContent = '';
        btn.classList.remove('dl-done');
      } else if (cached >= total) {
        dlText.textContent = '✓ ' + total;
        btn.classList.add('dl-done');
      } else {
        dlText.textContent = cached + ' / ' + total;
        btn.classList.remove('dl-done');
      }
    }

    // 用 MessageChannel 跟 SW 单次请求-响应
    function askSW(payload, timeoutMs) {
      return new Promise(function (resolve) {
        navigator.serviceWorker.ready.then(function (reg) {
          if (!reg.active) { resolve(null); return; }
          var ch = new MessageChannel();
          var done = false;
          var timer = setTimeout(function () {
            if (done) return;
            done = true;
            resolve(null);
          }, timeoutMs || 4000);
          ch.port1.onmessage = function (ev) {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(ev.data || null);
          };
          reg.active.postMessage(payload, [ch.port2]);
        }, function () { resolve(null); });
      });
    }

    // 页面加载时 sync 一次状态——把上次缓存过的数量持久化反映到按钮文字上
    askSW({ type: 'IS_CACHED_BATCH', urls: urls }).then(function (res) {
      if (!res || res.type !== 'IS_CACHED_BATCH_RESULT') return;
      updateLabel(res.cached, res.total);
    });

    btn.addEventListener('click', async function () {
      if (btn.disabled) return;
      var reg;
      try { reg = await navigator.serviceWorker.ready; } catch (e) {}
      if (!reg || !reg.active) {
        dlText.textContent = '请刷新';
        setTimeout(function () { dlText.textContent = ''; }, 2400);
        return;
      }

      // 先查现状，只下载缺失的——已缓存的不重复 fetch
      var status = await askSW({ type: 'IS_CACHED_BATCH', urls: urls });
      var urlsToFetch = urls;
      if (status && status.type === 'IS_CACHED_BATCH_RESULT' && Array.isArray(status.results)) {
        var missing = status.results.filter(function (r) { return !r.cached; }).map(function (r) { return r.url; });
        if (missing.length === 0) {
          // 已经全部缓存：闪一下提示，不重复下载
          var prev = dlText.textContent;
          dlText.textContent = '✓ 已离线 ' + urls.length;
          btn.classList.add('dl-done');
          setTimeout(function () { dlText.textContent = prev; }, 1800);
          return;
        }
        urlsToFetch = missing;
      }

      btn.disabled = true;
      dlText.textContent = '0 / ' + urlsToFetch.length;

      var ch = new MessageChannel();
      ch.port1.onmessage = async function (ev) {
        var d = ev.data || {};
        if (d.type === 'PREFETCH_PROGRESS') {
          dlText.textContent = d.done + ' / ' + d.total;
        } else if (d.type === 'PREFETCH_DONE') {
          btn.disabled = false;
          // 重新查一次拿到全局缓存数（包括之前已经缓存的部分）
          var fresh = await askSW({ type: 'IS_CACHED_BATCH', urls: urls });
          if (fresh && fresh.type === 'IS_CACHED_BATCH_RESULT') {
            updateLabel(fresh.cached, fresh.total);
          } else {
            updateLabel(urls.length, urls.length);
          }
        }
      };
      reg.active.postMessage({ type: 'PREFETCH_URLS', urls: urlsToFetch }, [ch.port2]);
    });
  }

  document.querySelectorAll('.download-toggle').forEach(wireDownload);
})();
</script>
