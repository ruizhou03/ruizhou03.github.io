{%- comment -%}
  评论抽屉：文末动作栏点「评论」→ 右侧(桌面) / 底部(手机)滑出，内嵌 Waline。全站单例。
  含 div#waline（Waline init 仍挂到它上面），头部评论数复用 .waline-comment-count。
  Liquid 安全：JS 无模板字面量、无花括号定界符。
{%- endcomment -%}
<style>
  .cmt-ov { position:fixed; inset:0; z-index:1100; background:rgba(20,25,35,.34); opacity:0; pointer-events:none; transition:opacity .25s; }
  .cmt-ov.on { opacity:1; pointer-events:auto; }
  .cmt-drawer { position:fixed; top:0; right:0; height:100dvh; width:min(460px,100vw); z-index:1101;
    background:var(--color-bg); box-shadow:-10px 0 44px -14px rgba(20,25,35,.45);
    transform:translateX(102%); transition:transform .3s cubic-bezier(.4,0,.2,1);
    display:flex; flex-direction:column; }
  .cmt-drawer.on { transform:none; }
  @media (max-width:600px) {
    .cmt-drawer { width:100vw; height:86dvh; top:auto; bottom:0; right:0; border-radius:18px 18px 0 0;
      transform:translateY(102%); box-shadow:0 -10px 44px -14px rgba(20,25,35,.45); }
  }
  .cmt-drawer-grip { display:none; }
  @media (max-width:600px) { .cmt-drawer-grip { display:block; width:38px; height:4px; border-radius:2px;
    background:var(--color-border); margin:.55rem auto -.15rem; flex-shrink:0; } }
  .cmt-drawer-h { display:flex; align-items:center; justify-content:space-between; gap:1rem;
    padding:0.95rem 1.25rem; border-bottom:1px solid var(--color-border); flex-shrink:0; }
  .cmt-drawer-t { font-family:var(--font-display); font-size:1.18rem; font-weight:600; color:var(--color-ink); }
  .cmt-drawer-t b { color:var(--color-muted); font-weight:400; font-size:.86em; font-variant-numeric:tabular-nums; margin-left:.1em; }
  .cmt-drawer-x { border:0; background:none; font-size:1.7rem; line-height:1; color:var(--color-light); cursor:pointer; padding:0 .3rem; }
  .cmt-drawer-x:hover { color:var(--color-ink); }
  .cmt-drawer-body { flex:1; overflow-y:auto; overflow-x:hidden; padding:1rem 1.25rem 2.4rem; }
  .cmt-drawer-body .cmt-fallback { color:var(--color-light); text-align:center; padding:3rem 1rem; font-family:var(--font-body); }

  /* —— Waline 抽屉内 · 仿知乎清爽版式 —— */
  /* 优先用 Waline 自己的主题变量改色，稳；再配少量类覆盖调版式 */
  .cmt-drawer #waline { margin:0 !important; padding:0 !important; border-top:0 !important;
    --waline-font-size: 15px; --waline-avatar-size: 34px; --waline-m-avatar-size: 30px;
    --waline-theme-color: var(--color-accent); --waline-active-color: var(--color-highlight);
    --waline-color: var(--color-text); --waline-dark-grey: var(--color-muted);
    --waline-border-color: var(--color-border); --waline-border: 1px solid var(--color-border);
    --waline-bgcolor: transparent; --waline-bgcolor-light: var(--color-bg-warm); --waline-bgcolor-hover: var(--color-bg-warm);
    --waline-avatar-radius: 50%; }
  .cmt-drawer .wl-panel { border:0 !important; box-shadow:none !important; margin:0 !important; width:100% !important; }
  .cmt-drawer .wl-cards { margin-top:.5rem !important; }
  /* 每条评论：头像左 + 正文右，行间虚线分隔、去卡片边框/底色 */
  .cmt-drawer .wl-card-item { padding:0 !important; }
  .cmt-drawer .wl-card { border-bottom:1px dashed var(--color-border) !important; padding:.85rem 0 !important; margin:0 !important;
    background:transparent !important; box-shadow:none !important; }
  .cmt-drawer .wl-card-item:last-child > .wl-card { border-bottom:0 !important; }
  .cmt-drawer .wl-avatar, .cmt-drawer img.wl-avatar { display:block !important; border-radius:50% !important; margin-right:.7rem !important; flex-shrink:0 !important; }
  .cmt-drawer .wl-head { display:flex !important; align-items:center !important; gap:.5rem !important; flex-wrap:wrap !important; margin-bottom:.1rem !important; }
  .cmt-drawer .wl-nick { font-family:var(--font-body) !important; font-weight:600 !important; font-size:.94rem !important; color:var(--color-ink) !important; }
  .cmt-drawer .wl-badge, .cmt-drawer .wl-tag { background:var(--color-accent-soft) !important; color:var(--color-accent) !important;
    border:0 !important; font-size:.66rem !important; padding:.06em .42em !important; border-radius:4px !important; }
  .cmt-drawer .wl-time, .cmt-drawer .wl-meta { color:var(--color-light) !important; font-size:.76rem !important; }
  .cmt-drawer .wl-meta span { background:none !important; padding:0 !important; margin:0 .5em 0 0 !important; color:var(--color-light) !important; border:0 !important; }
  .cmt-drawer .wl-content { font-family:var(--font-body) !important; color:var(--color-text) !important; font-size:.95rem !important; line-height:1.72 !important; margin:.2rem 0 .4rem !important; }
  .cmt-drawer .wl-content p { margin:0 0 .4rem !important; }
  .cmt-drawer .wl-quote { border-left:2px solid var(--color-border) !important; padding-left:.85rem !important; margin-top:.55rem !important; }
  .cmt-drawer .wl-editor, .cmt-drawer .wl-input, .cmt-drawer .wl-btn { font-family:inherit !important; }
  .cmt-drawer .wl-btn:hover, .cmt-drawer .wl-btn.primary { border-color:var(--color-accent) !important; }
  /* 评论逐条动作：原生 点赞(wl-like) / 回复(wl-reply) + 注入的 举报(cmt-report) */
  .cmt-drawer .wl-comment-actions { display:flex !important; gap:1rem !important; align-items:center !important; margin-top:.35rem !important; }
  .cmt-drawer .wl-comment-actions .wl-action, .cmt-drawer .cmt-report { font-size:.8rem !important; color:var(--color-light) !important;
    background:none !important; border:0 !important; cursor:pointer !important; padding:0 !important; font-family:var(--font-body) !important; line-height:1.4 !important; }
  .cmt-drawer .wl-comment-actions .wl-action:hover { color:var(--color-accent) !important; }
  .cmt-drawer .wl-like:hover, .cmt-drawer .wl-like.active, .cmt-drawer .wl-like[class*="active"] { color:var(--color-highlight) !important; }
  .cmt-drawer .cmt-report:hover { color:#b4453a !important; }
  .cmt-drawer .cmt-report svg { width:15px !important; height:15px !important; display:block !important; }
  /* 编辑器精简：已有登录系统 → 去掉昵称/邮箱/网址；去 GIF；表情面板不透明 */
  .cmt-drawer .wl-header { display:none !important; }
  .cmt-drawer .wl-gif { display:none !important; }
  .cmt-drawer .wl-emoji-popup { background:var(--color-bg) !important; opacity:1 !important;
    border:1px solid var(--color-border) !important; box-shadow:0 10px 32px -10px rgba(20,25,35,.35) !important; }
  /* 逐条动作靠右对齐；回复补「回复」二字，别只有图标 */
  .cmt-drawer .wl-comment-actions { margin-left:auto !important; justify-content:flex-end !important; }
  .cmt-drawer .wl-reply::after { content:'回复' !important; margin-left:.25rem !important; font-size:.8rem !important; }
  /* 回复按钮：藏掉原生聊天气泡图标，换成向前分享箭头 */
  .cmt-drawer .wl-reply { --reply-arrow: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>'); }
  .cmt-drawer .wl-reply > svg { display:none !important; }
  .cmt-drawer .wl-reply::before { content:''; display:inline-block; width:15px; height:15px; vertical-align:-2px;
    background-color:currentColor; -webkit-mask:var(--reply-arrow) center/contain no-repeat; mask:var(--reply-arrow) center/contain no-repeat; }
  /* 回复框：仿知乎——缩进浅底小框 */
  .cmt-drawer .wl-reply-wrapper, .cmt-drawer .wl-edit-wrapper { margin:.5rem 0 .2rem; padding:.55rem .7rem;
    background:var(--color-bg-warm); border:1px solid var(--color-border); border-radius:10px; }
  .cmt-drawer .wl-reply-wrapper .wl-panel, .cmt-drawer .wl-edit-wrapper .wl-panel { border:0 !important; box-shadow:none !important; background:transparent !important; }
  .cmt-drawer .wl-reply-wrapper .cmt-vditor .vditor, .cmt-drawer .wl-reply-wrapper textarea.wl-editor { min-height:52px !important; }
  .cmt-drawer .wl-reply-wrapper .vditor-toolbar { padding:2px 4px !important; }
  .cmt-drawer .cmt-report.cmt-reported { color:#b4453a !important; opacity:.65 !important; }
  /* 预览按钮(放大镜)补「预览」二字，别让人猜 */
  .cmt-drawer .wl-preview::after { content:'预览' !important; margin-left:.2rem !important; font-size:.78rem !important; vertical-align:middle !important; }
  /* 粘贴图片的缩略图预览条 */
  .cmt-paste-strip { display:flex; flex-wrap:wrap; gap:.5rem; padding:.55rem 0 .1rem; }
  .cmt-thumb { position:relative; display:inline-block; line-height:0; }
  .cmt-thumb img { height:58px; width:58px; object-fit:cover; border-radius:8px; border:1px solid var(--color-border); display:block; }
  .cmt-thumb-x { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; border:0;
    background:var(--color-ink); color:#fff; font-size:12px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
  .cmt-thumb-x:hover { background:#b4453a; }
</style>
<div class="cmt-ov" id="cmt-ov"></div>
<aside class="cmt-drawer" id="cmt-drawer" aria-hidden="true" aria-label="评论区">
  <div class="cmt-drawer-grip" aria-hidden="true"></div>
  <header class="cmt-drawer-h">
    <span class="cmt-drawer-t">评论 <b class="waline-comment-count" data-path="{{ page.url }}"></b></span>
    <button type="button" class="cmt-drawer-x" aria-label="关闭评论">&times;</button>
  </header>
  <div class="cmt-drawer-body"><div id="waline"><p class="cmt-fallback" id="cmt-fallback">评论区加载中…</p></div></div>
</aside>
<script>
(function () {
  var ov = document.getElementById('cmt-ov'), dr = document.getElementById('cmt-drawer');
  if (!ov || !dr) return;
  function open() { ov.classList.add('on'); dr.classList.add('on'); dr.setAttribute('aria-hidden', 'false'); document.documentElement.style.overflow = 'hidden'; }
  function close() { ov.classList.remove('on'); dr.classList.remove('on'); dr.setAttribute('aria-hidden', 'true'); document.documentElement.style.overflow = ''; }
  ov.addEventListener('click', close);
  dr.querySelector('.cmt-drawer-x').addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && dr.classList.contains('on')) close(); });
  window.CommentDrawer = { open: open, close: close };
})();
// 举报注入：Waline 渲染后，给每条评论的动作区加一个「举报」→ POST /api/report
(function () {
  var host = document.getElementById('waline');
  if (!host) return;
  var API = (window.SiteAuth && SiteAuth.API_BASE) ? SiteAuth.API_BASE : 'https://zircon-urge.fly.dev/api';
  function inject() {
    host.querySelectorAll('.wl-card-item').forEach(function (card) {
      var reply = card.querySelector('.wl-reply');
      var actions = card.querySelector('.wl-comment-actions') || (reply && reply.parentNode);
      if (!actions || actions.querySelector('.cmt-report')) return;
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'wl-action cmt-report'; b.title = '举报'; b.setAttribute('aria-label', '举报');
      b.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
      actions.appendChild(b);
      b.addEventListener('click', function () {
        var nick = (card.querySelector('.wl-nick') || {}).textContent || '';
        var content = (card.querySelector('.wl-content') || {}).textContent || '';
        var reason = window.prompt('举报这条评论的理由（可留空）：', '');
        if (reason === null) return;
        b.disabled = true; b.title = '举报中…';   // 保留 SVG 图标，反馈走 title / class（别用 textContent 覆盖掉图标）
        var f = (window.SiteAuth && SiteAuth.authedFetch) ? SiteAuth.authedFetch : window.fetch;
        f(API + '/report', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: location.pathname, nick: nick.slice(0, 60), snippet: content.trim().slice(0, 300), reason: (reason || '').slice(0, 200) }),
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d && d.ok) { b.title = '已举报'; b.classList.add('cmt-reported'); }
          else { b.disabled = false; b.title = '举报'; }
        }).catch(function () { b.disabled = false; b.title = '举报'; });
      });
    });
  }
  new MutationObserver(inject).observe(host, { childList: true, subtree: true });
  inject();
})();
// 粘贴图片：Waline 仍上传并在输入框插 markdown 源码；我们额外在输入框下方显示缩略图预览条，
// 让用户一眼看到图进去了（不用盯着 markdown 源码）。发布 / 清空后自动移除。
(function () {
  var host = document.getElementById('waline');
  if (!host) return;
  function toast(msg) {
    var t = document.getElementById('sa-toast');
    if (!t) { t = document.createElement('div'); t.id = 'sa-toast'; t.className = 'sa-toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.remove('on'); void t.offsetWidth; t.classList.add('on');
    clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('on'); }, 2400);
  }
  function clearStrip() {
    var s = host.querySelector('.cmt-paste-strip');
    if (!s) return;
    Array.prototype.forEach.call(s.querySelectorAll('img'), function (im) { try { URL.revokeObjectURL(im.src); } catch (e) {} });
    s.remove();
  }
  function addThumb(file, textarea) {
    var url = URL.createObjectURL(file);
    var strip = host.querySelector('.cmt-paste-strip');
    if (!strip) {
      strip = document.createElement('div'); strip.className = 'cmt-paste-strip';
      var anchor = textarea || host.querySelector('textarea') || host.querySelector('.wl-editor');
      if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(strip, anchor.nextSibling);
      else host.appendChild(strip);
    }
    var wrap = document.createElement('span'); wrap.className = 'cmt-thumb';
    var img = document.createElement('img'); img.src = url; img.alt = '粘贴的图片';
    var x = document.createElement('button'); x.type = 'button'; x.className = 'cmt-thumb-x'; x.title = '移除预览'; x.textContent = '×';
    x.addEventListener('click', function () { try { URL.revokeObjectURL(url); } catch (e) {} wrap.remove(); if (strip && !strip.children.length) strip.remove(); });
    wrap.appendChild(img); wrap.appendChild(x); strip.appendChild(wrap);
  }
  host.addEventListener('paste', function (e) {
    if (host.querySelector('.cmt-vd-panel')) return;   // Vditor 接管时它自己内联显示图片，别重复弹缩略图
    var items = (e.clipboardData && e.clipboardData.items) || [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].type && items[i].type.indexOf('image') === 0) {
        var file = items[i].getAsFile();
        if (file) { addThumb(file, (e.target && e.target.tagName === 'TEXTAREA') ? e.target : null); toast('图片已插入，发布后即可显示 🖼'); }
        break;
      }
    }
  }, true);
  // 输入框清空（含提交后 Waline 重置）→ 移除预览条
  host.addEventListener('input', function (e) {
    if (e.target && e.target.tagName === 'TEXTAREA' && !(e.target.value || '').trim()) clearStrip();
  }, true);
  host.addEventListener('click', function (e) {
    var btn = e.target && e.target.closest ? e.target.closest('.wl-btn') : null;
    if (btn && /提交|发送|发布/.test(btn.textContent || '')) setTimeout(clearStrip, 700);
  }, true);
})();
// 评论数提速：不等 Waline 加载，页面一进来就直接拉一次 count 秒填(像知乎那样立刻出数字)；之后 Waline 加载 + 发帖由下面的镜像刷新
(function () {
  var path = '{{ page.url }}';
  fetch('https://zircon-comments.fly.dev/api/comment?type=count&url=' + encodeURIComponent(path))
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) {
      var n = d && d.data; if (Array.isArray(n)) n = n[0];
      if (typeof n === 'number') Array.prototype.forEach.call(document.querySelectorAll('.waline-comment-count'), function (el) { el.innerText = String(n); });
    }).catch(function () {});
})();
// 评论数实时同步：Waline 内部 .wl-num 是响应式的(发帖即自增)，但外部 .waline-comment-count 只 init 时算一次 → 镜像过去
(function () {
  var host = document.getElementById('waline'); if (!host) return;
  function sync() {
    var num = host.querySelector('.wl-count .wl-num'); if (!num) return;
    var n = (num.textContent || '').trim(); if (!/^\d+$/.test(n)) return;
    Array.prototype.forEach.call(document.querySelectorAll('.waline-comment-count'), function (el) {
      if (el.innerText !== n) el.innerText = n;
    });
  }
  new MutationObserver(sync).observe(host, { childList: true, subtree: true, characterData: true });
  sync();
})();
// 作者徽章：站主评论时网址被锁成 /u/?id=<OWNER_ID>，据此在其评论头注入「作者」
(function () {
  var host = document.getElementById('waline'); if (!host) return;
  var OWNER_ID = '{{ site.comment_author_id }}';
  if (!OWNER_ID) return;
  function mark() {
    Array.prototype.forEach.call(host.querySelectorAll('a.wl-nick[href*="/u/?id=' + OWNER_ID + '"]'), function (a) {
      var head = a.closest('.wl-head'); if (!head || head.querySelector('.cmt-author-badge')) return;
      var b = document.createElement('span'); b.className = 'wl-badge cmt-author-badge'; b.textContent = '作者';
      a.insertAdjacentElement('afterend', b);
    });
  }
  new MutationObserver(mark).observe(host, { childList: true, subtree: true });
  mark();
})();
</script>

{%- comment -%} 评论框升级为 Typora 式 Vditor（失败自动回退原生输入框） {%- endcomment -%}
